body:
  text: 備急千金要方卷十五唐孫思邈撰宋林億等校正七竅病方目病第一論法證灸方呪法論曰凡人年四十五已後漸覺眼暗至六十已後還漸目明治之法五十已前可服瀉肝湯五十已後不可瀉肝目中有疾可傅石膽散藥等無病不可輒傅散但補肝而已自有肝中有風熱令人眼昏暗者當灸肝輸及服除風湯圓散數十劑當愈生食五辛接熱飲食熱餐麵食飲酒不已房室無節極目逺視數看日月夜視星火夜讀細書月下看書抄寫多年雕鏤細作博奕不休久處煙火泣淚過多刺頭出血過多右十六件並是喪明之本養性之士宜熟慎焉又有馳騁田獵冒涉風霜迎風追獸日夜不息者亦是傷目之媒也恣一時之浮意為百年之痼疾可不慎歟凡人少時不自將慎年至四十即漸眼昏若能依此慎護可得白首無他所以人年四十已去常須瞑目勿顧他視非有要事不冝輒開此一術護慎之極也其讀書博奕等過度患目者名曰肝勞若欲治之非三年閉目不視不可得瘥徒自瀉肝及作諸治終是無效人有風疹必多眼昏先攻其風其暗自瘥足太陽陽明手少陽脉動發目病黃帝問曰余嘗上清冷之臺中陛而顧匍匐而前余私異之竊內怪之或獨冥視安心定氣久而不解被髮長跪俯而視復久之又不已卒然自止何氣使然岐伯對曰五臟六腑之精氣皆上注于目而為之睛睛之果者為眼骨之精為瞳子筋之精為黑眼血之精為其絡果氣之精為白眼肌肉之精為約束果契筋骨血氣之精而與脉并為系系上屬于腦後出於項中故邪中于項因逢身之虛其入深則隨眼系以入于腦入于腦則轉轉則引目系急急則目眩以轉矣邪中其睛則其睛所中者不相比則睛散睛散則岐故見兩物目者五臟六腑之精也營衛魂魄之所營也神氣之所生也故神勞則魂魄散志意亂是故瞳子黑眼法于隂白眼赤脉法于陽故隂陽合揣靈樞作俱轉而精明矣目者心之使也心者神之舍也故神分精亂而不專靈樞作轉卒然見非常之處精神魂魄散不相得故曰惑帝曰余疑何其然也余每之東菀未嘗不惑去之則復余惟獨為東菀勞神乎何其異也岐伯曰不然夫心有所喜神有所惡卒然相感則精亂視誤故神惑神移乃復是故間者為迷甚者為惑目眥外決于面者為兊眥在內近鼻者上為外眥下為內眥目赤色者病在心白色者病在肺青色者病在肝黃色者病在脾黑色者病在腎黃色不可名者病在胸中診目痛赤脉從上下者太陽病從下上者陽明病從外走內者少陽病夫鼻洞鼻洞者濁下不止傅為􅍠瞢瞑目故得之氣厥足陽明有俠鼻入于面者名曰懸顱屬口對入係目本視有過者取之損有餘益不足反者益甚足太陽有通項入於腦者正屬目本名曰眼系頭目固痛取之在項中兩筋間入腦乃别隂蹻隂陽相交陽入隂出陽交于兊眥陽氣盛則暝目隂氣絶則眠瞑神麴圓主明目百歲可讀注書方神麴四兩磁石二兩光明砂一兩右三味為末鍊蜜為丸如梧子飲服三丸日三不禁常服益眼力衆方不及學者冝知此方神驗不可言當祕之瓜子散補肝治眼漠漠不明亦名十子散方冬瓜子青葙子茺蔚子枸杞子牡荆子蒺藜子菟絲子蕪菁子決明子地膚子柏子仁各二合牡桂櫻薁根各二兩蕤仁一合一云二合車前子一兩細辛半兩一云兩半右十六味治下篩食後以酒服方寸匕日二神驗補肝圓治眼暗方青葙子桂心葶藶子杏仁細辛茺蔚子枸杞子五味子各一兩茯苓黃芩防風地膚子澤瀉決明子麥門冬蕤仁各一兩六銖車前子莬絲子各二合乾地黃三兩兔肝一具右二十味為末蜜丸飲下二十丸如梧子日再加至三十丸又方治眼暗􅉩􅉩不明寒則淚出肝痺所損之方兔肝二具柏子仁乾地黃茯苓細辛㽔仁枸杞子各一兩六銖防風芎藭薯蕷各一兩車前子一合五味子十八銖甘草半兩菟絲子一合右十四味為末蜜丸酒服如梧子二十丸日再服加至四十丸補肝散治目失明漠漠方決明子半升蓼子一合熬令香青羊肝一具去上膜薄切之以新瓦瓶子未用者淨拭內肝於中炭火上灸之令極乾汁盡末之右三味合治下篩以粥飲食後服方寸匕日二稍加至三匕不過兩劑能一歲服之可夜讀細書又方治三十年失明方鍾乳粉雲母粉各鍊成者細辛茯苓逺志五味子等分右六味治下篩以酒服五分匕日三加至一錢匕補肝蕪菁子散常服明目方蕪菁子三升淨淘以清酒三升煮令熟曝乾治下篩以井花水和服方寸匕稍加至三匕無所忌可少少作服之令人充肥明目洞視水煮酒服亦可千金翼用水煮三易水又方胡麻一斗蒸三十遍治下篩每日酒服一升又方服小黑豆每日空心吞二七粒又方三月三日採蔓菁花隂乾治下篩空心井花水服方寸匕久服長生明目可以夜讀細書補肝散治男子五勞七傷明目方地膚子一斗隂乾為末生地黃十斤搗取汁右二味以地黃汁和散曝乾更為末以酒服方寸匕日二又方白瓜子七升絹袋盛攪沸沸湯中三遍曝乾以酢五升浸一宿曝乾治下篩酒服方寸匕日三服之百日可夜寫細書梔子仁煎治肝實熱目眥痛如刺方梔子仁決明子蕤仁各一兩車前葉秦皮各一兩六銖石膏一兩碎如小豆苦竹葉二合細辛半兩赤蜜三合右九味㕮咀以井花水三升煮取七合去滓下蜜更煎取四合以綿濾之乾器貯密封勿使草芥落中以藥汁細細仰卧以傅目中瀉肝湯治眼赤漠漠不見物息肉生方柴胡芍藥大黃各四兩決明子澤㵼黃芩杏仁各三兩升麻枳實梔子仁竹葉各二兩右十一味㕮咀水九升煮取二升七合分三服熱多體壯加大黃一兩羸老去大黃加梔子仁五兩又方治眼風赤暗方前胡芍藥各四兩生地黃十兩芒硝黃芩茯苓白芷枳實各三兩人參白术梔子仁澤瀉各二兩甘草細辛各一兩竹葉五升右十五味㕮咀以水一斗二升先煎竹葉取九升去滓下諸藥煮取三升半分三服洗肝乾藍煎治肝熱不止衝眼眼眥赤赤脉息肉痛閉不開熱勢彭彭不歇及目睛黃方乾藍車前葉苦竹葉各三升細辛秦皮㽔仁梔子仁芍藥各三兩決明子四兩升麻二兩右十味㕮咀以水二斗先煮乾藍車前竹葉取一斗去滓澄清取八升內藥煮取三升分三服須利加芒硝二兩大棗煎治目熱眥赤生赤脉侵睛息肉急痛閉不開如芥在眼磣痛方大棗七枚去皮核黃連二兩碎綿裹淡竹葉切五合右三味以水二升煮竹葉取一升澄清取八合內棗肉黃連煎取四合去滓令淨細細以傅目眥中治目中息肉方臚脂石鹽末右二味和合令調注目兩眥頭日三夜一瘥又方五加不聞水聲者根去土取皮搗末一升和上酒二升浸七日外一日兩時服之禁醋二七日遍身生瘡若不出未得藥力以生熟湯浴之取毒瘡出瘥洗眼湯治熱上出攻目生瞕翳目熱痛汁出之方秦皮黃蘗決明子黃連黃芩㽔仁各十八銖梔子七枚大棗五枚右八味㕮咀以水二升浸煮取六合澄清仰卧洗日一治目生翳方貝子十枚燒灰治下篩取如胡豆著翳上日二正仰卧令人傅之炊久乃拭之息肉者加真珠如貝子等分治目赤及翳方烏賊骨鉛丹大小等分右二味合研細和白蜜如泥蒸之半食久冷著眼四眥又方白羊髓傅之良又方熟羊眼睛曝乾治下篩傅目兩角又方新生孩子胞衣曝乾燒末傅目眥中又方古錢一枚鹽方寸匕右二味合治下篩傅目眥中治目風淚出浮翳多膿爛眥方乾薑決明子礬石㽔仁細辛黃連戎鹽各六銖銅青三銖右八味㕮咀以少許水浸一宿明旦以好白蜜八合和之著銅器中綿蓋器上著甑中以三斗麥屑蒸之飯熟藥成絞去滓以新死大雄鯉魚膽二枚和內藥中又以大錢七枚常著藥底兼常著銅器中竹簮綿裹頭以注目眥頭晝夜三四不避寒暑數著藥乾又以魚膽和好覆藥器頭勿令氣歇善治熱翳漫睛方以羊筋漱口熟嚼夜卧開目內之即閉目睡去膜明日即瘥千金翼以治眯目不明治風翳方取死猪鼻燒灰治下篩日一向日水服方寸匕治目熱生膚赤白膜方取雄雀屎細直者人乳和熟研以傅之當漸消爛又方以蛔蟲燒為末傅之良治人馬白膜漫睛方以雞翎截之近黑睛及當白睛嗍之膜自聚鈎針鈎挽之割去即見物以綿當眼上著血斷三日瘥蕩風散治目白膚風淚下方刪繁方名真珠散光明朱砂半兩具齒五枚炭上熟燒為末衣中白魚七枚乾薑三銖一方用生薑自然汁澄粉代乾薑右四味於新磁鉢內研之厚帛三下為散仰卧令人取小指爪挑少許傅目中取瘥為度千金翼名真珠散主目翳覆瞳睛不見物治目中生息肉膚翳稍長欲滿目閉瞳子及生珠管方具齒七枚燒為末真珠等分右二味合治如粉以注翳肉止日三度甚良亦治目中眯不出治目生珠管方滑石一作冷石手爪甲燒龍骨具齒丹砂各等分右五味治下篩以新筆㸃取當珠管上日三度良治毒病後目赤痛有翳方以青布掩目上以冷水漬青布數易之治熱病後生翳方豉二七枚燒為末內管中以吹目中治熱病後眼暗失明方以羊膽傅之旦暮各一治風眼爛眥方竹葉黃連各一兩柏白皮一兩半右三味㕮咀以水二升煮取五合稍用滴目兩眥日三四度治胎赤眼方取槐木枝如馬鞭大長二尺齊頭油麻一匙置銅鉢中旦使童子以水研之至暝止夜卧時洗目傅眥日三良治目爛赤方取三指撮鹽置古文錢上重重火燒赤投少醋中足淹錢以綿沾汁注目眥中乳汁煎治目中風冷淚出眥赤癢方黃連十八銖㽔仁半兩乾薑一兩右三味㕮咀以人乳汁一升浸藥一宿明旦以微火煎取三合綿絞去滓取如黍米許內目眥頭日三張文仲方三味等分治目中風腫痛除熱揉眼方礬石三兩燒令汁盡以棗膏和如彈丸揉眼上下食頃日三止洗眼湯治目赤痛方甘竹葉七枚烏梅古錢各三枚右三味以水二升漬藥半日東向竈煮三沸三上三下得二合臨欲眠注目眥治目卒腫方以酢漿水作鹽湯洗之日四五度治目卒癢痛方削乾薑令圓滑內眥中有汁拭却復內薑味盡易之治五臟客熱上衝眼內外受風冷目痛不明方地膚子瓜仁子青葙子蒺藜子茺蔚子藍子菟絲子㽔仁千金翼作車前子各二合柏子仁合半決明子五合細辛一兩六銖桂心一兩十八銖大黃二兩螢火六銖黃連一兩半右十五味為末蜜丸如梧子每服三十丸食後服日三千金翼無柏子仁治目赤痛方雄黃一銖細辛黃連乾薑各二銖右四味合治如粉以綿裹叉股唾濡頭注藥末內大􅗃頭急閉目目中淚出須臾止勿將手近勿將帛裛勿洗之又方雄黃乾薑黃連礬石各六銖右四味合治並如前方一方加細辛六銖治眼赤暗方古青錢三枚青鹽一兩六銖杏仁杏未熟時取仁搗汁一合右三味合內垍器中封頭勿泄氣百日後出著目四眥頭日二三避風冷治眼暗赤冷淚方㽔仁波斯鹽右二味等分治下篩以驢生脂和每夜傅目四角以一粟大密室中將息一月日瘥忌五辛失明者三十日傅之治目痛及淚出不止方削附子作蠶屎大內目中卧良治目不明淚出方以烏雞膽臨卧傅之治雀盲方地膚子五兩決明子一斤右二味為末以米飲汁和丸食後服二十丸至三十丸日二盡即更合瘥止治雀目術令雀盲人至黃昏時看雀宿處打令驚起雀飛乃呪曰紫公紫公我還汝盲汝還我明如此日日瞑三過作之眼即明曽試有驗肘後云删繁載支太醫法真珠散治肝氣虛寒眼青􅉩􅉩不見物方真珠一兩研白蜜二合鯉魚膽鯉魚腦各一枚右四味和合微火煎兩沸綿裹內目中當汁出藥歇更為之治目􅉩􅉩無所見方青羊肝一具細切以水一斗內銅器中煮以麴餅覆上上鑽兩孔如人眼正以目向就熏目不過再熏即瘥千金翼若眼暮無所見不用麴餅治眼暗方以銅器盛大酢三四升煎七八日覆器濕地取銅青一合以三月杏白仁一升取汁和銅青傅之不過三四度大良又方古錢七枚銅青乾薑石鹽胡粉菥蓂子各中棗大烏頭棗核大黃連三銖細辛五銖㽔仁一百三十枚酢二合清酒五合楸葉一把取汁右十三味治下篩合煎取三分去一盛瓷器中若燥取人乳和傅目慎風冷又方每朝含黃蘗一爪甲許使津置掌中拭目訖以水洗之至百日眼明此法乃可終身行之永除眼疾神良又方柴胡六銖決明子十八銖右二味治下篩人乳汁和傅目可夜書見五色治眼暗方七月七日生苦瓠中白絞取汁一合以酢一升浸古文錢七枚微火煎減半以米許大內眥中治眼漠漠無所見方㽔仁秦皮黃連各十八銖螢火七枚決明子一合右五味㕮咀以水八合微火煎取三合冷以綿注洗目日三度蕪菁子常服主輕身益氣明目方蕪青子一升以水四升煮令汁盡出曝乾復以水四升煮如前法三煮三曝治下篩飲服方寸匕千金翼云百日身熱瘡出不久自瘥治明目令髮不落方十月上已日收槐子內新淨甕中以盆密封口三七日發封洗去皮取子從月一日復一枚二日二枚日别加計十日服五十五枚一月日服一百六十五枚一年服一千九百八十枚小月减六十枚此藥主補腦早服之髮不白好顔色長生益夀先病冷人勿服之肘後云扁鵲方又方牛膽中漬槐子隂乾百日食後吞一枚十日身輕三十日白髮再黑至百日通神治目中眯不出方以蠶砂一粒吞下即出治稻麥芒等入目中方取生蠐螬以新布覆目上將蠐螬從布上摩之芒出著布良治沙石草木入目中不出方以雞肝注之又方以書中白魚和乳汁注目中治目中眯法旦起對門户跪拜云門戶狹小不足宿客方便瘥治目為物所傷觸青黑方煮羊肉令熱尉勿令過熱猪肝亦得治目痛不得睡方暮炙新青布尉并蒸大豆袋盛枕之夜常令熱目中赤痛從內眥始取之隂蹻目中痛不能視上星主之先取譩嘻後取天牖風池青盲逺視不明承光主之目瞑逺視􅉩􅉩目窗主之目􅉩􅉩赤痛天柱主之目眩無所見偏頭痛引目外眥而急頷猒以主之目逺視不明惡風淚出憎寒頭痛目眩瞢內眥赤痛逺視􅉩􅉩無見眥癢痛淫膚白翳精明主之青盲無所見逺視􅉩􅉩目中淫膚白膜覆瞳子巨窖主之目不明淚出目眩瞢瞳子癢逺視􅉩􅉩昏夜無見目瞤動與項口參相引喎僻口不能言刺承泣目痛僻戾不明四白主之目赤目黃權窖主之睊目水溝主之目痛不明齗交主之目瞑身汗出承漿主之青盲􅀈目惡風寒上關主之青盲商陽主之􅀈目􅉩􅉩偏歷主之眼痛下亷主之目中白翳前谷主之目痛泣出甚者如脫前谷主之白膜覆珠子無所見解溪主之灸法餘冗見前􅀈目􅉩􅉩少氣灸五里右取左左取右眼暗灸大椎下數節第十當脊中安灸二百壯惟多為佳至驗肝勞邪氣眼赤灸當容百壯兩邊各爾冗在眼小眥近後當耳前三陽三隂之㑹處以兩手按之有上下橫脉則是與耳門相對是也眼急痛不可逺視灸當瞳子上入髮際一寸隨年壯冗名當陽風翳患右目灸右手中指本節頭骨上五壯如小麥大左手亦如之風癢赤痛灸人中近鼻柱二壯仰卧灸之目卒生翳灸大指節橫文三壯在左灸右在右灸左良備急千金要方卷十五
