body:
  text: 備急千金要方卷八十二唐孫思邈撰宋林億等校正飬性按摩法第四天竺國按摩此是婆羅門法兩手相捉紐捩如洗手法兩手淺相义飜覆向胷兩手相捉共按䏶左右同以手如挽五石力弓左右同兩手相重按䏶徐徐捩身左右同作拳向前築左右同作拳却頓此是開胷左右同如拓石法左右同以手反搥背上左右同兩手據地縮身曲脊向上三舉兩手抱頭宛轉䏶上此是抽脅大坐斜身偏欹如排山左右同大坐伸兩脚即以一脚向前虚掣左右同兩手拒地廻顧此是虎視法左右同立地反拗身三舉兩手急相义以脚踏手中左右同起立以脚前後虚踏左右同大坐伸兩脚用當相手勾所伸脚著膝中以手按之左右同右十八勢但是老人日别能依此三遍者一月後百病除行及奔馬補益延年能食眼明輕健不復疲乏老子按摩法兩手捺䏶左右捩身二七遍兩手捻䏶左右紐肩二七遍兩手抱頭左右紐腰二七遍左右挑頭二七遍兩手托頭三舉之一手抱頭一手托膝三折左右同一手托頭一手托膝從下向上三遍左右同兩手攀頭下向三頓足兩手相捉頭上過左右三遍兩手相义托心前推却挽三遍兩手相义著心三遍曲腕築肋挽肘左右亦三遍左右挽前後㧞各三遍舒手挽項左右三遍反手著膝手挽肘覆手著膝上左右亦三遍手摸肩從上至下使遍左右同兩手空拳築三遍兩手相义反覆攪各七遍外振手三遍内振三遍覆手振亦三遍摩紐指三遍兩手反摇三遍兩手反义上下紐肘無數單用十呼兩手上聳三遍兩手下頓三遍兩手相义頭上過左右申肋十遍兩手拳反背上掘脊上下亦三遍掘揩之也兩手反捉上下直脊三遍覆掌搦腕内外振三遍覆掌前聳三遍覆掌兩手相义交横三遍覆掌横直即聳三遍若有手患冷從上打至下得熱便休舒左脚右手承之左手捺脚聳上至下直脚三遍右手捺脚亦爾前後捩足三遍左捩足右捩足各三遍前後却捩足三遍直脚三遍紐䏶三遍内外振脚三遍若有脚患冷者打熱便休紐䏶以意多少頓脚三遍却直脚三遍虎據左右紐肩三遍推天托地左右三遍左右排山負山㧞木各三遍舒手直前頓申手三遍舒兩手兩膝亦各三遍舒脚直反頓申手三遍捩内脊外脊各三遍調氣法第五彭祖曰道不在煩但能不思衣食不思聲色不思勝負不思曲直不思得失不思榮辱心無煩形勿極而兼之以導引行氣不已亦可得長年千歲不死凡人不可無思當以漸遣除之彭祖曰和神導炁飬道當得宻室閉户安牀煖席枕高二寸半正身偃臥瞑目閉氣於胸膈中以鴻毛著鼻上而不動經三百息耳無所聞目無所見心無所思如此則寒暑不能侵蜂蠆不能毒夀三百六十歲此隣於眞人也每旦夕旦夕者足隂陽轉換之時凡旦五更初煖氣至頻頻眼閉是上生氣至名曰陽息而隂消暮日入後冷氣至􅏮􅏮然時乃至牀坐睡倒是下生氣至名曰陽消而隂息旦五更初煖氣至暮日入後冷氣至常出入天地日月山川河海人畜草木一切萬物體中代謝徃來無時休息進退如晝夜之更迭如海水之潮汐是天地消息之道也面向午展兩手於脚膝上徐徐按捺肢節口吐濁氣鼻引清氣凡吐者去故氣亦名死氣納者取新氣亦名生氣故老子經云𤣥牝之門天地之根綿綿若存時之不勤言口鼻天地之間可以出納隂陽死生之氣也良乆徐徐乃以手左托右托上托下托前托後托瞋目張口叩齒摩眼押頭㧞耳挽髮放腰咳嗽發揚振動也䨇作隻作反手為之然後掣足仰振數八十九十而止仰下徐徐定心作禪觀之法閉目存思想見空中太和元氣如紫雲成蓋五色分明下入毛際漸漸入頂如雨初晴雲入山透皮入肉至骨至腦漸漸下入腹中四肢五臟皆受其潤如水滲入地若徹則覺腹中有聲汩汩然意專思存不得外縁斯須即覺元氣逹於氣海須臾則自逹於涌泉則覺身體振動兩脚踡曲亦令牀坐有聲拉拉然則名一通一通二通乃至日别得三通五通則身體恱懌面色光輝鬢毛潤澤耳目精明令人食美氣力強健百病皆去五年十歲長存不忘得滿千萬通則去仙不逺矣人身虚無但有遊氣氣息得理即百病不生若消息失冝即諸痾競起善攝飬者須知調氣方焉調氣方療萬病大患百日生眉鬚自餘者不足言也凡調氣之法夜半後日中前氣生得調日中後夜半前氣死不得調調氣之時則仰臥牀鋪厚輭枕高下共身平舒手展脚兩手握大拇指節去身四五寸兩脚相去四五寸數數叩齒飲玊漿引氣從鼻入腹足則停上有力更取乆住氣悶從口細細吐出盡逺從鼻細細引入出氣一准前法閉口以心中數數令耳不聞恐有誤亂兼以手下籌能至千則去仙不逺矣若天隂霧惡風猛寒勿取氣也但閉之若患寒熱及卒患癰疽不問日中疾患未發前一食間即調如其不得好瘥明日依式更調之若患心冷病氣即呼出若熱病氣即吹出若肺病即嘘出若肝病即呵出若脾病即唏出若腎病即呬出夜半後八十一鷄鳴七十二平旦六十二日出五十四辰時四十五巳時三十六欲作此法先左右導引三百六十遍病有四種一冷痺二氣疾三邪風四熱毒若有患者安心調氣此法無有不瘥也凡百病不離五臟五臟各有八十一種疾冷熱風氣計成四百四病事須識其相類善以知之心臟病者體冷熱相法心色赤患者夢中見人著赤衣持赤刀杖火來怖人療法用呼吹二氣呼療冷吹治熱肺臟病者胷背滿脹四肢煩悶相法肺色白患者喜夢見美女美男詐親附人共相抱持或作父母兄弟妻子療法用嘘氣出肝臟病者憂愁不樂悲思喜頭眼疼痛相法肝色青夢見人著青衣捉青刀杖或獅子虎狼來恐怖人療法用呵氣出脾臓病者體上遊風習習徧身痛煩悶相法脾色黄通土色夢或作小兒擊歴人邪猶人或如旋風團圞轉治法用唏氣出腎臓病者體冷隂衰面目惡痿相法腎色黒夢見黒衣及獸物捉刀杖相怖用呬氣出冷病者用大呼三十遍細呼十遍呼法鼻中引氣入口中吐氣出當令聲相逐呼字而吐之熱病者用大吹五十遍細吹十遍吹如吹物之吹當使字氣聲似字肺病者用大嘘三十遍細嘘十遍肝病者用大呵三十遍細呵十遍脾病者用大唏三十遍細唏十遍腎病者用大呬五十遍細呬三十遍此十二種調氣法若有病依此法㳟敬用心無有不瘥皆須左右導引三百六十遍然後乃為之服食法第六論方論曰凡人春服小續命湯五劑及諸補散各一劑夏大熱則服腎瀝湯三劑秋服黄耆等丸一兩劑冬服藥酒兩三劑立春日則止此法終身常爾則百病不生矣俗人見淺但知鉤吻之殺人不信黄精之益夀但識五榖之療饑不知百藥之濟命但解施瀉以生育不能閉固以頥飬故有服餌方焉郄愔曰夫欲服食當尋性理所宜審冷煖之適不可見彼得力我便服之初御藥皆先草木次石是為将藥之大較也所謂精粗相代階粗以至精者也夫人從少至長體習五榖卒不可一朝頓遺之凡服藥物為益遲㣲則無充饑之驗然積年不已方能骨髓填實五榖居然而自斷今人多望朝夕之效求目下之應腑臟未充便以絶粒榖氣始除藥未有用又将御女形神與俗無别以此致弊胡不怪哉服餌大體皆有次第不知其術者非止交有所損卒亦不得其力故服餌大法必先去三蟲三蟲既去次服草藥好得藥力次服木藥好得力訖次服石藥依此次第乃得遂其藥性庶事安穏可以延齡矣去三蟲圓方生地黄汁三斗東向竈葦火煎三沸内清漆二升以荆匕攪之日移一尺内眞丹三兩復移一尺内𤓰子末三升復移一尺内大黄末三兩㣲火勿令焦候可丸丸如梧子大先食服一丸日三濁血下鼻中三十日諸蟲皆下五十日百病愈面色有光澤又方漆二升大黄六兩末酒一升半蕪菁子三升末右四味以㣲火合煎令可丸如梧子大先食服三丸十日濁血下出鼻中三十日蟲皆爛下五十日身光澤一年行及奔馬消息四體安穩乃可服草藥其餘法在三蟲篇中備述三蟲篇見前第十八卷服天門冬方天門冬曝乾𢷬下篩食後服方寸匕日三可至十服小兒服尤良與松以若蜜丸服之益善惟多彌佳又方𢷬取汁㣲火煎取五斗下白蜜一斗胡麻炒末二升合煎攪勿息手可丸即止火下大豆黄末和為餅徑三寸厚半寸一服一枚日三百日已上得益此方最上妙包衆方一法釀酒服始傷多無苦多即吐去病也方見第十四卷中蒯道人年近二百而少常告皇甫隆云但取天門冬去心皮切乾之酒服方寸匕日三令人不老補中益氣愈百病也天門冬生奉高山谷在東嶽名淫羊食在中嶽名天門冬在西嶽名管松在南嶽名百部在北嶽名無不愈在原陸山阜名顛棘雖然處處有之異名其實一也在北隂地者佳取細切烈日乾之乆服令人長生氣力百倍治虚勞絶傷年老衰損羸瘦偏枯不隨風濕不仁冷痺心腹積聚惡瘡癰疽腫癩疾重者周身膿壊鼻柱敗爛服之皮脫蟲出顔色肥白此無所不治亦治隂痿耳聾目暗乆服白髪黒齒落生延年益命入水不濡服二百日後恬泰疾損拘急者緩羸劣者强三百日身輕三年走及奔馬又三年心腹痼疾皆去服地黄方生地黄五十斤熟𢷬絞取汁澄去滓㣲火上煎減過半内白蜜五升棗脂一升攪令相得可丸乃止每服如雞子一枚日三令人肥白又方地黄十斤細切以醇酒二斗漬三宿出曝乾反復内漬取酒盡止與甘草巴㦸天厚朴乾漆覆盆子各一斤𢷬下篩食後酒服方寸匕日三加至二匕使人老者還少强力無病延年作熟乾地黄法採地黄去其鬚葉及細根𢷬絞取汁以漬肥者著甑中土若米無在已蓋上蒸之一時出曝燥更内汁中又蒸汁盡止便乾之亦可直切蒸之半日數以酒灑之使周匝至夕出曝乾可𢷬蜜丸服之種地黄法先擇好地黄赤色虚軟者深耕之臘月逆耕凍地彌好擇肥大好地黄根切長四五分至一二寸許一斛可種一畝二三月種之作畦畔相去一尺生後隨鋤壅數耘之至九月十月視其葉小衰乃掘取一畝得二十許斛擇取大根水淨洗其細根乃剪頭尾軰亦洗取之日曝令極燥小䐢乃以竹刀切長寸餘許白茅露甑下蒸之宻蓋上亦可囊盛土填之從旦至暮當黒不盡黒者明日又擇取蒸之先時已𢷬其細碎者取汁銅器煎之如薄飴遂以地黄内汁中周帀出曝乾又内汁盡止率百斤生者令得一二十斤取初八月九月中掘者其根勿令大老强蒸則不消盡有筋脉初以地黄内甑中時先用銅器承其下以好酒淋地黄上令帀汁後下入器中取以併和煎汁佳黄精膏方黄精一石去鬚毛洗令淨潔打碎蒸令好熟壓得汁復煎去上遊水得一斗内乾薑末三兩桂心末一兩㣲火煎看色鬱鬱然欲黄便去火待冷盛不津器中酒五合和服二合當未食前日二服舊皮脫顔色變光花色有異鬢髪更改欲長服者不須和酒内生大豆黄絶榖食之不饑渴長生不老服烏麻法取黒皮眞檀色者烏麻随多少水拌令潤勿過濕蒸令氣徧即出曝乾如此九蒸九𢷬去上皮未食前和水若酒服二方寸匕日三漸漸不饑絶榖乆服百病不生常服延年不老餌栢實方栢子仁二升𢷬令細醇酒四升漬攪如泥下白蜜二升棗膏三升𢷬令可丸入乾地黄末白术末各一升攪和丸如梧子每服三十丸日二服二十日萬病皆愈餌松子方七月七日採松子過時即落不可得治服方寸匕日三四一云一服三合百日身輕二百日行五百里絶榖服昇仙渴飲水亦可和脂服之若丸如梧桐子大服十丸服松脂方百錬松脂下篩以蜜和内筩中勿令中風日服如博棊子一枚博棊長二寸方一寸日三漸漸月别服一斤不饑延年亦可淳酒和白蜜如餳日服一二兩至半斤凡取松脂老松皮自有聚脂者最第一其根下有傷折處不見日月者得之名曰隂脂彌良惟衡山東行五百里有大松皆三四十圍乃多脂又法五月刻大松陽面使向下二十四株株可得半升亦煮其老節根處有脂得用仙經云常以三月入衡山之隂取不見日月松脂錬而餌之即不召而自來服之百日耐寒暑二百日五臟補益服之五年即見西王母仙經又云諸石所生三百六十五山其可食者滿谷隂懷中松脂耳其谷正從衡山嶺直東四百八十里當横揵正在横嶺東北行過其南入谷五十里窮穴有石城白鶴其東方有大石四十餘丈狀如白松松下二丈有小穴東入山有丹砂可食其南方隂中有大松大三十餘圍有三十餘株不見日月皆可取服之採松脂法以日入時破其隂以取其膏破其陽以取其脂脂膏等分食之可以通神靈鑿其隂陽為孔令方五寸深五寸還以皮掩其孔無令風入風入則不可服以春夏時取之取訖封塞勿泄以泥塗之東北行丹砂穴有隂泉水可飲此𢎞農車君以元封元年入此山食松脂十六年復下居長安東市在上谷牛頭谷時徃來至秦嶺上年常如三十者錬松脂法松脂七斤以桑灰汁一石煮脂三沸接置冷水中凝復煮之凡十遍脂白矣可服今谷在衡州東南攸縣界此松脂與天下松脂不同餌茯苓方茯苓十斤去皮酒漬宻封下十五日出之取服如博棊日三亦可屑服方寸匕凡餌茯苓皆湯煮四五沸或以水漬六七日茯苓酥方茯苓五斤灰汁煮十遍漿水煮十遍清水煮十遍松脂五斤煮如茯苓法每次煮四十遍生天門冬五斤去心皮曝乾作末白蜜三斤煎令沫盡蠟牛酥各三斤練三十遍右六味各𢷬篩以銅器重湯上先内酥次蠟次蜜消訖内藥急攪勿住手務令大均内甆器中宻封勿令泄氣先一日不食欲不食先須喫好美食令極飽然後絶食即服二兩二十日後服四兩又二十日後八兩細丸之以咽中下為度第二度以四兩為初二十日後八兩又二十日二兩第三度服以八兩為初二十日二兩二十日四兩合一百八十日藥成自後服三丸將補不服亦得恒以酥蜜消息之美酒服一升為佳合藥須取四時王相日特忌刑殺厭及四激休廢等日大㓙此彭祖法茯苓膏方千金翼名凝靈膏茯苓淨去皮松脂二十四斤松子仁栢子仁各十二斤右四味皆依法錬之松栢仁不錬𢷬篩白蜜二斗四升内銅器中湯上㣲火煎一日一夕次第下藥攪令相得㣲火煎七日七夜上丸如小棗每服七丸日三欲絶榖頓服取飽即得輕身明目不老此方後一本有茯苓酥杏仁酥地黄酥三方然諸本並無又千金翼中已有今更不添録服枸杞根方主飬性遐齡枸杞根切一石水一石二斗煮取六斗澄清煎取三升以小麥一斗乾淨擇内汁中漬一宿曝二徃反令汁盡曝乾𢷬末酒服方寸匕日二一年之中以二月八月各合一劑終身不老枸杞酒方枸杞根一百二十斤切以東流水四石煮一日一夜取清汁一石清麴一如家醖法熟取清貯不津器中内乾地黄末二斤半桂心乾薑澤瀉蜀椒末各一升商陸末二升以絹袋貯内酒底𦂳塞口埋入地三尺堅覆上三七日沭浴整衣冠再拜平曉向甲寅地日出處開之其酒赤如金色旦空腹服半升十日萬病皆愈三十日瘢㾗滅惡疾人以水一升和酒半升分五服愈千金翼又云若欲服石者取河中青白石如棗杏大者二升以水三升煮一沸以此酒半合置中須臾即熟可食餌雲母水方療萬病上白雲母二十斤薄擘以露水八斗作湯分半洮洗雲母如此再過又取二斗作湯内芒硝十斤以雲母木器中漬之二十日出絹袋盛懸屋上勿使見風日令燥以水漬鹿皮為囊揉挻之從旦至日中乃以細絹下篩滓復揉挻令得好粉五斗餘者棄之取粉一斗内崖蜜二斤攪令如粥内生竹筩中薄削之漆固口埋北垣南崖下入地六尺覆土春夏四十日秋冬三十日出之當如澤為成若洞洞不消者更埋三十日出之先取水一合内藥一合攪和盡服之日三水寒温盡自在服十日小便當變黄此先療勞氣風疹也二十日腹中寒澼消三十日齲齒除更新生四十日不畏風寒五十日諸病皆愈顔色日少長生神仙吾自驗之所以述録錬鍾乳粉法鍾乳一斤不問厚薄但取白淨光色好者即任用非此者不堪用先泥鐵鐺可受四五斗者為竈貯水令滿去口三寸内乳著金銀甆㼜中任有用之乃下鐺中令水沒㼜上一寸餘即得當令如此勿使出水也㣲火燒日夜不絶水欲竭即添成煖水每一周時輙易水洗鐺并洮乳七日七夜出之淨洮乾内甆鉢中玉椎縳格少著水研之一日一夜急著水攪令大濁澄取濁汁其乳粗者自然著底作末者即自作濁水出即經宿澄取其粗著底者准前法研之凡五日五夜皆細逐水作粉好用澄錬取曝乾即更於銀鉢中研之一日候入肉水洗不落者佳鍾乳散治虚羸不足六十已上人瘦弱不能食者百病方上黨人參石斛乾薑各三分鍾乳粉成錬者三兩右四味𢷬下篩三味與乳合和相得均分作九貼平旦空腹温淳酒服一貼日午後服一貼黄昏後服一貼三日後准此服之凡服此藥法皆三日一劑三日内止用一升半飯一升肉肉及飯惟爛不得服蔥豉問曰何故三日少食勿得飽也答曰三夜乳在腹中熏補臟腑若此飽食即推藥出腹所以不得飽食也何故不得生食由食生故即損傷藥力藥力既損脂肪亦傷所以不得食生食也何故不得食蔥豉蔥豉殺藥故不得食也三日服藥既盡三日内須作羮食補之任意所便仍不用蔥豉及鞕食也三日補訖還須准式服藥如前盡此一斤乳訖其氣力當自知耳不能具述一得此法其後服十斤二十斤任意方便可知也西嶽眞人靈飛散方雲母粉一斤茯苓八兩鍾乳粉栢子仁人參千金翼作白米續斷桂心各七兩菊花十五兩乾地黄十二兩右九味為末生天門冬十九斤取汁溲藥内銅器中蒸一石二斗黍米下米熟曝乾為末先食飲服方寸匕日一三日力倍五日血脉充盛七日身輕十日面色恱澤十五日行及奔馬三十日夜視有光七十日白髮盡落故齒皆去更取二十一匕白蜜和𢷬二百杵丸如桐子大作八十一枚曝乾丸皆映徹如水精珠欲令髪齒復生者吞七枚日三服即出髪未白齒不落者但服盡三百年乃白如前法服已白者餌藥至七百年乃落入山日吞七丸絶榖不饑余得此方已來将踰三紀頃面色美而恱之疑而未敢措手積年詢訪屢有好名人曽餌得力遂服之一如方說但能業之不已功不徒棄耳備急千金要方卷八十二
