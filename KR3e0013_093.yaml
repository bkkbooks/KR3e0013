body:
  text: 備急千金要方卷九十三唐孫思邈撰宋林億等校正針灸熱病第十三熱病魚際陽谷主熱病振栗鼓頷腹滿隂痿色不變經渠陽池合谷支溝前谷內庭後溪腕骨陽谷厲兊衝陽解溪主熱病汗不出孔最主臂厥熱痛汗不出皆灸刺之此穴可以出汗列缺曲池主熱病煩心心悶先手臂身熱瘈瘲脣口聚鼻張目下汗出如珠甲乙云兩乳下二寸堅脅下滿悸中衝勞宫大陵間使關衝少衝陽溪天窖主熱病煩心心悶而汗不出掌中熱心痛身熱如火浸淫煩滿舌本痛又云間使主熱病煩心喜噦胸中淡淡喜動而熱勞宫主熱病三日已往不得汗怵愓甲乙云主熱病煩滿而欲嘔噦三日已往不得汗怵愓胸脅不可反側咳滿溺赤小便血衄不止嘔吐血氣逆噫不止嗌中痛食不下喜渴舌中爛掌中熱欲嘔三間主氣熱身熱喘甲乙云寒熱口乾身熱喘息目急痛善驚曲澤主傷寒溫病身熱煩心口乾甲乙云心淡然善驚身熱煩心口乾手清逆氣嘔唾肘瘈善搖頭頸清汗出不過眉傷寒溫病曲澤主之曲池主傷寒餘熱不盡掖門中渚通理主熱病先不樂頭痛面熱無汗又云通理主熱病先不樂數日承漿主汗出衄血不止溫留主傷寒寒熱頭痛噦衄肩不舉上管曲差上星陶道天柱上窖懸釐風池命門膀胱輸主煩滿汗不出飛揚主下部寒熱汗不出體重五處攢竹正營上管缺盆中府主汗出寒熱巨闕主煩心喜嘔甲乙云心腹脹噫煩熱善嘔膈中不通利百會主汗出而嘔痓商丘主寒熱好嘔懸顱主熱病頭痛身熱少澤主振寒小指不用頭痛玉枕大杼肝輸心輸膈輸陶道主汗不出悽厥惡寒大椎主傷寒熱盛煩嘔懸釐鳩尾主熱病偏頭痛引目外眥膈輸中府主寒熱皮肉骨痛少氣不得卧支病又云膈輸主嗜卧怠惰不欲動搖身當濕不能食列缺主寒熱掌中熱神道關元主身熱頭痛進退往來曲泉主身熱頭痛汗不出三膲輸主頭痛食不下魚際主頭痛不甚汗出天井主振寒頸項痛腎輸主頭身熱赤振栗腰中四肢淫濼欲嘔肩井關衝主寒熱悽索氣上不得卧尺澤主氣隔喜嘔鼓頷不得汗煩心身痛肩貞主寒熱項厯適甲乙云耳鳴無聞引缺盆肩中熱痛麻小不舉委中主熱病俠脊痛衝陽主振寒而欠大都主熱病汗出且厥足清外臺云汗不出厥手足清太白主熱病先頭重顔痛煩悶心身熱熱爭則腰痛不可以俯仰又熱病滿悶不得卧身重骨痛不相知支正少海主熱病先腰脛酸喜渴數飲食身熱項痛而強振寒寒熱甲乙云主振寒寒熱頸項腫實則肘攣頭眩痛虛則生疣小者痂疥後溪主身熱惡寒光明主腹足清寒熱汗不出復留主寒熱無所安汗出不止風逆四肢腫凡熱病煩心足寒清多汗先取然谷後取大溪大指間動脈皆先補之熱病先腰脛酸喜渴數飲身清清則項痛而寒且酸足熱不欲言頭痛顛顛然先取涌泉及太陽井滎熱中少氣厥寒灸之熱去灸涌泉三壯煩心不嗜食灸涌泉熱去四逆喘氣偏風身汗出而清皆取俠溪凡熱病刺陷谷足先寒寒上至膝乃出針身痺先淅振寒季脅支滿痛凡溫病身熱五日已上汗不出刺大泉留針一時取針若未滿五日者禁不可刺凡好太息不嗜食多寒熱汗出病至則喜嘔嘔已乃衰即取公孫及井輸實則腸中切痛厥頭面腫起煩心狂多飲不嗜卧虛則鼓脹腹中氣大滿熱痛不嗜食霍亂公孫主之黃疸然谷主黃疸一足寒一足熱喜渴甲乙云舌縱煩滿章門主傷飽身黃太衝主黃疸熱中喜渴中封五里主身黃時有微熱甲乙云不嗜食膝內廉內踝前痛少氣身體重脊中主黃疸腹滿不能食中管大陵主目黃振寒勞宫主黃疸目黃大溪主黃疸甲乙云消疸善喘氣走喉咽而不能言手足清大便難嗌中腫痛唾血口中熱唾如膠脾輸胃管主黃疸又云脾輸主黃疸喜欠不下食脅下滿欲吐身重不能動霍亂巨闕關衝支溝公孫隂陵泉主霍亂期門主霍亂泄注魚際主胃逆霍亂太隂大都金門僕參主厥逆霍亂太白主霍亂逆氣解溪主膝重腳轉筋濕痺三里主霍亂遺屎失氣承筋主瘈瘲腳酸甲乙云霍亂脛不仁大泉主眼青轉筋乍寒乍熱缺盆中相引痛金門僕參承山承筋主轉筋霍亂丘墟主腳急腫痛戰掉不能久立附筋足攣竅隂主四肢轉筋委中委陽主筋急身熱人迎主凡霍亂頭痛胸滿呼吸喘鳴窮窘不得息凡霍亂泄出不自知先取大溪後取太倉之原瘧病列缺後溪少澤前谷主瘧寒熱又云列缺主瘧甚熱陽谷主瘧脅痛不得息太鍾主多寒少熱太溪主熱多寒少甲乙云瘧悶嘔甚熱多寒少欲閉户而處寒厥足熱丘墟主瘧振寒甲乙云腋下腫中封主色蒼蒼然大息振寒崑崙主瘧多汗甲乙云腰痛不能俯仰目如脫項如拔臨泣主瘧日西發然谷主溫瘧汗出天府主瘧病天樞主瘧振寒熱盛狂言少海主瘧背振寒甲乙云項痛引肘掖腰痛引小腹中四肢不舉少商主振栗鼓頷陽溪主瘧甚苦寒咳嘔沫商丘神庭上星百會完骨風池神道掖門前谷光明至隂大杼主痎瘧熱又云商丘主寒瘧腹中痛隂都少海商陽三間中渚主身熱瘧病太泉太溪經渠主瘧咳逆心悶不得卧寒熱太陵腕骨陽谷少衝主瘧乍寒乍熱合谷陽池俠溪京骨主瘧寒熱偏厯主風瘧汗不出譩嘻支正少海主風瘧天井主瘧食時發心痛悲傷不樂三里陷谷俠溪飛揚主痎瘧少氣又云俠溪主瘧足痛飛揚主狂瘧頭眩痛痓反折溫留主瘧面赤腫少澤復留崑崙主瘧寒汗不出厲兊內庭主瘧不嗜食惡寒衝陽束骨主瘧從腳胻起又云衝陽主瘧先寒洗淅甚久而熱熱去汗出癭瘤第十四癭瘤天府臑會氣舍主癭瘤氣咽腫甲乙天府作天窗腦戶通天消濼天突主頸有大氣通天主癭灸五十壯胸堂羊屎灸一百壯痔瘻飛揚主痔篡傷痛絶骨主瘻馬刀掖腫大突章門天池支溝主漏又云支溝章門主馬刀腫瘻商丘復留主痔血泄後重又云商丘主痔骨蝕喜魘夢大迎五里臂臑主寒熱頸瘰􅐇天突天窗主漏頸痛勞宫主熱痔會隂主痔與隂相通者死俠溪陽輔大衝主掖下腫馬刀瘻承筋承扶委中陽谷主痔痛腋下腫竅隂主癰疽頭痛如錐刺不可以動動則煩心大陵支溝陽谷後溪主痂疥㿗疝曲泉主㿗疝隂跳痛引臍中不尿隂痿一云痛引莖中不得尿中都主㿗疝崩中中管主衝疝冒死不知人合陽中郤主㿗疝崩中腹上下痛腸澼隂暴敗痛照海主四肢淫濼身悶隂恭起疝大溪主胞中有大疝瘕積聚與隂相引商丘主隂肢內痛氣癰狐疝走上下引小腹痛不可以俯仰關元主㿗疝又云主暴疝痛巨闕主狐疝肩井傍肩解與臂相接處主偏㿗臍中石門天樞氣海主小腹疝氣遊行五藏臍衝胸不得息甲乙云臍疝繞臍痛衝胸不得息灸臍中臍疝繞臍痛石門主之臍疝繞臍痛時止天樞主之四滿主臍下疝積甲乙云胞中有血大敦主卒疝暴痛隂跳上入腹寒疝隂挺出偏大腫臍腹中悒悒不樂小便難而痛灸刺之立已左取右右取左甲乙云照海主之大隂郤衝門主疝痔隂疝天樞主氣疝嘔大巨主㿗疝偏枯交信主氣癃㿗疝隂急股樞膊內廉痛中封主㿗疝癃暴痛痿厥身體不仁氣衝主㿗隂腫痛隂痿莖中痛兩丸騫痛不可仰卧少府主隂痛實時挺長寒熱隂暴痛遺尿偏虛則暴癢氣逆卒疝小便不利大赫然谷主精溢隂上縮隂市主寒疝下至腹腠膝腰痛如清水小一作大腹諸痛按之下至膝上伏兔中寒疝痛腹脹滿痿少氣大衝中封地機主㿗疝精不足又云大衝主狐疝嘔厥隂病中極主失精魚際主隂濕腹中餘疾五樞主隂疝兩丸上下小腹痛隂交石門主兩丸騫又云石門主腹滿疝積大衝主兩丸騫縮腹堅不得卧甲乙云環臍痛隂騫兩丸縮腹堅痛不得卧會隂主隂頭寒行間主莖中痛隂谷主隂痿不用小腹急引隂內廉痛雜病第十五論膏肓輸無所不治主羸瘦虛損夢中失精上氣咳逆狂惑忘誤取穴法令人正坐曲脊伸兩手以臂著膝前令正直手大指與膝頭齊以物支肘勿令臂得動搖從胛骨上角摸索至胛骨下頭其間當有四肋三間灸中間依胛骨之裏肋間空去胛骨容側指許摩􅡗肉之表肋間空處按之自覺牽引胸戶中灸兩胛中各一處至六百壯多至千壯當覺氣下礱礱然如流水狀亦當有所下出若無停痰宿疾則無所下也若病人已困不能正坐當令側卧挽上臂令前求取穴灸之也求穴大較以右手從右肩上拄指頭表所不及者是也左手亦然乃以前法灸之若不能久正坐當伸兩臂者亦可伏衣襆上伸兩臂令人挽兩胛骨使相離不爾胛骨覆穴不可得也所伏衣襆當令大小常定不爾則失其穴也此灸訖後令人陽氣康盛當消息以自補養取身體平復其穴近第五椎相凖望取之論曰昔秦緩不灸晉侯之疾以其在膏之上肓之下針藥所不及即此穴是也時人拙不能求得此穴所以宿痾難遣若能用心方便求得灸之無疾不愈矣三里主腹中寒脹滿腸鳴腹痛胸腹中瘀血小腹脹皮腫隂氣不足小腹堅熱病汗不出喜嘔口苦壯熱身反折口噤鼓頷腰痛不可以顧顧而有所見喜悲上下求之口僻乳腫喉痺不能言胃氣不足久泄利食不化脅下柱滿不能久立膝痿寒熱中消穀苦飢腹熱身煩狂言乳癰喜噫惡聞食臭狂歌妄笑恐怒大罵霍亂遺尿失氣陽厥悽悽惡寒頭眩小便不利喜噦凡此等疾皆灸刺之多至五百壯少至二三百壯涌泉主喜喘喉痺身熱痛脊脅相引忽忽喜忘隂痺腹脹腰痛大便難肩背頸項痛時眩男子如蠱女子如阻身體腰脊如解不欲食喘逆足下清至膝咽中痛不可內食瘖不能言小便不利小腹痛風入腸中癲疾俠臍痛急胸脅柱滿痛衄不止五疝指端盡痛足不踐地凡此諸疾皆主之婦人病第十六小腹堅痛月水不通刺帶脈入六分灸五壯在手肘端一寸八分端一作下漏下若血閉不通逆氣脹刺血海入五分灸五壯在膝臏上內廉白肉際二寸中漏血小腹脹滿如阻體寒熱腹偏腫刺隂谷入四分灸三壯在膝內輔骨後大筋之下小筋之上屋膝乃得之甲乙云漏血小便黃臨谷主之女子疝瘕按之如以湯沃兩股中小腹腫隂挺出痛經水來下隂中腫或癢漉青汁如葵羮血閉無子不嗜食刺曲泉在膝內輔骨下大筋上小筋下陷中屈膝乃得之刺入六分灸三壯疝瘕按之如以湯沃股內至膝飱泄隂中痛小腹痛堅急重下濕不嗜食刺隂陵泉入二分灸三壯在膝下內側輔骨下陷中伸足乃得之經逆四肢淫濼隂暴跳疝小腹偏痛刺隂蹻入三分灸三壯在內踝下容爪中即照海穴也小腹大字難嗌乾嗜飲俠臍疝刺中封入四分灸三壯在踝前一寸半伸足取之女子不字隂暴出經漏刺然谷入三分灸三壯在足內踝前起大骨下陷中字難若胞衣不出泄風從頭至足刺崑崙入五分灸三壯在足外踝後跟骨上月事不利見赤白而有身反敗隂寒刺行間入六分灸三壯在足大趾間動應手月閉溺赤脊強互引反折汗不出刺腰輸入二寸留七呼灸三壯在第二十一椎節下間絶子瘧寒熱隂挺出不禁白瀝痓脊反折刺上窖入三寸留七呼灸三壯在第一空腰髁下一寸俠脊赤白瀝心下積脹腰痛不可俯仰刺次窖入三寸留七呼灸三壯在第二空俠脊陷中赤淫時白氣癃月事少刺中窖入二寸留七呼灸三壯在第三空俠脊陷中下蒼汁不禁赤􅅹隂中癢痛引小腹控䏚不可以俯仰刺腰尻交者兩胂上以月生死為痏數發刺立已一云下窖腸鳴泄注刺下窖入二寸留七呼灸三壯在第四空俠脊陷中赤白裏急瘈瘲刺五樞入一寸灸五壯在帶脈下三寸拘攣腹滿疝月水不下乳餘疾絶子隂癢賁豚上䐜腹堅痛下引隂中不得小便刺隂交入八分灸五壯在臍下一寸腹滿疝積乳餘疾絶子隂癢賁豚上䐜小腹堅痛下引隂中不得小便刺石門入五分在臍下二寸忌灸絶孕絶子衃血在內不在胞轉不得尿小腹滿石水痛刺關元入二寸灸七壯在臍下三寸又主引肋下脹頭痛身背熱賁豚寒小便數泄不止子門不端小腹苦寒隂癢及痛賁豚搶心飢不能食腹脹經閉不通小便不利乳餘疾絶子內不足刺中極入二寸留十呼灸三壯在臍下四寸赤白沃隂中乾痛惡合隂陽小腹䐜堅小便閉刺屈骨入一寸半灸三壯在中極下一寸月水不通奔泄氣上下引腰脊痛刺氣穴入一寸灸五壯在四滿下一寸胞中痛惡血月水不以時休止腹脹腸鳴氣上衝胸刺天樞入五分灸三壯去肓輸一寸半小腹脹滿痛引隂中月水至則腰背痛胞中瘕子門空大小便不通刺水道入二寸半灸五壯在大巨下三寸月水不利或暴閉塞腹脹滿癃淫濼身熱乳難子上搶心若胞不出衆氣盡亂腹中絞痛不得反息正仰卧屈一膝伸一膝並氣衝針上入三寸氣至瀉之在歸來下一寸動脈應手産餘疾食飲不下賁豚上下傷食腹滿刺期門入四分灸五壯在第二肋端乳癰驚痺脛重足跗不收跟痛刺下廉入三分灸三壯在上廉下三寸月水不利見血而有身則敗乳腫刺臨泣入二分灸三壯在足小趾次趾間去俠溪一寸半女子疝及小腹腫溏泄癃遺尿隂痛面塵黑目下眥痛漏血刺大衝入三分灸三壯在足大趾本節後二寸中動脈女子疝赤白淫下時多時少暴腹痛刺蠡溝入三分灸三壯在內踝上五寸女子無子咳而短氣刺涌泉入三分灸三壯在足心陷者中乳難子上衝心隂疝刺衝門入七分灸五壯在府舍下上去大橫五寸女子不下月水痺驚善悲不樂如墮墜汗不出刺照海入四分灸二壯在內踝下四分又主女子淋隂挺出四肢淫濼血不通刺會隂入二寸留七呼灸三壯在大便前小便後子藏中有惡血內逆滿痛刺石關入一寸灸五壯在隂都下一寸肓門主乳餘疾三里主乳癰有熱神封膺窗主乳癰寒熱短氣卧不安乳根主膺腫乳癰悽索寒熱痛不可按大溪俠溪主乳腫癰潰又云俠溪主小腹堅痛月水不通大泉主妬乳膺胸痛大赫主女子赤沃四滿主子藏中有惡血內逆滿痛疝又云主胞中有血中極主拘攣腹疝月水不下乳餘疾絶子隂癢氣衝主無子小腹痛支溝主女人脊急目築賔主大疝絶子隂廉主絶産若未曽産涌泉隂谷主男子如蠱女子如阻身體腰脊如解不欲食水原照海主不字隂暴出淋漏月水不來而多悶心下痛又云照海主隂挺下血隂中腫或癢漉清汁若葵汁小兒病第十七本神前頂囟會天樞主小兒驚癎臨泣主小兒驚癎反視顱息主小兒癎喘不得息然谷主小兒臍風口不開善驚瘈脈長強主小兒驚癎瘈瘲嘔吐泄注驚恐失精瞻視不明眵懸鍾主小兒腹滿不能食飲譩嘻主小兒食晦頭痛備急千金要方卷九十三
