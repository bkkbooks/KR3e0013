body:
  text: 備急千金要方後序明天子剖符析胙分任將吏而課最之詎徒寵秩華膴為尊顯計唯是體天心好生寄諸百執事百執事奉德意而遐邇布之舉夭札疵癘期以喣噢而置之春臺夀域也矧含靈生命忍坐視為顧救病需醫醫需方醫之有方猶般輸之規矩逢門之彀率而孫吳之韜鈐也上溯軒岐下逮諸名家留此竒方以活衆庶惡可以紙上塵蹟而土苴之人命之重奚翅千金卒然疾作忙覓盧扁噬臍何及間有善信好施藥劑然焉得人人而濟故昔人云施人以藥不若施人以方蓋方所濟者逺而遍也吾越起侯先生自登籍後奉璽書宦轍周歷西北乃夙心嗜醫見人有疾如切己身以為丈夫貴拯危度厄儒胡不可兼醫乎故雅慕孫真人千金一書嘆未廣其傳兹司馬榆關公暇偶翻道藏得之遂囅然喜而持示一時同事諸公咸勃發好生心願付剞劂各捐金有差先生獨肩其事夫自古醫擅名秦越獨越之貴醫如貴儒乃秦不免變而信巫史祈禳病者疑醫并疑其方非方之可疑以不善用方者之過也此方初奏之李唐再校於趙宋流傳至今嫌於殘蠧不無帝虎訛先生恐以濟人者害人也用是更求善本殫精校讐冥棲方外務在傳信即最纎瑣如稱尺升斗之制熬煉炮灸之法銖銖寸寸靡不裁定惟於疑者則缺之畢寒暑寢食以狥要期不負夙心以不負天子命官德意以拯人危篤便人倉卒普天之下可家喻戶曉矣詎獨利秦乎哉先生家會稽青家句甬僅一曹江之隔幸為同鄉後輩先生與吾家宫端以文學相知因而㑹譜青又叨為同系子行兹者待罪和門又為屬下小吏遂命青再加訂正初青備員保御已留心是書因不敢辭然自愧不免金根之誤耳按是書百病俱已臚列而獨缺痘科者蓋以痘疹起於後世真人不能逆料故也先生又刻經驗痘書痘疹一斑等帙用以補是書之未備庶幾為醫方大全矣工竣敢綴數語而并及之以彰先生好生之心懇切而周摯云萬厯四十六年七月吉總理提調延綏各大營練兵千總前太醫院吏目屬下陳青頓首謹書
