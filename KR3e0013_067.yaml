body:
  text: 備急千金要方卷六十七唐孫思邈撰宋林億等校正丁腫方發背第三論方論曰凡發背皆因服食五石寒食更生散所致亦有單服鍾乳而發者又有生平不服而自發者此是上代有服之者其候多卒於背兩胛間起初如粟米大或痛或癢仍作赤色人皆初不以為事日漸長大不過十日遂至於死其臨困之時已濶三寸高一寸瘡有數十孔以手按之諸孔中皆膿出尋時失音所以養生者小覺背上癢痛有異即火急取淨土水和如泥捻作餅子厚二分濶一寸半以粗艾大作炷灸泥餅上帖著瘡上灸之一炷一易餅子若粟米大時可灸七餅子即瘥如榆莢大灸七七餅炷即瘥如錢大可日夜灸之不限炷數仍服五香連翹湯及鐵漿諸藥攻之乃愈又法諸發背未作大膿可以冷水射之浸石令冷熨之日夜莫住瘥乃止此病忌麫酒五辛等亦有當兩肩上發者凡服石人皆須勞役四體無令自安如其不爾者多有發動亦不得逐便恣意取暖稱己適情必須遺欲以取寒凍雖當時不寧於後在身多有所益終無發動之慮耳凡腫起背胂間頭白如黍粟四邉相連腫赤黑令人悶亂即名發背也禁房室酒肉蒜麫若不灸治即入内殺人若灸當瘡上七八百壯有人不識多作雜腫治者皆死治發背及癰腫已潰未潰方右用香豉三升少與水和熟𢷬成强泥依腫作餅子厚三分已上有孔勿覆孔上布豉餅以艾列其上灸之使温温而熱勿令破肉如熱痛即急易之患當減快得安穩一日二度灸之如先有瘡孔孔中得汁出即瘥治癰疽發背已潰未潰及諸毒腫方栝蔞根榆白皮胡燕窠鼠坌土右四味各等分為末以女人月經衣水洗取汁和如泥封腫上乾即易潰者四面封之已覺即封從一日至五日令瘥治發背背上初欲結腫方大黃升麻黄芩甘草各三兩梔子三七枚右五味㕮咀以水九升煮取三升分三服取快利便止不利更進内補散治癰疽發背已潰排膿生肉方當歸桂心各二兩人參芎藭厚朴防風甘草白芷桔梗各一兩右九味治下篩酒服方寸匕日三夜二未瘥更服勿絶外臺無防風甘草白芷又方治癰疽發背方蜀椒乾薑黄芩人參各二分桂心一分小豆一合半白歛甘草附子防風各一兩芎藭二兩右十一味治下篩酒服方寸匕日三夜二李根皮散治癰疽發背及小小瘰癧方李根皮一升栝蔞根半夏各五兩通草白歛桔梗厚朴黃芩附子各一兩甘草當歸各二兩葛根三兩桂心芍藥各四兩芎藭六兩右十五味治下篩酒服方寸匕日三瘡大困者夜再服之曾有人患骨從瘡中出兼有三十餘癰癤服此散瘥大内塞排膿散治發背癰腫經年瘥後復發此因大風或結氣在内經脉閉塞至夏月已來出攻於背久不治積聚作膿血為瘡内漏方山茱萸五味子茯苓乾薑各六兩甘草石斛人參桂心芍藥各五分巴㦸天麥門冬乾地黄蓯蓉逺志各八分當歸石韋芎藭各四分附子二分地膽菟絲子各三分右二十味治下篩酒服方寸匕日三夜一稍加之長服終身不患癰癤治發背方右用亂髮灰酒服方寸匕亦治瘭疽又方猪脂𫝊上日四五度亦治發乳救急方云取猪羊脂切作片冷水浸帖上暖易之五六十片瘥若初帖少許即寒寒定好眠甚妙又方三年醋滓微火煎令稠和牛脂𫝊上又方猪狗牙燒灰醋和𫝊上日三四易又方燒古蚌灰雞子白和𫝊之日三易又方飲鐵漿二升取利又方蛇頭灰醋和𫝊之日三易又方燒鹿角灰醋和𫝊之日四五易丹毒第四論方論曰丹毒一名天火肉中忽有赤如丹塗之色大者如手掌甚者徧身有癢有腫無定色有白丹者肉中腫起癢而復痛微虚腫如吹狀隱軫起也有雞冠丹者赤色而起大者如連錢小者如麻豆粒狀肉上粟粟如雞冠肌理也一名茱茰丹有水丹者由徧體熱起遇水濕搏之結丹晃晃黄赤色如有水在皮中喜著股及隂處此雖小疾不治令人至死治之皆用升麻膏方升麻白薇肘後作白歛漏蘆連翹芒硝黃芩各二兩蛇㘅枳實各三兩蒴藋四兩梔子四十枚右十味微𢷬碎以水三升浸半日以猪膏五升煎令水氣盡去滓膏成𫝊上諸丹皆用之及熱瘡腫上日三經心錄無枳實以治諸毒腫升麻湯治丹毒方升麻漏蘆芒硝各二兩黃芩三兩蒴藋五兩梔子二十枚右六味㕮咀以水一斗浸良久煮取七升冷以故帛染汁搨諸丹毒上常令濕搨後須服飲子并漏蘆湯方並見前癰腫條中服之立瘥小品用治丹軫諸毒腫單方水苔生蛇銜生地黃生菘菜蒴藋葉慎火草五葉藤豆葉浮萍已上取一味單𢷬塗之大黄梔子黄芩芒硝已上取一味下水和用右十三味或𢷬成末單用一味立瘥又方凡天下極冷無過藻菜最冷但有患熱毒腫并丹等取渠中藻菜細切熟𢷬𫝊之厚三分乾即易治諸丹神驗方右以芸薹菜熟𢷬厚封之隨手即消如餘熱氣未愈但三日内封之使醒醒好瘥止縱乾亦封之勿歇以絶本余以正觀七年三月八日於内江縣飲多至夜睡中覺四體骨肉疼痛比至曉頭痛目眩額左角上如彈丸大腫痛不得手近至午時至於右角至夜諸處皆到其眼遂閉合不得開㡬至殞斃縣令周公以種種藥治不瘥經七日余自處此方其驗如神故疏之以𫝊來世云耳治五色油丹方俗名油腫若犯者多致死不可輕之右縛母猪枕頭卧甚良又方牛屎塗之乾即易治赤流腫丹毒方右取榆根白皮為末雞子白和𫝊之千金翼又用雞子白和蒲蓆衣𫝊又方𢷬大麻子水和𫝊之又方以煎羊脂摩之得青羊脂最良集驗方云治人面目身體卒赤黒丹起如疥狀不治日劇徧身即殺人治小兒丹毒方右𢷬馬齒莧一握取汁飲之以滓𫝊其上又方𢷬赤小豆五合水和取汁飲一合良以滓塗五心又方濃煮大豆汁塗之良瘥後亦無瘢㾗又方臘月猪脂和釡下土𫝊之乾即易治小兒五色丹方右用猪槽下爛泥𫝊之乾則易集驗方治卒赤黒丹又方𢷬蒴藋葉𫝊之又方服黃龍湯二合并𫝊患上佳治小兒白丹方右用燒猪屎灰雞子白和𫝊之良治小兒赤丹方右𢷬芸薹葉汁服三合滓𫝊上良千金翼云芸薹末以雞子白和塗之治小兒赤丹斑駁者方右以唾和胡粉從外向内𫝊之又方鍜鐵屎以猪脂和𫝊之又方屋塵以臘月猪脂和𫝊之治小兒火丹赤如朱走皮中方右以醋和豉研𫝊之又方鯉魚血𫝊之良又方𢷬荏子𫝊之良又方猪屎水和絞取汁服少許良治小兒天火毒肉中有赤如丹色大者如手甚者徧身或痛或癢或腫方右用赤小豆二升為末雞子白和如薄泥𫝊之乾則易便瘥一切丹並用此方皆瘥又方生麻油塗之治小兒骨火丹其瘡見骨方右𢷬大小蒜厚封之著足踝者是治小兒殃火丹毒著兩脅及腋下者方右用伏龍肝為末油和𫝊之乾則易若入腹及隂以慎火草取汁服之治小兒尿竈丹初從兩股起及臍間走入隂頭皆赤色者方右切桑白皮二升以水二升煮取汁浴之良又方燒李根為灰以田中流水和𫝊之良治小兒朱田火丹病一日一夜即成瘡先從背起漸至徧身如棗大正赤色者方右用濃煮棘根汁洗之已成瘡者赤小豆末𫝊之未成瘡者雞子白和小豆末以𫝊凡方中用雞子者皆取先破者用之完者無力治小兒天竈火丹痛從髀間起小兒未滿百日犯行路竈君若熱流下令隂頭赤腫血出方右用伏龍肝𢷬末雞子白和𫝊之日三良又方鯽魚肉剉五合赤小豆末三合右二味和𢷬少水和𫝊之良治小兒野火丹病徧身皆赤者方右用油塗之治小兒茱茰丹病初從背起徧身如細纈一宿成瘡者方右用赤小豆為末以粉之如未成瘡者雞子白和以𫝊之治小兒癈竈火丹初從足趺起正赤色者方右以棗根煮汁沐浴五六度隱軫第五論法方灸論曰素問云風邪客於肌中則肌虚真氣發散又被寒搏皮膚外發腠理開毫毛淫氣妄行之則為癢也所以有風軫搔癢皆由於此又有赤軫者忽起如蚊蚋啄煩癢極者重沓壟起搔之逐手起又有白軫者亦如此赤軫熱時即發冷即止白軫天隂冷即發白軫宜煮礬石汁拭之或煮蒴藋和少酒以浴之良姚氏以治赤軫或煮石南汁拭之良或水煮雞屎汁或煮枳實汁拭之良餘一切如治丹方法俗呼為風屎亦名風尸石南湯治六十四種風淫液走人皮中如蟲行腰脊强直五緩六急手足拘攣隱軫搔之作瘡風尸身癢卒面目腫起手不得上頭口噤不能言方此方但是隱軫宜服之瘥方見前風懿篇治風瘙隱軫心迷悶亂方天雄牛膝桂心知母各四分栝蔞根白术各五分防風六分人參二分乾薑細辛各三分右十味治下篩酒服半錢匕加至一匕為度又方巴豆二兩以酒七升煮取三升故帛染汁拭之大人小兒以意加減又方礬石二兩為末酒三升漬令消帛染拭病上又方吳茱茰一升酒五升煮取一升半帛染拭病上治搔癢皮中風虚方枳實三升松葉切一升獨活蓯蓉黄耆秦芁各四兩丹參蒴藋各五兩右八味㕮咀以酒二斗浸六宿毎服二合日二稍加之治風瘙隱軫方白术三兩戎鹽礬石各半兩黄連黃芩細辛芎藭茵芋各一兩右八味㕮咀以水一斗煮取三升洗之日三良又方馬藺子蒴藋礬石茺蔚子蒺藜子茵芋羊桃萹竹各二兩右八味㕮咀以漿水二斗煮取一斗二升内礬石洗之日三又方蒴藋防風羊桃石南茵芋芫花蒺藜礬石各一兩右八味㕮咀以漿水一斗煮取五升去滓内礬石令小沸温浴之又方蛇牀子二升防風二兩生蒺藜二兩右三味㕮咀以水一斗煮取五升拭病上日三五遍又方酪和鹽熟煮摩之隨手即消良又方石灰淋取汁洗之良又方白芷根葉煮汁洗之又方大豆三升酒六升煮四五沸毎服一盞日三又方牛膝為末酒下方寸匕日三并治骨疽癩病又方芥子末漿服方寸匕日三又方白术末酒服方寸匕日三治隱軫癢痛方大黄升麻黄蘗當歸防風芍藥黃芩青木香甘草各二兩楓香五兩芒硝一兩地黄汁一升右十二味㕮咀以水一斗煮取三升半去滓下芒硝令消帛染搨病上一炊久日四五度治舉體癢痛如蟲囓癢而搔之皮便脱落作瘡方蒺藜子三升蛇牀子茺蔚子各二升防風五兩大㦸一斤大黃二兩礬石三兩右七味㕮咀酒四升水七升煮取四升去滓内礬石以帛染拭之又方灸曲池二穴小兒隨年壯發即灸之神良治風瘙腫瘡癢在頭面搨洗方大黄芒硝各四分莽草二分一作甘草三兩黃連六分黄芩八分蒺藜子五合右六味㕮咀以水七升煮取三升去滓下硝以帛染搨洗日一度勿近目治身體赤隱軫而癢搔之隨手腫起方莽草二分當歸芎藭大㦸細辛芍藥芫花蜀椒附子躑躅各四分猪膏二升半右取十味㕮咀以酒漬一宿猪膏煎之候附子色黄膏成去滓以𫝊病上日三青羊脂膏治風熱赤軫搔之逐手作瘡方青羊脂四兩甘草芍藥各三兩寒水石白芷白芨黃芩防風黄耆升麻各四分竹葉切石膏各一升右十二味㕮咀先以水八升煮石膏竹葉取四升去滓浸諸藥以不中水猪脂二升合煎膏成𫝊病上良治隱軫百療不瘥者方右用景天一斤一名慎火草細𢷬取汁𫝊上熱灸手摩之再三度瘥又方芒硝八兩水一斗煮取四升適寒温綿染拭之又方黄連切芒硝各五兩右二味以水六升煮取半去滓洗之日四五度治暴氣在表攻皮上隱軫作瘡方右煮槐枝葉洗之治小兒患隱軫入腹體腫强而舌乾方右用蕪菁子為末酒服方寸匕日三又方蠶沙二升水二升煮去滓洗之良又方車前子為末粉之良又方鹽湯洗了以蓼子挼𫝊之備急千金要方卷六十七
