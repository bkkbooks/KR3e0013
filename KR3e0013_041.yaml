body:
  text: 備急千金要方卷四十一唐孫思邈撰宋林億等校正心臟方脈極第四論法方灸論曰凡脈極者主心也心應脈脈與心合心有病從脈起又曰以夏遇病為脈痺脈痺不已復感於邪內舍於心則飲食不為肌膚咳脫血色白不澤其脈空虛口脣見赤色凡脈氣衰血焦髮墮以夏丙丁日得之於傷風損脈為心風心風之狀多汗惡風若脈氣實則熱熱則傷心使人好怒口為色赤甚則言語不快血脫色乾燥不澤飲食不為肌膚若脈氣虛則寒寒則咳咳則心痛喉中介介如哽甚則咽腫喉痺故曰心風虛實候也若陽經脈病治隂胳隂胳脈病治陽經定其血氣各守其鄉脈實宜瀉氣虛宜補善治病者定其虛實治之取瘥病在皮毛肌膚筋脈則全治之若至六腑五臟則半死矣扁鵲云脈絶不治三日死何以知之脈氣空虛則顔焦髮落脈應手少隂手少隂氣絶則脈不通血先死矣生地黃煎治脈熱極則血氣脫色白乾燥不澤飲食不為肌膚消熱止極強胃氣方生地黃汁生麥門冬赤蜜各一升蓴心一升一作䜴逺志二升甘草二兩人參茯苓乾地黃芍藥白术各三兩石膏六兩生萎蕤四兩右十三味十一味㕮咀以水一斗二升煮取二升七合去滓下地黃汁及蜜更煎三升五合分四服灸法胸中痛引腰背心下嘔逆面無滋潤灸上門隨年壯穴在俠巨闕兩邉相去各半寸一云一寸顔色焦枯勞氣失精肩臂痛不得上頭灸肩髃百壯穴在肩外頭近後以手按之有解宛宛中脈虛實第五論灸方針法論曰凡脈虛者好驚跳不定脈實者洪滿凡脈虛實之應主於心小腸若其腑臟有病從熱生則應臟寒則應腑也防風圓補虛調中治脈虛驚跳不定乍來乍去主小腸腑寒方防風桂心通草茯神逺志麥門冬甘草人參白石英各三兩右九味為末白蜜和丸如梧子大酒服三十丸日再加至四十丸升麻湯治脈實洪滿主心熱病方升麻子芩澤瀉梔子仁淡竹葉芒硝各三兩生地黃切一升右七味㕮咀以水九升煮取三升去滓下芒硝分三服麻黃湯調心泄熱治心脈厥大寸口小腸熱齒齲嗌痛方麻黃生薑各四兩細辛子芩茯苓芍藥各三兩白术二兩桂心一兩生地黃切一升右九味㕮咀以水九升煮取三升去滓分三服須利加芒硝三兩甚善針灸法脈不出針不容穴在幽門兩傍各一寸五分是也心悶痛上氣牽引小腸灸巨闕二七壯心腹痛第六論法方蒸尉法灸論曰寒氣卒客於五臟六腑則發卒心痛胸痺感於寒微者為咳甚者為痛為泄厥心痛與背相引善瘈如物從後觸其心身傴僂者腎心痛也厥心痛腹脹滿心痛甚者胃心痛也厥心痛如以針錐刺其心心痛甚脾心痛也厥心痛色蒼蒼如死灰狀終日不得太息者肝心痛也厥心痛卧若徒居心間痛動作痛益甚色不變者肺心痛也真心痛手足青至節心痛甚旦發夕死夕發旦死蛔心痛心腹中痛發作腫聚往來上下行痛有休止腹中熱善涎出是蛔咬也以手按而堅持之勿令得移以大針刺之復久持之蟲不動乃出心下針不可刺中有成聚不可取於輸腸中有蟲蛔咬皆不可取以小針治寒熱氣卒客於五臟六腑中則發心痛方大黃芍藥柴胡各四兩升麻黃芩桔梗朱砂各三兩鬼箭羽鬼臼桂心朴硝各二兩右十一味㕮咀以水九升煮取二升七合分三服先分朱砂作三分每服內一分攪止宜服後方赤芍藥六兩桔梗杏仁各五兩右三味㕮咀以水六升煮取三升分三服九痛圓治九種心痛并療冷衝上氣落馬墮車血疾等方一蟲心痛二注心痛三風心痛四悸心痛五食心痛六飲心痛七冷心痛八熱心痛九去來心痛此之謂九痛附子乾薑各二兩吳茱萸人參巴豆各一兩生狼毒四兩右六味為末蜜和丸如梧子大空腹服一丸卒中惡腹脹痛口不能言者二丸日一服連年積冷流注心胸者亦服之好好將息神驗治九種心痛方取當太嵗上新生槐枝一握去兩頭㕮咀以水三升煮取一升頓服桂心三物湯治心中痞諸逆懸痛方桂心生薑各二兩膠飴半斤右三味取二味㕮咀以水六升煮取三升去滓內飴分三服仲景用枳實五枚不用膠飴肘後用枳實五枚白术二兩為五味烏頭圓治心痛徹背背痛徹心方烏頭六銖附子半兩蜀椒半兩乾薑赤石脂各一兩右五味為末蜜丸如麻子大先食服三丸日三不知稍增之范汪不用附子服如梧子三丸崔氏用桂心半兩為六味治心痛方桃白皮煮汁空腹以意服之崔氏用療疰心痛治暴心痛或如中惡口中涎出不可禁止回回欲吐方苦參十斤右一味㕮咀以水一石煮取二斗去滓下苦酒二斗更煎取五升大且黃末熬和汁中煎令可丸併手丸之如梧子大每服以酒一升進三四十丸日一當倒腹吐不吐下利更酒漬苦參二斤浸久彌佳非止暴痛如骭骨䯒等痛凡是腹中之疾悉主之又治宿冷血結隂癖頻用有效大良治卒中惡心痛方苦參三兩右一味㕮咀以好酢一升半煮取八合強者頓服老小分二服又方桂心一兩右一味㕮咀以水四升煮取一升半分作三服治蟲心痛方鶴蝨為末蜜和丸如梧子大服四十丸蜜湯下日一服可加至五十丸慎酒肉又方鶴蝨一兩為末以溫酢一盞和空腹服之蟲當吐出之又方服漆一合方見飬性服餌篇中凡蟲心痛皆用漆主之五辛湯治心腹冷痛方細辛蜀椒桂心乾薑吳茱萸芍藥防風苦參甘草乾地黃當歸各一兩梔子烏梅大棗各二七枚右十四味㕮咀以水九升煮取三升分四服犀角圓治心腹久痛積年不定不過一時間還發甚則數日不能食又便出乾血窮天下方不能瘥甄立言處此方數日即愈犀角麝香雄黃桔梗莽草鬼臼桂心芫花各兩半甘遂一兩半光明砂附子各六銖貝齒五枚巴豆二十枚赤足蜈蚣二枚右十四味為末蜜丸如梧子飲服一丸日二漸加至三丸以微利為度古今集驗無雄黃高良薑湯治卒心腹絞痛如刺兩脅支滿煩悶不可忍方高良薑五兩厚朴二兩當歸桂心各三兩右四味㕮咀以水八升煮取一升八合分三服日二若一服痛止便停不須更服強者為二服劣者分三服當歸湯治心腹絞痛諸虛冷氣滿痛方當歸芍藥厚朴半夏各二兩桂心甘草黃耆人參各三兩乾薑四兩蜀椒一兩右十味㕮咀以水一斗煮取三升二合分四服羸劣人分六服小品方云大冷加附子一枚良又方治虛冷腹痛不下飲食食復不消膨脹者方當歸茯苓各五分黃耆紫菀各四分高良薑乾薑各六分鹿茸桂心昆布肉蓯蓉橘皮各三分甘草二兩烏頭一兩大棗四十枚桃仁一百枚地骨皮法麴大麥蘖各一升右十八味㕮咀以水一斗五升煮取四升二合分為五服下利加赤石脂龍骨各三分渴加麥門冬一升又方治寒冷腹中痛方小品名吳茱萸湯當歸二兩桂心甘草人參各一兩生薑五兩半夏小麥各一升吳茱萸二升右八味㕮咀以水一斗五升煮取三升分三服日三亦治産後虛冷又方治冷氣脅下往來衝胸膈痛引脅背悶者方當歸桂心人參甘草吳茱萸芍藥大黃各二兩茯苓枳實各一兩乾薑三兩右十味㕮咀以水八升煮取二升半分三服日三治尸疰亦佳外臺仲景方無茯苓枳實又方治久寒疾胸腹中痛時下利方當歸三兩甘草橘皮各二兩附子一兩乾薑四兩右五味㕮咀以水八升煮取二升分三服日三又方治久寒宿疾胸腹中痛短氣時滯下利方當歸桂心各三兩乾薑四兩附子一兩右四味㕮咀以水八升煮取二升分三服日三范汪無附子用甘草二兩云虛冷激痛甚者加黃耆芍藥各二兩溫中當歸湯治心腹中痛發作腫聚往來上下痛有休止多熱喜涎出是蛔蟲咬也服二三劑後若不效有異宜改方增損之當歸人參乾薑茯苓厚朴木香桂心桔梗芍藥甘草各二兩右十味㕮咀以水八升煮取三升分溫五服日三不耐木香者以犀角一兩代之羊肉當歸湯治腹冷絞痛方羊肉半斤當歸四分乾薑橘皮黃耆芍藥芎藭桂心獨活防風各三分吳茱萸人參甘草乾地黃茯苓各一分生薑六分大棗三十枚右十七味㕮咀以水一斗半先煮肉取一斗二升出肉次內諸藥煮取三升分三服日三覆取溫暖溫脾湯治腹痛臍下絞結繞臍不止方甘草附子人參芒硝各二兩當歸乾薑各三兩大黃五兩右七味㕮咀以水七升煮取三升分服日三生薑湯治胸腹中卒痛方生薑一斤取汁食蜜八兩醍醐四兩右三味微火上耗令相得適寒溫服三合日三尉蒸法凡心腹冷痛者熬鹽一斗尉熬蠶沙燒磚石蒸尉取其裏溫暖止蒸土亦大佳針灸法凡邪在心則病心痛善悲時眩仆視有餘不足而調其輸腎心痛先取京骨崑崙發針不已取然谷胃心痛取大都太白脾心痛取然谷太溪肝心痛取行間太衝肺心痛取魚際太淵心痛引腰脊欲嘔刺足少隂心痛引背不得息刺足少隂不已取手少隂心痛腹脹澀澀然大便不利取足太隂心痛小腹滿上下無常處溲便難刺足厥隂心痛短氣不足以息刺手太隂心痛不可按煩心巨闕主之心痛有三蟲多涎不得反側上管主之心痛身寒難以俯仰心疝衝冒死不知人中管主之心痛如針錐刺然谷及太溪主之心腹中卒痛石門主之心疝暴痛取足太隂心懊憹微痛煩逆灸心輸百壯心痛如錐刀刺氣結灸膈輸七壯心痛冷氣上灸龍頷百壯在鳩尾頭上行一寸半不可刺之心痛惡氣上脅急痛灸通谷五十壯在乳下二寸心痛暴絞急絶欲死灸神府百壯在鳩尾正心有忌心痛暴惡風灸巨闕百壯心痛堅煩氣結灸太倉百壯心痛灸臂腕橫文三七壯又灸兩虎口白肉際七壯胸痺第七論法方灸論曰胸痺之病令人心中堅滿痞急痛肌中苦痺絞急如刺不得俯仰其胸前皮皆痛手不得犯胸中愊愊而滿短氣咳唾引痛咽塞不利習習如癢喉中乾燥時欲嘔吐煩悶白汗出或徹引背痛不治之數日殺人論曰夫脈當取太過與不及陽微隂弦即胸痺而痛所以然者責甚極虛故也今陽虛知在上焦所以胸痺心痛者以其人脈隂弦故也平人無寒熱短氣不足以息者實也枳實薤白桂枝湯治胸痺心中痞氣結在胸胸滿脅下逆搶心方枳實四枚薤白一斤桂枝一兩厚朴三兩栝蔞實一枚右五味㕮咀以水七升煮取二升半分再服仲景方厚朴用四兩薤白半斤水五升煮取二升半服之栝蔞湯治胸痺病喘息咳唾胸背痛短氣寸脈沈而遲關上小緊數方栝蔞實一枚半夏半升薤白一斤枳實二兩生薑四兩右五味㕮咀以白胾漿一斗煮取四升服一升日三仲景肘後不用生薑枳實半夏治胸痺候胸中愊愊如滿噎塞習習如癢喉中澀燥唾沫宜此方橘皮一斤生薑半斤枳實五枚右三味㕮咀以水五升煮取二升去滓分再服治中湯胸痺方茯苓湯治胸中氣塞短氣方茯苓三兩甘草一兩杏仁三十枚右三味㕮咀以水一斗三升煮取六升去滓為六服日三未瘥再合服通氣湯治胸滿短氣噎塞方半夏八兩生薑六兩橘皮三兩吳茱萸四十枚右四味㕮咀以水八升煮取三升分三服一方用桂二兩無橘皮細辛散治胸痺逹背短氣方細辛甘草各二兩枳實生薑栝蔞實乾地黃白术各三兩桂心茯苓各五兩右九味治下篩酒服方寸匕日三蜀椒散治胸痺逹背方蜀椒食茱萸各一兩桂心桔梗各三兩烏頭半兩䜴六銖右六味治下篩食後酒服方寸匕日三前胡湯治胸中逆氣心痛徹背少氣不食方前胡甘草半夏芍藥各二兩黃芩當歸人參桂心各一兩生薑三兩大棗三十枚竹葉一升右十一味㕮咀以水九升煮取三升分為四服又方前胡人參生薑半夏麥門冬甘草芍藥茯苓餳各三兩桂心黃芩當歸各一兩大棗三十枚右十三味㕮咀以水一斗四升煮取三升去滓分三服尉背散治胸背疼痛而悶方烏頭細辛附子羌活蜀椒桂心各五兩芎藭一兩六銖右七味治下篩帛褁微火炙令暖以尉背上取瘥乃止慎生冷如常法下氣湯治胸腹背閉滿上氣喘息方杏仁四七枚大腹檳榔二七枚右二味㕮咀以童子小便三升煎取一升半分再服曽患氣發輒合服之檳榔湯主破胸背惡氣音聲塞閉方檳榔極大者四枚小者八枚右一味二品㕮咀以小兒尿二升半煮減一升去滓分三服頻與五劑永定灸法胸痺引背時寒間使主之胸痺心痛天井主之胸痺心痛不得息痛無常處臨泣主之胸痺心痛灸亶中百壯穴在鳩尾上一寸忌針胸脅滿心痛灸期門隨年壯穴在第二肋端乳直下一寸半備急千金要方卷四十一
