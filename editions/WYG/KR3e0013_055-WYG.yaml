body:
  text: 備急千金要方卷五十五唐孫思邈撰宋林億等校正肺臓方氣極第四論法方灸論曰凡氣極者主肺也肺應氣氣與肺合又曰以秋遇病為皮痺皮痺不已復感於邪内舍於肺則寒濕之氣客於六腑也若肺有病則先發氣氣上衝胸常欲自恚以秋庚辛日傷風邪之氣為肺風肺風之状多汗若隂傷則寒寒則虚虚則氣逆欬欬則短氣暮則甚隂氣至温氣生故甚隂畏陽氣晝日則瘥若陽傷則熱熱則實實則氣喘息上胸臆甚則唾血然陽病治隂隂是其裏隂病治陽陽是其表是以隂陽表裏衰王之源故知以陽調隂以隂調陽陽氣實則決隂氣虚則引善治病者初入皮毛肌膚筋脉則治之若至六腑五臓半死矣扁鵲曰氣絶不治喘一作奔而冷汗出二日死氣應手太隂太隂氣絶則皮毛焦氣先死矣鍾乳散治氣極虚寒隂畏陽氣晝瘥暮甚氣短息寒亦治百病令人力强能飲食去風冷方鍾乳别研乾薑桔梗茯苓細辛桂心附子人參各一兩六銖白术一兩防風栝蔞根牡蠣各二兩半右十二味治下篩酒服方寸匕日三漸加至二匕五十以上可數服得力乃止千金翼云有冷加椒有熱加黄芩各三兩黄耆湯治氣極虚寒皮毛焦津液不通虚勞百病氣力損乏方黄耆四兩人參白术桂心各二兩生薑八兩大􅀥十枚附子三十銖一方不用右七味㕮咀以水八升煮取三升去滓分四服大露宿圓治氣極虚寒皮痺不已内舍於肺寒氣入客於六腑腹脹虚滿寒冷積聚百病方礜石肘後作礬石乾薑桂心皂莢桔梗附子各三兩右六味為末蜜丸梧子大酒服十丸日三漸加之慎熱及近火等硫黄圓治氣極虚寒澼飲胸中痰滿心腹痛氣急不下飲食方硫黄礜石乾薑附子烏頭桂心細辛白术桔梗茯苓各二兩右十味為末蜜丸如梧子酒服十丸日三漸加之以止為度肘後無白术桔梗茯苓用吳茱茰蜀椒人參皂莢當歸十二種為丸用治人大冷夏月温飲食不觧衣者大前胡湯治氣極傷熱喘息衝胸常欲自恚心腹滿痛内外有熱煩嘔不安方前胡八兩半夏麻黄芍藥各四兩生薑五兩黄芩三兩枳實四枚大􅀥十二枚右八味㕮咀以水九升煮取三升去滓分三服温竹葉湯治氣極傷熱氣喘甚則唾血氣短乏不欲食口燥咽乾方竹葉二升麥門冬小麥生地黄各一升生薑石膏各六兩麻黄三兩甘草一兩大􅀥十枚右九味㕮咀以水一斗煮取三升去滓分三服灸法嘔吐上氣灸尺澤不三則七壮尺澤者在腕後肘中横文腹中雷鳴相逐食不化逆氣灸上管下一寸名太倉七壮積氣第五論法方灸論曰七氣者寒氣熱氣怒氣恚氣喜氣憂氣愁氣凡七種氣積聚堅大如杯若柈在心下腹中疾痛不能飲食時來時去每發欲死如有禍祟此皆七氣所生寒氣即嘔逆惡心熱氣即説物不竟而迫怒氣即上氣不可忍熱痛上搶心短氣欲死不得息恚氣即積聚在心下不得飲食喜氣即不可疾行不能乆立憂氣即不可劇作暮臥不安愁氣即喜忘不識人語置物四方還取不得去處若聞急即四肢胕腫手足筋攣捉不能舉如得病此是七氣所生男子卒得飲食不時所致婦人即産後中風諸疾也七氣圓方烏頭大黄各七分紫菀半夏前胡細辛丹參茯苓芎藭桃仁胡洽作杏仁菖蒲一作芍藥石膏吳茱茰桂心桔梗各三分人參甘草防葵各一兩乾薑蜀椒各半兩右二十味為末蜜丸如梧子大酒服三丸日三加至十丸一方去半夏加甘遂三分胡洽無丹參甘草七氣圓主七氣七氣者寒氣熱氣怒氣恚氣喜氣憂氣愁氣此之為病皆生積聚堅牢如杯心腹絞痛不能飲食時去時來發則欲死凡寒氣状吐逆心滿熱氣状恍惚眩冒失精怒氣状不可當熱痛上盪心短氣欲絶不得息恚氣状積聚心滿不得食飲喜氣状不可疾行久立憂氣状不可苦作臥不安席愁氣状平故如怒喜忘四肢胕腫不得舉止亦治産後中風餘疾方大黄二兩半人參半夏吳茱茰柴胡乾薑細辛桔梗菖蒲各二分茯苓芎藭甘草蜀椒一用桂心石膏桃仁各三分右十五味為末蜜丸如梧子大毎服酒下三丸日三服漸加至十丸千金翼十味無茯苓芎藭甘草石膏桃仁七氣湯治寒氣熱氣憂氣勞氣愁氣或飲食為膈氣或勞氣内傷五臓不調氣衰少力方乾薑黄芩厚朴深師作桂心半夏甘草乾地黄芍藥栝蔞根各二兩深師作橘皮蜀椒三兩深師桔梗枳實五枚人參一兩吳茱茰五合右十二味㕮咀以水一斗煮取三升分三服日三又方治虚冷上氣勞氣等方半夏一升人參生薑桂心甘草各一兩右五味㕮咀以水一斗煮取三升分三服日三五膈圓治憂膈氣膈食膈飲膈勞膈五病同三服以憂恚思慮飲食得之若冷食及生菜便發其病若心滿不得氣息引背痛如刺之状食即心下堅大如粉絮大痛欲吐吐即瘥飲食不得下甚者及手足冷上氣欬逆喘息短氣方麥門冬甘草各五兩蜀椒遠志桂心細辛各三兩附子一兩半人參四兩乾薑二兩右九味為末蜜和丸微使淖先食含如彈丸一枚細細咽之喉中胸中當熱藥力稍盡復含一丸日三夜二服藥七日愈延年方云若不能含者可分一大丸作七小圓盡服之夏月含益麥門冬甘草人參胡洽云亦可梧子大十丸酒服之經心録以吳茱茰代桂心酒服如梧子五丸空腹服之治寒冷則心痛咽中有物吐之不出咽之不入食飲少者治結氣冷癥積在脇下及脚氣上入小腹腹中脹滿百病方大蒜去心皮三升𢷬令極熟以水三升和令調絞取汁更𢷬餘滓令熟更以水三升和令調絞取汁更𢷬餘滓令熟更以水三升和令調絞取汁合得九升所得滓可桃顆大棄却以微火煎取三升下牛乳三升合煎取三升旦起空腹一頓温服令盡至申時食三日服一劑三十日服十劑止大蒜煎治疝瘕積聚冷癖痰飲心腹脹滿上氣欬嗽刺風風癲偏風半身不隨腰疼膝冷氣息否塞百病方蒜六斤四兩去皮切水四斗煮取一斗去滓酥一升内蒜汁中牛乳二升蓽苃胡椒乾薑各三兩石蜜阿魏戎鹽各二兩石菖蒲木香各一兩乾蒲桃四兩右十二味為末合内蒜汁中以銅器微火煎取一斗空腹酒下一兩五日已上稍加至三兩二十日覺四體安和更加至六兩此治一切冷氣甚良桔梗破氣圓治氣上下否塞不能息方桔梗橘皮乾薑厚朴枳實細辛葶藶各三分吳茱茰白术各六分胡椒蜀椒烏頭各七分蓽苃十分人參桂心附子茯苓前胡防葵芎藭各五分甘草大黄檳榔當歸各八分右二十四味為末蜜丸如梧子大每服酒下十丸日三有熱者空腹服之檳榔湯治氣實若積聚不得食息方檳榔三七枚附子一枚半夏一升細辛一兩生薑八兩大黄紫菀柴胡各三兩橘皮甘草紫蘓冬用子茯苓各二兩右十二味㕮咀以水一斗煮取三升分三服相去如人行十里乆若有癥結堅實如石加鼈甲二兩防葵二兩氣上加桑白皮切二升枳實厚朴各二兩消息氣力强弱進二劑後隔十日更服前桔梗破氣圓治積年患氣發作有時心腹絞痛忽然氣絶腹中堅實醫所不治復謂是蠱方檳榔大者四七枚附子一枚半夏一升柴胡三兩生薑八兩橘皮甘草桂心當歸枳實各二兩右十味㕮咀以水一斗煮取三升分三服五日一劑服三劑永除根本半夏湯治逆氣心腹滿氣上胸脇痛寒冷心腹痛嘔逆及吐不下食憂氣結聚方半夏一升生薑桂心各五兩橘皮四兩右四味㕮咀以水七升煮取三升分四服日三夜一人强者作三服亦治霍亂後吐逆腹痛又方治逆氣心中煩滿氣悶不理氣上方見第十六巻嘔吐篇四味者是貝母湯治上氣咽喉窒塞短氣不得臥腰背痛胸滿不得食面色萎黄方貝母一兩生薑五兩桂心麻黄石膏甘草各二兩杏仁三十枚半夏五合右八味㕮咀以水一斗煮取三升分為三服日三麻黄湯治上氣脉浮欬逆喉中水雞聲喘息不通呼吸欲死方麻黄八兩甘草四兩大􅀥三十枚射干如愽棊子二枚右四味㕮咀以井花水一斗煮麻黄三沸去沫内藥煮取四升分四服日三夜一奔氣湯治大氣上奔胸膈中諸病發時廹滿短氣不得臥劇者便悁欲死腹中冷濕氣腸鳴相逐成結氣方生薑一斤半夏吳茱茰各一升桂心五兩人參甘草各三兩右六味㕮咀以水一斗煮取三升分四服枳實湯下氣治胸中滿悶方枳實三枚附子二枚大棗十四枚半夏五兩人參甘草白术乾薑厚朴各二兩右九味㕮咀以水七升煮取二升半毎服八合日三下氣治氣滿腹脹方半夏一升生薑一斤人參一兩半橘皮三兩右四味㕮咀以水七升煮取三升去滓分三服日三一方無人參止三味治氣兩脇滿急風冷方杏仁茯苓防葵各八分吳茱茰橘皮桂心防風澤㵼各五分白术射干芍藥蘓子桔梗枳實各六分右十四味為末蜜丸梧子大酒服十丸日二加至三十丸治氣滿閉塞不能食喘息方訶梨勒十枚為末蜜丸如梧子食後服三丸不忌得利即止治上氣欬逆方蘓子一升五味子五合麻黄細辛紫菀人參黄芩甘草各二兩桂心當歸各一兩生薑五兩半夏三兩右十二味㕮咀以水一斗煮取三升分作三服治氣上不得臥神袐方橘皮生薑紫蘓人參五味子各五兩一方作桔梗右五味㕮咀以水七升煮取三升分三服治熱發氣上衝不得息欲死不得臥方桂心半兩白石英麥門冬枳實白鮮皮貝母茯神㯽榔仁天門冬各二兩半車前子二兩人參前胡橘皮白薇杏仁各一兩半郁李仁三兩桃仁五分右十七味為末蜜和丸如梧子大以竹葉飲服十丸日二加至三十丸竹葉飲法竹葉紫蘓子各一升紫菀白前各二兩百部甘草生薑各三兩右七味㕮咀以水八升煮取三升温下前丸藥盡更合人參湯安食下氣理胸脇并治客熱方人參麥門冬乾薑當歸茯苓甘草五味子黄耆芍藥枳實各二兩桂心三兩半夏一升大棗十五枚右十三味㕮咀以水九升煮取三升去滓毎服九合從旦至晡令盡皆熱服慎勿冷海藻橘皮圓下氣治風虚支滿膀胱虚冷氣上衝肺息奔令咽喉氣悶徃來方海藻橘皮白前各三分杏仁茯苓芍藥桂心各五分蘓子五合􅀥肉桑根白皮昆布各二兩吳茱茰人參白术葶藶各一兩右十五味為末蜜丸如梧子大飲服十丸日二加至十五丸以利小便為度治氣上方碙砂細辛牛膝各等分右三味末氣發酒服方寸匕後三日忌酒餘禁如藥法治上氣方上酥一升獨頭蒜五顆右二味先以酥煎蒜蒜黄出之用生薑汁一合共煎令熟空腹温服一方寸匕治上氣嘔吐方芥子二升為末蜜丸寅時以井花水服如梧子七丸日二亦可作散空腹服之及有酒浸服并治臍下絞痛治勞氣方小芥子三升𢷬末絹袋盛酒三斗浸之宻封七日去滓温服半升漸至一升半得方更合忌如藥法治上氣三十年不瘥方大􅀥杏仁各一百粒豉一百二十粒蜀椒二百粒右四味先𢷬杏仁豉令熟後内􅀥椒更𢷬為丸如􅀥核大含稍稍咽之日三夜一治積年上氣不瘥垂死者方莨菪子􅆈令色變熟羊肝薄切曝乾右二味各𢷬等分以七月七日神酢拌令相著夜不食空腹服二方寸匕須拾針兩食間以冷漿白粥二匕止之隔日一服永瘥四十日内得煮飯汁作蕪菁羮食之已外一切禁斷下氣方生薑五兩小麥一升右二味以水七升煮取一升頓服又方大􅀥二七枚紫蘓莖葉切一升右二味以酒三升煮取一升半分再服水煮亦得一方加橘皮半兩肘後方無􅀥用橘皮治氣方桃皮二斤去黄者㕮咀以水五升煮取三升每服一升瘥止又方酒服驢脂二合日二瘥止又方黄牛乳二升煎取一升和生乳一升空腹服之日二又方驢乳初服三合三日後日别五合後至七合七日後至一升忌葵菜猪魚油等又方尿空腹服百日即止治一切病又方烏牛尿空腹服日再至三升止補氣虚逆方大棗三升甘皮去脉十具乾薑二兩乾地黄八兩右四味治下篩酒四升漬􅀥三宿漉出􅀥取酒為炊汁将􅀥内甑中微火蒸令􅀥膏入釡中酒裏煎酒令餘二升許候甑中棗只留皮核在乃止火貯器中将前散及熱下攪令調大畧與糖相似以酒服二合日再此方非止補氣亦通治一切短氣并形體羸瘦甚良大補氣方乾地黄五兩甘草秦椒各一兩乾薑昆布地骨皮各四兩白术桂心人參厚朴海藻各三兩羊腎一具去膏四枚羊肚一具治如食法去膏膋右十三味治下篩内羊肚中合腎縫塞肚口蒸極熟為度及熱水臼合𢷬取肚腎與藥為一家曝乾更𢷬為散酒服方寸匕日二白石英散明目利小便治氣及補五勞七傷無所不治方煉成白石英十兩白石英無多少以鎚子碪上細磽向明選去黶翳色暗黒黄赤者惟取白净者為佳𢷬絹下之甆器中研令極細熟以生絹袋於銅器中水飛之如作粉法如此三度研訖澄之漸漸去水水盡至石英曝得乾看中有粗惡不浄者去之取中央好者在下有粗惡者亦去之更研堪用者使熟白絹袋子盛著甆椀中以甆椀盖之於三斗米下蒸之飯熟訖出取懸之使乾更於甆器中研之為成石斛蓯蓉各六分澤㵼茯苓橘皮各一兩莵絲子三兩右七味治下篩總於甆器中研令相得重篩酒服方寸匕日二不得過之猪魚鵝鴨蒜冷酢滑補傷散治肺傷善泄欬善驚恐不能動筋不可遠行膝不可久立汗出鼻乾少氣喜悲心下急痛痛引胸中臥不安席忽忽喜夢寒熱小便赤黄目不逺視唾血方天門冬一升防風澤㵼人參阿膠各一兩半栝蔞根前胡芍藥石膏乾薑大豆卷各二兩紫菀白歛各一兩桂心白术各四兩乾地黄甘草薯蕷當歸各二兩半右十九味治下篩食上酒服方寸匕日三白石英圓補養肺氣方白石英一作白石脂陽起石磁石莵絲子蓯蓉乾地黄各二兩半石斛栝蔞根白术五味子各二兩防風巴㦸天各五分桂心人參各一兩蛇床子半兩右十五味為末蜜丸如梧子酒下十五丸加至三十丸日二服理氣圓治氣不足方杏仁桂心各一兩乾薑益智子各二兩右四味為末蜜丸如梧子未食服三丸以止為度治冷氣氣短方蜀椒五兩絹袋盛酒一斗浸二七日服之任意多少治讀誦勞極疲乏困頓方酥油糖酒白蜜各二升右五味合於銅器中微火煎二十沸下之為凖七日七夜服令盡宜慎生冷又方人參甘草茯苓當歸各二兩地骨皮芎藭芍藥乾地黄黄耆各三兩大􅀥二十枚右十味㕮咀以水一斗煮取三升分三服一方用桂心三兩治卒短氣方𢷬韭汁服一升立瘥肘後方治卒上氣鳴息便欲絶治乏氣方生薑枸杞葉各二兩右二味㕮咀以水三升煮取一升頓服治少年房多短氣方豉七合梔子二七枚右二味以水二升煮豉取一升半去䜴内梔子煮取八合服半升不瘥更服灸法凡上氣冷發腹中雷鳴轉呌嘔逆不食灸太衝不限壮數從痛至不痛從不痛至痛止上氣厥逆灸胸堂百壮穴在兩乳間胸膈中氣灸闕輸隨年壮扁鵲云第四椎下兩傍各一寸半名闕輸心腹諸病堅滿煩痛憂思結氣寒冷霍亂心痛吐下食不消腸鳴泄利灸太倉百壮太倉穴一名胃募在心下四寸乃胃管下一寸結氣囊裏針藥所不及灸肓募隨年壮肓募二穴從乳頭即度至臍中屈去半從乳下行度頭是穴下氣灸肺輸百壮又灸太衝五十壮凡臍下絞痛流入隂中發作無時此冷氣灸關元百壮穴在臍下三寸短氣不得語灸天井百壮穴在肘後兩筋間又灸大椎隨年壮又灸肺輸百壮又灸肝輸百壮又灸尺澤百壮又灸小指第四指間交脉上七壮又灸手十指頭合十壮少年房多短氣灸鳩尾頭五十壮又鹽灸臍孔中二七壮乏氣灸第五椎下隨年壮論曰凡卒厥逆上氣氣攻兩脇心下痛滿奄奄欲絶此為奔㹠氣即急作湯以浸兩手足數數易之奔㹠灸氣海百壮穴在臍下一寸半又灸關元百壮穴在臍下三寸奔㹠灸期門百壮穴直兩乳下第二脇端傍一寸五分奔㹠腹腫灸章門百壮章門一名長平二穴在大横外直臍季脇端奔㹠搶心不得息灸中極五十壮中極一名玉泉在臍下四寸奔㹠上下腹中與腰相引痛灸中府百壮穴在乳上三肋間奔㹠上下灸四滿二七壮穴俠丹田兩傍相去三寸即心下八寸臍下横文是也備急千金要方卷五十五
