body:
  text: 備急千金要方卷八唐孫思邈撰宋林億等校正少小嬰孺方序例第一方論曰夫生民之道莫不以養小為大若無于小卒不成大故易稱積小以成大詩有厥初生民傳云聲子生隱公此之一義即是從微至著自少及長人情共見不待經史故今斯方先婦人小兒而後丈夫耆老者則是崇本之義也然小兒氣勢微弱醫士欲留心救療立功差難今之學者多不存意良由嬰兒在於襁褓之内乳氣腥臊醫者操行英雄詎肯瞻視靜言思之可為太息者矣小品方云凡人年六歲已上為小十六歲已上為少巢源外臺作十八已上為少三十已上為壯巢源外臺作二十已上為壯五十已上為老其六歲已下經所不載所以乳下嬰兒有病難治者皆為無所承據也中古有巫妨巢源作巫方者立小兒顱􅇟經以占夭夀判疾病死生世相傳授始有小兒方焉逮于晉宋江左推諸蘇家傳習有驗流于人間齊有徐王者亦有小兒方三卷故今之學者頗得傳授然徐氏位望隆重何暇留心于少小詳其方意不甚深細少有可採未為至祕今博撰諸家及自經用有效者以為此篇凡百居家皆宜逹兹養小之術則無横夭之禍也又曰小兒病與大人不殊惟用藥有多少為異其驚癎客忤解顱不行等八九篇合為此卷下痢等餘方並散在諸篇可披而得之凡生後六十日瞳子成能咳笑應和人百日任脉成能自反覆一作百五十日百八十日尻骨成能獨坐二百一十日掌骨成能匍匐三百日臏骨成能獨立三百六十日膝骨成能行此其定法若不能依期者必有不平之處凡兒生三十二日一變六十四日再變變且蒸九十六日三變一百二十八日四變變且蒸一百六十日五變一百九十二日六變變且蒸二百二十四日七變二百五十六日八變變且蒸二百八十八日九變三百二十日十變變且蒸積三百二十日小蒸畢後六十四日大蒸蒸後六十四日復大蒸蒸後一百二十八日復大蒸凡小兒自生三十二日一變再變為一蒸凡十變而五小蒸又三大蒸積五百七十六日大小蒸都畢乃成人小兒所以變蒸者是榮其血脉改其五臟故一變竟輒覺情態有異其變蒸之候變者上氣蒸者體熱變蒸有輕重其輕者體熱而微驚耳冷尻冷上脣頭白泡起如魚目珠子微汗出其重者體壯熱而脉亂或汗或不汗不欲食食輙吐哯目白精微赤黒精微白又云目白者重赤黒者微變蒸畢自精明矣此其證也單變小微兼蒸小劇凡蒸平者五日而衰逺者十日而衰先期五日後之五日為十日之中熱乃除耳兒生三十二日一變二十九日先期而熱便治之如法至三十六七日蒸乃畢耳恐不解了故重說之且變蒸之時不欲驚動勿令傍多人兒變蒸或早或晩不如法者多又初變之時或熱甚者違日數不歇審計變蒸之日當其時有熱微驚慎不可治及灸刺但和視之若良久熱不可已少與紫丸微下熱歇便止若於變蒸之中加以時行温病或非變蒸時而得時行者其診皆相似惟耳及尻通熱口上無白泡耳當先服黒散以發其汗汗出温粉粉之熱當歇便就瘥若猶不都除乃與紫丸下之兒變蒸時若有寒加之即寒熱交争腹腰夭糺啼不止者熨之則愈也熨法出下篇灸粉絮熨者是變蒸與温壯傷寒相似若非變蒸身熱耳熱尻亦熱此乃為他病可作餘治審是變蒸不得為餘治也又一法凡兒生三十二日始變變者身熱也至六十四日再變變且蒸其狀卧端正也至九十六日三變定者候丹孔出而泄至一百二十八日四變變且蒸以能咳笑也至一百六十日五變以成機關也至一百九十二日六變變且蒸五機成也至二百二十四日七變以能匍匐也至二百五十六日八變變且蒸以知欲學語也至二百八十八日九變以亭亭然也凡小兒生至二百八十八日九變四蒸也當其變之日慎不可妄治之則加其疾變且蒸者是兒送迎月也蒸者甚熱而脉亂汗出是也近者五日歇逺者八九日歇也當是蒸上不可灸刺妄治之也紫圓治小兒變蒸發熱不解并挾傷寒温壯汗後熱不歇及腹中有痰癖哺乳不進乳則吐哯食癎先寒後熱方赤石脂代赭各一兩巴豆三十枚杏仁五十枚右四味為末巴豆杏仁别研為膏相和更𢷬二千杵當自相得若硬入少蜜同𢷬之密器中收三十日兒服如麻子一丸與少乳汁令下食頃後與少乳勿令多至日中當小下熱除若未全除明旦更與一丸百日兒服如小豆一丸以此凖量増減夏月多熱喜令發疹二三十日輙一服佳紫圓無所不療雖下不虚人黒散治小兒變蒸中挾時行温病或非變蒸時而得時行者方麻黄杏仁各半兩大黄六銖右三味先𢷬麻黄大黄為散别研杏仁如脂乃細細内散又𢷬令調和内宻器中一月兒服小豆大一枚以乳汁和服抱令得汗出温粉粉之勿使見風百日兒服如􅀥核以兒大小量之擇乳母法凡乳母者其血氣為乳汁也五情善惡悉是血氣所生也其乳兒者皆宜慎于喜怒夫乳母形色所宜其候甚多不可求備但取不胡臭癭瘻氣嗽瘑疥癡癃白秃癧瘍瀋脣耳聾齆鼻瘨癎無此等疾者便可飲兒也師見其故灸瘢便知其先疾之源也備急千金要方卷八
