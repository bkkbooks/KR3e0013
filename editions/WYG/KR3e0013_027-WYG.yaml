body:
  text: 備急千金要方卷二十七唐孫思邈撰宋林億等校正治諸風方偏風第四方灸法針防風湯治偏風甄權處療安平公方防風芎藭白芷牛膝狗脊萆薢白术各一兩羌活葛根附子外臺作人參杏仁各二兩薏苡仁石膏桂心各三兩麻黄四兩生薑五兩右十六味㕮咀以水一斗二升煮取三升分三服一劑覺好更進一劑即一度針九劑九針即瘥灸亦得針風池一穴肩髃一穴曲池一穴支溝一穴五樞一穴陽陵泉一穴巨虚下亷一穴凡針七穴即瘥仁夀宫備身患脚奉勑針鐶銚一穴陽陵泉一穴巨虚下亷一穴陽輔一穴凡針四穴即能起行大理趙卿患風腰脚不隨不能跪起針上窌一穴鐶銚一穴陽陵泉一穴巨虚下亷一穴凡針四穴即能跪起庫狄欽患偏風不得挽弓針肩髃一穴即得挽弓甄權所行治猥退風半身不遂失音不語者方杏仁去雙仁及皮尖三斗洗入臼𢷬二斗令碎研如寒食粥法取汁八升煎取四升口嘗看香滑即熟未及此則為不熟惟熟為妙停極冷然後内好麴一斗六升煎取八升第一遍酘饙也次一炊復取杏仁三升研取一斗二升汁煎取六升第二酘也次一炊準第二酘取杏仁汁多少為第三酘也若疑米不足别更取二升杏仁研取八升汁煎取四升更斟酌炊米酘之若猶不足更研杏仁二升取八升汁煎取四升更酘之以熟為限一石米杏仁三斗所以節次研杏仁者恐并煎汁酢故也若冬日任意并煎準計三斗杏仁取汁一石六斗煎取八斗四升漬麴以分之酘饙酒熟封四七日開澄取清然後壓糟糟可乾末和酒服之大驗祕方又方萆麻子脂一升酒一斗銅鉢盛著酒中一日煮之令熟服之又方灸百㑹次灸本神次灸承漿次灸風府次灸肩髃次灸心輸次灸手五冊次灸手髓孔次灸手少陽次灸足五冊次灸足髓孔次灸足陽明各五百壯治大風半身不遂方蠶沙兩石熟蒸分作直袋三枚各受七斗熱盛一袋著患處如冷即取餘袋一依前法數數易換百不禁瘥止須羊肚釀粳米蔥白薑椒豉等爛煮熱喫日食一具十日止此方千金不傳又方蒸鼠壤土袋盛熨之瘥即止葛根湯治四肢緩弱身體疼痛不遂婦人産後中柔風及氣滿方葛根芍藥桂心乾地黄羌活各三兩麻黄甘草各二兩生薑六兩右八味以清酒三升水五升煮取三升温服五合日三麻子湯治大風周身四肢攣急風行在皮膚身勞彊服之不虚人又治精神䝉昧者方秋麻子三升净擇水漬一宿防風桂心生薑石膏碎綿裹橘皮各二兩麻黄三兩竹葉葱白各一握香豉一合右十味㕮咀先以水二斗半煮麻子令極熟漉去滓取九升别煮麻黄兩沸掠去沫内諸藥汁中煮取三升去滓分三服空腹服當微汗汗出以粉塗身極重者不過三兩劑輕者一兩劑瘥有人患大風賊風刺風加獨活三兩比之小續命湯準當六七劑仲景三黄湯治中風手足拘攣百節疼痛煩熱心亂惡寒經日不欲飲食方麻黄三十銖黄芩十八銖黄耆細辛各十二銖獨活一兩右五味㕮咀以水五升煮取二升分二服一服小汗兩服大汗心中熱加大黄半兩脹滿加枳實六銖氣逆加人參十八銖心悸加牡蠣十八銖渇加栝蔞十八銖先有寒加八角附子一枚此方祕不傳白歛薏苡湯治風拘攣不可屈伸方白歛薏苡仁芍藥桂心酸棗仁牛膝乾薑甘草各一升附子三枚右九味㕮咀以淳酒二斗漬一宿微火煎三沸毎服一升日三扶杖起行不耐酒服五合千金翼有車前子獨活寄生湯夫腰背痛者皆由腎氣虚弱卧冷濕地當風得之不時速治喜流入脚膝為偏枯冷痺緩弱疼重或腰痛攣脚重痺冝急服此方獨活三兩寄生古今録驗用續斷杜仲牛膝細辛秦芃茯苓桂心防風芎藭乾地黄人參甘草當歸芍藥各二兩右十五味㕮咀以水一斗煮取三升分三服温身勿冷喜虚下利者除乾地黄服湯取蒴藋葉火燎厚安席上及熱眠上冷復燎之冬月取根春取莖􅆈卧之佳其餘薄熨不及蒴藋葉為愈也諸處風濕亦用此法新産竟或患腹痛不得轉動及腰脚攣痛不得屈伸痺弱者宜服此湯除風消血肘後有附子一枚大者無寄生人參甘草當歸菊花酒治男女風虚寒冷腰背痛食少羸瘦無顔色嘘吸少氣去風冷補不足方菊花杜仲各一斤防風附子黄耆乾薑桂心當歸石斛各四兩紫石英蓯蓉各五兩萆薢獨活鍾乳各八兩茯苓三兩右十五味㕮咀以酒七斗漬五日一服二合稍稍加至五合日三千金翼不用乾薑杜仲酒治腰脚疼痛不遂風虚方杜仲八兩石南二兩羌活四兩大附子五枚右四味㕮咀以酒一斗漬三宿毎服二合日再偏宜冷病婦人服之風痱第五論法方灸論曰夫風痱者卒不能語口噤手足不遂而彊直者是也治之以伏龍肝五升為末冷水八升和攪取汁飲之能盡為善肘後此方治心煩恍惚腹中痛滿絶而復蘇自此已下九方皆主此風用之次第宜細尋之論曰凡欲醫此病當知先後次第不得謾投湯藥以失機宜非但殺人因兹遂為痼疾已既得之當進三味竹瀝飲少似有勝于常更進湯也竹瀝飲子患熱風者必先用于此制其熱毒竹瀝湯治四肢不收心神恍惚不知人不能言方竹瀝二升生葛汁一升生薑汁三合右三味相和温暖分三服平旦日晡夜各一服服訖覺四體有異似好次進後湯方竹瀝一升生葛汁五合芎藭防已附子人參芍藥黄芩甘草桂心各一兩生薑四兩羚羊角三兩石膏六兩杏仁四十枚麻黄防風各一兩半右十六味㕮咀以水七升煮減半内瀝煮取二升五合分三服取汗間五日更服一劑頻與三劑漸覺少損乃進後方竹瀝三升防風升麻羚羊角防已桂心芎藭各二兩麻黄三兩右八味㕮咀以水四升合竹瀝煮取二升半分三服兩日服一劑常用加獨活三兩最佳此方神良頻進三劑若手足冷者加生薑五兩白术二兩若未除更進後方竹瀝一升甘草一本作根二兩人參芎藭獨活升麻各一兩防風麻黄芍藥各一兩半生薑石膏羚羊角防已桂心黄芩附子一本作杏仁四十枚白术各二兩右十七味㕮咀以水八升煮減半内瀝煮取二升半分三服相去如人行十里乆更服若有氣者加橘皮牛膝五加皮各一兩凡風痱服前湯得瘥訖可常服煮散除餘風方防風防已獨活秦芃黄耆芍藥人參白术茯神芎藭遠志升麻石斛牛膝羚羊角丹參甘草厚朴天門冬五加皮地骨皮黄芩翼作薯蕷桂心各一兩一云各四兩乾地黄橘皮生薑麻黄各三兩㯽榔翼作甘草藁本翼作附子杜仲翼作麥門冬烏犀角各二兩翼作山茱萸薏苡仁一升石膏六兩一云三兩右三十三味𢷬篩為粗散和攪令匀毎服以水三升藥三兩煮取一升綿濾去滓頓服之取汗日一服若覺心中熱煩以竹瀝代水煮之荆瀝湯凡患風人多熱常宜服此方荆瀝竹瀝生薑汁各五合右三味相和温暖為一服毎日旦服煮散午後進此平復好瘥乃止獨活煮散治諸風痱方獨活八兩芎藭芍藥茯苓防風防已葛根各六兩羚羊角當歸人參桂心麥門冬石膏各四兩磁石十兩甘草三兩白术五兩右十六味各切剉分為二十四分毎分入生薑生地黄切一升杏仁二七枚以水二升煮取七合或日晩或夜中或日一服或間服無所忌五補圓凡風服湯藥多患虚熱翕翕然宜除熱方防風人參蓯蓉乾地黄羚羊角麥門冬天門冬各一兩半芍藥獨活乾薑白术丹參食茱萸一云山茱萸甘草茯神升麻黄耆甘菊花地骨皮石斛牛膝五加皮薯蕷各三十銖秦芃芎藭桂心防已生薑屑黄芩各一兩附子十八銖石膏三兩寒水石二兩右三十二味為末白蜜和丸如梧子大生薑蜜湯服二十丸日三稍加至三十丸忌油麫蒜生冷酢滑及猪羊雞魚等肉論曰古人立方皆準病根冷熱制之今人臨急造次搜尋即用故多不驗所以欲用方者先定其冷熱乃可檢方用無不效湯藥既爾丸散亦然凡此風之發也必由熱盛故有竹瀝葛汁等諸冷藥焉後之學者不能仔細識其方意故有兹論具而述之其人無宻室者不可與療以强人居室不宻尚中風邪况服藥之人乎治風痱不能語手足不遂方度病者手小指内岐間至指端為度以置臍上直望心下以丹注度上端畢又作兩度續所注上合其下開其上取其本度横置其開上令三合其狀如到作厶字形男度左手女度右手嫌不分了故上丹注三處同時起火灸之各一百壯愈備急千金要方卷二十七
