  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0013_WYG_090-1a, image: WYG0735/WYG0735-0903a.png}
body:
  text: 備急千金要方卷九十唐孫思邈撰宋林億等校正針灸孔穴主對法第八論曰凡云孔穴主對者穴名在上病狀在下或一病有數十穴或數病共一穴皆臨時斟酌作法用之其有須針者即針刺以補瀉之不宜針者直爾灸之然灸之大法但其孔穴與針無忌即下白針若温針訖乃灸之此為良醫其脚氣一病最宜針之若針而不灸灸而不針皆非良醫也針灸而藥藥不針灸尤非良醫也但恨下里間知針者鮮耳所以學者深須解用針燔針白針皆須妙解知針知藥固是良醫頭面第九頭病神庭水溝主寒熱頭痛喘渇目不可視又云神庭主風頭昡善嘔煩滿頭維大陵主頭痛如破目痛如脫甲乙云喘逆煩滿嘔吐流汗難言崑崙解谿曲泉飛揚前谷少澤通里主頭眩痛竅陰强間主頭痛如錐刺不可以動腦户通天腦空主頭重痛消濼主寒熱痺頭痛攅竹承光腎輸絲竹空瘈脉和窌主風頭痛又云瘈脉主風頭耳後痛上星主風頭眩顔清又云上星主風頭引頷痛􅇟㑹主風頭眩頭痛顔清天牖風門崑崙闗元闗衝主風眩頭痛合谷五處主風頭熱前頂後頂頷厭主風眩偏頭痛玉枕主頭半寒痛甲乙云頭眩目痛頭半寒天柱陶道大杼一作本神孔最後谿主頭痛目窻中渚完骨命門豐隆太白外丘通谷京骨臨泣小海承筋陽陵泉主頭痛寒熱汗出不惡寒項病少澤前谷後谿陽谷完骨崑崙小海攅竹主項强急痛不可以顧消濼本神通天强間風府瘖闗天柱風池齗交天衝陶道外丘通谷玉枕主項如拔不可左右顧天容前谷角孫腕骨支正主頸腫項痛不可顧又云天容主頸項癰不能言角孫主頸頷柱滿飛揚涌泉頷厭後頂主頸項疼􅍓節汗出面病攅竹齗交玉枕主面赤頰中痛上星􅇟㑹前項腦户風池主面赤腫巨窌主面惡風寒頰腫痛天突天窻主面皮熱又云天窻主頰腫痛腎輸内闗主面赤熱行間主面蒼黒大衝主面塵黒中渚主顳顱痛頷顱熱痛面赤懸釐主面皮赤痛目病大敦主目不欲視大息大都主目眩承泉前頂天柱腦空目窻主目眩瞑天柱陶道崑崙主目眩又目不明目如脫腎輸内闗心輸復留太泉腕骨中渚攅竹精明百㑹委中崑崙天柱本神大杼頷厭通谷曲泉後頂胃輸絲竹空主目􅉩􅉩不明惡風寒陽白主目瞳子痛癢逺視􅉩􅉩昏夜無所見掖門前谷後谿腕骨神庭百㑹天柱風池天牖心輸主目泣出又云天牖主目不明耳不聰至陰主目瞖後谿主眥爛有瞖丘墟主視不精了目瞖子瞳不見前谷京骨主目中白瞖又云京骨主目反白白瞖從内眥始精明齗交承泣四白風池巨窌瞳子窌上星肝輸主目淚出多眵䁾内眥赤痛癢生白膚瞖照海主目痛視如見星肝輸主熱病瘥後食五辛多患眼間如雀目陽白上星本神大都曲泉俠谿三間前谷攅竹玉枕主目系急目上挿絲竹空前頂主目上挿增風寒承泣主目瞤動與項口相引甲乙云目不明淚出目眩瞢瞳子癢逺視􅉩􅉩昏夜無見目瞤動與項口參相引喎僻口不能言三間前谷主目急痛申脉主目反上視若赤痛從内眥始陽谿陽谷主目痛赤曲泉主目赤腫痛陽谷大衝崑崙主目急痛赤腫又云大衝主下皆痛束骨主眥爛赤掖門主目澀暴變顴窌内闗主目赤黄二間主眥傷商陽巨窌上闗承光童子窌絡却主青盲無所見期門主目青而嘔風池腦户玉枕風府上星主目痛不能視先取譩譆後取天牖風池大泉主目中白晴青俠谿主外眥赤痛逆寒泣出目癢鼻病神庭攅竹迎香風門合谷至陰通谷主鼻􅍠清涕出曲差上星迎香素窌水溝齗交通天禾窌風府主鼻窒喘息不利鼻喎僻多涕􅍠䘐有瘡水溝天牖主鼻不收涕不知香臭甲乙云鼻䘐不得息及䘐不止齗交主鼻中息肉不利鼻頭額頞中痛鼻中有蝕瘡承靈風池風門譩譆後谿主鼻䘐窒喘息不通腦空竅陰主鼻管疽發為癘鼻風門五處主時時􅅉不已肝輸主鼻中酸中管三間偏􅍓厲兊承筋京骨崑崙承山飛揚隱白主頭熱鼻􅍠䘐又云中管主鼻間焦􅆨天柱主不知香臭復留主涎出鼻孔中痛京骨申脉主鼻中䘐血不止淋濼厲兊京骨前谷主鼻不利涕黄耳病上闗下闗四白百㑹顱息翳風耳門頷厭天窻陽谿闗衝掖門中渚主耳痛鳴聾天容聽㑹聽宫中風主聾嘈嘈若蟬鳴天牖四瀆主暴聾少商主耳前痛曲池主耳痛外闗㑹宗主耳渾渾淳淳聾無所聞前谷後谿主耳鳴仍取偏􅍓大陵腕骨陽谷肩貞竅陰俠谿主頷痛引耳嘈嘈耳鳴無所聞商陽主耳中風聾鳴刺入一分留一呼灸三壯左取右右取左如食頃口病承泣四白巨窌禾窌上闗大迎顴骨强間風池迎香水溝主口喎僻不能言頰車顴窌主口僻痛惡風寒不可以嚼外闗内庭三里大泉甲乙云口僻刺大淵引而下之商丘主僻噤水溝齗交主口不能禁水漿喎僻齗交上闗大迎翳風主口噤不開引鼻中合谷水溝主脣吻不收瘖不能言口噤不開商丘曲鬢主口噤不開地倉大迎主口緩不收不能言下闗大迎醫風主口失欠下牙齒痛膽輸商陽小腸輸主口舌乾食飲不下勞宫少澤三間大衝主口熱口乾口中爛又云勞宫主大人小兒口中腫腥曲澤章門主口乾大谿少澤主咽中乾口中熱唾如膠兊端目窻正營耳門主脣吻强上齒齲痛陽陵泉主口苦嗌中介介然光明臨泣主喜齧頰京骨陽谷主自齧脣一作頰解谿主口痛齧舌舌病亷泉然谷甲乙作通谷陰谷主舌下腫難言舌瘲涎出風府主舌緩瘖不能言舌急語難扶突大鍾竅陰主舌本出血魚際主舌上黄身熱尺澤主舌乾脅痛闗衝主舌捲口乾心煩悶中衝主舌本痛支溝天窻扶突曲鬢靈道主暴瘖不能言天突主俠舌縫脉青復留主舌捲不能言齒病厲兊三間衝陽偏􅍓小海合谷内庭復留主齲齒浮白主牙齒痛不能言大迎顴窌聽㑹曲池主齒痛惡寒陽谷正營主上牙齒痛陽谷掖門商陽二間四瀆主下牙齒痛角孫頰鼻主牙齒不能嚼下闗大迎翳風完骨主牙齒齲痛曲鬢衝陽主齒齲喉咽病風府天窻勞宫主喉嗌病扶突天突天谿主喉鳴暴忤氣哽少商大衝經渠主喉中鳴魚際主喉中焦乾水突主喉咽腫掖門四瀆主呼吸短氣咽中如息肉狀間使主嗌中如扼甲乙作行間少衝主酸咽少府蠡溝主嗌中有氣如息肉狀中渚支溝内庭主嗌痛復留照海大衝中封主嗌乾前谷照海中封主咽偏腫不可以咽涌泉大鍾主咽中痛不可内食然谷大谿主嗌内腫氣走咽喉而不能言風池主喉咽僂引項攣不收喉痺完骨天牖前谷主喉痺頸項腫不可俛仰頰腫引耳後中府陽交主喉痺胷滿塞寒熱天容缺盆大杼膈輸雲門尺澤二間厲兊涌泉然谷主喉痺哽咽寒熱天鼎氣舍膈輸主喉痺哽噎咽腫不得消食飲不下天突主喉痺咽乾急大陵偏歷主喉痺嗌乾旋機鳩尾主喉痺咽腫水漿不下三間陽谿主喉痺咽如哽神門合谷風池主喉痺三里温留曲池中渚豐隆主喉痺不能言闗衝竅陰少澤主喉痺舌捲口乾凡喉痺脅中暴逆先取衝脉後取三里雲門各瀉之又刺手小指端出血立已備急千金要方卷九十
