body:
  text: 備急千金要方卷七唐孫思邈撰宋林億等校正婦人方赤白帯下崩中漏下第二十論法方灸論曰諸方説三十六疾者十二癥九痛七害五傷三痼不通是也何謂十二癥是所下之初一曰狀如膏二曰如黒血三曰如紫汁四曰如赤肉五曰如膿痂六曰如豆汁七曰如葵羮八曰如凝血九曰如清血血似水十曰如米泔十一曰如月浣乍前乍却十二曰經度不應期也何謂九痛一曰隂中痛傷二曰隂中淋瀝痛三曰小便即痛四曰寒冷痛五曰經來即腹中痛六曰氣滿痛七曰汁出隂中如有蟲嚙痛八曰脇下分痛九曰腰胯痛何謂七害一曰窮孔痛不利二曰中寒熱痛三曰小腹急堅痛四曰藏不仁五曰子門不端引背痛六曰月浣乍多乍少七曰害吐何謂五傷一曰兩脇支滿痛二曰心痛引脇三曰氣結不通四曰邪思洩利五曰前後痼寒何謂三痼一曰羸瘦不生肌膚二曰絶産乳三曰經水閉塞病有異同具治之方白堊圓治女人三十六疾方又方見後白堊龍骨芍藥各十八銖黄連當歸茯苓黄芩瞿麥白歛石韋甘草牡蠣細辛附子禹餘糧白石脂人參烏賊骨藁本甘皮大黄已上各半兩右二十一味為末蜜和丸如梧子大空腹飲服十丸日再不知加之二十日知一月百病除若十二癥倍牡蠣禹餘糧烏賊骨白石脂龍骨若九痛倍黄連白斂甘草當歸若七害倍細辛藁本甘皮加椒茱萸各一兩若五傷倍大黄石韋瞿麥若三痼倍人參加赤石脂礬石巴㦸天各半兩合藥時隨病増減之治女人腹中十二疾一曰經水不時二曰經來如清水三曰經水不通四曰不周時五曰生不乳六曰絶無子七曰隂陽減少八曰腹苦痛如刺九曰隂中寒十曰子門相引痛十一曰經來凍如葵汁狀十二曰腰急痛凡此十二病得之時因與夫卧起月經不去或卧濕冷地及以冷水洗浴當時取快而後生百病或瘡痍未瘥便合隂陽及起早作勞衣單席薄寒從下入方赤石脂半夏各一兩六銖蜀椒乾薑吳茱萸當歸桂心丹參白斂防風各一兩雚蘆半兩右十一味為末蜜和丸如梧子大毎日空心酒服十丸日三不知稍加以知為度白石脂圓治婦人三十六疾胞中痛漏下赤白方白石脂烏賊骨禹餘糧牡蠣各十八銖赤石脂乾地黄乾薑龍骨桂心石韋白斂細辛芍藥黄連附子當歸黄芩蜀椒鍾乳白芷芎藭甘草各半兩右二十二味為末蜜和丸如梧子大每日空心酒下十五丸日再一方有黄蘗半兩小牛角䚡散治帶下五賁一曰熱病下血二曰寒熱下血三曰經脉未斷為房事則血漏四曰經來舉重傷任脉下血五曰産後臟開經利五賁之病外實内虚方牛角䚡一枚燒令赤鹿茸禹餘糧當歸乾薑續斷各二兩阿膠三兩烏賊骨龍骨各一兩赤小豆二升右十味治下篩空腹以酒服方寸匕日三千金翼無鹿茸烏賊骨龍骨散治淳下十二病絶産一曰白帶二曰赤帶三曰經水不利四曰隂胎五曰子藏堅六曰藏癖七曰隂陽患痛八曰内强九曰腹寒十曰藏閉十一曰五藏酸痛十二曰夢與鬼交冝服之淳下一本作腹下龍骨三兩黄蘗半夏竈中黄土桂心乾薑各二兩石韋滑石各一兩烏賊骨代赭各四兩白殭蠶五枚右十一味治下篩酒服方寸匕日三白多者加烏賊骨殭蠶各二兩赤多者加代赭五兩小腹冷加黄蘗二兩子藏堅加乾薑桂心各二兩已上各隨病増之服藥三月有子即住藥藥太過多生兩子當審方取好藥寡婦童女不可妄服治女人帶下諸病方大黄蒸三斗米下附子茯苓牡蒙牡丹桔梗葶藶各三兩厚朴芎藭人參當歸蝱蟲蜀椒吳茱萸柴胡乾薑桂心各半兩細辛二兩半右十八味為末蜜和丸如梧子大每日空心酒服二丸不知加之以腹中温温為度一本有麻子三兩澤蘭半兩而無蜀椒葶藶治帶下百病無子服藥十四日下血二十日下長蟲及青黄汁出三十日病除五十日肥白方大黄破如豆粒熬令黒色柴胡朴硝各一斤芎藭五兩乾薑蜀椒各一升茯苓如雞子大一枚右七味為末蜜丸如梧子大先食米飲服七丸不知加至十丸以知為度治帶下方枸把根一斤生地黄五斤右二味㕮咀以酒一斗煮取五升分為三服水煮亦得治婦人及女子赤白帶下方禹餘糧當歸芎藭各一兩半赤石脂白石脂阿膠龍骨石韋一兩六銖烏賊骨黄蘗白斂黄芩一用黄連續斷桑耳牡蠣各一兩右十五味為末蜜丸如梧子大空心飲下十五丸日再加至三十丸為度白馬蹄圓治女人下焦寒冷成帶下赤白浣方白馬蹄鼈甲鯉魚甲龜甲蜀椒各一兩磁石甘草杜仲萆薢當歸續斷芎藭禹餘糧桑耳附子各二兩右十五味為末蜜丸梧子大以酒服十丸加至三十丸日三服一本無龜甲白馬䭷散治帶下方下白者取白馬䭷下赤者取赤馬䭷隨色取之白馬䭷二兩龜甲四兩鼈甲十八銖牡蠣一兩十八銖右四味治下篩空心酒下方寸匕日三服加至一匕半治五色帶下方服大豆紫湯日三服方見别卷又方燒馬左蹄為末以酒服方寸匕日三服又方燒狗頭和毛皮骨為末以酒服方寸匕又方煮甑帶汁服一杯良又方燒馬蹄底䕶乾為末以酒服之方寸匕日三雲母芎藭散衞公治五崩身瘦欬逆煩滿少氣心下痛面生瘡腰痛不可俯仰隂中腫如有瘡狀毛中癢時痛與子藏相通小便不利常拘急頭眩頸項急痛手足熱氣逆衝急心煩不得卧腹中急痛食不下吞醋噫苦上下腸鳴漏下赤白青黄黒汁大臭如膠汚衣狀皆是内傷所致中寒即下白熱即下赤多飲即下黒多食即下黄多藥即下青或喜或怒心中常恐或憂勞便發動大惡風寒方雲母芎藭代赭東門邊木燒各一兩白殭蠶烏賊骨白堊蝟皮各六銖鼈甲一作龜甲桂心伏龍肝生鯉魚頭各十八銖右十二味治下篩酒服方寸匕日三夜一一方有龍骨乾葛慎火草散治崩中漏下赤白青黒腐臭不可近令人面黒無顔色皮骨相連月經失度徃來無常小腹弦急或苦絞痛上至心兩脇腫脹食不生肌膚令人偏枯氣息乏少腰背痛連脇不能久立每嗜卧困懶又方見後慎火草白石脂禹餘糧鼈甲乾薑細辛當歸芎藭石斛芍藥牡礪各二兩黄連薔薇根皮乾地黄各四兩熟艾桂心各一兩右十六味治下篩空腹酒服方寸匕日三稍加至二匕若寒多者加附子椒熱多者加知母黄芩各一兩白多者加乾薑白石脂赤多者加桂心代赭各二兩禹餘糧圓治崩中赤白不絶困篤方禹餘糧五兩白馬蹄十兩龍骨三兩鹿茸二兩烏賊魚骨一兩右五味為末蜜丸梧子大以酒服二十丸日再以知為度増損禹餘糧圓治女人勞損因成崩中狀如月經來去多不可禁止積日不斷五臟空虚失色黄瘦崩竭暫止少日復發不耐動搖小勞輙劇治法且宜與湯未宜與此丸也發時服湯減退即與此丸若是疾久可以長與此方禹餘糧龍骨人參桂心紫石英烏頭寄生杜仲五味子逺志各二兩澤㵼當歸石斛蓯蓉乾薑各三兩蜀椒牡蠣甘草各一兩右十八味為末蜜丸梧子大空心酒下十丸漸加至二十丸日三服治女人白崩及痔病方槐耳白斂艾葉蒲黄白芷各二兩黄耆人參續斷當歸禹餘糧橘皮茯苓乾地黄蝟皮各三兩牛角䚡四兩豬後懸蹄二十箇白馬蹄四兩酒浸一宿熬右十七味為末蜜丸每日空心酒下二十丸日二加之治婦人忽暴崩中去血不斷或如鵞鴨肝者方小薊根六兩當歸阿膠續斷青竹茹芎藭各三兩生地黄八兩釡月下土絹裹地榆各四兩馬通一升赤帯用赤馬白帶用白馬右十味㕮咀以水八升和馬通汁煮取三升分三服不止頻服三四劑未全止續服後丸方續斷甘草地榆鹿茸小薊根丹參各三十銖乾地黄二兩半芎藭赤石脂阿膠當歸各一兩半龜甲秦牛角䚡各三兩剉熬令黒栢子仁一兩集驗作栢葉右十四味為末蜜丸梧子大空心以酒服十丸日再後稍加至三十丸治女人崩中去赤白方白馬蹄五兩蒲黄鹿茸禹餘糧白馬鬐毛小薊根白芷續斷各四兩人參乾地黄栢子仁烏賊骨黄耆茯苓當歸各三兩艾葉蓯蓉伏龍肝各二兩右十八味為末蜜丸如梧子大空心飲服二十丸日再加至四十丸當歸湯治崩中去血虚羸方當歸芎藭黄芩芍藥甘草各二兩生竹茹二升右六味㕮咀以水一斗煮竹茹取六升去滓内諸藥煎取三升半分二服忌勞動嗔怒禁百日房事治崩中晝夜十數行衆醫所不能瘥者方芎藭八兩㕮咀以酒五升煮取三升分三服不飲酒者水煮亦得治崩中下血出血一斛服之即斷或月經來過多及過期不來者服之亦佳方吳茱萸當歸各三兩芎藭人參芍藥牡丹桂心阿膠生薑甘草各二兩半夏八兩麥門冬一升右十二味㕮咀以水一斗煮取三升分為三服治暴崩中去血不止方牡蠣兎骨各二兩半灸右二味治下篩酒服方寸匕日三治女人白崩方芎藭桂心阿膠赤石脂小薊根各二兩乾地黄四兩伏龍肝如雞子大七枚右七味㕮咀以酒六升水四升合煮取三升去滓内膠令烊盡分三服日三千金翼止六味無伏龍肝伏龍肝湯治崩中去赤白或如豆汁方伏龍肝如彈丸七枚生薑五兩生地黄四升一方五兩甘草艾葉赤石脂桂心各二兩右七味㕮咀以水一斗煮取三升分四服日三夜一大牛角中仁散治積冷崩中去血不止腰背痛四肢沉重虚極方牛角仁一枚燒續斷乾地黄桑耳白术赤石脂礬石乾薑附子龍骨當歸各三兩人參一兩蒲黄防風禹餘糧各二兩右十五味治下篩以温酒未食服方寸匕日三不知稍加治崩中去血積時不止起死方肥羊肉三斤乾薑當歸各三兩生地黄二升右四味㕮咀以水二斗煮羊肉取一斗三升下地黄汁及諸藥煮取三升分四服即斷尤冝羸瘦人服之生地黄湯治崩中漏下日去數升方生地黄一斤細辛三兩右二味㕮咀以水一斗煮取六升服七合久服佳治崩中漏下赤白不止氣虚竭方龜甲牡蠣各三兩右二味治下篩酒服方寸匕日三又方燒亂髮酒和服方寸匕日三又方桑耳二兩半鹿茸十八銖右二味以醋五升漬灸燥漬盡為度治下篩服方寸匕日三又方燒鹿角為末酒服方寸匕日三又方燒桃核為末酒服方寸匕日三又方地榆知母右二味各指大長一尺者㕮咀以醋三升東向竈中治極濃去滓服之又方桑木中蜴屎燒灰酒服方寸匕治崩中下血羸瘦少氣調中補虚止血方澤蘭蜀椒二兩六銖藁本栢子仁山茱萸厚朴各十八銖乾地黄牡蠣各一兩半代赭桂心防風細辛乾薑各一兩甘草當歸芎藭各一兩十八銖蕪荑半兩右十七味治下篩空心温酒服方寸匕日三神良一方加白芷龍骨各十八銖人參一兩十八銖為二十味治崩中方白茅根三斤小薊根五斤右二味㕮咀以水五斗煎取四斗稍稍服之外臺用酒煎丹參酒治崩中去血及産餘疾方丹參艾葉地黄忍冬地榆各五斤右五味剉先洗臼熟舂以水漬三宿出滓煮取汁以黍米一斛炊飯釀酒酒熟窄之初服四合後稍稍添之牡丹皮湯治崩中血盛併服三劑即瘥方牡丹皮乾地黄斛脉各三兩禹餘糧艾葉龍骨栢葉厚朴白芷伏龍肝青竹茹芎藭地榆各二兩阿膠一兩芍藥四兩右十五味㕮咀以水一斗五升煮取五升分五服相去如人行十里久再服治崩中單方燒牛角末以酒服方寸匕日三服亦治帶下又方桑耳燒令黒為末酒服方寸匕日二服亦治帶下又方生薊根一斤半𢷬取汁温服亦可酒煮服之又方羊􅏬一具以酢煮去血服之即止忌猪魚鮓滑物犯之便死亦治帶下治白崩方灸小腹横文當臍孔直下百壯又灸内踝上三寸左右各百壯論曰治漏血不止或新傷胎及産後餘血不消作堅使胞門不閉淋瀝去血經踰日月不止者未可以諸斷血湯冝且與牡丹丸散等待血堅消便停也堅血消者所去淋瀝便自止亦漸變消少也此後有餘傷毁不復處此乃可作諸主治耳婦人産乳去血多傷胎去血多崩中去血多金瘡去血多㧞牙