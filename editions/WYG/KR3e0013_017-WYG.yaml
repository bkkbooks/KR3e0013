front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0013_WYG_017-1a, image: WYG0735/WYG0735-0201a.png}
body:
  text: 備急千金要方卷十七唐孫思邈撰宋林億等校正七竅病方口病第三論法方灸論曰凡患口瘡及齒禁油麫酒醬酸酢鹹膩乾􅀥瘥後仍須慎之若不久慎尋手再發發即難瘥薔薇根角蒿為口瘡之神藥人不知之也治口中面上息肉轉大方以刀決潰去膿血即愈治口中瘡久不瘥入胸中並生瘡三年已上不瘥者方濃煎薔薇根汁含之又稍稍咽之日三夜一冬用根夏用莖葉又方角蒿灰傅之一宿知二宿瘥有汁吐之不得咽也治口瘡不歇方牛膝生蘘荷根各三兩黄蘗一兩右三味㕮咀以綿裹酒三升漬一宿微火煎一兩沸細細含之升麻煎治膀胱熱不已口舌生瘡咽腫方升麻𤣥參薔薇根白皮射干各四兩大青黄蘗各三兩蜜七合右七味㕮咀以水七升煮取一升五合去滓下蜜更煎兩沸細細含咽之治口數生瘡連年不瘥方薔薇根黄芩當歸桔梗黄耆白歛大黄鼠李根皮芍藥續斷黄蘗葛根各一兩右十二味為末以酒服方寸匕日二亦可漿水服之治胃中客熱脣口乾燥生瘡方茯苓黄芩甘草大黄薔薇根各十三銖枳實杏仁黄連各一兩桂心半兩栝蔞根十八銖右十味為末食前漿水服方寸匕日二治口熱生瘡方升麻三十銖黄連十八銖又古今録驗作黄蘗右二味為末綿裹含咽汁亦可去之治口瘡方黄蘗二兩升麻三兩生地黄五兩薔薇根皮四兩右四味㕮咀以水七升煮取三升去滓含之瘥止含極吐却更含治口中瘡爛痛不得食方甘草一寸黄連六銖杏仁二十枚右三味為末合和綿裹杏仁大含之勿咽日三夜一薔薇圓治口中瘡身體有熱氣痱瘰方薔薇根黄芩鼠李根當歸葛根白斂黄蘗石龍芮翼作黄連芍藥續斷黄耆各一兩栝蔞根二兩右十二味為末蜜和丸如梧子服十丸日三千金翼有黄連一兩治口吻瘡方以楸白皮及濕帖之三四度瘥又方取經年葵根欲腐者彌佳燒作灰及熱傅之良又方以新炊飯了甑及熱以脣口向甑脣上熨之二七下三兩上瘥止又方梔子甘草各十八銖細辛三十銖桂心十二銖芎藭一兩右五味為末蜜丸食後服七丸日再服瘥又方芎藭白芷橘皮桂心􅀥肉各一兩半右五味為末蜜和為丸食後服十五丸又含之以瘥為度此方甚驗治口肥瘡方􅆈竈上飯令焦末傅之治鷰吻瘡方白楊枯枝鐵上燒取􅢧及熱傅之又方以木履尾内煻灰中令熱取拄兩吻各二七遍治口傍惡瘡方亂髮灰故絮灰黄連末乾薑末右四味等分合和為散以粉瘡上不過三遍即愈治口中瘡咽喉塞不利口燥膏方猪膏白蜜各一斤黄連一兩右三味合煎去滓攪令相得含如半棗大日四五夜二治熱病口爛咽喉生瘡水漿不得入膏方當歸射干升麻各一兩附子半兩白蜜四兩右五味㕮咀以猪脂四兩先煎令成膏下著地勿令大熱内諸藥微火煎令附子色黄藥成絞去滓内蜜復上火一兩沸令相得置器中令凝取如杏仁大含之日四五遍輙咽之治失欠頰車蹉開張不合方一人以手指牽其頥以漸推之則復入矣推當疾出其指恐誤嚙傷人指也治失欠頰車蹉方消蠟和水傅之善又方灸背第五椎一日二七壯滿三日未瘥灸氣衝二百壯胸前喉下甲骨中是亦名氣堂又方又灸足内踝上三寸宛宛中或三寸五分百壯三報此三隂交穴也治卒口噤不開方以附子𢷬末内管中强開口吹口中甘草圓治口中熱乾方甘草人參半夏生薑烏梅肉各一兩半棗膏二兩半右六味為末蜜丸如彈子大旋含咽日三治口乾方羊脂若猪脂雞子大擘之内半升酢中漬一宿絞取汁含之治口乾除熱下氣方石膏五合碎蜜二升右二味以水三升煮石膏取二升内蜜煮取二升去滓含如棗核大咽汁盡更含之治虚勞口乾方麥門冬二兩末大􅀥三十枚肉右二味以蜜一升和令熟五升米下蒸之任性服又方羊脂如雞子大醇酒半升棗七枚擘合漬七日取棗食之立愈又方酸􅀥一升酸石榴子烏梅各五合栝蔞實葛根甘草各三兩麥門冬四兩覆盆子三合右八味為末以蜜丸含如棗大以潤為度五香圓治口及身臭令香止煩散氣方豆蔲丁香藿香零陵香青木香白芷桂心各一兩香附子二兩甘松香當歸各半兩㯽榔二枚右十一味為末蜜和丸常含一丸如大豆許咽汁日三夜一亦可常含咽之五日口香十日遍體香二七日衣被香三七日下風人聞香四七日洗手水落地香五七日把他手亦香慎五辛下氣去臭含香圓治口氣臭穢宜常服之方丁香半兩甘草三兩芎藭一兩細辛桂心各一兩半右五味為末蜜和丸如彈子大臨卧時服二丸又方常以月旦日未出時從東壁取步七步囘頭向垣立含水噀壁七遍口即美香又方桂心甘草細辛橘皮右四味等分治下篩以酒服一錢匕瘥止又方棗肉八兩芎藭白芷橘皮桂心各四兩右五味為末次内􅀥肉乾則加蜜和丸如大豆許且服十丸食前食後常含之或吞之七日大香治口中臭方桂心古今録用細辛甘草各等分右二味為末臨卧以指撮許酒服二十丸即香又方細辛豆蔲含之甚良又方蜀椒桂心各等分右二味為末酒服三指撮許主口香去臭方甘草三十銖白芷十八銖芎藭二十四銖右三味治下篩以酒服方寸匕日三服三十日口香又方大􅀥𤓰子仁松根白皮右三味治下篩以酒服方寸匕日二服一百日衣被香又方𤓰子仁芎藭藁本當歸杜蘅各六銖細辛半兩防風二兩右七味治下篩食後飲服方寸匕日三服五日口香十日身香二十日肉香三十日衣被香五十日逺聞香一方加白芷十八銖又方橘皮二十銖桂心十八銖木蘭皮一兩大棗二十枚右四味治下篩酒服方寸匕日三久服身香亦可以􅀥肉丸之服二十丸如梧子大稍加至三十丸一方有芎藭十八銖又方濃煮細辛汁含之久乃吐之又方井花水三升漱口吐厠中良又方香薷一把水一斗煎取三升稍稍含之又方甜𤓰子作末蜜和丸如棗核大毎日空心洗漱訖含一丸亦傅齒又方􅆈大豆令焦及熱酢沃取汁含之治七孔臭氣皆令香方沈香五兩藁本三兩白𤓰瓣半升丁香五合甘草當歸芎藭麝香各二兩右八味為末蜜丸如小豆大食後服五丸日三久服令舉身皆香治身體臭令香方治身體臭令香方甘子皮白芷各一兩半𤓰子仁三兩藁本當歸細辛桂心各一兩右七味治下篩酒服方寸匕日三服五日口香三七日身香又方甘草松根皮大􅀥甜𤓰子各等分右四味治下篩食後服方寸匕日三七日知百日大香薫衣香方零陵香丁香青桂皮青木香雞骨煎香鬱金香楓香各三兩薫陸香蘇合香甘松香甲香各二兩沈水香五兩雀頭香白檀香安息香艾納香藿香各一兩麝香半兩右十八味為末蜜二升半煮肥􅀥四十枚令爛熟以手痛搦令爛如粥以生布絞去滓用和香乾濕如捺麨𢷬五百杵成丸蜜封七日乃用之以微火燒之以盆水内籠下以殺火氣不爾必有焦氣也又方沈香煎香各五兩雀頭香丁子香藿香各一兩右五味治下篩内麝香末半兩粗羅臨薫衣時蜜和用又方薫陸香沈香檀香兠婁婆香煎香甘松香零陵香藿香各一兩丁香十八銖棗肉八兩苜蓿香二兩右十一味粗下篩合棗肉再𢷬量加蜜和用之善濕香方沈香二斤七兩九銖甘松香檀香雀頭香一作藿香雞骨煎香甲香零陵香丁香各三兩九銖麝香二兩九銖薫陸香三兩六銖右十味為末臨用時以蜜和若預和味歇不中又方沈香三兩零陵香煎香麝香各一兩半丁子香藿香各半兩甲香檀香各三銖薫陸香甘松香六銖右十味粗下篩蜜和用薫衣時缾盛埋之久窨佳百和香通道俗用者方沈水香五兩丁子香雞骨香兠婁婆香甲香各三兩薫陸香白檀香熟㨗香炭末各二兩零陵香青桂皮青木香甘松香白漸香柴也藿香各一兩雀頭香蘓合香安息香麝香燕香各半兩右二十味為末酒灑令輭再宿酒氣歇以白蜜和内甆器中蠟紙封勿令氣洩冬月開取用大佳裛衣香方丁子香一兩苜蓿香二兩甘松香茅香各三兩藿香零陵香各四兩右六味各𢷬加澤蘭葉四兩粗下篩用之極美又方零陵香二兩藿香甘松香苜蓿香煎香白檀香沈水香各一兩右七味合𢷬加麝香半兩粗下篩用如前法良又方藿香四兩丁香七枚甘松香麝香沈香煎香右六味粗下篩和為乾香取裛衣大佳備急千金要方卷十七
