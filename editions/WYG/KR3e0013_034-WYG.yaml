  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0013_WYG_034-1a, image: WYG0735/WYG0735-0342a.png}
body:
  text: 備急千金要方巻三十四唐孫思邈撰宋林億等校正傷寒方傷寒不發汗變成狐惑病第十三論方論曰狐惑之病其氣如傷寒黙黙欲眠目不得閉起卧不安其毒在喉咽為惑病在隂肛者為狐病狐惑之病並惡飲食不欲食聞食臭其面目翕赤翕白翕黒毒食於上者則聲喝也喝一作嗄毒食下部者則乾咽也此由温毒氣所為食于上者㵼心湯主之食於下者苦參湯淹洗之食于肛外者熏之并用雄黄三片稍置瓦缾中炭火燒向肛熏之并服湯也治狐惑湯黄連四兩薫草四兩右二味㕮咀白酢漿一斗漬一宿煮取二升分為三服赤小豆當歸散其人脉數無熱微煩黙黙但欲卧汗出初得之三四日眼赤如鳩眼得之七八日其四眥黄黒能食者膿已成也治之之方以赤小豆三升漬之令生芽足乃復乾之加當歸三兩為末漿水服方寸匕日三即愈㵼心湯其病形不可攻不可灸因火為邪血散脉中傷脉尚可傷臟則劇井輸益腫黄汁出經合外爛肉腐為癰膿此為火疽醫所傷也夫脉數者不可灸因火為邪即為煩因虚逐實血走脉中火氣雖微内攻有力焦骨傷筋血難復也應在瀉心瀉心湯兼治下痢不止腹中愊堅而嘔吐腸鳴者方仲景名半夏瀉心要略名甘草瀉心半夏半升黄芩人參乾薑甘草各三兩黄連一兩大􅀥十二枚右七味㕮咀以水一斗煮取六升分服一升日三傷寒發黄第十四論灸證針圖方論曰黄有五種有黄汗黄疸榖疸酒疸女勞疸黄汗者身體四肢微腫胸滿不渇汗出如黄蘗汁良由大汗出卒入水中所致黄疸者一身面目悉黄如橘柚暴得熱以冷水洗之熱因留胃中食生黄𤓰熏上所致若成黒疸者多死榖疸者食畢頭眩心忪怫鬰不安面發黄由失饑大食胃氣衝熏所致酒疸者心中懊痛足脛滿小便黄面發赤斑黄黒由大醉當風入水所致女勞疸者身目皆黄發熱惡寒小腹滿急小便難由大勞大熱而交接竟入水所致但依後方治之黄汗之為病身體洪腫發熱汗出不渇狀如風水汗染衣色正黄如蘗汁其脉自沈從何得之此病以汗出入水中浴水從汗孔入因而得之黄耆芍藥桂酒湯治黄汗方黄耆五兩芍藥三兩桂心三兩右三味㕮咀以苦酒一升水七升合煎取三升飲一升當心煩也至六七日稍稍自除心煩者苦酒阻故也黄疸之病疸而渇者其病難治疸而不渇其病可治發於隂部其人必嘔發于陽部其人振寒而㣲熱桂枝黄耆湯治諸病黄疸宜利其小便假令脉浮當以汗解方桂枝芍藥生薑各三兩甘草二兩黄耆五兩大􅀥十二枚右六味㕮咀以水八升微火煎取三升去滓温服一升發微汗須臾不汗者飲稀熱粥以助湯若不汗更服湯麻黄醇酒湯治傷寒熱出表發黄疸方麻黄三兩以醇酒五升煮取一升半盡服之温覆汗出即愈冬月寒時用清酒春月宜用水治黄疸方𤓰蔕秫米赤小豆各二七枚右三味治下篩病重者取如大豆二枚内著鼻孔中痛縮鼻須臾當出黄汗或從口中出汁升餘則愈病輕者如一豆不瘥間日復用又下里間以筒使人極吹鼻中無不死大慎之刪繁療天行毒熱通貫臟腑沈㐲骨髓之間或為黄疸黒疸赤疸白疸榖疸馬黄等病喘息須臾不絶也大黃圓治同前大黄葶藶子各二兩右二味為末蜜和丸如梧子大未食服十丸日三病瘥止又方大黄二兩黄連三兩黄蘗黄芩各一兩麴衣五合右五味為末蜜和丸如梧子大先食服三丸日三不知加至五丸茵蔯湯治黄疸身體面目盡黄方茵蔯黄連各三兩黄芩二兩大黄甘草人參各一兩梔子二十七枚右七味㕮咀以水一斗煮取三升分三服日三亦治酒疸酒癖三黄散治同前大黄黄連黄芩各四兩右三味治下篩先食服方寸匕日三亦可為丸五苓散治黄疸利小便方豬苓茯苓澤瀉白术桂心各三十銖右五味𢷬篩為散渇時水服方寸匕極飲水即利小便及汗出愈此方與第九巻方相重以分兩不同故重出秦椒散治黄疸飲少溺多方秦椒六銖𤓰蔕半兩右二味治下篩水服方寸匕日三小半夏湯治黄疸小便色不異欲自利腹滿而喘者不可除熱熱除必噦方半夏生薑各半斤右二味㕮咀以水七升煮取一升五合分再服有人常積氣結而死其心上暖以此湯少許汁入口遂活治黄疸方取生小麥苖𢷬絞取汁飲六七合晝夜三四飲三四日便愈無小麥穬麥亦得用之治黄疸變成黒疸醫所不能治者方土𤓰根𢷬汁一小升頓服日一平旦服至食時病從小便出先須量病人力不得多服力衰則起不得治發黄身面目悉黄如金色小便如濃煮蘗汁衆醫不能療者方茵蔯梔子各四兩黄芩大黄柴胡升麻各三兩龍膽二兩右七味㕮咀以水八升煮取二升七合分三服若身體羸去大黄加梔子五六兩生地黄一升延年録無茵蔯有梔子四兩栝蔞三兩芒硝二兩近效方加枳實二兩夫黄發已久變作桃皮色心下有堅嘔逆不下飲食小便極赤色少四肢逆冷脉深沉極微細遲者不宜服此方得下必變啘也宜與大茵蔯湯除大黄與生地黄五兩服湯盡消息看脉小浮出形小見不甚沈微便可治也脉浮見者黄當明不復作桃皮色心下自寛也大茵蔯湯方次出後十一味者是苦參散治人無漸忽然振寒發黄皮膚黄麴塵出小便赤少大便時閉氣力無異食飲不妨已服諸湯散餘熱不除久黄者宜吐下方苦參黄連𤓰蔕黄蘗大黄各一兩葶藶二兩右六味治下篩飲服方寸匕當大吐吐者日一服不吐日再亦得下服五日知可消息不覺退更服之小折便消息之治發黄方茵蔯黄蘗梔子大黄各三兩黄連二兩石五味㕮咀以水九升煮取三升分三服先服湯後服丸方大黄五兩茵蔯梔子各三兩黄芩黄蘗黄連各二兩右六味為末以蜜丸如梧子大白飲服二十丸令微利麻黄連翹赤小豆湯治傷寒瘀熱在裏身體必發黄方麻黄連翹甘草各二兩生薑三兩大棗十二枚杏仁三十枚赤小豆一升生梓白皮切二升右八味㕮咀以勞水一斗先煮麻黄去沬次内諸藥煎取三升分三服茵蔯湯治傷寒七八日内實瘀熱結身黄如橘小便不利腹微脹滿宜下之方茵蔯六兩大黄三兩梔子四十枚右三味㕮咀以水一斗二升先煮茵蔯取五升去滓次内梔子大黄煎取三升分服一升日三小便當利如皂莢沫狀色正赤當腹減黄悉隨小便去也范注用療榖疸小品方用石膏一斤大黄黄蘗湯治發黄腹滿小便不利而赤自汗出此為表和裏實當下之方大黄三兩黄蘗芒硝各四兩梔子十五枚右四味㕮咀以水六升煮取二升去滓内芒硝復煎取一升先食頓飲之茵蔯圓治時行病急黄并瘴癘疫氣及㾬瘧之方茵蔯梔子芒硝杏仁各三兩巴豆一兩恒山鼈甲各二兩䜴五兩大黄五兩右九味為末以􅄳為丸如梧子大飲服三丸以吐利為佳不知加一丸初覺體氣有異急服之即瘥神效治急黄熱氣骨蒸兩目赤脉方芒硝一兩大黄一兩半末生地黄汁八合右三味合和一服五合日二以利為度不須二服治風疸小便或黄或白洒洒寒熱好卧不欲動方三月生艾一束𢷬取銅器中煎如漆宻封之大黄黄連凝水石栝蔞根苦參葶藶各六銖右七味六味為末以艾煎和丸如梧子大先食服五丸日二可至二十丸有熱加苦參渇加栝蔞小便澀加葶藶小便多加凝水石小便白加黄連大便難加大黄濕疸之為病始得之一身盡疼發熱面色黒黄七八日後壯熱熱在裏有血當下去之如㹠肝狀其小腹滿者急下之亦治一身盡黄目黄腹滿小便不利方礬石滑石各五兩右二味治下篩以大麥粥汁服方寸匕日三先食服之便利如血者已當汗出瘥寸口脉浮而緩浮則為風緩則為痺痺非中風四肢苦煩脾色必黄瘀熱以行跗陽脉緊而數數則為熱熱則消榖緊則為寒食則滿也尺脉浮為傷腎跗陽脉緊為傷脾風寒相薄食榖即眩榖氣不消胃中苦濁濁氣下流小便不通隂被其寒熱流膀胱身故盡黄名曰榖疸治勞疸榖疸丸方苦參三兩龍膽一兩右二味為末牛膽和為丸如梧子大先食以麥粥飲服五丸日三不知稍加之刪繁方加梔子仁三七枚以猪膽和為丸夫酒疸其脉浮者先吐之沈弦者先下之夫人病酒疸者或無熱靖言了了腹滿欲吐嘔者宜吐之方前苦參散七味者是酒疸必小便不利其候當心中熱足下熱是其證也夫酒疸下之久久為黒疸目青面黒心中如啖蒜虀狀大便正黒皮膚爪之不仁其脉浮弱雖黒微黄故云枳實大黄湯治傷寒飲酒食少飲多痰結發黄酒疸心中懊憹而不甚熱或乾嘔方枳實五枚大黄三兩豆䜴半升梔子七枚右四味㕮咀以水六升煮取二升分三服心中熱疼懊憹皆主之凝水石散治肉疸飲少小便多如白泔色此病得之從酒方凝水石白石脂栝蔞根桂心各三十銖菟絲子知母各十八銖右六味治下篩麥粥飲服五分匕日三服五日知十日瘥茯苓圓治心下縱横堅而小便赤是酒疸者方茯苓茵蔯乾薑各一兩白术熬枳實各三十銖半夏杏仁各十八銖甘遂六銖蜀椒當歸各十二銖右十味為末蜜和丸如梧子大空腹服三丸日三稍稍加以小便利為度千金翼加黄連一兩大黄十八銖名茵蔯丸治黒疸身體闇黒小便澀半夏湯治酒癖䕃胷心脹滿骨肉沉重逆害飲食乃至小便赤黄此根本虚勞風冷飲食衝心由脾胃内痰所致方半夏一升生薑黄芩茵蔯當歸各一兩前胡枳實甘草大㦸各二兩茯苓白术各三兩右十一味㕮咀以水一斗煮取三升分作三服牛膽圓治酒疸身黄麴塵出方牛膽一枚芫花一升蕘花半升𤓰蔕三兩大黄八兩右五味四味㕮咀以清酒一斗漬一宿煮減半去滓内牛膽微火煎令可丸如大豆服一丸日移六七尺不知復服一丸至八丸膈上吐膈下下或不吐而自愈大茵蔯湯治内實熱盛發黄黄如金色脉浮大滑實緊數者大發黄多是酒客勞熱食少胃中熱或温毒内熱者故黄如金色方茵蔯黄蘗各一兩半大黄白术各三兩黄芩甘草茯苓栝蔞根前胡枳實各二兩梔子二十枚右十一味㕮咀以水九升煮取三升分三服得快下消息三四日更治之茵蔯圓治氣淋臚脹腹大身體面目悉黄及酒疸短氣不得息方茵蔯天門冬梔子各四兩大黄桂心各三兩通草石膏各二兩半夏半升右八味蒸大黄通草天門冬半夏梔子曝令乾合𢷬篩蜜丸如大豆服三丸日三忌生魚以豆羮服不得用酒一方去石膏内滑石二兩不知加至十丸黄家至日晡所發熱而反惡寒此為女勞得之當膀胱急小腹滿體盡黄額上黒足下熱因作黒疸其腹臚脹而滿如欲作水狀大便必黒時溏泄此女勞疸非水也腹滿者難治硝石礬石散治女勞疸方硝石礬石各半兩右二味治下篩大麥粥汁服方寸匕日三重衣覆取汗病隨大小便出小便正黄大便正黒黄疸之為病日晡所發熱惡寒小腹急身體黄額黒大便溏黒足下熱此為女勞腹滿者難治治之方滑石石膏各等分右二味治下篩以大麥粥汁服方寸匕日三小便極利則瘥針灸黄疸法正面圖第一寅門脣裏上齗顳顬上腭中俠人舌下漿俠承巨闕隂縫上管寅門穴從鼻頭直入髮際度取通繩分為三斷繩取一分入髮際當繩頭針是穴治馬黄黄疸等病上齗裏穴正當人中及脣針三鋥治馬黄黄疸等病上腭穴入口裏邊在上縫赤白脉是針三鋥治馬黄黄疸四時等病舌下穴俠舌兩邊針治黄疸等病脣裏穴正當承漿裏邊逼齒齗針三鋥治馬黄黄疸寒暑温疫等病顳顬穴在眉眼尾中間上下有來去絡脉是針灸之治四時寒暑所苦疸氣温病等俠人中穴火針治馬黄黄疸疫通身並黄語音已不轉者俠承漿穴去承漿兩邊各一寸治馬黄急疫等病巨闕穴在心下一寸灸七壯治馬黄黄疸急疫等病上管穴在心下二寸灸七壯治馬黄黄疸等病男隂縫穴拔隂反向上灸治馬黄黄疸等病若女人玉門是穴男女針灸無在覆面圖第二風府肝輸熱府脾輸肺輸腎輸心輸跟脚後風府穴在項後入髮際一寸去上骨一寸針之治頭中百病馬黄黄疸等病熱府穴在第二節下兩傍相去各一寸五分針灸無在治馬黄黄疸等病肺輸穴從大椎數第三椎兩傍相去各一寸五分灸主黄疸通治百毒病心輸穴從肺輸數第二椎兩傍相去各一寸五分肝輸穴從心輸數第四椎兩傍相去各一寸五分脾輸穴從肝輸數第二椎兩傍相去各一寸五分腎輸穴從脾輸數第三椎兩傍相去各一寸五分脚後跟穴在白肉後際針灸隨便治馬黄黄疸寒暑諸毒等病側面圖第三耳中子頭頰裏䑀石手太陽錢孔太衝耳中穴在耳門孔上横梁是針灸之治馬黄黄疸寒暑疫毒等病頰裏穴從口吻邊入徃對頰裏去口一寸針主治馬黄黄疸寒暑温疫等病頰兩邊同法手太陽穴手小指端灸隨年壯治黄疸䑀石子頭穴還取病人手自捉臂從腕中太澤澤當作淵文向上一夫接白肉際灸七壯治馬黄黄疸等病錢孔穴度乳至臍中屈肋頭骨是灸百壯治黄疸太衝穴針灸隨便治馬黄黄疸温疫毒等病備急千金要方巻三十四
