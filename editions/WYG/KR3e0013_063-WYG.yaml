body:
  text: 備急千金要方卷六十三唐孫思邈撰宋林億等校正消渇方消渇第一論法方灸論曰凡積久飲酒未有不成消渇然則大寒凝海而酒不凍明其酒性酷熱物無以加脯灸鹽鹹此味酒客躭嗜不離其口三觴之後制不由己飲噉無度咀嚼鮓醬不擇酸鹹積年長夜酣興不解遂使三膲猛熱五臟乾燥木石猶且焦栝在人何能不渇治之愈否屬在病者若能如方節慎旬月可瘳不自愛惜死不旋踵方書醫藥實多有效其如不慎者何其所慎者有三一飲酒二房室三鹹食及麫能慎此者雖不服藥而自可無他不知此者縱有金丹亦不可救深思慎之又曰消渇之人愈與未愈常須思慮有大癰何者消渇之人必於大骨節間發癰疽而卒所以戒之在大癰也當預備癰藥以防之有人病渇利始發於春經一夏服栝蔞䜴汁得其力渇漸瘥然小便猶數甚晝夜二十餘行常至三四升極瘥不減二升也轉久便止漸食肥膩日就羸瘦咽喉脣口焦燥吸吸少氣不得多語心煩熱兩脚酸食乃兼倍於常而不為氣力者當知此病皆由虚熱所致治法可長服栝蔞汁以除熱牛乳杏酪善於補此法最有益治消渇除腸胃熱實方麥門冬茯苓黄連石膏萎㽔各八分人參龍膽黄芩各六分升麻四分枳實五分生薑屑枸杞子外臺用地骨皮栝蔞根各十分右十三味為末蜜丸如梧子大以茆根粟米汁服十丸日二若渇則與此飲至足大麻亦得飲方如左茆根切一升粟米三合右二味以水六升煑取米熟用下前藥又方栝蔞根生薑各五兩生麥門冬汁蘆根切各二升茆根切三升右五味㕮咀以水一斗煑取三升分三服茯神湯洩熱止渇治胃腑實熱引飲常渇方茯神二兩外臺作茯苓栝蔞根生麥門冬各五兩萎蕤知母各四兩生地黄六兩小麥二升大􅀥二十枚淡竹葉切三升右九味㕮咀以水三斗煑小麥竹葉取九升去滓下藥煑取四升分四服服食不問早晩但渇即進非但止治胃渇通治渇患熱者猪肚圓治消渇方猪肚一具治如食法黄連梁米各五兩栝蔞根茯神各四兩知母三兩麥門冬二兩右七味為末内猪肚中縫塞安甑中極爛蒸乘熱及藥木臼中擣可丸若硬與蜜和丸如梧子大飲服三十丸日二加至五十丸隨渇即服之又方栝蔞根麥門冬鉛丹各八分茯神一作茯苓甘草各六分右五味治下篩以漿水服方寸匕日三外臺無茯神又方黄耆茯神栝蔞根甘草麥門冬各三兩乾地黄五兩右六味㕮咀以水八升煑取二升半去滓分三服日進一劑服十劑佳浮萍圓治消渇方乾浮萍栝蔞根各等分右二味為末以人乳汁和丸如梧子空腹飲服二十丸日三三年病者三日愈治虚熱大佳治消渇日飲水一石者方鉛丹二兩附子一兩葛根栝蔞根各三兩右四味為末蜜丸如梧子飲服十丸日三渇則服之春夏減附子黄連圓治渇方黄連一斤生地黄一斤張文仲云十斤右二味絞地黄取汁浸黄連出曝燥復内汁中令汁盡乾擣末蜜丸如梧子服二十丸日三食前後無拘亦可為散以酒服方寸匕栝蔞粉治大渇祕方右深掘大栝蔞根厚削皮至白處止寸切水浸一日一夜易水經五日取出爛擣碎研之以絹袋濾如出粉法乾之水服方寸匕日三四亦可作粉粥乳酪中食之不限多少取瘥止又方栝蔞粉和雞子曝乾更擣為末水服方寸匕日三丸服亦得又方水和栝蔞散服方寸匕亦可蜜丸如梧子大服三十丸又方取七家井索近桶口結燒作灰井華水服之不過三服必瘥又方濃煑竹根汁飲之瘥止又方漬䜴汁任性多少飲之又方以青粱米煑取汁飲之以瘥止論曰夫内消之為病當由熱中所致小便多於所飲令人虚極短氣夫内消者食物皆消作小便也而又不渇正觀十年梓州刺史李文博先服白石英既久忽房道强盛經月餘漸患渇經數日小便大利日夜百行以來百方治之漸以增劇四體羸惙不能起止精神恍惚口舌焦乾而卒此病雖稀甚可畏也利時脉沉細微弱服枸杞湯即效但不能長愈服鉛丹散亦即減其間將服除熱宣補丸枸杞湯治渇而利者方枸杞枝葉一斤黄連栝蔞根甘草石膏各三兩右五味㕮咀以水一斗煑取三升分五服日三夜二劇者多合渇即飲之鉛丹散治消渇止小便數兼消中方鉛丹胡粉各二分甘草栝蔞根各十分白石脂肘後作貝母澤瀉石膏赤石脂各五分右八味治下篩酒服方寸匕日三壯人一匕半一年病者一日愈二年病者二日愈渇甚者夜二服腹痛者減之丸服亦佳毎服十丸傷多令人腹痛張文仲云腹中痛者宜漿水汁下之備急方云不宜酒者用麥汁下之古今録騐方云服此藥了經三兩日宜爛煑羊用肚空腹服之或作􅃵亦得宜常淡食之候小便數鹹苦即宜服蓯蓉丸兼煑散將息蓯蓉丸及煑散方見外臺第十一卷中茯神圓方集驗名宣補丸治腎消渇小便數者茯神黄耆人參麥門冬甘草黄連知母栝蔞根各三兩莵絲子三合蓯蓉四兩石膏乾地黄各六兩右十二味為末以牛膽三合和蜜丸如梧子以茆根湯服三十丸日二服漸加至五十丸酸􅀥圎治口乾燥内消方酸􅀥一升五合酢安石榴子乾五合覆盆子葛根各三兩栝蔞根茯苓各三兩半麥門冬四兩石蜜四兩半桂心一兩六銖烏梅十枚右十味為末蜜丸口含化不限晝夜以口中津液為度盡復取含無忌治消中日夜尿七八升者方右用鹿角灸令焦末以酒服五分匕日三漸加至方寸匕又方葵根如五升盆大兩束外臺云五大斤以水五斗煮取三斗宿不食平旦一服三升又方漚麻汁服一升佳論曰强中之病者莖長興盛不交精液自出也消渇之後即作癰疽皆由石熱凡如此等宜服猪腎薺苨湯制腎中石熱也乂宜服白鴨通湯方見下解石毒篇猪腎薺苨湯方猪腎一具大豆一升薺苨石膏各三兩人參茯神一本作茯苓磁石綿裹知母葛根黄芩甘草栝蔞根各二兩右十二味㕮咀以水一斗五升先煮猪腎大豆取一斗去滓下藥煮取三升分三服渇及飲之下膲熱者夜輙合一劑病勢漸歇即止增損腎瀝湯治腎氣不足消渇小便多腰痛方羊腎一具逺志人參澤瀉桂心當歸茯苓龍骨乾地黄黄芩甘草芎藭各二兩五味子五合生薑六兩大􅀥二十枚麥門冬一升右十六味以水一斗五升先取羊腎取一斗二升次下諸藥散取三升分三服治下膲虚熱注脾胃從脾注肺好渇利方竹葉切三升甘草三兩栝蔞根生薑各五兩麥門冬茯苓各四兩大􅀥三十枚小麥地骨白皮各一升右九味㕮咀先以水三斗煮小麥取一斗去滓澄清取八升去上沫取七升煮藥取三升分三服治渇利虚熱引飲不止消熱止渇方竹葉切二升地骨皮生地黄切各一升栝蔞根石膏各八兩茯神一作茯苓萎蕤知母生薑各四兩生麥門冬一升半大棗三十枚右十一味㕮咀以水一斗二升煮取四升分四服地黄圎治面黄手足黄咽中乾燥短氣脉如連珠除熱止渇利補養方生地黄汁生栝蔞根汁各二升牛羊脂三升白蜜四升黄連一斤為末右五味合煎令可丸如梧子大飲服五丸日二加至二十丸若苦冷而渇渇瘥即宜别服温藥治渇小便數方貝母六分一本作知母茯苓栝蔞根各四分鉛丹一分雞肶胵中黄皮拾四枚右五味治下篩飲服方寸匕日三瘥後常服尤佳長服不絶則去鉛丹以蜜丸之用麥飲下治渇利方右用生栝蔞根三十斤切以水一石煮取一斗半去滓以牛脂五合煎取水盡以温酒先食服如雞子大日三治渇小便利復非淋者方右用榆白皮二斤切以水一斗煮取五升每服三合日三又方小豆藿一把擣取汁頓服三升又方取薔薇根水煎服之佳肘後以治睡中遺尿又方三年重鵲巢燒末以飲服之肘後以治睡中遺尿又方桃膠如彈丸大含之咽津又方蠟如雞子大以酢一升煮二沸適寒温頓服之論曰凡人生放恣者衆盛壯之時不自慎惜快情縱慾極意房中稍至年長腎氣虚竭百病滋生又年少懼不能房多服石散真氣既盡石氣孤立惟有虚耗唇口乾焦精液自洩或小便赤黄大便乾實或渇而且利日夜一石或渇而不利或不渇而利所食之物皆化作小便此皆由房室不節之所致也凡平人夏月喜渇者由心王也心王便汗汗則腎中虚燥故渇而小便少也冬月不汗故小便多而數也此為平人之證也名為消渇但小便利而不飲水者腎實也經云腎實則消消者不渇而利是也所以服石之人於小便利者石性歸腎腎得石則實實則能消水漿故利利多則不得潤養五臟臟衰則生諸病張仲景云熱結中焦則為堅熱結下焦則為溺血亦令人淋閉不通明知不必悉患小便利信矣内有熱者則止渇除熱則止渇兼虚者須除熱補虚則瘥矣治不渇而小便大利遂至於死者方右用牡蠣五兩以患人尿三升煎取二升分再服神驗治小便不禁多日便一二斗或如血色方麥門冬乾地黄各八兩乾薑四兩蒺藜子續斷桂心各二兩甘草一兩右七味㕮咀以水一斗煮取二升五合分三服古今錄驗云治腎消脚瘦細小便數九房散治小便多或不禁方莵絲子黄連蒲黄各三兩消石一兩肉蓯蓉二兩右五味治下篩并雞肶胵中黄皮三兩同為散飲服方寸匕日三如人行十里久更服千金翼有五味子三兩每服空腹服之又方鹿茸三寸桂心一尺附子大者三枚澤瀉三兩躑躅韭子各一升右六味治下篩以漿服五分匕日三加至一匕黄耆湯治消中虚勞少氣小便數方黄耆芍藥生薑桂心當歸甘草各二兩大􅀥三十枚黄芩乾地黄麥門冬各一兩右十味㕮咀以水一斗煮取三升分三服日三棘刺圎治男子百病小便過多失精方棘刺芮石龍芮巴㦸天各二兩厚朴麥門冬莵絲子萆薢外臺作草鞋萎蕤栢子仁乾地黄小草細辛杜仲牛膝蓯蓉石斛桂心防葵各一兩烏頭半兩右十九味為末蜜和更擣五六千杵丸如梧子大飲下十丸日三加至三十丸以知為度治尿數而多者方右用羊肺一具作羹内少羊肉和鹽䜴如食任性食不過三具治消渇陰脉絶胃反而吐食者方茯苓八兩澤瀉四兩白术生薑桂心各三兩甘草一兩右六味㕮咀以水一斗煮取麥三升取汁三升去麥下藥煮取二升半每服八合日再又方取屋上瓦三十年者碎如雀腦三升東流水二石煮取二斗内藥如左方生白术乾地黄生薑各八兩橘皮人參甘草黄耆逺志各三兩桂心當歸芍藥各二兩大􅀥三十枚右十味㕮咀内瓦汁中煮取三升分四服或單飲瓦汁亦佳治熱病後虚熱渇四肢煩疼方葛根一斤人參甘草各一兩竹葉一把右四味㕮咀以水一斗五升煮取五升渇即飲之日三夜二骨填煎治虚勞渇無不效方茯苓莵絲子當歸山茱萸牛膝五味子附子巴㦸天石膏麥門冬三兩石韋人參蓯蓉外臺作逺志桂心各四兩大豆卷一升天門冬五兩右十六味為末次取生地黄栝蔞根各十斤擣絞取汁於微火上煎減半便作數分内藥并下白蜜三斤牛髓一斤微火煎令如糜食如雞子黄大日三亦可飲服之茯神散治虚熱四肢嬴乏渇熱不止消渇補虚方茯神蓯蓉萎蕤各四兩生石斛黄連各八兩栝蔞根丹參各五兩甘草五味子知母當歸人參各三兩麥蘖三升外臺作小麥右十三味治下篩以絹袋盛三方寸匕水三升煮取一升日二服一煮為一服枸杞湯治虚勞口中苦渇骨節煩熱或寒者方枸杞根白皮切五升麥門冬三升小麥二升右三味以水二斗煮麥熟藥成去滓每服一升日再巴郡太守奏三黄圎治男子五勞七傷消渇不生肌肉婦人帶下手足寒熱者方春三月黄芩四兩大黄三兩黄連四兩夏三月黄芩六兩大黄一兩黄連七兩秋三月黄芩六兩大黄二兩黄連三兩冬三月黄芩三兩大黄五兩黄連二兩右三味隨時加減和擣以蜜為丸如大豆飲服五丸日三不知稍加至七丸取下而已服一月病愈久服走逐奔馬常試有驗一本云夏三月不服治熱渇頭痛壯熱及婦人血氣上衝悶不堪者方右用茅根切三升三擣取汁令盡渇即飲之治嶺南山瘴風熱毒氣入腎中變寒熱脚弱虚滿而渇方黄連不限多少生栝蔞根汁生地黄汁羊乳汁右四味以三汁和黄連末為丸空腹飲服三十丸如梧子大漸加至四十丸日三重病五日瘥小病三日瘥無羊乳牛乳人乳亦得若藥苦難服即煮小麥粥飲服之主虚熱張文仲云黄連丸一名羊乳丸阿膠湯治虚熱小便利而多服石散人虚熱當風取冷患脚氣喜發動兼消渇腎脉細弱方阿膠二挺麻子一升附子一枚乾薑二兩逺志四兩右五味㕮咀以水七升煮取二升半去滓内膠令烊分三服說云小便利多白日夜數十行至一石五日頻服良灸法論曰凡消渇病經百日以上者不得灸刺灸刺則於瘡上漏膿水不歇遂致癰疽羸瘦而死亦忌有所誤傷但作針許大瘡所飲之水皆於瘡中變成膿水而出若水出不止者必死慎之慎之初得患者可如方灸刺之消渇咽喉乾灸胃管下輸三穴各百壯穴在背第八椎下横三寸間寸灸之一云灸胷堂五十壯又灸足太陽五十壯消渇口乾不可忍者灸小腸輸百壯横三間寸灸之消渇口乾煩悶灸足厥陰百壯又灸陽池五十壯消渇欬逆灸手厥陰隨年壯消渇小便數灸兩手小指頭及足兩小趾頭并灸項椎佳又灸當脊梁中央解間一處與腰目上兩處凡三處又灸背上脾輸下四寸當俠脊梁灸兩處凡諸灸皆當隨年壯又灸腎輸二處又灸腰目在腎輸下三寸亦俠脊骨兩傍各一寸半是左右以指按取闗元一處又兩傍各二寸二處又陰市二處在膝上當伏兎上行三寸臨膝取之或三二列灸相去一寸名曰腎系者黄帝經云伏兎下一寸曲泉陰谷陰陵泉復留此諸穴斷小便最佳不損陽氣亦云止遺溺也太谿中封然谷太白大都趺陽行間大敦隱白涌泉凡此諸穴各一百壯腹背兩脚凡四十七處其腎輸腰目闗元水道此可灸三十壯五日一報各得一百五十壯佳涌泉一處可灸十壯大敦隱白行間此處可灸三壯餘者悉七壯皆五日一報滿三灸可止也若發灸諸陰不愈宜灸諸陽諸陽在脚表并灸肺輸募按流注孔穴壯數如灸陰家法小便數而少且難用力輙失精者令其人舒兩手合掌併兩大指令齊急逼之令兩爪甲相近以一炷灸兩爪甲本肉際肉際方後自然有角令炷當角中小侵入爪上此兩指共用一炷也亦灸脚大趾與手同法各三炷而已經三日又灸之備急千金要方卷六十三
