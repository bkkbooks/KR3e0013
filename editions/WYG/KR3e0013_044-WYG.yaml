body:
  text: 備急千金要方巻四十四唐孫思邈撰宋林億等校正小腸腑方風癲第五論灸方針法論曰黄帝問曰人生而病癲疾者安所得之岐伯對曰此得之在腹中時其母數有所大驚也氣上而不下精氣并居故令子發為癲疾病在諸陽脉且寒且熱諸分且寒且熱名曰狂㓨之虚脉視分盡熱病已而止病癲初發嵗一發不治月一發不治四五日一發名曰癲疾刺諸分其脉尤寒者以針補之病已止癲疾始生先不樂頭重直視舉目赤其作極已而煩心候之於顔取手太陽陽明太隂血變而已癲疾始發而反强因而脊痛候之足太陽陽明太隂手太陽血變而已癲疾始作而引口啼呼甲乙作喘悸者候之手陽明太陽右强者攻其左左强者攻其右血變而止治癲疾者常與之居察其所當取之處病至視之有過者即寫之置其血於瓠壺之中至其發時血獨動矣不動灸窮骨二十壯窮骨者尾骶也骨癲疾者頷齒諸輸分肉皆滿而骨倨强直汗出煩悶嘔多涎沫氣下泄不療筋癲疾者身拳攣急脉大刺項大經之本杼嘔多涎沫氣下泄不療脉癲疾者暴仆四肢之脉皆脹而從滿脉盡刺之出血不滿俠項灸太陽又灸帯脉於腰相去三寸諸分肉本輸嘔多涎沫氣下泄不療治癲者病發而狂面皮厚敦敦者死不療凡癲發則卧地吐涎沫無知若强掠起如狂及遺糞者難療癲疾脉摶大滑久自已脉沉小急實死不療小牢急亦不可治脉虚可療實則死矣厥成為癲疾五臟不平六腑閉塞之所生也厥成為癲故附厥於此條也隂衰發熱厥陽衰發寒厥論曰黄帝問曰厥之寒熱者何也岐伯對曰陽氣衰於下則為寒厥隂氣衰於下則為熱厥問曰熱厥必起於足下者何也對曰陽氣起於足三趾之表集於足下而聚於足心故陽勝則足下熱也問曰寒厥必起於五趾而上於膝者何也對曰隂氣起於五趾之裏集於膝而聚於膝上故隂氣勝則從五趾至膝上寒其寒也不從外皆從内也厥或令人腹滿或令人暴不知人或至半日逺至一日乃知人者何也隂氣盛於上則下虚下虚則腹滿腹滿則下氣重上而邪氣逆逆則陽氣亂亂則不知人巨陽之厥腫首頭重足不能行發為眗仆陽明之厥癲疾欲走呼腹滿不得卧面赤而熱妄見而妄言少陽之厥暴聾頰腫而熱脇痛脾不可運太隂之厥腹滿䐜脹後不利不欲食食則嘔不得卧少隂之厥舌乾溺赤腹滿心痛厥隂之厥小腹腫痛腹脹涇溲不利好卧屈膝隂縮腫胻内一作外熱盛則瀉之虚則補之不盛不虚以經取之上寒下熱先刺其項太陽乆留之已則火熨項與肩甲令熱下冷乃止所謂推而上之者也上熱下寒視其虚脉而陷下於經絡者取之氣下而止所謂引而下之者也刺熱厥者留針反為寒刺寒厥者留針反為熱刺熱厥者二隂一陽刺寒厥者二陽一隂所謂二隂者二刺隂也所謂二陽者二刺陽也論曰温病熱入腎中亦為痙小兒病癎熱盛亦為痙凡風瘖暴尸厥及鬼魘不寤皆相似宜精察之故經言乆厥則成癲是以知似也論曰癲病有五一曰陽癲發時如死人遺溺有頃乃解二曰隂癲坐初生小時臍瘡未愈數洗浴因此得之三曰風癲發時眼目相引牽縱反急强羊鳴食頃方解由執作汗出當風因以房室過度醉飲飽滿行事令心氣逼迫短氣脉悸得之四曰濕癲眉頭痛身重坐熱沐髮濕結腦汗未止得之五曰馬癲發時反目口噤手足相引身皆熱坐小時膏氣腦熱不和得之治五癲方銅青雄黄空青東門上雞頭水銀各一兩茯苓猪苓人參白芷白蘝白薇石長生各二兩卷栢烏扇各半兩硫黄一兩半右十五味為末以青牛膽和著銅噐中於甑中五斗大豆上蒸之藥成丸如麻子先食服三十丸日再夜一虎睛圓治濕癲掣瘲口眼張大口出白沫或作聲或死不知人方千金翼名大鎮心丸主諸癎所不療者虎睛一具酒浸一宿而炙之鬼箭羽露蜂房二分獨活逺志細辛貫衆麝香白歛一作白薇升麻白蘚皮三兩牛黄防風秦芁防葵龍齒黄芩雄黄山茱萸乾地黄一方乾薑防已茯苓鐵精鬼臼人參大黄銀屑各四分茯神石膏天雄各五分寒水石六分蛇蛻皮一尺右三十二味為末蜜和丸如梧子大酒服十五丸日再稍加至二十五丸神方凡癲發之候其狀多端口邊白沫動無常者治之方秦艽人參防葵一作防風茯神一作牡丹甘草各二兩鈆丹一兩貫衆一枚右七味㕮咀以水九升煮取三升半分三服雄雌圓治風癲失性顛倒欲死五癲驚癎方雄黄雌黄真珠各一兩鈆二兩􅆈令成屑丹砂二分水銀八分右六味為末以蜜𢷬三萬杵丸如胡豆大先食服二丸日二稍加以知為度古今録驗云療五癲牛癲則牛鳴馬癲則馬鳴狗癲則狗嘷羊癲則羊鳴雞癲則雞鳴病五癲狂病者腑臟相引盈氣起寒厥不識人氣争言方吐沫乆而得蘇者續命風引湯治中風癲眩不知人狂言舌腫出方麻黄芎藭石膏人參防風各三兩桂心甘草獨活各二兩防已附子當歸各一兩杏仁三十枚陳薑五兩一本無陳字右十三味㕮咀以酒三升水一斗合煎取四升分四服日三夜一紫石散治大人風引小兒驚癎瘈瘲日數十發醫所不療者方紫石英滑石白石脂凝水石赤石脂石膏各六兩甘草桂心牡蠣各五兩大黄龍骨乾薑各四兩右十二味治下篩為粗散盛以韋囊懸於高凉處欲用取三指撮以新汲井水三升煮取一升二合大人頓服未百日兒服一合未能者綿沾著口中熱多者日四五服以意消息深師方只龍骨乾薑牡蠣滑石白石脂五味治百二十種風癲癎驚狂發即吐沫不識人者四月五月宜服之方紫石英芍藥龍骨一本用黄芩青石脂白鮮皮麻黄當歸甘草栝蔞根桂心人參各二兩牡蠣三兩大黄五兩右十三味治下篩為粗散分作七裹毎以大􅀥十枚水三升煮取二升半去滓下一裹大棗十中煎取一升去滓頓服相去七日一服服訖即瘥治癲癎厥時發作方防葵代赭人參鉛丹白殭蠶生猪齒鈎藤茯神雷丸虎骨逺志桂心防風各六分卷栢莨宕子光明砂升麻附子牡丹龍齒各一分牛黄二分白歛四分蚱蟬十四枚蛇蛻皮白馬眼睛各一具右二十五味治下篩酒服方寸匕日二亦可為丸良驗芎藭湯治風癲引脇牽痛發作則吐耳如蟬鳴方芎藭藁本䕡茹各五兩右三味㕮咀内酒一斗煮取三升頓服之羸者分再服取大汗治風癲方經心録名鴟頭丸葶藶子鈆丹虎掌烏頭栝蔞根各三分甘遂天雄蜀椒大㦸各二分白术一分鐵精䕡茹各一兩鴟頭枚右十三味為末蜜丸如梧子湯酒下二丸日三服又方地黄三十斤天門冬十斤右二味𢷬取汁作煎服之瘥又方莨菪子三升𢷬篩酒一斗漬半日絞去滓湯中煎令可丸先食服如小豆二丸加至如梧子二丸以知為度額上手中從文理中赤起是知也無此候更服病日發者三日愈間日發者十日愈五日發者二十日愈半嵗發者一月愈治癲癎痸瘲方鈆丹一斤飛鴟頭二枚右二味為末蜜丸先食服三丸日三劇者夜一稍加之天門冬酒通治五臟六腑大風洞泄虚弱五勞七傷癥結滯氣冷熱諸風癲癎惡疾耳聾頭風四肢拘攣猥退歴節萬病乆服延年輕身齒落更生髮白更黒方天門冬與百部相似天門冬味甘兩頭方百部細長而味苦令人利𢷬絞取汁二斗清麴二升麴發以糯米二斗凖家醖法造酒春夏極冷下飯秋冬温如人肌酘之酒熟取清服一盞常令酒氣相接勿至醉吐慎生冷酢滑雞猪魚蒜特慎鯉魚亦忌油膩此是一斗汁法餘一石二石亦凖此以為大率服藥十日覺身體癮疹大癢二十日更大癢三十日乃漸止此皆是風氣出去故也四十日即覺身心朗然大快似有所得五十日更覺大快當風坐卧覺風不着人身中諸風悉盡用米法先淨淘米曝炕令乾臨欲用時更别取天門冬汁漬米乾漉炊之餘汁拌飯甚宜宻封取天門冬汁法淨洗天門冬去心皮乾漉去水切去壓取汁三四遍令滓乾如草乃止此酒初熟味酸仍作臭泔腥氣但依式服之乆停則香美餘酒皆不及也封四七日佳凡八月九月即少少合至十月多合擬到來年五月三十日以來相續服之春三月亦得合入四月不得合服酒時若得散服得力更倍速散方如左散方天門冬去心皮曝乾𢷬作末以上件酒服方寸匕日三加至三匕久服長生凡酒亦得服灸法大人癲小兒驚癎灸背第二椎及下窮骨兩處以繩度中折繩端一處是脊骨上也凡三處畢復斷繩作三折令各等而參合如厶字以一角注中央灸下二角俠脊兩邊便灸之凡五處也故畫圖注以丹注所灸五處各百壯削竹皮為度勝繩也卒癲灸隂莖上宛宛中三壯得小便通即瘥千金翼云當尿孔上是穴又灸隂莖頭三壯又灸足大趾上聚毛中七壯又灸囊下縫二七壯又灸兩乳頭三壯又灸督脉三十壯三報穴在直鼻中上入髪際又灸天窻百㑹各漸灸三百壯炷惟小作又灸耳上髪際各五十壯論曰黄帝問曰有病怒狂者此病安生岐伯對曰生於陽曰陽何以使人狂曰陽氣因暴折如難决故善怒病名曰陽厥問曰何以知之對曰陽明常動太陽少陽不動不動而動大疾此其候也曰治之奈何曰衰其食即已夫食入于隂長氣於陽故奪之食即已使之服以生鐵落為後飯夫生鐵落者下氣疾論曰凡發狂則欲走或自高賢稱神聖皆須備諸火灸乃得永瘥耳若或悲泣呻吟者此為邪非狂自依邪方治之邪入于陽則為狂邪入于隂則為血痺邪入于陽傳即為癲痙邪入于隂傳則為痛瘖陽入于隂病靜隂入于陽病怒鼉甲湯治邪氣夢寐寤時涕泣不欲聞人聲體中酸削乍寒乍熱腰脊强痛腹中拘急不欲飲食或因疾病之後勞動疲極或觸犯忌諱衆諸不節婦人産生之後月經不利時下青赤白肌體不生肉虚羸度小便不利或頭身發熱旋復觧散或一度交接彌日因極皆主之方鼉甲七枚甘草白薇一作白芷貝母黄芩各二兩麻黄芍藥白术各二兩半防風三兩凝水石桂心茯苓知母各四兩石膏六兩右十四味㕮咀以水二斗煮取四升温服一升日三夜一九物牛黄圓治男子沾鬼魅欲死所見驚怖欲走時有休止皆邪氣所為不能自絶方牛黄土精一云火精荆實人精曽青蒼龍精玉屑白虎精空青天精雄黄地精𤣥參𤣥武精龍骨水精赤石脂朱雀精右九味名曰九精上通九天下通九地各一兩治下篩蜜和丸如小豆先食服一丸日三稍加以知為度千金翼云凡邪病當服五邪湯九精丸瘥十黄散治五臟六腑血氣少亡魂失魄五臟覺不安忽忽喜悲心中善恐怖如有鬼物此皆發于大驚及當風從高墮下落水所致悉主之方雄黄人參各五分黄芩大黄黄蘗黄耆細辛桂心各三分黄連黄昏蒲黄麻黄各一分黄環澤瀉山茱萸各二分右十五味治下篩未食温酒服方寸匕日三不知加至二匕羸劣者更加人參五分合十分一方有生黄二分崔氏有蜀椒五分乾薑四分别離散治男女風邪男夢見女女夢見男悲愁憂恚怒喜無常或半年數月一發動方桂心茵芋天雄菖蒲細辛茜根附子乾薑各一兩白术桑上寄生各三兩右十味治下篩酒服方寸匕日三凡修合勿令婦人雞犬及病者家人知見令邪氣不去禁之為驗四物鳶頭散治鬼魅方東海鳶頭即由跋根黄牙石一名金牙莨菪子防葵各一分右四味治下篩酒服方寸匕欲令病人見鬼加防葵一分欲令知鬼主者復増一分立有驗防葵莨菪並令人迷惑恍惚如狂不可多服五邪湯治邪氣啼泣或歌或哭方禹餘糧防風桂心芍藥逺志獨活甘草白术人參石膏牡蠣秦芃各二兩防已菖蒲茯神雄黄深師作黄丹蛇蛻皮各一兩右十七味㕮咀以水二斗煮取四升分四服亦可如煮散法服之茯神湯治五邪氣入人體中見鬼妄語有所見聞心悸跳動恍惚不定方茯神人參菖蒲茯各三兩赤小豆四十枚右五味㕮咀以水一斗煮取二升半分三服人參湯治風邪鬼氣徃來發作有時或無時節方人參防風烏頭乾薑澤瀉栝蔞根翼作桔梗狗脊逺志附子黄芩獨活各五分秦芁牡蠣五味子山茱萸前胡細辛石膏芎藭蜀椒牛膝甘草石南桑根白皮桂心麻黄竹皮白术橘皮各十八銖鬼箭千金翼作澤蘭茯苓各十二銖大棗十六枚右三十二味㕮咀以水六升酒六升合煮取四升分五服日三夜二虎睛湯治狂邪發無常被髪大呌喚欲殺人不避水火方虎睛露蜂房鴟頭各一具楓上寄生五分石長生十分茯苓桂心防風各三兩獨活甘草人參天雄各一兩右十二味㕮咀以水一斗二升煮取三升分四服日三夜一又方防葵人參貫衆各五兩防風桂心各三兩右五味㕮咀以水一斗煮取三升分四服稍服亦可又方苦參五升蜜和丸如酸棗大單服十丸治卒發狂方令患人著地仰卧以冷水終日淋其面良治百邪鬼魅方服頭垢小豆大治魅方以水服鹿角末方寸匕日三治狐狸諸色精魅作種種惡怪令人恐怖狂癲風邪方雄黄六斤油一斗二升右二味破雄黄如碁子大鐺中以盆合頭作竈微火煎九日九夜不得少時火絶亦不得火冷須火熱微微不絶神驗治風邪方商陸根三十斤去皮細切以水八斗東向竈煎減半去滓更煎令可丸如梧子大服一丸合時勿令人見莨菪方及大豆紫湯皆可服汗出佳莨菪方出此篇前紫湯見别巻又方燒蝦蟇末水服方寸匕日三又方燒人屎灰酒服慎生冷酢滑猪雞魚蒜等又方以水服伏龍肝方寸匕日三治諸横邪癲狂針灸圖訣論曰凡諸百邪之病源起多塗其有種種形相示表癲邪之端而見其病或有黙黙而不聲或復多言而謾說或歌或哭或吟或笑或眠坐溝渠噉食糞穢或祼形露體或晝夜遊走或嗔罵無度或是蜚蠱精靈手亂目急如斯種類癲狂之人今針灸與方藥並主治之凡占風之家亦以風為鬼斷扁􅍎曰百邪所病者針有十三穴也凡針之體先從鬼宫起次針鬼信便至鬼壘又至鬼心未必須併針止五六穴即可知矣若是邪蠱之精便自言說論其由來住驗有實立得精靈未必須盡其命求去與之男從左起針女從右起針若數處不言便偏穴針也依訣而行針灸等處並備主之仍須依掌訣捻目治之萬不失一黄帝掌訣别是術家秘要縛鬼禁劫五嶽四瀆山精鬼魅並悉禁之有目在人兩手中十指節間第一針人中名鬼宫從左邊下針右邊出第二針手大指爪甲下名鬼信入肉三分第三針足大指爪甲下名鬼壘入肉二分第四針掌後横文名鬼心入半寸即大淵穴也第五針外踝下白肉際足太陽名鬼路火針七鋥鋥三下即申脉穴也第六針大椎上入髪際一寸名鬼枕火針七鋥鋥三下第七針耳前髪際宛宛中耳重下五分名鬼牀火針七鋥鋥三下第八針承漿名鬼市從左出右第九針手横文上三寸兩筋間名鬼路即勞宫穴也第十針直鼻上入髪際一寸名鬼堂火針七鋥鋥三下即上星穴也第十一針隂下縫灸三壯女人即玉門頭名鬼藏第十二針尺澤横文外頭接白肉際名鬼臣火針七鋥鋥三下此即曲池穴也第十三針舌頭一寸當舌中下縫刺貫出舌上名鬼封仍以一板横口吻安針頭令舌不得動已前若是手足皆相對針兩穴若是孤穴即单針之邪鬼妄語灸懸命十四壯穴在口脣裏中央絃絃者是也一名鬼禄又用剛刀決斷絃絃者乃佳邪病卧瞑瞑不自知風府主之一名鬼穴邪病大喚罵詈走灸十指端去爪一分一名鬼城邪病大喚罵走逺三里主之一名鬼邪邪病鬼癲四肢重顖上主之一名鬼門邪病四肢重痛諸雜候尺澤主之尺中動脉一名鬼受邪病語不止及諸雜候人中主之一名鬼客㕔凡人中惡先押鼻下是也倉公法狂癎不識人癲病眩亂灸百㑹九壯狂走掣瘲灸玉枕上三寸一法頂後一寸灸百壯狂走癲疾灸頂後二寸十二壯狂邪鬼語灸天窻九壯狂走灸大幽百壯狂言恍惚灸天樞百壯狂走癲癎灸季肋端三十壯狂癎哭泣灸手逆注三十壯穴在左右手腕後六寸狂走驚癎灸河口五十壯穴在腕後陷中動脉是此與陽明同也狂癲風癎吐舌灸胃管百壯不針狂邪發無常被髪大喚欲殺人不避水火及狂言妄語灸間使三十壯穴在腕後五寸臂上兩骨間亦灸驚恐歌哭狂走喜怒悲泣灸臣覺一作巨攪隨年壯穴在背上甲内側反手所不及者骨芒穴上捻之痛者是也狂邪鬼語灸伏兎百壯前作天窻九窻悲泣鬼語灸天府五十壯悲泣邪語鬼忙歌哭灸慈門五十壯狂邪驚癎病灸承命三十壯穴在内踝後上行三寸動脉上亦灸驚狂走也狂癲風驚厥逆心煩灸巨陽五十壯狂癲鬼語灸足太陽四十壯狂走驚恍惚灸足陽明三十壯狂癲癎易疾灸足少陽隨年壯狂走癲厥如死人灸足大趾三毛中九壯翼云灸大敦狂走易罵灸八㑹随年壯穴在陽明下五分狂癲驚走風恍惚嗔喜罵笑歌哭鬼語悉灸腦戸風池手陽明太陽太隂足陽明陽蹻少陽太隂隂蹻足跟皆隨年壯驚怖心忪少力灸大横五十壯狂風罵詈撾斫人名為熱陽風灸口兩吻邊燕口處赤白際各一壯又灸隂囊縫三十壯令人立以筆正注當下已卧核卵上灸之勿令近前中卵核恐害陽氣也狂走刺人或欲自死罵詈不息稱神鬼語灸口吻頭赤白際一壯又灸兩肘内屈中五壯又灸背胛中間三壯報灸之倉公法神效鬼魅灸入髮一寸百壯又灸間使手心各五十壯狐魅合手大指縛指灸合間三七壯當狐鳴即瘥卒狂言鬼語以甑帯急合縛兩手大指便灸左右脇下對屈肋頭兩處火俱起各七壯須臾鬼自道姓名乞去徐徐問之乃解其手卒中邪魅恍惚振噤灸鼻下人中及兩手足大指爪甲本令艾丸半在爪上半在肉上各七壯不止十四壯炷如雀屎大風邪灸間使隨年壯又灸承漿七壯又灸心輸七壯又灸三里七壯卒狂鬼語針其足大拇趾爪甲下入少許即止備急千金要方巻四十四
