body:
  text: 備急千金要方卷八十三唐孫思邈撰宋林億等校正飬性黄帝雜忌法第七旦起勿開目洗面令人目澀失明饒淚清旦常言善事勿惡言聞惡事即向所來方三唾之吉又勿嗔怒勿叱咤咄呼勿嗟歎勿唱奈何名曰請禍勿立膝坐而交臂膝上勿令髮覆面皆不祥勿舉足向火勿對竈罵詈凡行立坐勿背日吉勿面北坐乆思不祥起凡欲行來常存魁綱在頭上所向皆吉若欲征戰存斗柄在前以指敵吉勿面北冠帶凶勿向西北唾犯魁綱神凶勿欬唾唾不用逺成肺病令人手足重及背痛欬嗽亦勿向西北大小便勿殺龜蛇勿怒目視日月喜令人失明行及乗馬不用廻顧則神去人不用鬼行踖粟凡過神廟愼勿輙入入必㳟敬不得舉目恣意顧瞻當如對嚴君焉乃享其福耳不爾速獲其禍亦不得返首顧視神廟勿見龍蛇勿興心驚怪亦勿注意瞻視忽見鬼怪變異之物即強抑之勿怪呪曰見怪不怪其怪自壞又路行及衆中見殊妙美女愼勿熟視而愛之此當魑魅之物使人深愛無問空山曠野稠人廣衆之中皆亦如之凡山水有沙風處勿在中浴害人欲渡者隨驢馬後急渡不傷人有水弩處射人影即死欲渡水者以物打水其弩即㪚急渡不傷凡諸山有孔穴入採寳者惟三月九月餘月山閉氣交犯死凡人空腹不用見尸臭氣入鼻舌上白起口常臭欲見尸者皆須飲酒見之能辟毒凶行觸熱塗中逢河勿洗面生烏䵟房中補益第八論曰人年四十已下多有放恣四十已上即頓覺氣力一時衰退衰退既至衆病蜂起乆而不治遂至不救所以彭祖曰以人療人眞得其眞故年至四十須諳房中之術夫房中術者其道甚近而人莫能行其法一夕御十人閉固為謹此房中之術畢矣兼之藥餌四時勿絶則氣力百倍而智慧日新然此方之作也非欲務於淫佚苟求快意務存節欲以廣飬生也非苟欲强身力行女色以縱情意在補益以遣疾也此房中之㣲㫖也是以人年四十已下即服房中之藥者皆所以速禍愼之愼之故年未滿四十者不足與論房中之事慾心未止兼餌補藥倍力耗䘮不過半年精髓枯竭惟向死近少年極須愼之人年四十已上常固精飬炁不耗可以不老又餌雲母足以愈疾延年人年四十已上勿服瀉藥常餌補藥大佳昔黄帝御女一千二百而登仙而俗人以一女伐命知與不知豈不逺矣其知道者御女苦不多耳凡婦人不必須有顔色妍麗但得少年未經生乳多肌肉益也若足財力選取細髮目精黒白分明體柔骨輭肌膚細滑言語聲音和調四肢骨節皆欲足肉而骨不大其體及腋皆不欲有毫有毫當輭細不可極於相者但蓬頭蠅面槌項結喉雄聲大口高鼻麥齒目精渾濁口頷有毫骨節高大髮黄少肉隱毫多而且強又生逆毫此相不可皆賊命損夀也凡御女之道不欲令氣未感動陽氣㣲弱即以交合必須先徐徐調和使神和意感良乆乃可令得隂氣隂氣推之須臾自強所謂弱而内迎堅急出之進退欲令疎遲情動而止不可高自投擲顛倒五臟傷絶精脉生致日病但數交而愼宻者諸病皆愈年夀日益去仙不逺矣不必九一三五之數也能百接而不施瀉者長生矣若御女多者可採氣採氣之道但深接勿動使良乆氣上面熱以口相當引取女氣而吞之可疎疎進退意動便止緩息眠目偃臥道引身體更強可復御他女也數數易之則得益多人常御一女隂氣轉弱為益亦少陽道法火隂家法水水能制火隂亦消陽乆用不止隂氣逾陽陽則轉損所得不補所失但能御十二女而不復施瀉者令人不老有美色若御九十三女而自固者年萬歲矣凡精少則病精盡則死不可不思不可不愼之也昔正觀初有一野老年七十餘詣余云數日來陽氣益盛自思氣血已衰何有此盛未知垂老有此為善惡耶余答之曰是大不祥子獨不聞膏火乎夫膏火之将竭也必先暗而後明明止則滅今足下年邁桑榆乆當閉精息欲兹忽春情猛發豈非反常耶竊為足下憂之子其勉歟後四旬發病而死此其不愼之效也如斯之軰非一且疏一人以朂将來耳所以善攝生者凡覺陽事輙盛必謹而抑之不可縱心竭意以自賊也若一度制得則一度火滅一度增油若不能制縱情施瀉即是膏火将滅更去其油可不深自防所患人少年時不知道知道亦不能信行之至老乃知道便以晩矣病難飬也晩而自保猶得延年益夀若年少壯而能行道者神仙速矣或曰年未六十當閉精守一為可爾否曰不然男不可無女女不可無男無女則意動意動則神勞神勞則損夀若念眞正無可思者則大佳長生也然而萬無一有強抑鬱閉之難持易失使人漏精尿濁以致鬼交之病損一而當百也其服食藥物見别卷中御女之法交㑹者當避丙丁日及弦望晦朔大風大雨大霧大寒大暑雷電霹靂天地晦㝠日月薄蝕虹蜺地動若御女者則損人神不吉損男百倍令女得病有子必顛癡頑愚瘖瘂聾聵攣跛盲眇多病短夀不孝不仁又避日月星辰火光之下神廟佛寺之中井竈圊厠之側塜墓尸柩之傍皆所不可夫交合如法則有神德大智善人降託胎中仍令性行調順所作和合家道日隆祥瑞競集若不如法則有薄福愚癡惡人來託胎中仍令父母性行凶險所作不成家道日否殃咎屢至雖生成長家國滅亡夫禍福之應有如影響此乃必然之理可不再思之黄帝雜禁忌法曰人有所怒血氣未定因以交合令人發癰疽又不可忍小便交合使人淋莖中痛面失血色及逺行疲乏來入房為五勞虚損少子且婦人月事未絶而與交合令人成病得白駮也水銀不可近隂令人消縮鹿猪二脂不可近隂令隂痿也備急千金要方卷八十三
