body:
  text: 備急千金要方巻四十六唐孫思邈撰宋林億等校正脾臓方脾臓脉論第一論曰脾主意脾臓者意之舍意者存憶之志也為諫議大夫並四臓之所受心有所憶謂之意意之所存謂之志因志而存變謂之思因思而逺慕謂之慮因慮而處物謂之智意者脾之臓也口脣者脾之官脾氣通於口口和則能别五榖味矣故云口為戊舌脣為已循環中官上出頥頰次候於脣下廻脾中榮華於舌外主肉内主味脾重二斤三兩扁廣三寸長五寸有散膏半斤主裹血温五臓神名俾俾主臓營一作意秩禄號為意臓隨節應會故曰脾臓營營含意在氣為噫在液為涎脾氣虚則四肢不用五臓不安實則腹脹涇溲不利脾氣虚則夢食飲不足得其時則夢築垣蓋屋脾氣盛則夢歌樂體重手足不舉厥氣客於脾則夢邱陵大澤壊屋風雨凡脾臓象土與胃合為腑其經足太隂與陽明為表裏其脉緩相於夏王於季夏脾者土也敦而福敦者厚也萬物衆色不同故名曰得福者廣萬物懸根住莖其葉在巔蜎蜚蠕動蚑蠷喘息皆䝉土㤙徳則為緩㤙則為遲故令太隂緩而遲尺寸不同酸鹹苦辛大妙而生五行其時而以各行皆不群行盡可常服土寒則温土熱則凉土有一子名之曰金懐挾抱之不離其身金乃畏火恐熱來薰遂棄其母逃於水中水為金子而臓火神閉門塞户内外不通此謂冬時土失其子其氣衰㣲水為洋溢浸漬其地走擊皮膚面目浮腫歸於四肢愚醫見水直徃下之虚脾空胃水遂居之肺為喘浮肝反畏肺故下沈沒下有荆棘恐傷其身避在一邉以為水流心衰則伏肝㣲則沈故令脉伏而沈上醫逺一作來占因轉孔穴利其溲便遂通水道甘液下流停其隂陽喘息則㣲汗出正流肝著其根心氣因起陽行四肢肺氣亭亭喘息則安腎為安聲其味為鹹倚坐毋敗汚臭如腥土得其子即成為山金得其母名曰邱矣四時之序逆順之變異也然脾脉獨何主脾脉者土也孤蔵以灌四旁者也其善者不可得見惡者可見惡者何如其來如水之流者此謂太過病在外如鳥之喙者此謂不及病在中太過則令人四肢沈重不舉不及則令人九竅壅塞不通名曰重强脾脉來而和柔相離如雞踐地曰平長夏以胃為本脾脉來實而盈數如雞舉足曰脾病脾脉來堅鋭如雞之喙雞作烏如鳥之距如屋之漏如水之流曰脾死真脾脉至弱而乍疎乍散一作數色黄青不澤毛折乃死長夏胃㣲濡弱曰平弱多胃少曰脾病但代無胃曰死濡弱有石曰冬病石甚曰今病脾臓營營舍意愁憂不解則傷意意傷則悶亂四肢不舉毛悴色夭死于春足太隂氣絶則脉不營其口脣口脣者肌肉之本也脉弗營則肌肉濡肌肉濡則人中滿人中滿則脣反脣反者肉先死甲篤乙死木勝土也脾死臓浮之入緩一作堅按之中如覆杯絜絜状如摇者死六月季夏建未也坤未之間土之位脾王之時其脉大阿阿而緩曰平反得浮大而洪者是心之乗脾母之歸子爲虚邪雖病易治反得㣲濇而短者是肺之乗脾子之乗母為實邪雖病自愈反得弦而長者是肝之乗脾木之尅土為賊邪大逆十死不治反得沈濡而滑者是腎之乗脾水之陵土爲㣲邪雖病即瘥右手關上隂絶者無脾脉也若少氣下利腹滿身重四肢不欲動善歐刺足陽明治陽右手關上隂實者脾實也若腸中伏伏如堅状大便難刺足太隂治隂脾脉長長而弱來疎去穊一作數再至曰平三至曰離經病四至脫精五至死六至命盡足太隂脉也脾脉急甚爲瘈瘲㣲急為膈中滿食飲入而還出後沃沫緩甚為痿厥㣲緩為風痿四肢不用心慧然若無疾大甚為擊仆㣲大為脾疝氣裹大膿血在腸胃之外小甚為寒熱㣲小為消癉滑甚為㿗癃㣲滑為蟲毒蚘腸鳴熱濇甚為腸㿗㣲濇為内潰多下膿血脾脉摶堅而長其色黄當病少氣其耎而散色不澤者當病足骭腫若水状黄脉之至也大而虚有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風扁鵲曰脾有病則色痿黄實則舌本强直虚則多癖善吞注利其實若陽氣壮則夢飲食之類脾在聲為歌在變動為噫在志為思思傷脾精氣并於脾則饑音在長夏病變於音者取之經恐懼而不解則傷精精傷則骨痠痿厥精時自下則病精是故五臓主藏精者也不可傷傷則守失而隂虚虚則無氣無氣則死病先發於脾閉塞不通身痛體重一日之胃而腹脹二日之腎少腹腰脊痛脛痠三日之膀胱背膂筋痛小便閉十日不已死冬人定夏晏食病在脾日昳慧平旦甚日中持下晡静素問作日出甚王氷云日中持者繆也假令脾病東行若食雉兎肉及諸木果實得之不者當以春時發得病以甲乙日也凡脾病之状必身重善饑足痿不収素問作善肌肉痿足不収甲乙作苦饑饑肉痿足不収行善瘈脚下痛虚則腹滿腸鳴飱泄食不化取其經足太隂陽明少隂血者脾脉沈之而濡浮之而虚苦腹脹煩滿胃中有熱不嗜食食而不化大便難四肢苦痺時不仁得之房内月使不來來而頻併脾病其色黄飲食不消腹苦脹滿體重節痛大便不利其脉㣲緩而長此為可治宜服平胃丸㵼脾丸茱茰丸附子湯春當刺隐白冬刺隂陵泉皆㵼之夏刺大都季夏刺公孫秋刺啇邱皆補之又當灸章門五十壮背第十一椎百壮邪在脾胃肌肉痛陽氣有餘隂氣不足則熱中善飢陽氣不足隂氣有餘則寒中腸鳴腹痛隂陽俱有餘若俱不足則有寒有熱皆調其三里有所擊仆若醉飽入房汗出當風則傷脾脾傷則中氣隂陽離别陽不從隂故以三分候死生脾中風者翕翕發熱形如醉人腹中煩重皮肉瞤瞤而短氣也脾中寒脾水者其人腹大四肢苦重津液不生但苦少氣小便難脾脹者善噦四肢急一作實體重不能衣一作収趺陽脉浮而澀浮則胃氣强澀則小便數浮澀相摶大便則堅其脾為約脾約者其人大便堅小便利而反不渴脾氣弱病利下白腸垢大便堅不能更衣汗出不止名曰脾氣弱或五液注下青黄赤白黒寸口脉弦而滑弦則為痛滑則為實痛即為急實即為踊痛踊相摶即胸脇搶急趺陽脉浮而澀浮即胃氣㣲澀即脾氣衰微衰相摶即呼吸不得此為脾家失度寸口脉雙𦂳即為入其氣不出無表有裏心下痞堅趺陽脉微而濇微即無胃氣澀即傷脾寒在於膈而反下之寒積不消胃微脾傷榖氣不行食已自噫寒在胷膈上虚下實榖氣不通為閉塞之病寸口脉緩而遲緩則為陽其氣長遲則為隂榮氣促一云不足榮衛俱和剛柔相得三焦相承其氣必强趺陽脉滑而𦂳滑即胃氣實𦂳即脾氣傷得食而不消者此脾不治也能食而腹不滿此為胃氣有餘腹滿而不能食心下如飢此為胃氣不行心氣虚也得食而滿者此為脾家不治病人鼻下平者胃病也微赤者病發癰微黒者有熱青者有寒白者不治脣黒者胃先病微燥而渴者可治不渴者不可治臍反出者此為脾先落一云先終凡人病脉已解而反暮微煩者人見病者差安而强與榖脾胃氣尚弱不能消榖故令微煩損榖則愈診得脾積脉浮大而長飢則減飽則見䐜起與榖争減心下累累如桃李起見於外腹滿嘔泄腸鳴四肢重足脛腫厥不能臥是主肌肉損色黄也脾之積名曰痞氣在胃管覆大如盤久久不愈病四肢不收黄癉食飲不為肌膚以冬壬癸日得之肝病傳脾脾當傳腎腎適以冬王王者不受邪脾復欲還肝肝不肯受因留結為積故知痞氣以冬得之脾病其色黄體青失溲直視脣反張爪甲青飲食吐逆體重節痛四肢不舉其脉當浮大而緩今反弦急其色當黄而反青者此是木之尅土為大逆十死不治宫音人者主脾聲也脾聲歌其音皷其志愁其經足太隂厥逆陽明則榮衛不通隂陽翻作陽氣内擊隂氣外傷傷則寒寒則虚虚則舉體消瘦語音沈澀如破皷之聲舌强不轉而好咽唾口噤脣黒四肢不舉身重如山便利無度甚者不可治依源麻黄湯主之方在别巻中又言聲憂懼舌本巻縮此是木尅土陽擊隂隂氣伏陽氣起起則實實則熱熱則悶亂體重不能轉側語聲拖聲氣深不轉而心急此為邪熱傷脾甚則不可治若脣雖痿黄語言若轉可治脾病為瘧者令人寒腹中痛熱則腸中鳴鳴已汗出恒山丸主之方在别巻中若其人本來少於瞋怒而忽反常瞋喜無度正言而鼻笑不答於人此脾病聲之候也不盈旬月禍必至矣隂陽之疾經絡之源䆒㝷其病取其所理然後行治萬無遺一也黄為脾脾合肉黄如䱇腹者吉脾主口脣脣是脾之餘其人土形相比於上宫黄色大頭圓面美肩背大腹好股胻小手足多肉上下相稱行安地舉足心平好利人不喜權勢喜附人耐秋冬不耐春夏春夏感而生病主足太隂敦敦然脾應月月有虧盈脾小大隨人脣大小上脣厚下脣薄無腭齗脣缺破此人脾不正揭聳脣者則脾髙髙則實實則熱熱則季脇痛滿脣垂而大不堅者則脾下下則虚虚則危危則寒寒則身重不能行歩脣堅者則脾堅堅則臓安安則不病脣上下好者則脾端正端正則脾胃和利人無病脣偏舉者則脾偏痛好脹凡人分部中陷起者必有病生胃陽明為脾之部而蔵氣通於内外部亦隨而應之沈濁為内浮清為外若表病外入所部則起起則前㵼陽後補隂若裏病内出所部則陷陷則前治隂後治陽陽則實熱隂則虚寒寒主外熱主内凡人死生休否則蔵神前變形于外人脾前病脣則焦枯無潤若脾前死脣則乾青白漸縮急齒噤不開若天中等分墓色應之必死不治看色厚薄決判賖促賖則不盈四百日内促則旬朔之間脾病少愈而卒死何以知之曰青黒如拇指黶㸃見顔頰上此必卒死脾絶十二日死何以知之口冷足腫腹熱臚脹泄利不覺其出時一日五日死面青目黄者五日死病人著牀心痛氣短脾竭内傷百日復愈欲起徬徨因坐於地其亡倚牀能治此者可謂神良又面黄目赤不死黄如枳實死吉㐫之色在於分部霏霏而見黒黄入脣必病不出其年其穴在鼻上當兩眼是其分部位也若年上不應三年之内禍必應也季夏土脾脉色黄主足太隂脉也其脉本在中封前上四寸之中應在背輸與舌本中封在内踝前一寸大筋裏宛宛中脉夲從中封上四寸是也其脉根于隐白隐白在足大指端内側是也其筋起於足大指之端内側上結於内踝其直者上結於膝内輔骨上循隂股結於髀聚於隂器上腹結於臍循腹裏結於脇散於胷中其内者著于脊其脉起於足大指之端循指内側白肉際過核骨後上内踝前亷上腨内循胻骨後交出厥隂之前上循膝股内前亷入腹屬脾絡胃上膈俠咽連舌本散舌下其支者復從胃别上膈注心中合足陽明為表裏陽明之本在厲兊足趺上大指間上三寸骨解中也同會于手太隂其足太隂之别名曰公孫去本節後一寸别走陽明其别者入絡腸胃主脾生病實則胃熱熱則腹中切痛痛則陽病陽脉反大於寸口三倍病則舌强筋轉卵縮牽隂股引髀痛腹脹身重食飲不下煩心心下急注脾脾病虚則胃寒寒則腹中鼓脹脹則隂病隂脉反小於寸口一倍病則泄水不能臥而煩强立股膝内痛苦筋折紐之紐之者脉時綴綴動也發動甚者死不治四季之月各餘十八日此為四季之餘日主脾胃黄肉隨病也一作内陽病其源從太隂陽明相格節氣相移三焦寒濕不調四時關格而起則臓腑傷痾隨時受癘陽氣外泄隂氣内伏其病相反若腑虚則隂邪所加頭重頸直皮肉强痺若臓實則陽疫所傷藴而結核起於喉頸之側布毒熱於皮膚分肉之中上散入髪際下貫顳顬隐隐而熱不相斷離故曰黄肉隨病也扁鵲曰灸肝脾二輸主治丹毒四時隨病當依源補㵼虚實之痾皮肉隨熱則須鎌破薄貼方呪促治疾無逃矣備急千金要方巻四十六
