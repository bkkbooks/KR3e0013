body:
  text: 備急千金要方卷五十一唐孫思邈撰宋林億等校正脾臓方疳濕痢第九論方論曰凡疳濕之病皆由暑月多食肥濃油膩取冷眠睡之所得也禮云君子盛暑之月薄滋味無食肥濃煮餅此時以不利人也養生者宜深戒之不爾多患疳濕痢耳凡所患處或著口齗咽喉下部疳與月蝕並不痛令人不覺其治用五月五日蝦蟇角蒿救月木寒食泔淀但得一事單用之燒作灰和蠟月猪脂傅之逐手便瘥極須慎口味耳凡疳在慎鹽醤酢酥油􅀥等一切皆忌惟白飯豉苜蓿苦苣蕪菁不在禁限凡吹藥入下部沒中指許深即止治疳濕下黒醫不能治垂死者方髑髏灰熏黄朱砂青黛石鹽丁香麝香礬石梔子莨菪子鐡衣乾薑故靴底灰乾蝦蟇五月五日細辛土𤓰根芥子蜀椒葶藶菖蒲各等分右二十味治下篩以竹筒吹杏仁大著大孔中所有患疳瘡上悉傅之其丁香麝香别研𢷬著藥中合之一方有寒食泔淀救月木楸葉為二十三味若病大者用灌方如左麝香丁香甘草犀角各三分右四味治下篩合和以鹽三合蜀椒三合䜴二合以水二升煮取一升去滓内四味散合和分作二分灌大孔旦一灌酉一灌之凡久下一月不瘥成疳候大孔必寛者是以此主之八物茜根湯凡下血者是蠱也以此主之方見蠱篇中治疳濕久下痢赤白百療不瘥者方兎頭骨蛇頭菥蓂子故緋並灰葶藶子狸骨一作狐骨􅎙蜋百草五月五日収者倒掛草青黛晩蠶蛾青礬丁香牀中桄木蠍蟲屎麝香苦參黄蘗乾薑角蒿朱砂印成鹽救月木桂心鐵衣芒硝蝦蟇黄礬荏子各等分右二十九味治下篩以筒子内下部吹著日一二度妙治疳濕不能食身重心熱脚冷百節疼痛方黄芩芍藥苦參甘草當歸蜀椒甘松一作泔淀青黛熏黄豉各二兩東引桃根蔥白各一握鹽一合麝香半分猪膽二枚右十五味㕮咀以水一斗八升煮取四升分為二分一度灌一分湯如人體然後著麝香猪膽一枚即灌灌了作蔥豉粥食之後日更将一分如前灌之七日忌生冷毒物等但是油膩醤乳醋三十日忌之大佳治疳蝕人諸處但是赤血痢久不瘥立著即瘥袐方乾蝦蟇五月五日収者一枚作灰末人屎灰一作髪灰金銀土堝各五兩麝香一分銀末小豆許右五味治下篩傅瘡上即瘥三七日忌如前痢者吹下部治疳痢不止方苦參甘草熏黄各二兩豉一升半蔥白五莖蜀椒三十粒右六味以苦參等三物各𢷬下篩以水五升煮蔥白豉椒取三升以三指撮苦參末等各一撮内汁中冷暖如人體先飲少許䜴汁食一口飯乃側臥徐徐灌之訖多時臥不出為佳大急乃出之於浄地當有疳濕蟲如白馬尾状頭黒是其效也其重者肛大難瘥當取桃枝綿裏頭用前件汁適寒温烙之須近脊一上三十度烙之乃瘥神驗又方崔氏云晉代之地多三疳蝕人五臓通見脊骨下膿血手足煩疼四肢無力夜臥煩燥不安而失血色肩髀疼面及手足有浮氣或下血乃死治之之方雄黄青葙各二兩苦參三兩礬石雌黄鐡衣䔧蘆各一兩麝香二分别研右八味治下篩以竹管内大孔中酸􅀥許吹内下部中日一不過三度小兒以大豆許此方極救死又方大麻子胡麻各一升半右二物並熬令黄以三升瓦瓶泥表上厚一寸待泥乾内大麻等令滿以四五枚葦管挿口中宻泥之掘地作竈倒立竈口底著瓦器承之宻填竈孔中地平聚炭瓶四面著墼壘之日沒放火燒至明旦開取適寒温灌疳濕者下部中一合㝷覺咽中有藥氣者為佳亦不得過多多則傷人隔日一灌重者再三灌之從旦灌至日夕極覺體中乏力勿怪也非但治疳濕凡百異同瘡疥癬並洗塗之論曰凡日月蝕時忌食飲腹中生䘌蟲及房室生子不具足必患月蝕瘡亦不得與兒乳日月生後乃不忌令人口臭齒齗宣露常有血出舌上生瘡者皆由犯此所致耳日月蝕時須救不救出行逢暴雨其救月杖須収取治䘌之神藥預備患此者施之救療硫黄䕡茹斑猫各等分右三味治下篩傅瘡上乾者以猪脂和傅之日三夜一又方地榆根薔薇根吳茱茰根右三味各三兩治下篩以鹽湯洗瘡傅之日三小兒痢第十方温中湯治小兒夏月積冷洗浴過度及乳母亦将冷洗浴以冷乳飲兒兒壮熱忽值暴雨涼加之兒下如水胃虚弱則面青肉冷眼陷乾嘔者宜先與此調其胃氣下即止方乾薑厚朴各一分當歸桂心甘草各三分人參茯苓白术桔梗各二分右九味㕮咀以水二升煮取九合六十日至百日兒一服二合半餘皆隨兒大小温中大黄湯治小兒暴冷水榖下或乳冷下青結不消或冷實吐下乾嘔煩悶及冷滯赤白下者良若已服諸利湯去實胃中虚冷下如水乾嘔眼陷煩擾不宜利者可除大黄若中乳乳母洗浴水氣未消飲兒遂為霍亂者但用大黄小兒諸霍亂宜利者便用大黄不須利宜温和者除之方大黄六分桂心厚朴甘草乾薑各一分人參茯苓白术當歸各二分桔梗三分右十味以水二升半煮取八合凡兒三十日至六十日一服二合七十日至一百日一服二合半二百日已來一服三合黄蘗湯治小兒夏月傷暴寒寒折大熱熱入胃下赤白滯如魚腦壮熱頭痛身熱手足煩此太陽之氣外傷寒使熱氣便入胃服此方良若誤以利藥下之或以温脾湯下之則熱劇以利藥下之便數去赤汁如爛肉者或下之不瘥宜以澀熱藥斷之下既不止倍增壮熱者服之即效或是温病熱盛復遇暴寒折之熱入腹中下血如魚腦者服之良方黄蘗黄連升麻白頭翁一作白歛當歸牡蠣石榴皮黄芩寄生甘草各二分犀角艾葉各一分右十二味㕮咀以水三升煮取一升二合百日兒至二百日一服三合二百餘日至朞歳一服三合半治中結腸圓斷冷滯下赤白青色如魚腦脱肛出積日腹痛經時不斷者方赤石脂五分吳茱茰三分乾薑附子當歸厚朴白术木蘭皮白頭翁黄連石榴皮黄蘗各二分右十二味為末蜜丸如大豆二嵗兒服五丸三嵗已上服十丸十嵗已上二十丸暴下者服少許便瘥積下者盡一劑更合梔子圓治少小熱痢不止方梔子七枚大􅀥四枚炙黒黄蘗三分黄連五分礬石四分右五味為末蜜丸如小豆大服五丸日三夜二服不知稍加至十丸䔧蘆圓治少小泄清痢方䔧蘆二分黄連三分附子一分右三味為末蜜丸如麻子大以粥飲服二丸立驗四物粱米湯治少小泄注方粱米稻米黍米各三升蠟如彈丸大右四味以水五升東向竈煮粱米三沸去滓復以汁煮稻米三沸去滓復以汁煮黍米三沸去滓以蠟内汁中和之蠟消取以飲之數試有驗龍骨湯治少小壮熱渴引飲下痢方龍骨甘草大黄赤石脂栝蔞根石膏寒水石桂心各二兩右八味治下篩以酒水各五合煮取二合二沸去滓量兒大小服之大黄湯治少小下痢若熱不食傷飽不乳方大黄甘草麥門冬各一兩右三味㕮咀以水二升煮取一升二三歳兒分三四服生金牛黄湯治小兒積下不止因發癎方生金三銖一方用六銖無生金用熟金亦得法應作屑今方盡成器者牛黄三銖麻黄二分黄連乾薑人參甘草各一分細辛半分右八味㕮咀以水一升六合煮取八合去滓臨服研牛黄以煮湯中嫌兒熱者用生薑代乾薑今世乏生金但用成器金亦善二三兩皆得用之澤㯃茱茰湯治小兒夏月暴寒寒入胃則暴下如水四肢被寒所折則壮熱經日不除經月許日變通身虚滿腹痛其脉㣲細服此湯一劑得數漸漸安神方澤㯃青木香海藻各二分吳茱茰茯苓白术桔梗芍藥當歸各三分大黄一分右十味㕮咀以水四升煮取一升半二百日至一嵗兒一服二合半一歳已上至二嵗一服四合枳實散治少小久痢淋瀝水榖不調形羸不堪大湯藥者宜此方枳實二兩治下篩三嵗已上飲服方寸匕若兒小以意斟酌日三服治少小洞注下痢方蒺䔧子二升𢷬汁温服以瘥為度又方取木𤓰汁飲之又方酸石榴燒灰末服半錢匕日三又方炒倉米末飲服又方狗頭骨燒灰水和服之又方羊骨灰鹿骨灰右二味並水和服之隨得一事即用之又方炒豉令焦水淋汁服之神驗冷則酒淋服又方五月五日百草末吹下部治小兒赤白滯下方薤白一把豉一升右二味以水三升煮取二升分三服又方栢葉麻子末各一升右二味以水五升煮取三沸百日兒每服三合又方𢷬石榴汁服之又方牛角䚡灰水和服三方寸匕佳又方燒蜂房灰水和服之又方亂髪灰鹿角灰右二味等分三歳兒以水和服三錢匕日三治小兒赤白痢方白蘘荷根汁生地黄汁各五合右二味微火上煎一沸服之單方治同前服生黄汁一合又方五月五日蝦蟇灰飲服半錢匕治小兒熱痢方煮木𤓰葉飲之治小兒冷痢方蓼菜𢷬汁量大小與之一方作芥菜又方𢷬蒜敷兩足下治小兒暴痢方小鯽魚一頭燒末服之亦治大人又方燒鯉魚骨末服之一方作龍骨又方赤小豆末酒和塗足下日三度油和亦得治小兒蠱毒痢方藍青汁一升二合分為四服治小兒渴痢方𢷬冬𤓰汁飲之備急千金要方卷五十一
