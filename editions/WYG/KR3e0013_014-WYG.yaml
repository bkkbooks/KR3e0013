body:
  text: 備急千金要方卷十四唐孫思邈撰宋林億等校正少小嬰孺方小兒雜病第九方法灸治小兒臍中生瘡方桑汁傅乳上使兒飲之又方飲羖羊乳及血治小兒風臍遂作惡瘡歴年不瘥方取東壁上土傅之大佳若汁不止燒蒼耳子粉之又方乾蠐螬蟲末粉之不過三四度瘥治小兒臍不合方取車轄脂燒灰日一傅之又方燒蜂房灰為末傅之治小兒臍中生瘡方燒甑帶灰和膏傅之治小兒臍赤腫方杏仁半兩猪頰車髓十八銖右二味先研杏仁如脂和髓傅臍中腫上白石脂散治小兒臍汁不止兼赤腫方以白石脂細研熬令微暖以粉臍瘡日三四度治小兒鵝口不能飲乳方鵝屎汁瀝兒口中又方黍米汁塗之又方取小兒父母亂髮淨洗纒桃枝沾取井花水東向向日以髮拭口中得口中白乳以置水中七過瀝洗三朝作之治小兒心熱口為生瘡重舌鵝口方柘根剉五升無根弓材亦佳以水五升煮取二升去滓更煎取五合細細傅之數次良治口瘡白漫漫方先以父淨髮拭口次取桑汁塗之治重舌舌强不能收唾方鹿角末如大豆許安舌下日三四度亦治小兒不能乳又方取蛇蛻燒末以雞毛蘸醇醋㸃藥掠舌下愈治小兒重舌方取田中蜂房燒灰酒和塗喉下愈又方衣魚塗舌上又方竈月下黄土末苦酒和塗舌上又方二家屠肉切令如指大摩舌上兒立能啼又方赤小豆末醋和塗舌上又方燒簸箕灰傅舌下又方黄蘗以竹瀝漬取細細㸃舌上良治重舌方灸行間隨年壯穴在足大趾岐中又灸兩足外踝上三壯治小兒舌上瘡方蜂房燒灰屋間塵各等分和匀傅之又方桑白汁塗乳與兒飲之又方羊蹄骨中生髓和胡粉傅之治舌腫强滿方滿口含糖醋良又方飲羖羊乳即瘥治小兒口瘡不得吮乳方大青十八銖黄連十二銖右二味㕮咀以水三升煮取一升二合一服一合日再夜一又方蜜二升甘草如指大三寸臘月猪脂一斤右三味合煎相得含如棗大稍稍咽之日三又方礬石如雞子大置醋中塗兒足下二七遍愈治小兒燕口兩吻生瘡方燒髮灰和猪脂傅之治小兒口下黄肌瘡方取羖羊髭燒作灰和臘月猪脂傅之角亦可用治口傍惡瘡方亂髮灰胡絮灰黄連乾薑右四味等分為散以粉瘡上不過三遍治口噤赤者心噤白者肺噤方雞屎白􅀥大綿褁以水一合煮二沸分再服治小兒口噤方鹿角粉大豆末右二味等分和乳塗乳上飲兒又方驢乳猪乳各二升右二味合煎得一升五合服如杏仁許三四服瘥雀屎圓治小兒卒中風口噤不下一物方雀屎如麻子丸之飲下即愈大良雞屎白亦佳治小兒口中涎出方以白羊屎内口中又方以東行牛口中沫塗口中及頥上又桑白汁塗之瘥治小兒卒毒腫著喉頸肚熱妨乳方升麻射干大黄各一兩右三味㕮咀以水一升五合煮取八合一歲兒分三服以滓薄腫上冷更暖以薄大兒以意加之升麻湯治小兒喉痛若毒氣盛便咽塞并治大人咽喉不利方升麻生薑射干各二兩橘皮一兩右四味㕮咀以水六升煮取二升去滓分三服治小兒喉痺腫方魚膽二七枚以和竈底土塗之瘥治小兒喉痺方桂心杏仁各半兩右二味為末以綿裹如􅀥大含咽汁治小兒解顱方熬蛇蛻皮為末和猪頰車中髓傅頂上日三四度又方猪牙頰車髓傅顖上瘥治小兒腦長解顱不合羸瘦色黄至四五歲不能行半夏熨方半夏生薑芎藭各一升細辛三兩桂心一尺烏頭十枚右六味㕮咀以醇苦酒五升漬之晬時煮三沸絞去滓以綿一片浸藥中適寒温以熨顖上冷更温之復熨如前朝暮各三四熨乃止二十日可愈治小兒解顱用生蟹足傅方生蟹足白斂各半兩右二味𢷬末以乳汁和傅顱上立愈治小兒解顱細辛傅方細辛桂心各半兩乾薑十八銖右三味為末以乳汁和傅顱上乾復傅之兒面赤即愈治小兒顖開不合方防風一兩半栢子仁白芨各一兩右三味為末以乳和傅顖上日一十日知二十日愈又方取猪牙車骨煎取髓傅顖上愈小兒顖䧟方灸臍上下各半寸及鳩尾骨端又足太隂各一壯治小兒狐疝傷損生㿗方桂心十八銖白术一兩十八銖地膚子二兩半右三味為末以蜜和丸白酒服如小豆七丸日三亦治大人又方芍藥茯苓各十八銖防葵一作防風大黄各半兩半夏桂心蜀椒各六銖右七味為末蜜和服如大豆一丸日五服可加至三丸五等圓治小兒隂偏大又卵核堅㿗方黄蘗香䜴牡丹防風桂心各二兩右五味為末蜜丸如大豆兒三歲飲服五丸加至十丸兒小以意酌量著乳頭上服之治小兒卵腫方取雞翅六莖燒灰服之隨卵左右取翮古今録驗云治隂大如斗治小兒氣㿗方土𤓰根芍藥當歸各一兩右三味㕮咀以水二升煎取一升服五合日二又方三月上除日取白頭翁根𢷬碎隨偏處傅之一宿作瘡二十日愈治氣㿗方灸足厥隂大敦左灸右右灸左各一壯治小兒隂瘡方以人屎灰傅之又狗屎灰傅之又狗骨灰傅之又馬骨末傅之治小兒岐股間連隂囊生瘡汁出先癢後痛十日五日自瘥或一月或半月復發連年不瘥者方灸瘡搔去痂帛拭令乾以蜜傅更溲麫作燒餅熟即以􅄳塗餅上熨之冷即止再度瘥治小兒隂腫方狐莖炙𢷬末酒服之又方灸大敦七壯又方斫桑木白汁塗之又方𢷬蕪菁薄上又方𢷬垣衣傅之又以衣中白魚傅之又方猪屎五升水煮沸布裹安腫上治小兒隂瘡方取狼牙濃煮汁洗之又方黄連胡粉等分以香脂油和傅之治小兒核腫壯熱有實方青木香甘草石膏甘遂各十八銖麝香三銖大黄前胡各一兩黄芩半兩右八味㕮咀以水七升煮取一升九合毎服三合日四夜二鼈頭圓治小兒積冷久不瘥後餘脫肛不瘥腹中冷肛中疼痛不得入者方死鼈頭二枚灸令焦磁石四兩桂心三兩小蝟皮一枚炙令焦右四味為末蜜丸如大豆兒三歲至五歲服五丸至十丸日三兒年大以意加之小兒脫肛方灸頂上旋毛中三壯即入又灸尾翠骨三壯又灸臍中隨年壯治小兒疳濕瘡方鐵衣著下部中即瘥又方灸第十五椎俠脊兩傍七壯未瘥加七壯治小兒疳瘡方以猪脂和胡粉傅之五六度又方嚼麻子傅之日六七度又方羊膽二枚和醬汁於下部灌之猪脂亦佳治濕瘡方濃煮地榆汁洗浴毎日二度治小兒久痢膿濕􅉶方艾葉五升以水一斗煮取一升半分為三服除熱結腸圓斷小兒熱下黄赤汁沫及魚腦雜血肛中瘡爛坐􅉶生蟲方黄連蘗皮苦參鬼臼獨活橘皮芍藥阿膠各半兩右八味為末以藍汁及蜜丸如小豆日服五丸至十丸冬無藍汁可用藍子一合春蜜和丸治小兒蚘蟲方削楝木上蒼皮以水煮取汁飲之量大小多少為此有小毒治小兒羸瘦有蚘蟲方雚蘆二兩以水一升米二合煮取米熟去滓與服又方萹蓄三兩水一升煮取四合分服之𢷬汁服亦佳又方桃白皮三兩東引吳茱萸根白皮四兩右二味㕮咀以酒一升二合漬之一宿漸與服取瘥又方取猪膏服之一云治蟯蟲又方𢷬槐子内下部中瘥為度一云治蟯蟲又方楝實一枚内孔中一云治蟯蟲治寸白蟲方東行石榴皮一把水一升煮取三合分服又方桃葉𢷬絞取汁服之治小兒三蟲方雷丸芎藭右二味各等分為末服一錢七日三治大便竟出血方鼈頭一枚炙令黄黒為末以飲下五分匕多少量兒大小日三服又方燒車釭一枚令赤内一升水中分二服又方燒甑帶末傅乳頭上令兒飲之治小兒尿血方燒􅍎巢灰井花水服之亦治夜尿牀又方尿血灸第七椎兩傍各五寸隨年壯治小兒遺尿方瞿麥石韋龍膽皂莢桂心各半兩雞腸草人參各一兩車前子一兩六銖右八味為末蜜丸毎食後服如小豆大五丸日三加至六七丸又方小豆葉𢷬汁服又方燒雞腸為末漿水服方寸匕日三一云面北斗服又方灸臍下一寸半隨年壯又灸大敦三壯亦治尿血地膚子湯治小兒熱毒入膀胱中忽患小便不通欲小便則澁痛不出出少如血須臾復出方地膚子瞿麥知母黄芩枳實升麻葵子猪苓各六銖通草海藻橘皮各三銖大黄十八銖右十二味㕮咀以水三升煮取一升一日至七日兒服一合為三服八日至十五日兒一合半為三服十六日至二十日兒二合為三服四十日兒以此為準五十日已上七歲已下以意加藥益水治小兒淋方車前子一升水二升煮取一升分服又方煮冬葵子汁服之又方取蜂房亂髮燒灰以水服一錢匕日再治小兒小便不通方車前草切一升小麥一升右二味以水二升煮取一升二合去滓煮粥服日三四又方冬葵子一升以水二升煮取一升分服入滑石末六銖治小兒㿗方蜥蜴一枚燒末酒服之治小兒吐血方燒蛇蛻皮末以乳服之并治重舌又方取油三分酒一分和之分再服治小兒鼻塞生息肉方通草細辛各一兩右二味𢷬末取藥如豆著綿纒頭内鼻中日二治小兒鼻塞不通濁涕出方杏仁半兩蜀椒附子細辛各六銖右四味㕮咀以醋五合漬藥一宿明日以猪脂五合煎令附子色黄膏成去滓了更以塗絮導鼻孔中日再兼摩頂治小兒聤耳方末石硫黄以粉耳中日一夜一治小兒耳瘡方燒馬骨灰傅之又方燒雞屎白筒中吹入治小兒齒落久不生方以牛屎中大豆二七枚小開豆頭以注齒根處數度即生又方取雄鼠屎二七枚以一屎拭一齒根處盡此上二十一日即生雄鼠屎頭尖治小兒四五歲不語方末赤小豆酒和傅舌下又方灸足兩踝各三壯治小兒數歲不能行方取葬家未開户盜食來以哺之日三便起行治小兒不能乳方雀屎四枚為末著乳頭飲兒兒大十枚蒲黄湯治小兒落床墮地如有瘀血腹中隂隂寒熱不肯乳哺但啼哭呌喚方蒲黄麥門冬大黄黄芩各十銖甘草八銖芒硝七銖黄連十二銖右七味㕮咀以水二升煮取一升去滓内芒硝分三服消息視兒羸瘦半之大小便血即愈忌冷食治小兒食不知饑飽方鼠屎二七枚燒為末服之治小兒食土方取肉一斤䋲繫曳地行數里勿洗火炙與食治小兒噦方生薑汁牛乳各五合右二味煎取五合分為二服又方取牛乳一升煎取五合分五服治小兒疰方竈中灰鹽等分相和熬熨之治小兒悞吞鍼方取磁石如棗核大或吞或含其針立出治小兒悞吞鐵物等方艾蒿一把剉以水五升煮取一升服之即下治小兒蠷螋咬遶腹匝即死方𢷬蒺藜葉傅之無葉子亦可又方取鷰窠中土猪脂和傅之乾即易之備急千金要方卷十四
