body:
  text: 備急千金要方卷五十七唐孫思邈撰宋林億等校正大腸腑方大腸腑脉論第一論曰大腸腑者主肺也鼻柱中央是其候也肺合氣於大腸大腸者為行道傳寫之腑也號監倉椽重二斤十二兩長一丈二尺廣六寸當臍右囘疊積還反十二曲貯水榖一斗二升主十二時定血脉和利精神千金明堂外臺同難經云長二丈一尺大四寸徑一寸之少半十六曲盛榖一斗水七升半鼻遂以長以候大腸右手關前寸口陽絶者無大腸脉也若少氣心下有水氣立秋節即欬刺手太隂治隂在魚際間右手關前寸口陽實者大腸實也若腸中切痛如針刀所刺無休息時刺手陽明治陽在手腕中瀉之大腸病者腸中切痛而鳴濯濯冬日重感于寒則泄當臍而痛不能久立與胃同候取巨虚上亷腸中雷鳴氣上衝胷脇不能久立邪在大腸刺肓之原巨虚上亷二里大腸脹者腸鳴而痛寒則泄食不化大腸有寒鶩溏有熱便腸垢大腸有宿食寒慄發熱有時如瘧状肺前受病移於大腸肺欬不已欬則遺失便利厥氣客於大腸則夢田野肺應皮皮厚者大腸厚皮薄者大腸薄皮緩腹裹大者大腸緩而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結扁鵲云手太隂與陽明為表裏大腸若病實則傷熱熱則脹滿不通口為生瘡食下入腸腸實而胃虚食下胃胃實而腸虚所以實而不滿乍實乍虚乍來乍去虚則傷寒寒則腸中雷鳴泄青白之利而發於氣水根在大腸方見治水篇中大腸絶不治何以知之泄利無度利絶則死手陽明之脉起於大指次指之端外側循指上亷出合谷兩骨之間上入兩筋之中循臂上亷上入肘外亷循臑外前亷上肩出髃骨之前亷上出柱骨之㑹上下入缺盆絡肺下膈屬大腸其肢者從缺盆直而上頸貫頰入下齒縫中還出俠口交人中左之右右之左上俠鼻孔是動則病齒痛䪼腫是主津所生病者目黄口乾􅍠衂喉痺肩前臑痛大指次指痛不用氣盛有餘則當脉所過者熱腫虚則寒慄不復盛者則人迎大三倍於寸口虚者則人迎反小於寸口也大腸虚實第二脉法方灸大腸實熱右手寸口氣口以前脉陽實者手陽明經也病苦腸滿善喘欬面赤身熱喉咽中如核状名曰大腸實熱也生薑泄腸湯治大腸實熱腹脹不通口為生瘡者方生薑橘皮青竹茹黄芩梔子仁白术各三兩桂心一兩茯苓芒硝各二兩生地黄十兩大􅀥十四枚右十一味以水七升煮取三升去滓下芒硝分二服治腸中臚脹不消方灸大腸輸四十九壮大腸有熱腸鳴腹滿俠臍痛食不化喘不能久立巨虚上亷主之大腸虚冷右手寸口氣口以前脉陽虚者手陽明經也病苦胷中喘腸鳴虚渴脣乾目急善驚泄白名曰大腸虚冷也黄連補湯治大腸虚冷痢下青白腸中雷鳴相逐方黄連四兩茯苓芎藭各三兩酸石榴皮五片伏龍肝雞子大一枚地榆五兩右六味以水七升煮取二升半去滓下伏龍肝末分三服治腸中雷鳴相逐痢下方灸承滿五十壮穴在俠巨闕相去五寸巨闕在心下一寸灸之者俠巨闕兩邊各二寸半治腸中常鳴時上衝心方灸臍中食飲不下腹中雷鳴大便不節小便赤黄陽綱主之腹脹腸鳴氣上衝胷不能乆立腹中痛濯濯冬日重感於寒則泄當臍而痛腸胃間遊氣切痛食不化不嗜食身腫俠臍急天樞主之腸鳴而痛温留主之肛門論第三論曰肛門者主大行道肺大腸候也號為通事令史重十二兩長一尺二寸廣二寸三分應十二時若臓傷熱則肛門閉塞大行不通或腫縮入生瘡若腑傷寒則肛門開大行洞寫肛門凸出良久乃入熱則通之寒則補之虚實和平依經調理方見别卷中皮虚實第四論方論曰夫五臓六腑者内應骨髓外合皮毛膚肉若病從外生則皮毛膚肉關格强急若病從内發則骨髓㾓疼然隂陽表裏外皮内髓其病源不可不詳之也皮虚者寒皮實者熱凡皮虚實之應主于肺大腸其病發於皮毛熱則應臓寒則應腑蒴藋蒸湯治皮虚主大腸病寒氣關格方蒴藋根葉切三升菖蒲葉切二升桃葉皮枝剉三升細糠一斗秫米五升右五味以水一石五斗煮取米熟為度大盆器貯之於盆上作小竹牀子罩盆人身坐牀中四靣周廻将蓆薦障風身上以衣被盖覆若氣急時開孔對中泄氣取通身接汗可得兩食久許如此三日蒸還温藥足汁用之若盆裏不過熱盆下安炭火非但治寒但是皮膚一切勞冷悉皆治之梔子煎治皮實主肺病熱氣方梔子仁枳實大青杏仁柴胡芒硝各二兩生地黄淡竹葉切各一升生𤣥參五兩石膏八兩右十味以水九升煮取三升去滓下芒硝分為三服欬嗽第五論方證法灸論曰經云五臓六腑皆令欬肺居外而近上合於皮毛皮毛喜受邪故肺獨易為欬也邪客於肺則寒熱上氣喘汗出欬動肩背喉鳴甚則唾血肺欬經久不已傳入大腸其状欬則遺糞腎欬者其状引腰背痛甚則欬涎腎欬經久不已傳入膀胱其状欬則遺尿肝欬者其状左脇痛甚者不得轉側肝欬經久不已傳入膽其状欬則清苦汁出心欬者其状引心痛喉中介介如梗甚者喉痺咽腫心欬經久不已傳入小腸其状欬則失氣脾欬者其状左脇痛隂隂引肩背甚者不得動動則欬劇經久不已傳入胃其状欬而嘔嘔甚則長蟲出久欬不已三焦受之三焦欬之状欬而腸滿不能飲食此皆衆於胃關於肺使人多涕唾而面浮腫氣逆也右順時有風寒冷人觸冐觧脱傷皮毛間入腑臓為欬上氣如此也有非時忽然暴寒傷皮膚中與肺合則欬嗽上氣或胷脇义痛欬唾有血者是其熱得非時之寒暴薄之不得漸散伏結深喜肺癰也因欬服温藥欬尤劇及壮熱吐膿血汗出惡寒是也天有非時寒者急看四時方也問曰欬病有十何謂也師曰有風欬有寒欬有肢欬有肝欬有心欬有脾欬有肺欬有腎欬有膽欬有厥隂欬問曰十欬之證以何為異師曰欲語因欬言不得竟謂之風欬飲冷食寒因之而欬謂之寒欬心下堅滿欬則肢痛其脉反遲謂之肢欬欬則引脇下痛謂之肝欬欬而唾血引手少隂謂之心欬欬而涎出續續不止引小腹謂之脾欬欬引頸項而唾涎沫謂之肺欬欬則耳無所聞引腰并臍中謂之腎欬欬而引頭痛口苦謂之膽欬欬而引舌本謂之厥隂欬風欬者不下之寒欬肢欬肝欬刺足太衝心欬刺手神門脾欬刺足太白肺欬刺手太泉腎欬刺足太谿膽欬刺足陽陵泉厥隂欬刺手太陵夫久欬為㽷欬而時發熱脉在九􅀢一作卒弦者非虚也此為胷中寒實所致也當吐之夫欬家其脉弦欲行吐藥當相人强弱而無熱乃可吐耳欬家其人脉弦為有水可與十􅀥湯下之方見下不能臥出者隂不受邪故也留飲欬者其人欬不得臥引項上痛欬者如小兒掣縱状夫酒客欬者必致吐血此坐久極飲過度所致也其脉沉者不可發汗久欬數歳其脉弱者可治實大數者死其脉虚者必善冐其人本有支飲在胷中故也治屬飲家上氣汗出而欬屬飲家欬而小便利若失溺不可發汗汗出即厥逆冷夫病吐血喘欬上氣其脉數有熱不得臥者死寒家欬而上氣其脉數者死謂其人形損故也脉大而散散者為氣實而血虚名曰有表無裏上氣面胕腫肩息其脉浮大不治加痢尤甚上氣躁而喘者屬肺脹欲作風水發汗愈小青龍湯治欬逆倚息不得臥方麻黄芍藥細辛桂心乾薑甘草各三兩五味子半夏各半升右八味㕮咀以水一斗先煮麻黄减二升去上沫乃内諸藥煮取三升去滓分三服弱者服半升若渴去半夏加栝蔞根三兩若微痢去麻黄加蕘花如雞子大若食飲噎者去麻黄加附子一枚若小便不利小腹滿者去麻黄加茯苓四兩若喘者去麻黄加杏仁半升青龍湯下已多唾口燥寸脉沉尺脉微手足厥逆氣從小腹上衝胷咽手足痺其面翕熱如醉状因復下流隂股小便難時復冐者與茯苓桂心甘草五味子湯治其氣衝方茯苓四兩桂心甘草各二兩五味子半升右四味㕮咀以水八升煮取三升去滓分三服温服衝氣即低而反更欬胷滿者用茯苓甘草五味子去桂心加乾薑細辛以治其欬滿方茯苓四兩甘草乾薑細辛各三兩五味子半升右五味㕮咀以水八升煮取三升去滓温服半升日三欬滿即止而更復渴衝氣復發者以細辛乾薑為熱藥也服之當遂渴而渴反止者為支飲也支飲法當冒冒者必嘔嘔者復内半夏以去其水方半夏五味子各半升茯苓四兩細辛乾薑甘草各二兩右六味㕮咀以水八升煮取三升去滓温服半升日三水去嘔止其人形腫者應内麻黄以其人遂痺故不内麻黄内杏仁方杏仁五味子半夏各半升茯苓四兩細辛乾薑甘草各三兩右七味㕮咀以水一斗煮取三升去滓温服半升日三若逆而内麻黄者其人必厥所以然者以其人血虚麻黄發其陽故也若面熱如醉此為胃熱上衝熏其面加大黄利之方大黄乾薑細辛甘草各三兩茯苓四兩五味子半夏杏仁各半升右八味㕮咀以水一斗煮取三升去滓温服半升日三欬而上氣肺脹其脉浮心下有水氣脇下痛引缺盆設若有實者必躁其人常倚伏小青龍加石膏湯主之之方石膏乾薑桂心細辛各二兩芍藥甘草各三兩麻黄四兩半夏半升五味子一升右九味㕮咀以水一斗先煮麻黄减二升下藥煮取二升半强者服一升羸者減之小兒四合仲景用治肺脹欬而上氣煩躁而喘脉浮者心下有水外臺同澤㯃湯治上氣其脉沉者方澤㯃三斤細切以東流水五斗煮取一斗五升去滓澄清半夏半升生薑紫菀一作紫參白前各五兩黄芩甘草桂心人參各三兩右九味内澤㯃汁中煮取五升毎服五合日三夜一麥門冬湯下氣止逆治大逆上氣咽喉不利方麥門冬汁三升半夏一升粳米三合人參甘草各二兩大􅀥二十枚右六味以水一斗二升煮取六升去滓每服半升日三夜一射干麻黄湯治欬而上氣喉中如水雞聲者方射干細辛欵冬花紫菀各三兩麻黄生薑各四兩大􅀥七枚半夏五味子各半升右九味㕮咀以東流水一斗二升先煮麻黄去上沫内藥煮取三升去滓分三服日三厚朴麻黄湯治欬而大逆上氣胷滿喉中不利如水雞聲其脉浮者方厚朴五兩麻黄四兩石膏細辛乾薑各二兩小麥一升杏仁半夏五味子各半升右九味㕮咀以水一斗二升煮小麥熟去麥内藥煮取三升去滓分三服日三麻黄石膏湯治上氣胸滿者方麻黄四兩石膏一枚雞子大厚朴五兩小麥一升杏仁半升右五味以水一斗先煮小麥熟去之下藥煮取三升去滓分三服深師用治久逆上氣喉中如水雞鳴名小杸柸湯欬者加五味子半夏各半升乾薑三累皂莢圓治欬逆上氣時時唾濁但坐不得臥方皂莢八兩為末蜜丸如梧子大以􅀥膏和湯服三丸日三夜一必效方以酥炙皂莢十􅀥湯夫有支飲家欬煩胷中痛者不卒死至一百日一歳可與此方大􅀥十枚大㦸甘遂芫花各等分右大㦸甘遂芫花𢷬為末以水一升五合煮􅀥取八合去滓内藥末强者一錢匕羸者半錢頓服之平旦服而不下者平旦更加藥半錢下後自然補養欬而引脇下痛者亦十棗湯主之方見前温脾湯治食飽而欬者方甘草四兩大􅀥二十枚右二味㕮咀以水五升煮取二升分三服温服之若咽中痛而聲鳴者加乾薑一兩百部根湯治嗽不得臥兩眼突出方百部根生薑各一斤細辛甘草各三兩貝母五味子白术各二兩桂心四兩麻黄六兩右九味㕮咀以水一斗二升煮取三升去滓分三服古今録驗用杏仁四兩紫菀三兩海藻湯治欬而下利胷中痞而短氣心中時悸四肢不欲動手足煩不欲食肩背痛時惡寒方海藻四兩五味子半夏各半升生薑一兩細辛二兩茯苓六兩杏仁五十枚右七味㕮咀以水一斗煮取三升去滓分三服日三一方無五味子生薑白前湯治水欬逆上氣身體浮腫短氣脹滿晝夜倚壁不得臥咽中作水雞鳴方白前紫菀半夏大㦸各二兩右四味㕮咀以水一斗浸一宿明旦煮取三升分三服治九種氣嗽欲死百病方乾薑半夏細辛紫菀吳茱茰蕘花一作芫花茯苓甘草甘遂防葵人參烏頭大黄杏仁各一分葶藶二分巴豆厚朴白薇各三分五味子逺志前胡菖蒲枳實蜀椒皂莢當歸大㦸桂心各半分右二十八味為末蜜丸如梧子大先食服二丸日三服以知為度不知増之麻黄散治上氣嗽方麻黄半斤杏仁百枚甘草三兩桂心一兩右四味治下篩别研杏仁如脂内藥末和合臨氣上時服一方寸匕食久氣未下更服一方寸匕可至三匕氣發便服即止一方去桂心甘草太醫令王叔和所撰御服蜀椒圓治上氣欬嗽甚良方蜀椒五分烏頭杏仁菖蒲礜石一云礬石皂莢各一分細辛款冬花紫菀乾薑各三分吳茱茰麻黄各四分右十二味為末蜜丸如梧子大暮臥吞二丸治二十年久嗽不過二十丸通氣圓治久上氣欬嗽咽中腥臭虚氣攪心痛眼疼耳中嘈嘈風邪毒疰時氣食不生肌胷中膈塞嘔逆多唾惡心心下堅滿飲多食少惡疰淋痛病方飴糖三升蜀椒二升杏仁一升蜈蚣五節大附子五枚乾薑人參各四分桂心六分烏頭七分天門冬十分右十味為末别治杏仁如脂稍稍内藥末𢷬千杵烊糖乃内藥末中令調和含如半􅀥一枚日六七夜三四服以胸中温如度若夢與鬼交通及飲食者全用蜈蚣食不消加杏仁五合小腹急腰痛加天門冬杜仲有風加烏頭三枚附子一枚立夏後勿加也有留飲加葶藶一兩治欬嗽上氣方蜀椒桂心海蛤各四分昆布海藻乾薑細辛各六分麥門冬十分右八味為末蜜丸梧子大飲服十丸加至二十丸日三服有人風虚中冷胷中滿上氣喉中如吹管聲吸吸氣上欲欬服此方得瘥治欬嗽胷脇支滿多唾上氣方礜石一作礬石烏頭一方不用菖蒲各一分細辛黄環各二分欵冬花紫菀杏仁各三分吳茱茰四分乾薑五分蜀椒五合右十一味為末蜜丸梧子大每服一丸著牙上咽汁日五六服劇者常含不止又方薑汁一升半砂糖五合右二味煎薑汁減半内糖更煎服之又方白糖五分皂莢末一方寸匕右二味先㣲暖糖令消内皂莢末合和相得丸如小豆先食服二丸又方酒一升半浸肥皂莢兩挺經宿煮取半升分三服七日忌如藥法若吐多以酢飯三四口止之又方巴豆炮去皮勿傷破肉白飲吞下初日二枚二日三枚又方服芥子七丸以油酒下之射干煎治欬嗽上氣方生射干欵冬花各二兩紫菀細辛桑白皮附子甘草各二分白蜜竹瀝生薑汁各一升一云乾薑五兩飴糖五兩右十一味以射干先内白蜜并竹瀝中煎五六沸去之㕮咀六物以水一升合浸一宿煎七上七下去滓乃合飴薑一汁煎如餔服如酸􅀥一丸日三劇者夜二不止加之以止為度杏仁煎治冷嗽上氣鼻中不利方杏仁五合五味子欵冬花各三合紫菀乾薑各二兩桂心三兩甘草四兩麻黄一升右八味以水一斗煮麻黄取四升治諸藥為末又内膠飴半斤白蜜一斤合内汁中攪令相得煎如飴先食服如半􅀥許日三服不知加之以知為度又方治忽暴嗽失聲語不出方杏仁薑汁砂糖蜜各一升五味子紫菀各三兩通草貝母各四兩桑根白皮五兩右九味㕮咀以水九升煮取三升去滓内杏仁脂薑汁蜜糖和攪㣲火煎取四升初服三合日再夜一後稍加通聲膏方五味子欵冬花通草各三兩人參細辛青竹皮桂心菖蒲各二兩杏仁薑汁各一升白蜜二升􅀥膏三升酥五升右十三味㕮咀以水五升㣲火煎三上三下去滓内薑汁􅀥膏酥蜜煎令調和酒服􅀥大一丸杏仁飲子治暴熱嗽方杏仁四十枚紫蘓子一升橘皮一兩柴胡四兩右四味㕮咀以水一斗煮取三升分三服常作飲服蘓子煎治上氣欬嗽方蘓子生薑汁地黄汁白蜜杏仁各二升右五味𢷬蘓子以地黄汁薑汁澆之以絹絞取汁更𢷬以汁澆又絞令味盡去滓􅆈杏仁令黄黒治如脂又以向汁澆之絹絞徃來六七度令味盡去滓内蜜合和置銅器中於湯上煎之令如飴每服方寸匕日三夜一崔氏無地黄汁又方乾薑末三兩膠飴一斤右二味和令調蒸五升米下冷以􅀥大含稍稍咽之日五夜二芫花煎治新久嗽方芫花乾薑各二兩白蜜二升右三味為末内蜜中令相和㣲火煎令如糜毎服如棗核大一枚日三夜一以知為度欲利者多服深師以治冷飲嗽又治三十年久嗽者以水五升煮芫花取三升去滓内薑加蜜合煎如糜服之欵冬煎治同前欵冬花乾薑末紫菀各三兩五味子二兩芫花一兩􅆈令赤右五味㕮咀先以水一斗煮三味取三升半去滓内芫花乾薑末加蜜三升合投湯中令調於銅器中㣲火煎令如糖每服半􅀥許日三治三十年欬嗽或飲或欬寒氣嗽雖不同悉主之之方細辛欵冬花防風紫菀各三兩藜蘆二兩蜀椒五合右六味㕮咀取藜蘆先著銅器中次紫菀次細辛次欵冬花次椒以大􅀥百枚間著諸藥間以水一斗二升㣲火煮令汁盡出􅀥曝令燥雞鳴時服半􅀥不知明旦服一枚以胷中温温為度若强人欲嗽吐者方小増服之便吐膿囊裹結吐後勿冷飲食欬愈止藥藥勢静乃食不爾令人吐不已治三十年久嗽方百部根二十斤𢷬取汁煎如飴服一方寸匕日三服外臺和飴一斤煎成煎以温粥飲調下深師方以白蜜二升更煎五六沸服三合又方紫菀二兩欵冬花三兩右二味治下篩先食飲服一方寸匕日三服七日瘥又方白蜜一斤生薑二斤取汁右二味先秤銅銚知斤兩訖内蜜復秤知數次内薑汁以㣲火煎令薑汁盡惟有蜜斤兩在止旦服如􅀥大含一丸日三服禁一切雜食治久嗽不瘥方兔屎四十九枚碙砂二分胡桐律一分右三味為末蜜和丸如梧子大毎服三丸以粥飲下日三吐冷物盡即瘥治積年欬嗽喉中呀聲一發不得坐臥方紫菀貝母半夏桑根白皮五味子射干百部各五分欵冬花皂莢乾薑橘皮鬼督郵細辛各四分白石英杏仁各八分蜈蚣二枚右十六味為末蜜和丸如梧子大飲服十丸日再稍加至二十丸崔氏無半夏射干乾薑橘皮鬼督郵細辛白石英用麻黄二兩芫根白皮一兩半以煮􅀥湯送下欵冬圓治三十年上氣欬嗽唾膿血喘息不得臥方欵冬花乾薑蜀椒吳茱茰桂心菖蒲各五分人參細辛蕘花紫菀甘草桔梗防風芫花茯苓皂莢各三分右十六味為末蜜丸如梧子大酒服三丸日三服又方欵冬花紫菀細辛石斛防風芎藭人參當歸藁本甘草蜀椒白术半夏天雄菖蒲鍾乳桂心麻黄各三兩獨活二兩烏頭芫花附子各一兩桃仁二十枚大􅀥二十五枚右二十四味為末蜜丸如梧子大酒服二十丸日二服不止加之酒漬服亦得又方欵冬花乾薑桂心紫菀各三分細辛二分杏仁皂莢礜石一作礬石菖蒲烏頭各一分蜀椒五合吳茱茰六合右十二味為末蜜丸如梧子大酒服五丸日三夜一二十年嗽不過五十日愈患欬嗽喉鳴上氣服一劑永瘥治肺傷欬唾膿血腸澀背氣不能食惡風目暗􅉩􅉩足脛寒冷方白膠生薑各五兩桂心人參紫菀各二兩大􅀥二十枚乾地黄切半升桑白皮切二升芎藭大麻仁飴糖各一升大麥三升右十二味㕮咀以水一斗五升煮麥取一斗去麥下藥煮取三升分五服五味子湯治唾中有膿血牽胷脇痛方五味子桔梗紫菀甘草續斷各二兩竹茹三兩赤小豆一升桑根白皮地黄各五兩右九味㕮咀以水九升煮取二升七合分為三服竹皮湯治欬逆下血不息方生竹皮三兩紫菀二兩飴糖一斤生地黄切一升右四味㕮咀以水六升煮取三升去滓分三服百部圓治諸嗽不得氣息唾膿血方百部根三兩升麻半兩桂心五味子甘草紫菀乾薑各一兩右七味為末蜜和丸如梧子大每服三丸日三以止為度治上氣欬嗽喘息喉中有物唾血方生薑汁杏仁各二升糖蜜各一升猪膏二合右五味先以猪膏煎杏仁色黄出之以紙拭令浄𢷬如膏合薑汁糖蜜等合煎令可丸毎服如杏核一枚日夜六七服漸漸增加治一切肺病欬嗽膿血及唾血不止方好酥三十斤三遍錬停取凝當出醍醐服一合日三服瘥止一切藥皆不出此神方又方三錬酥如雞子黄適寒温灌鼻中日再夜一鍾乳七星散治寒冷欬嗽上氣胸滿唾膿血方又名吸散鍾乳礬石欵冬花桂心各等分右四味治下篩作如大豆七聚七星形以小筒吸取酒送下先食服日三不止加之數試大驗又云臨并吸服之又方鍾乳細辛欵冬花天雄紫菀石膏各等分右六味治下篩取如大豆匕聚如前法吸之日二只得食粥七日嗽愈乃止若大豆聚不知小益之勿太多七星散治三十年欬嗽方欵冬花紫菀桑根白皮代赭細辛伏龍肝各一兩右六味治下篩作七星聚聚如藊豆者以竹筒口當藥上一一吸咽之令藥入腹中先食日三丸服四日日復作七星聚以一臠肉灸令熟以展轉藥聚上令藥悉徧肉上仰臥咀嚼之細細咽汁令藥力歆歆割割然毒氣入咽中藥力盡總咽却取瘥止未瘥復作如初羊牛鹿肉皆可猪肉不可用治嗽熏法以熟艾薄薄布紙上紙廣四寸後以硫黄末薄布艾上務令調均以荻一枚如紙長捲之作十枚先以火燒纒下去荻煙從孔出口吸煙咽之取吐止明旦復熏之如前日一二止自然可瘥得食白粥餘皆忌恐是熏黄如硫黄見火必焰矣又方熏黄一兩研令細以蠟紙并上熏黄令與蠟相入調匀捲之如前法熏之亦如上法日一二止以吐為度七日将息後以羊肉羮補之又方爛青布廣四寸布上布艾艾上布青礬末礬上布少熏黄末又布少鹽又布少豉末急捲之燒令著内燥罐中以紙䝉頭更作一小孔口吸取煙細細咽之以吐為度若心胷悶時畧歇煙盡止日一二度用三捲不盡瘥三七日慎油膩論曰凡上氣多有服吐藥得瘥亦有針灸得除者宜深體悟之灸法嗽灸兩乳下黒白際各百壮即瘥又以蒲當乳頭周匝圍身令前後正平當脊骨解中灸十壮又以䋲横量口中折䋲從脊灸䋲兩頭邊各八十壮三報三日畢兩邊者是口合度灸從大椎數下行第五節下第六節上穴在中間此即神道穴隨年壮并主上氣灸手屈臂中有横文外骨捻頭得痛處十四壮良上氣欬嗽短氣氣滿食不下灸肺募五十壮上氣欬逆短氣風勞百病灸肩井二百壮上氣短氣欬逆胷背痛灸風門熱府百壮上氣欬逆胷滿短氣牽背痛灸巨闕期門各五十壮上氣欬逆短氣胷滿多唾唾惡冷痰灸肺輸五十壮上氣胷滿短氣欬逆灸雲門五十壮上氣欬逆胷痺背痛灸胷堂百壮不針上氣欬逆灸亶中五十壮上氣氣閉欬逆咽冷聲破喉猜猜灸天瞿五十壮一名天突逆氣虚勞寒損􅁨恚筋骨攣痛心中欬逆泄注腹滿喉痺頸項强腸痔逆氣痔血隂急鼻衂骨痛大小便澀鼻中乾煩滿狂走易氣凡二十二病皆灸絶骨五十壮穴在内踝上三寸宛宛中備急千金要方卷五十七
