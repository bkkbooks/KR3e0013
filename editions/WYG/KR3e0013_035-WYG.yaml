body:
  text: 備急千金要方巻三十五唐孫思邈撰宋林億等校正傷寒方温瘧第十五論瘧方禳法灸刺法符論曰夫瘧者皆生於風夏傷於暑秋為㾬瘧也問曰瘧先寒而後熱者何也對曰夫寒者隂氣也風者陽氣也先傷于寒而後傷于風故先寒而後熱也病以時作名曰寒瘧問曰先熱而後寒者何也對曰先傷于風而後傷于寒故先熱而後寒也亦以時作名曰温瘧其但熱而不寒者隂氣先絶陽氣獨發則少氣煩悶手足熱而欲嘔名曰癉瘧問曰夫病温瘧與寒瘧而皆安舍舎于何藏對曰温瘧者得之冬中于風寒氣藏于骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓鑠肌肉消腠理發泄因有所用力邪氣與汗皆出此病邪氣先藏于腎其氣先從内出之于外也如是則隂虚而陽盛盛則病矣衰則氣復反入入則陽虚虚則寒矣故先熱而後寒名曰温瘧問曰癉瘧何如對曰癉瘧者肺素有熱氣盛于身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舎于皮膚之内分肉之間發則陽氣盛陽氣盛而不衰則病矣其氣不及于隂故但熱而不寒氣内藏于心而外舎于分肉之間令人消鑠脫肉故名曰癉瘧夫瘧之旦發也隂陽之旦移也必從四肢始也陽已傷隂從之故氣未并先其時一食頃用細布索緊束其手足十指令邪氣不得入隂氣不得出過時乃解夫瘧脉自弦也弦數者多熱弦遲者多寒弦小緊者可下之弦遲者可温之若脉緊數者可發汗針灸之脉浮大者吐之瘥脉弦數者風發也以飲食消息止之瘧歲歲發至三歲或連月發不解者以脇下有痞也治之不得攻其痞但得虚其津液先其時發其汗服湯已先小寒者引衣自覆汗出小便利即愈瘧者病人形瘦皮上必粟起也病瘧一日發當以十五日愈設不瘥當月盡解也令不愈當云何師曰此病結為癥瘕名曰瘧母急當治之鼈甲煎圓主之方成死鼈十二斤治如食法要略作鼈用三兩半夏人參大㦸各六銖瞿麥阿膠紫葳一作紫菀牡丹皮石葦乾薑大黄厚朴桂心海藻要略作赤消葶藶蜣蜋各十二銖蜂窠桃仁芍藥各一兩柴胡一兩半烏羽燒一作烏扇黄芩各十八銖䗪蟲䖟蟲各三十銖要畧作鼠婦右二十四味為末取鍜竈下灰一斗清酒一斛五斗以酒漬灰取酒著鼈盡爛泯泯如漆絞去滓下諸藥煎為丸如捂子大未食服七丸日三仲景方無大㦸海藻柴胡栝蔞根湯治瘧而發渇者方柴胡黄耆人參甘草生薑各三兩大􅀥二十枚栝蔞根四兩右七味㕮咀以水一斗二升煮取六升去滓煎取三升温服一升日三牡蠣湯牡瘧者多寒治之方牡瘧一作壯瘧牡蠣麻黄各四兩甘草二兩蜀㯃三兩無以恒山代之右四味先洗蜀㯃三過去腥㕮咀以水八升煮蜀㯃麻黄得六升去沫乃内餘藥煮取二升飲一升即吐出復飲之蜀椒散多寒者牡瘧也治之方蜀椒雲母龍骨各等分右三味治下篩先未發一炊頃以酢漿服半錢臨發服一錢温瘧者加蜀㯃半分雲母取火燒之三日三夜要畧不用雲母用雲貴有癉瘧者隂氣孤絶陽氣獨發而脉㣲其候必少氣煩滿手足熱欲嘔但熱而不寒邪氣内藏于心外舎于分肉之間令人消鑠脫肉也有温瘧者其脉平無寒時病六七日但見熱也其候骨節疼煩時嘔朝發暮解暮發朝解名温瘧白虎加桂湯治之方石膏一斤知母六兩甘草二兩粳米六合右四味㕮咀以水一斗二升煮米爛去滓加桂心三兩煎取三升分三服覆令汗先寒發熱汗出者愈麻黄湯治瘧須發汗方麻黄栝蔞根大黄各四兩甘草一兩右四味㕮咀以水七升煮取二升半分三服未發前食頃一服臨發一服服後皆厚覆取汗治瘧或間日發者或夜發者方恒山竹葉各三兩秫米一百粒石膏八兩右四味㕮咀以水八升銅器中漬藥露置星月下高淨處横刀其上明日取藥于病人房中以銅器緩火煎取三升分三服清旦一服未發前一食頃一服臨發一服三服訖静室中卧莫共人語當一日勿洗手面及漱口勿進食取過時不發乃澡洗進食并用藥汁塗五心胷前頭面藥滓置頭邊曽用神驗救急方用烏梅二七枚又方先作羊肉臛麵餅飽食之并進少酒隨所能令其欣欣有酒氣入宻室裏然炭火厚覆取大汗即瘥又方燒黒牛尾頭毛作灰酒服方寸匕日三恒山圓治㾬瘧說不可具方恒山知母甘草大黄各十八銖麻黄一兩右五味為末蜜和丸如梧子大未食服五丸日二不知漸増以瘥為度肘後無大黄又方治瘧經數年不瘥者兩劑瘥一月已來一劑瘥方恒山三兩為末以雞子白和併手丸如梧子大置銅椀中于湯中煮令熟殺腥氣則止以竹葉飲服二十丸欲吐但吐至發令得三服時早可斷食而晩不可斷食可竹葉汁煮􅐘少食之梔子湯治同前梔子十四枚秫米十四粒恒山三兩車前葉二七枚炙乾右四味㕮咀以水九升煮取三升分三服未發一服發時一服發後一服以吐利四五行為瘥不止冷飯止之治老瘧久不斷者方恒山三兩烏賊骨升麻鼈甲附子各一兩右五味㕮咀絹袋盛以酒六升漬之小令近火轉之一宿成一服一合比發可數服或吐下治瘧無問新久者方小便一升半蜜三匕右二味煮三沸頓服毎發日平旦時服自至發勿食重者漸退不過三服瘥又方鼠尾子車前子各一虎口右二味㕮咀以水五升煮取二升未發前服盡又方馬鞭草汁五合酒三合分三服又方𢷬茛菪根燒為灰和水服一合量人大小强弱用之又方𤓰蔕二七枚𢷬水漬一宿服之又方常以七月上寅日採麻花為末酒服方寸匕又方故鞋底去兩頭燒作灰井花水服之又方服翹摇汁又方桃花末服方寸匕治瘧方鼈甲方寸灸烏賊骨方二寸附子炮甘草各一兩恒山二兩右五味㕮咀以酒二升半漬之露一宿明日塗五心手足過發時瘧斷若不斷可飲一合許瘥蜀漆圓治勞瘧并治積勞寒熱發有時似瘧者方蜀漆麥門冬知母白薇地骨皮升麻各三十銖甘草鼈甲烏梅肉萎㽔各一兩恒山一兩半石膏二兩豉一合右十三味為末蜜和丸如梧子大飲服十丸日再服之稍稍加至二三十丸此神驗無不瘥也加光明砂一兩烏梅圓治寒熱勞瘧乆不瘥形體羸瘦痰結胷堂食飲減少或因行逺久經勞役患之積年不瘥服之神效方烏梅肉豆䜴各一合升麻地骨皮柴胡鼈甲恒山前胡各一兩肉蓯蓉𤣥參百合蜀㯃桂心人參知母各半兩桃仁八十一枚右十六味為末蜜凡空心煎細茶下三十丸日二服老少孩童量力通用無所忌治勞瘧積時不斷衆治無效者方生長大牛膝一握切以水六升煮取一升分再服第一服取未發前食頃第二服取臨發時大五補湯治時行後變成瘴瘧方桂心三十銖逺志桔梗芎藭各二兩茯苓乾地黄芍藥人參白术當歸黄耆甘草各三兩竹葉五兩大棗二十枚生枸杞根生薑各一斤半夏麥門冬各一升右十八味㕮咀以水三斗煮竹葉枸杞取二斗次内諸藥煎取六升分六服一日一夜令盡鯪鯉湯治乍寒乍熱乍有乍無山瘴瘧方鯪鯉甲十四枚鼈甲烏賊骨各一兩恒山三兩附子一枚右五味㕮咀以酒三升漬一夕發前稍稍啜飲勿絶吐之兼以塗身斷食過時乃食飲烏梅圓治肝邪熱為瘧令人顔色蒼蒼氣息喘悶戰掉狀如死者或久熱勞微動如瘧積年不瘥方烏梅肉蜀㯃鼈甲萎㽔知母苦參各一兩恒山一兩半石膏二兩甘草細辛各十八銖香䜴一合右十一味為末蜜丸如梧子大酒服十丸日再飲服亦得治心熱為瘧不止或止後熱不歇乍來乍去令人煩心甚欲飲清水反寒多不甚熱者方甘草一兩蜀㯃三兩恒山鼈甲各四兩石膏五兩香䜴一合梔子烏梅各三十枚淡竹葉切二升右九味㕮咀以水九升煮取三升分三服恒山圓治脾熱為瘧或渇或不渇熱氣内傷不泄令人病寒腹中痛腸中鳴汗出方恒山三兩甘草半兩知母鼈甲各一兩右四味為末蜜丸如梧子大未發前酒服十丸臨發時一服正發時一服恒山湯治肺熱痰聚胷中來去不定轉而為瘧其狀令人心寒寒甚則發熱熱間則善驚如有所見者方恒山三兩甘草半兩秫米三百二十粒右三味㕮咀以水七升煮取三升分三服至發時令三服盡又方治腎熱發為瘧令人淒淒然腰脊痛宛轉大便難目眴眴然身掉不定手足寒方恒山三兩烏梅三七枚竹葉切一升香䜴八合蔥白一握右五味㕮咀以水九升煮取三升分三服至發令盡藜蘆圓五臟並有瘧候六腑則無獨胃腑有之胃腑瘧者令人旦病也善饑而不能食食而支滿腹大治之方藜蘆恒山皁莢牛膝各一兩巴豆三十枚右五味先􅆈藜蘆皁莢色黄合𢷬為末蜜丸如小豆大旦服一丸正發時一丸一日勿飽食肘後無恒山及牛膝刺灸法肝瘧刺足厥隂見血心瘧刺手少隂脾瘧刺足太隂肺瘧刺手太隂陽明腎瘧刺足少隂太陽胃瘧刺足太隂陽明横脉出血凡灸瘧者必先問其病之所發者先灸之從頭項發者于未發前預灸大椎尖頭漸灸過時止從腰脊發者灸腎輸百壯從手臂發者灸三間瘧灸上星及大椎至發時令滿百壯灸艾炷如黍米粒俗人不解取穴務大炷也覺小異即灸百㑹七壯若後更發又七壯極難愈者不過三灸以足踏地以線圍足一匝中折從犬椎向百㑹灸線頭三七壯炷如小豆狀又灸風池二穴三壯凡一切瘧無問逺近正仰卧以線量兩乳間中屈從乳向下灸度頭隨年壯男左女右五臟一切諸瘧灸尺澤七壯穴在肘中約上動脉是也諸瘧血脉不見者刺十指間出血血去必已先視身之赤如小豆者盡取之瘧刺足少隂血出愈㾬瘧上星主之穴在鼻中央直髪際一寸陷容豆是也灸七壯先取譩譆後取天牖風池瘧日西而發者臨泣主之穴在目眥上入髮際五分陷者灸七壯瘧實則腰背痛虚則􅍠衂飛揚主之穴在外踝上七寸灸七壯瘧多汗腰痛不能俛仰目如脫項如㧞崑崙主之穴在足外踝後跟骨上陷中灸三壯禳瘧法未發前把大雄雞一頭著懐中時時驚動令雞作大聲立瘥治瘧符凡用二符瘧小兒父字石拔母字石鎚某甲著患人姓名患瘧人竊讀之曰一切天地山水城隍日月五星皆敬竈君今有一瘧鬼小兒罵竈君作黒面奴若當不信看文書急急如律令此符必須真書前後各留白紙一行擬著竈君額上瓦石壓之不得壓字上勿令人近符若得專遣一人看符大好亦勿令灰土傅符上致使字不分明出見著符次第如後若明日日出後發須令人夜掃竈君前及額上令淨至發日旦令患人整衣帽立竈前讀符使人自讀必須分明讀符勿錯一字毎一遍若别人讀一遍患人跪一拜又以手捉患人一度若患人自讀自捉衣振云人姓某甲如此是凡三遍讀三拜了以淨瓦石壓兩角字句上著竈額上勿令壓字上若瘧日西發具如上法三遍讀符至午時更三遍讀如上法如夜發日暮更三遍讀並如上法其竈作食亦得勿使動此符若有兩竈大竈上著符若有露地竈屋裏竈上著止有露竈依法著之仍須手捉符其符法如後若有客患㑹須客經停過三度發三度委曲著符如上法符亦云客姓名患瘧乞拘録瘧鬼小兒如左凡治久患者一著符一漸瘥亦可五度著符如始可全瘥又須手把符如左王良符張季伯書之急急如律令此王良符依法長捲兩手握念佛端坐如須行動檢校挿著胸前字頭向上右二符各依法一時用不得闕一符萬一不瘥但得一發輕後發日更讀即瘥一一仔細依法若字參差即不瘥診谿毒證第十六江東江南諸谿源間有蟲名短狐谿毒亦名射工其蟲無目而利耳能聽在山源谿水中聞人聲便以口中毒射人故謂射工也其蟲小毒輕者及相逐者射著人影者皆不即作瘡先病寒熱身不喜冷體彊筋急頭痛目疼張口欠欬𠻳呼吸悶亂朝旦少蘇醒晡夕輙復寒熱或似傷寒發熱散動亦如中尸便不能語病後如此自非其土地人不常數行山水中不知其證便謂是傷寒發熱散動作治乖僻毒盛發瘡復疑是瘭疽乃至吐下去血復恐疑蟲毒是以致禍耳今說其狀類以明其證與傷寒别也方見别卷中備急千金要方巻三十五
