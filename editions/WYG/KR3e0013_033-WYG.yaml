  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0013_WYG_033-1a, image: WYG0735/WYG0735-0337a.png}
body:
  text: 備急千金要方卷三十三唐孫思邈撰宋林億等校正傷寒方勞復第十一論方食忌論曰凡熱病新瘥及大病之後食猪肉及羊血肥魚油膩等必當大下利醫所不能治也必至于死若食餅餌粢黍飴哺鱠炙􅀥栗諸菓物脯脩及堅食難消之物胃氣尚虚弱不能消化必更結熱適以藥下之則胃氣虚冷大利難禁不下之必死下之復危皆難救也熱病及大病之後多坐此死不可不慎也病新瘥後但得食糜粥寜少食令飢慎勿飽不得他有所食雖思之勿與之也引日轉久可漸食羊肉白糜若羮汁雉兔鹿肉不可食猪狗肉也新瘥後當静卧慎勿早起梳頭洗面非但體勞亦不可多言語用心使意勞煩凡此皆令人勞復故督郵顧子獻得病已瘥未健詣華敷視脉曰雖瘥尚虚未得復陽氣不足慎勿勞事餘勞尚可女勞則死當吐舌數寸其婦聞其夫瘥從百餘里來省之經宿交接中間三日發熱口噤臨死舌出數寸而死病新瘥未滿百日氣力未平復而以房室者略無不死有士蓋正者疾愈後六十日已能行射獵以房室即吐涎而死及熱病房室名為隂陽易之病皆難治多死近者有一士大夫小得傷寒瘥已十餘日能乗馬行來自謂平復以房室即小腹急痛手足拘攣而死時病瘥後未滿五日食一切肉麵者病更發大困時病瘥後新起飲酒及韭菜病更發時病新瘥食生魚酢下痢必不止時病新瘥食生菜令顔色終身不平復時病新汗解飲冷水者損心胞令人虚補乃不復時病新瘥食生􅀥及羊肉者必膈上作熱蒸時病新瘥食犬羊等肉者必作骨中蒸熱時病新瘥食魚肉與𤓰生菜令人身熱一本作腫時病新瘥食蒜鱠者病發必致大困黄龍湯治傷寒瘥後更頭痛壯熱煩悶方仲景名小柴胡湯方柴胡半斤半夏半升黄芩三兩人參甘草各二兩生薑四兩大􅀥十二枚右七味㕮咀以水一斗煮取五升去滓服五合日三不嘔而渇者去半夏加栝蔞根四兩補大病後不足虚勞方萬病虚勞同用取七歲已下五歲已上黄牛新生者乳一升以水四升煎取一升如人體温稍稍飲之不得過多十日服不絶為佳治傷寒温病後勞復或食或飲或動作方梔子仁三七枚石膏五兩香䜴一升鼠屎尖頭大者二十枚右四味㕮咀以水七升煮取三升分三服治病後勞復或因洗手足或梳頭或食等勞復之方取洗手足汁飲一合取頭中垢如􅀥核大吞一枚枳實梔子湯治大病已後勞復者方枳實三枚梔子十四枚䜴一升綿裹右三味㕮咀以酢漿七升先煎減三升次内枳實梔子煮取二升次内䜴煮五六沸去滓分再服覆取汗如有宿食者内大黄如博棊子五六枚治病新瘥遇美飲食食過多勞復者方取所食餘燒為末飲調服二錢匕日以三服治新瘥早起及食多勞復者方䜴五合鼠屎二十一枚尖頭者右二味以水二升煮取一升盡服之温卧令小汗愈崔氏加梔子七枚尤良肘後有麻子仁内一升加水一升亦可内枳實三枚蔥白一虎口治重病新瘥早起勞及飲食多致發欲死方燒鼈甲末飲服方寸匕治食大飽不消勞復脉實者方䜴一升鼠屎二十枚梔子七枚大黄三兩右四味㕮咀以水六升煮取二升分三服㣲取汗應小鴨溏者止不溏者復作治勞復垂死方暖湯三合洗四五歲女子隂取汁内口中服即愈小男兒亦得麥門冬湯治勞復氣欲絶起死人方麥門冬一兩甘草二兩京棗二十枚竹葉切一升右四味㕮咀以水七升煮粳米一升令熟去米内諸藥煎取三升分三服不能服者綿滴湯内口中用之有效治食勞方麫二升煮取汁服之又方杏仁五十枚以酢二升煎取一升服之取汗又方燒人屎灰水服方寸匕為度欲令病人不復方燒頭垢如梧桐子大吞服之治傷寒瘥後一年心下停水不能食者方生地黄五斤白术一斤好麵二斤右三味合𢷬令相得曝乾下篩酒服方寸匕日三加至二匕論曰婦人温病雖瘥未嘗平復血脉未和尚有熱毒而與之交接得病者名為隂陽之病其人身體重熱上衝胷頭重不能舉眼中生眵䁾一作瞙來四肢一云膝脛拘急小腹絞痛手足拳皆即死其亦有不即死者病苦小腹裏急熱上衝胷頭重不欲舉百節解離經脉緩弱血氣虚骨髓竭便嘘嘘吸吸氣力轉少著床不能動摇起止仰人或引歲月方死醫者張苖說有婢得病瘥後數日有六人犯之皆死治婦人得病易丈夫丈夫得病亦易婦人方取女人中裩近隱處燒服方寸匕三日小便即利隂頭微腫此為愈矣女人病可取男裩一如此法治交接勞復隂卵腫縮腹中絞痛便欲死方取所交接婦人衣裳以覆男子立愈令病人不復方取女人手足爪二十枚女人中衣帯一尺燒以酒若米飲汁服之治男子新病起近房内復者方取女人月經赤帛燒服方寸匕亦治隂卵腫縮入腹絞痛欲死治病後髮亂不可理通頭法生麻油二升將頭髮解開安銅沙羅中用油淹漬之細將釵子領髮斯須並自通矣百合第十二論方論曰百合病者謂無經絡百脉一宗悉致病也皆因傷寒虚勞大病已後不平復變成斯病其狀惡寒而嘔者病在上焦也二十三日當愈其狀腹滿微喘大便堅三四日一大便時復小溏者病在中焦也六十三日當愈其狀小便淋瀝難者病在下焦也三十三日當愈各隨其證以治之百合之為病令人意欲食復不能食或有美時或有不用聞飲食臭時如有寒其實無寒如有熱其實無熱常黙黙欲卧復不得眠至朝口苦小便赤澀欲行復不能行諸藥不能治治之即劇吐利如有神靈所為也百合病身形如和其脉微數其候毎溺時即頭覺痛者六十日乃愈百合病候之溺時頭不覺痛淅淅然寒者四十日愈百合病候之溺時覺快然但覺頭眩者二十日愈百合病證其人或未病而豫見其候者或已病四五日而出或病一月二十日後見其候者治之常誤也依證治之論曰百合病見在于隂而攻其陽則隂不得解也復發其汗為逆也見在於陽而攻其隂則陽不能解也復下之其病不愈要畧云見于隂者以陽法救之見于陽者以隂法解之見陽攻隂復發其汗此為逆其病難治見隂攻陽乃復下之此亦為逆其病難治百合知母湯治百合病已經發汗之後更發者之方百合七枚擘知母三兩右二味以泉水先洗漬百合一宿當沫岀水中明旦去水取百合更以泉水二升煮取一升汁置之復取知母切以泉水二升煮取一升汁合和百合汁中復煮取一升半再服不瘥更依法合服百合滑石代赭湯治百合病已經下之後更發者方百合七枚擘滑石三兩代赭一兩右三味先以泉水漬百合一宿明旦去水更以泉水二升煮百合取一升去滓又以水二升煮餘二味取一升内百合汁如前法復煎取一升半分再服百合雞子湯治百合病已經吐之後更發者方以百合七枚擘浸一宿去汁以泉水二升煮取一升取雞子黄一枚内汁中攪令調分再服百合地黄湯治百合病始不經發汗吐下其病如初者方以百合七枚擘浸一宿去汁以泉水二升煮取一升内生地黄汁一升復煎取一升半分再服大便當去惡沬為候也治百合病經月不解變成渇者方百合根一升以水一斗漬一宿以汁先洗病人身洗身後食白湯餅勿與鹽䜴也渇不瘥可用栝蔞根并牡蠣等分為散飲服方寸匕日三治百合病變而發熱者方百合根一兩乾滑石三兩右二味治下篩飲服方寸匕日三當微利利者止勿復服熱即除一本云治百合病小便赤澀臍下堅急治百合病變腹中滿痛者方但取百合根隨多少熬令黄色𢷬篩為散飲服方寸匕日三滿消痛止備急千金要方巻三十三
