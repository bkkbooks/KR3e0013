body:
  text: 備急千金要方卷二十九唐孫思邈撰宋林億等校正傷寒方傷寒例第一論曰易稱天地變化各正性命然則變化之迹無方性命之功難測故有炎凉寒燠風雨晦㝠水旱妖災蟲蝗怪異四時八節種種施化不同七十二候日月運行各别終其晷度方得成年是謂嵗功畢矣天地尚且如然在人安可無事故人生天地之間命有遭際時有否泰吉凶悔各苦樂安危喜怒愛憎存亡憂畏關心之慮日有千條謀身之道時生萬計乃度一日是故天無一嵗不寒暑人無一日不憂喜故有天行瘟疫病者即天地變化之一氣也斯蓋造化必然之理不得無之故聖人雖有補天立極之徳而不能廢之雖不能廢之而能以道御之其次有賢人善于攝生能知撙節與時推移亦得保全天地有斯瘴癘還以天地所生之物以防備之命曰知方則病無所侵矣然此病也俗人謂之横病多不解治皆曰日滿自差以此致枉者天下大半凡始覺不佳即須救療迄至于病愈湯食競進折其毒勢自然而差必不可令病氣自在恣意攻人拱手待斃斯為誤矣今博採羣經以為上下兩卷廣設備擬好養者可得詳焉小品曰古今相傳稱傷寒為難治之疾時行瘟疫是毒病之氣而論治者不判傷寒與時行瘟疫為異氣耳云傷寒是雅士之辭天行瘟疫是田舍間號耳不說病之異同也考之衆經其實殊異矣所宜不同方說宜别是以略說其要經言春氣温和夏氣暑熱秋氣清涼冬氣凛冽此四時正氣之序也冬時嚴寒萬類深藏君子固密則不傷于寒或觸冒之者乃為傷寒耳其傷于四時之氣皆能為病而以傷寒為毒者以其最為殺厲之氣也中而即病名曰傷寒不即病者其寒毒藏于肌骨中至春變為温病至夏變為暑病暑病熱極重于温也是以辛苦之人春夏多温病熱病者皆由冬時觸冒寒冷之所致非時行之氣也凡時行者是春時應暖而反大寒夏時應熱而反大冷秋時應凉而反大熱冬時應寒而反大温此非其時而有其氣是以一歲之中病無長少多相似者此則時行之氣也傷寒之病逐日深淺以施方治今世人得傷寒或始不早治或治不去病或日數久淹困乃告師師苟依方次第而療則不中病皆冝臨時消息制方乃有效耳華佗曰夫傷寒始得一日在皮當摩膏火灸之即愈若不解者二日在膚可依法針服解肌散發汗汗出即愈即不解至三日在肌復一發汗即愈若不解者止勿復發汗也至四日在胸宜服藜蘆圓微吐之則愈若病困藜蘆圓不能吐者服小豆𤓰蔕散吐之則愈也視病尚未醒醒者復一法針之五日在腹六日入胃入胃乃可下也若熱毒在外未入于胃而先下之者其熱乗虚入胃即爛胃也然熱入胃須要下去之不可留于胃中也胃若實熱為病三死一生皆不愈胃虚熱入爛胃也其熱微者赤斑出此候五死一生劇者黒斑出者此候十死一生但論人有强弱病有難易得效相倍也得病無熱但狂言煩躁不安精彩言語不與人相主當者勿以火迫之但以猪苓散一方寸匕服之當逼與新汲水一升若二升强飲之令以指刺喉中吐之病隨手愈若不能吐者勿强與水水停則結心下也當更以餘藥吐之皆令相主不爾更致危矣若此病軰不時以猪苓散吐解之者其死殆速耳亦可先以去毒物及法針之尤佳夫飲膈實者此皆難治此則三死一生也病者過日不以時下則熱不得泄亦胃爛斑出春夏無大吐下秋冬無大發汗發汗法冬及始春大寒時宜服神丹圓亦可摩膏火炙若春末及夏月始秋此熱月不冝火炙及重覆宜服六物青散若崔文行度瘴散赤散雪煎亦善若無圓散及煎者但單煮柴胡數兩傷寒時行亦可服以發汗至再三發汗不解當與湯實者轉下之其脉朝夕駃者為澼實者朝平夕駃者非澼也轉下湯為可早與但當少與勿令大下耳少與當數其間也諸虚煩熱者與傷寒相似然不惡寒身不疼痛故知非傷寒也不可發汗頭不痛脉不緊數故知非裏實不可下也如此内外皆不可攻而强攻之必遂損竭多死難全也此虚煩但當與竹葉湯若嘔者與橘皮湯一劑不愈為可重與也此法數用甚有效驗傷寒後虚煩亦宜服此湯王叔和曰夫陽盛隂虚外臺作表和裏病汗之則死下之則愈陽虚隂盛外臺則裏和表病下之則死汗之則愈夫如是則神丹安可以誤發甘遂何可以妄攻虚盛之治外臺作表裏之病相背千里吉凶之機應若影響然則桂枝下咽陽盛則斃外臺作表和則斃承氣入胃隂盛以亡外臺作裏平以亡若此隂陽虚實之交錯其候至微發汗吐下之相反其禍至速而醫術淺狹不知不識病者殞没自謂其分至令寃魂塞於㝠路夭死盈于曠野仁愛鑒此寜不傷楚夫傷寒病者起自風寒入于腠理與精氣分爭榮衛否隔周行不通病一日至二日氣在孔竅皮膚之間故病者頭痛惡寒腰背强重此邪氣在表發汗則愈三日以上氣浮在上部填塞胸心故頭痛胷中滿當吐之則愈五日以上氣沉結在臟故腹脹身重骨節煩疼當下之則愈明當消息病之狀候不可亂投湯藥虚其胃氣也經言脉微不可吐虚細不可下又夏月亦不可下也此醫之大禁也脉有沉浮轉能變化或人得病數日方以告醫雖云初覺視病已積日在身其疹瘵結成非復發汗解肌所除當胗其脉隨時形勢救解求免也不可苟以次第為固失其機要乃致禍矣此傷寒次第病三日以内發汗者謂當風解衣夜卧失覆寒温所中并時有疾疫邪風之氣相染易為邪惡所中也至于人自飲食生冷過多腹臟不消轉動稍難頭痛身温其脉實大者便可吐下之不可發汗也陳廪丘云或問得病連服湯藥發汗汗不出如之何答曰醫經云連發汗汗不出者死病也吾思之可蒸之如蒸中風法熱温之氣於外迎之不得不汗出也後以問張苖苖云曽有人作事疲極汗出卧單簟中冷得病但苦寒倦諸醫與圓散湯四日之内凡八過發汗汗不出苖令燒地布桃葉蒸之即得大汗於被中就粉傅身使極燥乃起便愈後數以此發汗汗皆出也人性自有難汗者非惟病使其然也蒸之則無不汗出也諸病發熱惡寒脉浮洪者便宜發汗温粉粉之勿令遇風當發汗而其人適失血及下大利則不可大汗也數少與桂枝湯使體潤漐漐汗出連日當自解也論曰凡人有少苦似不如平常即須早道若隱忍不治冀望自差須臾之間以成痼疾小兒女子益以滋甚若時氣不和當自戒謹若小有不和即須治療尋其邪由及在腠理以時早治鮮不愈者患人忍之數日乃説邪氣入臟則難可制止雖和緩亦無能為也癰疽丁腫喉痺客忤尤其為急此自養生之要也凡作湯藥不可避晨夜時日吉凶覺痛須臾即宜便治不等早晚則易愈矣服藥當如方法若縱意違師不須治之也凡傷寒多從風寒得之始表中風寒入裏則不消矣未有温覆而當不消也凡得時氣病五六日而渇欲飲水飲不能多不當與也所以爾者腹中熱尚少不能消之便更為人作病矣若至七八日大渇欲飲水者猶當依證而與之與之勿令極意也言能飲一斗者與五升若飲而腹滿小便澁若喘若噦不可與之勿然大汗出者欲自愈也人得病能飲水欲愈也凡温病可針刺五十九穴又身之穴三百六十有五其三十六穴灸之有害七十九穴刺之為災論曰夫尋方學之要以救速為貴是以飬生之家須預合成熟藥以補倉卒之急今具之于左辟温第二方􅉶病證濕屠蘇酒辟疫氣令人不染温病及傷寒歲旦之方大黄十五銖自术十八銖桔梗蜀椒各十五銖桂心十八銖烏頭六兩菝葜十二銖右七味㕮咀綘袋盛以十二月晦日中懸沉井中令至泥正月朔旦平曉出藥置酒中煎數沸於東向戸中飲之屠蘇之飲先從小起多少自在一人飲一家無疫一家飲一里無疫飲藥酒得三朝還滓置井中能仍歲飲可世無病當家内外有井皆悉著藥辟温氣也又一方有防風一兩大匕流金散辟温氣方雄黄三兩雌黄二兩礬石一兩半鬼箭羽一兩半羚羊角燒二兩右五味治下篩三角絳袋盛一兩帯心前并掛門戸上若逢大疫之年以月旦青布裹一刀圭中庭燒之温病人亦燒薫之雄黄散辟温氣方雄黄五兩朱砂一作赤木菖蒲鬼臼各二兩右四味治下篩以塗五心額上鼻人中及耳門預備一物栢枝散天氣不和疾病流行方取南向社中栢東南枝曝令乾𢷬末酒服方寸匕神良粉身散辟温病常用方芎藭白芷藁本各等分右三味治下篩内米粉中以粉身殺鬼燒藥方辟温氣雄黄丹砂雌黄各一斤羚羊角羖羊角亦得蕪荑虎骨鬼臼鬼箭羽野丈人石長生猳猪屎馬懸蹄各三兩青羊脂菖蒲白术各八兩蜜蠟八斤右十六味末之以蜜蠟和為丸如彈許大朝暮及夜中戸前微火燒之虎頭殺鬼圓辟温方虎頭五兩朱砂雄黄雌黄各一兩半鬼臼皂莢蕪荑各一兩右七味末之以蜜蠟和為丸如彈子大絳袋盛繫臂男左女右懸屋四角晦望夜半中庭燒一圓辟温殺鬼圓熏百鬼惡氣方雄黄雌黄各二兩羖羊角虎骨各七兩龍骨龜甲鯪鯉甲蝟皮各三兩樗雞十五枚空青一兩芎藭真珠各五兩東門上雞頭一兩右十三味末之烊蠟二十兩并手圓如梧子正旦門户前燒一圓𢃄一圓男左女右辟百惡獨宿弔喪問病各吞一圓小豆大天隂大霧日燒一圓於戸牖前佳雄黄圓漢建炎二年太歲在酉疫氣流行死者極衆即有書生丁季迴從蜀青城山來東過南陽從西市門入見患疫癘者頗多遂于囊中出藥人各惠之一圓靈藥霑唇疾無不瘥市中疫鬼數百餘見書生施藥悉皆驚怖而走乃有鬼王見書生謂有道法兼自施藥感衆鬼等奔走若是遂詣書生欲求受其道法書生曰吾無道法乃囊中之藥呈于鬼王鬼王覩藥驚惶扣頭乞命而走此方藥帶之入山能辟虎狼蛇蟲入水能除水怪蛟蜃雄黄雌黄曽青鬼臼真珠丹砂虎頭骨桔梗白术女青芎藭白芷鬼督郵蕪荑鬼箭羽藜蘆菖蒲皂莢各一兩右十八味末之蜜丸如彈子大絹袋盛男左女右帯之卒中惡病及時疫吞如梧子一丸燒一丸彈子戸内赤散辟温疫氣傷寒熱病方藜蘆躑躅花各一兩牡丹皮皂莢各一兩六銖附子桂心真珠各六兩細辛乾薑各十八銖右九味末之内真珠合治之分一方寸匕置絳囊中帶之男左女右着臂自隨覺有病之時便以粟米大内著鼻中又酒服一錢匕覆取汗日三服當取一過汗耳又方正月旦取東行桑根如指長七寸以丹塗之懸門戸上又令人帶之斷温病不相染著方汲水瓶一長七寸盜著病人卧席下良又方以繩度所住户中壁屈繩即斷之治温病不相染方以桃樹蠧屎末之水服方寸匕又方术豉等分酒漬服之妙又方正旦吞麻子赤小豆各二七粒又以二七粒投井中又方新布袋盛赤豆一升内井中三日出舉家服二七枚又方松葉末之酒服方寸匕日三服又方常以七月七日合家吞赤小豆向日吞二七枚又方常以七月七日男吞大豆七枚女吞小豆二七枚又方神仙教人立春後有庚子日温蕪菁葅汁合家大小並服不限多少斷温疫轉相染著乃至滅門延及外人無收視者方赤小豆鬼箭羽鬼臼雄黄各二兩右四味末之以蜜和服如小豆一丸可與病人同床𫝊衣治温令不相染方新布袋盛大豆一升内井中一宿出服七枚治温疫方藥子二枚末水服之又方白蜜和上色朱砂粉一兩以太歲日平旦大小勿食向東方立吞服三七丸如麻子大勿令齒近之并吞赤小豆七枚投井泉中終身勿忘此法又方凡時行疫癘常以月望日細剉東引桃枝煮湯浴之治瘴氣方蒜五子并皮碎之䜴心一升右二味以三歲男兒尿二升煮五六沸去滓服之良又方青竹茹二升以水四升煮取三升分作三服治患霧氣者心内煩悶少氣頭痛項急起則眼眩欲倒身微熱戰掉不安時復増寒心中欲吐吐時無物方新猪屎二升半内好酒一升攪令散以生布絞取汁更以綿濾頓服之取盡即地鋪暖卧覆盖鋪前著火常汗出若得汗當細細去上衣勿使心寒寒即不差看汗自乾乃起慎風冷亦治瘧及風勞蟲毒治肝腑臟温病隂陽毒頸背雙筋牽先寒後熱腰强急縮目中生花方桂心一兩白术芒硝大青梔子各三兩柴胡五兩石膏生薑各八兩生地黄香䜴各一升右十味㕮咀水九升煮取三升分三服治肝腑臟温病隂陽毒先寒後熱頸筋攣牽面目赤黄身中直强方𤣥參一兩細辛二兩梔子黄芩升麻芒硝各三兩石膏八兩竹葉切五升車前草曝切二升右九味㕮咀以水一斗半煮竹葉車前取七升去滓下諸藥煎至三升芒硝分三服治心腑臟温病隂陽毒戰掉不安驚動方大青黄芩梔子知母芒硝各三兩麻黄四兩𤣥參六兩石膏生葛根各八兩生地黄切一升右十味㕮咀以水九升煮取三升去滓下芒硝分三服治脾腑臟温病隂陽毒頭重頸直皮肉痺結核隱起方大青羚羊角升麻射干芒硝各三兩梔子四兩寒水石五兩𤣥參八兩右八味㕮咀以水七升煮取三升分三服治肺腑臟温病隂陽毒咳嗽連續聲不絶嘔逆方麻黄梔子紫菀大青𤣥參葛根各三兩桂心甘草各二兩杏仁前胡各四兩石膏八兩右十一味㕮咀以水九升煮取三升分作三服治腎腑臟温病身面如刺腰中欲折熱毒内傷方茵蔯蒿梔子芒硝各三兩苦參生葛各四兩生地黄石膏各八兩蔥白䜴各一升右九味㕮咀以水九升煮取二升半下芒硝分三服萎㽔湯治温風之病脉隂陽俱浮汗出體重其息必喘其形狀不仁嘿嘿但欲眠下之者則小便難發其汗者必讝語加燒針者則耳聾難言但吐下之則遺失便利如此疾者宜服之方萎㽔白薇麻黄獨活杏仁芎藭甘草青木香各二兩石膏三兩右九味㕮咀以水八升煮取三升去滓分三服取汗若一寒一熱加朴硝一分及大黄三兩下之如無木香可用麝香一分小品方云萎㽔湯治冬温冬春月中風傷寒則發熱頭腦痛咽喉乾舌强骨肉疼心胸痞滿腰背强亦治風温夫􅉶病與百合狐惑濕風温病鬼魅皆相類宜精察節氣其新故二氣相搏喜成此疾備急千金要方卷二十九
