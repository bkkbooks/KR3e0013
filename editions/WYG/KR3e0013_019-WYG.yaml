body:
  text: 備急千金要方卷十九唐孫思邈撰宋林億等校正七竅病方齒病第六論法方灸論曰凡齒齗宣露多是疳􅉶及月蝕以角蒿灰夜傅齗間使滿勿食油不過二三夜瘥食油及乾􅀥即發所以患齒者忌油乾􅀥及桂心毎旦以一捻鹽内口中以温水含揩齒及叩齒百遍為之不絶不過五日口齒即牢宻凡人齒齗不能食果菜者皆由齒根露也為此鹽湯揩齒叩齒法無不愈也神良凡人好患齒病多由月蝕夜食飲之所致也識者深宜慎之所以日月蝕未平時特忌飲食小兒亦然治齲齒及蟲痛方白附子知母細辛各六銖芎藭高良薑各十二銖右五味為末以綿裹少許著齒上有汁吐出一日兩度含之亦治口氣又方切白馬懸蹄如米許以綿裹著痛處孔中不過三度善治䘌齒蟲齒積年不瘥從少至老方雀麥草一名杜姥草似牛毛草以苦瓠葉四十枚淨洗露一宿平旦取草屈長二寸廣一寸厚五分以瓠葉裹縛之作五六十裹子取三年釅醋浸之至日中取兩裹内火中炮令極熱内口中齒外邊熨之冷則易之取銅器以水内中解裹于水中洗之得蟲長三分老者黄赤色少者白色多者得三四十枚少者得一二十枚治蟲齒方莨菪子三合如無蔥子韭子並得以青錢七文燒令赤取小口甖子令可口含得者將錢内甖子中取一撮許莨菪子安錢上令炮烢聲仍與半合許水淋令氣上從甖出將口含甖口令氣莫出用熏齒冷復更作取三合藥盡為劑非止蟲齒得瘥或風齒齲齒齒中病悉主之口中多津即吐之又方白楊葉切一升水三升煮取一升含之又方大醋一升煮枸杞根白皮一升取半升含之蟲立出又方取桃仁少許以􅁫頭穿向燈上燒之煙出經少時吹滅即内入口安蟲齒上咬之不過五六度一方作胡桃仁治疳蟲蝕齒根方地龍置石上著一撮鹽須臾化為水以麫展取却待凝厚取以内病上又以皂莢去皮塗上蟲即出又方純麻子燭燼研以井花水塗之又方黒羖羊脂莨菪子各等分先燒鐵鋤斧令赤内其中煙出以布單覆頭令煙氣入口熏之治齒齗腫痛及蟲痛方黄芩甘草桂心當歸細辛蛇床子各一兩右六味㕮咀以醋漿水七升煮取三升去滓含之日三夜二治齒有孔不得食面腫方莽草七葉猪椒附根皮長四寸者七枚右二味㕮咀以漿水三升煮取一升滿口含倦即吐却日二三度治齒根腫方松葉一把切鹽一合右二味以酒三升煮取一升含之治齒根動欲脫落方生地黄綿裹著齒上咋之又㕮咀以汁漬齒根日四五度著之并咽汁十日内大佳治齒根動且痛方生地黄獨活各三兩右二味㕮咀以水一升漬一宿取含之治齒齗間津液血出不止方生竹筎二兩醋煮含之又方細辛二兩甘草一兩右二味㕮咀以醋二升煎取一升日夜旋含之又方礬石一兩燒水三升煮取一升先拭血乃含之已後不用朽人牙根齒落不用之可也治齒間血出方以苦竹葉濃煮與鹽少許寒温得所含之泠即吐又方温童子小便半升取三合含之其血即止也治齒出血不止方刮生竹皮二兩苦酒浸之令其人解衣坐使人含噀其背上三過仍取竹茹濃煮汁勿與鹽適寒温含漱之竟日為度治酒醉牙齒涌血出方當歸二兩礬石六銖桂心細辛甘草各一兩右五味㕮咀以漿水五升煮取三升含之日五六夜三又方燒釘令赤注血孔中止治頭面風口齒疼痛不可忍方蜀椒二合莽草十葉雀李根獨活各二兩細辛芎藭防風各一兩右七味㕮咀以酒二升半煮取五沸去滓含之冷吐更含之勿咽汁張文仲有白术二兩又方雞屎白燒灰以綿裹置齒痛上咬咋之又方煮枸杞汁含之又方雞屎白以醋煮漬稍稍含之又方生地黄一節蒜一瓣右二味熟𢷬綿裹著痛上咬之勿咽汁出吐之日日為之瘥止又方含驢尿須臾即止治風齒疼痛方灸外踝上高骨前交脉三壯又以線量手中指至掌後横文折為四分量横文後當臂中灸二壯愈灸之當隨左右含漱湯治齒痛方獨活當歸各三兩黄芩細辛芎藭蓽茇各二兩丁香一兩右七味㕮咀以水五升煮取二升半去滓含漱須臾悶出吐更含之古今録驗同有甘草二兩又方含白馬尿隨左右含之不過三五口漱湯治齒痛方腐棘刺二百枚以水二升煮取一升旋旋含之日四五度以瘥止又方芎藭細辛防風礬石附子藜蘆莽草右七味各等分作末綿裹如彈丸大酒浸安所患處含之勿咽日三刺皮極佳又方蚯蚓糞水和作稠泥團以火燒令極赤如粉以臘月猪膏和傅齒齗上日三兩度永瘥又方取自死蚯蚓乾者𢷬末著痛處即止治齒齗痛不可食生果方生地黄桂心右二味合嚼令味相得咽之又方馬齒一把嚼之即瘥治牙癰塞口噤不開方附子大者一枚黄連十八銖礬石一兩右三味為末内管中强開口吹之入喉間細細吹之備急千金要方卷十九
