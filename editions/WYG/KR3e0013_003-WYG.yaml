body:
  text: 備急千金要方卷三唐孫思邈撰宋林億等校正婦人方妊娠諸病第四方法灸第一胎動及數墮胎治妊娠二三月上至八九月胎動不安腹痛已有所見方艾葉阿膠芎藭肘後不用當歸各三兩甘草二兩右五味以水八升煮取三升去滓内膠令消分三服日三治妊娠胎動去血腰腹痛方阿膠二兩芎藭當歸青竹茹各五兩右四味以水一斗半煮銀二斤取六升去銀内藥煎取二升半内膠令烊分三服不瘥重作一方用甘草二兩蔥白湯治妊娠胎動不安腹痛方蔥白切一升阿膠二兩當歸續斷芎藭各三兩右五味㕮咀以水一斗先煮銀六七兩取七升去銀内藥煎取二升半下膠令烊分三服不瘥重作治妊娠胎動晝夜呌呼口噤脣搴及下重痢不息方艾葉㕮咀以好酒五升煮取四升去滓更煎取一升服口閉者格口灌之藥下即瘥亦治妊娠腰痛及妊娠熱病并妊娠卒下血旋復花湯治妊娠六七月胎不安常服之方旋復花一兩半夏芍藥生薑各二兩枳實厚朴白术黄芩茯苓各三兩右九味㕮咀以水一斗煮取二升半分五服日三夜二先食服治妊娠數墮胎方取赤小豆為末酒服方寸匕日二亦治妊娠數月月水尚來者又方妊娠三月灸膝下一寸七壯第二漏胞方治妊娠下血如故名曰漏胞胞乾便死方生地黄半斤㕮咀以清酒三升煮三沸絞去滓服之無時能多服佳姚大夫加黄雌雞一頭治如食法崔氏取雞血和藥中服治妊娠血下不止名曰漏胞血盡子死方乾地黄𢷬末以三指撮許酒服不過三服瘥又方生地黄汁一升清酒四合煮三四沸頓服不止頻服又方乾薑二兩乾地黄四兩右二味治下篩以酒服方寸匕日再三服第三子煩方竹瀝湯治妊娠常苦煩悶此是子煩竹瀝一升麥門冬防風黄芩各三兩茯苓四兩右五味以水四升合竹瀝煮取二升分三服不瘥再又方時時服竹瀝隨多少取瘥止第四心腹腰痛及脹滿方治妊娠心痛方青竹皮一升以酒二升煮三兩沸頓服又方破生雞子一枚酒和服之又方白蜜三兩羊脂八兩青竹茹一升右三味合煎食頓服如棗核大三枚日三又方蜜一升和井底泥泥心下又方燒棗二七枚為末尿服之立愈治妊娠腹中痛方生地黄三斤𢷬絞取汁用清酒一升合煎減半頓服又方燒車缸脂内酒中服亦治妊娠欬𠻳并産難三日不出又方取蜜一升頓服良治妊娠腹中滿痛义心不得飲食方黄芩三兩芍藥四兩白术六兩右三味㕮咀以水六升煮取三升分三服半日令藥盡㣲下水令易生月飲一劑為善也治妊娠忽苦心腹痛方燒鹽令赤熱三指撮許酒服之立産治妊娠傷胎結血心腹痛方取小兒尿二升頓服之立瘥大良治妊娠中惡心腹痛方新生雞子二枚破著杯中以糯米粉和如粥頓服亦治妊娠卒胎動不安或但腰痛或胎轉搶心或下血不止又方水三升洗夫靴剔汁温服治妊娠中蠱心腹痛方燒敗皷皮酒服方寸匕須臾自呼蠱主姓名治妊娠腰痛方大豆二升以酒三升煮取二升頓服之亦治常人卒腰痛者又方麻子三升以水五升煮取汁三升分五服亦治心痛又方䜴二兩榆白皮三兩右二味熟𢷬蜜丸如梧桐子大服二七丸亦治心痛又方燒牛屎焦末水服方寸匕日三服又方地黄汁八合酒五合合煎分温服治妊娠脹滿方取秤鎚燒之淬酒中服良亦治妊娠卒下血第五傷寒方治妊娠傷寒頭痛壯熱肢節煩疼方石膏八兩大青黄芩各三兩葱白切一升前胡知母梔子仁各四兩右七味㕮咀以水七升煮取二升半去滓分五服相去如人行七八里久再服治妊娠頭痛壯熱心煩嘔吐不下食方知母四兩粳米五合生蘆根一升青竹茹三兩右四味以水五升煮取二升半稍稍飲之盡更作瘥止治妊娠傷寒服湯後頭痛壯熱不歇宜用此湯拭其身麻黄半斤竹葉切一升石膏三升為末右三味以水五升煮取一升去滓冷用拭身體又以故布㩉頭額胷心燥則易之患瘧者加恒山五兩治妊娠傷寒方蔥白十莖生薑二兩切右二味以水三升煮取一升半頓服取汗治妊娠中風寒熱腹中絞痛不可鍼灸方鯽魚一頭燒作灰𢷬末酒服方寸匕取汗治妊娠遭時疾令子不落方取竈中黄土水和塗臍乾復塗之一方酒和塗方五寸又泔清和塗之並佳又方犬尿泥塗腹勿令乾治妊娠熱病方蔥白五兩豆䜴一升右二味以水六升煮取二升分二服取汗又方蔥白一把以水三升煮令熟服之取汗食蔥令盡亦主安胎若胎已死者須臾即出又方車轄脂酒服大良又方井底泥泥心下三寸立愈又方青羊屎塗腹上又方水服伏龍肝一雞子大治大熱煩悶者方葛根汁二升分三服如人行五里久進一服又方燒大􅀥七枚為末酒和服又方槐實燒灰取方寸匕酒和服第六瘧病方治妊娠患瘧湯方恒山二兩甘草一兩黄芩三兩烏梅十四枚石膏八兩右五味㕮咀以酒水各一升半合漬藥一宿煮三四沸去滓初服六合次服四合後服二合凡三服又方恒山竹葉各三兩石膏八兩粳米一百粒崔氏外臺作糯米集驗救急作秫米右四味㕮咀以水六升煮取二升半去滓分三服第一服取未發前一食頃服之第二服取臨欲發服之餘一服用以塗頭額及胷前五心藥滓置頭邊當一日勿近水及進飲食過發後乃進粥食第七下血方治妊娠忽暴下血數升胎燥不動方榆白皮三兩當歸生薑各二兩乾地黄四兩葵子一升肘後不用右五味以水五升煮取二升半分三服不瘥更作服之馬通湯治妊娠卒驚奔走或從高墮下暴出血數升方馬通汁一升乾地黄阿膠各四兩當歸艾葉各三兩右五味㕮咀以水五升煮取二升半去滓内馬通汁及膠令烊分三服不瘥重作膠艾湯治妊娠二三月上至七八月其人頓仆失踞胎動不下傷損腰腹痛欲死若有所見及胎奔上搶心短氣方艾葉三兩阿膠芎藭芍藥甘草當歸各二兩乾地黄四兩右七味㕮咀以水五升好酒三升合煮取三升去滓内膠更上火令盡消分三服日三不瘥更作治妊娠卒下血方葵子一升以水五升煮取二升分三服瘥止又方生地黄切一升以酒五升煮取三升分三服亦治落身後血又方取葵根莖燒作灰以酒服方寸匕日三蟹爪湯治妊娠僵仆失據胎動轉上搶心甚者血從口出逆不得息或注上下血一斗五升胎不出子死則寒熨人腹中急如産狀虚乏少氣困頓欲死煩悶反覆服藥母得即安下血亦止其當産者立生方蟹爪一升甘草桂心各二尺阿膠二兩右四味㕮咀以東流水一斗煮取三升去滓内膠烊盡能為一服佳不能者食頃再服若口急不能飲者格口灌之藥下便活也與母俱生若胎已死獨母活也若不僵仆平安妊娠無有所見下血服此湯即止或云桂不安胎亦未必爾治妊娠胎墮下血不止方丹參十二兩㕮咀以清酒五升煮取三升分三服温日三又方地黄汁和代赭為末服方寸匕又方桑蠍蟲屎燒灰酒服方寸匕香䜴湯治半産下血不盡苦來去煩滿欲死方香䜴一升半以水三升煮三沸漉去滓内成末鹿角一方寸匕頓服之須臾血自下鹿角燒亦得第八小便病方灸法治妊娠小便不利方葵子一升榆白皮一把切右二味以水五升煮五沸毎服一升日三又方葵子茯苓各一兩右二味為末以水服方寸匕日三小便利則止仲景云妊娠有水氣身重小便不利洒淅􅁖寒起即頭眩治妊娠患子淋方葵子一升以水三升煮取二升分再服又方葵根一把以水三升煮取二升分再服治妊娠小便不通利方蕪菁子七合為末水和服方寸匕日三治妊娠尿血方黍穰燒灰酒服方寸匕日三治婦人無故尿血方龍骨五兩治下篩酒服方寸匕空腹服日三久者二十服愈又方爪甲亂髮右二味並燒末等分酒服方寸匕日三飲服亦得又方桂心鹿角屑大豆黄卷各一兩右三味治下篩酒服方寸匕日三又方取夫爪甲燒作灰酒服之又方取故船上竹茹曝乾𢷬末酒服方寸匕日三亦主遺尿治婦人遺尿不知出時方白􅅔芍藥各一兩右二味治下篩酒服方寸匕日三又方礬石牡蠣各二兩右二味治下篩酒服方寸匕亦治丈夫又方胡鷰窠中草燒末酒服半錢匕亦治丈夫又方燒遺尿人薦草灰服之瘥又方灸横骨當隂門七壯第九下痢方灸法治妊娠下痢方人參三兩黄芩三兩櫸皮四兩粳米三合酸石榴皮三兩右五味㕮咀以水七升煮取二升半分三服又方白楊皮一斤㕮咀以水一大升煮取二小升分三服又方燒中衣帶三寸為末服之又方羊脂如碁子大十枚温酒一升投中頓服之日三治妊娠患膿血赤滯魚腦白滯臍腹絞痛不可忍者方薤白切一升酸石榴皮黄蘗各三兩産寳作黄連阿膠二兩地榆四兩右五味㕮咀以水七升煮取二升半分三服不瘥更作治妊娠注下不止方阿膠艾葉酸石榴皮各二兩右三味以水七升煮取二升去滓内膠令烊分三服治妊娠及産已寒熱下痢方黄連一升黄蘗一斤梔子三十枚右三味㕮咀以水五升漬一宿煮三沸服一升一日一夜令盡嘔者加橘皮一兩生薑二兩亦治丈夫常痢治婦人欲痢輒先心痛腹脹滿日夜五六十行方石榴皮麴各八兩黄蘗一作麥蘗烏梅黄連艾各一兩防己二兩阿膠乾薑各三兩附子五兩右十味為末蜜和丸如梧子大飲服二十丸日三漸加至三十四十丸治婦人水洩痢方灸氣海百壯三報第十水腫方治妊娠體腫有水氣心腹急滿湯方茯苓白术各四兩崔氏無术黄芩杏仁各三兩旋復花二兩右五味㕮咀以水六升煮取二升半分作三服鯉魚湯治妊娠腹大胎間有水氣方鯉魚一頭二斤白术生薑各五兩芍藥當歸各三兩茯苓四兩右六味㕮咀以水一斗二升先煮魚熟澄清取八升内藥煎取三升分五服治妊娠毒腫方蕪菁根淨洗去皮𢷬酢和如薄泥勿令有汁猛火煮二三沸適性薄腫以帛急裹之日再易寒時温覆非根時用子若腫在咽中取汁含咽之又方燒􅀈牛屎酢和傅之乾則易亦可服方寸匕日三治妊娠手脚皆腫攣急方赤小豆五升商陸根一切右二味以水三斗煮取一斗稍稍飲之盡更作一方加澤㯃一斤産難第五論法方鍼論曰産婦雖是穢惡然將痛之時及未産已産並不得令死喪汚穢家人來視之則生難若已産者則傷兒也婦人産乳忌反支月若值此月當在牛皮上若灰上勿令水血汚物著物則殺人及浣濯衣水皆以器盛過此忌月乃止凡生産不依産圖脫有犯觸於後母子皆死若不至死即母子俱病庶事皆不稱心若能依圖無所犯觸母即無病子亦易養凡欲産時特忌多人瞻視惟得三二人在傍待總産訖乃可告語諸人也若人衆看視無不難産凡産婦第一不得怱怱忙怕傍人極須稳審皆不得預緩預急及憂悒憂悒則難産若腹痛眼中火生此兒逥轉未即生也兒出訖一切人及母皆忌問是男是女兒始落地與新汲井水五􅍋忌與暖湯物勿令母看視穢汚凡産婦慎食熱藥熱麫食常識此飲食當如人肌温温也凡欲臨産時必先脫尋常所著衣以籠􅍳頭及􅍳口令至宻即易産也凡産難及子死腹中并逆生與胞胎不出諸篇方可通檢用之治産難或半生或胎不下或子死腹中或著脊及坐草數日不産血氣上搶心母面無顔色氣欲絶者方醇酒二升白蜜一升成煎猪膏一升右三味合煎取二升分再服不能再服可隨所能服之治産後惡血不除上搶心痛煩急者以地黄汁代醇酒治難産方槐枝切二升榆白皮切大麻仁各一升瞿麥通草各三兩牛膝五兩右六味㕮咀以水一斗二升煮取三升半分五服又方吞皂莢子二枚又方取厠前已用草二七枚燒作屑水調而服之又方令夫唾婦口中二七過立出又方鍼兩肩井入一寸寫之須臾即分娩治産難三日不出方取鼠頭燒作屑井花水服方寸匕日三又方車軸脂吞大豆許兩丸又方燒藥杵令赤内酒中飲之又方燒大刀鐶以酒一杯沃之頓服即出救死不分娩者治産難累日氣力乏盡不得生此是宿有病者方阿膠二兩赤小豆二升右二味以水九升煮豆令熟去滓内膠令烊毎服五合不覺更服不過三服即出又方槐子十四枚蒲黄一合右二味合内酒中温服須臾不生再服之水服亦得又方生薑汁生地黄汁各半升右二味合煎熟頓服之治産難及日月未足而欲産者方知母一兩為末蜜丸加兎屎大毎服一丸痛不止更一丸羚羊角散治産後心悶是血氣上衝心所致羚羊角一枚燒作灰下篩以東流水服方寸匕若未瘥須臾再服取悶瘥乃止又方羖羊角燒作灰以温酒服方寸匕不瘥須臾再進備急方以治産難治産乳運絶方半夏一兩𢷬篩丸如大豆内鼻孔中即愈此是扁鵲法又方神麯末水服方寸匕亦治産難又方赤小豆𢷬為㪚取東流水服方寸匕不瘥更服又方含釅醋噀面即愈凡悶即噀之又方取釅醋和産血如棗許大服之治心悶方産後心悶眼不得開即當頂上取髪如兩指大强以人牽之眼即開子死腹中第六論方論曰凡婦人産難死生之候母面赤舌青者兒死母活母脣口青口兩邊沫出者母子俱死母面青舌赤口中沫出者母死子活治動胎及産難子死腹中并妊娠兩兒一死一生服之令死者出生者安神驗方蠏爪一升甘草二尺阿膠三兩右三味以東流水一斗先煮蠏爪甘草得三升去滓次内膠令烊頓服之不能分再服若人困抝口内藥藥入即活煎藥作東向竈用葦薪煮之真珠湯治胎死腹中方熟真珠一兩榆白皮切升右二味以苦酒三升煮取一升頓服之死胎立出治子死腹中不出方以牛尿塗母腹上立出又方取竈下黄土三指撮以酒服之立出土當著兒頭上亦治逆生及横生不出手足先見者又方服水銀三兩立出又方取夫尿二升煮令沸飲之又方酢二升抝口開灌之又方吞槐子二七枚亦治逆生又方三家雞卵各一枚三家鹽各一撮三家水各一升合煮令産婦東向飲之立出又方瞿麥一斤以水八升煮取二升一服一升不出再服治胎死腹中乾燥著背方葵子一升阿膠五兩右二味以水五升煮取二升頓服之末出再煮服治妊娠未足月而胎卒死不出其母欲死方以苦酒濃煮大豆毎服一升死胎立出不能頓服分再服一方用醇酒煮大豆亦治積聚成瘕治妊娠胎死腹中若子生胞衣不出腹中引腰背痛方甘草一尺筒桂四寸雞子一枚蒲黄二合香䜴二升右五味以水六升煮取一升頓服之胎胞穢惡盡去大良治妊娠得病須去胎方以雞子一枚鹽三指撮和服立下此與阮河南療難産相同又方麥糵一升為末和蜜一升服之立下又方七月七日神麴三升酢一升煮兩沸宿不食平旦頓服之即下又方大麥麴五升酒一斗煮三沸去滓分五服令盡當宿勿食其子如糜令母肥盛無疾苦千金不傳逆生第七論方論曰凡産難或兒横生側生或手足先出可以鍼錐刺兒手足入一二分許兒得痛驚轉即縮自當迴順也治逆生方以鹽塗兒足底又可急爪搔之并以鹽摩産婦腹上即愈又方以鹽和粉塗兒足下即順子母秘録云以鹽和明粉又方取梁上塵如彈丸許二枚治末三指撮温酒服之治逆生及横生不出手足先見者方燒蛇蛻皮為末服一刀圭亦云三指撮面向東酒服即順又方取蟬殻二枚治為末三指撮許温酒服之崔氏外臺子母秘録作彈丸二枚為末酒服又方取夫隂毛二七莖燒以猪膏和丸如大豆吞之兒手即持丸出神驗又方取蛇蛻皮燒灰猪膏和丸東向服又方以手中指取釡底墨交畫兒足下即便順生又方取父名書兒足下即順生治横生及足先出者方取梁上塵竈突墨酒服之又方取車釭中脂書兒足下及掌中治縱横生不可出者方莵絲子末酒若米汁服方寸匕即生車前子亦好服如上法又方以水苦酒服竈突墨塵治産時子但趨穀道者方熬鹽熨之自止胞胎不出第八方牛膝湯治産兒胞衣不出令胞爛方牛膝瞿麥各一兩當歸通草各一兩半滑石二兩一方用桂心二兩葵子半升右六味㕮咀以水九升煮取三升分三服治産難胞衣不出横倒者及兒死腹中母氣欲絶方半夏二兩白斂二兩右二味治下篩服方寸匕小難一服横生二服倒生三服兒死四服亦可加代赭瞿麥各二兩為佳治胎死腹中若母病欲下之方取榆白皮細切煮汁三升服之即下難生者亦佳又方生地黄汁一升苦酒三合令暖服之不能頓服分再服亦得又方牛膝三兩葵子一升右二味以水七升煮取三升分三服又方澤蘭葉三兩滑石五合生麻油二合右三味以水一升半煮澤蘭取七合去滓内滑石麻油頓服之治胞衣不出方取小麥合小豆煮令濃飲其汁立出亦治横逆生者又方取𤓰瓣二七枚服之立出良又方取水煮弓弩弦飲五合即出亦可燒灰酒和服又方取宅中所埋柱掘出取坎底當柱下土大如雞子酒和服之良又方墨三寸為末酒服又方取蒲黄如棗許以井花水服又方苦酒服真珠一兩又方雞子一枚苦酒一合和飲之又方生男吞小豆七枚生女者十四枚即出治逆生胎不出方竈上墨以酒煮一兩沸取汁服治産後胞不時出方井底土如雞子中黄以井花水和服立出又方取井中黄土丸如梧桐子吞之立出又治兒不出治子死腹中若衣不出欲上搶心方急取蟻蛭土三升熬令熱囊盛熨心下令胎不得上搶心良又方末竈突中墨三指撮許以水苦酒調服立出當著兒頭生又方取夫内衣葢井上立出又方取炊篩當户前燒服之下乳第九方鍾乳湯治婦人乳無汁方石鍾乳消石一方用滑石白石脂各六兩通草十二銖桔梗半兩切右五味㕮咀以水五升煮三沸三上三下去滓内消石令烊分服又方石鍾乳通草各等分右二味為末粥飲服方寸匕日三後可兼養兩兒通草横心者是勿取羊桃根色黄無益一方二味酒五升漬一宿明旦煮沸去滓服一升日三夏冷服冬温服又方石鍾乳四兩甘草二兩一不用漏蘆三兩通草栝蔞根五兩右五味㕮咀以水一斗煮取三升分三服一云用栝蔞實一枚又方石鍾乳通草各一兩漏蘆半兩桂心甘草栝蔞根各六銖右六味治下篩酒服方寸匕日三最驗又方石鍾乳漏蘆各二兩右二味治下篩飲服方寸匕即下漏蘆湯治同前漏蘆通草各二兩石鍾乳一兩黍米一升右四味㕮咀米宿漬揩撻取汁三升煮藥三沸去滓作飲飲之日三漏蘆㪚治同前漏蘆半兩石鍾乳栝蔞根各一兩蠐螬三合右四味治下篩先食糖水服方寸匕日三單行石膏湯治同前石膏四兩研以水二升煮三沸稍稍服一日令盡麥門冬散治同前麥門冬通草理石石鍾乳右四味各等分治下篩先食酒服方寸匕日三又方麥門冬通草理石石鍾乳土𤓰根大棗蠐螬右七味等分治下篩食畢用酒服方寸匕日三又方母猪蹄一具粗切以水二斗熟煮得五六升汁飲之不出更作又方猪蹄二枚熟灸搥碎通草八兩細切右二味以清酒一斗浸之稍稍飲盡不出更作外臺猪蹄不灸以水一斗煮取四升入酒四升更煮飲之又方栝蔞根切一升酒四升煮三沸去滓分三服又方栝蔞根漏蘆各三兩石鍾乳四兩白頭翁一兩滑石通草各二兩右六味治下篩以酒服方寸匕日三又方取栝蔞子尚青色大者一枚熟𢷬以白酒一斗煮取四升去滓温服一升日三黄色小者用二枚亦好又方土𤓰根治下篩服半錢匕日三乃乳如流水單行鬼箭湯治同前鬼箭五兩以水六升煮取四升每服八合日三亦可燒作灰水服方寸匕日三甘草散治同前甘草一兩通草三十銖石鍾乳二十銖雲母二兩半屋上散草二把燒為灰右五味治下篩食後温漏蘆湯服方寸匕日三乳下止又方燒死鼠作屑酒服方寸匕日三立下勿令知又方燒鯉魚頭為末酒服三指撮鯽魚湯下乳汁方鯽魚長七寸猪肪半斤漏蘆石鍾乳各八兩右四味切猪肪魚不須洗治清酒一斗二升合煮魚熟藥成絞去滓適寒温分五服其間相去須臾一飲令藥力相及為佳乳即下備急千金要方卷三
