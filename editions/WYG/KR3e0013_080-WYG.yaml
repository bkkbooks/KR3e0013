body:
  text: 備急千金要方卷八十唐孫思邈撰宋林億等校正食治榖米第四二十六條薏苡仁味甘温無毒主筋拘攣不可屈伸久風濕痺下氣久服輕身益力其生根下三蟲名醫云薏苡仁除筋骨中邪氣不仁利腸胃消水腫令人能食一名􅀢一名感米蜀人多種食之胡麻味甘平無毒主傷中虚羸補五内益氣力長肌肉塡髓腦堅筋骨療金瘡止痛及傷寒温瘧大吐下後虚熱困乏久服輕身不老聰明耳目耐寒暑延年作油微寒主利大腸産婦胞衣不落生者摩瘡腫生禿髪去頭面遊風一名巨勝一名狗虱一名方莖一名鴻藏葉名青蘘主傷暑熱花主生禿髪七月採最上標頭者隂乾用之白麻子味甘平無毒宜肝補中益氣肥健不老治中風汗出逐水利小便破積血風毒腫復血脉産後乳餘疾能長髪可爲沭藥久服神仙􅏁味甘微温無毒補虚冷益氣力止腸鳴咽痛除唾血却卒嗽大豆黄卷味甘平無毒主久風濕痺筋攣膝痛除五臟胃氣結積益氣止毒去黒誌面䵟潤澤毛皮宜腎生大豆味甘平冷無毒生𢷬淳酢和塗之治一切毒腫并止痛煮汁冷服之殺鬼毒逐水脹除胃中熱却風痺傷中淋露下瘀血散五臟結積内寒殺烏頭三建解百藥毒不可久服令人身重其􅆈屑味甘温平無毒主胃中熱去身腫除痺消榖止腹脹九月採黄帝云服大豆屑忌食猪肉炒豆不得與一歲已上十歲已下小兒食食竟噉猪肉必擁氣死赤小豆味甘鹹平冷無毒下水腫排膿血一名赤豆不可久服令人枯燥青小豆味甘鹹温平濇無毒主寒熱熱中消渇止泄利利小便除吐逆卒澼下腹脹滿一名麻累一名胡豆黄帝云青小豆合鯉魚鮓食之令人肝黄五年成乾痟病大豆䜴味苦甘寒濇無毒主傷寒頭痛寒熱辟瘴氣惡毒煩躁滿悶虚勞喘吸兩脚疼冷殺六畜胎子諸毒萹豆味丼微温無毒和中下氣其葉平主霍亂吐下不止喬麥味酸微寒無毒食之難消動大熱風其葉生食動刺風令人身癢黄帝云作麫和猪羊肉熱食之不過八九頓作熱風令人眉鬚落又還生仍希少涇邠已北多患此疾大麥味鹹微寒滑無毒宜心主消渇除熱久食令人多力健行作蘖温消食和中􅆈末令赤黒𢷬作麨止泄利和清酢漿服之日三夜一小麥味甘微寒無毒養肝氣去客熱止煩渇咽燥利小便止漏血唾血令女人孕必得易作麴六月作者温無毒主小兒癎食不消下五痔蟲平胃氣消榖止利作麫温無毒不能消熱止煩不可多食長宿澼加客氣難治青梁米味甘微寒無毒主胃痺熱中除消渇止泄利利小便益氣力補中輕身長年黄梁米味甘平無毒益氣和中止泄利人呼爲竹根米又却當風臥濕寒中者白梁米味甘微寒無毒除熱益氣粟米味鹹微寒無毒養腎氣去骨痺熱中益氣也陳粟米味苦寒無毒主胃中熱消渇利小便丹􅀢米味苦微温無毒主欬逆上氣霍亂止泄利除熱去煩渇又白黍米味甘辛温無毒宜肺補中益氣不可久食多熱令人煩黄帝云五種黍米合葵食之令人成痼疾又以脯腊著五種黍米中藏儲食之云令人閉氣陳廪米味鹹酸微寒無毒除煩熱下氣調胃止泄利黄帝云久藏脯腊安米中滿三月人不知食之害人蘖米味苦微温無毒主寒中下氣除熱秫米味甘微寒無毒主寒熱利大腸治㯃瘡酒味苦甘辛大熱冇毒行藥勢殺百邪惡氣黄帝云暴下後飲酒者膈上變爲伏熱食生菜飲酒莫炙腹令人腸結扁鵲云久飲酒者腐腸爛胃漬髓蒸筋傷神損夀醉當風臥以扇自扇成惡風醉以冷水洗浴成疼痺大醉汗出當以粉粉身令其自乾發成風痺常日未没食訖即莫飲酒終身不乾嘔飽食訖多飲水及酒成痞澼稷米味甘平無毒益氣安中補虚和胃宜脾粳米味辛苦平無毒主心煩斷下利平胃氣長肌肉温中一云生者冷燔者熱糯米味苦温無毒温中令人能食多熱大便鞕酢味酸温濇無毒消癰腫㪚水氣殺邪毒血運扁鵲云多食酢損人骨能理諸藥消毒熱鹽味鹹温無毒殺鬼蠱邪注毒氣下部䘌瘡傷寒寒熱能吐胷中痰澼止心腹卒痛堅肌骨不可多食傷肺喜咳令人色膚黒損筋力扁鵲云鹽能除一切大風疾痛者炒熨之黄帝云食甜粥竟食鹽即吐或成霍亂鳥獸第五四十二條人乳汁味甘平無毒補五臓令人肥白悦澤馬乳汁味辛温無毒止渇牛乳汁味甘微寒無毒補虚羸止渇入生薑蔥白止小兒吐乳補勞羊乳汁味甘微温無毒補寒冷虚乏少血色令人熱中驢乳味酸寒一云大寒無毒主大熱黄疸止渇母猪乳汁平無毒主小兒驚癎以飲之神妙馬牛羊酪味甘酸微寒無毒補肺臓利大腸黄帝云食甜酪竟即食大酢者變作血瘕及尿血華佗云馬牛羊酪蚰蜒入耳者灌之即出也沙牛及白羊酥味甘微寒無毒除胷中客氣利大小腸治口瘡牝牛酥味甘平無毒去諸風濕痺除熱利大便去宿食醍醐味甘平無毒補虚去諸風痺百練乃佳甚去月蝕瘡添髓補中塡骨久服増年熊肉味甘微寒微温無毒主風痺不仁筋急五緩若腹中有積聚寒熱羸瘦者食熊肉病永不除其脂味甘微寒治法與肉同又去頭瘍白禿面䵟􅍍食欲嘔吐久服强志不饑輕身長年黄帝云一切諸肉煮不熟生不歛者食之成瘕熊及猪二種脂不可作燈其煙氣入人目失明不能逺視羖羊角味酸苦温微寒無毒主青盲明目殺疥蟲止寒泄心畏驚悸除百節中結氣及風傷蠱毒吐血婦人産後餘痛燒之殺鬼魅辟虎狼久服安心益氣輕身勿令中濕有毒髓味甘温無毒主男子女人傷中隂陽氣不足却風熱止毒利血脉益經氣以酒和服之亦可久服不損人青羊膽汁冷無毒主諸瘡能生人身脉治青盲眀目肺平補肺治嗽止渇多小便傷中止虛補不足去風邪肝補肝明目心主憂恚膈中逆氣腎補腎氣虚弱益精髓頭骨主小兒驚癎煮以浴之蹄肉平主丈夫五勞七傷肉味若甘大熱無毒主煖中止痛字乳餘疾及頭腦中大風汗自出虛勞寒冷能補中益氣力安心止驚利産婦不利時患人頭肉平主風眩瘦疾小兒驚癎丈夫五勞七傷其骨熱主虚勞寒中羸瘦其宿有熱者不可食生脂止下利脱肛去風毒婦人産後腹中絞痛肚主胃反治虚羸小便數止虚汗黄帝云羊肉共酢食之傷人心亦不可共生魚酪和食之害人凡一切羊蹄甲中有珠子白者名羊懸筋食之令人癲白羊黒頭食其腦作腸癰羊肚共飯飲常食久久成反胃作噎病甜粥共肚食之令人多唾喜吐清水羊腦猪腦男子食之損精氣少子若欲食者爛研如粉和醋食之然終不若不食為佳青羊肝和小豆食之令人目少眀一切羊肝生共椒食之破人五臟傷心最損小兒彌忌水中柳木及白楊木不得銅器中煮羖羊肉食之丈夫損陽女子絶隂暴下後不可食羊肉髓及骨汁成煩熱難解還動利凡六畜五臓著草自動榣及得鹹酢不變色又墮地不汗又與犬犬不食者皆有毒殺人六月勿食羊肉傷人神氣沙牛髓味甘温無毒安五臓平胃氣通十二經脉理三膲約温骨髓補中續絶傷益氣力止泄利去消渇皆以清酒和煖服之肝眀目膽可丸百藥味苦大寒無毒除心腹熱渇止下利去口焦燥益目精心主虚忘腎主濕痺補腎氣益精齒主小兒牛癎肉味甘平無毒主消渇止唾涎出安中益氣力養脾胃氣不可常食發宿病自死者不任食喉嚨主小兒啤也黄犍沙牛黒牯牛尿味苦辛微温平無毒主水腫腹脚俱滿者利小便黄帝云烏牛自死北首者食其肉害人一切牛盛熱時卒死者總不堪食食之作腸癰患甲蹄牛食其蹄中拒筋令人作肉刺獨肝牛肉食之殺人牛食蛇者獨肝患疥牛馬肉食之令人身體癢牛肉共猪肉食之必作寸白蟲直爾黍米白酒生牛肉共食亦作寸白蟲大忌人下利者食自死牛肉必加劇一切牛馬乳汁及酪共生魚食之成魚瘕六畜脾人一生莫食十二月勿食牛肉傷人神氣馬心主喜忘肺主寒熱莖痿肉味辛苦平冷無毒主傷中除熱下氣長筋强腰脊壯健强志利意輕身不饑黄帝云白馬自死食其肉害人白馬𤣥頭食其腦令人癲白馬鞍下烏色徹肉裏者食之傷人五臟下利者食馬肉必加劇白馬青蹄肉不可食一切馬汗氣及毛不可入食中害人諸食馬肉心煩悶者飲以羙酒則解白酒則劇五月勿食馬肉傷人神氣野馬隂莖味酸鹹温無毒主男子隂痿縮少精肉辛平無毒主人馬癎筋脉不能自收周痺肌不仁病死者不任用驢肉味酸平無毒主風狂愁憂不樂能安心氣病死者不任用其頭燒却毛煮取汁以浸麴釀酒甚治大風動摇不伏者皮膠亦治大風狗隂莖味酸平無毒主傷中丈夫隂痿不起腦主頭風痺下部䘌瘡瘡中息肉肉味酸鹹温無毒宜腎安五臓補絶傷勞損久病大虛者服之輕身益氣力黄帝云白犬合海鮋食之必得惡病白犬自死不出舌者食之害人犬春月多狂若鼻赤起而燥者此欲狂其肉不任食九月勿食犬肉傷人神氣㹠卵味甘温無毒除隂莖中痛驚癎鬼氣蠱毒除寒熱賁豚五􅜡邪氣攣縮一名㹠顚隂乾勿令敗㹠肉味辛平有小毒不可久食令人徧體筋肉碎痛乏氣大猪後脚懸蹄甲無毒主五痔伏熱在腹中膓癰内蝕取酒浸半日炙焦用之四蹄小寒無毒主傷撻諸敗瘡母猪蹄寒無毒煮汁服之下乳汁甚解石藥毒大猪頭肉平無毒補虛乏氣力去驚癎鬼毒寒熱五􅜡腦主風眩心平無毒主驚邪憂恚虛悸氣逆婦人産後中風聚血氣驚恐腎平無毒除冷利理腎氣通膀胱肝味苦平無毒主明目猪肺微寒無毒主凍瘡痛癢肚微寒無毒補中益氣止渇斷暴利虚弱腸微寒無毒主消渇小便數補下膲虛竭其肉間脂肪平無毒主煎諸膏藥破冷結散宿血解斑猫元青毒猪洞腸平無毒主洞腸挺出血多者猳猪肉味苦酸冷無毒主狂病多日不愈凡猪肉味苦微寒宜腎有小毒補腎氣虛竭不可久食令人少子精發宿病弱筋骨閉血脉虛人肌有金瘡者食之瘡尤甚猪血平澀無毒主卒下血不止美酒清者和炒服之又主中風絶傷頭中風眩及諸淋露賁肫暴氣黄帝云凡猪肝肺共魚鱠食之作癰疽猪肝共鯉魚腸魚子食之傷人神㹠腦損男子陽道臨房不能行事八月勿食猪肺及􅏁和食之至冬發疽十月勿食猪肉損人神氣鹿頭肉平主消渇多夢妄見者生血治癰腫莖筋主勞損蹄肉平主脚膝骨中疼痛不能踐地骨主内虚續絶傷補骨可作酒髓味甘温主丈夫婦人傷中脉絶筋急痛咳逆以酒和服腎平主補腎氣肉味苦温無毒補中强五臟益氣力肉生者主中風口僻不正細細剉碎以薄僻上華佗云和生椒𢷬薄之使一人專看正則急去之不爾復牽向不僻䖏角鎊取屑一升白蜜五升溲之微火􅆈令小變色曝乾更𢷬篩服方寸匕日三令人輕身益氣力强骨髓補絶傷黄帝云鹿膽白者食其肉害人白鹿肉不可和蒲白作􅃵食發惡瘡五月勿食鹿肉傷人神氣胡居士云鹿性驚烈多别良草􅁪食九物餘者不嘗群䖏必依山岡産婦下澤饗神用其肉者以其性烈清淨故也凡餌藥之人不可食鹿肉服藥必不得力所以然者以鹿常食解毒之草是故能制毒散諸藥故也九草者葛葉花鹿蔥鹿藥白蒿水芹甘草齊頭蒿山蒼耳薺苨麞骨微温無毒主虛損泄精肉味甘温無毒補益五臓髓益氣力悦澤人而麞無膽所以怯弱多驚恐黄帝云五月勿食麞肉傷人神氣麋脂味辛温無毒主癰腫惡瘡死肌寒熱風寒濕痺四肢拘緩不收風頭腫氣通腠理柔皮膚不可近男子隂令痿一名宮脂十月取黄帝云生麑肉共蝦汁合食之令人心痛生麑肉共雉肉食之作痼疾虎肉味酸無毒主惡心欲嘔益氣力止多唾不可熱食壊人齒虎頭骨治風邪眼睛主驚癎也豹肉味酸温無毒宜腎安五臓補絶傷輕身益氣冬食利人狸肉温無毒補中輕身益氣亦治諸注黄帝云正月勿食虎豹狸肉傷人神損夀兔肝主目闇肉味辛平濇無毒補中益氣止渇兔無脾所以能走蓋以屬二月建卯木位也木剋土故無脾焉馬無脾亦能走也黄帝云兔肉和獺肝食之三日必成遁尸共白雞肝心食之令人面失色一年成癉黄共薑食變成霍亂共白雞肉食之令人血氣不行二月勿食兔肉傷人神氣生鼠微温無毒主踒折續筋補骨𢷬薄之三日一易獺肝味甘有小毒主鬼疰蠱毒却魚鯁止久嗽皆燒作灰酒和服之獺肉味甘温無毒主時病疫氣牛馬時行病皆煮取汁停冷服之六畜灌之狐隂莖味甘平有小毒主女子絶産隂中癢小兒隂㿗卵腫肉并五臓及腸肚味苦微寒有毒主蠱毒寒熱五臓痼令小兒驚癎大人狂病見鬼黄帝云麝肉共鵠肉食之作癥瘕野猪青蹄不可食及獸赤足者不可食野獸自死北首伏地不可食獸有岐尾不可食家獸自死共鱠汁食之作疽瘡十一月勿食經夏臭脯成水病作頭眩丈夫隂痿甲子日勿食一切獸肉大吉鳥飛投人不肯去者口中必有物看口中無者拔一毛放之大吉一切禽獸自死無傷䖏不可食三月三日勿食鳥獸五臟及一切果菜五辛等物大吉丹雄雞肉味甘微温無毒主女人崩中漏下赤白沃補虛温中能愈久傷乏瘡不瘥者通神殺惡毒黄雌雞肉味酸鹹平無毒主傷中消渇小便數而不禁腸澼泄利補益五臟絶傷五勞益氣力雞子黄微寒主除熱火灼爛瘡痓可作虎魄神物卵白汁微寒主目熱赤痛除心下伏熱止煩滿咳逆小兒泄利婦人産難胞衣不出生吞之白雄雞肉味酸微温無毒下氣去狂邪安五臓傷中消渇烏雄雞肉味甘温無毒補中止心痛黒雌雞肉味甘平無毒除風寒濕痺五緩六急安胎黄帝云一切雞肉合魚肉汁食之成心瘕雞具五色者食其肉必狂若有六趾四距𤣥雞白頭家雞及野雞鳥生子有文八字雞及野鳥死不伸足爪此種食之害人雞子白共蒜食之令人短氣雞子共鼈肉蒸食之害人雞肉獺肉共食作遁尸注藥所不能治食雞子噉生蔥變成短氣雞肉犬肝腎共食害人生蔥共雞犬肉食令人榖道終身流血烏雞肉合鯉魚肉食生癰疽雞兔犬肉和食必泄利野雞肉共家雞子食之成遁尸尸鬼纒身四肢百節疼痛小兒五歲已下飲乳未斷者勿食雞肉二月勿食雞子令人常惡心丙午日食雞雉肉丈夫燒死目盲女人血死妄見四月勿食暴雞肉作内疽在胸腋下出漏孔丈夫少陽婦人絶孕虛勞乏氣八月勿食雞肉傷人神氣雉肉酸微寒無毒補中益氣止泄利久食令人瘦觜主蟻瘻黄帝云八月建酉日食雉肉令人短氣八月勿食雉肉損人神氣白鵝脂主耳卒聾消以灌耳毛主射工水毒肉味辛平利五臓鶩肪味甘平無毒主風虚寒熱肉補虚乏除客熱利臟腑及水道黄帝云六月勿食鶩肉傷人神氣鴛鴦肉味苦微温無毒主瘻瘡清酒浸之炙令熱以薄上亦炙服之又治夢思慕者鴈肪味甘平無毒主風攣拘急偏枯血氣不通利肉味甘平無毒久服長髪鬢鬚眉益氣不饑輕身耐暑黄帝云六月勿食鴈肉傷人神氣越鷰屎味辛平有毒主殺蠱毒鬼注逐不祥邪氣破五癃利小便􅆈香用之治口瘡肉不可食入水爲蛟龍所殺黄帝云十一月勿食鼠肉鷰肉損人神氣石蜜味甘平微寒無毒主心腹邪氣驚癎痙安五臟治諸不足益氣補中止腹痛解諸藥毒除衆病和百藥養脾氣消心煩食飲不下止腸澼去肌中疼痛治口瘡聰明耳目久服强志輕身不饑耐老延年神仙一名石飴白如膏者良是今諸山崖處蜜也青赤蜜味酸噞食之令人心煩其蜂黒色似䖟黄帝云七月勿食生蜜令人暴下發霍亂蜜蠟味甘微温無毒主下利膿血補中續絶傷除金瘡益氣力不饑耐老白蠟主久泄澼瘥後重見血者補絶傷利小兒久服輕身不饑生於蜜房或木石上惡芫花百合此即今所用蠟也蝮蛇肉平有毒釀酒去癩疾諸九瘻心腹痛下結氣除蠱毒其腹中吞鼠平有小毒主鼠瘻原蠶雄蛾味鹹温有小毒主益精氣强男子陽道交接不倦甚治泄精不用相連者鮧魚味甘無毒主百病鰻鱺魚味甘大温有毒主五痔瘻殺諸蟲䱉魚肉味甘大温黒者無毒主補中養血治瀋脣五月五日取頭骨平無毒燒服止久利鱓魚鱓徒河切平無毒主少氣吸吸足不能立地黄帝云四月勿食蛇肉鱓魚損神害氣烏賊魚骨味鹹微温無毒主女子漏下赤白經汁並閉隂蝕腫痛寒熱癥瘕無子驚氣入腹腹痛環臍丈夫隂中痛而腫令人有子肉味酸平無毒益氣强志鯉魚肉味甘平無毒主咳逆上氣癉黄止渇黄帝云食桂竟食鯉魚肉害人腹中宿癥病者食鯉魚肉害人鯽魚味甘平無毒主一切瘡燒作灰和醤汁傳之日二又去腸癰黄帝云魚白目不可食之魚有角食之發心驚害人魚無腸膽食之三年丈夫隂痿不起婦人絶孕魚身有黒㸃不可食魚目赤作鱠食成瘕病作鮓食之害人一切魚共菜食之作蛔蟲蟯蟲一切魚尾食之不益人多有勾骨著人咽害人魚有角白背不可食凡魚赤鱗不可食魚無腮不可食魚無全腮食之發癰疽鯆魮魚不益人其尾有毒治齒痛鯸鮧魚有毒不可食之二月庚寅日勿食魚大惡五月五日勿以鯉魚子共猪肝食必不消化成惡病下利者食一切魚必加劇致困難治穢飯鯘肉臭魚不可合食之害人三月勿食蛟龍肉及一切魚肉令人飲食不化發宿病傷人神氣失氣恍惚鼈肉味甘平無毒主傷中益氣補不足療脚氣黄帝云五月五日以鼈子共鮑魚子食之作癉黄鼈腹下成王字不可食鼈肉兔肉和芥子醤食之損人鼈三足食之害人鼈肉共莧蕨菜食之作鼈瘕害人蟹殻味酸寒有毒主胸中邪熱宿結痛喎僻面腫散㯃燒之致鼠其黄解結散血愈㯃瘡養筋益氣黄帝云蟹目相向足斑者食之害人十二月勿食蟹鼈損人神氣又云龜鼈肉共猪肉食之害人秋果菜共龜肉食之令人短氣飲酒食龜肉并菰白菜令人生寒熱六甲日勿食龜鼈害人心神螺蚌共菜食之令人心痛三日一發蝦鱠共猪肉食之令人常惡心多唾損精色蝦無鬚腹下通烏色者食之害人大忌勿輕十一月十二月勿食蝦蚌著甲之物備急千金要方卷八十
