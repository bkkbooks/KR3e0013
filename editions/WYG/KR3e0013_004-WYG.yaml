body:
  text: 備急千金要方卷四唐孫思邈撰宋林億等校正婦人方虚損第十論汗方盜附論曰凡婦人非止臨産須憂至於産後大須將慎危篤之至其在于斯勿以産時無他乃縱心恣意無所不犯犯時微若秋毫感病廣於嵩岱何則産後之病難治于餘病也婦人産訖五臟虚羸惟得將補不可轉㵼若其有病不須駃藥若行駃藥轉更増虚就中更虚向生路逺所以婦人産後百日以來極須慇懃憂畏勿縱心犯觸及即便行房若有所犯必身反强直猶如角弓反張名曰蓐風則是其犯候也若似角弓命同轉燭凡百女人宜好思之苟或在微不慎戲笑作病一朝困卧控告無所縱多出財寳遍處求醫醫者未必解此縱得醫來大命已去何處追尋學者于此一方大須精熟不得同於常方耳特忌上厠便利冝室中盆上佳凡産後滿百日乃可合㑹不爾至死虚羸百病滋長慎之凡婦人皆患風氣臍下虚冷莫不由此早行房故也凡産後七日内惡血末盡不可服湯候臍下塊散乃進羊肉湯有痛甚切者不在此例後三兩日消息可服澤蘭丸比至月滿丸盡為佳不爾虚損不可平復也全極消瘦不可救者服五石澤蘭丸凡在蓐必須服澤蘭丸補之服法必七日外不得早服也凡婦人因暑月産乳取凉太多得風冷腹中積聚百病竟起迄至于老百方治不能瘥桃仁煎主之出蓐後服之婦人縱令無病毎至秋冬須服一兩劑以至年内常將服之佳四順理中圓已産訖可服此方甘草一兩人參白术乾薑各一兩右四味為末蜜和丸如梧子服十丸稍增至二十丸新生藏虚此所以養臟氣也桃仁煎治婦人産後百疾諸氣補益恱澤方桃仁一千二百枚𢷬令細熟以上好酒一斗五升研濾三四遍如作麥粥法以極細為佳内長項瓷瓶中密塞以麵封之内湯中煑一伏時不停火亦勿令火猛使瓶口常出在湯上無令沉没熟訖出温酒服一合日再雖丈夫亦可服之石斛地黄煎治婦人虚羸短氣胸逆滿悶風氣方石斛甘草紫菀各四兩桃仁半升桂心二兩大黄八兩麥門冬二升茯苓一升生地黄汁淳酒各八升一方用人參三兩右十味為末於銅器中炭火上􅆈内鹿角膠一斤耗得一斗次内飴三斤白蜜三升和調更於銅器中釡上煎微耗以生竹攪無令著耗令相得藥成先食酒服如彈子一丸日三不知稍加至二丸地黄羊脂煎治婦人産後欲令肥白飲食平調方生地黄汁一斗生薑汁五升白蜜各五升羊脂二斤右四味先煎地黄令得五升次内羊脂令煎減半内薑汁復煎令減合蜜著銅器中煎如飴取雞子大一枚投熱酒中服日三地黄酒治産後百病未産前一月當預釀之産訖蓐中服之方地黄汁一升好麴好米各二升右三味先以地黄汁漬麴令發準家法醖之至熟封七日取清服之常使酒氣相接勿令斷絶慎蒜生冷酢滑猪雞魚一切婦人皆須忌之但夏三月熱不可合春秋冬並得合服地黄并滓内米中炊合用之一石十石一準此一升為率先服羊肉當歸湯三劑乃服之佳羊肉湯治産後虚羸喘乏自汗出腹中絞痛之方肥羊肉三斤去脂當歸姚氏用蔥白桂心甘草各二兩芎藭三兩子母祕録作䜴一升芍藥子母祕録作蔥白生薑各四兩乾地黄五兩右八味㕮咀以水一斗半先煑肉取七升去肉内餘藥煑取三升去滓分三服不瘥重作千金翼有蔥白一斤子母祕録若胸中㣲熱加黄芩麥門冬各一兩頭痛加石膏一兩中風加防風一兩大便不利加大黄一兩小便難加葵子一兩上氣欬逆加五味子一兩猪腎湯治産後虚羸喘乏乍寒乍熱病如瘧狀名蓐勞方猪腎一具去脂四破若無用羊腎代香䜴綿裹白粳米蔥白各一兩右四味以水三斗煑取五升去滓任情服之不瘥更作廣濟方有人參當歸各二兩為六味羊肉黄耆湯治産後虚乏補益方羊肉三斤黄耆三兩大棗三十枚茯苓甘草當歸桂心麥門冬乾地黄芍藥各二兩右十味㕮咀以水二斗煑羊肉取一斗去肉内諸藥煎取三升去滓分三服日三鹿肉湯治産後虚羸勞損補乏方鹿肉四斤乾地黄甘草芎藭黄耆芍藥麥門冬茯苓各三兩人參當歸生薑各二兩半夏一升大棗二十枚右十三味㕮咀以水二斗五升煑肉取一斗三升去肉内藥煎取五升去滓分四服日三夜一麞骨湯治産後虚乏五勞七傷虚損不足臟腑冷熱不調方麞骨一具逺志黄耆芍藥乾薑防風茯苓一作茯神厚朴各三兩當歸橘皮甘草獨活芎藭各二兩桂心生薑各四兩右十五味㕮咀以水三斗煑麞骨取二斗去骨内藥煎取五升去滓分五服當歸芍藥湯治産後虚損逆害飲食方當歸一兩半芍藥人參桂心生薑乾地黄甘草各一兩大棗二十枚右八味㕮咀以水七升煑取三升去滓分三服日三杏仁湯治産後虚氣方杏仁橘皮白前人參各三兩蘇葉半夏各一升桂心四兩生薑十兩麥門冬二兩右九味㕮咀以水一斗二升煑取三升半去滓分五服治婦人産後上氣賁豚氣積勞臟氣不足胸中煩躁關虚煩第十一方薤白湯治産後胷中煩熱逆氣方薤白半夏甘草人參知母各二兩石膏四兩栝蔞根三兩麥門冬半升右八味㕮咀以水一斗三升煑取四升去滓分五服日三夜二熱甚即加石膏知母各一兩竹根湯治産後虚煩方甘竹根細切一斗五升以水二斗煑取七升去滓内小麥二升大􅀥二十枚復煑麥熟三四沸内甘草一兩麥門冬一升湯成去滓服五合不瘥更服取瘥短氣亦服之人參當歸湯治産後煩悶不安方人參當歸麥門冬乾地黄桂心各一兩大棗二十枚粳米一升芍藥四兩淡竹葉三升右九味㕮咀以水一斗二升先煑竹葉及米取八升去滓内藥煑取三升去滓分三服若煩悶不安者當取䜴一升以水三斗煑取一升盡服之甚良甘竹茹湯治産後内虚煩熱短氣方甘竹茹一升人參茯苓甘草各一兩黄芩三兩右五味㕮咀以水六升煑取二升去滓分三服日三知母湯治産後乍寒乍熱通身温壯胸心煩悶方知母三兩芍藥黄芩各二兩桂心甘草各一兩右五味㕮咀以水五升煑取二升半分三服一方不用桂心加生地黄竹葉湯治産後心中煩悶不解方生淡竹葉麥門冬各一升甘草二兩生薑茯苓各三兩大棗十四枚小麥三合右七味㕮咀以水一斗先煮竹葉小麥取八升内諸藥煑取三升去滓分三服若心中虚悸者加人參二兩其人食少無穀氣者加粳米五合氣逆者加半夏二兩淡竹茹湯治産後虚煩頭痛短氣欲絶心中悶亂不解方生淡竹茹一升麥門冬小麥各五合甘草一兩生薑三兩産寳用乾葛大􅀥十四枚産寳用石膏三兩右六味㕮咀以水一斗煑竹茹小麥取八升去滓乃内諸藥煮取二升去滓分二服羸人分作三服若有人參入一兩若無人參内茯苓一兩半亦佳人參茯苓皆治心煩悶及心虚驚悸安定精神有則為良無自依方服一劑不瘥更作若氣逆者加半夏二兩赤小豆散治産後煩悶不能食虚滿方赤小豆三七枚燒作末以冷水和頓服之良蒲黄散治産後煩悶方蒲黄以東流水和方寸匕服極良蜀漆湯治産後虚熱徃來心胷煩滿骨節疼痛及頭痛壯熱晡時輒甚又如微瘧方蜀漆葉桂心甘草黄芩各一兩黄耆五兩知母芍藥各二兩生地黄一斤右八味㕮咀以水一斗煑取三升分三服治寒熱不傷人芍藥湯治産後虚熱頭痛方白芍藥乾地黄牡蠣各五兩桂心三兩右四味㕮咀以水一斗煑取二升半去滓分三服日三此湯不傷損人無毒亦治腹中拘急痛若通身發熱加黄芩二兩中風第十二論方論曰凡産後角弓反張及諸風病不得用毒藥惟宜單行一兩味亦不得大發汗特忌轉瀉吐利必死無疑大豆紫湯産後大善大豆紫湯治産後百病及中風痱痙或背强口噤或但煩熱苦渇或頭身皆重或身癢劇者嘔逆直視此皆因虚風冷濕及勞傷所為驗方大豆五升清酒一斗右二味以鐵鐺猛火熬豆令極熱焦煙出以酒沃之去滓服一升日夜數服服盡更合小汗則愈一以去風二則消血結如姙娠傷折胎死在腹中三日服此酒即瘥獨活紫湯治産後百日中風痙口噤不開并治血氣痛勞傷補腎方獨活一斤大豆五升舊酒一斗三升右三味先以酒漬獨活再宿若急須微火煑之令減三升去滓别熬大豆極焦使煙出以獨活酒沃之去豆服一升日三夜二小獨活湯治如前狀方獨活八兩葛根生薑各六兩甘草二兩右四味㕮咀以水九升煑取三升去滓分四服微汗佳甘草湯治在蓐中風背强不得轉動名曰風痙方甘草乾地黄麥門冬麻黄各二兩栝蔞根芎藭黄芩各三兩杏仁五十枚葛根半斤右九味㕮咀以水一斗五升酒五斤合煮葛根取八升去滓内諸藥煑取三升去滓分再服一劑不瘥更合良千金翼崔氏有前胡三兩獨活湯治産後中風口噤不能言方獨活生薑各五兩防風秦艽桂心白术甘草當歸附子各二兩葛根三兩防己一兩右十一味㕮咀以水一斗二升煮取三升去滓分三服雞糞酒治産後中風及百病并男子中一切風神效方雞糞一升熬令黄烏豆一升熬令聲絶勿焦右二味以清酒三升半先淋雞糞次淋豆取汁一服一升温服取汗病重者凡四五日服之無不愈竹葉湯治産後中風發熱面正赤喘氣頭痛之方淡竹葉一握葛根三兩防風二兩桔梗甘草人參桂心各一兩大附子一枚生薑五兩大􅀥十五枚右十味㕮咀以水一斗煑取二升半去滓分三服日三温覆使汗出若頸項强者用大附子若嘔者加半夏四兩防風湯治産後中風背急短氣方千金翼作裏急短氣防風獨活葛根各五兩當歸芍藥人參甘草乾薑各二兩右八味㕮咀以水九斗煑取三升去滓分三服日三鹿肉湯治産後風虚頭痛壯熱言語邪僻方鹿肉三斤芍藥獨活秦芁黄芩黄耆各三兩半夏一升乾地黄桂心芎藭各二兩生薑六兩甘草阿膠各一兩茯苓千金翼作茯神人參各四兩右十五味㕮咀以水二斗煮肉得一斗二升去肉内藥煎取三升去滓内膠令烊分四服日三夜一獨活酒治産後中風方獨活一斤桂心三兩秦芁五兩右三味㕮咀以酒一斗半漬三日飲五合稍加至一升不能多飲隨性服大豆湯治産後卒中風發病倒悶不知人及姙娠挾風兼治在蓐諸疾方大豆五升炒令㣲焦葛根獨活各八兩防己六兩右四味㕮咀以酒一斗二升煑豆取八升去滓内藥煮取四升去滓分六服而日四夜二五石湯治産後卒中風發疾口噤倒悶吐沫瘈瘲眩冒不知人及濕痺緩弱身體痙姙娠百病方紫后英三兩鍾乳赤石脂石膏白石英牡蠣人參黄芩白术甘草栝蔞根芎藭桂心防己當歸乾薑各二兩獨活三兩葛根四兩右十八味末五石㕮咀諸藥以水一斗四升煮取三升半分五服日三夜二一方有滑石寒水石各二兩棗二十枚四石湯治産後卒中風發疾口噤瘈瘲悶滿不知人并緩急諸風毒痺身體痙强及挾胎中風婦人百病方紫石英白石英石膏赤石脂各三兩獨活生薑各六兩葛根四兩桂心芎藭甘草芍藥黄芩各二兩右十二味㕮咀以水一斗二升煮取三升半去滓分五服小柴胡湯治婦人在蓐得風蓋四肢苦煩熱皆自發露所為若頭不痛但煩熱與三物黄芩湯頭痛與小柴胡湯方柴胡半斤黄芩人參甘草各三兩生薑二兩大􅀥十二枚半夏半升右七味㕮咀以水一斗二升煮取六升去滓毎服一升日三服三物黄芩湯方黄芩苦參各二兩乾地黄四兩右㕮咀以水八升煑取二升去滓適寒温服一升日二多吐下蟲甘草湯治産後腹中傷絶寒熱恍惚狂言見鬼此病中風内絶藏氣虚所為方甘草芍藥各五兩羊肉三斤通草三兩産寳用當歸右四味㕮咀以水一斗六升煑肉取一斗去肉内藥煮取六升去滓分五服日三夜二羊肉湯治産後中風久絶不産月水不利乍赤乍白及男子虚勞冷盛方羊肉三斤成籜大蒜去皮切香䜴各三升右三味以水一斗三升煮取五升去滓内酥一升更煮取三升分温三服葛根湯治産後中風口噤痙痺氣息迫急眩冒困頓并産後諸疾方葛根生薑各六兩獨活四兩當歸三兩甘草桂心茯苓石膏人參白术芎藭防風各二兩右十二味㕮咀以水一斗二升煮取三升去滓分三服日三防風酒治産後中風方防風獨活各一斤女萎桂心各一兩茵芋一兩石斛五兩右六味㕮咀以酒二斗漬三宿初服一合稍加至三四合日三木防己膏治産後中風方木防己半斤茵芋五兩右二味㕮咀以苦酒九升漬一宿猪膏四升煎三上三下膏成炙手摩千遍瘥治産後中柔風舉體疼痛自汗出者及餘百疾方獨活八兩當歸四兩右二味㕮咀以酒八升煮取四升去滓分四服日三夜一取㣲汗葛氏單用獨活小品加當歸若上氣者加桂心二兩不瘥更作浴湯治産後中風流腫方鹽五升熬令赤雞毛一把燒作灰右二味以水一石煑鹽作湯内雞毛灰著湯中適冷暖以浴大良又浴婦人隂冷腫痛凡風腫面欲裂破者以紫湯一服瘥神效紫湯是炒黑豆作者治産後中風頭面手臂通滿方大豆三升以水六升煮取一升半去豆澄清更煎取一升内白术八兩附子三兩獨活三兩生薑八兩添水一斗煎取五升内好酒五升合煎取五升去滓分五服日三夜一間粥頻服三劑茯神湯治産後忽苦心中衝悸或志意不定恍恍惚惚言語錯謬心虚所致方茯神四兩人參茯苓各三兩芍藥甘草當歸桂心各二兩生薑八兩大􅀥三十枚右九味㕮咀以水一斗煮取三升去滓分三服日三夜一良逺志湯治産後忽苦心中衝悸不定志意不安言語錯誤惚惚憒憒情不自覺方逺志麥門冬人參甘草當歸桂心各二兩芍藥一兩茯苓五兩生薑六兩大􅀥二十枚右十味㕮咀以水一斗煮取三升去滓分三服日三羸者分四服産後得此正是心虚所致無當歸用芎藭若其人心胷逆氣加半夏三兩茯苓湯治産後暴苦心悸不定言語錯謬恍恍惚惚心中憒憒此皆心虚所致方茯苓五兩甘草芍藥桂心當歸各三兩生薑六兩麥門冬一斤大棗三十枚右八味㕮咀以水一斗煮取三升去滓分三服日三無當歸可用芎藭若苦心志不定加人參二兩亦可内逺志二兩若苦煩悶短氣加生竹葉一升先以水一斗三升煮竹葉取一斗内藥若有微風加獨活三兩麻黄二兩桂心二兩用水一斗五升若頸項苦急背膊强者加獨活葛根各三兩麻黄桂心各二兩生薑八兩用水一斗半安心湯治産後心衝悸不定恍恍惚惚不自知覺言語錯誤虚煩短氣志意不定此是心虚所致方逺志甘草各二兩人參茯神當歸芍藥各三兩麥門冬一升大棗三十枚右八味㕮咀以水一斗煮取三升去滓分三服日三若苦虚煩短氣者加淡竹葉二升水一斗二升煑竹葉取一斗内藥若胸中少氣者亦甘草為三兩善甘草圓治産後心虚不足虚悸心神不安吸吸乏氣或若恍恍惚惚不自知覺者方甘草逺志菖蒲各三兩人參麥門冬乾薑茯苓各二兩澤㵼桂心各一兩大􅀥五十枚右十味為末蜜丸如大豆酒服二十丸日四五服夜再服不知稍加若無澤㵼以白术代之若胸中冷増乾薑人參圓治産後大虚心悸志意不安不自覺恍惚恐畏夜不得眠虚煩少氣方人參甘草茯苓各三兩麥門冬菖蒲澤㵼薯蕷乾薑各二兩桂心一兩大􅀥五十枚右十味為末以蜜􅀥膏和丸如梧子未食酒服二十丸日三夜一不知稍増若有逺志内二兩為善若風氣内當歸獨活三兩亦治男子虚損心悸大逺志圓治産後心虚不足心下驚悸志意不安恍恍惚惚腹中拘急痛夜卧不安胸中吸吸少氣内補傷損益氣安定心神亦治虚損方逺志甘草乾地黄桂心茯苓麥門冬人參當歸白术澤㵼獨活菖蒲各三兩薯蕷阿膠各二兩乾薑四兩右十五味為末蜜和如大豆未食温酒服二十丸日三不知稍増至五十丸若大虚身體冷少津液加鍾乳三兩為善心腹痛第十三方蜀椒湯治産後心痛此大寒冷所為方蜀椒二合芍藥當歸半夏甘草桂心人參茯苓各二兩蜜一升生薑汁五合右十味㕮咀以水九升煮椒令沸然後内諸藥煮取二升半去滓内薑汁及蜜煎取三升一服五合漸加至六合禁勿冷食大巖蜜湯治産後心痛方乾地黄當歸獨活甘草芍藥桂心細辛小草各二兩吴茱萸一升乾薑三兩右十味㕮咀以水九升煮取三升内蜜五合重煮分三服日三胡洽不用獨活桂心小草千金翼不用蜜乾地黄湯治産後兩脅滿痛兼除百病方乾地黄芍藥各三兩當歸蒲黄各二兩生薑五兩桂心六兩甘草一兩大棗二十枚右八味㕮咀以水一斗煮取二升半去滓分服日三芍藥湯治産後苦腹少痛方芍藥六兩桂心生薑各三兩甘草二兩膠飴八兩大􅀥十二枚右六味㕮咀以水七升煮取四升去滓内膠飴令烊分三服日三當歸湯治婦人寒疝虚勞不足若産後腹中絞痛方當歸芍藥各二兩子母祕録作甘草生薑五兩羊肉一斤右四味㕮咀以水八升煮羊肉熟取汁煎藥得三升適寒温服七合日三金匱要畧胡洽不用芍藥名小羊肉湯桃仁芍藥湯治産後腹中疾痛方桃仁半升芍藥芎藭當歸乾漆桂心甘草各二兩右七味㕮咀以水八升煮取三升分三服羊肉湯治産後及傷寒大虚上氣腹痛兼微風方肥羊肉二斤無羊肉用麞鹿肉代茯苓黄耆乾薑各三兩甘草獨活桂心人參各二兩麥門冬七合生地黄五兩大􅀥十二枚右十一味㕮咀以水二斗煑肉取一斗去肉内藥煮取二升半分四服日三夜一千金翼無乾薑羊肉當歸湯治産後腹中心下切痛不能食徃來寒熱若中風乏氣力方羊肉三斤當歸黄芩肘後用黄耆芎藭防風肘後用人參甘草各二兩芍藥三兩生薑四兩右八味㕮咀以水一斗二升先煮肉熟減半内餘藥取三升去滓分三服日三胡洽以黄耆代黄芩白术代芍藥名大羊肉湯子母祕録以桂心代防風加大􅀥十七枚良羊肉杜仲湯治産後腰痛欬喘方羊肉四斤杜仲紫菀當歸桂心白术各三兩五味子細辛欵冬花人參厚朴芎藭附子萆薢甘草黄耆各二兩生薑八兩大􅀥三十枚右十八味㕮咀以水二斗半煑肉取汁一斗五升去肉内藥煎取三升半去滓分五服日三夜二羊肉生地黄湯治産後三日腹痛補中益藏强氣力消血方羊肉三斤生地黄切二升桂心當歸甘草芎藭人參各二兩芍藥三兩右八味㕮咀以水二斗煮肉取一斗去肉内藥煎取三升分四服日三夜一内補當歸建中湯治産後虚羸不足腹中􅂒痛不止吸吸少氣或苦小腹拘急痛引腰背不能飲食産後一月日得服四五劑為善令人力壯方當歸四兩芍藥五兩甘草二兩生薑六兩桂心三兩大􅀥十八枚右六味㕮咀以水一斗煑取三升去滓分三服一日令盡若大虚内飴糖六兩作湯成内之于火上飴消若無生薑則以乾薑三兩代之若其人去血過多崩傷内竭不止加地黄六兩阿膠二兩合八種作湯或去滓内阿膠若無當歸以芎藭代之内補芎藭湯治婦人産後虚羸及崩傷過多虚竭腹中絞痛方芎藭乾地黄各四兩芍藥五兩桂心二兩甘草乾薑各三兩大棗四十枚右七味㕮咀以水一斗二升煮取三升去滓分三服日三不瘥復作至三劑若有寒苦微下加附子三兩治婦人虚羸少氣傷絶腹中拘急痛崩傷虚竭面目無色及唾吐血甚良大補中當歸湯治産後虚損不足腹中拘急或溺血少腹苦痛或從高墮下犯内及金瘡血多内傷男子亦宜服之方當歸續斷桂心芎藭乾薑麥門冬各三兩芍藥四兩吳茱萸一升乾地黄六兩甘草白芷各二兩大􅀥四十枚右十二味㕮咀以酒一斗漬藥一宿明旦以水一斗合煮取五升去滓分五服日三夜二有黄耆入二兩益佳桂心酒治産後疹痛及卒心腹痛方桂心三兩以酒三升煑取二升去滓分三服日三生牛膝酒治産後腹中苦痛方生牛膝根五兩以酒五升煮取二升分二服若用亁牛膝根以酒漬之一宿然後可煑治産後腹中如弦常堅痛無聊頼方當歸末二方寸匕内蜜一升煎之適寒温頓服吴茱萸湯治婦人先有寒冷胸滿痛或心腹刺痛或嘔吐食少或腫或寒或下痢氣息綿惙欲絶産後益劇皆主之方吳茱萸二兩防風桔梗乾薑甘草細辛當歸各十二銖乾地黄十八銖右八味㕮咀以水四升煑取一升半去滓分再服蒲黄湯治産後餘疾胸中少氣腹痛頭疼餘血未盡除腹中脹滿欲死方蒲黄生地黄生薑各五兩芎藭桂心各一兩硭硝二兩桃仁二十枚大棗十五枚右八味㕮咀以水九升煑取二升半去滓内芒硝分三服日三良驗敗醬湯治産後疹痛引腰腹中如錐刀所刺之方敗醬三兩桂心芎藭各一兩半當歸一兩右四味㕮咀以清酒二升水四升微火煑取二升去滓適寒温服七合日三食前服之千金翼只用敗醬一味芎藭湯治産後腹痛方芎藭甘草各二兩蒲黄女萎各一兩半芍藥大黄各三十銖當歸十八兩桂心桃仁黄耆千金翼作黄芩前胡各一兩生地黄一升右十二味㕮咀以水一斗酒二升合煮取三升去滓分四服日三夜一獨活湯治産後腹痛引腰背拘急痛方獨活當歸桂心芍藥生薑各三兩甘草二兩大棗二十枚右七味㕮咀以水八升煑取三升去滓分三服服後相去如人行十里久再進芍藥黄耆湯治産後心腹痛方芍藥四兩黄耆白芷桂心生薑人參芎藭當歸乾地黄甘草各二兩茯苓三兩大􅀥十枚右十二味㕮咀以酒水各五升合煑取三升去滓先食服一升日三千金翼無人參當歸芎藭地黄茯苓為七味治産後腹脹痛不可忍者方煑黍粘根為飲一服即愈治婦人心痛方布裹鹽如彈丸燒作灰酒服愈又方燒秤錘投酒中服亦佳又方炒大豆投酒中服佳備急千金要方卷四
