  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0013_WYG_050-1a, image: WYG0735/WYG0735-0491c.png}
body:
  text: 備急千金要方巻五十唐孫思邈撰宋林億等校正脾臓方冷痢第八論方論曰舊治痢於貴勝用建脾丸多效今治積久冷痢先以温脾湯下訖後以建脾丸補之未有不效者貧家難以克辦亦無可将息也温脾湯治積久冷熱赤白痢者方大黄桂心各三兩附子乾薑人參各二兩右五味㕮咀以水七升煮取二升半分三服與前温脾湯小異建脾圓治虚勞羸瘦身體重脾胃冷飲食不消雷鳴腹脹泄痢不止方鍾乳粉三兩赤石脂好麴大麥蘖當歸黄連人參細辛龍骨乾薑茯苓石斛桂心各二兩附子一兩蜀椒六兩右十五味為末白蜜丸如梧子酒服十丸日三加至三十丸弱者飲服此方通治男女集驗無細辛龍骨增損建脾圓治丈夫虚勞五臓六腑傷敗受冷初作滯下久則變五色赤黒如爛腸極臭穢者方鍾乳粉赤石脂三兩礜石一用礬石乾薑蓯蓉桂心石斛五味子澤㵼逺志寄生栢子人參白頭翁天雄當歸石榴皮牡蠣龍骨甘草各二兩右二十味為末蜜丸酒服二十丸日三加至四十丸此二方止痢神驗駐車圓治大冷洞痢腸滑下赤白如魚腦日夜無節度腹痛不可堪忍者方黄連六兩乾薑一兩當歸阿膠各三兩右四味為末以大酢八合烊膠和之併手丸如大豆許候乾大人飲服三十丸小兒百日以還三丸朞年者五丸餘以意加減日三服大桃花湯治冷白滯痢腹痛方赤石脂乾薑當歸龍骨牡蠣各三兩附子二兩白术一升甘草芍藥各一兩人參一兩半右十味㕮咀以水一斗二升煮术取九升内諸藥煮取三升分三服膿者加厚朴二兩嘔者加橘皮三兩又方龍骨六兩厚朴當歸赤石脂五兩右四味㕮咀以水七升煮取二升半分三服熱加白頭翁二兩半牡蠣三兩桃花圓治下冷臍下攪痛方乾薑赤石脂各十兩右二味蜜丸如豌豆服十丸日三服加至二十丸倉米湯治小腹冷氣積聚結成冷痢日夜三四十行方倉粳米半斤净淘乾漉薤白一握去青切細羊脂一升􅆈香䜴三升以水一斗煎取五升澄清右四味先以羊脂煎薤白令黄并米内豉汁中煎取四升旦空腹温服一升如行十里久更進一升得快利止若利不止更服如前利後進粳米豉粥若復作更服一劑永瘥附子湯治暴下積日不住及久痢方附子一枚石榴皮一具阿膠二兩龍骨甘草芍藥乾薑黄連各一兩黄芩半兩粳米三合右十味㕮咀以水八升煮取三升分三服治卒下痢湯方黄連五兩生薑一斤右二味㕮咀以水五升煮取一升頓服未止更合服必效治久冷痢下純白者由積臥冷處經久病發遂令脾胃俱冷日夜五六十行大小腹痛不可忍凡白痢屬冷赤痢屬熱方好麴末五升微熬令香温清醇酒令熱和麴末一升空腹頓服之日三服若至食時𢷬蒜一升令至熟下薑椒末調和如常食之法惟須稠勿加鹽以水和麴二升作􅀈餅極爛煮之乾漉熱内蒜虀臼中相和一頓食之少與餘食至飢時仍凖前食麴末酒比至瘥來少食餘食以此法治不過兩日無有不瘥治乆冷或痢不痢間但腰腹患苦冷方上等新蜀椒三升用醋宿漬之以麴三升和椒一升緊拌煮作粥空腹頓服之加蔥豉鹽任性調和不瘥更作以瘥為限不過三升椒即愈此方不但治冷大治諸虚損冷極有所益久當自知耳馬藺子圓治積冷痢下白膿方馬藺子一斤熟􅆈附子二兩乾薑甘草各二兩半神麴麥蘖阿膠各五兩黄連三兩蜀椒五合右九味為末蜜丸如梧子服二十丸日二以知為度或作散酒調服方寸匕亦佳厚朴湯治三十年久痢不止方厚朴乾薑阿膠各二兩黄連五兩艾葉石榴皮各三兩右六味㕮咀以水七升煮取二升分再服四續圓治三十年注痢骨立痿黄腸滑不瘥方一名蠟煎丸雲實五合熬香龍骨三兩附子女萎各二兩白术二兩半右五味為末以蠟煎烊用丸藥如梧子大服五丸日三不過五六服瘥椒艾圓治三十年下痢所食之物皆不消化或青或黄四肢沈重起即眩倒骨肉消盡兩足逆冷腹中熱苦筋轉起止須扶隂冷無子方蜀椒三百粒烏梅二百枚熟艾一升乾薑三兩赤石脂二兩右五味椒薑艾下篩梅著一斗米下蒸令飯熟去核内薑椒末合𢷬三千杵蜜和丸如梧子服十丸日三服不瘥加至二十丸加黄連一升下痢圓治數十年痢下氣消榖令人能食夏月長将服之不霍亂方大麥蘖法麴各一升烏梅二升半附子乾薑黄連黄蘗桂心各三兩蜀椒半兩吳茱茰四兩右十味為末蜜和丸如梧子食後服十丸日三加至二十丸三食三服亦可至四十丸麴蘖圓治數十年下痢不止消榖下氣補虚羸方大麥蘖好麴各一升附子當歸桂心各二兩吳茱茰四兩蜀椒一兩黄連烏梅肉乾薑各四兩右十味為末蜜丸如梧子食後服二十丸日三烏梅圓治久痢諸藥不瘥數十年者消榖下氣補虚方烏梅肉黄連乾薑吳茱茰各四兩桂心二兩當歸三兩蜀椒一兩半右七味為末蜜丸如梧子食後服十丸日三又方治冷痢久下方烏梅三百枚乾薑黄連各十兩當歸蜀椒各四兩細辛附子桂心人參黄蘗各六兩一方用麥蘖右十味為末以苦酒漬烏梅一宿去核蒸五升米下别𢷬如泥盤中攪令相得蜜和𢷬二千杵丸如梧子食前服十丸日三服稍增至二十丸七味散治痢下久不瘥神驗方黄連八分龍骨赤石脂厚朴烏梅肉各二分甘草一分阿膠三分右治下篩漿水服二方寸匕日二小兒一錢匕猪肝圓治下痢腸滑飲食及服藥俱完出者方猪肝一斤􅆈乾黄連烏梅肉阿膠各二兩胡粉七碁子右五味為末蜜丸如梧子酒服二十丸日三亦可散服方寸匕羊脂煎大治諸久痢不瘥方羊脂一碁子白蠟兩碁子黄連末一升酢七合煎取稠蜜七合煎取五合烏梅肉二兩亂髪灰汁洗去垢膩燒末一升右七味合内銅器中湯上煎之攪可丸飲服如梧子大三十丸日三碁子大小如方寸匕又方羊脂阿膠蠟各二兩黍米二升右四味合煮作粥一服令盡即瘥治大下後腹中空竭胷中虚滿不下食方芍藥甘草半夏各一兩厚朴當歸桂心各三兩生薑五兩右七味㕮咀以水八升煮取三升分三服服三劑最佳治下痢心胷滿不快腹中雷鳴或嘔吐方黄連五兩橘皮甘草各二兩龍骨生薑半夏各三兩人參一兩大􅀥十五枚右八味㕮咀以水一斗先煮一大沸乃内藥煮取三升分四服并妊娠良斷痢湯治心胷下伏水方半夏一升生薑五兩茯苓甘草龍骨各二兩附子一兩人參黄連各三兩大􅀥十二枚右九味㕮咀以水八升煮取三升分三服香蘓湯治下後煩氣暴上方生蘓一把冬用蘓子三兩香䜴五升右二味以水五升煮取二升頓服之㵼心湯治卒下大痢熱脣乾口燥嘔逆引飲方人參甘草黄芩栝蔞根橘皮各一兩黄連二兩半夏三兩乾薑一兩半右八味㕮咀以水六升煮取二升分三服胡洽云治老小利水榖不化腹中雷鳴心下痞滿乾嘔不安無橘皮栝蔞若寒加附子一枚渴加括蔞一兩嘔加橘皮一兩痛加當歸一兩仲景用大􅀥十二枚治夏月暴冷忽壮熱泄痢引飲熱湯下斷變通身浮腫成冷下結脉沈細小數方澤㵼一兩半吳茱茰茯苓白术當歸桔梗犀角青木香海藻芍藥大黄各二兩右十一味㕮咀以水九升煮取三升分三服下後消息五六日許可與女麴散女麴散治痢後虚腫水腫者服此藥小便利得止腫亦消女麴一升乾薑細辛椒目附子桂心各一兩右六味治下篩酒服方寸匕不知加至二三匕日三產後虚滿者大良治卒暴冷下下部疼悶方燒甎令熱大酢沃之三重布覆坐上即瘥備急千金要方卷五十
