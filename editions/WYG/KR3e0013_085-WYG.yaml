body:
  text: 備急千金要方卷八十五唐孫思邈撰宋林億等校正平脉五臟積聚第七人病有積有聚有榖氣榖一作繫夫積者藏病終不移也聚者腑病發作有時展轉痛移為可治也穀氣者脇下牽痛按之則愈愈復發為穀氣夫病已愈不得復發令病復發即為穀氣也諸積大法脉來而細輭附骨者為積也寸口結積在胷中微出寸口積在喉中闗上結積在臍傍微下闗者積在小腹尺中結積在氣衝上闗上積在心下脉出在左積在左脉出在右積在右脉兩出積在中央各以其部處之寸口沈而横者脇下及腹中有横積痛其脉弦腹中急痛腰背痛相引腹中有寒疝瘕脉弦緊而細微者癥也夫寒痺癥瘕積聚之脉狀皆弦緊若在心下即寸弦緊在胃管即闗弦緊在臍下即尺弦緊一曰闗脉長弦有積在臍左右上下又脉癥法左手脉横癥在左右手脉横癥在右脉頭大在上頭小在下又一法横脉見左積在右見右積在左偏得洪實而滑亦為積弦緊亦為積為寒痺為疝痛内有積不見脉難治見一脉相應為易治諸不相應為不合治也左手脉大右手脉小上病在左脇下病在左足右手脉大左手脉小上病在右脇下病在右足脉弦而伏者腹中有癥不可轉也必死不治脉來沈而細時直者身有癰腫若腹中有伏梁脉來沈而虚者泄注也脉來小沈實者胃中有積聚不可下食即吐陰陽表裏虚實第八弦為小陽緩為陽明洪為太陽三陽也微為少陰遲為厥陰沈為太陰三陰也脉有一陰一陽一陰二陽一陰三陽有一陽一陰一陽二陰一陽三陰如此言之寸口有六脉俱動耶然經言如此者非有六脉俱動也謂浮沈長短滑濇也凡脉浮滑長者陽也沈濇短者陰也所以言一陰一陽者謂脉來沈而滑也一陰二陽者謂脉來沈滑而長也一陰三陽者謂脉來浮滑而長時一沈也所以言一陽一陰者謂脉來浮而濇也一陽二陰者謂脉來長而沈濇也一陽三陰者謂脉來沈濇而短時一浮也各以其經所在言病之逆順也脉有陽盛陰虚陰盛陽虚何謂也然浮之損小沈之實大故曰陰盛陽虚沈之損小浮之實大故曰陽盛陰虚是謂陰陽虚實之意也凡脉浮大數動長滑陽也沈濇弱弦短微陰也陽病見陰脉者逆也主死陰病見陽脉者順也主生闗前為陽闗後為陰陽數即吐陰微即下陽弦則頭痛陰弦即腹痛以依陰陽察病也又尺脉為陰陰脉常沈而遲寸闗為陽陽脉但浮而速有表無裏邪之所止得鬼病何謂表裏寸尺為表闗為裏兩頭有脉闗中絶不至也尺脉上不至闗為陰絶寸脉下不至闗為陽絶陰絶而陽微死不治呼為表屬腑吸為裏屬臓陽微不能呼陰微不能吸呼吸不足胷中短氣弱反在闗濡反在巓微在其上濇反在下微即陽氣不足活熱汗出濇即無血厥而且寒諸腑脉為陽主熱諸臟脉為陰主寒陽微則汗陰浮自下脉經作陰微陽數口生瘡陰數加微必惡寒而煩擾不得眠陽芤吐血脉經作陽數則吐血陰芤下血脉經作陰濇即下血無陽即厥無陰即嘔寸口脉浮大而疾者名曰陽中之陽病苦煩滿身熱頭痛腹中熱寸口浮沈細者名曰陽中之陰病苦悲傷不樂惡聞人聲少氣時汗出陰氣不通不通一作併臂不能舉巢源作臂偏不舉尺脉沈細者名曰陰中之陰病苦兩脛酸疼不能久立陰氣衰小便餘瀝陰下濕癢尺脉滑而浮大者名曰陰中之陽病苦小腹痛滿不能溺溺即陰中痛大便亦然尺脉牢而長闗中無有此為陰干陽其人苦兩脛重小腹引腰痛寸口壯大尺中無有此為陽干陰其人苦腰背痛陰中傷足脛寒人有三虚三實者何謂也然有脉之虚實有病之虚實有診之虚實脉之虚實者脉來濡者為虚牢者為實也病之虚實者出者為虚入者為實言者為虚不言者為實緩者為虚急者為實也診之虚實者癢者為虚痛者為實外痛内快為外實内虚内痛外快為内實外虚故曰虚實也問曰何謂虚實答曰邪氣盛則實精氣奪則虚何謂重實所謂重實者大熱病氣熱脉滿是謂重實也脉盛皮熱腹脹前後不通􅀢瞀為五實脉細皮寒氣少泄痢注前後飲食不入為五虚也何時得病第九何以知人露臥得病陽中有陰也何以知人夏月得病諸陽入陰也何以知人春得病無肝脉也無心脉夏得病無肺脉秋得病無腎脉冬得病無脾脉四季之月得病扁鵲華佗察聲色要訣第十病人五臓已奪神明不守聲嘶者死病人循衣縫譫言者不可治病人陰陽俱絶掣衣掇空妄言者死病人妄語錯亂及不能語者不治熱病者可治病人陰陽俱絶失音不能言者三日半死病人兩目眥有黄色起者其病方愈病人面黄目青者不死青如草滋死病人面黄目赤者不死赤如衃血死病人面黄目白者不死白如枯骨死病人面黄目黒者不死黒如炲死病人面目俱等者不死病人面黒目青者不死病人面青目白者死病人面赤目青者六日死病人面黄目青者九日必死是謂亂經飲酒當風邪入胃經膽氣妄洩目則為青雖有天救不可復生病人面赤目白者十日死憂恚思慮心氣内索面色反好急求棺槨病人面白目黒者死此謂榮華已去血脉空索病人面黒目白者八日死腎氣内傷病因留積病人面青目黄者五日死病人著牀心痛短氣脾竭内傷百病復愈能起傍徨因坐於地其立倚牀能治此者可謂神良病人面無精光若土色不受飲食者四日死病人目無精光及牙齒黒色者不治病人耳目鼻口有黑色起入于口者必死病人耳目及顴頰赤者死在五日中病人黒色出於額上髪際下直鼻脊兩顴上者亦死在五日中病人及健人黒色若白色起入目及鼻口者死在三日中病人及健人面忽如馬肝色望之如青近之如黒者死病人面黒目直視惡風者死病人面黒脣青者死病人面青脣黒者死病人面黒兩脇下滿不能自轉反者死病人目回回直視肩息者一日死病人陰結陽絶目精脫恍惚者死病人陰陽絶竭目眶陷者死病人眉系傾者七日死病人口如魚口不能復閉而氣出多不返者死病人口張者三日死病人脣青人中反者三日死病人脣反人中滿者死病人脣口忽乾者不治病人脣腫齒焦者死病人齒忽變黒者十三日死病人舌卷卵縮者必死病人汗出不流舌卷黒者死病人髪直者十五日死病人髪如乾麻善怒者死病人髪與眉衝起者死病人爪甲青者死病人爪甲白者不治病人手足爪甲下肉黒者八日死病人榮衛竭絶面浮腫者死病人卒腫其面蒼黒者死病人手掌腫無文者死病人臍腫反出者死病人陰囊莖俱腫者死病人脉絶口張足腫者五日死病人足趺腫嘔吐頭重者死病人足趺上腫兩膝大如斗者十日死病人臥遺屎不覺者死病人尸臭者不可治肝病皮白肺之日庚辛死心病目黒腎之日壬癸死脾病脣青肝之日甲乙死肺病頰赤目腫心之日丙丁死腎病面腫脣黄脾之日戊巳死青欲如蒼璧之澤不欲如藍赤欲如帛裏朱不欲如頳白欲如鵝羽不欲如鹽黒欲如重漆不欲如炭黄欲如羅裹雄黄不欲如黄土診五臓六腑氣絶證候第十一病人肝絶八日死何以知之面青但欲伏眠目視而不見人汗一作泣出如水不止一曰二日死病人膽絶七日死何以知之眉為之傾病人筋絶九日死何以知之手足爪甲青呼罵不休一曰八日死病人心絶一日死何以知之肩息回視立死一曰目亭亭二日死病人腸一云小腸絶六日死何以知之髪直如乾麻不得屈伸自汗不止病人脾絶十二日死何以知之口冷足腫腹熱臚脹泄利不覺出無時度一曰五日死病人胃絶五日死何以知之脊痛腰中重不可反覆一曰腓腸平九日死病人肉絶六日死何以知之耳乾舌皆腫溺血大便赤泄一曰足腫九日死病人肺絶三日死何以知之口張但氣出而不還一曰鼻口虚張短氣病人大腸絶不治何以知之泄利無度利絶則死病人腎絶四日死何以知之齒為暴枯面為正黒目中黄色腰中欲折白汗出如流水一曰人中平七日死病人骨絶齒黄落十日死諸浮脉無根者皆死已上五臟六腑為根也診四時相反脉第十二春三月木旺肝脉治當先至心脉次之肺脉次之腎脉次之此為王相順脉也到六月土王脾脉當先至而反不至反得腎脉此為腎反脾也七十日死何謂腎反脾夏火王心脉當先至肺脉次之而反得腎脉是謂腎反脾期五月六月忌丙丁脾反肝三十日死何謂脾反肝脉當先至而反不至脾脉先至是謂脾反肝期正月二月忌甲乙腎反肝三歳死何謂腎反肝春肝脉當先至而反不至腎脉先至是謂腎反肝期七月八月忌庚辛腎反心二歳死何謂腎反心夏心脉當先至而反不至腎脉先至是謂腎反心期六月忌戊巳此中不論肺金之氣踈略未諭指南又推五行亦頗顚倒待求别録上凡療病察其形貎神氣色澤脉之盛衰病之新故乃可治之形氣相得色澤以浮脉從四時此為易治形氣相失色夭不澤脉實堅甚脉逆四時此為難治逆四時者春得肺脉夏得腎脉秋得心脉冬得脾脉其至皆懸絶澀者曰逆春夏沈澀秋冬浮大病熱脉靜泄痢脉大脫血脉實病在中脉堅實病在外脉不實名逆四時皆難療也凡四時脉皆以胃氣為本雖有四時王相之脉無胃氣者難瘥也何謂胃脉來弱以滑者是也命曰易治診脉動止投數踈數死期年月第十三脉一動一止二日死一經云一日死脉二動一止三日死脉三動一止四日死或五日死脉四動一止六日死脉五動一止七日死或五日死脉六動一止八日死脉七動一止九日死脉八動一止十日死脉九動一止九日死又云十一日死一經云十三日死若立春死脉十動一止立春死一經云立夏死脉十一動一止立夏死一經云夏至死又云立秋死脉十二動十三動一止立秋死一經云立冬死脉十四動十五動一止立冬死一經云立夏死脉二十動一止一歳死若立秋死脉二十一動一止二歳死脉二十五動一止二歳死一經云一歳死又云立冬死脉三十動一止二歳死若三歳死脉三十五動一止三歳死脉四十動一止四歳死脉五十動一止五歳死不滿五十動一止五歳死五行氣畢陰陽數同榮衛出入經脉通流晝夜百刻五徳相生脉來五十投而不止者五臓皆受氣即無病也脉來四十投而一止者一臓無氣却後四歳春草生而死脉來三十投而一止者二臟無氣却後三歳麥熟而死脉來二十投而一止者三臟無氣却後二歳桑椹赤而死脉來十投而一止者四臟無氣歳中死得節不動出清明死逺不出榖雨死矣脉來五動而一止者五臟無氣却後五日而死脉一來而久住者宿病在心主中治脉二來而久住者病在肝枝中治脉三來而久住者病在脾下中治脉四來而久住者病在腎間中治脉五來而久住者病在肺枝中治五脉病虚羸人得此者死所以然者藥不得而治針不得而及盛人可治氣全故也備急千金要方卷八十五
