body:
  text: 備急千金要方卷六十四唐孫思邈撰宋林億等校正消渇方淋閉第二論方證法灸論曰熱結中膲則為堅下膲則為溺血令人淋閉不通此多是虚損人服大散下膲客熱所為亦有自然下膲熱者但自少可善候之凡氣淋之為病溺難澀常有餘瀝石淋之為病莖中痛溺不得卒出膏淋之為病尿似膏自出勞淋之為病勞倦即發痛引氣衝下熱淋之為病熱即發甚則尿血治之皆與氣淋同凡人候鼻頭色黄法小便難也地膚子湯治下膲結熱小便赤黄不利數起出少莖痛或血出温病後餘熱及霍亂後當風取熱過度飲酒房勞及行歩冐熱以飲逐熱熱結下膲及散石熱動闗格小腹堅胞脹如斗諸有此淋悉治之立驗方地膚子三兩知母黄芩猪苓瞿麥枳實一作松實升麻通草葵子海藻右十味㕮咀以水一斗煮取三升分三服大小便皆閉者加大黄三兩女人房勞腎中有熱小便難不利小腹滿痛脉沈細者加猪腎一具崔氏云若加腎可用水一斗半先煮腎取一斗汁然後内藥煎之小品方不用枳實治百種淋寒淋熱淋勞淋小便澀胞中滿腹急痛方通草石韋甘草王不留行各二兩冬葵子滑石瞿麥白术芍藥各三兩右九味㕮咀以水一斗煎取三升分三服古今錄驗有當歸二兩治下篩以麥粥清服方寸匕日三又方滑石石韋栝蔞根各二兩右三味治下篩大麥飲服方寸匕日三治諸種淋方葵根八兩茆根石首魚頭石各三兩甘草一兩通草二兩貝子五合天麻根五兩右七味㕮咀以水一斗二升煮取五升分五服日三夜二亦主石淋又方榆皮一斤車前子冬𤓰子各一升鯉魚齒桃膠通草地脉各二兩瞿麥四兩右八味㕮咀以水一斗煮取三升分三服日三又方細白沙三升􅆈令極熱以酒三升淋取汁服一合治淋痛方滑石四兩貝子七枚燒碎茯苓白术通草芍藥各二兩右六味治下篩酒服方寸匕日二服十日瘥又方葵子五合茯苓白术當歸各二兩右四味㕮咀以水七升煮取二升分三服日三又方取猪脂酒服三合日三小兒服一合臘月者治小便不利莖中疼痛小腹急痛方通草茯苓各三兩葶藶二兩右三味治下篩以水服方寸匕日三又方蒲黄滑石各等分右二味治下篩酒服方寸匕日三治小便不利膀胱脹水氣流腫方水上浮萍曝乾為末服方寸匕日三治小便不通方滑石三兩葵子榆白皮各一兩右三味治下篩煮麻子汁一升半取一升以散二方寸匕和分三服即通又方水四升洗甑帶取汁煮葵子取二升半分三服又方胡燕屎䜴各一合和擣丸如梧子服三丸日三又方髪去垢燒末葵子各一升以飲服方寸匕日三又方石首魚頭石為末水服方寸匕日三又方石槽塞灰土井華水服之日三又方鯉魚齒燒灰末酒服方寸匕日三又方車前子末方寸匕日三服百日止治卒不得小便方吞雞子白取瘥葛氏云吞黄又方車前草一把桑白皮半兩右二味㕮咀以水三升煎取一升頓服之治婦人卒不得小便方杏仁二七枚􅆈末服之立下又方紫苑末井華水服三指撮立通血出者四五度服之治黄疸後小便淋瀝方猪腎一具切茯苓一斤瞿麥六兩車前根切二斗黄芩三兩椒目三合綿裹澤瀉地膚子各四兩右八味㕮咀以水二斗煮車前取一斗六升去滓下猪腎煮取一斗三升去腎下藥煮取三升分三服治氣淋方水三升煮船底苔如鴨子大取二升頓服又方水三升煮豉一升一沸去滓内鹽一合頓服亦可單煮䜴汁服之又方水一斗煮比輪錢三百文取三升温服之又方擣葵子末湯服方寸匕又方空腹單茹蜀葵一滿口又方􅆈鹽熱熨小腹冷復易亦治小便血肘後方治小便不通灸法臍中著鹽灸三壯葛氏云治小便不通灸闗元五十壯又灸俠玉泉相去一寸半三十壯治石淋方右用車前子二升絹袋盛水九升煮取三升先經宿不得食平旦空腹頓服之石即出備急方云治熱淋又方取浮石使滿一手許治下篩以水三升酢一升煮取二升澄清服一升不過三服石出亦治嗽淳酒煮之又方桃膠􅀥許大夏以冷水三合冬以湯三合和服日三當下石子如豆卵石盡止亦治小便出血灸法石淋臍下三十六腫病不得小便灸闗元三十壯又灸氣門三十壯又灸水泉三十壯足大敦是也治膏淋方右擣葎草汁二升酢二合和空腹頓服之當尿如小豆汁也又濃煮汁飲亦治淋瀝蘇澄用療尿血治五勞七傷八風十二痺勞結為血淋熱結為肉淋小便不通莖中及小腹痛不可忍者方滑石桂心冬葵子王不留行通草車前子各二分甘遂一分石韋四分右八味治下篩以麻子飲五合和服方寸匕日三尿沙石出一方加榆白皮三分灸法勞淋灸足太陰百壯在内踝上三寸三報之治熱淋方大􅀥二七枚葵根切一升冬用子夏用苖右二味以水三升煮取一升二合分二服熱加黄芩一兩出難加滑石二兩末血者加茜根三兩痛者加芍藥二兩加藥亦加水也又方白茆根切四斤以水一斗五升煮取五升服一升日三夜二又方常煮冬葵根作飲服之治血淋小便磣痛方雞蘇二兩通草滑石各五兩竹葉一把生地黄半斤小薊根一兩右六味㕮咀以水九升煎取三升去滓分三服温服石韋散治血淋方石韋當歸蒲黄芍藥右四味各等分治下篩酒服方寸匕日三又方以水五升煮生大麻根十枚取二升頓服亦治小便出血又方以水四升煮大豆葉一把取二升頓服又方以水三升煮葵子一升取汁日三服亦治虚勞尿血灸法血淋灸丹田隨年壯又灸伏留五十壯一云隨年壯五淋不得小便灸懸泉十四壯穴在内踝前一寸斜行小脉上是中封之别名五淋灸大敦三十壯卒淋灸外踝尖七壯淋病九部諸疾灸足太陽五十壯淋病不得小便陰止痛灸足太衝五十壯腹中滿小便數起灸玉泉下一寸名尿胞一名屈骨端灸二七壯小兒以意減之治遺尿小便澀方牡蠣鹿茸各四兩桑耳三兩錄驗無阿膠三兩右四味㕮咀以水七升煮取二升分二服日三又方防己葵子防風各二兩右三味㕮咀以水五升煮取二升半分三服散服亦佳治小便失禁方以水三升煮雞腸取一升分三服治失禁出不自覺方右用豆醬汁和竈突墨如豆大内尿孔中范注云治胞轉亦治小兒治尿牀方取羊肚系盛水令滿線縛兩頭熟煮即開取中水頓服立瘥又方取雞肶胵一具并腸燒末酒服男雌女雄又方取羊胞盛水滿中炭火燒之盡肉空腹食不過四五度瘥又方以新炊熱飯一盞瀉尿牀處拌與食之勿令知良灸法遺尿失禁出不自知灸陰陵泉隨年壯遺溺灸遺道俠玉泉五寸又灸陽陵泉又灸足陽明各隨年壯小便失禁灸大敦七壯又灸行間七壯尿牀垂兩手兩髀上盡指頭上有陷處灸七壯又灸臍下横文七壯尿血第三方治房勞傷中尿血方牡蠣桂心黄芩車前子各等分右四味治下篩以飲服方寸匕稍加至二匕日三服治小便血方生地黄八兩栢葉一把黄芩阿膠各二兩右四味㕮咀以水八升煮取三升去滓下膠分三服一方加甘草二兩又方莵絲子蒲黄白芷荆實乾地黄酸􅀥小品作敗醬芎藭葵子當歸茯苓各等分右十味為末蜜丸如梧子飲服五丸日三稍加至十丸又方戎鹽六分甘草蒲黄鹿魚膠芍藥各二兩礬石三兩大􅀥十枚右七味㕮咀以水九升煮取二升分三服又方胡麻三升擣細末以東流水二升漬一宿平旦絞去滓煮兩沸頓服又方龍骨為細末温水服方寸匕日五六服張文仲云酒服又方酒三升煮蜀當歸四兩取一升頓服又方擣荆葉取汁酒服二合又方煮車前根葉子多飲佳又方酒服亂髪灰蘇澄用水服又方酒服葵莖灰方寸匕日三又方刮滑石末水和𫝊繞小腹及陰際佳葛氏云治小便不通又方䜴二升酒四升煮取一升頓服水腫第四論方證法灸論曰大凡水病難治瘥後特須慎於口味又復病水人多嗜食不亷所以此病難愈也代有醫者隨逐時情意在財物不本性命病人欲食肉於貴勝之處勸令食羊頭蹄肉如此者未見有一愈者又此病百脉之中氣水俱實治者皆欲令瀉之使虚羊頭蹄極補那得瘳愈所以治水藥多用葶藶子等諸藥本草云葶藶久服令人大虚故水病非久虚不得絶其根本又有蠱脹但腹滿不腫水脹脹而四肢面目俱腫大有醫者不善診候治蠱以水藥治水以蠱藥或但見脹滿皆以水藥如此者仲景所云愚醫殺之今録忌如左其治蠱方具在雜方篇見第七十四卷中䘮孝産乳音樂房室諠戲一切魚一切肉一切生冷酢滑蒜粘食米豆油膩右以前並禁不得食不及不得用心其不禁者並具本方之下其房室等猶三年慎之永不復發不爾者雖瘥復發復發不可更治也古方有十水丸歷驗多利大便而不利小便所以不能述録也黄帝問岐伯曰水與膚脹鼔脹腸覃石瘕何以别之岐伯曰水之始起也目果上微腫靈樞太素作微癰如新臥起之狀頸脉動時欬陰股間寒足脛腫腹仍大其水已成也以手按其腹隨手而起如裹水之狀此其候也膚脹何以候之膚脹者寒氣客於皮膚之間殻殻然而堅太素外臺作不堅腹大身盡腫皮厚按其腹陷太素作窅而不起腹色不變此其候也鼔脹如何鼔脹者腹脹身腫大大與膚脹等其色蒼黄腹脉起此其候也腸覃如何腸覃者寒氣客於腸外與胃太素作衛氣相薄正氣不得榮因有所繫瘕而内著惡氣乃起息肉乃生始也如雞卵稍以益大及其成也若懷子之狀久者離嵗月按之即堅推之則移月事時下此其候也石瘕如何石瘕者生於胞中寒氣客於子門子宫閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下之曰膚脹鼔脹可刺耶曰先瀉其腹之血絡後調其經刺去其血脉師曰病有風水有皮水有正水有石水有黄汗風水其脉自浮外證骨節疼痛其人惡風皮水其脉亦浮外證浮腫按之没指不惡風其腹如鼔要畧巢酒作如故不滿不渇當發其汗正水其脉沈遟外證自喘石水其脉自沈外證腹滿脉經作痛不喘黄汗其脉沈遟身體發熱胷滿四肢頭面並腫久不愈必致癰膿心水者其人身體重一作腫而少氣不得卧煩而燥其人陰大腫肝水者其人腹大不能自轉側而脇下腹中痛時時津液微生小便續通脾水者其人腹大四肢苦重津液不生但苦少氣小便難也肺水者其人身體腫而小便難時時鴨溏腎水者其人腹大臍腫腰痛不得溺陰下濕如牛鼻上汗足為逆冷其面反瘦師曰治水者腰以下腫當利小便腰以上腫當發汗即愈問曰有病下利後渇飲水小便不利腹滿因腫何故師云此法當病水若小便自利及汗出者自當愈一作滿月當愈凡水病之初先兩目上腫起如老蠶色俠頸脉動股裏冷脛中滿按之没指腹内轉側有聲此其候也不即治之須臾身體稍腫腹中盡脹按之隨手起水為已成猶可治也此病皆從虚損所致大病或下利後婦人産後飲水不即消三膲決漏小便不利仍相結漸漸生聚遂流諸經絡故也水有十腫不可治者有五第一脣黑傷肝第二缺盆平傷心第三臍出傷脾第四背平傷肺第五足下平滿傷腎此五傷必不可治凡水病忌腹上出水出水者一月死大忌之中軍候黑圓治膽𤣥水先從頭面至脚腫頭眩痛身虚熱名曰𤣥水體腫大小便澀宜此方方見第五十八卷中治小腸水小腹滿暴腫口苦乾燥方右用巴豆三十枚和皮㕮咀水五升煮取三升綿内汁中拭腫上隨手可減日五六拭莫近目及陰集驗治身暴腫如吹治大腸水乍虚乍實上下來去方赤小豆五升桑白皮切二升鯉魚四斤白术八兩右四味㕮咀以水三斗煮魚取爛勿用鹽去魚盡食并取汁四升許細細飲下又方羊肉一斤當陸切一升右二味以水二斗先煮當陸令爛去滓後内羊肉及蔥䜴酢一如臛法肘後云治卒腫滿身面浮大治膀胱石水四肢瘦腹腫方桑白皮穀白皮澤漆葉各三升大豆五升防己射干白术各四兩右七味㕮咀以水一斗五升煮取六升去滓内好酒三升更煮取五升日二夜一餘者次日更服集驗方無澤漆防己射干只四味又方桑白皮六兩射干黄芩茯苓白术各四兩澤瀉三兩防己二兩大豆三升澤漆切一升右九味㕮咀以水五斗煮大豆取三斗去豆澄清取一斗下藥煮取三升空腹分三服治胃水四肢腫腹滿方猪腎一具茯苓四兩防己橘皮𤣥參黄芩杏仁澤瀉一作澤漆桑白皮各二兩猪苓白术各三兩大豆三升右十二味㕮咀以水一斗八升煮猪腎大豆澤瀉桑白皮取一斗澄清去滓内餘藥煮取三升分三服若欬加五味子三兩凡服三劑間五日一劑常用有效有人患氣急積久不瘥遂成水腫如此者衆諸皮中浮水攻面目身體從腰以上腫皆以此湯發汗悉愈方麻黄四兩甘草二兩右二味㕮咀以水五升煮麻黄再沸去沬内甘草取三升分三服取汗愈慎風冷等治面腫小便澀心腹脹滿方茯苓杏仁各八分橘皮防己葶藶各五分蘇子三合右六味為末蜜丸如小豆服十丸以桑白皮湯送下日二加至三十丸治面目手足有微腫常不能好者方以楮葉切二升以水四升煮取三升去滓内米煮作粥食如常食勿絶冬則預取葉乾之凖法作粥周年永瘥慎生冷一切食物治大腹水腫氣息不通命在旦夕者方牛黄二分椒目三分昆布海藻各十分牽牛子桂心各八分葶藶子六分右七味為末别擣葶藶如膏合和丸如梧子飲服十丸日二稍加小便利為度大良正觀九年漢陽王患水醫所不治余處此方日夜尿一二斗五六日即瘥瘥後有他犯因爾殂矣計此即是神方崔氏云蜜和為九蜜湯服有人患水腫腹大其堅如石四肢細小勞苦足脛腫小飲食便氣急此終身疾服利下藥不瘥者宜服此藥將以微除風濕利小便消水穀歳久服之乃可得力瘥後可常服鬼箭羽丹參白术獨活各五兩秦芁猪苓各三兩知母海藻茯苓桂心各二兩右十味㕮咀以酒三斗浸五日服五合日三任性量力漸加之治水腫利小便酒客虚熱當風飲冷水腹腫隂腫滿方當陸四兩甘遂一兩芒硝芫花吳茱茰各二兩右五味為末蜜丸如梧子大飲服三丸日三一方有大黄蕘花各二兩無茱萸加麝香猪苓各一兩大豆散治久水腹肚大如鼓者方烏豆一斗􅆈令香勿令大熟去皮為細末篩下餳粥皆得服之初服一合稍加之若初服多後即嫌臭服盡更作取瘥止不得食肥膩渇則飲羮汁慎酒肉猪雞魚生冷酢滑房室得食漿粥牛羊兎鹿肉此據大饑渇時食之可忍亦勿食也此病難治雖諸大藥丸散湯膏當時暫瘥過後復發惟此散瘥後不發終身服之終身不發矣其所禁食物常須少噉莫隨意鹹物諸雜食等又方葶藶末蒼耳子灰各二十匕右二味水調和服之日二又方椒目水沈者取􅆈擣如膏酒服方寸匕又方水煮馬篼零服之治水氣腫鼓脹小便不利方莨菪子一升􅗑羊肺一具青羊亦佳右二味先洗羊肺湯微㳿之薄切曝乾作末以三年大酢漬莨菪子一晬時出􅆈令變色熟擣如泥和肺末蜜合擣三千杵為丸如梧子大食後一食久以麥門冬飲服四丸日三以喉中乾口粘浪語為候數日小便大利佳山連療韋司業得瘥司業姪雲表所送云數用神驗麥門冬飲方麥門冬二十五枚米二十五粒右二味以水一升和煮米熟去滓以下前件丸藥逐服作用之徐王煮散治水腫利小便方牛角䚡防己羌活人參丹參牛膝升麻防風秦芁生薑屑穀皮紫菀杏仁附子石斛各三兩桑白皮六兩橘皮二兩白术澤瀉茯苓郁李仁猪苓黄連各一兩右二十三味治下篩為粗散以水一升五合煮三寸匕取一升頓服日再不能者但一服二三月以前可服主利多而小便澀者用之大驗褚澄漢防己散治水腫上氣方漢防己澤漆葉石韋澤瀉各五兩桑根白皮白术丹參赤茯苓橘皮通草各三兩生薑十兩郁李仁五合右十二味治下篩為粗散以水一升半煮三方寸匕取八合去滓頓服日三取小便利為度茯苓圎治水腫甄權為安康公處者方茯苓白术椒目各四分木防己葶藶澤瀉各五分甘遂十二分赤小豆前胡芫花桂心各二分芒硝七分别研右十二味為末蜜和丸如梧子蜜湯下五丸日一稍加以知為度治水腫利小便方大黄白术一作葶藶木防己各等分右三味為末蜜丸如梧子飲下十丸利小便為度不知加之又方牽牛子末水服方寸匕日一以小便利為度又方葶藶四兩生用桂心一兩右二味為末蜜丸如梧子大飲下匕丸日二以知為度又方郁李仁末麵各一升右二味和作餅子七枚燒熟空腹熱食四枚不知加一枚以至七枚又方水銀三兩煮三日三夜葶藶子椒目各一升衣魚二七枚水萍𤓰蔕滑石各二兩芒硝五兩右八味擣葶藶令細下水銀更擣令不見水銀止别擣椒目令細擣𤓰蒂水萍下篩合和餘藥以蜜和更擣三萬杵成丸初服一丸如梧子次服二丸次服三丸次服四丸次服五丸次服六丸至七日還從一丸起次服二丸如是每至六丸還從一丸起始服藥當咽喉上有癧子腫起頰車腫滿齒齗皆腫唾碎血出勿怪也不經三五日即消所苦皆瘥以上服藥若下多停藥以止利藥至五下止病未瘥更服病瘥止此治諸體肉肥厚按之不陷甚者臂粗著衣袖不受及十種大水醫不治者悉主之神驗深師集驗陶氏古今録驗無衣魚水萍𤓰蔕滑石澤㯃湯治水氣通身浮腫四肢無力或從消渇或從黄疸支飲内虚不足榮衞不通氣不消化實皮膚中喘息不安腹中響脹滿眼目不得視方澤㯃根十兩鯉魚五斤生薑八兩赤小豆二升茯苓三兩人參甘草麥門冬各二兩右八味㕮咀以水一斗七升先煮魚及豆減七升去之内藥煮取四升半一服三合日三人弱服三合再服氣下喘止可至四合晬時小便利腫氣減或小溏下若小便大利還從一合始大利便止若無鯉魚鮦魚亦可用若水甚不得臥臥不得轉側加澤㯃一斤渇加栝蔞根二兩欬嗽加紫菀二兩細辛一兩欵冬花一合桂心三兩增魚汁二升胡洽無小豆麥門冬有澤瀉五合杏仁一兩古今録驗無小豆治水在五臟令人欬逆喘上氣腹大而響兩脚腫目下有臥蠶狀微渇不得安臥氣奔短氣有頃乃復小便難少而數肺病胷滿隱痛宜利小便水氣迫肺翕翕寒熱猪苓散治虚滿通月腫利三膲通水道方猪苓葶藶人參𤣥參五味子防風澤瀉桂心狼毒椒目白术乾薑大㦸甘草各二兩蓯蓉二兩半女麴三合赤小豆二合右十七味治下篩酒服方寸匕日三夜一老小一錢匕以小便利為度治水氣通身洪腫百藥治不瘥待死者方大麻子皆取新肥者佳赤小豆不得一粒雜各一石右二味皆以新精者淨㨂擇以水淘洗曝乾蒸麻子使熟更曝令乾貯淨器中欲服取五升麻子􅆈令黄香只宜緩火勿令焦極細作末以水五升搦取汁令盡淨宻器盛貯明旦欲服今夜以小豆一升淨淘浸至旦乾漉去水以新水煮豆末及好熟即漉出令乾内麻子汁中煮令大爛熟為佳空腹恣食日三服當小心悶少時即止五日後小便數或赤而唾粘口乾不足怪之服訖常以小便利為佳又方煎人尿令可丸服如小豆大日三又方大􅀥肉七枚苦瓠膜如􅀥核大擣丸一服三丸如行十五里久又服三丸水出更服一丸即止又方擣生葶藶子酢和服以小便數為度又方燒薑石令赤内黑牛尿中令熱服一升日一又方單服牛尿大良凡病水服無不瘥服法先從少起得下為度又方灸足第二趾上一寸隨年壯又灸兩手大指縫頭七壯麻黄煎治風水通身腫欲裂利小便方麻黄茯苓澤瀉各四兩防風澤㯃白术各五兩杏仁大㦸清酒各一升黄耆猪苓各三兩獨活八兩大豆二升水七升煮取一升右十三味㕮咀以豆汁酒及水一斗合煮取六升分六七服一日一夜令盡當小便極利為度大豆散治風水通身大腫眼合不得開短氣欲絶方大豆杏仁清酒各一升麻黄木防己防風猪苓各四兩澤瀉黄耆烏頭各三兩生薑七兩半夏六兩茯苓白术各五兩甘遂甘草各二兩右十六味㕮咀以水一斗四升煮豆取一斗去豆内藥及酒合煮取七升分七服日四夜三得小便快利為度腫消停藥不必盡劑若不利小便者加生大㦸一升葶藶二兩無不快利萬不失一深師方無猪苓澤㵼烏頭半夏甘遂治風水腫方大豆三升茯苓白术各五兩防風橘皮半夏生薑各五兩鼈甲當歸防巳麻黄猪苓各三兩大㦸一兩葵子一升桑白皮五升以水二斗煮取一斗去滓内前藥右十五味㕮咀内前汁中煮取五升每服八合日三每服相去如人行十里久麻子湯治遍身流腫方麻子五升赤小豆三升當陸一斤防風三兩附子一兩右五味㕮咀先擣麻子令熟以水三斗煮麻子取一斗三升去滓内藥及豆煮取四升去滓食豆飲汁大豆煎治男子女人新久腫得暴惡風入腹婦人新産上圊風入臟腹中如馬鞭者嘘吸短氣欬嗽方右用大豆一斗淨擇以水五斗煮取一斗五升澄清内釡中以一斗半美酒内中更煎取九升宿勿食平旦服三升温覆取汗兩食頃當下去風氣腫退慎風冷十日平復除日合服佳苦急不可待逐急合服腫不盡退加之腫瘥更服三升若十分瘥勿服病中亦可任性飲之使酒氣相接肘後云腫瘥後渇慎勿多飲又方楮皮枝葉一大束切煮取汁隨多少釀酒但飲醉為佳不過三四日腫少退瘥後可常服之一方用猪椒皮枝葉又方鯉魚長一尺五寸以尿淹漬一宿平旦以木箆從口貫至尾微火炙令微熟去皮宿勿食空腹頓服之不能者分再服勿與鹽摩膏治表凡腫病須百方内外攻之不可一槩方生當陸一斤猪膏一斤煎可得二斗右二味和煎令黄去滓以摩腫亦可服少許并塗以紙覆上燥輙𫝊之不過三日瘥麝香散治婦人短氣虚羸遍身浮腫皮膚急人所稀見方麝香三銖雄黄六銖芫花甘遂各二分右四味治下篩酒服錢五匕老小以意增減亦可為丸如小豆大强者服七丸小品無雄黄深師以蜜丸如大豆服二丸日三治三焦決滿水在胷外名曰水病腹濁大在腹表用大麝香丸華池方肘後有人參二分為丸服治虚勞浮腫方右灸太衝百壯又灸腎輸備急千金要方卷六十四
