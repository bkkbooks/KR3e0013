body:
  text: 備急千金要方卷七十四唐孫思邈撰宋林億等校正解毒雜治方蠱毒第四論方論曰蠱毒千品種種不同或下鮮血或好臥闇室不欲光明或心性反常乍嗔乍喜或四肢沉重百節酸疼如此種種状貌說不可盡亦有得之三年乃死急者一月或百日即死其死時皆有九孔中或於脇下肉中出去所以出門常須帶雄黄麝香神丹諸大辟惡藥則百蠱貓虎狐狸老物精魅永不敢著人養生之家大須慮此俗亦有灸法初中蠱於心下捺便大炷灸一百壮幷主貓鬼亦灸得愈又當足小指尖上灸三壮當有物出酒上得者有酒出飯上得者有飯出肉菜上得者有肉菜出即愈神驗皆於灸瘡上出凡中蠱毒令人心腹絞切痛如有物囓或吐下血皆如爛肉若不即治蝕人五臟盡乃死矣欲驗之法當令病人唾水沉者是蠱不沉者非蠱也凡人患積年時復大便黒如漆或堅或薄或㣲赤者皆是蠱也凡人忽患下血以斷下方治更増劇者此是中蠱也凡卒患血痢或赤或黒無有多少此皆是蠱毒粗醫以斷痢藥處之此大非也世有拙醫見患蠱脹者徧身腫滿四肢如故小便不甚澀以水病治之延日服水藥經五十餘日望得痊愈日復增加奄至隕殁如此者不一學者當細尋方意消息用之萬不失一醫方千卷不盡其理所以不可一一備述云耳凡人中蠱有人行蠱毒以病人者若服藥知蠱主姓名當使呼喚将去若欲知蠱主姓名者以敗鼓皮燒作末以飲服方寸匕須臾自呼蠱主姓名可語令去則愈又有以蛇涎合作蠱藥著飲食中使人得瘕病此一種積年乃死療之各自有藥江南山間人有此不可不信之太上五蠱圓治百蠱吐血傷中心腹結氣堅塞咽喉語聲不出短氣欲死飲食不下吐逆上氣去來無常状如鬼祟身體浮腫心悶煩疼寒戰夢與鬼交狐狸作魅卒得心痛上义胷脇痛如刀刺經年累嵗著牀不起悉主之方雄黄椒目巴豆莾草芫花真珠外臺用木香鬼臼礬石藜蘆各四分附子五分獺肝一分蜈蚣二枚斑貓三十枚右十三味為末蜜和更𢷬二千杵丸如小豆先食飲服一丸餘宻封勿泄藥氣十丸為一劑如不中病後日增一丸以下利為度當下蠱種種状貌不可具述下後七日将息服一劑三十年百病盡除忌五辛太乙追命圓治百病若中惡氣心腹脹滿不得喘息心痛積聚臚脹疝瘕宿食不消吐逆嘔啘寒熱瘰癧蠱毒婦人産後餘疾方蜈蚣一枚丹砂附子雄黄礬石一作礜石藜蘆鬼臼各一分巴豆二分右八味為末蜜丸如麻子一服二丸日一服傷寒一二日服一丸當汗出綿裹兩丸塞兩耳中下痢服一丸一丸塞下部蠱毒服二丸在外膏和摩病上在膈上吐膈下利有瘡一丸塗之毒自出産後餘疾服一丸耳聾綿裹塞耳治人得藥雜蠱方斑貓六枚桂心藜蘆各如指大釜月下土如彈丸大右四味治下篩水服一錢匕下蠱蛇蝦䗫􅎙蜋毒俱出萬病圓治蠱注四肢浮腫肌膚消索咳逆腹大如水状死後轉易家人一名蠱脹方小品名雄黄丸一名萬病丸雄黄巴豆莾草鬼臼各四兩蜈蚣三枚右五味為末蜜和𢷬三千杵丸如小豆宻封勿泄氣宿勿食平旦空腹一丸一炊久不知更加一丸當先下清水次下蠱長數寸及下蛇又下􅖁雞子或白如膏下後作蔥豉粥補之百種煖将息治中蠱毒腹内堅如石面目青黄小便淋瀝病變無常處方肘後古今録驗方俱云用鐡精烏雞肝和丸如梧子以酒服三丸日再甚者不過十日千金用後方疑千金誤羖羊皮方五寸犀角芍藥黄連牡丹各一兩蘘荷四兩半梔子仁七枚右七味㕮咀以水九升煮取三升分三服葛氏崔氏牡同無芍藥丹梔子用苦参升麻當歸犀角圓治蠱毒百病腹暴痛飛屍惡氣腫方犀角屑鬼臼屑桂心末羚羊角屑各四錢七天雄莾草真珠雄黄各一兩貝子五枚燒蜈蚣五節巴豆五十枚麝香二分射罔如雞子黄大一枚右十三味為末合𢷬蜜丸如小豆服一丸日二含烟不知少增之卒得腹滿蜚屍服如大豆許二丸若惡氣腫以苦酒和塗上縫袋子盛藥繫左臂辟不祥鬼疰蠱毒可以備急治蠱毒方茜根蘘荷根各三兩右二味㕮咀以水四升煮取二升頓服肘後方云治中蠱吐血或下血皆如爛肝者自知蠱主姓名又方蝟皮灰亂髪灰各一方寸匕生麻子汁五升槲樹北隂白桃根皮各五兩右五味先煮槲皮桃根取濃汁一升和麻子汁髪灰等令匀患人宿少食旦服一大升須臾著盆水以雞翎擿吐水中如牛涎犢胎及諸蟲並出又方槲樹北隂白皮一大握長五寸水三升煮取一升空腹服即吐蟲出亦治中蠱下血又方蝟皮灰水服方寸匕亦出蟲又方大㦸斑猫一分五月五日桃白皮必效方云以東引者火烘之各四分右三味治下篩旦空腹以水一雞子許服八捻用二指相著如開頓服之若指頭相離取藥太多恐能損人肘後方云服􅀥核大不瘥十日更一服必效方云服半方寸匕其毒即出不出更一服李饒州云若以酒中得則以酒服以食中得以飲服之治蛇蠱方蛇毒入菜果中食之令人得病名曰蛇蠱大豆末以酒漬絞取汁服半升治諸熱毒或蠱毒鼻中及口中出血醫所不治者方取人屎尖七枚燒作火色置水中研之頓服即愈亦解百毒時氣熱病之毒服極神驗治蠱吐下血方櫸皮廣五寸長一尺蘆荻根五寸如足大指小品方用薔薇根右二味㕮咀以水二升煮取一升頓服極下蠱治中蠱下血日數十行者方巴豆二七枚元青藜蘆附子礬石各二分右五味為末别治巴豆合篩和相得以綿裹藥如大豆許内下部中日三瘥又方苦瓠一枚以水二升煮取一升稍稍服之當下蠱及吐蝦䗫蝌斗之状一月後乃盡范江方云苦瓠毒當臨時量用之肘後方云用苦酒二升煮治下血状如雞肝腹中攪痛難忍者方茜根升麻犀角各三兩桔梗黄蘗黄芩各二兩白蘘荷地榆各四兩右八味㕮咀以水九升煮取二升半分三服此蠱利血用之又方桔梗犀角各等分右二味為末酒服方寸匕日三不能自服絞口與之藥下心中當煩須臾自静有頃下服至七日止可食猪脾臟自補養治蠱下血如雞肝日夜不觧欲死者皆可用治腸蠱先下赤後下黄白沫連年不瘥者方牛膝一兩搥散切以淳清酒一升漬一宿平旦空腹服之再服便愈北地太守酒治萬病蠱毒風氣寒熱方烏頭甘草芎藭黄芩桂心藜蘆附子各四兩白歛桔梗半夏栢子仁前胡麥門冬各六兩右十三味七月麴十斤秫米一斛如醖酒法㕮咀藥以絹袋盛之沉於瓮底酒熟去糟還取藥滓以青布袋盛沉著酒底泥頭秋七日夏五日冬十日空腹服一合日三以知為度藥有毒故以青布盛之服勿中止二十日大有病出其状如漆五十日病悉愈婦人年五十被病連年腹中積聚冷熱不調時時切痛遶臍絞急上氣胷滿二十餘年服藥二七日所下三四升即愈又有女人病偏枯終産服二十日吐黒物大如刀帶長三尺許即愈其年生子又有女人小得癲病服十八日出血二升半愈有人被杖崩血内瘀臥著九年服藥十三日出黒血二三升愈有人耳聾十七年服藥三十五日鼻中出血三升耳中出黄水五升便愈古方云熹平二年北地太守臣光上然此偏主蠱毒有人中蠱毒者服無不愈極難瘥者不過二七日所有效莫不備出曾有一女人年四十餘偏枯羸瘦不能起長臥牀枕耳聾一無所聞兩手不收已經三年余爲合之遂得平復如舊有人中蠱毒而先患風服茵芋酒傷多吐出蠱數十枚遂愈何况此酒而不下蠱也嘉其功效有異常方故具述焉胡臭漏腋第五論方論曰有天生胡臭有為人所染臭者天生臭者難治為人所染者易治然須三年醋𫝊礬石散勿止并服五香丸乃可得瘥勿言一度𫝊藥即瘥正一𫝊藥時暫得一瘥耳五香丸見前第六卷中凡胡臭人通忌食芸薹五辛治之終身不瘥石灰散治胡臭方石灰一升楓香一作沉香薫陸香丁香青木香各二兩礬石四兩陽起石橘皮各三兩右八味治下篩以綿作篆子粗如指長四寸展取藥使著篆上以絹袋盛著腋下先以布揩令痛然後挾之又方三年苦酢和石灰𫝊之治胡臭方辛夷芎藭細辛杜蘅藁本各二兩右五味㕮咀以淳苦酒漬一宿煎取汁𫝊之欲𫝊取臨臥時以瘥為度又方青木香附子白灰各二兩礬石半兩右四味為散著粉中常粉之肘後無礬石又方赤銅屑以酢和銀器中炒極熱以布裹熨腋下冷復易又方槲葉切三升以水五升煮取一升用洗腋下即以白苦瓠燒令煙出熏之數數作用又方辛夷細辛青木香芎藭各四分右四味治下篩熏竟粉之又方馬齒菜一束𢷬碎以蜜和作團以絹袋盛之以泥紙裹厚半寸曝乾以火燒熟破取更以少許蜜和使熱勿令冷先以生布揩之夾藥腋下藥痛久忍之不能然後以手中勒兩臂又方牛脂胡粉各等分右二味煎令可丸塗腋下一宿即愈不過三劑肘後方云合椒以塗又方伏龍肝作泥𫝊之六物散治漏腋腋下及足心手掌隂下股裏常如汗濕臭者方乾枸杞根乾薔薇根肘後作畜根甘草各半兩商陸根胡粉滑石各一兩右件藥治下篩以苦酒少少和塗當㣲汗出易衣復更塗上不過三著便愈或一嵗復發發復塗之又方水銀胡粉外臺作粉霜右二味以面脂研和塗之良驗又方石灰三升銀屑一升一作銅屑右二味合和絹囊盛汗出粉之妙又方正旦以尿洗腋下神妙又方黄礬石燒令汁盡治為末絹袋盛粉之即瘥脫肛第六方法灸肛門主肺肺熱應肛門熱則閉塞大行不通腫縮生瘡兊通方白蜜三升煎令燥冷水中調可得為丸長六七寸内肛門中到身向上頭向下少時取烊斯須即通洞泄猪肝散肛門主大腸大腸寒應肛門寒則洞瀉肛門滯出猪肝一斤􅆈令燥黄連阿膠芎藭各二兩艾葉一兩烏梅肉五兩右六味治下篩温清酒一升服方寸匕半日再若不能酒與清白米飲亦得璧土散治肛門滯出方故屋東璧土一升碎皁莢三捉各長一尺二寸右二味先𢷬土為散挹粉肛頭出處次取皁莢炙煖更逓熨取入則止又方灸故麻履底按令入頻按令入永瘥癭瘤第七證法方灸證原本遺失覓此一條多有脫誤須善本訂之治五癭方海藻龍膽海蛤通草昆布礜石一作礬石松蘿各三分麥麴四分半夏二分右九味治下篩酒服方寸匕日三禁食魚猪肉五辛生菜諸難消之物十日知二十日愈又方小麥麵一斗海藻一斤特生礜石十兩右三味以三年米醋漬小麥麵曝乾各𢷬為散合和服一方寸匕日四五服藥含極乃咽之禁薑五辛猪魚生菜大吹大讀誦大呌語等又方昆布松蘿海藻各三兩桂心海蛤通草白歛各二兩右七味治下篩酒服方寸匕日三又方海藻海蛤各三兩昆布半夏土𤓰根松蘿各一兩通草白歛龍膽各二兩右九味治下篩酒服方寸匕日再不得作重用力又方昆布二兩洗切如指大醋漬含咽汁盡愈又方海藻一斤小品三兩小麥麴一升右二味以三年醋一升溲麵末曝乾徃返醋盡合𢷬爲㪚酒服方寸匕日三服忌努力崔氏云療三十年癭瘤五癭圓方菖蒲二兩海蛤白斂續斷海藻松蘿桂心蜀椒到掛草半夏各一兩神麴三兩羊靨百枚右十二味治下篩以牛羊髓脂爲丸如梧子大日服三丸又方取鹿靨以佳酒浸令没灸乾内酒中更灸令香含咽汁味盡更易盡十具愈灸法癭上氣灸天府五十壮千金翼云又灸胷堂百壮癭上氣短氣灸肺輸百壮癭上氣胷滿灸雲門五十壮癭勞氣灸衝陽隨年壮癭氣面腫灸通天五十壮癭灸天瞿三百壮横三間寸灸之又灸中封隨年壮在兩足趺上曲尺宛宛中諸癭灸肩髃左右相當宛宛處男左十八壯右十七壯女右十八壯左十七壮或再三取瘥止又灸風池百壮俠項兩邉又灸兩耳後髪際一百壮又灸頭衝一作頸頭衝在伸兩手直向前令臂著頭對鼻所注處灸之各隨年壮千金翼云一名臂臑凡肉瘤勿治治則殺人慎之肘後方云不得針灸䧟腫散治二三十年癭瘤及骨瘤脂瘤石瘤肉瘤膿瘤血瘤或息肉大如杯杅升斗十年不瘥致有漏潰令人骨消肉盡或堅或輭或潰令人驚悸寤寐不安身體瘈縮愈而復發方烏賊骨石硫黄各一分白石英紫石英鍾乳各二分丹參三分琥珀附子胡鷰屎大黄乾薑各四分右十一味治下篩以韋囊盛勿泄氣若瘡濕即傅若瘡乾猪脂和傅日三四以乾為度若汁不盡者至五劑十劑止藥令人不痛若不消加芒硝二兩佳治癭瘤方昆布桂心逆流水桞鬚各一兩海藻乾薑各二兩羊靨七枚隂乾右六味爲末蜜丸如小彈子大含一丸咽津又方礬石芎藭當歸大黄黄連黄芩白斂芍藥各二分吳茱萸一分右九味治下篩雞子黄和塗故細布上隨瘤大小厚薄帖之乾則易著藥熟當作膿脂細細從孔中出頭探膿血盡著生肉膏若膿不盡復起如故生肉膏治癰瘤潰漏及金瘡百瘡方當歸附子甘草白芷芎藭各一兩薤白二兩生地黄三兩右七味㕮咀以猪脂三升半煎白芷黄去滓稍以𫝊之日三又方以狗屎􅖁雞子𫝊之去膿水如前方說𫝊生肉膏取瘥方見前二十二卷隂㿗第八論法灸論曰㿗有四腫有腸㿗卵脹氣㿗水㿗腸㿗卵脹難瘥氣㿗水㿗針灸易治治㿗圓方桃仁蜘咮各五十枚桂心蒺藜子地膚子澤㵼防風五味子橘皮茯苓防葵芍藥各二兩牡丹皮細辛海藻各一兩狐隂一具右十六味為末蜜和丸如梧子服十丸稍加至三十丸方角處一丸令頓上兩爪角各令半丸上爪指佳七壯愈隂㿗灸足大趾下理中十壮隨腫邊灸之肘後方云灸足大趾第二節下横文正中央五壯姚氏云足大趾本三壮男兒㿗先将兒至碓頭祝之曰坐汝令兒某甲隂囊㿗故灸汝三七二十一枚灸訖便牽小兒令雀頭下向著囊縫當隂頭灸縫上七壯即消已驗艾炷猬簮頭許大凡男㿗當騎碓軸以莖伸置軸上齊隂莖頭前灸軸木上隨年壯論曰有人自少至長隂下常有乾癬者宜依癬方主之有五勞七傷而得隂下癢濕搔之黄汁出者宜用補丸散主之仍須𫝊藥治之亦有患妬精瘡者以妬精方治之夫妬精瘡者男子在隂頭節下婦人在玉門内並似甘瘡作臼齊食之大痛甘即不痛也蒺藜子湯凡虚熱石熱當路門冷濕傷肌熱聚在裏變成熱及水病腫滿腹大氣急大小便不利腫如皮紙盛水晃晃如老􅅙色隂莖堅腫為瘡水出此皆腎熱虚損强取風隂濕傷脾胃故也治之法内宜依方服諸利小便藥外以此湯洗四肢竟以蔥白膏𫝊之别以猪蹄湯洗莖上蒺藜子湯方蒺藜子蔥心青皮赤小豆各一升蒴藋五升菘菜子三升巴豆一枚合皮殻右六味㕮咀以水二升煮取八升以淋洗腫處猪蹄湯治服石發熱因勞損熱盛當風露卧莖腫方猪蹄一隻蒺藜子一升碎葶藶子五合蒴藋三升黄蘗五兩地榆闕右六味㕮咀以水一斗五升煮取六升去滓適令煖便洗瘡日再或只煮黄蘗汁洗亦佳備急千金要方卷七十四
