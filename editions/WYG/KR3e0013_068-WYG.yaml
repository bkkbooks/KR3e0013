body:
  text: 備急千金要方卷六十八唐孫思邈撰宋林億等校正丁腫方瘭疽第六論方論曰瘭疽者肉中忽生㸃子如豆粒小者如黍粟極者如梅李或赤或黑㦯青或白其狀不定有根不浮腫痛傷之應心根深至肌經久便四面悉腫皰黯熟紫黑色能爛壞筋骨若毒散逐脉入臟殺人南人名為搨著毒厚肉處即割去之亦燒鐵烙之令焦如炭或灸百壯或飲葵根汁或飲藍青汁若犀角汁及升麻汁竹瀝黃龍湯等諸單方治專去其熱取瘥其病喜著十指故與代指相似人不識之呼作代指不急治之亦逐脉上入臟殺人南方人得之皆斬去其指初指頭先作黯皰後始腫赤黒黯瘮痛入心是也代指者先腫􅂒熱痛色不黯縁爪甲邉結膿劇者爪皆脱落此謂之代指病也但得一物冷藥汁搨漬之佳若熱盛服漏蘆湯及搨漬之𫝊升麻膏亦可針去血不妨洗漬塗膏也復有惡肉病者身上忽有肉如赤豆粒突出便長推出如牛馬乳上如雞冠狀不治自長出不止亦不痛癢此由春冬時受惡風入肌脉中變成此疾治之宜服漏蘆湯外燒鐵烙之日日為之令焦盡即以升麻膏𫝊上積日乃瘥又有赤脉病者身上忽有赤脉絡起隴聳如死蚯蚓之狀視之如有水在脉中長短皆逐脉所處此由春冬受惡風入絡脉中其血肉瘀所作也宜五香連翹湯及竹瀝等治之刺去其血仍𫝊丹參膏亦用白雞屎塗之良惡核病者肉中忽有核累累如梅李核小者如豆粒皮肉瘮痛壯熱􅂒索惡寒是也與諸瘡根瘰癧結筋相似其瘡根瘰癧因瘡而生是緩無毒惡核病卒然而起有毒若不治入腹煩悶殺人皆由冬月受温風至春夏有暴寒相搏氣結成此毒也但服五香湯主之又以小豆末𫝊之亦煮湯漬時時洗之消後以丹參膏𫝊之令餘核盡消凡惡核初似被射公毒無常定處多惻惻然痛或時不痛人不痛者便不憂不憂則救遲救遲即殺人是以宜早防之尤忌魚雞猪牛馬驢等肉其疾初如粟米或似麻子在肉裏而堅似皰長甚速初得多惡寒須㬰即短氣取吳茱萸五合作末水一升和之絞取汁頓服以滓𫝊上須㬰服此汁令毒散止即不入腹也入腹則致禍矣切慎之凡㾫病喜發四肢其狀赤脉起如編繩急痛壯熱其發於脚喜從腨起至踝亦如編繩故云㾫病也發於腎喜著腋之下皆由久勞熱氣盛為濕涼所折氣結筋中成此病也若不即治其久潰膿亦令人筋攣縮也若不消潰其熱氣不散多作􅀈病漏蘆湯主之瀉後鋒針數針去惡血氣針瀉其根核上𫝊小豆末取消為度又用治丹法治之亦用治癰三味甘草散𫝊之若潰𫝊膏散如癰法惡核㾫病瘭疽等多起嶺表中土尠有南方人所食雜類繁多感病亦復不一仕人徃彼深須預防防之無法必遭其毒惟須五香湯小豆散吳茱茰皆其要藥凡附骨疽者以其無破外臺作故附骨成膿故名附骨疽喜著大節觧中丈夫産婦喜著䏶中小兒亦著脊背大人急著者先覺痛不得動摇按之應骨痛經日便覺皮肉漸急洪腫如肥狀是也小兒纔手近便六腑呼即是肢節有痛候也大人緩著者先覺肌烘烘然經日便覺痛痺不隨小兒四肢不能動摇亦如不隨狀看肢節解中若有崩烘烘處不知是附骨疽令徧身成腫不至潰體皆有青黯大人亦有不别呼為賊風風腫不知是疽也凡人身體患熱當風取涼風入骨解中風熱相摶便成附骨疽其候嗜眠沈重忽忽耳鳴又秋夏露卧為冷所折風熱伏結而作此疾急者熱多風少緩者風多熱少小兒未知取風冷何故而有此疾由其血盛肌嫩為風折之即使凝結故也凡初得附骨疽即須急服漏蘆湯下之𫝊小豆散得消可服五香連翹湯方見癰疽條中凡賊風其人體卒無熱中暴風冷即骨解深痛不廢轉動按之應骨痛久即結痛或結瘰癧其附骨疽久即腫而結膿以此為異宜若治附骨作賊風則增益病深膿多若治賊風作附骨即加風冷遂成瘰癧偏枯攣曲之疾也療之之效皆在善始耳此非天下至精其孰能與於此若候附骨與賊風為異者附骨之始未腫但痛而已其賊風但痛不熱附骨則其上壯熱四體乍寒乍熱小便赤大便􅉣而無汗若得下却熱并開發腠理便得消也縱不消盡亦得浮淺近外凡賊風但夜痛骨不可按抑不得回轉痛處不壯熱亦不乍寒乍熱多覺身體索索然冷欲得熱熨痛處即小寛時復有汗出此為賊風證也宜針灸熨􅏼諸服治風藥即愈方見風條中又有風熱毒相搏為腫其狀先腫上生瘭漿如火灼處名曰風熱毒治之一如丹法又有洪燭瘡身上忽生瘭漿如沸湯灑劇者徧頭面亦有胷脇腰腹腫緩通體如火湯灼瘭起者是也治之法急服漏蘆湯下之外以升麻膏𫝊之其間𫝊升麻膏若無效一依𫝊丹方凡熱瘡起便生白膿黄爛瘡起即淺但出黄汁名肥瘡浸淫瘡者淺搔之曼延長不止搔癢者初如疥搔之轉生汁相連著是也瘑瘡者初作亦如肥瘡喜著手足常相對生隨月生死痛癢坼裂春夏秋冬隨瘥劇者是也有久癰餘瘡敗為深疽者在腨脛間喜生瘡中水惡露寒凍不瘥經年成骨疽亦名胻瘡深爛青黒四邉堅彊中央膿血汁出百藥不瘥汁潰好肉處皆虚腫亦有碎骨出者可温赤龍皮湯漬方見七十卷腸癰篇夏月日日洗冬月四日一洗青肉多可𫝊白䕡茹散食去惡肉可三日𫝊之止後長𫝊家猪屎散得瘥止取猪屎燒灰作末如粉致瘡中令滿白汁出吮去隨更𫝊之瘥止若更青肉復著白䕡茹散如前法家猪屎散取平復凡骨疽百療不瘥者可瘡上以次灸之三日三夜便瘥如瘡不瘥瘥而復發骨從孔中出者名為骨疽取先死烏雌雞一隻去肉取骨􅆈焦如炭取三家牛棓木刮取屑三家甑箄各一兩皆燒成炭合導瘡中碎骨當出數片瘥治瘭疽祕方射干甘草枳實升麻乾地黃黃芩各二兩麝香二分前胡三分犀角六分大黃十分右十味㕮咀以水九升煮取三升下大黄一沸去滓内麝分三服瘥止不限劑數此方世所不𫝊神良無比外臺無黄芩云翼深師加黄芩麻黄白薇枳實升麻松葉治瘭疽諸疽十指頭焮赤癢痛方千金翼名猪蹄湯白芷大黃芎藭黄芩黄連甘草細辛藁本當歸藜蘆莽草各一兩右十一味㕮咀以水二斗先煮猪蹄一具取一斗煮藥取五升浸瘡即瘥治瘭疽浸淫多汁日漸大方黄連二兩胡粉甘草䕡茹各二分右四味治下篩以粉瘡上日三四度治瘭疽著手足肩背累累如米起色白刮之汁出瘥後復發方黄耆六分升麻四分欵冬花二分附子苦參范注無赤小豆各一分右六味治下篩酒服方寸匕稍加日三服又方虎屎白者以馬屎和曝乾燒為灰粉之良又方青木香滑石龍骨各三兩胡粉一兩米粉一升右五味為末稍以粉病上日三又方竈屋塵竈突墨釡下土各一升右三味合研令匀以水一斗煮三沸取汁洗日三四度治瘭疽著手足肩背忽發累累如赤豆剥之汁出者方鯽魚長三寸者亂髮雞子大猪脂一升右三味煎為膏𫝊之又方􅆈蕪菁子𢷬碎帛褁展轉𫝊上良又方以麻子􅆈作末摩上良又方酒和麫𫝊之又方以猪膽𫝊之良又方剥去瘡痂温醋泔清洗之以胡燕窠和百日男兒屎如膏𫝊之又方亂髪灰服方寸匕日三亦治發背又方煮芸薹菜取汁一升服之并食乾熟芸薹數頓少與鹽醬冬月研子水和服之又方枸杞根并葵根葉煮汁煎令如糖隨意服之又方臘月糖晝夜連浸數日乃愈治疽潰後方以鹽湯洗拭了燒皂莢灰粉上良又方以牛耳中垢𫝊之良又方梁上塵和車􅤧中脂𫝊之又方以生麻油滓綿裹布瘡上蟲出又方以沸湯灌瘡中三四遍湯一作餳治疽似癰而小有異膿如小豆汁今日去明日滿者方右用芸薹熟𢷬濕布袋盛之埋熱灰中更互熨之不過再三度安瘥冬用乾者又方皂莢煎湯洗瘡拭乾以蘗皮為末𫝊之勿令作痂治疽卒著五指筋急不得屈伸者方右灸踝骨中央數十壯或至百壯治風疽方凡脚腨及曲䐐中癢搔則黄汁出是也灸法見後右以青竹筒一枚徑一寸半長三尺當中著大豆一升以糠馬屎二物燒為火當竹筒中燒之以器承兩頭取汁先以泔清和鹽熱洗瘡了即塗豆汁不過三度極效又方嚼胡麻𫝊以綿裹之日易神良治石疽狀如痤癤而皮厚方右𢷬榖子𫝊之亦治金瘡治久癰瘡敗壊成骨疽方右用末龍骨粉瘡四面厚二分以膏著瘡中日二易蟲出如髮盡愈膏方如左大蝦蟆一枚自死者亂髮一塊雞子大猪脂一斤右三味取一味内脂中煎略消盡下待冷更内鹽一合攪和充前用治瘡久不瘥瘥而復發骨從孔中出名為骨疽方以猪膽和楸葉𢷬封之又方𢷬白楊葉末𫝊之又方𢷬蕪菁子𫝊之帛褁日一易又方穿地作坑口小裏大深三尺取乾雞屎二升以艾及荆葉𢷬碎和雞屎令可燃火坑中燒之令煙出内疽於坑中熏之以衣擁坑口勿洩氣半日當有蟲出甚效治附骨疽方檞皮燒末飲服方寸匕又方新剥鼠皮如錢孔大貼腫上即膿出已潰者取猪脊上脂貼之又方灸間使後一寸隨年壯立瘥治久疽方右用鯽魚破腹勿損内白鹽於腹中以針縫之於銅器中火上煎令乾作末𫝊疽瘡中無膿者以猪脂和𫝊上小疼痛無怪也十日瘥苦瓠散治浸淫瘡方瘡表裏相當名浸淫瘡苦瓠一兩蜂房蛇蛻各半兩大豆半合梁上塵一合右五味治下篩以粉為粥和𫝊紙上貼之日三古今録無大豆又方以煎餅乘熱搨之亦治細癬又方猪牙車骨年久者槌破燒令脂出熱塗之又方取苦棟皮若枝燒作灰𫝊上乾者猪脂和塗之并治小兒禿瘡及諸惡瘡治瘑瘡方右用醋一升温令沸以生薤一把内中封瘡上瘥為度又方𢷬桃葉和鯉魚鮓糂封之亦可以鮓𫝊上又方炒臘月糖𫝊之又方燒故履系為末𫝊之又方燒松根取脂塗之治燥瘑方右用醋和灰塗之又方熱牛屎塗之治濕瘑方右燒乾蝦蟆猪脂和𫝊之治瘑病百療不瘥方楝實一升桃皮苦參地榆根各五兩右四味㕮咀以水一斗煮取五升稍温洗之日一度治久瘑疥濕瘡浸淫日廣癢不可堪搔之黄汁出瘥後復發方右用羊蹄根淨去土細切熟􅆈以醋和熟𢷬淨洗瘡𫝊上一時間以冷水洗之日一度又隂乾作末癢時搔則汁出以粉之又以生蔥根揩之千金翼無蔥字治一切瘑瘡凡脚腨及曲䐐中癢搔則黄汁出是名風疽右灸足大趾竒間二七壯又灸大趾頭亦佳治諸瘡因風致腫方右燒白芋灰温湯和厚三分𫝊瘡上乾即易五六度瘥又方櫟根皮三十斤剉以水三斛煮令熱下鹽一把令的的然熱以浸瘡當出膿血日日為之瘥止治惡露瘡方以𢷬薤菜𫝊瘡口以大艾炷灸藥上令熱入内即瘥治惡瘡方礬石松脂亂髮蠟各二分猪膏四兩右五味煎髮候消内礬石次内松脂次内蠟去滓先刮洗瘡令淨然後用藥塗之日再三不痛久瘡時愈新瘡遲愈瘑疥癢瘡頭秃皆即愈生髮勝飛黄膏又方燒萹竹灰和楮白汁塗之又方羊屎麻根燒煙斷膏和封上有汁者乾𫝊之又方麫一升作餅大小以覆瘡灸上令熱汁出盡瘥治惡瘡似火爛洗湯右用白馬屎曝乾以河水和煮十沸絞取汁洗之治惡瘡其大如錢名曰馬疥方右以水漬自死蛇一頭令爛去骨以汁塗之隨手瘥治惡瘡十年不瘥似癩者方右用蛇蛻皮一枚燒為末下篩猪脂和𫝊之醋和亦得又方苦瓠一枚㕮咀煮取汁洗之日三度又煎以塗癬甚良當先以泔淨洗乃塗三日瘥又方燒猳猪屎𫝊之又方鹽湯洗𢷬地黄葉貼之又方燒莨菪子為末𫝊之又方燒鯽魚灰和醬清𫝊之烏膏治惡瘡方雄黄雌黃芎藭升麻烏頭防己竹灰黄連黄蘗水銀各二兩胡粉一分蠟三兩杏仁三十枚巴豆二十枚松脂亂髮各一雞子大右十六味㕮咀以猪膏三升急煎令髮消去滓停小冷入真珠三錢匕攪令相得以𫝊之凡用膏先淨洗瘡拭乾乃𫝊上𫝊訖以赤石脂黄連散粉之千金翼無竹灰水銀蠟治種種諸瘡不愈者方水銀一兩黄連二兩京墨三分右三味治下篩以不中水猪膏和𫝊上不過再三度瘥神良若欲多作任人水銀大須熟研其藥惟不治金瘡治反花瘡并治積年諸瘡方右取牛蒡根熟𢷬和臘月猪脂封上瘥止并治久不瘥諸腫惡瘡漏瘡等皆瘥又方取馬齒菜𢷬封上瘥止又方取蜘蛛膜貼上數易之瘥止治身瘡及頭瘡不止方右取菖蒲為末𫝊上日三夜二治瘡久不瘥方蕪荑藜蘆各一兩薑黃青礬雄黃各一分苦參沙參各三分附子一枚右八味治下篩先以藍汁洗瘡去痂乾拭𫝊上小兒一炊久剥去之大人半日纔剥再𫝊不過三四度愈治諸瘡久不瘥并治六畜方右用􅀥膏三升水三斗煮取一斗半數洗取愈治代指方右用甘草二兩㕮咀水五升煮取一升半漬之若無用芒硝代又方以唾和白􅗠砂先捜麫作椀子盛唾次著􅗠砂如唾許以爪甲著中一日瘥又方以毛雜黃土作泥泥指上厚五分許内糖灰中煨之令熱可忍泥乾即易不過數度瘥又方刺指熱飯中二七遍又方以麻沸湯漬之即愈又方單煮地榆湯漬之半日又方取萎黄蔥葉煮沸漬之又方以蜀椒四合水一升煮三沸漬之又方先刺去膿血炙魚鮓皮令温以纒裹周匝痛止便愈治指痛欲脱方右用猪脂和鹽煮令消熱内指中一食久住千金翼和乾薑治手足指掣痛不可忍方右用醬清和蜜温塗之又方灸指端七壯立瘥治手足指逆臚方此縁厠上搔頭所致右還坐厠上以指到捋二七下即瘥又方青珠一分乾薑二分右二味𢷬以粉瘡上日三治手足皴裂逆臚代指方右酒搦猪􅏬洗之慎風冷治冬月冐渉凍凌面目手足皴瘃及始熱痛欲瘃者方右取麥窠煮令濃熱洗之治凍指瘃欲墮方右用馬屎三升以水煮令沸漬半日愈治手足皴劈破裂血出疼痛方右用猪脂著熱酒中洗之治手足皴痛方右用煮茄子根洗之又方芎藭三分蜀椒二分白芷防風鹽各一兩右五味㕮咀以水四升煎取濃塗之或猪脂煎更良治尸脚方凡人脚無冬夏常拆裂者是右用雞屎一升水二升煮數沸停水冷漬半日瘥止亦用馬屎忌踏酒吐及婦人穢血又方烊膠膠乾故帛貼方治割甲侵肉不瘥方右以􅗠砂礬石為末裹之以瘥為候又方𢷬鬼針草苗汁鼠黏草根和臘月猪脂𫝊之備急千金要方卷六十八
