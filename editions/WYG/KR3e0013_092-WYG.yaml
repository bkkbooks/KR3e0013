body:
  text: 備急千金要方卷九十二唐孫思邈撰宋林億等校正針灸四肢第十一手病掖門主手臂痛巨闕主手清肩貞主手髍小不舉隂交主手脚拘攣少商主手不仁列缺主手臂身熱大陵主手攣不伸又云主手掣小偏内闗主手中風熱間使主手痛曲澤主手青逆氣中衝勞宫少衝大泉經渠列缺主手掌熱肘中痛前掖主臂裏攣急手不上舉尺澤主掣痛手不可伸神門少海主手臂攣養老主手不得上下内庭主四厥手足悶腕骨中渚主五指掣不可屈伸曲池主手不可舉重腕急肘中痛難屈伸又云主手不舉陽谿主臂腕外側痛不舉心輸肝輸主筋急手相引臂肘病尺澤闗衝外闗竅隂主臂不及頭前谷後谿陽谿主臂重痛肘攣臑會支溝曲池腕骨肘窌主肘節痺臂酸重腋急痛肘難屈伸中􅡗輸譩譆主腋攣腕骨前谷曲池陽谷主臂腕急腕外側痛脱如㧞天井外闗曲池主臂痿不仁大泉經渠主臂内廉痛巨骨前谷主臂不舉肩窌天宗陽谷主臂痛曲池闗衝三里中渚陽谷尺澤主肘痛時寒又云闗衝主肘疼不能自帶衣魚際靈道主肘攣柱滿大陵主肘攣腋腫間使主肘内廉痛地五會陽輔申脉委陽天池臨泣主腋下腫肩背病氣舍主肩腫不得顧曲池天窌主肩重痛不舉天井主肩痛痿痺不仁不可屈伸肩肉髍木肩貞闗衝肩髃主肩中熱頭不可以顧巨骨主肩中痛不能動摇支溝闗衝主肩臂酸重清冷泉陽谷主肩不舉不得帶衣天宗主肩重臂痛肩外輸主肩甲痛而寒至肘曲垣主肩甲周痺後谿主肩臑痛腕骨主肩臂痛養老天柱主肩痛欲折涌泉主肩背頸項痛前腋主肩腋前痛與胷相引天牖缺盆神道大杼天突水道巨骨主肩背痛膈輸譩譆京門尺澤主肩背寒痓肩甲内廉痛列缺主背寒慄少氣不足以息寒厥交兩手而騖凡實則肩背熱背汗出四肢暴腫虚則肩寒慄氣不足以息腰脊病神道谷中腰輸長强大杼膈闗水分脾輸小腸輸膀胱輸主腰脊急强腰輸膀胱輸長强氣衝上窌下窌居髎主腰痛志室京門主腰痛脊急小腸輸中􅡗輸白環輸主腰脊疝痛次窌胞肓承筋主腰脊痛惡寒又云次窌主腰下至足不仁三里隂市陽輔蠡溝主腰痛不可以顧又云陽輔主腰痛如錘居中腫痛不可以欬欬則筋縮急諸節痛上下無常寒熱束骨飛揚承筋主腰痛如折申脉大衝陽蹻主腰痛不能舉崑崙主脊强背尻骨重合陽主腰脊痛引腹委中主腰痛俠脊至頭几几然凡腰脚重痛於此刺出血久痼宿疹亦皆立已大鍾主腰脊痛委陽殷門甲乙云腰痛得俛不得仰太白隂陵泉行間主腰痛不可俛仰扶承主腰脊尻臋股隂寒痛涌泉主腰脊相引如解甲乙云腰痛大便難隂谷主脊内㢘痛附分主背痛引頭膈闗秩邉京骨主背惡寒痛脊强難以俛仰京門甲乙云腰痛不可以久立石闗主脊痓反折脚病崑崙主脚如結踝如别隂陵泉主足痺痛京骨承山承筋商丘主脚攣又云承山承筋主脚脛酸脚急跟痛脚筋急痛兢兢浮白主足緩不收天柱行間主足不任身又云行間主厥足下熱然谷主足不能安脛酸不能久立中都主足下熱脛寒不能久立濕痺不能行衝陽三里僕參飛揚復留完骨主足痿失履不收又云僕參主足跟中踝後痛又云飛揚主腨中痛又云復留主脛寒不能自温主脚後㢘急不可前脚足跗上痛京骨然谷腎輸主足痛大谿次窌膀胱輸主足清不仁又云大谿主手足寒至節地倉大泉主足踒躃不能行光明主痿躄坐不能起風府腰輸主足不仁條口三里承山承筋主足下熱不能久立丘墟主腕不收坐不得起髀樞脚痛陽輔陽交陽陵泉主髀樞膝骨痺不仁環銚束骨交信隂交隂舍主髀樞中痛不可舉臨泣三隂交主髀中痛不得行足外皮痛申脉隱白行間主脛中寒熱大衝涌泉主脛酸付陽主腨外廉骨痛至隂主風寒從足小指起脉痺上下至陽主脛疼四肢重少氣難言厲兊條口三隂交主脛寒不得卧内庭環銚主脛痛不可屈伸陽間環銚承筋主脛痺不仁涌泉然谷主五趾盡痛足不踐地凡髀樞中痛不可舉以毫針寒而留之以月生死為息數立已膝病風市主兩膝攣痛引脇拘急軃躄或青或焦或枯或黧如腐木木大衝主膝内踝前痛梁丘曲泉陽闗主筋攣膝不得屈伸不可以行犢鼻主膝中痛不仁又云主膝不仁難跪中封主少氣身重濕膝腫内踝前痛解谿條口丘墟太白主膝股腫胻酸轉筋合陽主膝股重上㢘主風水膝腫隂市主膝上伏兔中寒俠谿陽闗主膝外㢘痛髀闗主膝寒不仁痿痺不得屈伸光明主膝痛脛熱不能行手足偏小膝闗主膝内㢘痛引臏不可屈伸連腹引喉咽痛凡犢鼻腫可灸不可刺若其上堅勿攻攻之即死四肢病章門主四肢懈惰喜怒列缺主四肢厥喜笑曲泉付陽天池大巨支溝小海絶骨前谷主四肢不舉照海主四肢淫濼五里三陽胳天井厲兊三間主嗜卧四肢不欲動摇復留豐隆大都主風逆四肢腫風痺第十二風病率谷主醉酒風熱發兩目眩痛甲乙云不能飲食煩滿嘔吐完骨主風頭耳後痛煩心甲乙云及足不收失履口喎僻頭項摇揳痛牙車急天柱主風眩絶骨主風勞身重天府曲池列缺百會主惡風邪氣泣出喜忘陽谷主風眩驚手捲泄風汗出腰項急甲乙手捲作手腕痛隂蹻主風暴不知人偏枯不能行解谿主風從頭至足面目赤俠谿主胷中寒如風狀頭眩兩頰痛崑崙主狂易大風臨泣主大風目痛甲乙云目外眥痛付陽主痿厥風頭重痛涌泉主風入腹中巨闕照海主瘈瘲引臍腹短氣又云照海主大風黙黙不知所痛視如見星内闗主手中風熱間使主頭身風熱商陽主耳中風生闗衝主面黒渴風天井神道心輸主悲愁恍惚悲傷不樂又云天井主大風黙黙不知所痛悲傷不樂命門主瘈瘲裏急腰腹相引後谿主風身寒掖門主風寒熱上闗主瘈瘲沫出寒熱痓引骨痛中􅡗輸長强腎輸主寒熱反折脾輸膀胱輸主熱痓引骨痛肝輸主筋寒熱痓筋急手相引通理主不能言魚際主痓上氣失瘖不能言濕痺曲池列缺主身濕摇時時寒風市主緩縱痿痺腨腸疼冷不仁中瀆主寒氣在分肉間痛苦痺不仁陽闗主膝外㢘痛不可屈伸脛痺不仁懸鍾主濕痺流腫髀筋急瘈脛痛豐隆主身熱曲泉主卒痺病引臏下節陽陵泉主髀痺引膝股外㢘痛不仁筋急絶骨主髀樞痛膝脛骨摇酸痺不仁筋縮諸節酸折漏谷主久濕痺不能行商丘主骨痺煩滿中封主痿厥身體不仁少氣身濕重臨泣主身痺洗淅振寒凡身體不仁先取京骨後取中封絶骨皆瀉之癲癎偏厯神庭攅竹本神聽宮上星百會聽會築賔陽谿後頂强間腦戸胳却玉枕主癲疾嘔逆又云偏厯主癲疾多言耳鳴口僻攅竹小海後頂强間主癎發瘈瘲狂走不得卧心中煩金門僕參主癲疾馬癎兊端齗交承漿大迎絲竹空悤會天柱商丘主癲疾嘔沫寒熱痙互引又云承漿大迎主寒熱㨗厥鼔頷癲痓口噤又云天柱主卒暴癎眩商丘主癎瘈上闗主瘈瘲沫出寒熱痓絲竹空通谷主風癎癲疾涎沫狂煩滿又云通谷主心中憒憒數欠癲心下悸咽中澹澹恐解谿陽蹻主癲疾腦戸聽會風府聽宫翳風主骨痠眩狂瘈瘲口噤喉鳴沫出瘖不能言臑會申脉主癲疾腠氣五處身柱委中委陽崑崙主脊强反折瘈瘲癲疾頭痛又云身柱主癲疾瘈瘲怒欲殺人身熱强走讇言見鬼崑崙主癎瘈口閉不得開尺澤然谷主癲疾手臂不得上頭列缺主熱癎驚而有所見曲池少澤主瘈瘲癲疾飛揚太乙滑肉門主癲疾狂吐舌長强主癲疾發如狂面皮敦敦者不治温留僕參主癲疾吐舌鼓頷狂言見鬼筋縮曲骨隂谷行間主驚癎狂走癲疾間使主善悲驚狂面赤目黃瘖不能言陽谿天井主驚瘈完骨主癲疾僵仆狂瘧天井小海主癲疾羊癎吐舌羊鳴戾頸懸釐束骨主癲疾互引善驚羊鳴天衝主頭痛癲疾互引數驚悸風池聽會復留主寒熱癲仆風府崑崙束骨主狂易多言不休腦空束骨主癲疾大瘦頭痛風府肺輸主狂走欲自殺胳却聽會身柱主狂走瘈天柱臨泣主狂易多言不休目上反支正魚際合谷少海曲池腕骨主狂言驚恐温留掖門京骨主狂仆又云掖門主喜驚妄言面赤神門陽谷主笑若狂又云神門主數噫恐悸不足陽谿陽谷主吐舌戾頸妄言巨闕築賔主狂易妄言怒罵又云巨闕主驚悸少氣衝陽豐隆主狂妄行登高而歌棄衣而走下㢘丘墟主狂言非常隂蹻主卧驚視如見鬼勞宫太陵主風熱善怒心中悲喜思慕歔欷喜笑不止曲澤太陵主心下澹澹喜驚甲乙作内闗隂交氣海大巨主驚不得卧又云大巨主善驚大鍾郄門主驚恐畏人神氣不足然谷陽陵泉主心中怵愓恐如人將捕之解谿主瘈瘲而驚少衝主大息煩滿少氣悲驚少府主數噫恐悸氣不足行間主心痛數驚心悲不樂三間合谷厲兊主吐舌戾頸喜驚又云厲兊主多卧好騖通里主心下悸手少隂隂郄主氣驚心痛後谿主泣出而驚腕骨主煩滿驚卒尸厥隱白大敦主卒尸厥不知人脉動如故中極僕參主恍惚尸厥煩痛金門主尸厥暴死内庭主四厥手足悶者久持之厥熱腦痛腹脹皮痛者使人久持之邪客於手足少隂太隂足陽明之絡此五絡者皆會於耳中上絡左角五絡俱竭令人身脉動如故其形無所知其狀若尸刺足大趾内側爪甲上去端如韭葉後刺足心後取足中趾爪甲上各一痏後取手大指之内去爪甲如韭葉後刺手心主少隂兊骨之端各一痏立已不已以筒吹其兩耳立已不已拔其左角髮方寸燔治飲以醇酒一杯不能飲者灌之立已卒中惡百㑹玉枕主卒起僵仆惡見風寒通天胳却主暫起僵仆大杼主僵仆不能久立煩滿裏急身不安席飛屍遁注天府主卒中惡風邪氣飛尸惡注鬼語遁尸豐隆主厥逆足卒青痛如刺腹若刀切之狀大便難煩心狂見鬼好笑面四肢卒腫旁廷在腋下四肋間髙下正與乳相當乳後二寸陷中俗名注市舉掖取之刺入五分灸五十壯主卒中惡飛尸遁注胷脇滿九曲中府在旁廷注市下三寸刺入五分灸三十壯主惡風邪氣遁尸内有瘀血備急千金要方卷九十二
