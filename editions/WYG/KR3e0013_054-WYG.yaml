body:
  text: 備急千金要方卷五十四唐孫思邈撰宋林億等校正肺臓方肺臓脉論第一論曰肺主魄魄蔵者任物之精也爲上将軍使在上行所以肺為五臓之華蓋並精岀入謂之魄魄者肺之蔵也鼻者肺之官肺氣通於鼻鼻和則能知香臭矣循環紫宫上出於頰候於鼻下廻肺中榮華於髪外主氣内主胸與乳相當左乳庚右乳辛肺重三斤三兩六葉兩耳凡八葉有十四童子七女子守之神名鴻鴻主蔵魄號為魄蔵隨節應㑹故云肺蔵氣氣舍魄在氣為欬在液為涕肺氣虚則鼻息利少氣實則喘喝胸憑仰息肺氣虚則夢見白物見人斬血藉藉得其時則夢見兵戰氣盛則夢恐懼哭泣厥氣客於肺則夢飛揚見金鐵之器及竒物凡肺蔵象金與大腸合為腑其經手太隂與陽明為表裏其脉浮相於季夏王於秋秋時萬物之所終宿葉落柯萋萋枝條杌然獨在其脉為㣲浮衛氣遲榮氣數數則在上遲則在下故名曰毛陽當陷而不陷隂當昇而不昇為邪所中二氣感激故為風寒所中陽中邪則捲隂中邪則緊捲則惡寒緊則為慄寒慄相摶故名曰瘧弱則發熱浮乃來出旦中旦發暮中暮發藏有遠近脉有遲疾周有度數行有漏刻遲在上傷毛采數在下傷下焦中焦有惡則見有善則匿陽氣下陷隂氣則温陽反在下隂反在巔故名曰長而且留秋脉如浮秋脉肺也西方金也萬物之所以収成也故其氣來輕虚而浮來急去散故曰浮反此者病何如而反其氣來毛而中央堅兩傍虚此謂太過病在外其氣來毛而㣲此謂不及病在中太過則令人氣逆而背痛愠愠然不及則令人喘呼吸少氣而欬上氣見血下聞病音肺脉來厭厭聶聶如落榆莢曰肺平秋以胃氣為本肺脉來不上不下如循雞羽曰肺病巢源無不字肺脉來如物之浮如風吹毛曰肺死真肺脉至大而虚如以毛羽中人膚色白赤不澤毛折乃死秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死毛而有弦曰春病弦甚曰今病肺蔵氣氣舍魄喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死于夏手太隂氣絶則皮毛焦太隂者行氣温皮毛者也氣弗營則皮毛焦皮毛焦則津液去津液去則皮節傷皮節傷者則爪一作皮枯毛折毛折者則氣先死丙篤丁死火勝金也肺死蔵浮之虚按之弱如蔥葉下無根者死秋金肺王其脉微澀而短曰平反得大而緩者是脾之乗肺母之歸子為虚邪雖病昜治反得沉濡而滑者是腎之乗肺子之乗母為實邪雖病自愈反得浮大而洪者是心之乗肺火之尅金為賊邪大逆十死不治反得弦細而長者是肝之乗肺木之陵金為微邪雖病即瘥肝乗肺必作虚右手關前寸口隂絶者無肺脉也若短氣欬逆喉中塞噫逆刺手陽明治陽右手關前寸口隂實者肺實也若少氣胸中滿膨膨與肩相引刺手太隂治隂肺脉來泛泛輕如微風吹鳥背上毛再至曰平三至曰惟經病四至脱精五至死六至命盡手太隂脉也肺脉急甚為癲疾微急為肺寒熱怠惰欬唾血引腰背胸若鼻息肉不通緩甚為多汗微緩為痿漏風一作偏風頭已下汗出不可止大甚為脛腫微大為肺痺引胸背起腰内小甚為飱泄微小為消癉滑甚為息賁上氣微滑為上下出血濇甚為嘔血微濇為鼠瘻在頸肢腋之間下不勝其上其能喜酸肺脉摶堅而長當病唾血其濡而散者當病漏一作灌汗至今不復發散白脉之至也喘而浮上虚下實驚有積氣在胸中喘而虚名曰肺痺寒熱得之醉而使内也黄帝問曰經脉十二而手太隂之脉獨動不休何也手太隂本在寸口中岐伯對曰足陽明胃脉也胃者五臓六腑之海胃脉在足趺上大趾間上行三寸骨解中是也其精氣上清注於肺肺氣從太隂而行之其行之也以息徃來故人一呼脉再動一吸脉亦再動呼吸不已脉動不止黄帝問曰氣口何以獨為五臟主岐伯曰胃者水榖之海六腑胃居其大五味入於口藏於胃以養五臟氣氣口者太隂是也臓腑之氣味皆出於胃變見於氣口氣口屬腑蔵主即呼寸口者也扁鵲曰肺有病則鼻口張實熱則喘逆胸憑仰息其陽氣壮則夢恐懼等虚寒則欬息下利少氣其隂氣壮則夢渉水等肺在聲為哭在變動為欬在志為憂憂傷肺精氣并於肺則悲也味主秋結滿而血者病在胸及以飲食不節得病者取之合故命曰味主合病先發於肺喘欬三日之肝脇痛支滿一日之脾閉塞不通身痛體重五日之胃腹脹十日不已死冬日入夏日出病在肺下晡慧日中甚夜半静假令肺病南行若食馬肉及麞肉得之不者當以夏時發得病以丙丁日也宜赤藥凡肺病之状必喘欬逆氣肩息背痛汗出尻隂股膝攣髀腨胻足皆痛虚則少氣不能報息耳聾嗌乾取其經手太隂足太陽之外厥隂内少隂血者肺脉沉之而數浮之而喘苦洗洗寒熱腹滿腸中熱小便赤肩背痛從腰已上汗出得之房内汗出當風肺病其色白身體但寒無熱時時欬其脉微遲為可治宜服五味子大補肺湯㵼肺散春當刺少商夏刺魚際皆㵼之季夏刺大淵秋刺經渠冬刺尺澤皆補之又當灸膻中百壮背第三椎二十五壮邪在肺則皮膚痛發寒壮上氣氣喘汗出欬動肩背取之膺中外輸背第三椎之傍以手痛按之快然乃刺之取之缺盆中以越之形寒寒飲則傷肺以其兩寒相感中外皆傷故氣逆而上行肺傷其人勞倦則欬唾血其肺細緊浮數皆吐血此為躁擾嗔怒得之肺傷氣擁所致也肺中風者口燥而喘身運而重冐而腫脹肺中寒者其人吐濁涕肺水者其人身體腫而小便難時時而大便鴨溏肺脹者虚而滿喘欬目如脱状其脉浮大趺陽脉浮緩少陽脉微緊微為血虚緊為微寒此為䑕乳診得肺積脉浮而毛按之辟易脇下時時痛逆背相引痛少氣善忘目瞑結癰皮膚寒秋愈夏劇主皮中時痛如蝨緣之状甚者如針刺之状時癢色白也肺之積名曰息賁在右脇下覆大如杯久久不愈病灑灑寒熱氣逆喘欬發肺癰以春甲乙日得之何也心病傳肺肺當傳肝肝適以春王王者不受邪肺復欲還心心不肯受因留結為積故知息賁以春得之肺病身當有熱欬嗽短氣唾出膿血其脉當短濇今反浮大其色當白而反赤者此是火之尅金為大逆十死不治商音人者主肺聲也肺聲哭其音磬其志樂其經手太隂厥逆陽明則榮衛不通隂陽反祚陽氣内擊隂氣外傷傷則寒寒則虚虚則厲風所中嘘吸戰掉語聲嘶塞而散下氣息短憊四肢僻弱面色青葩遺失便利甚則不可治依源麻黄續命湯主之方見第八卷中又言音喘急短氣好唾此為火尅金陽擊隂隂氣沉陽氣昇昇則實實則熱熱則狂狂則閉眼悸言非常所説口赤而張飲無時度此熱傷肺肺化為血不治若面赤而鼻不欹可治也肺病為瘧者令人心寒寒甚則熱熱間善驚如有所見者恒山湯主之方見第十卷中若其人本來語聲雄烈忽爾不亮拖氣用力方得出言而反於常人呼共語直視不應雖曰未病勢當不久此則肺病聲之候也察觀疾病表裏相應依源審治乃不失也白為肺肺合皮白如豕膏者吉肺主鼻鼻是肺之餘其人金形相比於上商白色小頭方面小肩背小腹小手足發動身輕精亷急心静悍性喜為吏耐秋冬不耐春夏春夏感而生病主手太隂亷亷然肩膺厚薄正竦則肺應之正白色小理者則肺小小則少飲不病喘喝粗理者則肺大大則虚虚則寒喘鳴多飲善病胸喉痺逆氣巨肩反膺陷喉者則肺髙高則實實則熱上氣肩息欬逆合腋張脇者則肺下下則逼賁迫肝善脇下痛鼻塞或壅而涕生息肉好肩背厚者則肺堅堅則不病欬上氣肩背薄者則肺脆脆則易傷於熱喘息鼻衂肩膺好者則肺端正端正則和利難傷膺偏欹者則肺偏傾偏傾則病胸偏痛鼻亦偏疾凡人分部陷起者必有病生大腸陽明為肺之部而藏氣通於内外部亦隨而應之沉濁為内浮清為外若外病内入則所部起内病裏出則所部陷外入前治陽後治隂内出前治隂後治陽實㵼虚補陽主外隂主内凡人死生休否則蔵神前變形于外人肺前病鼻則為之孔開焦枯若肺前死鼻則為之梁折孔閉青黒色若天中等分墓色應之必死不治看色深淺斟酌賖促逺不出一年促不延時月肺疾少愈而卒死何以知之曰赤色黒如拇指黶㸃見顔頰上此必卒死肺絶三日死何以知之口張但氣出而不還面白目青是謂亂經飲酒當風風入肺經膽氣妄泄目則為青雖有天救不可復生面黄目白如枯骨死吉凶之色在於分部順順而見赤白入鼻必病不出其年若年間不應三年之中禍必應也秋金肺脉色白主手太隂脉也秋取經輸秋者金始治肺将収殺金将勝火陽氣在合隂氣初勝濕氣及體隂氣未盛未能深入故取輸以㵼隂邪取合以虚陽邪陽氣始衰故取於合其脉本在寸口之中掌後兩筋間二寸中應在腋下動脉其脉根於太倉太倉在臍上三寸一分是也其筋起於手大指之上循指上行結於魚後行寸口外側上循臂結肘中上臑内亷入腋下上出缺盆結肩髃前上結缺盆下結胸裏散貫賁下抵季脇其脉起於中焦下絡大腸還循胃口上膈屬肺從肺系横出腋下下循臑内行少隂心主之前下肘中後循臂内上骨下亷入寸口上魚循魚際岀大指之端其支者從腕後直次指内亷出其端合手陽明為表裏陽明之本在肘骨中同㑹于手太隂太隂之别名列缺起於腋下分間並太隂之經直入掌中散入於魚際别走手陽明主肺生病病實則大腸熱熱則手兊掌起起則陽病陽脉反逆大於寸口三倍病則欬上氣喘渴煩心胸滿臑臂内前亷痛掌中熱氣盛有餘則肩背痛風汗出中風虚則大腸寒寒則欠欬小便遺數數則隂病隂脉反小於寸口一倍病則肩背寒痛少氣不足以息季脇空痛尿色變卒遺失無度秋三月者主肺大腸白氣狸病也其源從太陽擊手太隂太隂受淫邪之氣則經絡壅滯毛皮緊腎發泄邪生則臓腑傷温隨秋受癘其病相反若腑虚則為隂邪所傷乍寒乍熱損肺傷氣暴嗽嘔逆若臓實則為陽毒所損體熱生斑氣喘引飲故曰白氣狸病也扁鵲云灸心肺二輸主治丹毒白狸病當依源為療調其陽理其隂則臓腑之病不生矣肺虚實第二脉法方灸肺實熱右手寸口氣口以前脉隂實者手太隂經也病苦肺脹汗出若露上氣喘逆咽中塞如欲嘔状名曰肺實熱也治肺實熱胸憑仰息泄氣除熱方石膏八兩白前杏仁各三兩橘皮白术各五兩赤蜜七合枸杞根皮切二升右七味㕮咀以水七升煮取二升去滓下蜜煮三沸分三服治肺熱言音喘息短氣好唾膿血方生地黄切二升石膏八兩麻黄五兩杏仁四兩升麻羚羊角芒硝各三兩赤蜜一升淡竹茹雞子大一枚右九味㕮咀以水七升煮取二升去滓下蜜煮兩沸分三服治肺熱悶不止胸中喘急驚悸客熱來去欲死不堪服藥泄胸中喘氣方桃皮芫花各一升右二味㕮咀以水四斗煮取一斗五升去滓以故布手巾内汁中薄胸温四肢不盈數日即歇橘皮湯治肺熱氣上欬息奔喘方橘皮麻黄各三兩柴胡乾紫蘓刪繁作乾藍各二兩宿薑杏仁各四兩石膏八兩右七味㕮咀以水九升煮麻黄兩沸去沫下諸藥煮取三升去滓分三服不瘥與兩劑治肺熱喘息鼻衂血方羚羊角𤣥參射干雞蘓芍藥升麻柏皮各三兩淡竹茹雞子一枚生地黄切一升梔子仁四兩右十味㕮咀以水九升煮取三升分三服須利者下芒硝三兩更煮三沸治肺熱飲酒當風風入肺膽氣妄泄目青氣喘方麻黄四兩甘草五味子各三兩杏仁五十枚母薑五兩淡竹葉切一升右六味㕮咀以水七升先煮麻黄去沫下諸藥煮取三升去滓分三服㵼肺散治酒客勞倦或出當風喜怒氣舍於肺面目黄腫起即頭眩欬逆上氣時忽忽欲絶心下弦急不能飲食或吐膿血胸痛引背支滿欲嘔方五味子百部各二兩半茯苓附子蓯蓉當歸石斛逺志續斷各一兩細辛甘草各七分防風蜀椒紫菀桂心欵冬花乾薑各一兩半桃仁六十枚杏仁三十枚右十九味治下篩以酒服方寸匕日三後稍加至二匕灸法肺脹氣搶脇下熱痛灸隂都隨年壮穴在俠胃管兩邊相去一寸胃管在心下三寸肺脹脇滿嘔吐上氣等病灸大椎并兩乳上第三肋間各止七壮肺與大腸俱實右手寸口氣口以前脉隂陽俱實者手太隂與陽明經俱實也病苦頭痛目眩驚狂喉痺痛手臂捲脣吻不収名曰肺與大腸俱實也治肺與大腸俱實令人氣憑滿煮散方茯苓麻黄各六分黄耆大青桂心各三分細辛杏仁各五分石膏二兩丹參半兩五味子甘草貝母橘皮芎藭各一兩枳實三枚右十五味治下篩為粗散帛裹一方寸匕半井花水一升五合煮取七合為一服日再肺虚冷右手寸口氣口以前脉隂虚者手太隂經也病苦少氣不足以息嗌乾不津液名曰肺虚冷也治肺虚冷聲嘶傷語言用力戰掉緩弱虚瘠風入肺方防風獨活芎藭秦椒乾薑黄耆各四十二銖天雄麻黄五味子山茱茰甘草各三十六銖秦芁桂心薯蕷杜仲人參細辛防己各三十銖甘菊花紫菀各二十四銖貫衆二枚附子七分右二十二味治下篩以酒服方寸匕日二一方有石膏六分當歸五分酥蜜膏酒治肺虚寒癘風所傷語氣嘶塞聲息喘憊欬唾止氣嗽通聲方酥崖蜜飴糖生薑汁生百部汁􅀥肉杏仁各一升研甘皮五具末右八味合和微火煎常攪二上三下約一炊久取薑汁等各減半止温酒一升服方寸匕細細咽之日二夜一又方豬􅏬三具大􅀥百枚右二味以酒五升漬之秋冬七日春夏五日出布絞去滓七日服盡二七日忌鹽羊􅏬亦得治欬嗽胸脇支滿多喘上氣尤良肘後方治久欬上氣二十年諸治不痊者治肺寒損傷氣嗽及涕唾鼻塞方棗肉二升研作脂杏仁一升􅆈研為脂酥生薑汁白糖白蜜生百部汁各一升右七味合和微火煎常攪約一炊久下之細細温清酒服二合日二補肺湯治肺氣不足逆滿上氣咽中悶塞短氣寒從背起口中如含霜雪言語失聲甚者吐血方五味子三兩乾薑桂心欵冬花各二兩麥門冬一升大􅀥一百枚粳米二合桑根白皮一斤右八味㕮咀以水一斗先煮桑白皮五沸下藥煮取三升分三服又方黄耆五兩甘草鍾乳人參各二兩乾地黄桂心茯苓白石英桑白皮厚朴乾薑紫菀橘皮當歸五味子逺志麥門冬各三兩大􅀥二十枚右十八味㕮咀以水一斗四升煮取四升分五服日三夜二又方治肺氣不足欬逆上氣牽䋲而坐吐沫唾血不能飲食方蘓子一升桑白皮五兩半夏六兩紫菀人參甘草五味子杏仁各二兩欵冬花射干各一兩麻黄乾薑桂心各三兩細辛一兩半右十四味㕮咀以水一斗二升煮取三升半分五服日三夜二又方治肺氣不足欬逆短氣寒從背起口中如含霜雪語無音聲而渴舌本乾燥方五味子蘓子各一升白石英鍾乳各三兩欵冬花竹葉橘皮桂心桑白皮茯苓紫菀各二兩粳米二合麥門冬四兩生薑五兩杏仁五十枚大棗十枚右十六味㕮咀以水一斗三升先煮桑白皮粳米大􅀥米熟去滓内諸藥煮取五升分六服日三又方治肺氣不足心腹支滿欬嗽喘逆上氣唾膿血胸背痛手足煩熱愓然自驚皮毛起或哭或歌或怒乾嘔心煩耳中聞風雨聲面色白方欵冬花桂心各二兩桑白皮一斤生薑五味子鍾乳各三兩粳米五合大􅀥十枚麥門冬四兩右九味㕮咀以水一斗二升先煮粳米􅀥令熟去之内藥煎取二升分三服温服之一方用白石英二兩廣濟用紫菀人參各二兩名紫菀湯麻子湯治肺氣不足欬唾膿血氣短不得臥方麻子一升桑白皮􅄳各一斤桂心人參各二兩阿膠紫菀各一兩生薑三兩乾地黄四兩右九味㕮咀以酒一斗五升水一斗五升合煮取四升分五服餳煎治肺氣不足咽喉苦乾方作􅄳任多少取乾􅀥一升去核熟𢷬水五升和使相得絞去滓澄去上清取濁者内飴中攪火上煎勿令堅令連連服如雞子大漸漸吞之日三夜二治肺風氣痿絶四肢滿脹喘逆胸滿方灸肺輸各二壮肺輸對乳引䋲度之在第三椎下兩傍相去各一寸五分肺與大腸俱虚右手寸口氣口以前脉隂陽俱虚者手太隂與陽明經俱虚也病苦耳鳴嘈嘈時妄見光明情中不樂或如恐怖名曰肺與大腸俱虚也小建中湯治肺與大腸俱不足虚寒乏氣小腹拘急腰痛羸瘠百病方大棗十二枚生薑桂心各三兩甘草二兩芍藥六兩右五味㕮咀以水八升煮取三升去滓内糖八兩煮三沸分三服肘後用黄耆人參各二兩名黄耆建中湯肺勞第三論法方灸論曰凡肺勞病者補腎氣以益之腎王則感於肺矣人逆秋氣則手太隂不収肺氣焦滿順之則生逆之則死順之則治逆之則亂反順為逆是謂關格病則生矣麻黄引氣湯治肺勞氣喘鼻張面目苦腫方麻黄杏仁生薑半夏各五分紫蘓四分白前細辛桂心各三分橘皮二分石膏八兩竹葉切一升右十一味㕮咀以水一斗煮取三升去滓分三服半夏湯治肺勞虚寒心腹冷氣逆遊氣胸脇氣滿從胸達背痛憂氣徃來嘔逆飲食即吐虚乏不足方半夏一升生薑一斤桂心四兩甘草厚朴各二兩人參橘皮麥門冬各三兩右八味㕮咀以水一斗煮取四升分四服腹痛加當歸二兩厚朴湯治肺勞風虚冷痰澼水氣晝夜不得臥頭不得近枕上氣胸滿喘息氣絶此痰水盛溢方厚朴麻黄桂心黄芩石膏大㦸橘皮各二兩枳實甘草秦芁杏仁茯苓各三兩細辛一兩半夏一升生薑一兩大􅀥十五枚右十六味㕮咀以水一斗三升煮取四升分五服治喉痺氣逆欬嗽口中涎唾方灸肺輸七壮亦可隨年壮至百壮備急千金要方卷五十四
