body:
  text: 備急千金要方卷七十九唐孫思邈撰宋林億等校正食治序論第一仲景曰人體平和惟須好將飬勿妄服藥藥勢偏有所助令人藏氣不平易受外患夫含氣之類未有不資食以存生而不知食之有成敗百姓日用而不知水火至近而難識余慨其如此聊因筆墨之暇撰五味損益食治篇以啓童稚庶勤而行之有如影響耳河東衛汎記曰扁鵲云人之所依者形也亂於和氣者病也理於煩毒者藥也濟命扶危者醫也安身之夲必資於食救疾之速必憑於藥不知食宜者不足以存生也不明藥忌者不能以除病也此之二事有靈之所要也若忽而不學誠可悲夫是故食能排邪而安臟腑悦神爽志以資血氣若能用食平痾釋情遣疾者可謂良工長年餌老之竒法極飬生之術也夫爲醫者當須先洞曉病源知其所犯以食治之食療不愈然後命藥藥性剛烈猶若御兵兵之猛暴豈容妄發發用乖宜損傷䖏衆藥之投疾殃濫亦然高平王熈稱食不欲雜雜則或有所犯有所犯者或有所傷或當時雖無災苦積久爲人作患又食噉鮭肴務令簡少魚肉果實取益人者而食之凡常飲食每令節儉若貪味多餐臨盤大飽食訖覺腹中彭亨短氣或致暴疾仍爲霍亂又夏至以後迄至秋分必須愼肥膩餅臛酥油之屬此物與酒漿𤓰果理極相妨夫在身所以多疾者皆因春夏取冷大過飲食不節故也又魚膾諸腥冷之物多損於人斷之益善乳酪酥等常食之令人有筋力膽幹肌體潤澤卒多食之亦令臚脹泄利漸漸自己黄帝曰五味入於口也各有所走各有所病酸走筋多食酸令人􅜡不知何以然少俞曰酸入胃也其氣濇以收也上走兩焦兩焦之氣濇不能出入不出即流於胃中胃中和温即下注膀胱膀胱走胞胞薄以耎得酸則縮卷約而不通水道不利故􅜡也隂者積一作精筋之所終聚也故酸入胃走於筋也鹹走血多食鹹令人渇何也答曰鹹入胃也其氣走中膲注於諸脉脉者血之所走也與鹹相得即血凝凝則胃中汁泣汁泣則胃中乾渴甲乙云凝則胃中汁注之注之則胃中竭渇則咽路焦焦故舌乾喜渇血脉者中膲之道也故鹹入胃走於血皇甫士安云腎合三焦之脉雖屬肝心而爲中焦之道故鹹入而走血也辛走氣多食辛令人愠心何也答曰辛入胃也其氣走於上膲上膲者受使諸氣而榮諸陽者也薑韭之氣熏至榮衛榮衛不時受之却溜於心下故愠愠痛也辛味與氣俱行故辛入胃而走氣與氣俱出故氣盛也苦走骨多食苦令人變嘔何也答曰苦入胃也其氣燥而涌泄五榖之氣皆不勝苦苦入下管下管者三膲之道皆閉則不通不通故氣變嘔也齒者骨之所終也故苦入胃而走骨入而復出齒必黧踈皇甫士安云水火相濟故骨氣通於心甘走肉多食甘令人惡心何也答曰甘入胃也其氣弱劣不能上進於上膲而與榖俱留於胃中甘入則柔緩柔緩則蚘動蚘動則令人惡心其氣外通於肉故甘走肉則肉多粟起而胝皇甫士安云其氣外通於皮故曰甘入走皮矣皮者肉之蓋皮雖屬肺與肉連體故甘潤肌肉并於皮也黄帝問曰榖之五味所主可得聞乎伯高對曰夫食風者則有靈而輕舉食氣者則和静而延夀食榖者則有智而勞神食草者則愚癡而多力食肉者則勇猛而多嗔是以肝木青色宜酸心火赤色宜苦脾土黄色宜甘肺金白色宜辛腎水黒色宜鹹内爲五臟外主五行色配五方五臟所合法肝合筋其榮爪心合脉其榮色脾合肉其榮脣肺合皮其榮毛腎合骨其榮髪五臟不可食忌法多食酸則皮槁而毛夭多食苦則筋急而爪枯多食甘則骨痛而髪落多食辛則肉胝而脣褰多食鹹則脉凝泣而色變五臟所宜食法肝病宜食麻犬肉李韭心病宜食麥羊肉杏薤脾病宜食稗米牛肉􅀥葵肺病宜食黄黍雞肉桃蔥腎病宜食大豆黄卷豕肉栗藿素問云肝色青冝食甘秔米牛肉􅀥葵皆甘心色赤宜食酸小豆犬肉李韭皆酸肺色白宜食苦麥羊肉杏薤皆苦脾色黄宜食鹹大豆豕肉栗藿皆鹹腎色黒宜食辛黄黍雞肉桃蔥皆辛五味動病法酸走筋筋病勿食酸苦走骨骨病勿食苦甘走肉肉病勿食甘辛走氣氣病勿食辛鹹走血血病勿食鹹五味所配法米飯甘素問云秔米甘麻酸素問云小豆酸大豆鹹麥苦􅀥甘李酸栗鹹杏苦桃辛黄黍辛葵甘韭酸藿鹹薤苦蔥辛牛甘犬酸豕鹹羊苦雞辛五臓病五味對治法肝苦急急食甘以緩之肝欲㪚急食辛以㪚之用酸㵼之禁當風心苦緩急食酸以收之心欲耎急食鹹以耎之用甘㵼之禁温食厚衣脾苦濕急食苦以燥之脾欲緩急食甘以緩之用苦㵼之禁温食飽食濕地濡衣肺苦氣上逆息者急食苦以泄之肺欲收急食酸以收之用辛㵼之禁無寒飲食寒衣腎苦燥急食辛以潤之開腠理潤致津液通氣也腎欲堅急食苦以結之用鹹㵼之無犯焠㶼無熱衣温食是以毒藥攻邪五榖爲養五肉爲益五果爲助五菜爲充精以食氣氣養精以榮色形以食味味養形以生力此之謂也神藏有五五五二十五種形藏有四方四時四季四肢共爲五九四十五以此輔神可長生久視也精順五氣以爲靈也若食氣相惡則傷精也形受味以成也若食味不調則損形也是以聖人先用食禁以存性後制藥以防命也故形不足者温之以氣精不足者補之以味氣味温補以存形精岐伯云陽爲氣隂爲味味歸形形歸氣氣歸精精歸化精食氣形食味化生精氣生形味傷形氣傷精精化爲氣氣傷於味隂味出下竅陽氣出上竅味厚者爲隂味薄者爲隂之陽氣厚者爲陽氣薄者爲陽之隂味厚則泄薄則通流氣薄則發泄厚則閉塞壯火之氣衰少火之氣壯壯火食氣氣食少火壯火㪚氣少火生氣味辛甘發㪚爲陽酸苦涌泄爲隂隂勝則陽病陽勝則隂病隂陽調和則平安春七十二日省酸増甘以養脾氣夏七十二日省苦増辛以養肺氣秋七十二日省辛増酸以養肝氣冬七十二日省鹹増苦以養心氣季月各十八日省甘増鹹以養腎氣果實第二二十九條㯽榔味辛温濇無毒消榖逐水除痰癖殺三蟲去伏尸治寸白豆蔲味辛温濇無毒温中主心腹痛止吐嘔去口氣臭葡萄味甘辛平無毒主筋骨濕痺益氣倍力强志令人肥健耐饑忍風寒久食輕身不老延年治腸間水調中可作酒常飲益人逐水利小便覆盆子味甘辛平無毒益氣輕身令髪不白大棗味甘辛熱滑無毒主心腹邪氣安中養脾氣助十二經平胃氣通九竅補少氣津液身中不足大驚四肢重可和百藥補中益氣强志除煩悶心下懸治腸澼久服輕身長年不饑神仙生棗味甘辛多食令人熱渇氣脹若寒熱羸瘦者彌不可食傷人藕實味苦甘寒無毒食之令人心歡止渇去熱補中養神益氣力除百病久服輕身耐老不飢延年一名水芝生根寒止熱渇破留血雞頭實味甘平無毒主濕痺腰脊膝痛補中除暴疾益精氣强志意耳目聰明久服輕身不飢耐老神仙芰實味甘辛平無毒安中補五臓不饑輕身一名菱黄帝云七月勿食生菱芰作蟯蟲栗子味鹹温無毒益氣厚腸胃補腎氣令人耐饑生食之甚治腰脚不遂櫻桃味甘平濇調中益氣可多食令人好顔色美志性一橘柚味辛温無毒主胷中瘕熱逆氣利水榖下氣止嘔咳除膀胱留熱停水破五淋利小便治脾不能消榖却胷中吐逆霍亂止㵼利去寸白久服去口臭下氣通神輕身長年一名橘皮陳久者良津符子味苦平滑多食令人口爽不知五味梅實味酸平濇無毒下氣除熱煩滿安心止肢體痛偏枯不仁死肌去青黒誌惡疾止下利好唾口乾利筋脉多食壊人齒柿味甘寒濇無毒通和五氣主腸澼不足及火瘡金瘡止痛木𤓰實味酸鹹温濇無毒主濕痺氣霍亂大吐下後脚轉筋不止其生樹皮無毒亦可煮用榧實味甘平濇無毒主五痔去三蟲殺蠱毒鬼疰惡毒甘蔗味甘平濇無毒下氣和中補脾氣利大腸止渇去煩解酒毒耎棗味苦冷濇無毒多食動宿病益冷氣發咳嗽芋味辛平滑有毒寛腸胃充肌膚滑中一名土芝不可多食動宿冷又烏芋味苦甘微寒滑無毒主消渇痺熱益氣一名藉姑一名水萍三月採杏核仁味甘苦温冷而利有毒主咳逆上氣腸中雷鳴喉痺下氣産乳金瘡寒心奔肫驚癎心下煩熱風氣去来時行頭痛解肌消心下急殺狗毒五月採之其一核兩仁者害人宜去之杏實尚生味極酸其中核猶未鞭者採之曝乾以食甚止渇去冷熱毒扁鵲云杏仁不可久服令人目面眉髪落動一切宿病桃核仁味苦甘辛平無毒破瘀血血閉瘕邪氣殺小蟲治咳逆上氣消心下鞭除卒暴擊血破癥瘕通月水止心痛七月採凡一切栗核中有兩仁者並害人不在用其實味酸無毒多食令人有熱黄帝云飽食桃入水浴成淋病李核仁味苦平無毒主僵仆躋瘀血骨痛實味苦酸微温濇無毒除固熱調中宜心不可多食令人虚黄帝云李子不可和白蜜食蝕人五内梨味甘微酸寒濇有毒除客熱氣止心煩不可多食令人寒中金瘡産婦勿食令人萎困寒中林檎味酸苦平濇無毒止渇好唾不可多食令人百䏡弱柰子味酸苦寒濇無毒耐饑益心氣不可多食令人臚脹久病人食之其病尤甚安石榴味甘酸濇無毒止咽燥渇不可多食損人肺枇杷葉味苦平無毒主啘不止下氣正爾削取生樹皮嚼之少少咽汁亦可煮汁冷服大佳胡桃味甘冷滑無毒不可多食動痰飲令人惡心吐水吐食菜蔬第三五十九條枸杞葉味苦平濇無毒補虚羸益精髓諺云去家千里勿食蘿藦枸杞此則言强陽道資隂氣速疾也蘿藦味甘平無毒一名苦丸其葉厚大作藤生摘之有白汁出人家所種亦可生噉亦可蒸煮食之補益與枸杞葉同𤓰子味甘平寒無毒令人光澤好顔色益氣不饑久服輕身耐老人除胷滿心不樂久食寒中可作面脂一名水芝一名白𤓰子即冬𤓰仁也八月採白冬𤓰味甘微寒無毒除小腹水脹利小便止消渇凡𤓰味甘寒滑無毒去渇多食令隂下癢濕生瘡發黄疸黄帝云丸月勿食被霜𤓰向冬發寒熱及温病初食時即令人欲吐也食竟心内作停水不能自消或爲反胃凡𤓰入水沈者食之得冷病終身不瘥越𤓰味甘平無毒不可久食損腸胃胡𤓰味甘寒有毒不可多食動寒熱多瘧病積瘀血熱早青𤓰味甘寒無毒食之去熱煩不可久食令人多忘冬葵子味甘寒無毒主五臟六腑寒熱羸瘦破五淋利小便婦人乳難血閉久服堅骨長肌肉輕身延年十二月採葉甘寒滑無毒宜脾久食利胃氣其心傷人百藥忌食心心有毒黄帝云霜葵陳者生食之動五種流飲飲盛則吐水凡葵菜和鯉魚鮓食之害人四季之月土王時勿食生葵菜令人飲食不化發宿病莧菜實味甘寒濇無毒主青盲白瞖眀目除邪氣利大小便去寒熱殺蚘蟲久服益氣力不饑輕身一名馬莧一名莫實即馬齒莧菜也治反花瘡小莧菜味甘大寒滑無毒可久食益氣力除熱不可共鼈肉食成鼈瘕蕨菜亦成鼈瘕邪蒿味辛温濇無毒主胷膈中臭惡氣利腸胃苦菜味苦大寒滑無毒主五臟邪氣厭榖胃痺腸澼大渇熱中暴疾惡瘡久食安心益氣聰察少臥輕身耐老耐饑寒一名茶草一名選一名遊冬冬不死四月上旬採薺菜味甘温濇無毒利肝氣和中殺諸毒其子主明目目痛淚出其根主目濇痛蕪菁及蘆服菜味苦冷濇無毒利五臟輕身益氣宜久食蕪菁子明目丸蒸曝療黄疸利小便久服神仙根主消風熱毒腫不可多食令人氣脹菘菜味甘温濇無毒久食通利腸胃除胷中煩解消渇夲是蔓菁也種之江南即化爲菘亦如枳橘所生土地隨變芥菜味辛温無毒歸鼻除腎邪大破咳逆下氣利九竅眀目聰耳安中久食温中又云寒中其子味辛辛亦歸鼻有毒主喉痺去一切風毒腫黄帝云芥菜不可共兔肉食成惡邪病苜蓿味苦平濇無毒安中利人四體可久食荏子味辛温無毒主咳逆下氣温中補髓其葉主調中去臭氣九月採隂乾用之油亦可作油衣蓼實味辛温無毒明目温中解肌耐風寒下水氣面目浮腫却癰疽其葉辛歸舌治大小腸邪氣利中益志黄帝云蓼食過多冇毒發心痛和生魚食之令人脱氣隂核疼痛求死婦人月事来不用食蓼及蒜喜爲血淋帯下二月勿食蓼傷人腎扁鵲云蓼久食令人寒熱損骨髓殺丈夫隂氣少精蔥實味辛温無毒宜肺辛歸頭明目補中不足其莖白平滑可作湯主傷寒寒熱骨肉碎痛能出汗治中風面目浮腫喉痺不通安胎殺桂其青葉温辛歸目除肝中邪氣安中利五臟益目精發黄疸殺百藥毒其根鬚平主傷寒頭痛蔥中涕及生蔥汁平滑止尿血解藜蘆及桂毒黄帝云食生蔥即噉蜜變作下利食燒蔥并噉蜜擁氣而死正月不得食生蔥令人面上起遊風格蔥味辛微温無毒除瘴氣惡毒久食益膽氣强志其子主洩精薤味苦辛温滑無毒宜心辛歸骨主金瘡瘡敗能生肌肉輕身不饑耐老菜芝也除寒熱去水氣温中㪚結氣利産婦病人諸瘡中風寒水腫生𢷬傳之􅀈骨在咽不下者食之則去黄帝云薤不可共牛肉作羮食之成瘕疾韭亦然十月十一月十二月勿食生薤令人多涕唾韭味辛酸温濇無毒辛歸心宜肝可久食安五臟除胃中熱不利病人其心腹有痼冷者食之必加劇其子主夢泄精尿色白根煮汁以養髪黄帝云霜韭凍不可生食動宿飲飲盛必吐水五月勿食韭損人滋味令人乏氣力二月三月宜食韭大益人心白蘘荷味辛微温濇無毒主中蠱及瘧病𢷬汁服三合日二生根主諸瘡恭菜味甘苦大寒無毒主時行壯熱解風熱惡毒紫蘇味辛微温無毒下氣除寒中其子尤善雞蘇味辛微温濇無毒主吐血下氣一名水蘇也羅勒味苦辛温平濇無毒消停水散毒氣不可久食濇榮衞諸氣蕪荑味辛平熱滑無毒主五内邪氣㪚皮膚骨節中􅁋􅁋温行毒去三蟲能化宿食不消逐寸白㪚腹中温温喘息一名無姑一名􅀢蓎盛器物中甚辟水蛭其氣甚臭此即山榆子作之凡榆葉味甘平滑無毒主小兒癎小便不利傷暑熱困悶煮汁冷服生榆白皮味甘冷無毒利小便破石淋花主小兒頭瘡葫荽子味酸平無毒消榖能復食味葉不可久食令人多忘華佗云葫荽菜患胡臭人患口氣臭􅉶齒人食之加劇腹内患邪氣者彌不得食之發宿病金瘡尤忌海藻鹹寒滑無毒主癭瘤結氣㪚頸下鞭核痛者腸内上下雷鳴下十二水腫利小便起男子隂氣昆布味鹹寒滑無毒下十二水腫癭瘤結氣瘻瘡破積聚茼蒿味辛平無毒安心養氣脾胃消痰飲白蒿味苦辛平無毒養五臟補中益氣長毛髪久食不死白兔食之仙呉葵一名蜀葵味甘微寒滑無毒花定心氣葉除客熱利腸胃不可久食鈍人志性若食之被狗齧者瘡永不瘥藿味鹹寒濇無毒宜腎主大小便數去煩熱香菜味辛微温主霍亂腹痛吐下散水腫煩心去熱甜瓠味甘平滑無毒主消渇惡瘡鼻口中肉爛痛其葉味甘平主耐饑扁鵲云患脚氣虚脹者不得食之患永不除蓴味甘寒滑無毒主消渇熱痺多食動痔病落葵味酸寒無毒滑中㪚熱實悦澤人面一名天葵一名蘩露蘩蔞味酸平無毒主積年惡瘡痔不愈者五月五日日中採之即名滋草一名雞腸草乾之燒作焦灰用扁鵲云丈夫患惡瘡隂頭及莖作瘡膿爛疼痛不可堪忍久不瘥者以灰一分蚯蚓新出屎泥二分以少水和研緩如煎餅麵以泥瘡上乾則易之禁酒麵五辛并熱食等黄帝云蘩蔞合䱉鮓食之發消渇病令人多忘别有一種近水渠中温濕處冬生其狀􅁼葫荽亦名雞腸菜可以療痔病一名天葫荽蕺味辛微温有小毒主蠼螋尿瘡多食令人氣喘不利人脚多食脚痛葫味辛温有毒辛歸五臓㪚癰疽治􅉶瘡除風邪殺蠱毒氣獨子者最良黄帝云生葫合青魚鮓食之令人腹内生瘡腸中腫又成疝瘕多食生葫行房傷肝氣令人面無色四月八月勿食葫傷人神損膽氣令人喘悸脇肋氣急口味多爽小蒜味辛温無毒辛歸脾腎主霍亂腹中不安消榖理胃氣温中除邪痺毒氣五月五日採曝乾葉主心煩痛解諸毒小兒丹􅇙不可久食損人心力黄帝云食小蒜噉生魚令人奪氣隂核疼求死三月勿食小蒜傷人志性茗葉味苦鹹酸冷無毒可久食令人有力悦志微動氣黄帝云不可共韭食令人身重蕃荷菜味苦辛温無毒可久食却腎氣令人口氣香潔主辟邪毒除勞弊形瘦疲倦者不可久食動消渇病蒼耳子味苦甘温葉味苦辛微寒濇有小毒主風頭寒痛風濕痺四肢拘急攣痛去惡肉死肌膝痛溪毒久服益氣耳目聰明强志輕身一名胡葈一名地葵一名葹一名常思蜀人名羊負来秦名蒼耳魏人名隻刺黄帝云戴甲蒼耳不可共猪肉食害人食甜粥復以蒼耳甲下之成走注又患兩脇立秋後忌食之食茱萸味辛苦大温無毒九月採停陳久者良其子閉口者有毒不在用止痛下氣除咳逆去五臓中寒冷温中諸冷實不消其生白皮主中惡腹痛止齒疼其根細者去三蟲寸白黄帝云六月七月勿食茱萸傷神氣令人起伏氣咽喉不通徹賊風中人口僻不能語者取茱萸一升去黒子及合口者好䜴三升二物以清酒和煮四五沸取汁冷服半升日三得小汗瘥蠆螫人嚼茱茰封上止蜀椒味辛大熱有毒主邪氣温中下氣留飲宿食能使痛者癢癢者痛久食令人乏氣失眀主咳逆逐皮膚中寒冷去死肌濕痺痛心下冷氣除五臟六腑寒百骨節中積冷温瘧大風汗自出者止下利㪚風邪合口者人其中黒子有小毒下水仲景云􅆈用之黄帝云十月勿食椒損人心傷血脉乾薑味辛熱無毒主胷中滿欬逆土氣温中止漏血出汗逐風濕痺腸澼下利寒冷腹痛中惡霍亂脹滿風邪諸毒皮膚間結氣止唾血生者尤良生薑味辛微温無毒辛歸五臟主傷寒頭痛去痰下氣通汗除鼻中塞咳逆上氣止嘔吐去胷膈上臭氣通神明黄帝云八月九月勿食薑傷人神損夀胡居士云薑殺腹中長蟲久服令人少志少智傷心性堇葵味苦平無毒久服除人心煩急動痰冷身重多懈惰芸薹味辛寒無毒主腰脚痺若舊患腰脚痛者不可食必加劇又治油腫丹毒益胡臭解禁呪之軰出五明經其子主夢中泄精與鬼交者胡居士云世人呼爲寒菜甚辣胡臭人食之病加劇隴西氐羌中多種食之竹筍味甘微寒無毒主消渇利水道益氣力可久食患冷人食之心痛野苣味苦平無毒久服輕身少睡黄帝云不可共蜜食之作痔又白苣味苦平無毒益筋力黄帝云不可共酪食必作蟲茴香菜味苦辛微寒濇無毒主霍亂辟熱除口氣臭肉和水煮下少許即無臭氣故曰茴香醬臭末中亦香其子主蛇咬瘡久不瘥者𢷬傳之又治九種瘻蕈菜味苦寒無毒主小兒火丹諸毒腫去暴熱藍菜味甘平無毒久食大益腎塡髓腦利五臓調六腑胡居士云河東隴西羌胡多種食之漢地尠有其葉長大厚煮食甘羙經冬不死春亦有英其花黄生角結子子甚治人多睡萹竹葉味苦平濇無毒主浸淫疥瘙疽痔殺三蟲女人隂蝕扁鵲云煮汁與小兒冷服治蛔蟲斳菜味苦酸冷濇無毒益筋力去伏熱治五種黄病生𢷬絞汁冷服一升日二黄帝云五月五日勿食一切菜發百病凡一切菜熟煮熱食時病瘥後食一切肉并蒜食竟行房病發必死時病瘥後未健食生青菜者手足必青腫時病瘥未健食青菜竟行房病更發必死十月勿食被霜菜令人面上無光澤目濇痛又瘧發心痛腰疼或致心瘧發時手足十指𤓰皆青困痿備急千金要方卷七十九
