  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0013_WYG_069-1a, image: WYG0735/WYG0735-0719a.png}
body:
  text: 備急千金要方卷六十九唐孫思邈撰宋林億等校正痔漏方九漏第一瘰􅊓附方論法灸論曰夫九漏之爲病皆寒熱瘰癧在於頸腋者何氣使生此皆鼠瘻寒熱之毒氣也堤留於脉而不去者也鼠瘻之本皆根在於臟其末上出於頸腋之下其浮於脉中而未著於肌肉而外為膿血者易去去之奈何曰請從其末引其本可使衰去而絶其寒熱審按其道以予之徐從末以去之其小如麥者一刺之三刺已决其死生奈何曰反其目視其中有赤脉從上下貫瞳子見一脉一嵗死見一脉半一嵗半死見二脉二嵗死見二脉半二嵗半死見三脉三嵗死赤脉不下貫瞳子可治也凡項邉腋下先作瘰癧者欲作漏也宜禁五辛酒麫及諸熱食凡漏有似石癰累累然作癧子有核在兩頸及腋下不痛不熱治者皆練石散傅其外内服五香連翹湯下之已潰者治如癰法諸漏結核未破者火針針使著核結中無不瘥者何謂九漏一曰狼漏二曰鼠漏三曰螻蛄漏四曰蠱漏五曰蚍蜉漏六曰蠐螬漏七曰浮沮漏八曰瘰􅊓漏九曰轉脉漏空青商陸散治狼漏始發於頸腫無頭有根起於缺盆之上連延耳根腫大此得之憂恚氣上不得下其根在肝一作肺空青主之商陸為之佐方空青蝟腦各二分蝟肝一具乾芎藭半分獨活黄芩鼈甲婦人蓐草商陸斑猫乾薑地膽當歸茴香􅈨石各一分蜀椒三十粒右十六味治下篩酒下方寸匕日三服十五日狸骨知母散治鼠漏始發於頸無頭尾如鼷鼠闕熱脫肉此得之食有鼠毒不去其根在胃狸骨主闕為之佐方狸骨知母桂心鯪鯉山龜殻甘草雄黄乾薑各等分右八味治下篩飲服方寸匕日三仍以蜜和内瘡中無不瘥先灸作瘡後以藥𫝊之已作瘡不用灸地黄膏治鼠漏瘡瘥復發及不愈出膿血不止方右以不中水猪脂㕮咀生地黄内脂中令脂與地黄足相淹和煎六七沸其瘡先用桑灰汁洗去惡汁次以地黄膏傅上日一易治鼠漏方右用蛇虺所吞鼠燒末服方匕日再不過三服此大騐但難遇耳并傅瘡中佳又方死鼠一枚中形者亂髪如鷄子大一枚右二味以臘月猪脂煎之令消盡膏成分作二分一分稍稍塗瘡一分稍稍酒服之瘥鼠子當從瘡中出良荏子桔梗圓治螻蛄漏始發於頸項状如腫此得之食𤓰菓實毒不去其根在大腸荏子主之桔梗為之佐方荏子龍骨各半兩附子一兩蜀椒百粒桂心桔梗乾薑􅈨石獨活芎藭各一分右十味為末以􅀥二十枚合𢷬醋漿和丸如闕漿下五丸加至十丸雄黄黄芩散治蜂漏始發於頸瘰􅊓三四處俱相連以潰此得之飲流水中有風毒不去其根在脾雄黄主之黄芩為之佐方雄黄黄芩各一兩蜂房一具茴香吳茱茰乾薑各半兩蜀椒二百粒鼈甲右八味治下篩𫝊瘡口上日一度十日止礜石防風散治蚍蜉漏始發於頸初得如傷寒此得之食中有蚍蜉毒不去其根在腎礜石主之防風為之佐方礬石防風知母雌黄桃白皮乾地黄獨活青黛斑猫白芷松脂一作栢脂芍藥海藻當歸各一分白术蝟皮各四分蜀椒百粒右十七味治下篩飲服一錢匕日三礬石白术散治蠐螬漏始發於頸下無頭尾如􅀥核塊累移在皮中使人寒熱心滿此得之因喜怒哭泣其根在心礬石主之白术為之佐方礬石白术空青當歸細辛一兩蝟皮斑猫枸杞地膽各一分乾烏腦三七豆許右十味治下篩以醋漿服方寸匕日三病在上側輪卧在下髙枕卧使藥流下地膽甘草散治浮沮漏始發於頸如兩指使人寒熱欲卧此得之因思慮憂懣其根在膽地膽主之甘草為之佐方地膽雄黄乾薑續斷石決明菴䕡根龍膽各三分細辛二分大黄半分甘草一分右十味治下篩𫝊瘡日四五度古今録驗無雄黄有硫黄雌黄芍藥圓治瘰􅊓漏始發於頸有根初苦痛令人寒熱此得之因新沐濕結髪汗流於頸所致其根在腎雌黄主之芍藥為之佐方雌黄芍藥茯苓續斷乾地黄空青礜石乾薑桔梗蜀椒恒山虎腎狸肉烏腦斑猫礬石各一分附子一兩右十七味為末蜜丸如大豆酒服十丸日二斑猫白芷圓治轉脉漏始發於頸濯濯脉轉苦驚身振寒熱此得之因驚臥失枕其根在小腸集驗作心斑猫闕之白芷為之佐方斑猫白芷綠青大黄各二分升麻鍾乳甘草防風地膽續斷麝香礜石各一分人参當歸桂心各二兩白术麥門冬各一兩右十七味為末蜜丸如大豆酒服十丸日三勿食菜慎房室百日外臺無大黄桂心麥門冬白术鍾乳治九漏方空青商陸知母狸骨桔梗防風荏子礬石黄芩白芷芍藥甘草雌黄白术礜石地膽斑猫雄黄各等分右十八味為末蜜丸如大豆以酢服三丸三十日知四十日愈六十日平復百日内慎房室一方為散醋服一刀圭日二老小半又方蝟皮半枚鯪鯉甲􅀈雞各四枚蜥蜴蜈蚣各一枚蜀椒附子當歸蜂房地榆桂心通草乾漆牡丹薏苡仁蒺藜子漏蘆一作雚蘆龍膽一作龍骨土𤓰各三分斑猫四分蛇牀子苦参大黄雄黄蛇蜕皮䕡茹細辛各二分鶴骨六分右二十八味治下篩酒服五分匕以知為度日二服又方斑猫七十枚蝟皮真珠雄黄各一分右四味治下篩酒服半錢七日三又方末成錬松脂填瘡孔令滿日三四度七日瘥有神驗又方斑猫二七枚雄黄桂心犀角各一兩右四味治下篩酒服一錢匕日再服病從小便出又方馬齒莧隂乾臘月燭燼各等分右二味為末以臘月猪脂和其瘡先以暖泔清洗淨拭乾然後以藥傅之日三又方乾牛屎乾人屎各等分右二味𢷬先用綿羃瘡上綿上著屎蟲聞屎香即出若癢即舉綿去之更别取屎及綿著其上如前蟲盡乃止又方苦瓠四枚大如盞者各穿一孔如指大置湯中煮十數沸取一竹筒長一尺一頭内瓠孔中一頭注瘡孔上冷則易之徧止治一切漏方斑猫四十枚䜴四十九粒元青二十枚生大豆黄地膽各十枚蜈蚣一升半犀角牛黄各􅀥核大右八味為末蜜丸如梧子大飲服二丸須㬰多作酸漿粥冷飲之病從小便出尿盆中相視如有蟲形状又似膠汁此病出也間日一服飲粥如常小弱者隔三四日候無蟲出瘡漸瘥特忌油膩一切器物皆須灰洗乃作食崔氏云治九漏初服藥少夜食明旦服二丸至七日甚虚悶可煮食蔓菁菜羮自餘脂膩醋口味果子之類並不得食人强隔日一服人弱兩三日一服瘥後仍作二十日将息便不須服又方煮鹽花以麫擁病上内鹽花麫匡中厚二寸其下以桑葉三重藉鹽候冷熱得所可忍冷則無益熱則以肉一日一度候瘰􅊓根株勢消則止若已作瘡者𢷬穄榖為末粉之又方槲北隂白皮三十斤剉碎以水一石煑取一斗去滓煎如糖又取都厠上雌雄鼠屎各十四枚燒令汁盡為末内煎中又温酒一升投煎中合攪之羸人服五合當有蟲出又方霜下瓠花曝乾為末傅之又方𢷬土𤓰根𫝊之燥則易不限時節又方死蛇去皮肉取骨為末合和封瘡上大痛以杏仁膏摩之止又方死蛇和臘月猪脂合燒灰為末内孔中又方燒死蜣蜋為末醋和塗又死蛇灰醋和𫝊之又方故布裏鹽如彈丸大燒令赤為末酒服又方服白馬屎汁一升又方水研杏仁服之又方猪脂一升酒五合煎沸頓服之又方鹽麫和燒灰傅之又方正月雄狐屎隂乾𢷬末水和服治漏作瘡孔方右用露蜂房爲末臘月猪脂和傅孔上治漏發心胷以下者方松脂武都雄黄各三兩右二味和為塊刀子刮爲散飲服一方寸匕日二不瘥更合治漏方鍜落鐵屑狗頰車連齒骨灸虎糞鹿皮合毛燒爲灰各等分右四味治下篩以猪膏和内瘡中須臾即易日五六度治一切冷瘻方右用燒人所吐蛔蟲為灰先用甘草湯洗去瘡惡然後著灰無不瘥者慎口味治鼠瘻腫核痛未成膿者方右以栢葉𫝊腫上􅆈鹽著葉上熨之令熱氣下即消治風漏及鼠漏方赤小豆白歛黄耆牡蠣各等分右四味治下篩酒服方寸匕日三治螻蛄瘻方右先以泔清煮槲葉取汁洗瘡拭乾次以槲葉灰内瘡中治蜂瘻方論初生状如桃而癢搔之則引大如雞子如覆手者􅆈鹽熨之三宿四日不瘥至百日成瘻其状大如四五寸石廣三寸中生蜂作孔乃有數百以石硫黄隨多少燃燒令汁出著瘡孔中須臾間見蜂數十蜂盡乃瘥治蜂瘻方以人屎蛇蛻灰臘月猪膏和𫝊之又方鵶頭灰𫝊之又方取蜂窠燒灰臘月猪膏和𫝊孔中治蟻漏孔容針亦有三四孔者方右用蝟皮肝心燒灰為末酒服一錢七又方死蛇腹中鼠取臘月猪脂煎候焦去滓𫝊之又方取大鮆鮓燒耕垈土令赤以苦酒浸垈土時合壁土故熱以鮆鮓著壁土上展轉令熱𫝊瘡上又方鯪鯉甲二七枚燒末以猪膏和𫝊瘡上又方半夏一枚𢷬末以鴨脂和𫝊瘡上治瘰􅊓瘻横闊作頭状若杏仁形亦作瘰􅊓方右用雄雞屎燒灰臘月猪脂和封之治蜣蜋瘻方右用牛屎燒灰臘月猪脂和𫝊之又方蜣蜋丸即蜣蜋所食屎也為末𫝊之又方乾牛屎為末𫝊之癢即撥却更厚封瘥乃止又方熱牛屎塗之數易應有蜣蜋出治蚯蚓瘻方雞屎蚯蚓屎右二味為末用社猪下頷髓和𫝊之治蠍瘻五六孔皆相通者方右𢷬茅根汁著孔中治蝦䗫瘻方右用五月五日蛇頭及野猪脂同水衣封之佳治蛇瘻方右用蛇蜕皮燒灰臘月猪脂和封之治蛙瘻方右用蛇腹中蛙燒灰封之治顛當瘻方以𢷬土𤓰根𫝊至瘥慎口味治雀瘻方右取母猪屎燒灰臘月猪膏和𫝊上當有蟲出如雀形治膿瘻方右用桃花末以猪脂和封之佳治石瘻兩頭出者其状堅實令人寒熱方右以大鈹針破之次用鼠粘葉二分為末和雞子白一枚封之又方𢷬槐子和井花水封之灸漏法葶藶子二合䜴一升右二味和𢷬令極熟作餅子如大錢厚二分許取一枚當瘡孔上作大艾炷如小指大灸餅上三炷一易三餅九炷隔三日復一灸之外臺灸瘰􅊓古今錄騐云不可灸頭瘡葶藶氣入腦殺人又方𢷬生商陸根捻作餅子如錢大厚三分安漏上以艾灸餅乾易之灸三四升艾瘥外臺灸瘰􅊓又方七月七日日未出時取麻花五月五日取艾等分合𢷬作炷用灸瘡上百壯外臺灸瘰􅊓九漏灸肩井二百壯漏灸鳩尾骨下宛宛中七十壮諸漏灸瘻周四畔瘥諸惡漏中冷息肉灸足内踝止各三壮二年六壮寒熱胷滿頸痛四肢不舉腋下腫上氣胷中有音喉中鳴天池主之寒熱頸頷腫後谿主之寒熱酸痟痛四肢不舉腋下腫馬刀瘻喉痺髀膝脛骨摇酸痺不仁陽輔主之寒熱脛腋下腫申脉主之胷中滿腋下腫馬刀瘻善自囓舌頰天牖中腫寒熱胸脇腰膝外廉痛臨泣主之寒熱頸腫丘墟主之腋下腫馬刀肩腫吻傷太衝主之寒熱頸瘰癧大迎主之五白膏治鼠漏及瘰癧方白馬屎白牛屎白猪屎白羊屎白雞屎各一升漏蘆二斤右六味各於石上燒作灰研絹篩之以猪膏一升三合煎亂髪一兩半令極沸盡消乃内諸末微火上煎五六沸藥成去瘡痂以鹽湯洗新帛拭乾然後𫝊膏若無痂猶須湯洗日再若著膏當以帛裹上勿令中風冷神騐曾青散治寒熱瘰癧及鼠瘻方曾青荏子礜石一作􅈨石附子各半兩栝蔞根露蜂房當歸防風芎藭黄耆黄芩狸骨甘草各二兩細辛乾薑各一兩斑猫元青各五枚右十七味治下篩以酒服一方寸匕日再治寒熱瘰癧方土𤓰根連翹龍膽黄連栝蔞根苦參芍藥恒山各一兩右八味治下篩酒服五分七日三千金翼外臺有狸骨一枚又千方翼一方有當歸無栝蔞恒山薔薇圓治身體有熱氣瘰癧及常有細瘡并口中生瘡方薔薇根三兩黄耆黄芩鼠李根皮栝蔞根芍藥苦參石龍芮防風一作防已白歛龍膽各一兩梔子仁四兩右十二味為末蜜丸如梧子大飲服十五丸日再千金翼有黄蘗一兩治瘰癧方右用白殭蠶治下篩水服五分匕日三服十日瘥又方狸頭一枚灸𢷬篩飲服方寸匕日二又方故鞋内氊替燒末五七和酒一升平旦向日服之强行須臾吐鼠出三朝服外臺不同又方狸頭蹄骨等炙黄𢷬篩為散飲服一錢七日二又方猫兩眼隂乾燒灰井花水服方寸匕日再又方乾猫舌為末𫝊瘡上又方狼屎灰𫝊之又方狐頭狸頭灰𫝊之又方五月五日取一切種種雜草煮取汁洗之又方猫腦莾草右二味各等分為末著孔中灸瘰癧法一切瘰癧在項上及觸處但有肉結凝似作瘻及癰癤者以獨頭蒜截兩頭留心大作艾炷稱蒜大小帖癧子上灸之勿令上破肉但取熱而已七壯一易蒜日日灸之取消止一切瘰癧灸兩胯裏患癧處宛宛中日一壮七日止神騐又灸五里人迎各三十壮又灸耳後髪際直脉七壯又灸患人背兩邉腋下後文上隨年壮備急千金要方卷六十九
