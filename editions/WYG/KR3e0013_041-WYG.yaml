body:
  text: 備急千金要方卷四十一唐孫思邈撰宋林億等校正心臟方脉極第四論法方灸論曰凡脉極者主心也心應脉脉與心合心有病從脉起又曰以夏遇病為脉痺脉痺不已復感於邪内舎於心則飲食不為肌膚欬脫血色白不澤其脉空虚口脣見赤色凡脉氣衰血焦髪墮以夏丙丁日得之於傷風損脉為心風心風之狀多汗惡風若脉氣實則熱熱則傷心使人好怒口為色赤甚則言語不快血脫色乾燥不澤飲食不為肌膚若脉氣虚則寒寒則欬欬則心痛喉中介介如哽甚則咽腫喉痺故曰心風虚實候也若陽經脉病治隂胳隂胳脉病治陽經定其血氣各守其鄉脉實宜瀉氣虚宜補善治病者定其虚實治之取瘥病在皮毛肌膚筋脉則全治之若至六腑五臟則半死矣扁􅍎云脉絶不治三日死何以知之脉氣空虚則顔焦髮落脉應手少隂手少隂氣絶則脉不通血先死矣生地黄煎治脉熱極則血氣脫色白乾燥不澤飲食不為肌膚消熱止極强胃氣方生地黄汁生麥門冬赤蜜各一升蓴心一升一作䜴逺志二升甘草二兩人參茯苓乾地黄芍藥白术各三兩石膏六兩生萎蕤四兩右十三味十一味㕮咀以水一斗二升煮取二升七合去滓下地黄汁及蜜更煎三升五合分四服灸法胷中痛引腰背心下嘔逆面無滋潤灸上門隨年壯穴在俠巨闕兩邉相去各半寸一云一寸顔色焦枯勞氣失精肩臂痛不得上頭灸肩髃百壯穴在肩外頭近後以手按之有解宛宛中脉虚實第五論灸方針法論曰凡脉虚者好驚跳不定脉實者洪滿凡脉虚實之應主於心小腸若其腑臟有病從熱生則應臟寒則應腑也防風圓補虚調中治脉虚驚跳不定乍來乍去主小腸腑寒方防風桂心通草茯神逺志麥門冬甘草人參白石英各三兩右九味為末白蜜和丸如梧子大酒服三十丸日再加至四十丸升麻湯治脉實洪滿主心熱病方升麻子芩澤瀉梔子仁淡竹葉芒硝各三兩生地黄切一升右七味㕮咀以水九升煮取三升去滓下芒硝分三服麻黄湯調心洩熱治心脉厥大寸口小腸熱齒齲嗌痛方麻黄生薑各四兩細辛子芩茯苓芍藥各三兩白术二兩桂心一兩生地黄切一升右九味㕮咀以水九升煮取三升去滓分三服須利加芒硝三兩甚善針灸法脉不出針不容穴在幽門兩傍各一寸五分是也心悶痛上氣牽引小腸灸巨闕二七壯心腹痛第六論法方蒸熨法灸論曰寒氣卒客於五臟六腑則發卒心痛胷痺感於寒㣲者為欬甚者為痛為泄厥心痛與背相引善瘈如物從後觸其心身傴僂者腎心痛也厥心痛腹脹滿心痛甚者胃心痛也厥心痛如以針錐刺其心心痛甚脾心痛也厥心痛色蒼蒼如死灰狀終日不得太息者肝心痛也厥心痛卧若徒居心間痛動作痛益甚色不變者肺心痛也真心痛手足青至節心痛甚旦發夕死夕發旦死蚘心痛心腹中痛發作腫聚徃來上下行痛有休止腹中熱善涎出是蚘咬也以手按而堅持之勿令得移以大針刺之復乆持之蟲不動乃出心下針不可刺中有成聚不可取於輸腸中有蟲蚘咬皆不可取以小針治寒熱氣卒客於五臟六腑中則發心痛方大黄芍藥柴胡各四兩升麻黄芩桔梗朱砂各三兩鬼箭羽鬼臼桂心朴硝各二兩右十一味㕮咀以水九升煮取二升七合分三服先分朱砂作三分每服内一分攪止宜服後方赤芍藥六兩桔梗杏仁各五兩右三味㕮咀以水六升煮取三升分三服九痛圓治九種心痛并療冷衝上氣落馬墮車血疾等方一蟲心痛二注心痛三風心痛四悸心痛五食心痛六飲心痛七冷心痛八熱心痛九去來心痛此之謂九痛附子乾薑各二兩吴茱萸人參巴豆各一兩生狼毒四兩右六味為末蜜和丸如梧子大空腹服一丸卒中惡腹脹痛口不能言者二丸日一服連年積冷流注心胸者亦服之好好將息神騐治九種心痛方取當太嵗上新生槐枝一握去兩頭㕮咀以水三升煮取一升頓服桂心三物湯治心中痞諸逆懸痛方桂心生薑各二兩膠飴半斤右三味取二味㕮咀以水六升煮取三升去滓内飴分三服仲景用枳實五枚不用膠飴肘後用枳實五枚白术二兩為五味烏頭圓治心痛徹背背痛徹心方烏頭六銖附子半兩蜀椒半兩乾薑赤石脂各一兩右五味為末蜜丸如麻子大先食服三丸日三不知稍増之范汪不用附子服如梧子三丸崔氏用桂心半兩為六味治心痛方桃白皮煑汁空腹以意服之崔氏用療疰心痛治暴心痛或如中惡口中涎出不可禁止回回欲吐方苦參十斤右一味㕮咀以水一石煮取二斗去滓下苦酒二斗更煎取五升大且黄末􅆈和汁中煎令可丸併手丸之如梧子大毎服以酒一升進三四十丸日一當倒腹吐不吐下利更酒漬苦參二斤浸久彌佳非止暴痛如骭骨䯒等痛凡是腹中之疾悉主之又治宿冷血結隂癖頻用有效大良治卒中惡心痛方苦參三兩右一味㕮咀以好酢一升半煮取八合强者頓服老小分二服又方桂心一兩右一味㕮咀以水四升煮取一升半分作三服治蟲心痛方鶴蝨為末蜜和丸如梧子大服四十丸蜜湯下日一服可加至五十丸慎酒肉又方鶴蝨一兩為末以温酢一盞和空腹服之蟲當吐出之又方服漆一合方見飬性服餌篇中凡蟲心痛皆用漆主之五辛湯治心腹冷痛方細辛蜀椒桂心乾薑吳茱萸芍藥防風苦參甘草乾地黄當歸各一兩梔子烏梅大􅀥各二七枚右十四味㕮咀以水九升煮取三升分四服犀角圓治心腹久痛積年不定不過一時間還發甚則數日不能食又便出乾血窮天下方不能瘥甄立言處此方數日即愈犀角麝香雄黄桔梗莽草鬼臼桂心芫花各兩半甘遂一兩半光明砂附子各六銖貝齒五枚巴豆二十枚赤足蜈蚣二枚右十四味為末蜜丸如梧子飲服一丸日二漸加至三丸以微利為度古今集驗無雄黄高良薑湯治卒心腹絞痛如刺兩脇支滿煩悶不可忍方高良薑五兩厚朴二兩當歸桂心各三兩右四味㕮咀以水八升煮取一升八合分三服日二若一服痛止便停不須更服强者為二服劣者分三服當歸湯治心腹絞痛諸虚冷氣滿痛方當歸芍藥厚朴半夏各二兩桂心甘草黄耆人參各三兩乾薑四兩蜀椒一兩右十味㕮咀以水一斗煮取三升二合分四服羸劣人分六服小品方云大冷加附子一枚良又方治虚冷腹痛不下飲食食復不消膨脹者方當歸茯苓各五分黄耆紫菀各四分高良薑乾薑各六分鹿茸桂心昆布肉蓯蓉橘皮各三分甘草二兩烏頭一兩大棗四十枚桃仁一百枚地骨皮法麴大麥蘖各一升右十八味㕮咀以水一斗五升煮取四升二合分為五服下利加赤石脂龍骨各三分渇加麥門冬一升又方治寒冷腹中痛方小品名吴茱萸湯當歸二兩桂心甘草人參各一兩生薑五兩半夏小麥各一升吴茱萸二升右八味㕮咀以水一斗五升煮取三升分三服日三亦治産後虚冷又方治冷氣脇下徃來衝胸膈痛引脇背悶者方當歸桂心人參甘草吴茱萸芍藥大黄各二兩茯苓枳實各一兩乾薑三兩右十味㕮咀以水八升煮取二升半分三服日三治尸疰亦佳外臺仲景方無茯苓枳實又方治久寒疾胸腹中痛時下利方當歸三兩甘草橘皮各二兩附子一兩乾薑四兩右五味㕮咀以水八升煮取二升分三服日三又方治久寒宿疾胸腹中痛短氣時滯下利方當歸桂心各三兩乾薑四兩附子一兩右四味㕮咀以水八升煮取二升分三服日三范汪無附子用甘草二兩云虚冷激痛甚者加黄耆芍藥各二兩温中當歸湯治心腹中痛發作腫聚徃來上下痛有休止多熱喜涎出是蚘蟲咬也服二三劑後若不效有異宜改方増損之當歸人參乾薑茯苓厚朴木香桂心桔梗芍藥甘草各二兩右十味㕮咀以水八升煮取三升分温五服日三不耐木香者以犀角一兩代之羊肉當歸湯治腹冷絞痛方羊肉半斤當歸四分乾薑橘皮黄耆芍藥芎藭桂心獨活防風各三分吴茱萸人參甘草乾地黄茯苓各一分生薑六分大􅀥三十枚右十七味㕮咀以水一斗半先煮肉取一斗二升出肉次内諸藥煮取三升分三服日三覆取温煖温脾湯治腹痛臍下絞結繞臍不止方甘草附子人參芒硝各二兩當歸乾薑各三兩大黄五兩右七味㕮咀以水七升煮取三升分服日三生薑湯治胷腹中卒痛方生薑一斤取汁食蜜八兩醍醐四兩右三味㣲火上耗令相得適寒温服三合日三熨蒸法凡心腹冷痛者􅆈鹽一斗熨􅆈蠶沙燒磚石蒸熨取其裏温煖止蒸土亦大佳針灸法凡邪在心則病心痛善悲時眩仆視有餘不足而調其輸腎心痛先取京骨崑崙發針不已取然谷胃心痛取大都太白脾心痛取然谷太谿肝心痛取行間太衝肺心痛取魚際太淵心痛引腰脊欲嘔刺足少隂心痛引背不得息刺足少隂不已取手少隂心痛腹脹濇濇然大便不利取足太隂心痛小腹滿上下無常處溲便難刺足厥隂心痛短氣不足以息刺手太隂心痛不可按煩心巨闕主之心痛有三蟲多涎不得反側上管主之心痛身寒難以俯仰心疝衝冐死不知人中管主之心痛如針錐刺然谷及太谿主之心腹中卒痛石門主之心疝暴痛取足太隂心懊憹微痛煩逆灸心輸百壯心痛如錐刀刺氣結灸膈輸七壯心痛冷氣上灸龍頷百壯在鳩尾頭上行一寸半不可刺之心痛惡氣上脇急痛灸通谷五十壯在乳下二寸心痛暴絞急絶欲死灸神府百壯在鳩尾正心有忌心痛暴惡風灸巨闕百壯心痛堅煩氣結灸太倉百壯心痛灸臂腕横文三七壯又灸兩虎口白肉際七壯胷痺第七論法方灸論曰胷痺之病令人心中堅滿痞急痛肌中苦痺絞急如刺不得俯仰其胸前皮皆痛手不得犯胸中愊愊而滿短氣欬唾引痛咽塞不利習習如癢喉中乾燥時欲嘔吐煩悶白汗出或徹引背痛不治之數日殺人論曰夫脉當取太過與不及陽微隂弦即胸痺而痛所以然者責甚極虚故也今陽虚知在上焦所以胸痺心痛者以其人脉隂弦故也平人無寒熱短氣不足以息者實也枳實薤白桂枝湯治胸痺心中痞氣結在胸胸滿脇下逆搶心方枳實四枚薤白一斤桂枝一兩厚朴三兩栝蔞實一枚右五味㕮咀以水七升煮取二升半分再服仲景方厚朴用四兩薤白半斤水五升煮取二升半服之栝蔞湯治胸痺病喘息欬唾胸背痛短氣寸脉沈而遲關上小緊數方栝蔞實一枚半夏半升薤白一斤枳實二兩生薑四兩右五味㕮咀以白胾漿一斗煮取四升服一升日三仲景肘後不用生薑枳實半夏治胷痺候胷中愊愊如滿噎塞習習如癢喉中澀燥唾沫宜此方橘皮一斤生薑半斤枳實五枚右三味㕮咀以水五升煮取二升去滓分再服治中湯胷痺方茯苓湯治胸中氣塞短氣方茯苓三兩甘草一兩杏仁三十枚右三味㕮咀以水一斗三升煮取六升去滓為六服日三未瘥再合服通氣湯治胷滿短氣噎塞方半夏八兩生薑六兩橘皮三兩吴茱萸四十枚右四味㕮咀以水八升煮取三升分三服一方用桂二兩無橘皮細辛散治胷痺逹背短氣方細辛甘草各二兩枳實生薑栝蔞實乾地黄白术各三兩桂心茯苓各五兩右九味治下篩酒服方寸匕日三蜀椒散治胷痺逹背方蜀椒食茱萸各一兩桂心桔梗各三兩烏頭半兩䜴六銖右六味治下篩食後酒服方寸匕日三前胡湯治胷中逆氣心痛徹背少氣不食方前胡甘草半夏芍藥各二兩黄芩當歸人參桂心各一兩生薑三兩大棗三十枚竹葉一升右十一味㕮咀以水九升煑取三升分為四服又方前胡人參生薑半夏麥門冬甘草芍藥茯苓􅄳各三兩桂心黄芩當歸各一兩大棗三十枚右十三味㕮咀以水一斗四升煮取三升去滓分三服熨背散治胸背疼痛而悶方烏頭細辛附子羌活蜀椒桂心各五兩芎藭一兩六銖右七味治下篩帛褁微火炙令煖以熨背上取瘥乃止慎生冷如常法下氣湯治胸腹背閉滿上氣喘息方杏仁四七枚大腹㯽榔二七枚右二味㕮咀以童子小便三升煎取一升半分再服曽患氣發輒合服之㯽榔湯主破胸背惡氣音聲塞閉方㯽榔極大者四枚小者八枚右一味二品㕮咀以小兒尿二升半煮減一升去滓分三服頻與五劑永定灸法胸痺引背時寒間使主之胸痺心痛天井主之胸痺心痛不得息痛無常處臨泣主之胸痺心痛灸亶中百壯穴在鳩尾上一寸忌針胸脇滿心痛灸期門随年壯穴在第二肋端乳直下一寸半備急千金要方巻四十一
