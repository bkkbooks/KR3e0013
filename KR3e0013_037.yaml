body:
  text: 備急千金要方卷三十七唐孫思邈撰宋林億等校正肝臟方筋極第四論法方灸論曰夫六極者天氣通於肺地氣通於嗌風氣應於肝雷氣動於心穀氣感於脾素問榖作谷也雨氣潤於腎六經為川腸胃為海九竅為水注之氣所以竅應於五臟五臟邪傷則六腑生極故曰五臟六極也論曰凡筋極者主肝也肝應筋筋與肝合肝有病從筋生又曰以春遇病為筋痺筋痺不已復感於邪內舍於肝則陽氣入於內隂氣出於外若隂氣外出出則虛虛則筋虛筋虛則善悲色青蒼白見於目下若傷寒則筋不能動十指爪皆痛數好轉筋其源以春甲乙日得之傷風風在筋為肝虛風也若陽氣內發發則實實則筋實筋實則善怒嗌乾傷熱則咳咳則脅下痛不能轉側又腳下滿痛故曰肝實風也然則因其輕而掦之因其重而減之因其裒而彰之審其隂陽以别柔剛陽病治隂隂病治陽善治病者病在皮毛肌膚筋脈而治之次治六腑若在五臟則半死矣扁鵲云筋絶不治九日死何以知之手足爪甲青黑呼罵口不息筋應足厥隂足厥隂氣絶則筋縮引卵與舌筋先死矣橘皮通氣湯治筋實極則咳咳則兩脅下縮痛痛甚則不可轉動方橘皮四兩白术石膏各五兩細辛當歸桂心茯苓各三兩香豉一升右八味㕮咀以水九升煮取三升去滓分三服丹參散治筋實極則兩腳下滿滿而痛不得逺行腳心如割筋斷折痛不可忍者方丹參三兩芎藭杜仲續斷地骨皮二兩乾地黃當歸通草升麻麥門冬禹餘糧桂心一兩六銖麻黃各一兩十八銖牛膝二兩六銖甘草生薑切炒取焦乾牡蠣各二兩半右十七味治下篩為粗散以絹袋子盛二方寸匕以井花水二升煮數動袋子煮取一升頓服日二地黃煎治筋實極手足爪甲或青或黃或黑烏黯四肢筋急煩滿方生地黃汁三升生葛汁生玄參汁各一升大黃升麻各二兩麻黃梔子仁犀角各三兩石膏五兩芍藥四兩右十味㕮咀以水七升先煮七物取二升去滓次下地黃汁煎一兩沸次下葛汁煎取三升分三服日再五加酒治筋虛極筋痺好悲思顔色蒼白四肢噓吸腳手拘攣伸動縮急腹中轉痛方五加皮一斤薏苡仁半升枳刺二升大麻仁三升豬椒根皮丹參八兩乾薑芎藭五兩桂心當歸甘草三兩天雄秦椒白鮮通草各四兩右十五味㕮咀以絹袋盛清酒四斗漬春夏四日秋冬六七日初服六七合稍稍加以知為度人參酒治筋虛極則筋不能轉十指爪皆痛數轉筋或交接過度或病未平復交接傷氣內筋絶舌捲脣青引卵縮胻脈疼急腹中絞痛或便欲絶不能飲食方人參防風茯苓細辛秦椒黃耆當歸牛膝桔梗各一兩半乾地黃丹參薯蕷鍾乳礬石各二兩山茱茰芎藭各二兩白术麻黃各二兩半大棗三十枚五加皮一升生薑切炒乾烏麻碎各二升右二十二味㕮咀鍾乳别以小袋子盛清酒二斗半浸五宿溫服三合日再不知隨意增進一本無烏麻用杜仲一兩半治交接損卵縮筋攣方燒婦人月經衣灰服方寸匕治筋絶方熬蟹腦足髓內瘡中筋即續灸法勞冷氣逆腰髖冷痺腳屈伸難灸陽蹻一百壯在外踝下容爪腰背不便轉筋急痺筋攣灸第二十一椎隨年壯轉筋十指筋攣急不得屈伸灸腳外踝骨上七壯失精筋攣隂縮入腹相引痛灸中封五十壯在內踝前筋裏宛宛中又云灸下滿各五十壯老人加之小兒隨年壯法又云此二穴喉腫厥逆五臟所苦鼓脹悉以主之轉筋脛骨痛不可忍灸屈膝下廉橫筋上三壯腹脹轉筋灸臍上一寸二七壯堅癥積聚第五論法方灸論曰病有積有聚何以别之答曰積者隂氣也聚者陽氣也故隂沈而伏陽浮而動氣之所積名曰積氣之所聚名曰聚故積者五臟之所生聚者六腑之所成故積者隂氣也其始發有常處其痛一作病也不離其部上下有所終始左右有所窮已聚者陽氣也其始發無根本上下無所留止其痛無常處謂之聚也故以是别知積聚也經絡受病入於腸胃五臟積聚發伏梁息賁肥氣否氣奔豚積聚之始生至其已成奈何曰積之始生得寒乃生厥止乃成積人之善病腸中積者何以候之曰皮薄而不澤肉不堅而淖澤如此則腸胃傷惡惡則邪氣留止積聚乃作腸胃之積寒溫不次邪氣稍止至其畜積留止大聚乃起病有身體腰髀股胻皆腫環臍而痛是謂何病曰病名伏梁此風根也不可動動之為水溺澀之病小腹盛左右上下皆有根者伏梁也褁膿血居腸胃之外不可治治之每切按之致死此下則因隂必下膿血上則迫胃管生王氷云當作出膈俠胃管內癰此久病也難療居臍上為逆慎勿動亟奪其氣溢於大腸而著於肓肓之原在臍下故環臍而痛三台圓治五臟寒熱積聚臚脹腸鳴而噫食不生肌膚甚者嘔逆若傷寒寒瘧已愈令不復發食後服五丸飲多者十丸常服令人大小便調和長肌肉方大黃熬前胡各二兩硝石葶藶杏仁各一升厚朴附子細辛半夏各一兩茯苓半兩右十味為末蜜和搗五千杵丸如梧子大服五丸稍加至十丸以知為度五石烏頭圓治男子女人百病虛弱勞冷宿寒久癖及癥瘕積聚或嘔逆不下食並風濕諸病無不治之方鍾乳錬硫黃礬石紫石英赤石脂枳實甘草白术紫菀山茱茰防風白薇桔梗天雄皂莢細辛蓯蓉人參附子藜蘆各一兩六銖麥門冬乾薑蜀椒吳茱茰桂心各二兩半烏頭三兩厚朴逺志茯苓各一兩半當歸二兩棗膏五合乾地黃一兩十八銖右三十二味為末蜜和搗五千杵丸如梧子大酒服十丸日三稍加之烏頭圓治男子女人寒冷腹內積聚邪氣往來厥逆搶心心痛痺悶吐下不止婦人産後羸瘦方烏頭十五枚吳茱茰蜀椒乾薑桂心各二兩半乾地黃一兩半前胡細辛人參芎藭白术各一兩六銖皂莢紫菀白薇芍藥各十八銖右十五味為末蜜丸如梧子大酒下十丸日三稍加之以知為度治心腹疝瘕脅下及小腹滿堅痛有積寒氣入腹使人腹中冷發甚則上搶心氣滿飲食喜嘔方大黃茯苓各一兩半桂心黃芩吳茱茰細辛人參蜀椒乾薑各一兩六銖男髮灰半兩牡丹甘草芎藭蓯蓉蟅蟲各十八銖芍藥防葵虻蟲厚朴半夏各一兩右二十味為末蜜丸如梧子大服五丸日再漸加之恆山圓治脅下邪氣積聚往來寒熱如溫瘧方恆山蜀漆白薇桂心鮀甲白术附子鱉甲蟅蟲貝齒各一兩半蜚虻六銖右十一味為末蜜丸如梧子大以米泔清服五丸日三又方蒸鼠壤土尉之冷即易腹中切痛炒鹽半升令焦內湯中飲之大吐瘥若手足痛者燒青布內小口器中熏痛處神明度命圓治久患腹內積聚大小便不通氣上搶心腹中脹滿逆害飲食方大黃芍藥各二兩右二味為末蜜丸如梧子大服四丸日三不知可加至六七丸以知為度治萬病積聚方七八月收蒺藜子不限多少以水煮過熟取滓曝令乾搗篩蜜丸如梧子大酒服七丸以知為度其汁煎如飴服之陷胸湯治胸中心下結積飲食不消方栝蔞實大黃黃連各二兩甘草一兩右四味㕮咀以水五升煮取二升五合分三服太乙神明陷冰圓治諸疾破積聚心下支滿寒熱鬼注長病咳逆唾噫辟除衆惡殺鬼逐邪氣惡胸中結氣咽中閉塞有進有退繞臍惻惻隨上下按之跳手心中愠愠如有蟲狀毒注相染滅門雄黃油煮一日丹砂礬石當歸大黃各二兩巴豆一兩犀角鬼臼射罔藜蘆各一兩真珠附子各一兩半麝香牛黃人參各半兩蜈蚣蜥蜴各一枚芫青五枚烏頭八枚杏仁四十枚斑貓七枚樗雞地膽各三七枚桂心三兩右二十四味為末蜜和搗三萬杵丸如小豆大先食飲服二丸日二不知稍加仍以藥二丸安門戶上令衆惡不敢近家及視病人夜行獨宿服二丸令衆惡不敢近傷寒服之無不即瘥此方與尸疰篇方重蜥蜴圓治癥堅水腫蜚尸百注遁注尸注骨血相注惡氣鬼忤蟲毒邪氣往來夢寤存亡留飲結積虎狼所嚙猘犬所作鴆毒入人五臟服藥以消殺其毒食不消婦人邪鬼忤亦能遣之方蜥蜴蜈蚣各二枚地膽五十枚蟅蟲虻蟲杏仁各三十枚蜣蜋十四枚朴硝巴豆各一兩十八銖欵冬花犀角桃奴澤漆桑赤雞鬼督郵各十八銖芍藥虎骨各一兩半甘草乾薑各一兩甘遂一兩六銖右二十味為末别治巴豆杏仁如膏內藥末研調下蜜搗二萬杵丸如麻子先食飲服三丸日一不知加之不敢吐下者一丸有人風冷注癖堅二十年者得瘥此方與尸疰篇方重大五明狼毒圓治堅癖痞在人胸脅或在心腹方狼毒乾地黃各四兩附子大黃蓯蓉人參當歸細辛蜀椒五味子䕡茹熬令煙盡息各一兩半夏二兩乾薑桂心各一兩半芫花莾草厚朴防已旋覆花各半兩杏仁三十枚巴豆二十四枚右二十一味為末蜜和丸如梧子大服二丸日二夜一以知為度小狼毒圓治同前狼毒三兩附子旋覆花半夏䕡茹白附子各二兩右六味為末蜜和搗五千杵丸如梧子大飲服三丸加至十丸日三肘後方無半夏白附子䕡茹只有三味狼毒圓治堅癖方狼毒五兩半夏杏仁各三兩桂心四兩附子蜀椒細辛各二兩右七味為末别搗杏仁蜜和丸如大豆飲服二丸甘遂湯治暴堅久痞腹有堅方甘遂黃芩芒硝桂心細辛各一兩大黃三兩右六味㕮咀以水八升煮取二升半分三服治卒暴癥腹中有物堅如石痛如斫刺晝夜啼呼不治百日必死牛膝二斤㕮咀曝令乾以酒一斗浸之密塞器口煎取半服半升一服便吐去宿食神效治卒暴癥方搗碎商陸根蒸之以新布籍腹以藥鋪著其上以衣物覆其上冷易之數日用之旦夕勿息又方蒜十斤取五月五日户上者去皮桂心一尺二寸竈中黃土如雞子大一枚右三味合搗以淳苦酒和塗布上以掩病處不過三日消凡蒜亦佳肘後方不用桂野葛膏治卒暴癥方野葛一尺當歸附子雄黃油煮一日細辛各一兩蜀椒半兩烏頭二兩巴豆一百枚右八味㕮咀以大醋浸一宿豬膏二斤煎附子色黃去滓內雄黃粉攪至凝傳布上以掩癥處復以油重布上復著十重紙以尉斗盛火著其上常令熱日三夜二須膏乾為度消石大圓治十二癥瘕及婦人帶下絶産無子并欲服寒食散而腹中有癥瘕實者當先服大丸下之後與寒食散大丸不下水榖但下病耳不令人困方消石六兩朴硝亦得大黃八兩人參甘草各二兩右四味為末以三年苦酒三升置銅器中以竹筯拄器中一升作一刻凡三升作三刻以置火上先內大黃常攪不息手使微沸盡一刻乃內餘藥又盡一刻餘一刻極微火使可丸如雞子中黃凡合藥當先齋戒一宿勿令小兒女人奴婢等見之欲下病者用二丸若不能服大丸者可分作小丸然亦不可過四丸也丸欲令大不欲令細能不分為善若人羸者可少與強者可二十日五服和調半日乃下若婦人服之下者或如雞肝或如米汁正赤黑或一升或三升下後慎風冷作一杯粥食之然後作羮臛自養如産婦法六月則有子禁生魚豬肉辛菜若寒食散者自如藥法不與此同日一服土爪圓治諸藏寒氣積聚煩滿熱飲食中蠱毒或食生物及水中蟲卵生入腹而成蟲蛇若為魚鱉留飲宿食婦人産瘕帶下百病隂陽不通利大小便不節絶傷墮落寒熱交結脣口焦黑身體消瘦嗜卧少食多魘産乳胞中餘疾股裏熱少腹中急結痛引隂中方土瓜根桔梗各半升末杏仁一升大黃一斤蒸二斗末下曝乾右四味為末蜜丸如梧子大空腹飲服三丸日三不知加之以知為度治凡所食不消方取其餘類燒所末酒服方寸匕便吐去宿食即瘥有食桃不消作病者以時無桃就樹間得稿桃燒服之登時吐病出甚良治卒食不消欲成癥積方煎艾汁如飴取半升作一服便刺吐去宿食神良古今録驗方白艾五尺圍一束薏苡根一大把二味同煎治食魚肉等成癥結在腹內并諸毒氣方狗屎五升燒末綿褁以酒一斗浸再宿濾取清分十服日三三日令盡隨所食癥結即出治雜食瘀實不消心腹堅痛方以水三升煮白鹽一升令消分三服刺吐去所食并治暴癥治癥堅心下有物大如杯不得食食則腹滿心腹絞痛方葶藶子大黃各二兩澤漆四兩右三味别研葶藶為膏其二味搗五百杵入蜜更搗千杵和丸如梧子大服五丸不知加之日三治小腹堅大如盤胸中滿脹食不消化婦人瘦瘠方以暖水服髮灰一方寸匕日再并灸肋端又方飲服上好麴末方寸匕日三又灸三焦輸隨年壯瘥治伏梁氣方白馬尿銅器中盛取每旦服一升治癥瘕方槲樹白皮煎令可丸服之取知病動若下減之椒尉方治患癥結病及瓜病似瓜形日月形或在臍左右或在臍上下或若鱉在左右肋下或當心如合子大法先針其足以椒尉之取一新盆子受一斗者底鑽一百二十孔孔上著椒三合上著一重紙紙上著冷灰一升冷灰上著熱灰半升上著剛炭火一斤經一食頃盆底熱徹當病上初安氊一重即安火盆火盆大熱以漸更加一重若火更熱不可忍加至三重暫歇進一口冷飲還上火消二分許即停止經三日勿著及至七日決得頓瘥然後食美食自補若小不瘥作露宿丸服之方見别卷治腹中積癥方葶藶子一升熬以酒五升浸七日每服三合日三治蛇癥方白馬尾切長五分以酒服方寸匕大者自出更服二分者一方寸匕中者亦出更服三分者一方寸匕小者復出不可頓作一服殺人馬尾一本作馬毛大黃湯治蛇癥方大黃茯苓各半兩一本作黃芩烏賊骨二枚皂莢六枚如豬牙者甘草如指大者一尺芒硝如雞子大一枚右六味㕮咀以水六升煮三五沸去滓內消適寒溫盡服之十日一劑作如上法宿勿食平旦空腹服病根當下也治鱉癥腹堅硬腫起大如盆眠臥不得方食中得病為鱉癥在心下堅強取藍一斤搗水三升絞取汁每服一升日二又方蒴藋根白皮一握研取汁以水和頓服之又方白馬尿一升雞子三枚取白合煎取二合空腹頓服不移時當吐病出又方雞屎一升炒令黃取五合以酒一升浸取半搗為末以所浸酒服方寸匕日二服三日中作一劑治蛟龍病開皇六年三月八日有人食芹得之其人病發似癲癎面色青黃因食寒食餳過多便吐出狀似蛟龍有頭而有尾服寒食餳三斗大驗山野人有嚙蝨在腹生長為蝨癥病治之方故敗箆子故敗梳各一枚右二件各破為兩分各取一分燒為末又取一分以水五升煮取一升服上件燒末頓服即出常欲食米若不得米則胸中清水出為米癥治之方雞屎一升白米五合右二味合炒令米焦搗末以水二升頓服取盡須臾吐出病如研米若無米當出痰自此永憎米不復食之矣人有思肉不已食訖復思者為肉癥治之方空腹飲白馬尿三升吐有肉出不出必死食中有髮不覺因食而入久即胸間如有蟲狀上下去來惟欲飲油一日之中乃至三二升不欲飲食者為髮癥方以油一升以香澤煎之大勞貯之安病人頭邊令口鼻臨油上勿令得飲傳鼻而令有香氣當呌喚取飲不得與之必當疲極大睡其髮癥當從口出令一人專守視之并備石灰一裹見癥出以灰粉手捉癥抽出及盡即是髮也初從腹中出形如不流水中濃菜隨髮長短形亦如之又方酒三升煮豬脂二升三沸服一升日二白馬尿服之亦佳無白馬尿白牛尿亦得灸法癥瘕灸內踝後宛宛中隨年壯又灸氣海百壯久冷及婦人癥瘕腸鳴泄利繞臍絞痛灸天樞百壯三報穴在俠臍兩邊各二寸勿針積聚堅滿灸脾募百壯穴在章門季肋端心下堅積聚冷脹灸上管百壯三報穴在巨闕下一寸積聚堅大如盤冷脹灸胃管二百壯三報穴在巨闕下二寸備急千金要方卷三十七
