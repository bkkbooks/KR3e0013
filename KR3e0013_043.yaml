  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0013_WYG_043-1a, image: WYG0735/WYG0735-0438a.png}
body:
  text: 備急千金要方卷四十三唐孫思邈撰宋林億等校正小腸腑方小腸腑脉論第一論曰小腸腑者主心也舌是其候也心合於小腸小腸者受盛之腑也號監倉吏重二斤十四兩長二丈四尺廣二寸四分難經甲乙云長三丈二尺大二寸半徑八分分之少半也後附脊左回疊積其注於回腸者外傅臍上回運環反十六曲常留水榖二斗四升其一斗二升是水一斗二升是榖應主二十四氣也難經云十六曲盛榖二斗四升水六升三合合之大半甲乙云受三斗三合合之大半脣厚人中長以候小腸小腸病者小腹痛腰脊控睪而痛時窘之復耳前熱若寒甚獨肩上熱及手小指次指之間熱若脉滑者脉經作陷甲乙亦同此其候也小腹控睪引腰脊上衝心邪在小腸者連睪系屬於脊貫肝肺絡心系氣盛則厥逆上衝腸胃動肝肺散於肓結於臍故取之肓原以散之刺太隂以與之取厥隂以下之取巨虛下廉以去之按其所過之經以調之左手關前寸口陽絶者無小腸脉也苦臍痺小腹中有疝瘕王月即冷上搶心刺手心主治隂心主在掌後橫文中入一分左手關前寸口陽實者小腸實也苦心下急熱痺小腸內熱小便赤黃刺手太陽治陽手太陽在手小指外側本節陷中小腸有寒其心下重便膿血有熱必痔小腸有宿食常暮發熱明日復止小腸脹者小腹䐜脹引腹痛心前受病移於小腸心咳不已則氣與咳俱出厥氣客於小腸夢聚邑街衢心應皮皮厚者脉厚脉厚者小腸厚皮薄者脉薄脉薄者小腸薄皮緩者脉緩脉緩者小腸大而長皮薄而脉沖小者小腸小而短諸陽經脉皆多紆屈者小腸結扁鵲云手少隂與太陽為表裏所以表清裏濁清實濁虛故食下腸實而胃虛故腑實而不滿實則傷熱熱則口張口為之生瘡虛則傷寒寒則便泄膿血或發裹水其根在小腸先從腹起方見治水篇中小腸絶不治六日死何以知之髮直如乾麻不得屈伸白汗不止手太陽之脉是動則嗌痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黃頰頷腫頸肩臑肘臂外後亷痛經脉支别已見心臟部中小腸虛實第二脉法方灸小腸實熱左手寸口人迎以前脉陽實者手太陽經也病苦身熱來去汗不出心中煩滿身重口中生瘡名曰小腸實熱也柴胡澤㵼湯治小腸熱脹口瘡方柴胡澤㵼橘皮一用桔梗黃芩旋復花枳實升麻芒硝各三兩生地黃切一升右九味㕮咀以水一斗煮取三升去滓下芒硝分三服大黃圓治小腸熱結滿不通方大黃芍藥葶藶各二兩大㦸朴硝各三兩杏仁五十枚巴豆七枚右七味為末蜜和丸如梧子大飲服大人七凡小兒二三丸日二熱去日一服灸法小腸熱滿灸隂都隨年壯穴俠中管兩邊相去一寸是也小腸泄痢膿血灸魂舍一百壯小兒減之穴在俠臍兩邊相去各一寸翼云相去一寸又灸小腸輸七壯小腸虛寒左手寸口人迎以前脉陽虛者手太陽經也病苦顱際偏頭痛耳頰痛名曰小腸虛寒也治小腸虛寒痛下赤白腸滑腸中懊憹補之方乾薑三兩當歸黃蘗地榆各四兩黃連阿膠各二兩石榴皮三枚右七味㕮咀以水七升煮取二升五合去滓下膠煮取膠煬盡分三服舌論第三論曰凡舌者心主小腸之候也舌重十兩長七寸廣二寸半善用機衡能調五味也凡有所啖若多食鹹則舌脉凝而變色多食苦則舌皮槁而外毛焦枯多食辛則舌筋急而爪枯乾多食酸則舌肉肥而脣揭多食甘則舌根痛而外髮落又曰心欲苦肺欲辛肝欲酸脾欲甘腎欲鹹此五味內合五臟之氣也若臟熱則舌生瘡引脣揭赤若腑寒則舌本縮口噤脣青寒宜補之熱宜瀉之不寒不熱依臟腑調之舌縮口噤脣青升麻煎主之方見别卷風眩第四叙禁論灸法方前卷既有頭面風方風眩不當分出思邈蓋以此是徐嗣伯方不可以餘方相雜故此特立風眩方條專出徐氏方焉徐嗣伯曰余少承家業頗習經方名醫要治備聞之矣自謂風眩多途諸家未能必驗至於此術鄙意偏所䆒也少來用之百無遺䇿今年將衰暮恐奄忽不追故顯明證論以貽於後云爾夫風眩之病起於心氣不定胸上蓄實故有高風面熱之所為也痰熱相感而動風風心相亂則悶瞀故謂之風眩大人曰癲小兒則為癎其實則一此方療治萬無不愈但恐證候不審或至差違大都忌食十二屬肉而賁豚為患發多氣急氣急則死不可救故此一湯是輕重之宜勿因此便謂非患所治風眩湯散丸煎凡有十方凡人初發宜急與續命湯也困急時但度灸穴便火針針之無不瘥者初得針竟便灸最良灸法次列於後余業之以來三十餘年所救活者數十百人無不瘥矣後人能曉此方幸勿參以餘術焉續命湯治風眩發則煩悶無知口沫出四體角弓目反上口噤不得言方竹瀝一升二合生地黃汁一升龍齒四兩生薑防風麻黃各四兩防已三兩附子三分石膏七兩桂心二兩右十味㕮咀以水一斗煮取三升分三服有氣加附子作一兩紫蘇子五合橘皮半兩已服續命湯口開四肢尚未好定而心中尚不除者紫石湯主之方見後紫石煮散是也賁豚湯治氣奔急欲絶方吳茱萸一升石膏人參半夏芎藭各三分桂心芍藥生薑各四分生葛根茯苓各十分當歸四兩李根皮一斤右十二味㕮咀以水七升清酒八升煮取三升分三服防已地黃湯治言語狂錯眼目霍霍或言見鬼精神昏亂方防已甘草各二兩桂心防風各三兩生地黃五斤别切勿合藥漬疾小輕用二斤右五味㕮咀以水一升漬一宿絞汁著一面取滓著竹簀上以地黃著藥滓上於五斗米下蒸之以銅器盛取汁飯熟以向前藥汁合絞取之分再服薯蕷湯治心中驚悸而四肢緩頭面熱心胸痰滿頭目眩冒如欲搖動方薯蕷麥門冬人參各四兩生地黃前胡芍藥各八分枳實逺志生薑各三分茯苓茯神各六分半夏五分甘草黃芩竹葉各二分秫米三合右十六味㕮咀取江水高舉手揚三百九十下量取三斗煮米減一斗內半夏復減九升去滓下藥煮取四升分四服無江水處以千里東流水代之校手令上頭也秦中無江水涇渭水可用諸葛灌劒由尚取之防風湯服前湯後四體尚不凉冷頭目眩轉者服之此湯大勝宜長將服但藥中小小消息隨冷暖耳仍不除瘥者依此方防風石膏人參赤石脂白石脂生薑龍骨寒水石茯苓各三分桂心二分紫石一分右十一味㕮咀以水八升煮取三升分三服凡用井花水者取清淨也今用江水無泥又無砂穢源泉逺涉順勢歸海不逆上流用以治頭必歸於下故也薯蕷煎方薯蕷二十分甘草十四分澤瀉人參黃芩各四分當歸白斂桂心防風各三分麥門冬三分山茱萸桔梗芍藥紫菀大豆黃卷乾地黃白术芎藭乾薑蜀椒各二分已上二十味並用搗篩生地黃十八斤搗絞取汁煎令餘半麞鹿雜髓鹿角膠各八兩大棗八十枚麻子仁研蜜各三升桑根皮五升忌岡上自出土者大毒大忌近籬屋垣墻下溝瀆邊者皆不中用也右二十七味以清酒二斗四升煮桑白皮麻子棗得一斗去滓次下地黃汁膠髓蜜煎減半內前諸末併煎令可丸如雞子黃大飲服一枚日三稍加至三丸薯蕷圓治頭目眩冒心中煩鬱驚悸狂癲方薯蕷二十八分甘草三十分鹿角膠大豆黃卷桂心各七分乾地黃神麴當歸人參各十分麥門冬防風黃芩芍藥白术各六分柴胡桔梗茯苓杏仁芎藭各五分白斂乾薑各三分大棗一百枚取膏右二十二味為末合白蜜棗膏丸如彈丸先食服一丸日三天雄散治頭目眩暈屋轉旋倒方天雄防風芎藭人參獨活桂心葛根各三分莽草四分白术逺志薯蕷茯神山茱萸各六分右十三味治下篩先食以菊花酒服方寸匕日二漸加至三匕以知為度菊花酒法九月九日取鄧州甘菊花曝乾作末以米饙中蒸作酒人參圓治心中時恍惚不定方上黨人參鬼臼鐵精牛黃丹砂雄黃大黃菖蒲防風各一兩蜥蜴赤足蜈蚣右十一味為末蜜丸如梧子大用前菊花酒服七丸日三夜一稍加之合藥勿用青紙忌見婦人青衣人喪孝不具足人及濁穢六畜雞犬鼠等灸法其法以繩橫度口至兩邊既得口度之寸數便以其繩一頭更度鼻盡其兩邊兩孔間得鼻度之寸數中屈之取半合於口之全度中屈之先覓頭上回髮當回髮灸之以度度四邊左右前後當繩端而灸前以面為正並依年壯多少一年凡三灸皆須瘡瘥又灸壯數如前若連灸火氣引上其數處回髮者則灸其近當鼻也若回髮近額者亦宜灸若指面為瘢則闕其面處然病重者亦不得計此也食禁虎兔龍蛇牛馬猪羊雞犬猴鼠右十二相屬肉物皆不得食及以為藥牛黃龍骨齒用不可廢備急千金要方卷四十三
