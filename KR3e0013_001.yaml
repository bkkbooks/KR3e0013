body:
  text: 備急千金要方卷一唐孫思邈撰宋林億等校正論大醫習業第一凡欲為大醫必須諳素問甲乙黃帝針經明堂流注十二經脉三部九候五臟六腑表裏孔穴本草藥對張仲景王叔和阮河南范東陽張苖靳邵等諸部經方又須妙解隂陽祿命諸家相法及灼龜五兆周易六壬並須精熟如此乃得為大醫若不爾者如無目夜遊動至顛殞次須熟讀此方尋思妙理留意鑽研始可與言於醫道者矣又須涉獵羣書何者若不讀五經不知有仁義之道不讀三史不知有古今之事不讀諸子覩事則不能默而識之不讀內經則不知有慈悲喜捨之德不讀莊老不能任真體運則吉凶拘忌觸塗而生至於五行休王七耀天文並須探賾若能具而學之則於醫道無所滯礙而盡善盡美者矣論大醫精誠第二張湛曰夫經方之難精由來尚矣今病有內同而外異亦有內異而外同故五臟六腑之盈虛血脉榮衛之通塞固非耳目之所察必先診候以審之而寸口關尺有浮沉弦緊之亂俞穴流注有高下淺深之差肌膚筋骨有厚薄剛柔之異唯用心精微者始可與言于兹矣今以至精至微之事求之于至粗至淺之思豈不殆哉若盈而益之虛而損之通而徹之塞而壅之寒而冷之熱而溫之是重加其疾而望其生吾見其死矣故醫方卜筮藝能之難精者也既非神授何以得其幽微世有愚者讀方三年便謂天下無病可治及治病三年乃知天下無方可用故學者必須博極醫源精勤不倦不得道聽塗說而言醫道已了深自誤哉凡大醫治病必當安神定志無欲無求先發大慈惻隱之心誓願普救含靈之苦若有疾厄來求救者不得問其貴賤貧富長幼妍媸怨親善友華夷愚智普同一等皆如至親之想亦不得曕前顧後自慮吉凶護惜身命見彼苦惱若已有之深心悽愴勿避嶮巇晝夜寒暑饑渴疲勞一心赴救無作工夫形迹之心如此可為蒼生大醫反此則是含靈巨賊自古名賢治病多用生命以濟危急雖曰賤畜貴人至于愛命人畜一也損彼益已物情同患况於人乎夫殺生求生去生更逺吾今此方所以不用生命為藥者良由此也其虻蟲水蛭之屬市有先死者則市而用之不在此例只如雞卯一物以其混沌未分必有大段要急之處不得已隱忍而用之能不用者斯為大哲亦所不及也其有患瘡痍下痢臭穢不可瞻視人所惡見者但發慚愧悽憐憂恤之意不得起一念蒂芥之心是吾之志也夫大醫之體欲得澄神內視望之儼然寬裕汪汪不皎不昧省病診疾至意深心詳察形候纎毫勿失處判針藥無得參差雖曰病冝速救要須臨事不惑唯當審諦覃思不得於性命之上率爾自逞俊快邀射名譽甚不仁矣又到病家縱綺羅滿目勿左右顧盼絲竹湊耳無得似有所娛珍羞迭薦食如無味醽醁兼陳看有若無所以爾者夫一人向隅滿堂不樂而況病人苦楚不離斯須而醫者安然歡娛傲然自得兹乃人神之所共耻至人之所不為斯蓋醫之本意也夫為醫之法不得多語調笑談謔喧譁道說是非議論人物衒耀聲名訾毁諸醫自矜已德偶然治瘥一病則昻頭戴面而有自許之貌謂天下無雙此醫人之膏肓也老君曰人行陽德人自報之人行隂德鬼神報之人行陽惡人自報之人行隂惡鬼神害之尋此二途隂陽報施豈誣也哉所以醫人不得恃已所長專心經略財物但作救苦之心於冥運道中自感多福者耳又不得以彼富貴處以珍貴之藥令彼難求自衒功能諒非忠恕之道志存救濟故亦曲碎論之學者不可恥言之鄙俚也論治病略例第三夫天布五行以植萬類人禀五常以為五臟經絡腑輸隂陽㑹通𤣥冥幽微變化難極易曰非天下之至賾其孰能與于此觀今之醫不念思求經旨以演其所知各承家伎始終循舊省病問疾務在口給相對斯須便處湯藥按寸不及尺握手不及足人迎趺陽三部不參動數發息不滿五十短期未知決診九候曽無髣佛明堂闕庭盡不見察所謂窺管而已夫欲視死别生固亦難矣此皆醫之深戒病者可不謹以察之而自防慮也古來醫人皆相嫉害扁鵲為秦太醫令李􅀈所害即其事也一醫處方不得使别醫和合脫或私加毒藥令人增疾漸以致困如此者非一特須慎之寧可不服其藥以任天真不得使愚醫相嫉賊人性命甚可哀傷夫百病之本有中風傷寒寒熱溫瘧中惡霍亂大腹水腫腸澼下痢大小便不通賁豚上氣咳逆嘔吐黃疸消渴留飲癖食堅積癥􅛎驚邪癲癎鬼疰喉痺齒痛耳聾目盲金瘡踒折癰腫惡瘡痔瘻瘤癭男子五勞七傷虛乏羸瘦女子帶下崩中血閉隂蝕蟲蛇蠱毒所傷此皆大略宗兆其間變動枝葉各依端緒以取之又有冷熱勞損傷飽房勞驚悸恐懼憂恚怵惕又有産乳落胎墮下瘀血又有貪餌五石以求房中之樂此皆病之根源為患生諸枝葉也不可不知其本末但尚醫說男女長幼之病有半與病源相附㑹者便可服藥也男子者衆陽所歸常居于燥陽氣逰動强力施泄便成勞損損傷之病亦以衆矣若比之女人則十倍易治凡女子十四已上則有月事月事來日得風冷濕熱四時之病相協者皆自說之不爾與治誤相觸動更增困也處方者亦應問之凡用藥皆隨土地所冝江南嶺表其地暑濕其人肌膚薄脆腠理開疏用藥輕省關中河北土地剛燥其人皮膚堅硬腠理閉塞用藥重復世有少盛之人不避風濕觸犯禁忌暴竭精液雖得微疾皆不可輕以利藥下之一利大重竭其精液困滯著牀動經年月也凡長宿病宜服利湯不須盡劑候利之足則止病源未除者於後更合耳稍有氣力堪盡劑則不論也病源須服利湯取除者服利湯後宜將丸散時時助之凡病服利湯得瘥者此後慎不中服補湯也若得補湯病勢還復成也更重瀉之則其人重受弊也若初瘥氣力未甚平復者但消息之須服藥者當以平藥和之夫常患之人不妨行走氣力未衰欲將補益冷熱隨冝丸散者可先服利湯瀉除胸腹中壅積痰實然後可服補藥也夫極虛勞應服補湯者不過三劑即止若治風病應服治風湯者皆非三五劑可止也自有滯風洞虛即服十數劑乃至百餘日可瘥也故曰實即瀉之虛則補之夫二儀之內隂陽之中唯人最貴人者禀受天地中和之氣法律禮樂莫不由人人始生先成其精精成而腦髓生頭圓法天足方象地眼目應日月五臟法五星六腑法六律以心為中極大腸長一丈二尺以應十二時小腸長二丈四尺以應二十四氣身有三百六十五絡以應一歲人有九竅以應九州天有寒暑人有虛實天有刑德人有愛憎天有隂陽人有男女月有大小人有長短所以服食五榖不能將節冷熱醎苦更相掁觸共為攻擊變成疾病凡醫診候固是不易又問而知之别病深淺名曰巧醫仲景曰凡欲和湯合藥針灸之法宜應精思必通十二經脉辨三百六十孔穴榮衛氣行知病所在宜治之法不可不通古者上醫相色色脉與形不得相失黑乘赤者死赤乘青者生中醫聽聲聲合五音火聞水聲煩悶千驚木聞金聲恐畏相刑脾者土也生育萬物回助四傍善者不見死則歸之太過則四肢不舉不及則九竅不通六識閉塞猶如醉人四季運轉終而復始下醫診脉知病源由流轉移動四時逆順相害相生審之臟腑之微此乃為妙也論診候第四夫欲理病先察其源候其病機五臟未虛六腑未竭血脉未亂精神未散服藥必活若病已成可得半愈病勢已過命將難全夫診候之法常以平且隂氣未動陽氣未散飲食未進經脉未盛絡脉調均氣血未亂精取其脉知其逆順非其時不用也深察三部九候而明告之古之善為醫者上醫醫國中醫醫人下醫醫病又曰上醫聽聲中醫察色下醫診脉又曰上醫醫未病之病中醫醫將病之病下醫醫已病之病若不加心用意於事混淆即病者難以救矣何謂三部寸關尺也上部為天肺也中部為人脾也下部為地腎也何謂九候部各有三合為九候上部天兩額動脉主頭角之氣也上部地兩頰動脉主口齒之氣也上部人耳前動脉主耳目之氣也中部天手太隂肺之氣也中部地手陽明胸中之氣也中部人手少隂心之氣也下部天足厥隂肝之氣也下部地足少隂腎之氣也下部人足太隂脾之氣也合為九候夫形盛脉細少氣不足以息者死形瘦脉大胸中多氣者死形氣相得者生參伍不調者病三部九候皆相失者死愚醫不通三部九候及四時之經或用湯藥倒錯針灸失度順方治病更增他疾遂致滅亡哀哉蒸民枉死者半可謂世無良醫為其解釋經說地水火風和合成人凡人火氣不調舉身蒸熱風氣不調全身彊直諸毛孔閉塞水氣不調身體浮腫氣滿喘粗土氣不調四肢不舉言無音聲火去則身冷風止則氣絶水竭則無血土散則身裂然愚醫不思脉道反治其病使藏中五行共相尅切如火熾燃重加其油不可不慎凡四氣合德四神安和一氣不調百病一生四神動作四百四病同時俱發又云一百一病不治自愈一百一病須治而愈一百一病雖治難愈一百一病真死不治張仲景曰欲療諸病當先以湯蕩滌五臟六腑開通諸脉治道隂陽破散邪氣潤澤枯朽悅人皮膚益人氣血水能淨萬物故用湯也若四肢病久風冷發動次當用散散能逐邪風氣濕痺表裏移走居無常處者散當平之次當用丸丸藥者能逐風冷破積聚消諸堅癖進飲食調和榮衛能參合而行之者可謂上工故曰醫者意也又曰不須汗而彊汗之者出其津液枯竭而死須汗而不與之汗者使諸毛孔閉塞令人悶絶而死又不須下而彊下之者令人開腸洞泄不禁而死須下而不與下之者使人心內懊憹脹滿煩亂浮腫而死又不須灸而彊與灸者令人火邪入腹干錯五臟重加其煩而死須灸而不與灸之者令人冷結重凝久而彌固氣上衝心無地消散病篤而死黃帝問曰淫邪泮衍奈何岐伯對曰正邪從外襲內而未有定舍及淫於藏不得定處與榮衛俱行而與魂魄飛揚使人卧不得安而喜夢也凡氣淫於腑則有餘於外不足於內氣淫於臟則有餘於內不足于外問曰有餘不足有形乎對曰隂盛則夢涉大水而恐懼陽盛則夢蹈大火而燔灼隂陽俱盛則夢相殺毁傷上盛則夢飛揚下盛則夢墮墜甚飽則夢與巢源云夢行甚饑則夢取巢源云夢卧肝氣盛則夢怒肺氣甚則夢恐懼哭泣心氣盛則夢喜笑及恐畏脾氣盛則夢歌樂體重手足不舉腎氣盛則夢腰脊兩解而不屬凡此十一盛者至而瀉之立已厥氣客于心則夢見丘山煙火客于肺則夢飛揚見金鐵之器竒物客于肝則夢見山林樹木客于脾則夢見邱陵大澤壞屋風雨客于腎則夢見臨淵沒居水中客於膀胱則夢見逰行客于胃則夢見飲食客于大腸則夢見田野客于小腸則夢見聚邑街衢客于膽則夢見鬪訟自刳客于隂器則夢交接鬪內客于項則夢見斬首客于跨則夢見行走而不能前進及池渠穽窊中居客于股則夢見禮節拜跪客於胞䐈則夢見溲溺便利凡此十五不足者至而補之立已善診候者亦可深思此意乃盡善盡美矣史記曰病有六不治驕恣不論于理一不治也輕身重財二不治也衣食不能適三不治也隂陽并藏氣不定四不治也形羸不能服藥五不治也信巫不信醫六不治也生候尚存形色未改病未入腠裏針藥及時能將節調理委以良醫病無不愈論處方第五夫療寒以熱藥療熱以寒藥飲食不消以吐下藥鬼疰蠱毒以蠱毒藥癰腫瘡瘤以瘡瘤藥風濕以風濕藥風勞氣冷各隨其所冝雷公云藥有三品病有三階藥有甘苦輕重不同病有新久寒溫亦異重熱膩滑鹹酢藥石飲食等於風雨為治餘病非對輕冷粗澀甘苦藥草飲食等于熱病為治餘病非對輕熱辛苦淡藥飲食等於冷病為治餘病非對其大綱略顯其源流自餘覩狀可知臨事制宜當識斯要藥對曰夫衆病積聚皆起于虛虛生百病積者五臟之所積聚者六腑之所聚如斯等疾多從舊方不假增損虛而勞者其弊萬端宜應隨病增減古之善為醫者皆自採藥審其體性所主取其時節早晚早則藥勢未成晚則盛勢已歇今之為醫不自採藥且不委節氣早晚只共採取用以為藥又不知冷熱消息分兩多少徒有療病之心永無必愈之效此實浮惑聊復審其冷熱記其增損之主耳虛勞而苦頭痛復熱加枸杞萎𬎼虛而吐加人參虛而不安亦加人參虛而多夢紛紜加龍骨虛而多熱加地黃牡礪地膚子甘草虛而冷加當歸芎藭乾薑虛而損加鍾乳棘刺肉蓯蓉巴㦸天虛而大熱加黃芩天門冬虛而多忘加茯神逺志虛而驚悸不安加龍齒紫石英沙參小草冷則用紫石英小草若客熱即用沙參龍齒不冷不熱無用之虛而口乾加麥門冬知母虛而吸吸加胡麻覆盆子柏子仁虛而多氣兼微咳加五味子大棗虛而身彊腰中不利加磁石杜仲虛而多冷加桂心吳茱萸附子烏頭虛而小便赤加黃芩虛而客熱加地骨皮白术黃耆虛而冷用隴西黃耆虛而痰復有氣加生薑半夏枳實虛而小腸利加桑螵蛸龍骨雞肶胵虛而小腸不利加茯苓澤瀉虛而痢白加厚朴諸藥無有一一歷而用之但據體性冷熱的相主對聊叙增損之一隅入處方者宜準此論用藥第六上藥一百二十種為君主養命以應天無毒多服久服不傷人欲輕身益氣不老延年者本上經中藥一百二十種為臣主養性以應人有毒無毒斟酌其冝欲遏病補虛羸者本中經下藥一百二十五種為佐使主以應地多毒不可久服欲除寒熱邪氣破積聚愈疾者本下經三品合三百六十五種法三百六十五度每一度應一日以成一歲倍其數合七百三十名也凡藥有君臣佐使以相宣攝合和者宜用一君二臣三佐五使又可一君三臣九佐使也又有隂陽配合子母兄弟根莖花實草石骨肉有單行者有相須者有相使者有相畏者有相惡者有相反者有相殺者凡此七情合和之時用意審視當用相須相使者良勿用相惡相反者若有毒冝制可用相畏相殺者不爾勿合用也又有酸鹹甘苦辛五味又有寒熱溫凉四氣及有毒無毒隂乾曝乾採造時月生熟土地所出真僞陳新並各有法其相使相畏七情列之如左處方之日宜深而䆒之玉石上部玉泉畏欵冬花玉屑惡鹿角丹沙惡磁石畏鹹水曽青畏莵絲子石膽水英為使畏牡桂菌桂芫花辛夷白薇雲母澤瀉為使畏駝魚及流水惡徐長卿朴硝畏麥句薑鍾乳蛇牀子莵絲子為使惡牡丹𤣥石牡䝉畏紫石英蘘草消石火為使惡苦參苦菜畏女菀硭硝石韋為使惡麥句薑礬石甘草為使惡牡礪滑石石韋為使惡曽青白石英惡馬目毒公紫石英長石為使畏扁青附子不欲鮀甲黃連麥句薑赤石脂惡大黃畏芫花黃石脂曽青為使惡細辛畏蜚蠊扁青附子白石脂燕糞為使惡松枝畏黃芩太一餘糧杜仲為使畏鐵落菖蒲及貝母玉石中部水銀畏磁石殷孽惡防已畏木孔公孽木蘭為使惡細辛凝水石畏地榆解巴豆毒陽起石桑螵蛸為使畏莵絲子惡澤瀉菌桂雷丸蛇蛻皮石膏雞子為使惡莾草毒公磁石柴胡為使畏黃石脂惡牡丹莾草𤣥石惡松脂柏子仁菌桂理石滑石為使畏麻黃玉石下部青琅玕得水銀良畏雞骨殺錫毒礜石得火良棘針為使惡虎掌毒公鶩屎細辛畏水特生礜石得火良畏水方解石惡巴豆代赭畏天雄大鹽漏蘆為使草藥上部六芝薯蕷為使得髮良惡恆山畏扁青菌陳天門冬垣衣地黃為使畏曽青麥門冬地黃車前為使惡欵冬苦瓠畏苦參青蘘术防風地榆為使女萎萎蕤畏鹵鹹乾地黃得麥門冬清酒良惡貝母畏蕪荑菖蒲秦芃秦皮為使惡地膽麻黃澤瀉畏海蛤文蛤薯蕷紫芝為使惡甘遂逺志得茯苓冬葵子龍骨良殺天雄附子毒畏真珠蜚蠊藜蘆薺蛤菊花木狗杞根桑根白皮為使人參茯苓為使惡疏反藜蘆甘草术乾漆苦參為使惡逺志反甘遂大㦸芫花海藻石斛陸英為使惡凝水石巴豆畏白殭蠶雷丸牛膝惡熒火龜甲陸英畏白前獨活蠡實為使柴胡半夏為使惡皂莢畏女菀藜蘆細辛曽青棗根為使惡狼毒山茱萸黃耆畏滑石消石反藜蘆菴䕡子荆子薏苡仁為使惡細辛乾薑菥蓂子得荆子細辛良惡乾薑苦參龍膽貫衆為使惡防葵地黃莵絲子得酒良薯蕷松脂為使惡雚菌巴㦸天覆盆子為使惡朝生雷丸丹參蒺藜子烏頭為使防風惡乾薑藜蘆白斂芫花殺附子毒沙參惡防已反藜蘆絡石杜仲牡丹為使惡鐵落畏菖蒲貝母丹參畏鹹水反藜蘆天名精垣衣為使決明子蓍實為使惡大麻子黃連黃芩龍骨理石為使惡菊花芫花𤣥參白鮮皮畏欵冬勝烏頭解巴豆毒芎藭白芷為使續斷地黃為使惡雷九黃耆惡龜甲杜若得辛夷細辛良反柴胡前胡蛇牀子惡牡丹及巴豆貝母茜根畏鼠姑飛亷得烏頭良惡麻黃薇銜得秦皮良五味子蓯蓉為使惡萎蕤勝烏頭草藥中部當歸惡䕡茹畏菖蒲海藻牡蒙秦芁菖蒲為使黃芩山茱萸龍骨為使惡蔥實畏丹砂及牡丹藜蘆藁本惡䕡茹麻黃厚朴為使惡辛夷石韋乾薑秦椒為使惡黃連黃芩天鼠糞殺半夏莨菪毒葛根解野葛巴豆百藥毒前胡半夏為使惡皂莢畏藜蘆芍藥雷丸為使惡石斛芒消畏消石鱉甲小薊反藜蘆貝母厚朴白薇為使惡桃花畏秦芁礜石莾草反烏頭𤣥參惡黃耆乾薑大棗山茱萸反藜蘆石韋滑石杏仁為使得菖蒲良栝蔞枸把為使惡乾薑牛膝乾漆反烏頭狗脊萆薢為使惡敗醬苦參𤣥參為使惡貝母漏蘆及莵絲子反藜蘆瞿麥蘘草牡丹為使惡桑螵蛸白芷當歸為使惡旋復花石龍芮大㦸為使畏蛇蛻皮吳茱萸白鮮皮惡桑螵蛸桔梗茯苓草解萆解薏苡為使畏葵根大黃及柴胡牡蠣前胡紫參畏辛夷仙靈脾薯蕷為使紫菀欵冬為使惡天雄瞿麥及雷丸逺志畏茵蔯防已殷孽為使惡細辛畏萆薢殺雄黃毒牡丹畏莵絲子白薇畏黃耆大黃大