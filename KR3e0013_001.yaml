麻黃去節先别煮兩三沸掠去沫更益水如本數乃內餘藥不爾令人煩寸斬之小草瞿麥五分斬之細辛白前三分斬之膏中細銼也凡牛膝石斛等入湯酒拍碎用之石斛入丸散者先以砧槌極打令碎乃入臼不爾搗不熟入酒亦然凡桂厚朴杜仲秦皮木蘭輩皆削去上虛軟甲錯取裏有味者稱之茯苓猪苓削除黑皮牡丹巴㦸天遠志野葛等皆槌破去心紫菀洗去土曝乾乃稱之薤白蔥白除青令盡莾草石南茵芋澤蘭剔取葉及嫩莖去大枝鬼臼黃連皆除根毛石韋辛夷拭去毛辛夷又去心蜀椒去閉口者及目用大棗烏梅皆去核用鬼箭削取羽皮凡茯苓芍藥補藥須白者瀉藥惟赤者凡莵絲子暖湯淘汰去沙土乾漉暖酒漬經一宿漉出曝微白搗之不盡者更以酒漬經三五日乃出更曬微乾搗之須臾悉盡極易碎凡用甘草厚朴枳實石南茵芋藜蘆皂莢之類皆炙之而枳實去穰藜蘆去頭皂莢去皮子凡用椒實微熬令汗出則有勢力凡湯丸散用天雄附子烏頭烏喙側子皆煻灰炮令微拆削去黑皮乃稱之惟薑附湯及膏酒中生用亦削去皮乃稱之直理破作七八片凡半夏熱湯洗去上滑一云十洗四破乃稱之以入湯若膏酒丸散皆煻灰炮之凡巴豆去皮心膜熬令紫色桃仁杏仁葶藶胡麻諸有脂膏藥皆熬黃黑别搗令如膏指㩢視泯泯爾乃以向成散稍稍下臼中合研搗令消散乃復都以輕絹篩之須盡又內臼中依法搗數百杵也湯膏中雖有生用者並搗破凡用麥蘖麴末大豆黃卷澤蘭蕪荑皆微炒乾漆炒令煙斷用烏梅入丸散者熬之用熟艾者先炒細擘合諸藥搗令細散不可篩者內散中和之凡用諸毛羽齒牙蹄甲龜鱉鯪鯉等甲皮肉骨角筋鹿茸等皆炙之蛇蛻皮微炙凡諸斑猫等諸蟲皆去翅足微熬用桑螵蛸中破炙之牡蠣熬令黃色殭蠶蜂房微炒之凡湯中用麝香犀角鹿角羚羊角牛黃須末如粉臨服內湯中攪令調和服之凡丸散用膠先炙使通體沸起燥乃可搗有不沸處更炙之斷下湯直爾用之勿炙諸湯中用阿膠皆絞湯畢內汁中更上火兩三沸令煬凡用蜜先火煎掠去沫令色微黃則丸經久不壞掠之多少隨蜜精粗遂至大稠於丸彌佳凡丸中用蠟煬投少蜜中攪調以和藥凡湯中用飴糖皆湯成下諸湯用酒者皆臨熟下之凡藥有宜丸者宜散者宜湯者宜酒漬者宜膏煎者亦有一物兼宜者亦有不入湯酒者並隨藥性不得違之其不宜湯酒者列之如左朱砂熟入酒雌黃雲母陽起石入酒礬石入酒硫黃入酒鍾乳入酒孔公孽入酒礜石入酒銀屑白堊銅鏡鼻胡粉鉛丹鹵鹹入酒石灰入酒藜灰右石類一十七種野葛狼毒毒公鬼臼莾草蒴藋入酒巴豆躑躅入酒皂莢入酒雚菌藜蘆䕡茹貫衆入酒蕪荑雷丸狼牙鳶尾蒺䔧入酒女菀葈耳紫葳入酒薇銜入酒白芨牡蒙飛亷蛇銜占斯辛夷石南入酒楝實虎杖入酒單漬虎掌蓄根羊桃入酒麻勃苦瓠瓜蒂陟釐狼跋子入酒雲實槐子入酒地膚子蛇牀子入酒青葙子茺蔚子王不留行菥蓂子莵絲子入酒右草木之類四十八種蜂子蜜蠟白馬莖狗隂雀卵雞子雄鵲伏翼鼠婦樗雞螢火蠮螉蠮舊作􅝡殭蠶蜈蚣蜥蜴斑猫芫青亭長蛇膽虻蟲蜚蠊螻蛄馬刀赭魁蝦蟇蝟皮生鼠生龜入酒蝸牛諸鳥獸入酒蟲魚膏骨髓膽血屎溺右蟲獸之類二十九種古稱惟有銖兩而無分名今則以十黍為一銖六銖為一分四分為一兩十六兩為一斤此則神農之稱也吳人以二兩為一兩隋人以三兩為一兩今依四分為一兩稱為定方家凡云等分者皆是丸散隨病輕重所須多少無定銖兩三種五種皆悉分兩同等耳凡丸散云若干分兩者是品諸藥宜多宜少之分兩非必止於若干之分兩也假令日服三方寸匕須瘥止是三五兩藥耳凡散藥有三刀圭者十分方寸匕之一準如梧桐子大也方寸匕者作匕正方一寸抄散取不落為度錢匕者以大錢上全抄之若云半錢匕者則是一錢抄取一邊爾並用五銖錢也錢五匕者今五銖錢邊五字者以抄之亦令不落為度一撮者四刀圭也十撮為一勺兩勺為一合以藥升分之者謂藥有虛實輕重不得用斤兩則以升平之藥升方作上徑一寸下徑六分深八分內散藥勿按抑之正爾微動令平調耳今人分藥不復用此凡丸藥有云如細麻大者即胡麻也不必扁扁但令較略大小相稱爾如黍粟者亦然以十六黍為一大豆也如麻子者即今大麻子凖三細麻也如胡豆者今青斑豆也以二大麻子準之如小豆者今赤小豆也粒有大小以三大麻子準之如大豆者以二小豆準之如梧桐子者以二大豆準之一方寸匕散以蜜和得如梧桐子十丸為定如彈丸及雞子黃者以十梧桐子準之凡方云巴豆若干枚者粒有大小當先去心皮乃稱之以一分準十六枚附子烏頭若干枚者去皮畢以半兩準一枚枳實若干枚者去穰畢以一分準二枚橘皮一分準三枚棗有大小以三枚準一兩云乾薑一纍者以半兩為正本草云一兩為正凡方云半夏一升者洗畢稱五兩為正椒一升三兩為正吳茱萸一升五兩為正莵絲子一升九兩為正菴䕡子一升四兩為正蛇牀子一升三兩半為正地膚子一升四兩為正此其不同也云某子一升者其子各有虛實輕重不可通以稱準皆取平升為正凡方云桂一尺者削去皮畢重半兩為正甘草一尺者重二兩為正云某草一束者重三兩為正一把者重二兩為正凡云蜜一斤者有七合猪膏一斤者一升二合凡湯酒膏藥舊方皆云㕮咀者謂稱畢搗之如大豆又使吹去細沫此於事殊不允當藥有易碎難碎多末少末稱兩則不復均平今皆細切之較略令如㕮咀者乃得無末而片粒調和也凡云末之者謂搗篩如法也凡丸散先細切曝燥乃搗之有各搗者有合搗者並隨方所言其潤濕藥如天門冬乾地黃輩皆先切曝乾獨搗令偏碎更出細擘曝乾若值隂雨可微火烘之既燥小停冷乃搗之凡濕藥燥皆大耗當先增分兩須得屑乃稱之為正其湯酒中不須如此凡篩丸藥用重密絹令細於蜜丸即易熟若篩散草藥用輕疏絹於酒中服即不泥其石藥亦用細絹篩令如丸藥者凡篩丸散藥畢皆更合于臼中以杵搗之數百過視其色理和同為佳凡煮湯當取井花水極令淨潔升斗分量勿使多少煮之調和候火用心一如錬法凡煮湯用微火令小沸其水數依方多少大略二十兩藥用水一斗煮取四升以此為率皆絞去滓而後酌量也然則利湯欲生少水而多取汁者為病須快利所以少水而多取汁補湯欲熟多水而少取汁者為病須補益是以多水而少取汁好詳視之不得令水多少湯熟用新布兩人以尺木絞之澄去垽濁分再服三服者第二第三服以紙覆令密勿令泄氣欲服以銅器於熱湯上暖之勿令器中有水氣凡漬藥酒皆須切細生絹袋盛之乃入酒密封隨寒暑日數視其濃烈便可漉出不必待至酒盡也滓可曝燥微搗更漬飲之亦可散服凡建中腎瀝諸補湯滓合兩劑加水煮竭飲之亦敵一劑新藥貧人當依此用皆應先曝令燥也凡合膏先以苦酒漬令淹浹不用多汁密覆勿泄云晬時者周時也從今旦至明旦亦有止一宿煮膏當三上三下以泄其熱勢令藥味得出上之使匝匝沸乃下之取沸靜良久乃止寧欲小生其中有薤白者以兩頭微熬黃為候有白芷附子者亦令小黃色為度猪肪皆勿令經水臘月者彌佳絞膏亦以新布絞之若是可服之膏膏滓亦堪酒煮飲之可摩之膏膏滓則宜以傅病上此蓋欲兼盡其藥力故也凡膏中有雄黃朱砂輩皆别搗細研如麵須絞膏畢乃投中以物疾攪至於凝彊勿使沉聚在下勿調也有水銀者于凝膏中研令消散胡粉亦爾凡搗藥法燒香灑掃淨潔不得雜語喧呼當使童子搗之務令細熟杵數可至千萬杵過多為佳凡合腎氣薯蕷及諸大補五石大麝香丸金牙散大酒煎膏等合時煎時並不令婦人小兒産母喪者痼疾六根不具足人及雞犬六畜等見之大忌切宜慎之其續命湯麻黃等諸小湯不在禁忌之限比來田野下里家因市得藥隨便市上雇人搗合非止諸不如法至于石斛莵絲子等難搗之藥費人功力賃作搗者隱主悉盜棄之又為塵埃穢氣入藥中羅篩粗惡隨風飄揚衆口嘗之衆鼻嗅之藥之精氣一切都盡與朽木不殊又復服餌不能盡如法服盡之後反加虛損遂謗醫者處方不效夫如此者非醫之咎自緣發意甚誤宜熟思之論服餌第八若用毒藥治病先起如黍粟病去即止不去倍之不去十之取去為度病在胸膈已上者先食而後服藥病在心腹已下者先服藥而後食病在四肢血脉者宜空腹而在旦病在骨髓者宜飽滿而在夜凡服丸散不云酒水飲者本方如此是可通用也凡服利湯欲得侵早凡服湯欲得稍熱服之即易消下不吐若冷則吐嘔不下若太熱則破人咽喉務在用意湯必須澄清若濁令人心悶不解中間相去如步行十里久再服若太促數前湯未消後湯來衝必當吐逆仍問病者腹中藥消散乃可進服凡服湯法大約皆分為三服取三升然後乘病人穀氣彊進一服最須多次一服漸少後一服最須少如此即甚安穩所以病人於後氣力漸微故湯須漸少凡服補湯欲得服三升半晝三夜一中間間食則湯氣溉灌百脉易得藥力凡服湯不得太緩太急也又須左右仰覆卧各一食頃即湯勢遍行腹中又於室中行皆可一百步許一日勿出外即大益凡服湯三日常忌酒緣湯忌酒故也凡服治風湯第一服厚覆取汗若得汗即須薄覆勿令大汗中間亦須間食不爾令人無力更益虛羸凡丸藥皆如梧桐子大補者十丸為始從一服漸加不過四十丸過亦損人云一日三度服欲得引日多時不闕藥氣漸漬熏蒸五臟積久為佳不必頓服早盡為善徒棄名藥獲益甚少凡人四十已下有病可服瀉藥不甚須服補藥必若有所損不在此限四十已上則不可服瀉藥須服補藥五十已上四時勿闕補藥如此乃可延年得飬生之術耳其方備在第二十七卷中素問曰實即瀉之虛即補之不虛不實以經調之此其大略也凡有臟腑積聚無問少長須瀉則瀉凡有虛損無問少長須補即補以意量度而用之凡服痔漏疳􅉶等藥皆慎猪雞魚油等味至老凡服瀉藥不過以利為度慎勿過多令人下利無度大損人也凡諸惡瘡瘥後皆百日慎口味不爾而瘡即發也凡服酒藥欲得使酒氣相接無得斷絶絶則不得藥力多少皆以知為度不可令至醉及吐則大損人也凡服藥皆斷生冷酢滑猪犬雞魚油麵蒜及果實等其大補丸散切忌陳臭宿滯之物有空青忌食生血物天門冬忌鯉魚白术忌桃李及雀肉葫荽大蒜青魚酢等物地黃忌蕪荑甘草忌菘菜海藻細辛忌生菜莵絲子忌肉牛膝忌牛肉黃連桔梗忌猪肉牡丹忌葫荽藜蘆忌狸肉半夏菖蒲忌飴糖及羊肉恆山桂心忌生蔥生菜商陸忌犬肉茯苓忌醋物柏子仁忌濕麵巴豆忌蘆笋羮及猪肉鱉甲忌莧菜凡服藥忌見死尸及産婦穢汚觸之兼及忿怒憂勞凡餌湯藥其粥食肉菜皆須大熟熟即易消與藥相宜若生則難消復損藥力仍須少食菜及硬物於藥為佳亦少進鹽醋乃善亦不得苦心用力及房室喜怒是以治病用藥力惟在食治將息得力大半於藥有益所以病者務在將息節慎節慎之至可以長生豈惟愈病而已凡服瀉湯及諸丸散酒等至食時須食者皆先與一口冷醋飲須臾乃進食為佳凡人忽遇風發身心頓惡或不能言有如此者當服大小續命湯及西州續命排風越婢等湯于無風處密室之中日夜四五服勿計劑數多少亦勿慮虛常使頭面手足腹背汗出不絶為佳服湯之時湯消即食粥粥消即服湯亦少與羊肉臛將補若風大重者相續五日五夜服湯不絶即經二日停湯以羮臛自補將息四體若小瘥即當停藥漸漸將息如其不瘥當服湯攻之以瘥為度凡患風服湯非得大汗其風不去所以諸風方中皆有麻黃至如西州續命即用八兩越婢六兩大小續命或用一兩三兩四兩故知非汗不瘥所以治風非密室不得輒服湯藥徒自誤耳惟更加增未見損減矣凡人五十已上大虛者服三石更生慎勿用五石也四時常以平旦服一二升暖飲終身勿絶及一時勿食蒜油魚猪牛馬雞鵝鴨等肉即無病矣論藥藏第九存不忘亡安不忘危大聖之至教求民之瘼恤民之隱賢人之用心所以神農鳩集百藥黃帝纂録針經皆備預之常道也且人痾瘵多起倉卒不與人期一朝嬰已豈遑知救想諸好事者可貯藥藏用以備不虞所謂起心雖微所救惟廣見諸世祿之家有善養馬者尚貯馬藥數十斤不見養身者有蓄人藥一錙銖以此類之極可愧矣貴畜而賤身誠可羞矣傷人乎不問馬此言安用哉至如人或有公私使命行邁邊隅地既不毛藥物焉出忽逢瘴癘素不資貯無以救療遂拱手待斃以致夭殁者斯為自致豈是枉橫何者既不能深心以自衛一朝至此何歎惜之晚哉故置藥藏法以防危殆云爾石藥灰土藥水藥根藥莖藥葉藥花藥皮藥子藥五穀五果五菜諸獸齒牙骨角蹄甲皮毛尿屎等藥酥髓乳酪醍醐石蜜沙糖飴糖酒醋膠麴蘖䜴等藥右件藥依時收採以貯藏之蟲豸之藥不收採也稱斗升合鐵臼木臼絹羅紗羅馬尾羅刀砧玉槌瓷鉢大小銅銚鐺釡銅鐵匙等右合藥所須極當預備凡藥皆不欲數數曬曝多見風日氣力即薄歇宜熟知之諸藥未即用者候天大晴時于烈日中曝令大乾以新瓦器貯之泥頭密封須用開取即急封之勿令中風濕之氣雖經年亦如新也其丸散以瓷器貯蜜蠟封之勿令泄氣則三十年不壞諸杏仁及子等藥瓦器貯之則鼠不能得之也凡貯藥法皆須去地三四尺則土濕之氣不中也備急千金要方卷一
