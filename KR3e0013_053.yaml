body:
  text: 備急千金要方卷五十三唐孫思邈撰宋林億等校正胃腑方噎塞第六論方五噎圓治胸中乆寒嘔逆逆氣食飲不下結氣不消方古今録驗云五噎者氣噎憂噎勞噎食噎思噎氣噎者心悸上下不通噫噦不徹胸脇苦痛憂噎者天隂苦厥逆心下悸動手足逆冷勞噎者苦氣膈脇下支滿䐜中填塞令手足逆冷不能自温食噎者食無多少惟胸中苦塞常痛不得喘息思噎者心悸動喜忘目視􅉩􅉩此皆憂恚嗔怒寒氣上入胸脇所致也乾薑蜀椒食茱茰桂心人參各五分細辛白术茯苓附子各四分橘皮六分右十味為末蜜和丸如梧子大以酒服三丸日三不止稍加至十丸又方治五種之氣皆令人噎方人參半夏桂心防風一作防葵小草附子細辛甘草各二兩紫菀乾薑食茱茰芍藥烏頭各六分枳實一兩右十四味為末蜜丸如梧子大以酒服五丸日三不止加至十五丸烏頭與半夏相反但去一味合之竹皮湯治噎聲不出方竹皮一用竹葉細辛各二兩甘草生薑通草人參茯苓麻黄五味子桂心各一兩右十味㕮咀以水一斗煮竹皮减二升去竹皮下藥煮取三升分三服乾薑湯治飲食輙噎方集驗名半夏湯乾薑石膏各四兩栝蔞根集驗桔梗人參桂心各二兩半夏小麥各一升吳茱茰二升甘草一兩赤小豆三十粒右十味㕮咀以酒五升水一斗煮棗二十枚去滓合煮取三升分三服通氣湯治胸滿氣噎方半夏八兩生薑六兩桂心三兩大棗三十枚右四味㕮咀以水八升煮取三升分五服日三夜二羚羊角湯治氣噎不通不得食方羚羊角通草橘皮各二兩厚朴吳茱茰乾薑各三兩烏頭五枚右七味㕮咀以水九升煮取三升分三服日三又方杏仁桂心各三兩右二味為末蜜丸如棗大稍稍咽之臨食先含彌佳治卒噎方滿口著蜜食之即下又方捻取飯盆邊零飯一粒食之即下又方刮舂杵頭細糠含之即下神驗治諸噎方常食乾粳米飯即不噎又方末火炭蜜丸如彈子大含少少咽即下又方老牛涎棗核大水中飲之終身不復噎論曰凡療病者皆以其類至如治哽之法豈宜以鸕鷀主骨哽狸虎治魚哽耶至於竹篾薤白嚼筋綿蜜等事乃可通為諸哽用耳治諸哽方取鹿筋漬之令濡合而索之大如彈丸以線繫之持筋端吞之入喉推至哽處徐徐引之哽著筋出又方作竹篾刮令滑淨綿裏内咽中令至哽處可進退引之哽即隨出又方用綿二兩以蜜煎使熱的的爾從外薄哽所在處灼瓠以熨綿上若故未出復煮一叚綿以代前用者并以皂莢屑少少吹鼻中使得嚏哽出肘後方云治哽百日不出者又方煮薤白令半熟小嚼之以線繫薤中央捉線吞薤下喉至哽處牽引哽即出矣治哽咽方以虎骨末若狸骨服方寸匕又方瞿麥末服方寸匕治魚骨哽方鸕鷀屎服方寸匕又方口稱鸕鷀鸕鷀則下又方服橘皮湯又方服沙糖水又方燒魚網灰服方寸匕必效方云取魚網覆頭立下治骨鯁在喉衆治不出方取􅏁糖丸如雞子黄大吞之不去更吞漸大作丸可至十丸止又方燒虎狼屎服之又方吞猪膏如雞子不瘥更吞瘥止治食中吞髪咽不去繞喉方取亂髪燒灰酒服一錢匕治吞錢方艾蒿五兩以水五升煮取一升頓服之即下又方服蜜二升即出又方末火炭酒服方寸匕水服亦得治吞金銀鐶及釵方白糖二斤一頓漸漸食之多食益佳又方吞水銀一兩再服之悞吞環及指彄方燒鴈毛二七枚末服之鵝羽亦得悞吞釵方曝韮令萎蒸熟勿切食一束即出或生麥葉筋縷如韮法皆可用但力意多食自消悞吞銅鐵而哽者方燒銅弩牙令赤内酒中飲之立愈悞吞針釘及箭鏃等方但多食脂肥肉令飽自裹出治悞吞針方取懸針磁石末飲服方寸匕即下古今録驗云今吞針在喉中而服磁石末入腹若舍磁石口中或吸針而出耳也脹滿第七論法方灸論曰病者腹滿按之不痛者為虚按之痛者為實也夫腹中滿不減減不驚人此當下之舌黄未下者下之黄自去腹滿時減復如故此為寒當得温藥腹滿口中苦乾燥腹間有水是飲跗陽脉微弦法當腹滿不滿者必下部閉塞大便難兩胠下疼痛此虚寒氣從下向上當以温藥服之取瘥腹滿轉痛來趣小腹為欲自下利也一云腹中痛若轉氣下趣小腹為欲自利温胃湯治胃氣不平時脹欬不能食方附子當歸厚朴人參橘皮芍藥甘草各一兩乾薑五分蜀椒三合右九味㕮咀以水九升煮取三升分三服大半夏湯治胃中虚冷腹滿塞下氣方半夏一升大棗二十枚甘草附子當歸人參厚朴茯苓枳實各二兩桂心五兩生薑八兩蜀椒二百粒右十二味㕮咀以水一斗煮取三升分三服附子粳米湯治腹中塞氣脹滿腸鳴切痛胸脇逆滿嘔吐方附子一枚半夏粳米各半升甘草一兩大棗十枚右五味㕮咀以水八升煮米熟去滓毎服一升日三服集驗加乾薑二兩厚朴七物湯治腹滿氣脹方仲景云治腹滿發熱數十日脉浮數飲食如故者厚朴半斤甘草大黄各三兩大棗十枚枳實五枚桂心二兩生薑五兩右㕮咀以水一斗煮取五升去滓内大黄煮取四升服八合日三嘔逆者加半夏五合利者去大黄寒多者加生薑至半斤厚朴三物湯治腹滿發熱數十日脉浮而數飲食如故方厚朴半斤大黄四兩陳枳實大者五枚右㕮咀以水一斗二升煮取五升内大黄煎取三升去滓服一升腹中轉動者勿服不動者更服一方加芒硝二兩吳茱茰湯治久寒胸脇逆滿不能食方吳茱茰半夏小麥各一升甘草人參桂心各一兩大棗二十枚生薑八兩右八味㕮咀以酒五升水三升煮取三分分三服大桂湯治虚羸胸膈滿方桂心生薑各一斤半夏一升黄耆四兩右四味㕮咀以水一斗半煮取五升分五服日三夜二治男子卒勞内傷汗出中風腹脹大饑食不下心痛小便赤黄時白大便不利方大黄葶藶寒水石苦參黄連栝蔞根各等分右六味為末蜜丸以豉汁和飲服如梧子大二丸日三加至十丸灸法臚脹脇腹滿灸膈輸百壮三報胸滿心腹積聚痞痛灸肝輸百壮三報脹滿水腫灸脾輸隨年壮三報腹中氣脹引脊痛食飲多身羸瘦名曰食晦先取脾輸後取季脇臓腑積聚脹滿羸瘦不能飲食灸三焦輸隨年壮脹滿雷鳴灸大腸輸百壮三報脹滿氣聚寒冷灸胃管百壮三報穴在鳩尾下三寸腹脹滿繞臍結痛堅不能食灸中守百壮穴在臍上一寸一名水分脹滿瘕聚滯下疼冷灸氣海十壮穴在臍下一寸忌不可針脹滿氣如水腫状小腹堅如石灸膀胱募百壮穴在中極臍下四寸脹滿腎冷瘕聚洩利灸太樞百壮穴在臍傍相對横去臍兩傍各二寸痼冷積熱第八論法方灸論曰凡人中寒者喜欠其人清涕出發熱色和者善嚏凡覘病者未脉望之口燥清涕出善嚏欠此人中寒其人下利以裏虚故也欲嚏不能此人腹中痛凡寒脉沉弦脉雙弦者寒也弦脉状如張弓弦按之不移脉數弦者當下其寒脉雙弦而遲者心下堅脉大而緊者陽中有隂可下之右手寸口脉弦者即脇下拘急而痛其人濇濇惡寒師曰遲者為寒澀為無血寸口脉㣲尺中緊而澀緊即為寒微即為虚澀即為血不足故知發汗而復下之大露宿丸主寒冷百病方見第十七卷中匈奴露宿圓治寒冷積聚方礜石桂心附子乾薑各二兩右四味為末蜜丸如梧子大每服十丸日三後稍加之露宿圓治遇冷氣心下結緊嘔逆寒食不消并主傷寒晨夜觸寒冷惡氣方附子烏頭桂心礜石各四兩右四味為末蜜丸如胡豆大以酒服三丸日三加至十丸藥耐寒冷忌熱食近火宜冷食飲治痼冷風眩寒中手足冷胃口寒臍下冷百病五勞七傷第一令人能食二强盛三益氣四有子神驗方大豆三升半生地黄十五斤取汁烏頭一百五十枚右三味以除日㕮咀烏頭以酒一斗半和地黄汁浸烏頭至破日絞去滓内豆藥汁中至除日出曝之有汁更浸曝之至汁盡藥成初服從二豆起可至二十豆酒服之有病空腹服無病食後服四時合並得二月三月為上時藥令人能食益氣强盛有子髪白反黒齒落重生先病熱人不可服治心腹痼冷百治不瘥方麴末三升白术五兩乾薑桂心各三兩蜀椒吳茱茰各二両右六味治下篩以米飲服方寸匕日二不過五劑諸冷頓愈無忌空腹服之治積年冷病方蜀椒二兩香豉一升右二味𢷬椒為末和豉更𢷬三千杵丸如彈丸大食前酒服日再治諸冷極醫所不治方馬藺子九升浄治去土空腹服一合日三飲及酒下之服訖須臾以食壓之取瘥乃止赤圓治寒氣厥逆方茯苓桂心各四兩細辛一兩烏頭附子各二兩射罔如大棗一兩右六味為末内真珠為色蜜丸如麻子空腹酒服一丸日再夜一不止加至二丸以止為度一方用半夏四兩不用桂半夏湯治胸滿有氣心腹中冷方半夏一升桂心四兩生薑八兩右三味㕮咀以水七升煮取二升一服七合日三服生薑湯温中下氣方生薑一斤甘草三兩桂心四兩右三味㕮咀以水六升煮取一升半一服五合日三服甘草湯治虚羸惙惙氣欲絶方甘草五味子生薑各二兩吳茱茰一升人參一兩右五味㕮咀以水四升煮茱茰令小沸去滓内藥煮取一升六合分二服服數劑佳茱茰消石湯治乆寒不欲飲食數十年澼飲方吳茱茰八合消石一升生薑一斤右三味以水一斗水解令得二斗煮藥取四升服二升病即下去勿更服也初下如泔後如汚泥若如沫滓吐者更可服之養如乳婦法大建中湯治心脇中大寒大痛嘔不能飲食飲食下咽自知偏從一面下流有聲決決然若腹中寒氣上衝皮起出見有頭足上下而痛其頭不可觸近方蜀椒二合乾薑四兩人參二兩􅏁糖一升右四味㕮咀以水四升煮取二升去滓内糖微火煮令得一升半分三服服湯如炊三升米乆可飲粥二升許更服當一日食糜温覆之大黄附子湯治脇下偏痛發熱其脉緊弦此寒也當以温藥下之之方大黄三兩附子三枚細辛二兩右三味㕮咀以水五升煮取二升分再服論曰寸口脉弦而緊弦即衛氣不行衛氣不行即惡寒緊則不欲飲食弦緊相摶即為寒疝跗陽脉浮而遲浮即為風虚遲即為寒疝凡瘦人繞臍痛必有風冷榖氣不行而反下之其氣必衝不衝者心下則痞大烏頭湯主寒疝繞臍苦痛發即白汗出手足厥寒其脉沉弦者方仲景名二物烏頭煎烏頭十五枚熬黒不切以水三升煮取一升去滓内白蜜二斤煎令水氣盡得二升强人服七合羸人五合一服未效明日更服每日止一服不可再也烏頭桂枝湯治大寒疝腹中痛逆冷手足不仁若一身盡痛灸刺諸藥不能治方秋乾烏頭實中者五枚除去角白蜜一斤右二味以蜜煎烏頭減半去滓以桂枝湯五合解之令得一升許初服二合不止更進三合復不止加至五合其止者如醉状得吐者為中病也桂枝湯方見傷寒巻中外臺方云以水二升半煮桂取一升以桂汁和蜜煎合煎之一升許服又云范注方云以桂枝湯和前烏頭煎服論曰凡人患大熱皆須候脉若大大熱者不得一凖方用藥皆凖病用藥大熱不可那者當兩倍三倍大大熱者乃至十倍用之乃可制之爾有人苦熱不已皆由服石所致種種服餌不能制止惟朴消煎可以定之武徳中有貴髙人師市奴謂之金石凌非也此方直用二消寒水石石膏可也即不勞金有金者貴髙人所加也朴硝煎方朴硝一升芒硝八兩寒水石四両石膏金各二兩右五味先内二硝於八升湯中攪令消以紙宻封一宿澄取清内銅器中别𢷬寒水石石膏碎如豆粒以絹袋盛之内汁中以微火煎候其上有漠起以筋投中著筋如淩雪凝白急下㵼著盆中待凝取出烈日曝乾積熱困悶不已者以方寸匕白蜜一合和冷水五合攪和令消頓服之日三熱定即止五石湯治胃間熱熱病後不除煩悶口中乾渴方寒水石消石赤石脂龍骨栝蔞根牡蠣甘草黄芩各五分知母桂心石膏各三分大黄二分右十二味㕮咀以水七升煮取三升分四服日三夜一諸本只有四石竹葉湯治五心熱手足煩疼口乾唇燥胸中熱方竹葉小麥各一升知母石膏各二兩茯苓黄芩麥門冬各二兩人參一兩半生薑五兩栝蔞根甘草半夏各一兩右十二味㕮咀以水一斗二升煮竹葉小麥取八升去滓内藥煮取三升分三服老小分五服半夏湯治胸中客熱心中煩滿氣上大小便難方半夏一升生薑八兩前胡四兩茯苓白术各五兩甘草一兩黄芩人參各二兩杏仁枳實各三兩右十味㕮咀以水九升煮取三升分三服胸中大熱者沉冷服之大小便澀加大黄二兩一方用梔子仁二兩為十一味承氣湯治氣結胸中熱在胃管飲食嘔逆渴方前胡枳實桂心大黄寒水石知母甘草各一兩消石栝蔞根石膏各二兩右十味㕮咀以水一斗煮取三升分三服治熱氣手足心煩熱如火方竹葉二升枳實三兩青葙子白前各一兩吳茱茰黄芩各二分栝蔞根麥門冬各二兩生薑六兩前胡一作芍藥半夏各五兩右十一味㕮咀以水八升煮取二升分三服地黄煎治熱方地黄汁四升三合茯神知母萎蕤各四兩栝蔞根五兩竹瀝三合一用竹葉生薑汁生地骨皮生麥門冬汁白蜜各二升石膏八兩右十一味㕮咀以水一斗二升先煮諸藥取汁三升去滓下竹瀝地黄麥門冬汁微火煎四五沸下蜜薑汁㣲火煎取六升初服四合日三夜一加至六七合四月五月作散服之治積熱方枳實黄芩大黄黄連芒硝各二兩右五味為末蜜丸如梧子大空心酒服三十丸加至四十丸日一服治膈上熱方苦參十兩𤣥參五兩麥門冬三兩車前子二兩右四味為末蜜丸如梧子大一服十五丸日二服細圓治客熱結塞不流利方大黄葶藶各三兩香豉三合杏仁巴豆各五分右五味為末蜜丸如梧子大每日飲服二丸以利為度治骨蒸熱羸瘦煩悶短氣喘息鼻張日西即發方龍膽黄連栝蔞根四分芒硝二分梔子十枚苦參大黄黄芩芍藥青葙子各二兩右十味為末蜜丸如梧子大飲服二丸日二以止為度一方無苦參已下止五味張文仲為散飲服方寸匕治骨蒸方天靈蓋如梳大炙令黄碎以水五升煮取二升分三服起死人神方又方水服芒硝一方寸匕日二服神良又方取人屎灰以酒服方寸匕日二服治五臓熱及身體熱脉弦急者方灸第十四椎與臍相當五十壮老少增損之若虚寒至百壮横三閒寸灸之備急千金要方卷五十三
