body:
  text: 備急千金要方卷十一唐孫思邈撰宋林億等校正少小嬰孺方客忤第四論法灸方法呪論曰少小所以有客忤病者是外人來氣息忤之一名中人是為客忤也雖是家人或别房異户雖是乳母及父母或從外還衣服經履鬼神粗惡暴氣或牛馬之氣皆為忤也藝作喘息乳氣未定者皆為客忤其乳母遇醉及房勞喘後乳兒最劇能殺兒也不可不慎凡諸乘馬行得馬汗氣臭未盥洗易衣裝便向兒邊令兒中馬客忤兒卒見馬來及聞馬鳴驚及馬上衣物馬氣皆令小兒中馬客忤慎護之特重一歲兒也凡小兒衣布帛綿中不得有頭髮履中亦爾白衣青帶青衣白帶皆令中忤凡非常人及諸物從外來亦能驚小兒致病欲防之法諸有從外來人及有異物入户當將兒避之勿令見也若不避者燒牛屎令常有煙氣置戶前則善小兒中客為病者無時不有此病也而秋初一切小兒皆病者豈是一切小兒悉中客邪夫小兒所以春冬少病秋夏多病者秋夏小兒陽氣在外血脉嫩弱秋初夏末晨夕時有暴冷小兒嫩弱其外則易傷暴冷折其陽陽結則壯熱胃冷則下痢是故夏末秋初小兒多壯熱而下痢也未必皆是中客及魃也若治少小法夏末秋初常冝候天氣溫凉也有暴寒卒冷者其少小則多患壯熱而下痢也慎不可先下之皆先殺毒後下之耳𤣥中記云天下有女鳥名曰姑獲肘後子母祕録作烏獲一名天帝女一名隱飛鳥一名夜行遊女又曰釣星鬼喜以隂雨夜過飛鳴徘徊人村里喚得來者是也鳥淳雌無雄不産隂氣毒化生喜落毛羽於人中庭置兒衣中便令兒作癎病必死即化為其兒也是以小兒生至十歲衣被不可露也七八月尤忌凡中客忤之為病類皆吐下青黃白色水榖解離腹痛大糾面色變易其候似癎但眼不上插耳其脉急數者是也宜與龍膽湯下之加人參當歸各如龍膽稱分等多少也小兒中客急視其口中懸癰左右當有青黑腫脉核如麻豆大或赤或白或青如此便冝用針速刺潰去之亦可爪摘決之并以綿纒叉頭拭去血也少小中客之為病吐下青黃赤白汁腹中痛及反倒偃側喘似癎狀但目不上插少睡耳面變五色其脉弦急若失時不治少久則難治矣欲療之方用䜴數合水拌令濕搗熟丸如雞子大以摩兒囟及手足心各五六遍畢以丸摩兒心及臍上下行轉摩之食頃破視其中當有細毛即擲丸道中痛即止治少小中客忤强項欲死方取衣中白魚十枚為末以傅母乳頭上令兒飲之入咽立愈一方二枚著兒母手掩兒臍中兒吐下愈亦以摩兒項及脊强處治少小客忤二物黃土塗頭方竈中黃土蚯蚓屎等分搗合水和如雞子黃大塗兒頭上及五心良一方云雞子青和如泥又方吞麝香如大豆許立愈治少小犯客忤發作有時者方以母月衣覆兒上大良治小兒卒中忤方剪取驢前膞胛上旋毛大如彈子以乳汁煎之令毛消藥成著乳頭飲之下喉即愈又方燒母衣帶三寸并髮合乳汁服之又方取牛鼻津服之又方取牛口沫傅乳頭飲之一物猪蹄散治小兒寒熱及赤氣中人方猪後腳懸蹄燒末搗篩以飲乳汁一撮立效治少小卒中客忤不知人者方取熱馬屎一丸絞取汁飲兒下咽便愈亦治中客忤而􅀈啼面青腹强者二物燒髮散治少小見人來卒不佳腹中作聲者方用向來者人囟上髮十莖斷兒衣帶少許合燒灰細末和乳飲兒即愈治小兒卒客忤方銅鏡鼻燒令赤著少許酒中大兒飲之小兒不能飲者含與之即愈一物馬通浴湯治少小中忤方馬通三升燒令煙絶以酒一斗煮三沸去滓浴兒即愈一物猪通浴湯治小兒中人忤􅀈啼面青腹强者方猳猪通二升以熱湯灌之適寒溫浴兒治小兒中馬客忤而吐不止者方灸手心主間使大都隱白三隂交各三壯可用粉丸如䜴法並用唾唾而呪之呪法如左呪客忤法呪曰摩家公摩家母摩家子兒苦客忤從我始扁鵲雖良不如善唾良呪訖棄丸道中又法取一刀橫著竈上解兒衣發其心腹訖取刀持向兒呪之唾輒以刀擬向心腹啡啡曰音非出唾貌煌煌日出東方背隂向陽葛公葛公不知何公子來不視去不顧過與生人忤梁上塵天之神戶下土鬼所經大刀鐶犀對竈君二七唾客愈兒驚唾啡啡如此二七啡啡每唾以刀擬之呪當三遍乃畢用䜴丸如上法五六遍訖取此丸破視其中有毛棄丸道中客忤即愈矣小兒魃方論曰凡小兒所以有魃病者是婦人懷娠有惡神導其腹中胎妬嫉他小兒令病也魃者小鬼也妊娠婦人不必悉招魃魅人時有此耳魃之為疾喜微微下痢寒熱或有去來毫毛鬢髮􅀢鬡不恱是其證也宜服龍膽湯凡婦人先有小兒未能行而母更有娠使兒飲此乳亦作魃也令兒黃瘦骨立髮落壯熱是其證也治魃方灸伏翼熟嚼哺之又方燒伏翼末飲服之又方以水二升煮萹蓄冬瓜各四兩取浴之白鮮皮湯治少小客魃挾實方白鮮皮大黃甘草各一兩芍藥茯苓細辛桂心各十八銖右七味㕮咀以水二升煮取九合分三服小兒夜啼龍角圓治小兒五驚夜啼方崔氏名五驚丸龍角六銖牡蠣一作牡丹川大黃各九銖黃芩半兩蚱蟬二枚牛黃如小豆五枚右六味末密丸如麻子蓐裏兒服二丸隨兒大小增減芎藭散治小兒夜啼至明即安寐方芎藭白术防已各半兩右三味治下篩以乳和與兒服之量多少又以兒母手掩臍中亦以摩兒頭及脊驗二十日兒未能服散者以乳汁和服如麻子一丸兒大能服散者以意斟酌與之一物前胡圓治少小夜啼方前胡隨多少搗末以蜜和丸如大豆服一丸日三稍加至五六丸以瘥為度又方以妊娠時食飲偏有所思者物以此哺兒則愈又方伏龍肝交道中土各一把右二味治下篩水和少許飲之又方取馬骨燒灰傅乳上飲兒啼即止治小兒夜啼不已醫所不治者方取狼屎中骨燒灰為末水服如黍米粒大二枚即定治小兒驚啼方取雞屎白熬末以乳服之佳又方酒服亂髮灰又方車轄脂如小豆許內口中及臍中又方臘月縳猪繩燒灰服之又方燒蝟皮三寸灰著乳頭飲之千金湯治小兒暴驚啼絶死或有人從外來邪氣所逐令兒得疾衆醫不治方蜀椒左顧牡蠣各六銖碎右二味以酢漿水一升煮取五合每服一合傷寒第五論法方灸論曰夫小兒未能冒涉霜雪乃不病傷寒也大人解脫之久傷於寒冷則不論耳然天行非節之氣其亦得之有時行疾疫之年小兒出腹便患斑者也治其時行節度故如大人法但用藥分劑少異藥小冷耳麥門冬湯治小兒未滿百日傷寒鼻衄身熱嘔逆方麥門冬十八銖石膏寒水石甘草各半兩桂心八銖右五味㕮咀以水二升半煮取一升每服一合日三芍藥四物解肌湯治少小傷寒方芍藥黃芩升麻葛根各半兩右四味以水三升煮取九合去滓分服朞歲已上分三服麻黃湯治少小傷寒發熱咳嗽頭面熱者方麻黃生薑黃芩各一兩甘草桂心石膏芍藥各半兩杏仁十枚右八味㕮咀以水四升煮取一升半分二服兒若小以意減之治小兒傷寒方葛根汁淡竹瀝各六合右二味相和二三歲兒分三服百日兒斟酌服之不宜生煮服佳治小兒時氣方桃葉三兩搗以水五升煮十沸取汁日五六遍淋之若復發燒雄鼠屎二枚燒水調服之五味子湯治小兒傷寒病久不除瘥後復劇瘦瘠骨立方五味子十銖大黃黃連黃芩麥門冬前胡各六銖芒硝五銖石膏一兩甘草當歸各十二銖右十味㕮咀以水三升煮取一升半服二合得下便止計大小增減之莽草浴湯治小兒傷寒方莽草半斤牡蠣四兩雷丸三十枚大黃一兩蛇牀子一升右五味以水三斗煮取斗半適寒溫以浴兒避眼及隂又方治小兒卒寒熱不佳不能服藥方莽草丹參桂心各三兩菖蒲半斤雷丸一升蛇牀子二兩右六味以水二斗煮三五沸適寒溫以浴兒避眼及隂雷丸浴湯治小兒忽寒熱方雷丸二十枚大黃四兩黃芩一兩苦參石膏各三兩丹參二兩右六味㕮咀以水二斗煮取一斗半浴兒避眼及隂浴訖以粉粉之勿厚衣一宿復浴李葉浴湯治少小身熱方李葉無多少㕮咀以水煮去滓將浴兒良栁枝浴湯治小兒生一月至五月乍寒乍熱方細切栁枝煮取汁洗兒若渴絞冬爪汁服之青木香浴湯治小兒壯熱羸瘠方青木香四兩麻子仁竹葉各一升虎骨五兩白芷三兩右五味㕮咀以水二斗煮取一斗稍稍浴兒十二物寒水石散治少小身體壯熱不能服藥方寒水石芒硝滑石石膏赤石脂青木香大黃甘草黃芩防風芎藭麻黃根右各等分合治下篩以粉一升藥屑三合相和復以篩篩之以粉兒身日三李根湯治小兒暴有熱得之二三日者方李根桂心芒硝各十八銖麥門冬甘草各一兩右五味㕮咀以水三升煮取一升分五服升麻湯治小兒傷寒變熱毒病身熱面赤口燥心腹堅急大小便不利或口瘡者或因壯熱便四肢攣掣驚仍成癎疾時發時醒醒後身熱如火者悉主之方升麻白薇麻黃萎蕤柴胡甘草各半兩黃芩一兩朴消大黃釣藤各六銖右十味㕮咀以水三升先煮麻黃去上沫內諸藥煮取一升兒生三十日至六十日一服二合六十日至百日一服二合半百日至二百日一服三合大黃湯治小兒肉中久挾宿熱瘠瘠熱進退休作無時方大黃甘草芒硝各半兩桂心八銖石膏一兩大棗五枚右六味㕮咀以水三升煮取一升每服二合蜀漆湯治小兒潮熱方蜀漆甘草知母龍骨牡蠣各半兩右五味㕮咀以水四升煮取一升去滓一歲兒少少溫服半合日再治小兒腹大短氣熱有進退食不安榖為不化方大黃黃芩甘草麥門冬芒硝各半兩石膏一兩桂心八銖右七味㕮咀以水三升煮取一升半分三服期歲已下小兒作五服竹葉湯治小兒夏月患腹中伏熱溫壯來往或患下痢色或白或黃三焦不利方竹葉切小麥各五合柴胡麥門冬人參甘草各半兩茯苓十八銖黃芩一兩六銖右八味㕮咀以水四升煮竹葉小麥取三升去竹葉小麥下諸藥煮取一升半分三服若小兒夏月忽壯熱燒人手洞下黃溏氣力惙然脉極洪數用此方加大黃二兩再服得下即瘥又方治五六歲兒溫壯腹中急滿息不利或有微腫亦治極羸不下飲食堅痞手足逆冷方竹葉切一升小麥半升甘草黃芩栝蔞根澤瀉茯苓知母白术大黃各一兩桂心二銖生薑一兩半人參麥門冬半夏各二兩當歸十八銖右十六味㕮咀以水七升煮竹葉小麥取四升去滓內藥煎取一升六合分四服治小兒連壯熱實滯不去寒熱往來微驚悸方大黃一兩黃芩栝蔞根甘草各十八銖滑石二兩桂心牡蠣人參龍骨凝水石白石脂消石各半兩右十二味㕮咀以水四升煮取一升半每服三合一日一夜令盡雖吐亦與之一本加紫石英半兩調中湯治小兒春秋月晨夕中暴冷冷氣折其四肢熱不得泄則壯熱冷氣入胃變下痢或欲赤白滯起數去小腹脹痛極壯熱氣脉洪大或急數者服之熱便歇下亦瘥也但壯熱不吐下者亦主之之方葛根黃芩茯苓桔梗芍藥白术藁本大黃甘草各六銖右九味㕮咀以水二升煮取五合服如後法兒生一日至七日取一合分三服生八日至十五日取一合半分三服生十六日至二十日取二合分三服生二十日至三十日取三合分三服生三十日至四十日取五合分三服恐喫五合未得更以意斟酌百日至三百日兒一如前篇龍膽湯加之生地黃湯治小兒寒熱進退啼呼腹痛方生地黃桂心各二兩右二味以水三升煮取一升朞歲已下服二合以上三合一方七味有芍藥寒水石黃芩當歸甘草各半兩治小兒傷寒發黃方搗土瓜根汁三合服之又方搗韭根汁澄清取如大豆許滴兒鼻中即出黃水瘥又方搗青麥汁服之又方小豆三七枚瓜蒂十四枚糯米四十粒右三味為末吹入鼻中二物通汗散治少小有熱不汗方粉半斤雷丸四兩右搗為細末和下篩以粉兒身二物茯苓粉散治少小頭汗方茯苓牡蠣各四兩右治下篩以粉八兩合搗為散有熱輒取粉汗即自止三物黃連粉散治少小盜汗方黃連牡蠣貝母各十八銖右以粉一升合搗下篩取粉兒身佳犀角飲子此由心臟熱之所感宜服此方犀角十八銖茯神一兩麥門冬一兩半甘草半兩白术六銖右五味㕮咀以水九合煎取四合分服加龍齒一兩佳恆山湯治小兒溫瘧方恆山切一兩小麥二合淡竹葉切一升右三味以水一升半煮取五合一日至七日兒一合為三服八日至十五日兒一合半為三服十六日至二十日兒二合為三服四十日至六十日兒六合為三服六十日至百日兒一服二合半百日至二百日兒一服三合又方鹿角末臨發時先服一錢匕又方燒鱉甲灰以酒服一錢七至發時服三匕并以火灸身又方燒雞䏶胵中黃皮為末和乳與服男雄女雌又方灸兩乳下一指三壯備急千金要方卷十一
