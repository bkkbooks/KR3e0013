熬虻蟲熬右十二味為末蜜丸梧子大空腹飲服七丸日三不知加一倍千金翼無芎藭又一方有蟅蟲牡丹各二兩為十四味桃仁散治月經來繞臍痛上衝心胸往來寒熱如瘧疰狀方桃仁五十枚蟅蟲二十枚桂心五寸茯苓一兩薏苡仁牛膝代赭各二兩大黃八兩右八味治下篩宿勿食溫酒服一錢匕日三治月經往來腹腫腰腹痛方蟅蟲四枚蜀椒乾薑各六銖大黃女青桂心芎藭各半兩右七味治下篩取一刀圭先食酒服之日三十日微下善養之治月經不調或月頭或月後或如豆汁腰痛如折兩腳疼胞中風寒下之之方大黃朴硝各四兩牡丹三兩桃仁一升人參陽起石茯苓甘草水蛭虻蟲各二兩右十味㕮咀以水九升煮取三升去滓內朴硝令煬盡分三服相去如一飯頃陽起石湯治月水不調或前或後或多或少乍赤乍白方陽起石甘草續斷乾薑人參桂心各二兩附子一兩赤石脂三兩伏龍肝五兩生地黃一升右十味以水一斗煮取三升二合分四服日三夜一治婦人憂恚心下支滿膈中伏熱月經不利血氣上搶心欲嘔不可多食懈怠不能動方大黃芍藥虻蟲各二兩土瓜根蜀椒黃芩白术乾薑地骨皮一作炭皮芎藭各一兩桂心乾漆各一兩半右十二味為末蜜丸如梧子每服十丸日三不知加之牛膝圓治産後月水往來乍多乍少仍復不通時時疼痛小腹裏急下引腰身重方牛膝芍藥人參大黃各三兩牡丹皮甘草當歸芎藭各二兩桂心一兩蟅蟲蠐螬蜚蠊各十四枚虻蟲水蛭各七十枚右十四味為末蜜丸如梧子酒服五丸日三不知稍增又方鹿角末服之良又方生地黃汁三升煮取二升服之又方飲人乳汁三合善又方燒月經衣井花水服之又方燒白狗糞焦作末酒服方寸匕日三又方取白馬尿服一升良治月經不斷方船茹一斤淨洗河水四升半煮取二升分二服又方服地黃酒良又方服大豆酒佳又方燒箕舌灰酒服之又方灸內踝下白肉際青脈上隨年壯備急千金要方卷七
