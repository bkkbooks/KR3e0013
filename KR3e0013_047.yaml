body:
  text: 備急千金要方卷四十七唐孫思邈撰宋林億等校正脾臟方脾虛實第二論方脈法灸脾實熱右手關上脈隂實者足太隂經也病苦足寒脛熱腹脹滿煩擾不得臥名曰脾實熱也㵼熱湯治舌本強直或夢歌樂而體重不能行方前胡茯苓龍膽細辛芒硝各三兩杏仁四兩玄參大青各二兩苦竹葉切一升右九味㕮咀以水九升煮取三升分三服食後服治脾熱面黃目赤季脅痛滿方半夏母薑各八兩枳實梔子茯苓芒硝各三兩細辛五兩白术杏仁各四兩生地黃淡竹葉各切一升右十一味㕮咀以水九升煮取三升去滓下芒硝分三服治脾橫方若赤黑發如瓜大煎羊脂摩之又方末赤小豆和雞子白傅之四肢寒熱腰疼不得俯仰身黃腹滿食嘔舌根直灸第十一椎上及左右各一寸五分三處各七壯脾胃俱實右手關上脈隂陽俱實者足太隂與陽明經俱實也病苦脾脹腹堅搶脅下痛胃氣不轉大便難時反泄利腹中痛上衝肺肝動五臟立喘鳴多驚身熱汗不出喉痺精少名曰脾胃俱實也㵼熱方大黃麻黃黃芩各四兩杏仁赤茯苓甘草橘皮芒硝澤㵼各三兩右九味㕮咀以水九升煮取三升絞去滓內大黃煮兩沸去滓下芒硝分三服大黃㵼熱湯治脾脈厥逆大腹中熱切痛舌強腹脹身重食不下心注脾急痛方大黃細切水一升半别漬一宿甘草各三兩澤㵼茯苓黃芩細辛芒硝各二兩橘皮二兩右八味㕮咀以水七升煮取三升三合去滓下大黃更煎兩沸去滓下芒硝分三服治脾熱脅痛熱滿不歇目赤不止口脣乾裂方石膏一斤碎生地黃汁赤蜜各一升淡竹葉切五升右四味先以水一斗二升煮竹葉取七升去滓澄清煮石膏取一升五合去滓下地黃汁兩沸次下蜜煎取三升細細服之治脾熱偏一邊痛胸滿脅偏脹方茯苓橘皮澤㵼各三兩芍藥白术各四兩人參桂心各二兩石膏八兩半夏六兩生薑切一升桑根白皮一升右十一味㕮咀以水一斗二升煮取三升去滓分三服若須利下加芒硝二兩佳脾虛冷右手關上脈隂虛者足太隂經也病苦泄注腹滿氣逆霍亂嘔吐黃疸心煩不得臥腸鳴名曰脾虛冷也治虛脹脅痛肩急有時發作悉補之方五加根皮丹參橘皮各一斤地骨皮乾薑白术各八兩豬椒根皮二斤乾地黃芎藭附子各五兩桂心桔梗各四兩大棗五十枚甘草三兩右十四味㕮咀以酒四斗漬五七日服七八合加至一升日再服檳榔散治脾寒飲食不消勞倦氣脹噫滿憂恚不樂方檳榔八枚皮子並用人參茯苓陳麴厚朴麥蘖吳茱茰白术各二兩右八味治下篩食後酒服二方寸匕日再一方用橘皮一兩半溫脾圓治久病虛羸脾氣弱食不消喜噫方黃蘗大麥蘖吳茱茰桂心乾薑細辛附子當歸大黃麴黃連各一兩右十一味為末蜜丸如梧子每服十五丸空腹酒服日三麻豆散主脾氣弱不下食餌此以當食方大豆黃二升大麻子三升熬令香右二味治下篩飲和服一合日四五任情多少脾胃俱虛右手關上脈隂陽俱虛者足太隂與陽明經俱虛也病苦胃中如空狀少氣不足以息四逆寒泄注不已名曰脾胃俱虛也治腹脹善噫食則欲嘔泄澼溏下口乾四肢重好怒不欲聞人聲忘誤喉痺補之方黃連一兩禹餘糧二兩白术乾薑各三兩大麻子五兩桑白皮八兩大棗二十枚右七味㕮咀以水一斗二升煮取三升分四服治脾胃俱虛苦飢寒痛方人參當歸桂心茯苓桔梗芎藭各三兩厚朴甘草橘皮吳茱茰各二兩白术五兩麥蘖一升右十二味㕮咀以水一斗二升煮取三升分三服白术散治脾胃俱虛冷方白术厚朴人參吳茱茰茯苓麥蘖麴芎藭各三兩右八味篩酒服方寸匕食後服日三一方加大腹橘皮平胃圓凡身重不得食食無味心下虛滿時時欲下喜臥者皆針胃管太倉服建中湯及服此方建中湯方見別卷杏仁五十枚丹參三兩苦參葶藶玄參各二兩芎藭桂心各一兩右七味為末蜜丸如梧子酒服五丸日三以知為度又方治丈夫小兒食實不消胃氣不調或溫壯熱結大小便不利者有病冷者服露宿丸熱藥後當進此丸調胃方大黃二兩小草甘草芍藥芎藭葶藶各一兩杏仁五十枚右七味為末蜜丸飲服如梧子五丸日三一歲小兒二丸漸加之千金翼有菖蒲當歸乾薑茯苓麥門冬細辛為十三味無杏仁論曰凡病宿食在上管當吐之脈數而滑者實也有宿食不消下之愈胃中有澼食冷物即痛不能食有熱物即欲食大腹有宿食寒栗發熱如瘧狀宿食在小腹者當暮發熱明旦復止寸脈緊即頭痛風寒或腹中宿食不化寸口脈緊者如轉索左右無常脾胃中有宿食不消寸口脈浮而大按之反澀尺中微而澀故知宿食大麴蘖丸主消榖斷下溫和又寒冷者長服不患霍亂方大麥蘖麴各一升附子乾薑當歸人參各三兩赤石脂一兩桔梗女萎各二兩吳茱茰皂莢各五兩蜀椒二兩半烏梅五十枚右十三味為末蜜酢中半漬梅一宿蒸三斗米下去核搗如泥和藥蜜和搗三千杵服十丸日三下甚者加龍骨阿膠艾各三兩消食斷下圓寒冷者常服之方麴大麥蘖各一升吳茱茰四兩右三味為末蜜和服十五丸如梧子大日三乾薑散治不能食心意冥然忘食方乾薑法麴蜀椒豉大麥蘖各一升右五味合治下篩日後服三方寸匕日三以能食為度消食圓治數年不能食方小麥蘖麴各一升乾薑烏梅各四兩右四味為末蜜和服十五丸日再加至四十丸寒在胸中及反胃翻心者皆瘥麴蘖散主消榖能食除腸中水氣臚脹方法麴麥蘖杏仁各五兩右三味治下篩食後酒服一合日三脾勞第三論方論曰凡脾勞病者補肺氣以益之肺旺則感於脾是以聖人春夏養陽氣秋冬養隂氣以順其根本矣肝心為陽脾肺腎為隂逆其根則伐其本隂陽四時者萬物之終始也半夏湯治脾勞實四肢不用五臟乖反脹滿肩息氣急不安承氣泄實熱方半夏宿薑各八兩茯苓白术杏仁各三兩大棗二十枚竹葉切一升橘皮芍藥各四兩右九味㕮咀以水一斗煮取三升分四服消食膏酒治脾虛寒勞損氣脹噫滿食不下通噫方豬膏三升宿薑汁五升吳茱茰一升白术一斤右四味搗茱茰白术等二味細細下篩為散內薑汁膏中煎取六升溫清酒一升進方寸匕日再肉極第四論方論曰凡肉極者主脾也脾應肉肉與脾合若脾病則肉變色又曰至隂遇病為肌痺肌痺不已復感於邪內舍於脾體癢淫淫如鼠走其人身上津液脫腠理開汗大泄鼻端色黃是其相也凡風氣藏於皮膚肉色則敗以季夏戊巳日傷於風為脾風脾風之狀多汗隂動傷寒寒則虛虛則體重怠惰四肢不欲舉不嗜飲食食則咳咳則右脅下痛隂隂引肩背不可以動轉名曰厲風裏虛外實若陽動傷熱熱則實實則人身上如鼠走脣口壞皮膚色變身體津液脫腠理開汗大泄名曰惡風而須決其綱紀知其終始隂陽動靜肉之虛實實則㵼之虛則補之能治其病者風始入肉皮毛肌膚筋脈之間即須決之若入六腑五臟則半死矣扁鵲曰肉絶不治五日死何以知之皮膚不通外不得泄凡肉應足太隂太隂氣絶則脈不營其肌肉脣反者氣盡則肉先死使良妙藥終不治也治肉熱極肌痺淫淫如鼠走身上津液脫腠理開汗大泄為痺風風氣藏於皮膚肉色敗鼻見黃色麻黃止汗通肉解風痺湯方麻黃防已一作防風枳實細辛白术各三兩生薑附子各四兩甘草桂心各二兩石膏八兩右十味㕮咀以水九升煮麻黃去沫下諸藥煮取三升分三服續命湯治肉極虛熱肌痺淫淫如鼠走身上津液開泄或痺不仁四肢急痛方麻黃生薑各三兩當歸石膏各二兩芎藭桂心甘草黃芩防風芍藥各一兩杏仁四十枚右十一味㕮咀以水九升先煮麻黃除沫下諸藥煮取三升去滓分四服日再越婢湯治肉極熱則身體津液脫腠理開汗大泄厲風氣下焦腳弱方見别卷石南散治肉熱極則體上如鼠走或如風痺脣口壞皮膚色變主諸風大病方石南三十銖薯蕷芍藥一本作甘草天雄桃花一作桃仁甘菊花各一兩黃耆十八銖山茱茰一兩十八銖真珠十八銖石膏二兩升麻萎蕤各一兩半右十二味治下篩酒下方寸匕日再食後服大黃耆酒治肉極虛寒為痺風隂動傷寒體重怠惰四肢不欲舉關節疼痛不嗜飲食虛極所致方黃耆桂心巴戟天石斛澤㵼茯苓柏子仁乾薑蜀椒各三兩防風獨活人參各二兩天雄芍藥附子烏頭茵芋栝蔞根山茱茰半夏細辛白术黃芩各一兩右二十三味㕮咀絹袋貯以清酒三斗漬之秋冬七日春夏三日初服三合漸漸加微痺為度日再治肉極虛寒卒中風口噤不能言四肢緩縱偏攣急痛注五臟恍惚喜怒無常手腳不隨方獨活茵芋黃芩各三兩甘草防風芍藥芎藭麻黃葛根各二兩人參一兩烏頭三枚右十一味㕮咀以水一斗竹瀝四升合煮取四升分四服日三夜一備急千金要方卷四十七
