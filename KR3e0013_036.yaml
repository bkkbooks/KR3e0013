body:
  text: 備急千金要方卷三十六唐孫思邈撰宋林億等校正肝臟方肝臟脉論第一論曰夫人禀天地而生故内有五臟六腑精氣骨髓筋脉外有四肢九竅皮毛爪齒咽喉脣舌肛門胞囊以此緫而成軀故將息得理則百脉安和役用非宜即為五勞七傷六極之患有方可救雖病無他無法可憑奄然永徃所以此之中帙巻卷備述五臟六腑等血脉根源循環流注與九竅應㑹處所并論五臓六腑等輕重大小長短闊狹受盛多少仍列對治方法丸散酒煎湯膏摩熨及灸針孔穴並窮於此矣其能留心於醫術者可考而行之其冷熱虚實風氣準藥性而用之則内外百痾無所逃矣凡五臓在天為五星在地為五嶽約時為五行在人為五臟五臟者精神魂魄意也論隂陽察虚實知病源用補㵼應禀三百六十骨節終㑹通十二經焉論曰肝主魂為郎官隨神徃來謂之魂魂者肝之藏也目者肝之官肝氣通於目目和則能辨五色矣左目甲右目乙循環紫宫榮華於爪外主筋内主血肝重四斤四兩左三葉右四葉凡七葉有六童子三玉女守之神名藍藍主藏魂號為魂藏隨節應㑹故云肝藏血血舍魂在氣為語在液為淚肝氣虚則恐實則怒肝氣虚則夢見園花生草得其時夢伏樹下不敢起肝氣盛則夢怒厥氣客於肝則夢山林樹木凡人寝臥血歸於肝肝受血而能視足受血而能歩掌受血而能握指受血而能攝凡肝臟象木與膽合為腑其經足厥隂與少陽為表裏其脉弦相於冬王於春春時萬物始生其氣來濡而弱寛而虚故脉為弦濡即不可發汗弱則不可下寛者開開者通通者利故名曰寛而虚春脉如弦春脉肝也東方木也萬物之所以始生也故其氣來濡弱輕虚而滑端直以長故曰弦反此者病何如而反其氣來實而弦此謂太過病在外其氣來不實而㣲此謂不及病在内太過則令人善忘忘一作怒忽忽眩冒而癲疾不及則令人胷痛引背兩脇胠滿肝脉來濡弱招招如揭竿末稍曰平巢源作綽綽如按琴瑟之絃如揭長竿平春以胃氣為本肝脉來盈實而滑如循長竿曰肝病肝脉來急而益勁如新張弓弦曰肝死真肝脉至内外急如循刀刀責責然巢源作頥頥然如按琴瑟絃巢源作如新張弓弦色青白不澤毛折乃死春胃㣲弦曰平弦多胃少曰肝病但弦無胃曰死胃而有毛曰秋病毛甚曰金病肝藏血血舍魂悲哀動中則傷魂魂傷則狂妄其精不守一作狂妄不精不敢正當人令人隂縮而攣筋兩脇肋骨舉一作不舉毛悴色夭死于秋足厥隂氣絶則筋縮引卵與舌厥隂者肝脉也肝者筋之合也筋者聚於隂器而脉絡於舌本故脉弗營則筋縮急筋縮急則引卵與舌故脣青舌巻卵縮則筋先死庚篤辛死金勝木也肝死蔵浮之弱按之中如索不來或曲如蛇行者死春肝木王其脉弦細而長曰平反得沈濡而滑者是腎之乗肝母之歸子為虚邪雖病易治反得浮大而洪者是心之乗肝子之乗母為實邪雖病自愈反得㣲澀而短千金翼云㣲浮而短澀者是肺之乗肝金之尅木為賊邪大逆十死不治反得大而緩者是脾之乗肝土之陵木為㣲邪雖病即瘥心乗肝必吐利肺乗肝即為癰腫左手關上隂絶者無肝脉也苦癃遺溺難言脇下有邪氣善吐刺足少陽治陽左手關上隂實者肝實也苦肉中痛動善轉筋吐刺足厥隂治隂肝脉來濯濯如倚竿如琴瑟絃再至曰平三至曰離經病四至脱精五至死六至命盡足厥隂脉也肝脉急甚為惡言一作妄言㣲急為肥氣在脇下如覆柸緩甚為嘔㣲緩為水瘕痺大甚為内癰善嘔衂㣲大為肝痺縮欬引小腹小甚為多飲㣲小為消癉滑甚為頽疝㣲滑為遺溺濇甚為淡飲㣲濇為瘈瘲筋攣肝脉摶堅而長色不青當病墜若摶因血在脇下令人喘逆其濡而散色澤者當病溢飲溢飲者渴暴多飲而溢入肌膚腸胃之外也素問溢入作易入青脉之至也長而左右彈有積氣在心下支胠名曰肝痺得之寒濕與疝同法腰痛足冷頭痛扁鵲云肝有病則目奪精虚則寒寒則隂氣壮壮則夢山樹等實則熱熱則陽氣壮壮則夢怒肝在聲為呼在變動為握在志為怒怒傷肝精氣并於肝則憂肝虚則恐實則怒怒而不已亦生憂矣色主春病變於色者取之榮病先發於肝者頭目眩脇痛支滿一日之脾閉塞不通身病體重二日之胃而腹脹三日之腎小腹腰脊痛脛痠十日不已死冬日入夏早食病在肝平旦慧下晡甚夜半静假令肝病西行若食雞肉得之當以秋時發病以庚辛日也家有血腥死女子見之以明要為災不者若感金銀物得之凡肝病之状必兩脇下痛引小腹令人善怒虚則目􅉩􅉩無所見耳無所聞善恐如人将捕之若欲治之當取其經足厥隂與少陽氣逆則頭目痛耳聾不聰頰腫取血者肝脉沈之而急浮之亦然若脇痛有氣支滿引小腹痛時小便難苦目眩頭痛腰脊痛足為寒時癃女人月事不來時無時有得之少年有所墮墜肝病其色青手足拘急脇下苦滿或時眩冒其脉弦長此為可治宜服防風竹瀝湯秦芁散春當刺大敦夏刺行間冬刺曲泉皆補之季夏刺太衝秋刺中㕁皆㵼之又當灸其門百壮背第九椎五十壮邪在肝則兩脇中痛寒中惡血在内胻善瘈節時腫取之行間以引脇下補三里以温胃中取血脉以散惡血取耳間青脉以去其瘈凡有所墮墜惡血留内若有所大怒氣上而不能下積于左脇下則傷肝肝中風者頭目瞤兩脇痛行常傴令人嗜甘如阻婦状肝中寒者其人洗洗惡寒翕翕發熱面翕然赤漐漐有汗胷中煩熱肝中寒者其人兩臂不舉舌本又作大舌燥善太息胷中痛不得轉側時盜汗欬食已吐其汁肝主胷中喘怒罵其脉沈胷中又窒欲令人推按之有熱鼻窒肝傷其人脱肉又臥口欲得張時時手足青目瞑瞳人痛此爲肝臓傷所致也肝水者其人腹大不能自轉側而脇下腹中痛時時津液㣲生小便續通肝脹者脇下滿而痛引小腹不寧肝著其病人常欲蹈其胷上先未苦時但欲飲熱診得肝積脉弦而細兩脇下痛邪氣走心下足脛寒脇痛引小腹男子積疝女子瘕淋身無膏澤善轉筋爪甲枯焦青黒春瘥而秋劇色青也肝之積名曰肥氣在左脇下如覆杯有頭足如龜鼈状乆乆不愈發欬逆㾬而連歳月不已以季夏戊巳日得之何也肺病傳肝肝當傳脾脾適以季夏王王者不受邪肝復欲還肺肺不肯受因留結為積故知肥氣以季夏得之肝病胷滿脇脹善恚怒呌呼身體有熱而復惡寒四肢不舉面白身體滑其脉當弦長而急今反短濇其色當青而反白者此是金之尅木為大逆十死不治襄公問扁鵲曰吾欲不診脉察其音觀其色知其病生死可得聞乎答曰乃聖道之大要師所不傳黄帝貴之過於金玉入門見病觀其色聞其呼吸則知徃來出入吉㓙之相角音人者主肝聲也肝聲呼其音琴其志怒其經足厥隂厥逆少陽則榮衛不通隂陽交錯隂氣外傷陽氣内擊擊則寒寒則虚虚則卒然喑啞不聲此為厲風入肝續命湯主之方見别卷中但踞坐不得低頭面目青黒四肢緩弱遺失利便甚則不可治賖則旬月之内桂枝湯主之方見别卷中又呼而哭哭而反吟此為金尅木隂撃陽隂氣起而陽氣伏伏則實實則熱熱則喘喘則逆逆則悶悶則恐畏目視不明語聲切急謬說有人此為邪熱傷肝甚則不可治若脣色雖青向眼不應可治地黄煎主之方見下肝虚實篇中肝病為瘧者令人色蒼蒼然太息其状若死者烏梅丸主之方見别卷中若其人本來少於悲恚忽爾嗔怒出言反常乍寛乍急言未竟以手向眼如有所畏若不即病禍必至矣此肝病聲之候也若其人虚則為寒風所傷若實則為熱氣所損陽則㵼之隂則補之青為肝肝合筋青如翠羽者吉肝主目目是肝之餘其人木形相比於上角蒼色小頭長面大肩平背直身小手足有材好勞心少力多憂勞於事耐春夏不耐秋冬秋冬感而生病足厥隂他他然脇廣合堅脆傾正則肝應之正青色小理者則肝小小則蔵安無脇下之病粗理者則肝大大則虚虚則寒逼胃迫咽善膈中旦脇下痛廣脇反骹者則肝髙髙則實實則肝熱上支賁加脇下急為息賁合脇危一作兎骹者則肝下下則逼胃脇下空空則易受邪脇骨堅者則肝堅則臓安難傷脇骨弱者則肝脆脆則善病消癉易傷脇腹好相者則肝端正端正則和利難傷脇骨偏舉者則肝偏傾偏傾則脇下偏痛凡人分部䧟起者必有病生膽少陽為肝之部而蔵氣通於内外部亦隨而應之沈濁為内浮清為外若色從外走内者病從外生部處起若色從内出外者病從内生部處䧟内病前治隂後治陽外病前治陽後治隂陽主外隂主内凡人死生休否則蔵神前變形于外人肝前病目則為之無色若肝前死目則為之脫精若天中等分墓色應之必死不治看應增損斟酌賖促賖則不出四百日内促則不延旬月之間肝病少愈而卒死何以知之曰青白色如拇指大黶㸃見顔頰上此必卒死肝絶八日死何以知之面青目赤但欲伏眠目視而不見人汗出如水不止一日二日死面黒目青者不死青如草滋死吉㓙之色在於分部順順而見青白入目必病不出其年若年上不應三年之中禍必應也春木肝脉色青主足少陽脉也春取絡脉分肉春者木始治肝氣始生肝氣急其風疾經脉常深其氣少不能深入故取絡脉分肉之間其脉根本並在竅隂之間應在窻籠之前窻籠者耳前上下脉以手按之動者是也其筋起於小指次指之上結外踝上循胻外亷結於膝外亷其支者别起於外輔骨上走髀前者結伏兎之上後者結於尻其直者上䏚乗季脇上走腋前亷俠於膺乳結於缺盆直者上出掖貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於鼽其支者結於目外眥為外維其脉起於目兊眥上抵頭角下耳後循頸行手少陽之前至肩上却交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至兊眥後其支者别兊眥下大迎合手少陽於䪼下加頰車下頸合缺盆以下胷中貫膈絡肝屬膽循脇裏出氣街繞毛際横入髀厭中其直者從缺盆下腋循胷過季脇下合髀厭中以下循髀陽出膝外亷下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上出小指次指之端其支者别跗上入大指之間循大指岐内出其端還貫入爪甲出三毛合足厥隂為表裏厥隂之本在行間上五寸應在背輸同㑹于手太隂其足少陽之别名曰光明去踝半寸是也别走厥隂下絡足跌主肝生病病實則膽熱熱則厥厥則陽病陽脉反逆大於寸口一倍病則胷中有熱心脇頭頷痛缺盆腋下腫虚則膽寒寒則痿躄則隂病隂脉反小於寸口病則胷中有寒少氣口苦身體無膏澤外至胻絶骨外踝前及諸節皆痛若隂陽俱静與其俱動如引䋲俱頓者病也此盡是足少陽膽經筋脉支别為病今取足厥隂肝經附于後足厥隂之脉起於大指聚毛之際上循足趺上亷去内踝一寸上踝八寸交出太隂之後上膕内亷循股隂入毛中環隂器抵小腹俠胃屬肝絡膽上貫膈布脇肋循喉嚨之後上入頏顙連目系上出額與督脉㑹于巔一本云其支者從小腹與太隂少陽結於腰髁下第三第四骨空中其支者從目系下頰裏環脣内其支者復從肝别貫膈上注肺中是動則病腰痛不可以俛仰丈夫頽疝婦人小腹腫甚則嗌乾面塵脱色是主肝所生病者胷滿嘔逆洞泄狐疝遺溺閉癃盛者則寸口大一倍於人迎虚者則寸口反小於人迎也足厥隂之别名曰蠡溝去内踝上五寸别走少陽其别者循經上睪結於莖其病氣逆則睪腫卒疝實則挺長熱虚則暴癢取之所别足厥隂之筋起於大指之上上結於内踝之前上循胻上結内輔之上下循隂股結於隂器結絡諸筋春三月者主肝膽青筋牽病也其源從少隂而渉足少陽少陽之氣始發少隂之氣始衰隂陽怫鬰於腠理皮毛之病俱生表裏之痾因起從少陽發動反少隂氣則臓腑受癘而生其病相反若腑虚則為隂邪所傷腰背强急脚縮不伸胻中欲折目中生花若臓實則為陽毒所損濇濇前寒而後熱頸外雙筋牽不得屈伸頸直背强眼赤黄若欲轉動合身囘側故曰青筋牽病方見傷寒卷灸法扁鵲曰灸肝肺二輸主治丹毒牽病當依源處治調其陽理其隂臓腑之疾不生矣肝虚實第二脉法方灸肝實熱左手關上脉隂實者足厥隂經也病苦心下堅滿常兩脇痛息忿忿如怒状名曰肝實熱也竹瀝泄熱湯治肝實熱陽氣伏邪熱喘逆悶恐目視物無明狂悸非意而言者方竹瀝十升麻黄大青梔子仁升麻茯苓𤣥參知母各三分生葛石膏各八分生薑芍藥各四分右十二味㕮咀以水九升煮取二升半去滓下竹瀝煮兩三沸分三服須利下芒硝三分去芍藥加生地黄五分刪繁方無石膏生薑芍藥生葛用人參三分前胡湯治肝實熱目痛胷滿氣急塞㵼肝方前胡芒硝秦皮梔子仁决明子黄芩升麻蕤仁細辛各三兩苦竹葉車前葉各切一升右十一味㕮咀以水九升煮取三升去滓下芒硝分三服又一方有柴胡三兩共十二味防風散治肝實熱夢怒虚驚方防風茯苓萎蕤白术橘皮丹參各一兩三分細辛二兩甘草射干各一兩升麻黄芩各一兩半大棗三七枚酸棗仁三分右十三味治下篩為粗散以兩方寸匕帛褁以井花水二升煮時時動上褁子煎取一升分服日二逺志散治肝邪熱出言反常乍寛乍急方逺志射干杏仁大青各一兩半茯神麥門冬葛根甘草各一兩芍藥一兩三分桂心三分知母升麻各五分石膏二兩右十三味治下篩為粗散以水二升五合煮竹葉一升取汁内藥一匕半煎取八合為一服日一以綿褁散煮之地黄煎治邪熱傷肝好生悲怒所作不定自驚恐方生地黄淡竹葉生薑車前草乾藍各切一升赤蜜一升丹參𤣥參各四兩茯苓二兩石膏五兩右十味㕮咀以水九升煮取三升去滓停冷下蜜更煎三兩沸分三服肝膽俱實左手關上脉隂陽俱實者足厥隂與少陽經俱實也病苦胃脹嘔逆食不消名曰肝膽俱實也肝虚寒左手關上脉隂虚者足厥隂經也病苦脇下堅寒熱腹滿不欲飲食腹脹悒悒不樂婦人月經不利腰腹痛名曰肝虚寒也補肝湯治肝氣不足兩脇下滿筋急不得大息四肢厥冷發搶心腹痛目不明了及婦人心痛乳癰膝熱消渴爪甲枯口面青者方山茱茰翼作烏頭甘草桂心各三兩桃仁翼作蕤仁栢子仁細辛茯苓防風各二兩大棗二十四枚右九味㕮咀以水九升煮取五升去滓分三服補肝散治左脇偏痛乆宿食不消并目􅉩􅉩昏風淚出見物不審而逆風寒偏甚消食破氣止淚方山茱茰桂心薯蕷天雄茯苓人參各五分芎藭白术獨活五加皮大黄各七分橘皮三分防風乾薑丹參厚朴細辛桔梗各一兩半甘草甘菊花一兩貫衆半兩陳麥麴大麥蘖各一升右二十三味治下篩酒服方寸匕日二若食不消食後服若止痛食前服之松膏酒補肝治肝虚寒或髙風眼淚等雜病方以松脂十斤細剉以水淹浸一周日煮之細細接取上膏水竭更添之脂盡更水煮如前煙盡去火停冷脂當沈下取一斤釀米一石水七斗好麴末二斗如家常釀酒法仍冷下飯封一百日脂米麴並消酒香滿室細細飲之此酒須一倍加麴枸杞酒治同前𢷬碎枸把子一斗先内絹袋中酒二斗漬訖宻封泥甕勿洩曝乾天隂勿出三七日滿旦温酒任性飲之忌酢防風煎治肝虚寒目􅉩􅉩視物不明諦視生花補方防風細辛芎藭獨活白鮮皮甘草各三兩橘皮二兩大棗三七枚蜜五合甘竹葉切一升右十味㕮咀以水一斗二升先煮九味取四升去滓下蜜更煎兩沸分四服日三夜一若五六月以燥器貯冷水藏之檳榔湯治肝虚寒脇下痛脹滿氣急目昏濁視物不明方檳榔二十四枚附子七枚母薑七兩茯苓橘皮桂心各三兩桔梗白术各四兩吳茱茰五兩右九味㕮咀以水九升煮取三升去滓温服每服一升若氣喘者加芎藭三兩半夏四兩甘草二兩治肝虚目不明方灸肝輸二百壮小兒酌量可灸一二七壮肝膽俱虚左手關上脉隂陽俱虚者足厥隂與少陽經俱虚也病苦恍惚尸厥不知人妄見少氣不能言時時自驚名曰肝膽俱虚也肝勞第三論方論曰肝勞病者補心氣以益之心王則感於肝矣人逆春氣則足少陽不生而肝氣内變順之則生逆之則死順之則治逆之則亂反順為逆是謂關格病則生矣豬膏酒治肝勞虚寒關格勞澀閉塞不通毛悴色夭方豬膏薑汁各二升右二味以㣲火煎取三升下酒五合和煎分為三服虎骨酒治肝虚寒勞損口苦關節骨疼痛筋攣縮煩悶方虎骨一升灸焦碎如雀頭丹參八兩乾地黄七兩地骨皮乾薑芎藭各四兩猪椒根五加皮白术枳實各五兩右十味㕮咀絹袋盛以酒四斗浸四日初服六七合漸加至一升日再備急千金要方卷三十六
