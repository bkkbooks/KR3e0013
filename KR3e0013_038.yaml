body:
  text: 備急千金要方卷三十八唐孫思邈撰宋林億等校正膽腑方膽腑脈論第一論曰膽腑者主肝也肝合氣於膽膽者中清之腑也難經云膽者清淨之腑甲乙云中清之腑也號將軍決曹吏重三兩三銖長三寸三分在肝短葉間下貯水精汁二合難經作三合能怒能喜能剛能柔目下果大其膽乃橫凡膽腦髓骨脈女子胞此六者地氣之所生也皆藏於隂而象於地故藏而不瀉名曰竒恆之腑若胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天故㵼而不藏此受五臟濁氣名曰傳化之腑此不能久留輸㵼者也所謂五臟者藏精氣甲乙作神而不㵼故滿而不能實六腑者傳化物而不藏故實而不能滿所以然者水榖入口則胃實而腸虛食下則腸實而胃虛故曰實而不滿滿而不實也左手關上陽絶者無膽脈也若膝疼口中苦眯目善畏如見鬼多驚少力刺足厥隂治隂在足大趾間或刺三毛中左手關上陽實者膽實也若腹中不安身軀習習也刺足少陽治陽在足上第二趾本節後一寸是也膽病者善太息口苦嘔宿汁心淡淡恐如人將捕之咽中介介然數唾候在足少陽之本末亦見其脈之陷下者灸之其寒熱刺陽陵泉若善嘔有苦長太息心中淡淡善悲恐如人將捕之邪在膽逆在胃膽液則口苦胃氣逆則嘔苦汁故曰嘔膽刺三里以下胃氣逆刺足少陽血絡以閉膽却調其虛實以去其邪也膽脹者脅下痛脹口苦太息肝前受病移於膽肝咳不已則嘔膽汁厥隂客於膽則夢鬪訟甲乙云夢鬪訟自刳肝應筋爪厚色黃者膽厚爪薄色紅者膽薄爪堅色青者膽急爪耎色赤者膽緩爪直色白無約者膽直爪惡色黑多敗者膽結扁鵲云足厥隂與少陽為表裏表清裏濁其病若實極則傷熱熱則驚動精神而不守臥起不定若虛則傷寒寒則恐畏頭眩不能獨臥發於玄水其根在膽先從頭靣起腫至足方見治水篇中膽有病則眉為之傾病人眉系傾者七日內必死足少陽之脈是動則病口苦善太息心脅痛不能反側甚則靣微塵體無膏澤足外反熱是為陽厥是主骨所生病者頭痛角頷痛目兊眥痛缺盆中腫痛腋下腫馬刀挾癭汗出振寒瘧胸中脅肋髀膝外至胻絶骨外踝前及諸節皆痛小指次指不用盛者則人迎大一倍於寸口虛者則人迎反小於寸口也其經脈經筋支别已見肝臟部中膽虛實第二脈法方灸膽實熱左手關上脈陽實者足少陽經也病苦腹中氣滿飲食不下咽乾頭痛灑灑惡寒脅痛名曰膽實熱也半夏湯治膽腑實熱精神不守㵼熱方半夏宿薑各三兩黃芩一兩生地黃五兩逺志茯苓各二兩秫米一斗酸棗仁五合右八味㕮咀以千里長流水五斗煮秫米令蟹目沸掦一千餘遍澄清取九升煮藥取三升半分三服集驗方治虛煩悶不得眠無地黃逺志有麥門冬桂心各三兩甘草人參各二兩治胸中膽病方灸濁浴隨年壯穴在俠膽輸傍行相去五寸膽虛寒左手關上脈陽虛者足少陽經也病苦眩厥痿足指不能搖躄不能起僵仆目黃失精􅉩􅉩名曰膽虛寒也溫膽湯治大病後虛煩不得眠此膽寒故也宜服此方半夏竹茹枳實各二兩橘皮三兩生薑四兩甘草三兩右六味㕮咀以水八升煮取二升分三服治膽虛方灸三隂交各二十壯穴在內踝上一夫千里流水湯治虛煩不得眠方麥門冬半夏各三兩茯苓四兩酸棗仁二升甘草桂心黃芩逺志萆薢人參生薑各二兩秫米一斗右十二味㕮咀以千里流水一斛煮米令蟹目沸掦萬遍澄清取一斗煮藥取二升半分三服酸棗湯治虛勞煩擾奔氣在胸中不得眠方酸棗仁五升人參桂心生薑各二兩石膏四兩茯苓知母各三兩甘草一兩半右八味㕮咀以水一斗先煮酸棗仁取七升去滓下藥煮取三升分三服日三治虛勞煩悶不得眠方大棗二七枚蔥白七莖右二味以水三升煮取一升去滓頓服梔子湯治大下後虛勞不得眠劇者顛倒懊憹欲死方仲景云發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子湯主之大梔子十四枚䜴七合右二味以水四升先煮梔子取二升半內豉更煮三沸去滓每服一升安者勿更服若上氣嘔逆加橘皮二兩亦可加生薑二兩治煩悶不得眠方枸杞白皮生地黃五兩麥門冬甘草前胡各三兩茯苓知母各四兩人參二兩粟米䜴各五合右十味㕮咀以水八升煮取三升七合分四服治虛勞不得眠方酸棗榆葉各等分右二味為末蜜丸如梧子每服十五丸日再為度又方乾薑四兩為末湯和頓服覆取汗病愈咽門論第三論曰夫咽門者應五臟六腑往還神氣隂陽通塞之道也喉嚨胞囊舌者並津液調五味之氣本也不可不研乎咽門者肝膽之候也其重十兩廣二寸五分至胃管長一尺六寸主通五臟六腑津液神氣應十二時若臟熱則咽門閉而氣塞若腑寒則咽門破而聲嘶母薑酒主之方見别卷熱則通之寒則補之若寒熱調和病不生矣髓虛實第四論方論曰髓虛者腦痛不安髓實者勇悍凡髓虛實之應主於肝膽若其腑臟有病從髓生熱則應臟寒則應腑羌活補髓圓治髓虛腦痛不安膽腑中寒方羌活芎藭當歸各三兩桂心二兩人參四兩棗肉研如脂羊髓酥各一升牛髓大麻仁各二升熬研如脂右十味先搗五種乾藥為末下棗膏麻仁又搗相濡為一家下二髓并酥內銅鉢中重湯煎取好為丸如梧子酒服三十丸日二服稍加至四十丸柴胡發泄湯治髓實勇悍驚熱主熱方柴胡升麻黃芩細辛枳實梔子仁芒硝三兩淡竹葉生地黃一升澤㵼四兩右十味㕮咀以水九升煮取三升去滓下硝分三服風虛雜補酒煎第五方巴戟天酒治虛羸陽道不舉五勞七傷百病能食下氣方巴戟天牛膝各三斤枸杞根白皮麥門冬地黃防風各二斤右六味並生用卒無生者用乾者亦得㕮咀以酒一石四斗浸七日去滓溫服常令酒氣相續勿至醉吐慎生冷豬魚油蒜春七日秋冬二七日夏勿服先患冷者加乾薑桂心各一斤好忘加逺志一斤大虛勞加五味子蓯蓉各一斤隂下濕加五加根皮一斤有石斛加一斤佳每加一斤藥則加酒七升此酒每年入九月中旬即合入十月上旬即服設服餘藥以此酒下之大妙滓曝乾搗為末以此酒服方寸匕日三益生常加甘草十兩佳虛勞加黃耆一斤又方巴戟天生牛膝各三斤右二味㕮咀以酒五斗淹浸服如前法五加酒治虛勞不足方五加皮枸杞根白皮各一斗右二味㕮咀以水一石五斗煮取汁七斗分取四斗浸麴一斗餘三斗用拌飯下米多少如常釀法熟壓取服之多少任性禁如藥法倍日將息天門冬大煎治男子五勞七傷八風十二痺傷中六極一氣極則多寒痺腹痛喘息驚恐頭痛二肺極則寒痺腰痛心下堅有積聚小便不利手足不仁三脈極則顔色苦青逆意喜恍惚失氣狀似悲泣之後苦舌強咽喉乾寒熱惡風不可動不嗜食苦眩喜怒妄言四筋極則拘攣小腹堅脹心痛膝寒冷四肢骨節皆痛疼五骨極則肢節厥逆黃疸消渴癰疽妄發重病浮腫如水病狀六肉極則發疰如得擊不復言甚者至死復生衆醫所不能治此皆六極七傷所致非獨房室之為也憂恚積思喜怒悲歡復隨風濕結氣咳時嘔吐食已變大小便不利時泄利重下溺血上氣吐下乍寒乍熱臥不安席小便赤黃時時惡夢夢與死人共飲食入冡神室魂飛魄散筋極則傷肝傷肝則腰背相引難可俯仰氣極則傷肺傷肺則小便有血目不明髓極則隂痿不起住而不交骨極則傷腎傷腎則短氣不可久立隂痛惡寒甚者卵縮隂下生瘡濕癢手搔不欲住汁出此皆為腎病甚者多遭風毒四肢頑痺手足浮腫名曰腳弱一名腳氣醫所不治此悉主之方天門冬生地黃各切三斗半搗壓盡取汁白蜜三升錬酥三升鍊枸杞根切三斗淨洗以水二石五斗煮取一斗三升澄清麞骨一具搗碎以水一石煮取五斗澄清右六味並大斗銅器中微火先煎門冬地黃汁減半乃合煎取大斗二斗下後件散藥煎取一斗內銅器重釜煎令隱掌可丸如梧子大平旦空腹酒服二十丸日二加至五十丸慎生冷醋滑豬雞魚蒜油麵等須擇四時王相日修合其合和一如第一卷合和篇説散藥如左茯苓桂心白术萎蕤五加皮菖蒲逺志澤㵼薯蕷柏子仁人參石斛牛膝杜仲覆盆子細辛獨活枳實芎藭大豆黃卷黃耆蓯蓉續斷狗脊胡麻仁萆薢白芷橘皮茯神巴戟天石南各二兩阿膠十兩甘草六兩蜀椒薏苡仁一升蔓荆子三兩大棗一百枚煮作膏鹿角膠五兩右三十八味治下篩內煎中有牛髓鹿髓各加三升大佳小便澀去柏子仁加秦芁二兩乾地黃六兩隂痿失精去萎蕤加五味子二兩頭風去柏子仁加菊花防風各二兩小便利隂氣弱去細辛防風加山茱茰二兩腹中冷去防風加乾薑二兩無他疾依方修合凡此煎九月下旬採藥立冬日合服至五月上旬止若十二月臘日合者經夏至七月下旬止若停留經夏不壞當於舍北隂處入地深六尺填沙置藥中上加沙覆之則經夏不損也女人先患熱者得服患冷者勿服填骨萬金煎治內勞少氣寒疝裏急腹中喘逆腰脊痛方生地黃三十斤取汁肉蓯蓉甘草阿膠各一斤麥門冬乾地黃二斤乾薑茯苓桑根白皮桂心各八兩人參桔梗五味子附子各五兩石斛一斤五兩牛髓三斤白蜜十斤清酒四斗麻子仁三升大棗一百五十枚當歸十四兩乾漆二十兩蜀椒四兩右二十三味先以清酒二斗六升內桑根白皮麻子仁棗膠為刻識之又加酒一斗四升煮取至刻絞去滓內蜜髓地黃汁湯上銅器煎內諸藥末半日許令可丸止大甕盛飲吞如彈丸一枚日三若夏月暑熱煮煎轉味可以蜜地黃汁和諸藥成末為丸如梧子服十五丸不知稍加至三十丸治男子風虛勞損兼時氣方甘草一斤石斛防風蓯蓉山茱茰茯苓人參薯蕷各四兩桂心牛膝五味子菟絲子巴戟天芎藭各三兩並為末生地骨皮切碎生地黃汁各一升丹參二兩生薑汁胡麻以水二斗煮取四升去滓各二升牛髓白蜜生麥門冬汁各三升右二十二味先煮地黃地骨皮胡麻汁減半內牛髓蜜薑門冬各等汁微火煎餘八升下諸藥散和令調內銅鉢中湯上煎令可丸如梧子大酒服三十丸日二加至五十丸小鹿骨煎一云麞骨治一切虛羸皆服之方鹿骨一具碎枸杞根切二升右二味各以水一斗别器各煎汁五升去滓澄清乃合一器共煎取五升日二服盡好將慎皆用大斗地黃小煎治五勞七傷羸瘦乾削方乾地黃末一升胡麻油半升蜜二升豬脂一斤右四味銅器中煎令可丸如梧子大飲服三丸日三稍加十丸久久常服大有所益瘦黑者肥充陸抗膏治虛冷枯瘦身無精光虛損諸不足方牛髓羊脂二升酥經心録用豬脂生薑汁白蜜各三升右五味先煎酥令熟次內薑汁次內蜜次內羊脂牛髓後微火煎三上三下令薑汁水氣盡即膏成攪令凝止溫酒服隨人能否不限多少令人肥健發熱也經心録云治百病勞損風濕補益神效男女通可服之良枸杞煎補虛羸久服輕身不老神驗方九月十日取生濕枸杞子一升清酒六升煮五六沸出取熟研濾取汁令其子極淨曝令乾搗末和前汁微火煎令可丸酒服二方寸匕日二加至三匕亦可丸服三十丸夏姬杏仁煎方杏仁三升內湯中去皮尖兩仁熟搗盆中水研取七八升汁以鐡釜置煻火上取羊脂四斤就釜內磨消內杏仁汁溫之四五日色如金狀餌如彈子日三服百日肥白易容人不能識也又方杏仁熬黃去皮尖搗服如梧子日三治枯瘦令人潤澤無所禁咳逆上氣喉中百病心下煩不得咽者得茯苓欵冬紫菀併力大良其藥生熱熟冷喉中如有息肉者亦服之桃仁煎方桃仁為末蜜各一斤酥半斤胡麻一升末牛乳五升地黃十斤取汁右六味合煎如餳旋服之治五勞七傷方白羊頭蹄一具淨治更以草火燒令黃赤以淨綿急塞鼻及腦孔胡椒蓽撥乾薑各一兩蔥白一升豉二升右七味先以水煮頭及蹄半熟即內藥煮令極爛去藥冷暖任性食之日一具七日凡七具忌生冷酢滑五辛陳臭等物治虛勞補方羊肚一具切白术一升右二味以水二斗煮取六升每服二升日三為度又方豉一升蒸三遍薤白一斤切右二味以水七斗煮取三升分三服小取汗膏煎治虛羸瘦方不中水豬肪煎取一升內蔥白一握煎令黃出內盆中平旦空腹服訖暖覆臥至晡時食白粥粥不得稀過三日服補藥方如左羊肝一具羊脊膂肉一條麴末半斤枸杞根十斤右四味以水三斗煮枸杞取一斗去滓細切肝等內汁中煮著蔥豉鹽如羮法合煎看如稠糖即好食之七日禁如藥法補虛方豬肚一具人參五兩蜀椒一兩乾薑二兩半蔥白七兩白粱米半斤千金翼用粳米右六味㕮咀諸藥令相得和米內肚中縫合勿令泄氣取四斗半水緩火爛煮空腹食之大佳兼下少飯吐血第六論法方灸論曰稟邱云吐血有三種有內衄有肺疽有傷胃內衄者出血如鼻衄但不從鼻孔出是近從心肺間津液出還流入胃中或如豆羮汁或如切􅀈血凝停胃中因即滿悶便吐或去數斗至一石者是也得之於勞倦飲食過常所為也肺疽者或飲酒之後毒滿悶吐之時血從吐後出或一合半升一升是也傷胃者因飲食大飽之後胃中冷則不能消化不能消化便煩悶強嘔吐使所食之物與氣共上衝蹙因傷裂胃口吐血色鮮正赤腹絞痛白汗出其脈緊而數者為難治也問曰病胸脅攴滿妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名為何何以得之對曰病名血枯此得之年少時有所大奪血若醉入房中氣竭而肝傷故使月事衰少不來也治以鰞賊骨䕡茹二味并合丸以雀卵大如小豆以五丸為後飯飲以鮑魚汁利腸中及傷肝也凡吐血後體中但自㤿㤿然心中不悶者輒自愈假令煩躁心中悶亂紛紛嘔吐顛倒不安醫工又與黃土湯阿膠散並加悶亂卒至不濟如此悶者當急吐之方爪蒂二分杜蘅人參各一分右三味治下篩服一錢匕或無水漿但得下即可羸人小減之吐去青黃或吐血一二升無苦黃土湯治吐血方伏龍肝雞子大三枚桂心乾薑當歸芍藥白芷甘草阿膠芎藭各一兩生地黃八兩細辛半兩吳茱茰二升右十二味㕮咀以酒七升水三升合煮取三升半去滓內膠煮取三升分三服亦治衄血又方治卒吐血及衄血方伏龍肝半斤甘草乾薑仲景作地黃白术阿膠黃芩各三兩右六味㕮咀以水一斗煮取三升去滓下膠分三服仲景有附子三兩為七味生地黃湯治憂恚嘔血煩滿少氣胸中痛方生地黃一斤大棗五十枚阿膠甘草各三兩右四味㕮咀以水一斗煮取四升分四服日三夜一堅中湯治虛勞內傷寒熱嘔逆吐血方糖三斤芍藥半夏生薑甘草各三兩桂心二兩大棗五十枚右七味㕮咀以水二斗煮取七升分七服日五夜二千金翼無甘草桂心有生地黃治噫止唾血方石膏四兩厚朴三兩麻黃生薑五味子半夏杏仁各二兩小麥一升右八味㕮咀以水一斗煮麻黃去沫澄取七升內藥煮取二升半分再服治吐血胸中塞痛方芍藥乾薑茯苓桂心當歸大黃芒硝各三兩阿膠甘草人參各二兩麻黃一兩乾地黃四兩虻蟲水蛭各八十枚大棗二十枚桃仁一百枚右十六味㕮咀以水一斗七升煮取四升分五服日三夜二治吐血內崩上氣面色如土方乾薑阿膠柏葉各二兩艾一把右四味㕮咀以水五升煮取一升內馬通汁一升煮取一升頓服仲景名柏葉湯不用阿膠小品不用柏葉與肘後同治吐血酒客溫疫中熱毒乾嘔心煩方蒲黃犀角栝蔞根甘草各二兩葛根桑寄生各二兩右六味㕮咀以水七升煮取三升分三服澤蘭湯治傷中裏急胸脅攣痛欲嘔血時寒時熱小便赤黃此皆傷於房勞故也澤蘭糖各一斤桂心桑根白皮人參各二兩逺志二兩生薑五兩麻仁一升右八味㕮咀以醇酒一斗五升煮取七升去滓內糖食前服一升日三夜一勿勞動治忽吐血一兩口或是心衄或是內崩方蠐螬五枚牛膝牡丹王不留行麥門冬二兩萆薢芍藥乾地黃四兩續斷阿膠各三兩右十味㕮咀以生地黃汁五升赤馬通汁三升煮取三升分三服不瘥更合數劑取瘥止又方熟艾三雞子許水五升煮取二升頓服又方燒亂髮灰水服方寸匕日三服集驗云治舌上忽出血如簪孔者亦治小便出血者治虛勞吐血方生地黃肥者五升搗以酒一升煮沸三上三下去滓頓服又方凡吐血服桂心末方寸匕日夜可二十服肘後云亦療下血良又方生地黃五斤絞取汁微火煎三沸投白蜜一升又煎取三升每服半升日三主胸痛百病久服佳又方柏葉一斤以水六升煮取三升分三服又方生地黃汁半升川大黃末一方寸匕右二味先溫地黃汁一沸次內大黃攪和空腹頓服日三瘥犀角地黃湯治傷寒及溫病應發汗而不汗之內畜血者及鼻衄吐血不盡內餘瘀血大便黑面黃消瘀血方犀角一兩生地黃八兩芍藥三兩牡丹皮二兩右四味㕮咀以水九升煮取三升分三服喜妄如狂者加大黃二兩黃芩三兩其人脈大來遲腹不滿自言滿者為無熱但依方不須有所增加治五臟熱結吐血衄血方伏龍肝雞子一枚生竹茹一升芍藥當歸黃芩芎藭甘草各二兩生地黃一斤右八味㕮咀以水一斗三升先煮竹茹減三升下藥取三升分三服千金翼有桂心當歸湯治衄血吐血方當歸乾薑芍藥阿膠各二兩黃芩三兩右五味㕮咀以水六升煮取二升分三服治上焦熱膈傷吐血衄血或下血連日不止欲死並主之艾葉竹茹各一升阿膠如手掌大乾薑二兩右四味㕮咀以水三升煮取一升去滓內馬通汁半升煮取一升頓服一方不用竹茹加乾薑作七兩又方取新馬屎與少水和絞取汁治虛勞崩中吐血下血上氣短氣欲絶面黑如漆方黃耆芍藥芎藭甘草各四兩生薑一斤右五味㕮咀以酒五升浸一宿明旦更以水五升煮取四升分四服日三夜一下隂中毒如湯沃雪凡夏月不得宿浸藥酒客勞熱發痔下血其榖道熱者去生薑用生地黃代之凡進三兩劑竹茹湯治吐血汗血大小便下血方竹茹二升甘草芎藭黃芩當歸各六分芍藥白术人參桂心各一兩右九味㕮咀以水一斗煮取三升分四服日三夜一治九孔出血方搗荆葉汁酒服二合一夲作荆芥治吐血蟲毒痔血女子腰腹痛大便後出清血者方取東向蘘荷根搗絞取汁二升頓服立瘥赤小豆散諸下血先見血後見便此為遠血宜服黃土湯方見前七味仲景方是先見便後見血此近血宜服赤小豆散方赤小豆三升熬令折當歸三兩右二味治下篩每服方寸匕日三乾地黃圓治血虛勞胸腹煩滿疼痛瘀血往來臟虛不受榖氣逆不得食補中理血方乾地黃三兩當歸乾薑麥門冬甘草黃芩各二兩厚朴乾漆枳實防風大黃細辛白术各一兩茯苓五兩前胡六分人參五分虻蟲蟅蟲各五十枚右十八味為末蜜丸如梧子大先食服十丸日三稍加麥門冬湯治凡下血虛極方麥門冬白术各四兩甘草一兩牡蠣芍藥阿膠各三兩大棗二十枚右七味㕮咀以水八升煮取二升分再服胸中瘀血榰滿脅膈痛不能久立膝痿寒三里主之嘔血肩脅痛口乾心痛與背相引不可咳咳引腎痛不容主之一作容心膈下嘔血上管主之唾血振寒嗌乾大淵主之嘔血太陵及却門主之嘔血上氣神門主之內傷唾血不足外無膏澤刺地五會灸法治虛勞吐血灸胃管三百壯亦主勞嘔逆吐血少食多飽多唾百病多唾一作多睡吐血唾血灸胸堂百壯不可針吐血酸削灸肝輸百壯吐血腹痛雷鳴灸天樞百壯吐血唾血上氣咳逆灸肺輸隨年壯吐血嘔逆灸手心主五十壯千金翼云太陵是凡口鼻出血不止名腦衄灸上星五十壯入髮際一寸是大便下血灸第二十椎隨年壯備急千金要方卷三十八
