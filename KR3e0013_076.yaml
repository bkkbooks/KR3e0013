body:
  text: 備急千金要方卷七十六唐孫思邈撰宋林億等校正備急方蛇蟲等毒第二論法方灸治因熱逐涼睡熟有蛇入口中挽不出方以刀破蛇尾內生椒三兩枚裹著須臾即出肘後方云艾炙蛇尾即出若無火以刀周匝割蛇尾截令皮斷乃捋皮倒脫即出治蛇入人口并七孔中者方割母豬尾頭滴血著口中即出又方以患人手中指等截三歲大豬尾以器盛血傍蛇瀉血口中拔出之治卒為蛇繞不解方以熱湯淋之無湯令人尿之治蛇蠍螫方服小蒜汁滓薄上肘後方云治蝮蛇螫又方熟搗葵取汁服之治蛇嚙方人尿厚塗帛裹即消治蛇毒方消蠟注瘡上不瘥更消注之又方以母豬耳中垢傳之肘後方云牛耳中垢亦可用治蝮蛇毒方令婦人騎度三過又令坐上又方以射罔塗腫上血出即愈又方生麻楮葉合搗以水絞去滓漬之又方令婦人尿瘡上又方末薑薄之乾復易治諸蛇毒方雄黃乾薑各等分右二味為末和射罔著竹筒中帶行有急用之又方雞屎二七枚燒作灰投酒中服之又方以麵圍上令童男尿著中燒鐵令赤投中冷復燒著二三度瘥又方雄黃為末傅上日一易又方鹽四兩水一斗煮十沸沸定以湯浸冷易之又方搗紫莧取汁飲一升以滓封瘡上以少水灌之又方梳中垢如指大長一寸尿和傅之又方取合口椒胡荽苖等分搗傳之無不瘥又方男子隂間毛二七枚含之有汁即咽却祕方也又方用銅青傳瘡上又方搗大蒜和胡粉傳之又方口嚼大豆葉塗之良又方豬脂和鹿角灰塗之又方炙梳汗出尉之入山草辟衆蛇方乾薑麝香雄黃各等分右三味搗為粗散以小絳袋盛帶之男左女右蛇毒塗瘡集驗方云如無麝香以射罔和代之救急方云以蜜和為膏傳螫處良又方常燒羖羊角使煙出蛇則去矣治蛇螫人瘡已愈餘毒在肉中淫淫痛癢方大蒜小蒜各一升右二味合搗以熱湯淋以汁灌瘡大良治蛇骨刺人毒痛方鐵精如大豆許內管中吹內瘡中良又方燒死鼠為末傳之治衆蛇螫方炙上三七壯無艾以火頭稱瘡孔大小爇之治虎咬瘡方濃煮葛根汁洗十數遍及搗為散以葛根汁服方寸匕日五甚者夜二又方青布急卷為繩止一物燒一頭燃內竹筒中注瘡口熏之妙又方煮鐵令濃洗瘡又方嚼栗子塗之良辟虎法凡入山燒水牛羖羊角虎狼蛇皆走論曰凡見一切毒螫之物必不得起惡心向之亦不得殺之若輒殺之於後必遭螫毒治亦難瘥愼之愼之治蠍毒方凡蠍有雌雄雄者痛止在一處雌者痛牽諸處若是雄者用井底泥塗之溫則易雌者用當瓦屋溝下泥傳之若值無雨可用新汲水從屋上淋下取泥又方取齒中殘飯傳之又豬脂封之又射罔封之又碙砂和水塗上立愈治蠍螫方若著手足以冷水漬之水微暖則易之著餘處者冷水浸故布㩉之小暖則易又方生烏頭為末唾和傳之治蜂螫毒方取瓦子摩其上唾二七遍置瓦子故處治蜂螫方豬脂蜜各五合蠟二兩右三味和煎如膏候冷以塗之又方燒蜂房為末膏和塗之肘後方云先煮蜂房洗之又燒塗之又方酥脂塗之立愈又方燒牛屎灰苦酒和塗之又方齒垢塗之又方淳酢沃地取泥塗之又方嚼鹽塗之又方以人尿新者洗之又方尿泥塗之又方反手捻地上土傳之論曰凡蠼螋蟲尿人影著處便令人病瘡其狀身中忽有處瘮痛如芒刺亦如刺蟲所螫後起細㾦㿔作聚如茱萸子狀四邊赤中央有白膿如黍粟亦令人皮肉急舉身惡寒壯熱劇者連起竟腰脅胸治之法初得之摩犀角塗上止其毒治如火丹法余以武德中六月得此疾經五六日覺心悶不佳以他法治不愈又有人教畫地作蠼螋形以刀子細細畫盡取蠼螋腹中土就中以唾和成泥塗之再塗即愈方知天下萬物相感莫曉其由矣治蠼螋尿方羖羊髭燒灰臘月豬脂和封之又方搗豉封之又方酢和胡粉塗之治蠼螋尿瘡方燒鹿角為末以苦酒和傳瘡上已有汁者燒道傍敝蒲席傳之又方槐白皮半斤切以苦酒二升漬半日刮去瘡處以洗日五六遍仍以赤小豆為末以苦酒和傳之燥復易小兒以水和又方嚼大麥以傳之三日又方燕窠中土以豬脂和傳又方熟嚼梨葉以水和塗燥復易之又方爛搗馬鞭草以傳上燥則易之又方取吳茱茰東行根下土酢和塗之治三種射工蟲毒方論曰江南有射工毒蟲一名短狐一名蜮其蟲形如甲蟲外臺云正黑狀如大飛生有一長角在口前如弩簷臨其角端曲如上弩以氣為矢因水勢以射人人或聞其在水中鉍鉍作聲要須得水沒其口便射人此蟲畏鵝鵝能食之其初始證先惡寒噤瘮寒熱筋急仍似傷寒亦如中尸便不能語朝旦小蘇晡夕輒劇寒熱悶亂是其證始得三四日當即治之治之稍遲者七日皆死初未有瘡但惡寒噤瘮及成瘡似蠼螋尿亦似瘭疽瘡射工中瘡有三種其一種瘡正黑如黛子皮周邊悉赤或衣犯之如有芒刺痛其一種作瘡久久穿或晡間寒熱其一種如火灼熛起似此者最急數日殺人備急方云有四種其一種突起如癰治射工中人寒熱或發瘡偏在一處有異於常者方取鬼臼葉一把清苦酒中熟搗絞取汁服一升日三又方取生吳茱萸莖葉一握斷去前後取握中熟搗以水二升煮取七合頓服又方取葫切帖瘡炙七壯又方取蜈蚣大者一枚火炙治為末苦酒和以傳瘡上又方取赤莧菜熟搗絞取汁每服一升日四五服又方白雞屎取白頭者三枚湯和塗中毒處又方升麻三兩犀角烏扇根各二兩右三味㕮咀以水四升煮取一升半去滓分再服相去如一炊頃盡更作治射工中人已有瘡者方取芥子爛搗苦酒和厚塗瘡上半日痛便止又方取狼牙葉冬取根搗令熟薄所中處又飲四五合汁治射工中人三種瘡方升麻二兩烏扇根三兩右二味㕮咀以水三升煮取一升適寒溫盡服滓薄上五香散治江南毒氣惡核射工中人暴腫生瘡方甲香犀角鱉甲升麻薰陸香烏翣丁香沈香黃連青木香羚羊角黃芩甘草牡蠣各四分吳茱萸三分黃蘗六分右十六味治下篩中射工毒及諸毒皆水服方寸匕日三升以水和少許洗之仍以雞子白和塗腫上乾則易野葛膏治射工惡核卒中惡毒方野葛一升巴豆烏頭蜀椒各五合茵芋躑躅附子丹砂各一兩雄黃大黃各七兩右十味治下篩以不中水豬膏三斤煎三上三下去滓內丹砂雄黃末攪至凝以棗核大摩痛上勿近眼凡合名膏皆無令産婦女人小兒雞犬六畜見之惟冝清淨治沙虱毒方斑貓二枚一枚熬為末服一大枚燒令煙絶為末著瘡中又方大蒜十枚止一物合皮安熱灰中炮令熱去皮刀斷蒜頭取熱拄所著毒處又方麝香大蒜右二味合搗以羊脂和著小筒中帶欲用取傳瘡上又方雄黃朱砂恆山各等分右三味取五月五日日中時令童子合之取傳瘡上治石蛭方山水中隂濕草木上石蛭著人則穿齧人肌膚行人肉中浸淫墳起如蟲行道之狀凡行山路草木中常以臘月豬膏和鹽塗腳脛及足趾間趺上及著鞋靺蛭不得著人也已著者炙斷其道即愈治水毒方論曰凡山水有毒蟲人涉水中人似射工而無物其診法初得之惡寒微似頭痛目匡疼心中煩懊四肢振焮腰背百節皆強兩膝痛或翕翕而熱但欲睡旦醒暮劇手足逆冷至肘膝二三日腹中生蟲食人下部肚中有瘡不痛不癢令人不覺不急治過六七日下部出膿潰蟲上食人五臟熱盛毒煩下利不禁八九日雖良醫不能治矣覺得之急早視其下部若有瘡正赤如截肉者陽毒最急若瘡如鯉魚齒者為隂毒猶小緩要皆殺人不過二十日也欲知是中水與非者當作五六升湯以小蒜五升㕮咀投湯中消息勿令大熱去滓以浴之是水毒身體當發赤斑無異者非也當以他病治之治人忽中水毒手足指冷或至肘膝者方吳茱萸一升生薑切一升半犀角升麻橘皮各二兩烏梅十四枚右六味㕮咀以水七升煮取二升分二服又方浮萍草曝乾為末酒服方寸匕又方取梅若桃葉檮絞取汁三升許或乾以少水絞取汁飲之小兒不能飲以汁傳乳頭飲之又方搗蒼耳汁服一升又以綿裹杖沾汁導下部日三瘥又方搗蓼一把以酒和絞取汁一升飲之不過三服瘥外臺肘後作梨葉又方搗藍一把水解以塗浴面目身體令遍又方搗蛇莓根為末水飲之并導下部生者用汁凡夏月行常多齎此藥屑入水以方寸匕投水上流無所畏又辟射工凡洗浴以少許投水盆中即無毒治貓鬼野道病歌哭不自由方五月五日自死赤蛇燒作灰以井花水服方寸匕日一針灸方見别卷中又方臘月死貓兒頭燒灰水服一錢匕日二治貓鬼眼見貓狸及耳雜有所聞方相思子萆麻子巴豆各一枚朱砂末蠟各四銖右五味合搗為丸先取麻子許大含之即以灰圍患人前頭著一斗灰火吐藥火中沸即畫火上作十字其貓鬼並皆死矣治蜘蛛咬毒方人尿傳又油淀傳又炮薑貼之又猢孫屎傳之又方烏麻油和胡粉如泥塗乾則易之治馬囓人及踏人作瘡毒腫熱痛方馬鞭梢二寸長鼠屎二七枚右二味合燒為末以豬膏和塗之立愈外臺方云治遂成瘡爛經久不愈者肘後方云用馬鞭皮燒末豬膏和塗治馬囓人隂卵脫出方推內入以桑皮細作線縫之破烏雞取肝細銼以封之且忍勿小便即愈治犬馬囓及馬骨刺傷人及馬血入舊瘡中方取灰汁熱漬瘡常令汁器有火數易汁勿令爛人肉三數日漬之有腫者炙石尉之日二消止治馬血入瘡中方服人糞如雞子大復以糞傳瘡上又方取婦人月水傳之神良治剝死馬馬骨傷人毒攻欲死方便取馬腸中屎塗之大良外臺方云取其屎燒灰服方寸匕治馬汗馬毛入人瘡中腫痛欲死方以水漬瘡數易水便愈又以石灰傳之又方飲醇酒取醉即愈又方燒雞毛作末以酒服方寸匕又方以沸湯令所浸洗之取瘥論曰凡春末夏初犬多發狂必誡小弱持杖以預防之防而不免者莫出於炙百日之中一日不闕者方得免難若初見瘡瘥痛定即言平復者此最可畏大禍即至死在旦夕凡狂犬咬人著訖即令人狂精神已别何以得知但看炙時一度火下即覺心中醒然惺惺了了方知咬已即狂是以深須知此此病至重世皆輕之不以為意坐是死者常年有之吾初學醫未以為業有人遭此將以見問吾了不知報答以是經吾手而死者不一自此鋭意學之一解已來治者皆愈方知世無良醫枉死者半此言非虛故將來學者非止此法餘一方皆須沈思留心作意殷勤學之乃得通曉莫以初解一兩種法即謂知訖極自誤也聊因方末申此一二言不盡意耳又曰凡猘犬咬人七日輒應一發三七日不發則脫也要過百日乃得免耳每到七日輒當搗韭汁飲一二升又當終身禁食犬肉蠶蛹食此則發死不可救矣瘡未愈之間禁食生魚及諸肥膩冷食但於飯下蒸魚及於肥器中食便發不宜飲酒能過一年乃佳集驗方云若重發者生食蟾蜍鱠絶良亦可燒灸食之必令其人知初得齧毒便為之則於後不發也治猘犬毒方頭髮猾皮各等分右二味燒灰水和飲一杯口噤者折齒內藥又方搗地榆絞取汁塗瘡無生者可取乾者以水煮汁飲之亦可為末服方寸匕日三兼傳上過百日止又方搗韭絞取汁飲一升日三瘡愈止亦治愈後復發者又方刮虎牙若骨服方寸匕小品方云刮狼牙或虎骨末服已發狂如猘大者服即愈又方燒虎骨傳瘡及尉又微熬杏仁搗研取汁服之良又取燈盞殘油灌瘡口此皆禁酒豬肉魚生菜又方用韭根故梳二枚以水二升煮取一升頓服又方桃東南枝白皮一握水二升煮取一升分二服吐出犬子又方取猘犬腦傳上後不復發又方蝦蟇灰粥飲服之又方服莨菪子七枚日一又方梅子末酒服之又方以豆醬清塗之日三四治狂犬囓人方蛇脯一枚炙去頭搗末服五分七日三又方搗莨菪根和鹽傳日三又方青布浸汁服三升又方飲驢尿一二升治凡犬囓人方熬杏仁五合令黑碎研成膏傳之又方取竈中熱灰以粉瘡中帛裹繫之又方燒自死蛇一枚令焦為末內瘡孔中又方鼠屎為末以臘月豬膏和傳之外臺方云用鼠一枚豬膏煎傳之又方飲生薑汁一升小品方云治狂犬咬韭汁亦佳外臺方云亦治已瘥後復發者又方水洗瘡任血出勿止之水洗不住取血自止以綿裹之瘥又方以沸湯和灰壅瘡上又方燒犬尾為末傳瘡日三又方以頭垢少少內瘡中又方火炙蠟以灌瘡中又方以熱牛屎塗之佳又方以苦酒和灰塗瘡中治小兒狗囓方月一日以水一升灌之勿令狗主打狗若月盡日三升水灌之灸法凡猘犬所囓未盡其惡血毒者灸上一百壯已後當日灸一壯若不血出刺出其血百日灸乃止禁飲酒及豬犬肉治豬囓方松脂錬作餅上貼之又方屋霤中泥塗備急千金要方卷七十六
