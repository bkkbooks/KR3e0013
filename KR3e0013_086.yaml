body:
  text: 備急千金要方卷八十六唐孫思邈撰宋林億等校正平脈扁鵲診諸反逆死脈要訣第十四扁鵲曰夫相死脈之氣如群鳥之聚一馬之馭系水交馳之狀如懸石之落出筋之上藏筋之下堅關之裏不在榮衛伺候交射不可知也脈病人不病脈來如屋漏雀啄者死屋漏者其來既絶而止時時復起而不相連屬也雀啄者脈來甚數而疾絶止復頻來也又經言得病七八日脈如屋漏雀啄者死脈彈人手如黍米也脈來如彈石去如解索者死彈石者辟辟急也解索者動數而隨散亂無復次序也脈困病人脈如蝦之遊如魚之翔者死蝦遊者苒苒而起尋復退沒不知所在久乃復起起輒遲而沒去速者是也魚翔者似魚不行而但拌尾動頭身搖而久住者是也脈如懸薄卷索者死脈如轉豆者死脈如偃刀者死脈涌涌不去者死脈忽去忽來暫止復來者死脈中侈者死脈分絶者死上下分散也脈有表無裏者死經名曰結去即死何謂結脈在指下如麻子動搖屬腎名曰結去死近也脈五來不復增減者死經名曰代何謂代脈五來一止也脈七來是人一息半時不復增減亦名曰代正死不疑經言病或有死或有不治自愈或有連年月而不已其死生存亡可切脈而知之耶然可具知也設病者若閉目不欲見人者脈當得肝脈弦急而長而反得肺脈浮短而澀者死病若開目而渴心下牢者脈當得緊實而數反得沈滑而微者死病若吐血復􅍠衄者脈當得沈細而反得浮大牢者死病若譫言妄語身常有熱脈當洪大而反得手足四逆脈反沈細微者死病若大腹而泄脈當微細而澀反得緊大而滑者死此之謂也經言形脈與病相反者死奈何然病若頭痛目痛脈反短澀者死病若腹痛脈反浮大而長者死病若腹滿而喘脈反滑利而沈者死病若四肢厥逆脈反浮大而短者死病若耳聾脈反浮大而澀者死千金翼云脈大者生沈遲細者難治病若目䀮䀮脈反大而緩者死左有病而右痛右有病而左痛下有病而上痛上有病而下痛此為逆逆者死不可治脈來沈之絶濡浮之不止推手者半月死一作半日脈來微細而絶者人病當死人病脈不病者生脈病人不病者死人病尸厥呼之不應脈絶者死脈當大反小者死肥人脈細小如絲欲絶者死羸人得躁脈者死人身澀而脈來往滑者死人身滑而脈來往澀者死人身小而脈來往大者死人身大而脈來往小者死人身短而脈來往長者死人身長而脈來往短者死尺脈上應寸口大遲者半日死脈經云尺脈不應寸時如馳半日死診五臟六腑十二經脈皆有相反有一反逆即為死候也診百病死生要訣第十五凡診脈當視其人大小長短及性氣緩急脈之遲速大小長短皆如其人形性者吉反之者凶診傷寒熱盛脈浮大者生沈小者死傷寒已得汗脈沈小者生浮大者死濕病三四日以下不得汗脈大疾者生脈細小難得者死不治溫病時行大熱其脈細小者死脈經時行作穰穰溫病下利腹中痛甚者死不治溫病汗不出出不至足者死厥逆汗出脈堅強急者生虛緩者死熱病二三日身體熱腹滿頭痛食飲如故脈直而疾者八日死四五日頭痛腹痛而吐脈來細強十二日死八九日頭不疼身不痛目不赤色不變而反利脈來牒牒按之不彈手時大心下堅十七日死熱病七八日脈不軟一作喘不散一作數者當瘖瘖後三日若汗不出者死熱病七八日其脈微細小便不利加暴口燥脈代舌焦枯黑者死熱病未得汗脈盛躁疾得汗者生不得汗者難瘥熱病已得汗脈靜安者生脈躁者難治熱病脈躁盛而不得汗者此陽之極也十死不治熱病已得汗脈常躁盛陰氣之極也亦死太素作陽極熱病已得汗常大熱不去者亦死大一作專熱病已得汗熱未去脈微躁者慎不得刺治也熱病發熱甚者其脈陰陽皆竭慎勿刺不汗出必下利診人被風不仁痿蹶其脈虛者生巢源云虛數者生堅急疾者死診癲病虛則可治實則死癲疾脈實堅者生脈沈細小者死癲疾脈摶大滑者久久自已其脈沈小急實不可治小堅急亦不可療診頭痛目痛久視無所見者死久視一作卒視診人心腹積聚其脈堅強急者生虛弱者死又實強者生沈者死其脈大腹大脹四肢逆冷其人脈形長者死腹脹滿便血脈大時絶極下血脈小疾者死心腹痛痛不得息脈細小遲者生堅大疾者死腸澼便血身熱則死寒則生腸澼下白沫脈沈則生浮則死腸澼下膿血脈懸絶則死滑大則生腸澼之屬身熱脈不懸絶滑大者生懸澀者死以藏期之腸澼下膿血脈沈小流連者生數疾且大有熱者死腸澼筋攣其脈小細安靜者生浮大緊者死洞泄食不化下膿血脈微小者生緊急者死泄注脈緩時小結者生浮大數者死𧈟蝕陰疰其脈虛小者生緊急者死咳嗽脈沈緊者死浮直者生浮軟者生小沈伏匿者死咳嗽羸瘦脈形堅大者死咳脫形發熱脈小堅急者死肌瘦下脫形熱不去者死咳而嘔腹脹且泄其脈弦急欲絶者死吐血衄血脈滑小弱者生實大者死汗出若衄其脈小滑者生大躁者死唾血脈緊強者死滑者生吐血而咳上氣其脈數有熱不得臥者死傷寒家咳而上氣其脈數散者死謂其人形損故也上氣脈數者死謂其形損故也上氣喘息低昻其脈滑手足溫者生脈澀四肢寒者死上氣面浮腫肩息其脈大不可治加利必死一作又甚上氣注液其脈虛寧寧伏匿者生堅強者死寒氣上攻脈實而順滑者生實而逆澀則死太素云寒氣暴上脈滿實何如曰實而滑則生實而逆則死其形盡滿何如曰舉垂盡滿者脈急大堅尺滿而不應如是者順則生逆則死何謂順則生逆則死曰所謂順者手足溫也所謂逆者手足寒也消渴其脈數大者生細小浮短者死痟疸脈實大病久可治脈懸小堅急病久不可治消渴脈沈小者生實堅大者死水病脈洪大者可治微細者不可治水病脹閉其脈浮大軟者生沈細虛小者死水病腹大如鼓脈實者生虛者死卒中惡吐血數升脈沈數細者死浮大疾快者生卒中惡腹大四肢滿脈大而緩者生緊而浮者死緊細而微者亦生病瘡腰脊強急瘈瘲者皆不可治寒熱瘈瘲其脈代絶者死金瘡血出大多其脈虛細者生數實大者死金瘡出血脈沈小者生浮大者死斫瘡出血一二石脈來大二十日死斫刺俱有病多少血出不自止斷者脈止脈來大者七日死從高頓仆內有血腹脹滿其脈堅強者生小弱者死人為百藥所中傷脈微細者死洪大而速者生脈經速作遲人病甚而脈不調者難瘥人病甚而脈洪易瘥人陰陽俱結者見其上齒如熟小豆其脈躁者死結一作竭人內外俱虛身體冷而汗出微嘔而煩優手足厥逆體不得安靜者死脈實滿手足寒頭熱春秋生冬夏死老人脈微陽羸陰強者生脈焱大加息者死陰弱陽強脈至而代竒月而死尺脈澀而堅為血實氣虛也其發病腹痛逆滿氣上行此為婦人胞中絶傷有惡血久成結瘕得病以冬時黍穄赤而死尺脈細而微者血氣俱不足細而來有力者是穀氣不足病得節輒動棗葉生而死此病秋時得之左手寸口脈偏動乍大乍小不齊從寸口至關關至尺三部之位處處動搖各異不同其人病仲夏得之此脈桃花落而死花一作葉右手寸口脈偏沈伏乍小乍大朝來浮大暮夜沈伏浮大即太過上出魚際沈伏即下不至關中往來無常時時復來者榆葉枯落而死葉一作莢右手尺部脈三十動一止有頃更還二十動一止乍動乍踈不與息數相應其人雖食穀猶不愈藝草生而死左手尺部脈四十動而一止止而復來來逆如循直木如循張弓弦絙絙然如兩人共引一索至立春而死脈經作至立冬死診三部脈虛實決死生第十六凡三部脈大都欲等只如小人細人婦人脈小軟小兒四五歲者脈呼吸八至細數吉千金翼云人大而脈細人細而脈大人樂而脈實人苦而脈虛性急而脈緩性緩而脈躁人壯而脈細人羸而脈大此皆為逆逆則難治反此為順順則易治凡婦人脈常欲濡弱於丈夫小兒四五歲者脈自訣疾呼吸八至也三部脈或至或不至冷氣在胃中故令脈不通三部脈虛其人長病得之死虛而澀長病亦死虛而滑亦死虛而緩亦死虛而弦急癲病亦死三部脈實而長長病得之死實而滑長病得之生卒病得之死實而緩亦生實而緊亦生實而緊急癲病可治三部脈強非稱其人病便死三部脈羸非其人得之死三部脈粗長病得之死卒病得之生三部脈細而軟長病得之生細而數亦生微而緊亦生三部脈微而伏長病得之死三部脈軟長病得之不治自愈治之死卒病得之生三部脈浮而結長病得之死浮而滑長病亦死三部脈浮而數長病風得之生卒病得之死三部脈芤長病得之生三部脈弦而數長病得之生卒病得之死三部脈莗長病得之生卒病得之死三部脈堅而數如銀叉股蠱毒病必死數而軟蠱毒病得之生三部脈潎潎如羹上肥長病得之死卒病得之生三部脈連連如蜘蛛絲長病得之死卒病得之生三部脈如霹靂長病得之死三部脈如角弓長病得之死三部脈纍纍如貫珠長病得之死三部脈如水淹然流長病不治自愈治之反死三部脈如屋漏長病十四日死脈經云十日死三部脈如雀啄長病七日死三部脈如釡中湯沸朝得暮死夜半得日中死日中得夜半死三部脈急切腹間病又婉轉腹痛針上下瘥備急千金要方卷八十六
