  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0013_WYG_086-1a, image: WYG0735/WYG0735-0868a.png}
body:
  text: 備急千金要方卷八十六唐孫思邈撰宋林億等校正平脉扁鵲診諸反逆死脉要訣第十四扁鵲曰夫相死脉之氣如群鳥之聚一馬之馭系水交馳之狀如懸石之落出筋之上藏筋之下堅闗之裏不在榮衞伺候交射不可知也脉病人不病脉來如屋漏雀啄者死屋漏者其來既絶而止時時復起而不相連屬也雀啄者脉來甚數而疾絶止復頻來也又經言得病七八日脉如屋漏雀啄者死脉彈人手如黍米也脉來如彈石去如解索者死彈石者辟辟急也解索者動數而隨散亂無復次序也脉困病人脉如蝦之游如魚之翔者死蝦游者苒苒而起尋復退没不知所在久乃復起起輙遲而没去速者是也魚翔者似魚不行而但拌尾動頭身摇而久住者是也脉如懸薄卷索者死脉如轉豆者死脉如偃刀者死脉涌涌不去者死脉忽去忽來暫止復來者死脉中侈者死脉分絶者死上下分散也脉有表無裏者死經名曰結去即死何謂結脉在指下如麻子動摇屬腎名曰結去死近也脉五來不復增减者死經名曰代何謂代脉五來一止也脉七來是人一息半時不復增减亦名曰代正死不疑經言病或有死或有不治自愈或有連年月而不已其死生存亡可切脉而知之耶然可具知也設病者若閉目不欲見人者脉當得肝脉弦急而長而反得肺脉浮短而濇者死病若開目而渇心下牢者脉當得緊實而數反得沈滑而微者死病若吐血復􅍠䘐者脉當得沈細而反得浮大牢者死病若譫言妄語身常有熱脉當洪大而反得手足四逆脉反沈細微者死病若大腹而泄脉當微細而澀反得緊大而滑者死此之謂也經言形脉與病相反者死奈何然病若頭痛目痛脉反短濇者死病若腹痛脉反浮大而長者死病若腹滿而喘脉反滑利而沈者死病若四肢厥逆脉反浮大而短者死病若耳聾脉反浮大而濇者死千金翼云脉大者生沈遲細者難治病若目䀮䀮脉反大而緩者死左有病而右痛右有病而左痛下有病而上痛上有病而下痛此為逆逆者死不可治脉來沈之絶濡浮之不止推手者半月死一作半日脉來微細而絶者人病當死人病脉不病者生脉病人不病者死人病尸厥呼之不應脉絶者死脉當大反小者死肥人脉細小如絲欲絶者死羸人得躁脉者死人身澀而脉來徃滑者死人身滑而脉來徃澀者死人身小而脉來徃大者死人身大而脉來徃小者死人身短而脉來徃長者死人身長而脉來徃短者死尺脉上應寸口大遲者半日死脉經云尺脉不應寸時如馳半日死診五臟六腑十二經脉皆有相反有一反逆即為死候也診百病死生要訣第十五凡診脉當視其人大小長短及性氣緩急脉之遲速大小長短皆如其人形性者吉反之者凶診傷寒熱盛脉浮大者生沈小者死傷寒已得汗脉沈小者生浮大者死濕病三四日以下不得汗脉大疾者生脉細小難得者死不治温病時行大熱其脉細小者死脉經時行作穰穰温病下利腹中痛甚者死不治温病汗不出出不至足者死厥逆汗出脉堅彊急者生虚緩者死熱病二三日身體熱腹滿頭痛食飲如故脉直而疾者八日死四五日頭痛腹痛而吐脉來細彊十二日死八九日頭不疼身不痛目不赤色不變而反利脉來牒牒按之不彈手時大心下堅十七日死熱病七八日脉不輭一作喘不散一作數者當瘖瘖後三日若汗不出者死熱病七八日其脉微細小便不利加暴口燥脉代舌焦枯黒者死熱病未得汗脉盛躁疾得汗者生不得汗者難瘥熱病已得汗脉靜安者生脉躁者難治熱病脉躁盛而不得汗者此陽之極也十死不治熱病已得汗脉常躁盛陰氣之極也亦死太素作陽極熱病已得汗常大熱不去者亦死大一作專熱病已得汗熱未去脉微躁者慎不得刺治也熱病發熱甚者其脉陰陽皆竭慎勿刺不汗出必下利診人被風不仁痿蹷其脉虚者生巢源云虚數者生堅急疾者死診癲病虚則可治實則死癲疾脉實堅者生脉沈細小者死癲疾脉摶大滑者久久自已其脉沈小急實不可治小堅急亦不可療診頭痛目痛久視無所見者死久視一作卒視診人心腹積聚其脉堅彊急者生虚弱者死又實彊者生沈者死其脉大腹大脹四肢逆冷其人脉形長者死腹脹滿便血脉大時絶極下血脉小疾者死心腹痛痛不得息脉細小遲者生堅大疾者死腸澼便血身熱則死寒則生腸澼下白沫脉沈則生浮則死腸澼下膿血脉懸絶則死滑大則生腸澼之屬身熱脉不懸絶滑大者生懸濇者死以藏期之腸澼下膿血脉沈小流連者生數疾且大有熱者死腸澼筋攣其脉小細安静者生浮大緊者死洞洩食不化下膿血脉微小者生緊急者死洩注脉緩時小結者生浮大數者死䘌蝕陰疰其脉虚小者生緊急者死欬嗽脉沈緊者死浮直者生浮輭者生小沈伏匿者死欬嗽羸瘦脉形堅大者死欬脫形發熱脉小堅急者死肌瘦下脫形熱不去者死欬而嘔腹脹且洩其脉弦急欲絶者死吐血䘐血脉滑小弱者生實大者死汗出若䘐其脉小滑者生大躁者死唾血脉緊彊者死滑者生吐血而欬上氣其脉數有熱不得臥者死傷寒家欬而上氣其脉數散者死謂其人形損故也上氣脉數者死謂其形損故也上氣喘息低昻其脉滑手足温者生脉澀四肢寒者死上氣面浮腫肩息其脉大不可治加利必死一作又甚上氣注液其脉虚寧寧伏匿者生堅彊者死寒氣上攻脉實而順滑者生實而逆澀則死太素云寒氣暴上脉滿實何如曰實而滑則生實而逆則死其形盡滿何如曰舉垂盡滿者脉急大堅尺滿而不應如是者順則生逆則死何謂順則生逆則死曰所謂順者手足温也所謂逆者手足寒也消渇其脉數大者生細小浮短者死痟癉脉實大病久可治脉懸小堅急病久不可治消渇脉沈小者生實堅大者死水病脉洪大者可治微細者不可治水病脹閉其脉浮大輭者生沈細虚小者死水病腹大如鼓脉實者生虚者死卒中惡吐血數升脉沈數細者死浮大疾快者生卒中惡腹大四肢滿脉大而緩者生緊而浮者死緊細而微者亦生病瘡腰脊彊急瘈瘲者皆不可治寒熱瘈瘲其脉代絶者死金瘡血出大多其脉虚細者生數實大者死金瘡出血脉沈小者生浮大者死斫瘡出血一二石脉來大二十日死斫刺俱有病多少血出不自止斷者脉止脉來大者七日死從高頓仆内有血腹脹滿其脉堅彊者生小弱者死人為百藥所中傷脉微細者死洪大而速者生脉經速作遲人病甚而脉不調者難瘥人病甚而脉洪易瘥人陰陽俱結者見其上齒如熟小豆其脉躁者死結一作竭人内外俱虚身體冷而汗出微嘔而煩優手足厥逆體不得安静者死脉實滿手足寒頭熱春秋生冬夏死老人脉微陽羸陰彊者生脉焱大加息者死陰弱陽彊脉至而代竒月而死尺脉濇而堅為血實氣虚也其發病腹痛逆滿氣上行此為婦人胞中絶傷有惡血久成結瘕得病以冬時黍穄赤而死尺脉細而微者血氣俱不足細而來有力者是穀氣不足病得節輙動棗葉生而死此病秋時得之左手寸口脉偏動乍大乍小不齊從寸口至闗闗至尺三部之位處處動摇各異不同其人病仲夏得之此脉桃花落而死花一作葉右手寸口脉偏沈伏乍小乍大朝來浮大暮夜沈伏浮大即太過上出魚際沈伏即下不至闗中徃來無常時時復來者榆葉枯落而死葉一作莢右手尺部脉三十動一止有頃更還二十動一止乍動乍踈不與息數相應其人雖食穀猶不愈藝草生而死左手尺部脉四十動而一止止而復來來逆如循直木如循張弓弦絙絙然如兩人共引一索至立春而死脉經作至立冬死診三部脉虚實决死生第十六凡三部脉大都欲等只如小人細人婦人脉小輭小兒四五歳者脉呼吸八至細數吉千金翼云人大而脉細人細而脉大人樂而脉實人苦而脉虚性急而脉緩性緩而脉躁人壯而脉細人羸而脉大此皆為逆逆則難治反此為順順則易治凡婦人脉常欲濡弱於丈夫小兒四五歳者脉自訣疾呼吸八至也三部脉或至或不至冷氣在胃中故令脉不通三部脉虚其人長病得之死虚而濇長病亦死虚而滑亦死虚而緩亦死虚而弦急癲病亦死三部脉實而長長病得之死實而滑長病得之生卒病得之死實而緩亦生實而緊亦生實而緊急癲病可治三部脉彊非稱其人病便死三部脉羸非其人得之死三部脉粗長病得之死卒病得之生三部脉細而輭長病得之生細而數亦生微而緊亦生三部脉微而伏長病得之死三部脉輭長病得之不治自愈治之死卒病得之生三部脉浮而結長病得之死浮而滑長病亦死三部脉浮而數長病風得之生卒病得之死三部脉芤長病得之生三部脉弦而數長病得之生卒病得之死三部脉莗長病得之生卒病得之死三部脉堅而數如銀釵股蠱毒病必死數而輭蠱毒病得之生三部脉潎潎如羹上肥長病得之死卒病得之生三部脉連連如蜘蛛絲長病得之死卒病得之生三部脉如霹靂長病得之死三部脉如角弓長病得之死三部脉累累如貫珠長病得之死三部脉如水淹然流長病不治自愈治之反死三部脉如屋漏長病十四日死脉經云十日死三部脉如雀啄長病七日死三部脉如釡中湯沸朝得暮死夜半得日中死日中得夜半死三部脉急切腹間病又婉轉腹痛針上下瘥備急千金要方卷八十六
