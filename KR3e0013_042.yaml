body:
  text: 備急千金要方卷四十二唐孫思邈撰宋林億等校正心臟方頭面風第八方拔白髮芎藭酒治腦風頭重頸頭强眼􅉩􅉩淚出善缺目欲眠睡憎風劇者耳鳴滿眉眼疼悶吐逆眩倒不自禁諸風乘虛經五臟六腑皆為癲狂諸邪病悉主之方芎藭辛夷天雄人參天門冬柏子仁磁石石膏茵芋山茱萸白頭翁桂心秦芁各三兩松蘿羚羊角細辛薯蕷菖蒲甘草各二兩雲母一兩燒令赤末為粉防風四兩右二十一味㕮咀以酒二斗漬七日初服二合漸加至五合日三有女人少時患風眩發則倒地為婦積年無兒服此酒并將紫石門冬丸服之眩瘥生兒平復紫石門冬丸方出婦人方中治頭眩屋轉眼不得開方翼名人參湯人參當歸防風黃耆麥門冬芍藥各二兩獨活白术桂心各三兩右九味㕮咀以水一斗煮取三升分三服防風湯治風眩嘔逆水漿不下食輒嘔起即眩倒發有時手足厥冷方防風防已附子乾薑甘草各一兩蜀椒桂心各二兩右七味㕮咀以水四升煮取二升分三服日三古今録驗用白术一兩又方治頭風眩欲倒眼旋屋轉腦痛方防風枳實杏仁芎藭各三兩茯神麻黃前胡生薑半夏各四兩細辛二兩竹瀝三升右十一味㕮咀以水六升合竹瀝煎取二升七合分三服頻服三兩劑佳茵芋湯治風虛眩眼暗方茵芋一分人參甘草蓯蓉黃耆茯苓秦艽厚朴烏喙各二兩防風六兩山茱萸松實各三兩右十二味㕮咀以水一斗煮取二升半分五服强者一日夜盡羸劣分五服二日盡鴟頭酒治風頭眩轉面上逰風方飛鴟頭五枚茯神一方無防風芎藭薯蕷各四兩葛根桂心細辛人參天雄乾薑枳實貫衆蜀椒各三兩獨活二兩山茱萸一升麥門冬一作天門冬石南一作石膏各五兩右十八味㕮咀絹囊盛清酒四斗漬六宿初服二合日再服稍加以知為度大三五七散治頭風眩口喎目斜耳聾方天雄細辛各三兩山茱萸乾薑各五兩薯蕷防風各七兩右六味治下篩清酒服五分匕日再不知稍加千金翼云亦治面骨痛疼小三五七散治頭風目眩耳聾方天雄三兩薯蕷七兩山茱萸五兩右三味治下篩以清酒服五分匕日再不知稍增以知為度茯神湯治風眩倒屋轉吐逆惡聞人聲方茯神獨活各四兩黃耆逺志防風各五兩生薑三兩甘草人參當歸牡蠣白术蓯蓉附子各二兩右十三味㕮咀以勞水一斗二升煮取三升服五合一日夜盡防風散治頭面風在眉間得熱如蟲行或頭眩目中淚出方防風五兩桂心天雄細辛朱砂乾薑人參烏頭附子各二兩莽草茯苓當歸各一兩右十二味治下篩酒服方寸匕日三又方治風頭眩惡風吐冷水心悶方防風二兩澤㵼一作澤蘭天雄翼作人參細辛附子薯蕷茯苓各一兩白术二兩半桂心一兩半乾薑半兩右十味治下篩酒服方寸匕常令酒氣相接則脫巾帽解髮梳頭百過復投一升酒便洗手足須臾自熱解髮以粉粉之快然便熟眠愈亦可洗頭面汁出翼云如服寒食散法治風眩翻倒無定方獨活六兩石膏蒴藋各四兩枳實三兩一方用松實右四味㕮咀以清酒八升煮取四升頓服之以藥滓尉頭覆眠取汗覺冷又內鐺中炒令熱尉之治患頭眩暈經久得瘥後四體漸羸食無味好食黃土方麴二斤白术三斤右二味為末酒和併手丸如梧桐子曝乾飲服三十丸日三斷食土為效治頭中五十種病方巴㦸菊花芎藭乾薑栝蔞根防風石南白术烏頭山茱萸附子細辛薯蕷蜀椒乾地黃人參桔梗秦芃澤㵼甘草天雄羌活各等分右二十二味治下篩以酒服方寸匕日三摩頭散治同前䕡茹半夏蜀椒各六分烏頭八分桂心七分莽草四分附子細辛各一兩右八味治下篩以大酢和摩頭記日數三日頭膚痛四五日後一著藥如前十日以酢漿洗頭復摩藥即愈若生息肉并喉咽中息肉大如棗欲塞以藥摩之即愈耳鼻齒有疾並用之良入頂散治頭面脹滿腦瘈偏枯發作有時狀似刀刺失聲隂隂然疼面目變青方山茱萸芎藭防風獨活各一兩半細辛莽草白术薯蕷牛膝石南甘草各一兩烏頭通草菖蒲附子麻黃天雄蜀椒桔梗各一兩六銖右十九味治下篩酒服方寸匕日三杏仁膏治上氣頭面風頭痛胸中氣滿賁肫氣上下往來心下煩熱産婦金瘡百病方杏仁一升去皮尖雙仁者不在用右一味搗研以水一斗濾取汁令盡以銅器煻火上從旦煮至日入當熟如脂膏下之空腹酒服一方寸匕日三不飲酒者以飲服之愼猪魚蒜酢大豆酒治頭風方大豆三升炒令無聲右一味先以一斗二升瓶盛清酒九升乘豆熱即傾著酒中密泥頭七日溫服之治中風頭痛發熱耳頰急方麻黃葛根石膏桂心各三兩附子芍藥甘草秦芃防風各二兩生薑五兩右十味㕮咀以水一斗煮取三升分三服覆取汗薯蕷散治頭目有風牽引目睛疼痛偏視不明方薯蕷三兩細辛一兩半秦芁天雄各二兩獨活桂心山茱萸各二兩半右七味治下篩酒服方寸匕日三治頭中痛身熱風熱方竹瀝三升升麻生薑杏仁各三兩芍藥柴胡各闕兩石膏生葛根各八兩右八味㕮咀以水六升合竹瀝煮取二升七合分三服菊花散治頭面逰風方菊花一兩細辛附子桂心乾薑巴㦸人參石南天雄茯苓秦芁防已各二兩防風白术山茱萸薯蕷各三兩蜀椒五合右十七味治下篩酒服方寸匕日三治頭面上風方松脂石鹽杏仁蜜蠟各一兩薰陸香二兩􅒝麻仁三兩右六味熟搗作餅淨剃百㑹上髮貼膏膏上安紙三日一易若癢刺藥上不久風定頭風散方附子一枚中形者鹽如附子大右二味治下篩沐頭竟以方寸匕摩頂上日三治頭風方服荆瀝不限多少取瘥止又方搗蒴藋根一升酒二升漬服汗出止又方蔓荆子一升為末絹袋盛以酒一斗浸七宿溫服三合日三又方臘月烏雞屎一升炒令黃為末絹袋盛以酒三升浸溫服任性常令醺酣又方七月七日麻勃三斗麻子一石末相和蒸之沸湯一石五斗三遍淋之煮取一石漬神麴二十斤令發釀黍米兩石五斗熟封三七日服清一升百日身中澀皮八風胸膈五臟骨髓伏風百病悉去治卒中惡風頭痛方搗生烏頭以大酢和塗故布上薄痛處須臾痛止日夜五六薄逐痛處薄之搗烏頭須去皮又方鹽一升為末以麻油二升煎一宿令消盡塗頭石鹽尤良又方芥子為末酢和𫝊頭一周時沐頭湯治肺勞熱不問冬夏老少頭生白屑搔癢不堪然肺為五臟之蓋其勞損傷肺氣衝頭頂致使頭癢多生白屑搔之隨手起人多患此皆從肺來世呼為頭風也方大麻子秦椒各三升皂莢屑五合肘後無右三味熟研內泔中一宿漬去滓木匕攪百遍取勞乃用沐頭髮際更别作皂莢湯濯之然後𫝊膏又方菊花獨活茵芋防風細辛蜀椒皂莢杜蘅莽草桂心右十味各等分可作湯沐及尉之又方猪椒根三兩麻黃根防風各二兩細辛茵芋各一兩右五味㕮咀以水三斗煮取一斗去滓溫以沐頭又方葶藶子煮湯以沐不過三四度愈又方蜀椒二升以水煮取汁沐髮良又方以桑灰汁沐頭去白屑神良治頭項强不得顧視方蒸好大豆一斗令變色內囊中枕之又方常以九月九日取菊花作枕袋枕卧良又方八月後取荆芥鋪床又作枕枕頭立春日去之又方穿地作小坑燒令赤以水沃之令小冷內生桃葉滿其上布席就卧令項當藥上以衣著項兩邊令氣蒸病上汗出良久愈若病大者作地坑亦大犀角湯治風毒熱頭面腫方犀角生薑各二兩苦參栝蔞根防風各一兩石膏六兩黃芩青木香升麻各三兩防已一兩半竹葉二握右十一味㕮咀以水七升煮取二升分三服相去十里久內消不利防風散治頭面遍身風腫方防風二兩白芷一兩白术三兩右三味治下篩酒服方寸匕日三治卒中風頭面腫方搗杏仁如膏以雞子黃合搗令相得傅帛上厚裹之自乾不過八九傅瘥令白髮還黑方烏麻九蒸九曝為末以棗膏丸之久服之又方旋復花一升秦椒一升桂心一尺隴西白芷一升右四味治下篩以井花水服方寸匕日三服三十日白髮還黑禁房室石灰酒治頭髮落不止方石灰三升細篩水拌令濕極熟蒸之炒令至焦以木札投中火即著為候停冷取三升絹袋貯之以酒三斗漬三宿初服半合日三四夜二稍加至一合神驗沐頭湯治脉極虛寒鬚髮墮落令髮潤澤方桑根白皮切三升以水五升淹漬煮五六沸去滓洗沐髮數數為之自不復落又方麻子三升碎白桐葉切一把右二味以米泔汁二斗煮五六沸去滓以洗沐則髮不落而長甚有驗治鬢髮墮落令生長方生柏葉切一升猪膏三升附子四枚右三味為末以膏和為三十丸用布裹一丸內泔汁中煎沐髮長不落其藥密收貯勿令泄氣又方麻葉桑葉右二味以泔煮去滓沐髮七遍長六尺又方羊糞灰淋汁洗之日三一洗不過十洗大生又方附子蔓荆子柏子仁各三分右三味以烏雞膏和搗三千杵貯新瓷器中封百日出以馬鬐膏和以傅頭訖巾裹之勿令見風日三傅即生肘後不用柏子仁以酒漬澤沐摩膏治頭中二十種病頭眩髮秃落面中風者方蜀椒莽草各二兩桂心䕡茹附子細辛各一兩半半夏乾薑各一兩右八味㕮咀以生猪肪二十兩合搗令肪消盡藥成先沐頭令淨然後以藥摩囟上日一即愈如非十二月合則用生烏麻油和塗頭皮沐頭令淨乃用之一頓生髮如昔必效方無蜀椒莽草半夏乾薑生髮膏治頭中風癢白屑方蔓荆子附子細辛續斷零陵香皂莢澤蘭防風杏仁藿香白芷各二兩松葉石南各三兩莽草一兩馬鬐膏猪脂松膏各二升熊脂三升右十八味㕮咀以清酒醋三升漬藥一宿明旦以馬鬐膏等微火煎三上三下以白芷色黃膏成用以澤髮又方烏喙三兩莽草石南細辛續斷皂莢澤蘭白术辛夷防風白芷各二兩竹葉松葉柏葉各半升猪脂四升右十五味㕮咀以清酢三升漬一宿明旦微火以脂煎三上三下白芷色黃膏成去滓濾取於沐髮後塗之一方用生油三大升千金翼無石南用杏仁不用白芷灰汁洗頭去白屑神良又方甘松香丁香白芷澤蘭桑白皮桑寄生大麻苜蓿杏仁牡荆子辛夷仁芎藭防風莽草各一兩零陵香吳藿香細辛蜀椒各二兩竹葉松葉柏葉各半升胡麻油臘猪膏各一升烏雞肪雁肪各一合右二十五味㕮咀以酢漬一宿內油膏中微火煎三上三下白芷色黃膏成去滓塗頭上日二夜一髮生又方治髮鬢秃落方莽草一兩防風升麻白芷薺苨各二兩蜣蜋四枚驢鬐膏豹膏一作狗膏馬鬐膏熊膏一作雄雞膏猪膏各半升右十一味其六味㕮咀與諸膏合煎諸藥沸則下停冷復上火三五沸止絞去滓傅頭當澤用之又方治眉落髮落生髮方白芷附子防風芎藭莽草辛夷細辛黃芩當歸蜀椒各一兩大黃一兩半蔓荆子一升馬鬐膏五合猪膏三升九月二十五日一作十五日十月十日十一月十日十二月十日右並以日正午拔之當日不飲酒食肉五辛經一拔黑者更不變又方取除日自拔白以鱉脂塗之又猪狗膽塗之又狗乳亦塗之又方用白蜜傅髮孔即不復生也治染鬚髮方胡粉三兩石灰六兩絹篩熬令黃右二味如粉以榆皮作湯和之如粉先以皂莢湯洗髮令極淨不得令有膩氣好曝乾夜卧以藥塗髮上令勻訖取桑葉相綴著頭巾上遍以裹髮一夜至旦取醋漿熱暖三遍淨洗髮又以醋泔熱暖洗髮又取生胡麻苖搗取汁三升和水煮一二沸淨濾以濯髮訖又用油湯濯之百日黑如漆又方以鹽湯洗沐後以生麻油和蒲葦灰傅之一作治白秃又方黑椹水漬之塗髮令黑又方生麻油漬烏梅常用傅頭乃良治髮黃方臘月猪脂和羊屎灰蒲灰等分封頭三日一為之又方大豆五升酢漿水二斗煮取五升沐之治鬢髮黃赤方燒梧桐灰用乳汁和塗傅鬢髮并皮肉鬢髮即黑治風頭毛髮落不生方鐵上生衣研以臘月猪脂和塗之日三亦治眉毛落生眉毛方鐵生衣墻上青衣右二味等分為末以水和塗之即生又方七月烏麻花隂乾為末以生烏麻油漬之二日一塗治眉毛鬢髮火燒瘡瘕毛不生方蒲灰以正月狗腦和傅即生治髮落不生令長方麻子一升熬黑壓取油以傅頭長髮妙又方用雁肪𫝊之又方多取烏麻花瓷器盛密蓋深埋之百日出用塗髮令髮易長而黑治禿頭方蕪青子為末以酢和傅之日三又方東行棗根長三尺以中央安甑中心蒸之以器盛兩頭汁用塗頭髮即生肘後作桑根良又方麻子三升熬焦為末以猪脂和塗之髮生為度拔白髮良日正月四日二月八日三月十二日四月十六日五月二十日六月二十四日七月二十八日八月十九日剪爪甲搔令毛孔少血出以蜜塗之即生黑毛治秃無髮者方黑熟椹二升內罌中日中曝三七日化為水洗瘡上三七日髮生神效松瀝煎治頭瘡及白秃方松瀝七合丹砂雄黃水銀研各二兩黃連三兩礬石一兩一云峭粉右六味治下篩內瀝中攪研令調以塗之先以泔清洗髮及瘡令無痂然後傅藥二日一傅三傅後當更作膿膿訖更洗凡經三度膿出訖以甘草湯洗去藥毒前後洗十數度即瘥治白秃髮落生白痂終年不瘥方五味子蛇床子逺志各三分兔絲子五分蓯蓉松脂各二分雄黃白蜜各一分雞屎白半分雌黃一分右十味治下篩以猪膏一升二合先內雄黃次內雌黃次內雞白屎次內蜜及松脂又次內諸藥煎之膏成先以桑灰洗頭燥傅之王不留行湯治白禿及頭白久瘡去蟲止痛之方王不留行東引茱萸根皮桃東南枝各五兩蛇牀子牡荆子苦竹葉蒺䔧子各三升大麻仁一升右八味㕮咀以水二斗半煮取一斗洗瘡日再并療癰疽妬乳月蝕瘡爛松脂膏治白秃及癰疽百瘡方松脂六兩礬石杜蘅一作牡荆雄黃附子大黃石南秦芁真珠苦參水銀木蘭各一兩右十二味㕮咀以酢漬一宿猪膏一斤半煎之以附子色黃去滓乃內礬石雄黃水銀更著火三沸安濕地待凝以傅上日三治白秃方羊肉濕脯炙令香及熱速搭上不過三四度癢勿搔之牛肉亦得又方新破猪肚去糞及熱速搭上癢慎勿搔當縛兩手日中卧半日去之又方皂莢湯淨洗乾拭然後以陳久油滓塗之日三又方煮桃皮汁飲之并洗又方麴豆䜴兩種治下篩醋和薄上麴一作麵又方大黑豆炒令焦為末和臘月猪脂熱暖時以匙抄封上遍即裹著勿見風又方桃花為末和猪脂封上必效方以桑椹末同和𫝊之良治赤禿方桑灰汁洗頭令淨搗桑椹封之日中曝頭睡又方馬蹄灰為末以臘月猪脂和傅之又方燒牛角灰和猪脂傅之又方搗黑椹取三升服日三令髮不生方蚌灰鱉脂相和新拔毛即塗毛孔上永不生也治鬼䑛頭方燒猫兒屎以臘月猪脂和傅上又方猫兒毛燒灰以膏和傅之又方磚末和蒜搗傅日一度增損當歸湯治心腹藴藴然痛方當歸升麻各三兩芍藥黃芩朴硝桔梗柴胡各四兩右七味㕮咀以水八升煮取二升半分三服備急千金要方卷四十二
