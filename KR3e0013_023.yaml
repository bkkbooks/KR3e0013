body:
  text: 備急千金要方卷二十三唐孫思邈撰宋林億等校正風毒腳氣方湯液第二方裹腳方附第一竹瀝湯治兩腳痺弱或轉筋皮肉不仁腹脹起如腫按之不陷心中惡不欲食或患冷方竹瀝五升甘草秦芁葛根黃芩麻黃防已細辛桂心乾薑各一兩防風升麻各一兩半茯苓三兩附子二枚杏仁五十枚右十五味㕮咀以水七升合竹瀝煮取三升分三服取汗千金翼方無茯苓杏仁有白术一兩第二大竹瀝湯治卒中風口噤不能言四肢緩縱偏痺攣急風經五臟恍惚恚怒無常手足不隨方竹瀝一斗四升獨活芍藥防風茵芋甘草白术葛根細辛黃芩芎藭各二兩桂心防已人參石膏麻黃各一兩生薑茯苓各三兩烏頭一枚右十九味㕮咀以竹瀝煮取四升分六服先未汗者取汗一狀相當即服第三竹瀝湯治風毒入人五內短氣心下煩熱手足煩疼四肢不舉皮肉不仁口噤不能語方竹瀝一斗九升防風茯苓秦芃各三兩當歸黃芩千金翼作芍藥人參芎藭千金翼作防已細辛桂心甘草升麻千金翼作通草麻黃白术各二兩附子二枚蜀椒一兩葛根五兩生薑八兩右十八味㕮咀以竹瀝煮取四升分五服初得病即須摩膏日再痺定止千金翼無麻黃蜀椒生薑麻黃湯治惡風毒氣腳弱無力頑痺四肢不仁失音不能言毒氣衝心有人病者但一病相當即服此第一服次服第二第三第四方麻黃一兩大棗二十枚茯苓三兩杏仁三十枚防風白术當歸升麻芎藭芍藥黃芩桂心麥門冬甘草各二兩右十四味㕮咀以水九升清酒二升合煮取二升半分四服日三夜一覆令小汗粉之莫令見風第二服獨活湯方獨活四兩乾地黃三兩生薑五兩葛根桂心甘草芍藥麻黃各二兩右八味㕮咀以水八升清酒二升合煎取二升半分四服日三夜一腳弱特忌食瓠子蕺菜犯之一世治不愈第三服兼補厚朴湯并治諸氣咳嗽逆氣嘔吐方厚朴芎藭桂心乾地黃芍藥當歸人參各二兩黃耆甘草各三兩吳茱萸二升半夏七兩生薑一斤右十二味㕮咀以水二斗煮猪蹄一具取汁一斗二升去上肥內清酒三升合煮取三升分四服相去如人行二十里久第四服風引獨活湯兼補方獨活四兩茯苓甘草各三兩升麻一兩半人參桂心防風芍藥當歸黃耆乾薑附子各二兩大豆二升右十三味㕮咀以水九升清酒三升合煮取三升半分四服相去如人行二十里久更進服防風湯治腳痺并治毒氣上衝心胸嘔逆宿癖積氣疝氣一病相當即服之方防風麻黃芎藭人參芍藥當歸茯苓半夏甘草橘皮各一兩鱉甲生薑桂心各二兩杏仁一兩半赤小豆一升貝子烏梅各五兩大棗二十枚吳茱萸五合犀角羚羊角各半兩薤白十四枚右二十二味㕮咀以水一斗煮取三升分三服一日令盡一方用水一斗二升間食糜一方半夏三兩隨時用獨活湯治腳痺方獨活四兩當歸防風茯苓芍藥黃耆葛根人參甘草各二兩大豆二升附子一枚乾薑三兩右十二味㕮咀以水一斗清酒二升合煮取三升分三服越婢湯治風痺腳弱方麻黃六兩石膏半升白术四兩大附子一枚生薑三兩甘草二兩大棗十五枚右七味㕮咀以水七升先煮麻黃再沸掠去沫入諸藥煮取三升分三服覆取汗胡洽方只五味若惡風者加附子一枚多淡水者加白术四兩治腳弱神驗方防已蜀椒細辛桂心麻黃石膏獨活防風黃芩茵芋葛根芎藭芍藥甘草各一兩生薑茯苓各三兩烏頭二枚右十七味㕮咀以竹瀝一斗煮取四升分六服令一日一夜服盡其間可常作赤小豆飲有人腳弱先服常用竹瀝湯四劑未覺增損作此方後覺得力又云脉沉細駃風在內者作此湯也風引湯治兩腳疼痺腫或不仁拘急不得行方麻黃石膏獨活茯苓各二兩吳茱萸附子秦芃細辛桂心人參防風芎藭防已甘草各一兩乾薑一兩半白术三兩杏仁六十枚右十七味㕮咀以水一斗六升煮取三升分三服取汗大鱉甲湯治腳弱風毒攣痺氣上及傷寒惡風溫毒山水瘴氣熱毒四肢痺弱方鱉甲二兩防風麻黃白术石膏知母升麻茯苓橘皮芎藭杏仁人參半夏當歸芍藥萎㽔甘草麥門冬各一兩羚羊角六銖大黃一兩半犀角青木香雄黃各半兩大棗十枚貝齒烏頭七枚生薑三兩薤白十四枚麝香三銖小赤豆三合吳茱萸五合右三十一味㕮咀以水二斗煮取四升分六服相去十里久得下止一方用大黃半兩畏下可止用六銖一方用羚羊角半兩毒盛可用十八銖胡洽有山茱萸半升為三十二味千金翼無知母升麻橘皮芎藭人參當歸萎㽔小鱉甲湯治身體虛脹如微腫胸心痞滿有氣壯熱小腹厚重兩腳弱方鱉甲黃芩升麻麻黃羚羊角桂心杏仁各三兩前胡四兩烏梅二十枚薤白三十枚右十味㕮咀以水一斗煮取二升七合分三服此常用若體强壯欲須利者加大黃二兩風緩湯治腳弱舉體痺不仁熱毒氣入臟胸中滿塞不通食即嘔吐方半夏一升大棗烏梅二十枚桂心鱉甲升麻橘皮枳實甘草吳茱萸大黃各一兩生薑石膏各六兩貝齒七枚獨活麻黃犀角各三兩一方用羚羊角右十七味㕮咀以水一斗四升煮取四升分五服日三夜二不瘥至三劑必瘥治腳氣初發從足起至膝脛骨腫疼者方取蜱麻葉切搗蒸薄裹之日二三易即消蜱麻子似牛蜱蟲故名蜱麻也若冬月無蜱麻取蒴藋根搗碎和酒糟三分根一分合蒸熱及熱封裹腫上如前法日二即消亦治不仁頑痺此方非湯不當見此然以前後三方俱出蘇長史更不分出若腫已入䏶至小腹脹小便瀝少者方取烏特牛尿一升二服日二取消乃止千金翼云羸瘦人二分尿一分牛乳合煮乳浮結乃服之若腫已消仍有此候者急服此湯方蘇長史方神驗麻黃射干人參茯苓防已前胡枳實各二兩半夏犀角羚羊角青木香橘皮杏仁升麻各一兩生薑五兩獨活三兩吳茱萸一升右十七味㕮咀以水一斗二升煮取四升分五服相去二十里久中間進少粥以助胃氣此湯兩日服一劑取病氣退乃止以意消息之若熱盛喘煩者加石膏六兩生麥門冬一升去吳茱萸若心下堅加鱉甲一兩夫腳氣之疼先起嶺南稍來江東得之無漸或微覺疼痺或兩脛腫滿或行起澀弱或上入腹不仁或時冷熱小便祕澀喘息氣衝喉氣急欲死食嘔不下氣上逆者皆其候也若覺此證先與犀角旋復花湯方犀角旋復花各二兩橘皮茯苓生薑各三兩大棗七枚香䜴一升紫蘇莖葉一握右八味㕮咀以水八升煮取二升七合分三服相去十里久服之以氣下小便利為度崔氏云小犀角湯如其不下服後大犀角湯大犀角湯療腳氣毒衝心變成水身體遍腫悶絶欲死方犀角旋復花白术桂心防已黃芩生薑橘皮茯苓各二兩香䜴一升桑白皮前胡各四兩大棗十枚紫蘇莖葉一握右十四味㕮咀以水九升煮取二升七合分三服相去十里久取下氣為度若得氣下小便利腳腫即消能食若服湯竟不下氣急不定仍服後犀角麻黃湯崔氏又以白前代白术無防已黃芩桑白皮名旋復花湯犀角麻黃湯方犀角麻黃防風獨活崔氏用茯苓防已芎藭白术當歸黃芩羚羊角崔氏用附子各二兩石膏四兩生薑甘草杏仁崔氏用細辛桂心各三兩右十五味㕮咀以水二斗煮麻黃去沫取汁八升下藥煎取三升分三服相去十里久服訖覆取汗若不瘥五日後更一劑取汗同前茱萸湯治腳氣入腹困悶欲死腹脹方蘇長史方吳茱萸六升木瓜兩顆切右二味以水一斗三升煮取三升分三服相去如人行十里久進一服或吐或汗或利或大熱悶即瘥此起死回生方小風引湯治中風腰腳疼痛弱者方胡洽名大風引湯獨活茯苓人參各三兩防風當歸甘草乾薑胡洽作桂心石斛各二兩胡洽作黃耆附子一枚大豆二升右十味㕮咀以水九升酒三升煮取三升分四服服畢相去如人行十里久胡洽云南方治腳弱與此别用升麻一兩半夏芍藥各二兩合十三味本只有十味減當歸石斛名小風引湯刪繁一方無石斛以療肉極寒肌肉變古痿名曰惡風腰痛腳弱四物附子湯治風濕相薄骨節煩痛四肢拘急不可屈伸近之則痛自汗出而短氣小便不利惡風不欲去衣或頭面手足時時浮腫方附子二枚桂心四兩白术三兩甘草二兩右四味㕮咀以水六升煮取三升分三服微汗愈大汗煩者一服五合體腫者加防已四兩悸氣小便不利加茯苓三兩既有附子今加生薑三兩治腳弱風毒實及嶺南瘴氣而腫乍寒乍熱似瘧狀腳腫氣上心悶咳嗽癱緩頑痺方麻仁升麻麻黃射干菖蒲芒硝甘草大黃各半兩䜴三合右九味㕮咀以水六升煮取二升半內芒硝又煎三沸分三服微利一二行解毒熱有腫滓薄之凡覺氣滿輒服一劑佳道人深師增損腎瀝湯治風虛勞損挾毒腳弱疼痺或不隨下焦虛冷胸中微有客熱心虛驚悸不得眠食少失氣味日夜數過心煩迫不得卧小便不利又時復下湘東王至江州王在嶺南病悉如此極困篤余作此湯令服即得力病似此者服無不瘥隨宜增損之方黃耆甘草芍藥麥門冬人參肉蓯蓉乾地黃赤石脂茯神地骨白皮當歸逺志磁石枳實防風龍骨各一兩桂心芎藭各二兩生薑四兩五味子三合半夏一升大棗三十枚白羊腎一具右二十三味㕮咀以水二斗煮羊腎取汁一斗二升內諸藥煮取四升分為五服不利下者除龍骨赤石脂小便澀以赤茯苓代茯神加白术三兩多熱加黃苓一兩遺溺加桑螵蛸二十枚胡洽方無黃耆蓯蓉赤石脂地骨皮磁石枳實防風龍骨半夏冇黃芩為十五味石膏湯治腳氣風毒熱氣上衝頭面面赤矜急鼻塞去來無時令人昏憒心胸恍惚或若驚悸身體戰掉手足緩縱或酸痺頭目眩重眼反鼻辛熱氣出口中或患味甜諸惡不可名狀者方石膏龍膽升麻芍藥貝齒甘草鱉甲黃芩羚羊角各一兩橘皮當歸各二兩右十一味㕮咀以水八升煮取三升分為三服半夏湯治腳氣上入腹腹急上衝胸氣急欲絶方半夏一升桂心八兩乾薑五兩甘草人參細辛附子各二兩蜀椒二合右八味㕮咀以水一斗煮取三升分三服初稍稍進恐氣衝上格塞不得下小小服通人氣耳烏頭湯治風冷腳痺疼痛攣弱不可屈伸方烏頭細辛蜀椒各一兩甘草秦芃附子桂心芍藥各二兩乾薑茯苓防風當歸各三兩獨活四兩大棗二十枚右十四味㕮咀以水一斗二升煮取四升分五服若熱毒多服益佳迮毒湯治腳弱風熱上入心腹煩悶欲絶方半夏生薑各四兩黃耆甘草當歸人參厚朴獨活橘皮各一兩枳實麻黃乾地黃芍藥各二兩桂心三兩貝子七枚大棗二十枚右十六味㕮咀以水一斗二升煮取三升六合分四服日三夜一風緩湯治腳弱體痺不仁毒氣上入藏胸中滿塞不通食輒吐失味方獨活甘草石膏各三兩羚羊角犀角各半兩麻黃防風當歸升麻橘皮吳茱萸桂心半夏鱉甲各二兩枳實一兩生薑六兩大棗二十枚貝齒七枚烏頭二兩一作烏梅七枚右十九味㕮咀以水一斗四升煮取四升一服一升若有少虛熱者加乾地黃二兩紫蘇子湯治腳弱上氣昔宋湘東王在南州患腳氣困篤服此湯大得力方紫蘇子半夏各一升前胡厚朴甘草當歸各一兩橘皮三兩大棗二十枚生薑一斤桂心四兩右十味㕮咀以水一斗三升煮取三升半分為五服日三夜二附子湯治濕痺緩風身體疼痛如欲折肉如錐刺刀割方附子三枚芍藥桂心甘草茯苓人參各三兩白术四兩右七味㕮咀以水八升煮取三升分三服防風湯治肢體虛風微痙發熱肢節不隨恍惚狂言來去無時不自覺悟南方支法存所用多得力溫和不損人為勝於續命越婢風引等湯羅廣州一門南州士人常用亦治腳弱甚良方防風麻黃秦芃獨活生薑半夏各二兩當歸逺志甘草防已人參黃芩升麻芍藥各一兩石膏半兩麝香六銖一方用白术一兩右十六味㕮咀以水一斗三升煮取四升一服一升初服厚覆取微汗亦當兩三行下其間相去如人行十里久更服有熱加大黃二兩先有冷心痛疾者倍用當歸加桂心三兩不用大黃甘草湯治腳弱舉身洪腫胃反食穀吐逆胸中氣結不安而寒熱下痢不止小便難服此湯即益亦服女麴散利小便腫消服大散摩膏有驗方甘草人參各一兩半夏一升桂心蜀椒各三兩小麥八合大棗二十枚生薑八兩吳茱萸二升右九味㕮咀以水一斗三升煮小麥取一斗去小麥內諸藥煮取三升分為六服女麴散見别卷恆山甘草湯若寒熱日再三發可服此方恆山三兩甘草一兩半右二味㕮咀以水四升煮取一升半分三服相去五里久一服丹參牛膝煮散治腳痺弱氣滿身微腫方丹參牛膝桑白皮杏仁升麻猪苓茯苓各四兩犀角黃芩橘皮防已白前澤瀉桂心秦芃各三兩李根白皮生薑各二兩大麻仁一升右十八味搗粗篩以水一升半內散方寸匕煮取七合輕絹濾去滓頓服日再夏月熱不得服圓散此煮散頃年常用大驗治腰胳不隨兩腳攣腫方蜀椒四升以水四斗煮取二斗半甕盛下著火暖之懸板為橋去湯二寸許以腳踏板拄腳坐以綿絮密塞勿令泄氣若疲即出入被以粉摩之一食久更入甕常令甕下火不絶勿使湯冷如此消息不過七日得伸展并腫亦消備急千金要方卷二十三
