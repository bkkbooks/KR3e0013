  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0013_WYG_032-1a, image: WYG0735/WYG0735-0331a.png}
body:
  text: 備急千金要方卷三十二唐孫思邈撰宋林億等校正傷寒方傷寒雜病第十論法方灸論曰凡除熱解毒無過苦酢等物故多用苦參青葙艾梔子葶藶苦酒烏梅之屬是其要也夫熱盛非苦酢物不解也熱在身中既不時治治之又不用苦酢等藥此如救火不以水也必不可得脫免也又曰今諸療多用辛甘薑桂人參之屬此皆貴價難得常有比行求之轉以失時而苦參青葙葶藶艾之屬所在盡有除熱解毒最良勝于向貴價藥也前後數參並用之得病內熱者不必按藥次也便以青葙苦參艾苦酒療之但稍與促其間無不解也扁鵲曰病在腠理湯尉之所及病在血脉針石之所及病在骨髓無可奈何而凡醫治病或言且待使病成乃頓去之此為妄矣當預約束家中及所部曲具語解此意使有病者知之為要治溫氣病欲死方苦參一兩以酒二升煮取一升盡飲之當吐則除諸毒病服之覆取汗皆愈張文仲及肘後云治熱毒氣死破棺千金湯苦參湯治熱病五六日已上方苦參三兩黃芩二兩生地黃八兩右三味㕮咀以水八升煎取二升適寒溫服一升日再凝雪湯治時行毒病七八日熱積聚胸中煩亂欲死起死人搨湯方芫花一升以水三升煮取一升半漬故布薄胸上不過三薄熱即除當溫暖四肢護厥逆也栝蔞湯治傷寒中風五六日已上但胸中煩乾嘔方栝蔞實一枚黃芩甘草各三兩生薑四兩大棗十二枚柴胡半斤右六味㕮咀以水一斗二升煮取五升絞去滓適寒溫服一升日三蘆根飲子治傷寒後嘔噦反胃及乾嘔不下食方生蘆根切青竹茹各一升粳米三合生薑三兩右四味以水七升先煮千里鞋底二隻取五升澄清下藥煮取二升半隨便飲不瘥重作取瘥治傷寒後嘔噦方通草三兩生蘆根切一升橘皮一兩粳米三合右四味㕮咀以水五升煮取二升隨便稍飲不瘥更作取瘥止治傷寒後虛羸少氣嘔吐方石膏麥門冬半夏各一升竹葉二把人參二兩右五味㕮咀以水一斗煮取六升去滓內粳米一升米熟湯成飲一升日三服一方加生薑五兩此方正是仲景竹葉湯方前卷汗後門中已有此方仍少甘草分兩不别治熱毒攻手足赤腫焮熱疼腫痛欲脫方煮馬屎若羊屎汁漬之日三度又方濃煮虎杖根適寒溫以漬手足令至踝上一尺止又方稻穰灰汁漬之又方取好酒煮苦參以漬之又方猪膏和羊屎塗之亦佳又方取常思草絞取汁以漬之一名蒼耳漏蘆連翹湯治時行熱毒變作赤色癰疽丹疹毒熱赤腫赤痛生障翳方漏蘆連翹黃芩麻黃白术升麻甘草各一兩枳實大黃各三兩右九味㕮咀以水九升煮取三升分三服相去如人行五里久更服熱盛者可加芒硝二兩猪膽湯治傷寒五六日斑出方猪膽苦酒各三合雞子一枚右三味合煎三沸强者盡服之羸者須煎六七沸分為二服汗出即愈治人及六畜時氣熱病豌豆瘡方濃煮黍穰汁洗之一莖是穄穰即不瘥瘡若黑者搗蒜封之又方煮藝薹洗之治熱病後豌豆瘡方黃連三兩以水二升煮取八合頓服之又方真波斯青黛大如棗水服之瘥又方青木香二兩以水三升煮取一升頓服之愈又方若赤黑發如疥大一作疾火者煎羊脂摩傅之又方小豆屑雞子白和而傅之又方以婦人月水帛拭之又方小兒著取月水汁和水浴之又方灸兩手腕硯子骨尖上三壯男左女右木香湯治瘡煩疼者方青木香二兩薰陸香礬石丁香各一兩麝香半兩右五味㕮咀以水四升煮取一升半再服熱毒盛者加犀角一兩無犀角以升麻代之病輕者去礬石神驗又方芒硝和猪膽塗上勿動痂落無㾗仍卧黃土末上良此病小便澀有血者內壞瘡皆黑靨不出膿者死不治也治內發瘡盛方酢四合大猪膽一具右二味合煎三沸服一合日五服之良治豌豆瘡初發覺欲作者方煮大黃五兩服之愈治時行病發瘡方取好蜜遍身摩瘡上亦可以蜜煎升麻摩之并數數食之治傷寒鼻衄肺間有餘熱故也熱因血自上不止用此方牡蠣二兩半石膏一兩六銖右二味治下篩酒服方寸匕日三四亦可蜜丸如梧子大用治大病瘥後小勞便鼻衄者治傷寒熱病喉中痛閉塞不通方生烏扇一斤切猪脂一斤右二味合煎藥成去滓取如半雞子大薄綿裹之內喉中稍稍咽之取瘥又方升麻芍藥羚羊角各三兩通草四兩射干二兩生蘆根切一升右六味㕮咀以水七升煮取二升半分作二服治熱病口中苦下氣除熱喉中鳴煎方石膏半升蜜一斤右二味以水三升先煮石膏取二升次內蜜復煎取如餳含如棗核許盡復含之大良治傷寒熱病後口乾喜唾咽痛方大棗二十枚烏梅十枚右二味合搗蜜和含如杏核大咽其汁甚驗矣禹餘糧湯傷寒服湯藥而下利不止心下痞堅服㵼心湯竟復以他藥下之利不止醫以理中與之而利益甚理中治中焦此利在下焦治之方禹餘糧赤石脂各一斤碎右二味以水六升煮取二升分三服若不止當利小便治傷寒後下利膿血方阿膠一兩黃蘗二兩黃連四兩梔子十四枚右四味㕮咀以水六升煮取二升去滓內阿膠更煎令消分為三服甲乙方無黃蘗冇黃芩治赤白下膿小兒得之三日皆死此有􅉶蟲在下部方麝香礬石巴豆附子真珠雄黃各等分右六味治合取桑條如箭簳長三寸以綿纒頭二寸唾濡綿展取藥著綿上內榖道中半日復易之日再神效麻黃升麻湯治傷寒六七日其人大下後脉沈遲手足厥逆下部脉不至咽喉不利唾膿血泄痢不止為難治者方麻黃知母萎㽔亦作菖蒲黃芩各三兩升麻芍藥當歸乾薑石膏茯苓白术桂心甘草麥門冬各二兩右十四味㕮咀以水一斗先煮麻黃減二升去上沫次內諸藥煮取三升分服一升微取汗愈治溫毒及傷寒內虛外熱攻胃下黃赤汁及爛肉汁赤滯下伏氣腹痛諸熱毒方梔子二七枚䜴一升薤白一握右三味以水四升先煮梔子薤白令熟次內䜴煮取二升半分三服頻服取瘥治病後虛腫方䜴五升醇酒一斗右二味煮三沸及熱頓服不耐酒者隨性覆取汗治汗不止方地黃三斤切以水一斗煮取三升分作三服又方白术葉作飲飲之又方白术方寸匕以飲服之治卒得汗不止方以溫酒服牛羊脂愈又方服屎亦止治盜汗及汗無時方以韭根四十九枚水二升煮一升頓服之為度又方䜴一升以酒二升漬三日服不瘥更合服不過三劑即止又方死人席緣燒灰煮汁洗身瘥止汗方杜仲牡蠣各等分右二味治下篩臨夜卧以水服五錢匕又方牡蠣雷丸麻黃根各三兩乾薑甘草各一兩米粉二升右六味治下篩隨汗處粉之牡蠣散治卧即盜汗風虛頭痛方牡蠣白术防風各三兩右三味治下篩酒服方寸匕日二止汗無出此方一切泄汗服之三日皆愈備急千金要方卷三十二
