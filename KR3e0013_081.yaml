body:
  text: 備急千金要方卷八十一唐孫思邈撰宋林億等校正飬性飬性序第一扁鵲云黃帝說晝夜漏下水百刻凡一刻人百三十五息十刻一千三百五十息百刻一萬三千五百息人之居世數息之間信哉嗚呼昔人嘆逝何可不為善以自補邪吾常思一日一夜有十二時十日十夜百二十時百日百夜一千二百時千日千夜一萬二千時萬日萬夜一十二萬時此為三十年若長夀者九十年只得三十六萬時百年之內斯須之間數時之活朝菌蟪蛄不足為喻焉可不自攝飬而馳騁六情孜孜汲汲追名逐利千詐萬巧以求虛譽沒齒而無厭故飬性者知其如此於名於利若存若亡於非名非利亦若存若亡所以沒身不殆也余慨時俗之多僻皆放逸以殞亡聊因暇日粗述飬性篇用奬人倫之道好事君子與我同志焉夫飬性者欲所習以成性性自為善不習無不利也性既自善內外百病自然不生禍亂災害亦無由作此飬性之大經也善飬性者則治未病之病是其義也故飬性者不但餌藥餐霞其在兼於百行百行周備雖絶藥餌足以遐年德行不充縱服玉液金丹未能延夀故老子曰善攝生者陸行不遇虎兕此則道德之指也豈假服餌而祈遐年哉聖人所以制藥餌者以救過行之人也故危者抱病歷年而不修一行纒痾沒齒終無悔心此其所以岐和長逝彭跗永歸良有以也嵇康曰飬生有五難名利不去為一難喜怒不除為二難聲色不去為三難滋味不絶為四難神慮精散為五難五者必存雖心希難老口誦至言咀嚼英華呼吸太陽不能不回其操不夭其年也五者無於胸中則信順日躋道德日全不祈善而有福不求夀而自延此飬生之大㫖也然或有服膺仁義無甚泰之纍者抑亦其亞歟黃帝問於岐伯曰余聞上古之人春秋皆度百歲而動作不衰今時之人年至半百而動作皆衰者時代異邪將人失之也岐伯曰上古之人其知道者法則隂陽和於術數飲食有常節起居有常度不妄作勞故能形與神俱而盡終其天年度百歲乃去今時之人則不然以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂起居無節故半百而衰也夫上古聖人之教也下皆為之虛邪賊風避之有時恬淡虛無真氣從之精神守內病安從來是以其志間而少欲其心安而不懼其形勞而不倦氣從以順各從其欲皆得所願故甘其食美其服素問作美其食任其服樂其俗高下不相慕故其民日朴是以嗜欲不能勞其目淫邪不能惑其心愚智賢不肖不懼於物合於道數故皆能度百歲而動作不衰者其德全不危也是以人之夀夭在於撙節若消息得所則長生不死恣其情欲則命同朝露也岐伯曰人年四十而隂氣自半也起居衰矣年五十體重耳目不聰明也年六十隂痿氣力大衰九竅不利下虛上實涕泣俱出故曰知之則强不知則老同出名異智者察同愚者察異愚者不足智者有餘有餘則耳目聰明身體輕强年老復壯壯者益理是以聖人為無為之事樂恬淡之味能縱欲快志得虛無之守故夀命無窮與天地終此聖人之治身也春三月此謂發陳天地俱生萬物以榮夜臥早起廣步於庭被髮緩形以使志生生而勿殺與而勿奪賞而勿罰此春氣之應飬生之道也逆之則傷肝夏為寒為變則奉長者少夏三月此謂蕃秀天地氣交萬物華實夜臥早起毋厭於日使志無怒使華英成秀使氣得泄若所愛在外此夏氣之應飬長之道也逆之則傷心秋為㾬瘧則奉收者少冬至重病秋三月此謂容平天氣以急地氣以明早臥早起與雞俱興使志安寧以緩秋刑收斂神氣使秋氣平毋外其志使肺氣清此秋氣之應飬收之道也逆之則傷肺冬為餐泄則奉藏者少冬三月此謂閉藏水冰地坼無擾乎陽早臥晚起必待日光使志若伏若匿若有私意若已有得去寒就溫母泄皮膚使氣亟奪此冬氣之應飬藏之道也逆之則傷腎春為痿厥則奉生者少天有四時五行以生長收藏以寒暑燥濕風人有五臟化為五氣以生喜怒悲憂恐故喜怒傷氣寒暑傷形暴怒傷隂暴喜傷陽故喜怒不節寒暑失度生乃不固人能依時攝飬故得免其夭枉也仲長統曰王侯之宫美女兼千卿士之家侍妾數百晝則以醇酒淋其骨髓夜則房室輸其血氣耳聽淫聲目樂邪色宴內不出遊外不返王公得之於上豪傑馳之於下及至生産不時字育太早或童孺而擅氣或疾病而搆精精氣薄惡血脉不充既出胞藏飬護無法又蒸之以綿纊爍之以五味胎傷孩病而脆未及堅剛復縱情欲重重相生病病相孕國無良醫醫無審術姦佐其間過謬常有㑹有一疾莫能自免當今少百歲之人者豈非所習不純正也抱朴子曰或問所謂傷之者豈色欲之間乎答曰亦何獨斯哉然長生之要其在房中上士知之可以延年除病其次不以自伐若年當少壯而知還隂丹以補腦采七益於長俗一作谷者不服藥物不失一二百歲也但不得仙耳不得其術者古人方之於淩杯以盛湯羽苞之蓄火又且才所不逮而强思之傷也力所不勝而强舉之傷也深憂重恚傷也悲哀憔悴傷也喜怒過度傷也汲汲所欲傷也戚戚所患傷也久談言笑傷也寢息失時傷也挽弓引弩傷也沈醉嘔吐傷也飽食即臥傷也跳走喘乏傷也歡呼哭泣傷也隂陽不交傷也積傷至盡盡則早亡盡則非道也是以飬性之士唾不至逺行不疾步耳不極聽目不極視坐不久處立不至疲臥不至懻先寒而衣先熱而解不欲極饑而食食不可過飽不欲極渴而飲飲不欲過多飽食過多則結積聚渴飲過多則成痰澼不欲甚勞不欲甚佚不欲流汗不欲多唾不欲奔走車馬不欲極目逺望不欲多啖生冷不欲飲酒當風不欲數數沐浴不欲廣志逺願不得規造異巧冬不欲極溫夏不欲窮涼不欲露臥星月不欲眠中用扇大寒大熱大風大霧皆不欲冒之五味不欲偏多故酸多則傷脾苦多則傷肺辛多則傷肝鹹多則傷心甘多則傷腎此五味尅五臟五行自然之理也凡言傷者亦不即覺也謂久即損夀耳是以善攝生者臥起有四時之早晚興居有至和之常制調利筋骨有偃仰之方祛疾間邪有吐納之術流行榮衛有補瀉之法節宣勞佚有與奪之要忍怒以全隂抑喜以飬陽然後先服草木以救虧缺後服金丹以定無窮飬性之理盡於此矣夫欲快意任懷自謂逹識知命不泥異端極性肆力不勞持久者聞此言也雖風之過耳電之經目不足喻也雖身枯於留連之中氣絶於綺紈之際而甘心焉亦安可告之以飬性之事哉匪惟不納乃謂妖訛也而望彼信之所謂以明鑒給朦瞽以絲竹娛聾夫者也魏武與皇甫隆令曰聞卿年出百歲而體力不衰耳目聰明顔色和恱此盛事也所服食施行導引可得聞乎若有可傳想可密示封內隆上疏對曰臣聞天地之性惟人為貴人之所貴莫貴於生唐荒無始劫運無窮人生其間忽如電過每一思此罔然心熱生不再來逝不可追何不抑情飬性以自保惜今四海垂定太平之際又當須展才布德當由萬年萬年無窮當由修道道甚易知但莫能行臣嘗聞道人蒯京已年一百七十八而甚丁壯言人當朝朝服食玊泉琢齒使人丁壯有顔色去三蟲而堅齒玉泉者口中唾也朝旦未起早潄津令滿口乃吞之琢齒二七遍如此者乃名曰練精嵇康云穰歲多病饑年少疾信哉不虛是以關中土地俗好儉嗇厨膳肴羞不過葅醬而已其人少病而夀江南嶺表其處饒足海陸鮭肴無所不備土俗多疾而人早夭北方仕子遊宦至彼遇其豐瞻以為福祐所臻是以尊卑長幼恣口食噉夜長醉飽四體熱悶赤露眠臥宿食不消未逾期月大小皆病或患霍亂腳氣脹滿或寒熱瘧痢惡核丁腫或癰疽痔漏或偏風猥退不知醫療以至於死凡如此者比肩皆是惟云不習水土都不知病之所由靜言思之可為太息者也學者先須識此以自誡愼抱朴子曰一人之身一國之象也胸腹之位猶宫室也四肢之列猶郊境也骨節之分猶百官也神猶君也血猶臣也氣猶民也知治身則能治國也夫愛其民所以安其國惜其氣所以全其身民散則國亡氣竭則身死死者不可生也亡者不可存也是以至人消未起之患治未病之疾醫之於無事之前不追於既逝之後夫人難飬而易危也氣難清而易濁也故能審威德所以保社稷割嗜欲所以固血氣然後真一存焉三一守焉百病却焉年夀延焉道林飬性第二真人曰雖常服餌而不知飬性之術亦難以長生也飬性之道常欲小勞但莫大疲及强所不能堪耳且流水不腐户樞不蠧以其運動故也飬性之道莫久行久立久坐久臥久視久聽蓋以久視傷血久臥傷氣久立傷骨久坐傷肉久行傷筋也仍莫强食莫强酒莫强舉重莫憂思莫大怒莫悲愁莫大懼莫跳踉莫多言莫大笑勿汲汲於所欲勿悁悁懷忿恨皆損夀命若能不犯者則得長生也故善攝生者常少思少念少欲少事少語少笑少愁少樂少喜少怒少好少惡行此十二少者飬性之都契也多思則神殆多念則志散多欲則志昏多事則形勞多語則氣乏多笑則臟傷多愁則心懾多樂則意溢多喜則忘錯昏亂多怒則百脉不定多好則專迷不理多惡則憔悴無歡此十二多不除則榮衛失度血氣妄行喪生之本也惟無多無少者幾於道矣是知勿外緣者真人初學道之法也若能如此者可居瘟疫之中無憂疑矣既屏外緣㑹須守五神肝心脾肺腎從四正言行坐立言最不得浮思妄念心想欲事惡邪大起故孔子曰思無邪也常當習黃帝內視法存想思念令見五臟如懸磬五色了了分明勿輟也仍於每旦初起面向午展兩手於膝上心眼觀氣上入頂下逹涌泉旦旦如此名曰迎氣常以鼻引氣口吐氣小微吐之不得開口復欲得出氣少入氣多每欲食送氣入腹每欲食氣為主人也凡心有所愛不用深愛心有所憎不用深憎並皆損性傷神亦不用深讃亦不用深毁常須運心於物平等如覺偏頗尋改正之居貧勿謂常貧居富莫謂常富居貧富之中常須守道勿以貧富易志改性識逹道理似不能言有大功德勿自矜伐美藥勿離手善言勿離口亂想勿經心常以深心至誠恭敬於物愼勿詐善以恱於人終身為善為人所嫌勿得起恨事君盡禮人以為諂當以道自平其心道之所在其德不孤勿言行善不得善報以自怨仇居處勿令心有不足若有不足則自抑之勿令得起人知止足天遺其祿所至之處勿得多求多求則心自疲而志苦若夫人之所以多病當由不能飬性平康之日謂言常然縱情恣欲心所欲得則便為之不拘禁忌欺罔幽明無所不作自言適性不知過後一一皆為病本及兩手摸空白汗流出口唱皇天無所逮及皆以生平粗心不能自察一至於此但能少時內省身心則自知見行之中皆畏諸痾將知四百四病身手自造本非由天及一朝病發和緩不救方更誹謗醫藥無效神仙無靈故有智之人愛惜性命者當自思念深生恥愧誡勒身心常修善事也至於居處不得綺靡華麗令人貪婪無厭乃患害之源但令雅素淨潔無風雨暑濕為佳衣服器械勿用珍玊金寶增長過失使人煩惱根深厨膳勿使脯肉豐盈常令儉約為佳然後行作鵝王步語作含鍾聲眠作獅子臥右腳脅著地坐腳也每日自詠歌云美食須熟嚼生食不粗吞問我居止處大宅總林村胎息守五臟氣至骨成仙又歌曰日食三箇毒不嚼而自消錦繡為五臟身著糞掃袍修心既平又須愼言語凡言語讀誦常想聲在氣海中臍下也每日初入後勿言語讀誦寧待平旦也旦起欲專言善事不欲先計校錢財又食上不得語語而食者常患胸背痛亦不用寢臥多言笑寢不得語言者言五臟如鐘磬不懸則不可發聲行不得語若欲語須住腳乃語行語則令人失氣冬至日止可語不可言自言曰言答人曰語言有人來問不可不答自不可發言也仍勿觸冷開口大語為佳言語既愼仍節飲食是以善飬性者先饑而食先渴而飲食欲數而少不欲頓而多則難消也常欲令如飽中饑饑中飽耳蓋飽則傷肺饑則傷氣鹹則傷筋酸則傷骨故每學淡食食當熟嚼使米脂入腹勿使酒脂入腸人之當食須去煩惱暴數為煩侵觸為惱如食五味必不得暴嗔多令人神驚夜夢飛揚每食不用重肉喜生百病常須少食肉多食飯及少葅菜并勿食生菜生米小豆陳臭物勿飲濁酒食麵使塞氣孔勿食生肉傷胃一切肉惟須煮爛停冷食之食畢當潄口數過令人牙齒不敗口香熱食訖以冷酢漿潄口者令人口氣常臭作䘌齒病又諸熱食鹹物後不得飲冷酢漿水喜失聲成尸咽凡熱食汗出勿當風發痙頭痛令人目澀多睡每食訖以手摩面及腹令津液通流食畢當行步躊躇計使中數里來行畢使人以粉摩腹上數百遍則食易消大益人令人能飲食無百病然後有所修為為快也飽食即臥乃生百病不消成積聚飽食仰臥成氣痞作頭風觸寒來者寒未解食熱食成刺風人不得夜食又云夜勿過醉飽食勿精思為勞苦事有損餘虛損人常須日在巳時食訖則不須飲酒終身無乾嘔勿食父母本身所屬肉令人命不長勿食自己本命所屬肉令人魂魄飛揚勿食一切腦大損人茅屋漏水墮諸脯肉上食之成瘕約暴肉作脯不肯乾者凡乾字舊本並作干害人祭神肉無故自動食之害人飲食上蜂行住食之必有毒害人腹內有宿病勿食陵鯉魚肉害人濕食及酒漿臨上看視不見人物影者勿食之成卒注若已食腹脹者急以藥下之每十日一食葵葵滑所以通五臟擁氣又是菜之主不用合心食之又飲酒不欲使多多則速吐之為佳勿令至醉即終身百病不除久飲酒者腐爛腸胃漬髓蒸筋傷神損夀醉不可以當風向陽令人發狂又不可當風臥不可令人扇凉皆即得病也醉不可露臥及臥黍穰中發癩瘡醉不可强食或發癰疽或發瘖或生瘡醉飽不可以走車馬及跳躑醉不可以接房醉飽交接小者面䵟咳嗽大者傷絶臟脉損命凡人饑欲坐小便若飽則立小便愼之無病又忍尿不便膝冷成痺忍大便不出成氣痔小便勿努令兩足及膝冷大便不用呼氣及强努令人腰疼目澀宜任之佳凡遇山水塢中出泉者不可久居常食作癭病又深隂地冷水不可飲必作痎瘧飲食以調時愼脫著凡人旦起著衣反者便著之吉衣光者當户三振之曰殃去吉濕衣及汗衣皆不可久著令人發瘡及風瘙大汗能易衣佳不易者急洗之不爾令人小便不利凡大汗勿偏脫衣喜得偏風半身不遂春天不可薄衣令人傷寒霍亂食不消頭痛脫著既時須調寢處凡人臥春夏向東秋冬向西頭勿北臥及墻北亦勿安牀凡欲眠勿歌詠不祥起上牀坐先脫左足臥勿當舍脊下臥訖勿留燈熘令魂魄及六神不安多愁怨人頭邉勿安火爐日久引火氣頭重目赤睛及鼻乾夜臥當耳勿有孔吹人即耳聾夏不用露面臥令人面皮厚喜成癬或作面風冬夜勿覆頭得長夀凡人眠勿以腳懸踏高處久成腎水及損房足冷人每見十步直墻勿順墻臥風利吹人發癲及體重人汗勿跂牀懸腳久成血痺兩足重腰疼又不得晝眠令人失氣臥勿大語損人氣力暮臥常習閉口口開即失氣且邪惡從口入久而成消渴及失血色屈膝側臥益人氣力勝正偃臥按孔子不尸臥故曰睡不厭踧覺不厭舒凡人野睡則有鬼痛魔邪凡眠先臥心後臥眼人臥一夜當作五度反覆常逐更轉凡人夜魘勿然燈喚之定死無疑暗喚之吉亦不得近前急喚夜夢惡不須說旦以水面東方噀之呪曰惡夢著草木好夢成寶玊即無咎矣又夢之善惡並勿說為吉衣食寢處皆適能順時氣者始盡飬生之道故善攝生者無犯日月之忌無失歲時之和須知一日之忌暮無飽食一月之忌晦無大醉一歲之忌暮無逺行終身之忌暮無然燭行房暮嘗護氣也凡氣冬至起於涌泉十一月至膝十二月至股正月至腰名三陽成二月至膊三月至項四月至頂純陽用事隂亦倣此故四月十月不得入房避隂陽純用事之月也每冬至日於北壁下厚鋪草而臥云受元氣每八月一日已後即微火暖足勿令下冷無生意常欲使氣在下不欲泄於上春凍未泮衣欲下厚上薄飬陽收隂繼世長生飬隂收陽禍則滅門故云冬時天地氣閉血氣伏藏人不可作勞出汗發泄陽氣有損於人也又云冬日凍腦春秋腦足俱凍此聖人之常法也春欲晏臥早起夏及秋欲侵夜乃臥早起冬欲早臥而晏起皆益人雖云早起莫在雞鳴前雖言晏起莫在日出後凡冬月忽有大熱之時夏月忽有大凉之時皆勿受之人有患天行時氣者皆由犯此也即須調氣息使寒熱平和即免患也每當臘日勿歌舞犯者必凶常於正月寅日燒白髮吉凡寅日剪手甲午日剪足甲又燒白髮吉居處法第三凡人居止之室必須周密勿令有細隙致有風氣得入小覺有風勿强忍久坐必須急急避之久居不覺使人中風古來忽得偏風四肢不隨或如角弓反張或失音不語者皆由忽此耳身既中風諸病總集邪氣得便遭此致卒者十中有九是以大須周密無得輕之愼焉愼焉所居之室勿塞井及水瀆令人聾盲凡在家及外行卒逄大飄風暴雨震電昏暗大霧此皆是諸龍鬼神行動經過所致宜入室閉户燒香靜坐安心以避之待過後乃出不爾損人或當時雖未苦於後不佳矣又隂霧中亦不可逺行凡家中有經像行來先拜之然後拜尊長每行至則峻坐焉凡居家不欲數沐浴若沐浴必須密室不得大熱亦不得大冷皆生百病冬浴不必汗出霡霂沐浴後不得觸風冷新沐髮訖勿當風勿濕縈髻勿濕頭臥使人頭風眩悶髮秃面黑齒痛耳聾頭生白屑饑忌浴飽忌沐沐訖須進少許食飲乃出夜沐髮不食即臥令人心虛饒汗多夢又夫妻不用同日沐浴常以晦日浴朔日沐吉凡炊湯經宿用洗體成癬洗面無光洗腳即疼痛作甑畦瘡熱泔洗頭冷水濯之作頭風飲水沐頭亦作頭風時行病新汗解勿冷水洗浴損心包不能復凡居家常戒約內外長幼有不快即須早道勿使隱忍以為無若過時不知便為重病遂成不救小有不好即按摩挼捺令百節通利泄其邪氣凡人無問有事無事常須日别踏脊背四肢一度頭項若令熟踏即風氣時行不能侵人此大要妙不可具論凡人居家及逺行隨身常有熟艾一升備急丸辟鬼丸生肌藥甘濕藥丁腫藥水銀大黃芒硝甘草乾薑桂心蜀椒不能更蓄餘藥此等常不可闕少及一兩卷百一備急藥方並帶辟毒蛇蜂蝎等藥隨身也凡人自覺十日已上康健即須灸三數穴以泄風氣每日必須調氣補瀉按摩導引為佳勿以康健便為常然常須安不忘危預防諸病也灸法當須避人神人神禁忌法在第二十九卷中凡畜手力細纍春秋皆須與轉瀉藥一度則不中天行時氣也備急千金要方卷八十一
