body:
  text: 備急千金要方卷六十唐孫思邈撰宋林億等校正腎臓方補腎第八論法方炙論曰補方通治五勞六極七傷虚損五勞五臓病六極六腑病七傷表裏受病五勞者一曰志勞二曰思勞三曰憂勞四曰心勞五曰疲勞六極者一曰氣極二曰血極三曰筋極四曰骨極五曰髓極六曰精極七傷者一曰肝傷善夢二曰心傷善忘三曰脾傷善飲四曰肺傷善痿五曰腎傷善唾六曰骨傷善饑七曰脉傷善嗽凡逺思強慮傷人憂恚悲哀傷人喜樂過度傷人忿怒不解傷人汲汲所願傷人慼慼所患傷人寒暄失節傷人故曰五勞六極七傷也論傷甚衆且言其略此方悉主之建中湯治五勞七傷小腹急痛膀胱虛滿手足逆冷食飲苦吐酸痰嘔逆泄下少氣目眩耳聾口焦小便自利方膠飴半斤黄耆乾薑當歸各三两人參半夏橘皮芍藥甘草各二兩附子一兩大棗十五枚右十一味㕮咀以水一斗煮取三升半湯成下膠飴烊沸分四服深師有桂心六兩生薑一斤無橘皮乾薑又方治虛損少氣腹脹内急拘引小腹至冷不得屈伸不能飲食寒熱頭疼手足逆冷大小便難或復下痢口乾夢中泄精或時吐逆恍惚面色枯瘁又復微腫百節疼酸方附子厚朴各一两人參甘草桂心當歸茯苓各二两麥門冬黄耆龍骨各三两芍藥四两生薑五两飴糖八兩生地黄一斤大棗三十枚右十五味㕮咀以水一斗二升煮取四升去滓内飴糖每服八合日三夜一欬者加生薑一倍又方治五勞七傷虚羸不足面目黧黒手足疼痛久立腰疼起則目眩腹中懸急而有絶傷外引四肢方生薑芍藥乾地黄甘草芎藭各五兩大棗三十枚右六味㕮咀以水六升漬一宿明旦復以水五升合煮取三升分三服藥入四肢百脉似醉狀是效無生薑酒漬乾薑二兩一宿用之常行此方神妙大建中湯治虚勞寒澼飲在脇下決決有聲飲已如從一邊下決決然也有頭並衝皮起引兩乳内痛裏急善夢失精氣短目􅉩􅉩惚惚多忘方蜀椒二合半夏一升生薑一斤甘草二兩人參三兩飴糖八兩右六味㕮咀以水一斗煮取三升去滓内糖温服七合裏急拘引加芍藥桂心各三兩手足厥腰背冷加附子一枚勞者加黄耆一兩又方治五勞七傷小腹急臍下彭亨兩脇脹滿腰脊相引鼻口乾燥目暗􅉩􅉩憒憒不樂胷中氣急逆不下食飲莖中䇿䇿痛小便黄赤尿有餘瀝夢與鬼神交通去精驚恐虛乏方飴糖半斤黄耆逺志當歸千金翼無澤瀉各三兩芍藥人參龍骨甘草各二兩生薑八兩大棗二十枚右十一味㕮咀以水一斗煮取二升半湯成内糖令烊一服八合消息又一服深師無飴糖逺志澤瀉龍骨有桂心六兩半夏一升附子一枚小建中湯凡男女因積勞虚損或大病後不復常苦四體沉滯骨肉疼酸吸吸少氣行動喘惙或小腹拘急腰背強痛心中虚悸咽乾脣燥面體少色或飲食無味隂陽廢弱悲憂慘慼多卧少起久者積年輕者百日漸至瘦削五臓氣竭則難可復振治之之方甘草二兩桂心生薑各三兩芍藥六兩膠飴一升大棗十二枚右六味㕮咀以水九升煮取三升去滓内膠飴毎服一升日三間三日復作一劑後可與諸丸散仲景云嘔家不可服肘後云加黄耆人參各二兩為佳若患痰滿及溏洩可除膠飴胡洽方有半夏八兩黄耆三兩古今録驗名芍藥湯前胡建中湯治大勞虚劣寒熱嘔逆下焦虚熱小便赤痛客熱上熏頭目及骨肉疼痛口乾方前胡三兩黄耆芍藥當歸茯苓桂心各二兩甘草一兩生薑八兩白糖六兩人參半夏各六分右十一味㕮咀以水一斗二升煮取四升去滓内糖分四服黄耆建中湯治虚勞裏急諸不足方黄耆生薑桂心各三兩甘草二兩芍藥六兩大棗十二枚飴糖一升右七味㕮咀以水一斗煮取三升去滓内飴令消温服一升日三間日可作嘔者倍加生薑腹滿者去棗加茯苓四兩佳仲景集驗古今録驗並同深師治虚勞腹滿食少小便多者無飴糖有人參二兩半夏一升又治大虚不足小腹裏急勞寒拘引臍氣上衝胸短氣語言謬誤不能食吸吸氣乏悶亂必效方治虚勞下焦虚冷不甚渴小便數者有人參當歸各二兩若失精加龍骨白歛各一兩古今録驗治虚勞裏急小腹急痛氣引胸脇痛或心痛短氣者以乾薑代生薑加當歸四兩黄耆湯治虚勞不足四肢煩疼不欲食食即脹汗出方黄耆麥門冬芍藥桂心各三兩甘草當歸五味子細辛人參各二兩大棗二十枚前胡六兩茯苓四兩生薑半夏各八兩右十四味㕮咀以水一斗四升煮取三升每服八合日二服深師方治虚乏四肢沉重或口乾吸吸少氣小便利諸不足者無麥門冬五味子細辛前胡有桑螵蛸二十枚治丈夫虚勞風冷少損或大病後未平復而早牽勞腰背强直脚中疼弱補諸不足者無五味子細辛有逺志橘皮各二兩蜀椒一兩烏頭三枚小品方治虚勞少氣小便過多者無五味子細辛人參前胡茯苓半夏有黄芩一兩地黄二兩以水九升煮取三升治虚勞胸中客氣塞冷癖痞宿食不消吐噫脇間水氣或流飲腸鳴食不生肌肉頭痛上重下輕目􅉩􅉩忽忽去來躁熱臥不得安小腹急小便赤餘瀝臨事不起隂下濕或小便白濁傷多者無麥門冬五味子細辛當歸前胡茯苓半夏有厚朴二兩胡洽方治五臓内傷者無麥門冬五味子當歸細辛前胡茯苓名大黄耆湯延年秘録方主補虚損强腎氣者無麥門冬五味子細辛前胡有防風芎藭各三兩樂令黄耆湯治虚勞少氣胷心淡冷時驚惕心中悸動手脚逆冷體常自汗五臓六腑虚損腸鳴風濕榮衛不調百病補諸不足又治風裏急方黄耆人參橘皮當歸桂心細辛前胡芍藥甘草麥門冬茯苓各二兩生薑五兩半夏二兩半大棗二十枚右十四味㕮咀以水二斗煮取四升每服五合日三夜一深師方無橘皮細辛前胡甘草麥門冬有烏頭三兩蜀椒二兩逺志二兩胡洽崔氏有蜀椒一兩烏頭五枚崔氏名樂令大黄耆湯腎瀝湯治虚勞損羸乏欬逆短氣四肢煩疼腰背相引痛耳鳴面黧黯骨間熱小便赤黄心悸目眩諸虚乏方羊腎一具桂心一兩人參澤瀉五味子甘草防風芎藭地骨皮黄耆當歸各二兩茯苓𤣥參芍藥生薑各四兩磁石五兩右十六味㕮咀以水一斗五升先煮腎取一斗去腎入藥煎取三升分三服可常服之廣濟方治虚勞百病者無人參甘草芎藭當歸芍藥生薑𤣥參有蓯蓉三兩牛膝五加皮各二兩胡洽治大虚傷損夢寤驚悸上氣肩息腎中風濕小腹裏急引腰脊四肢常苦寒冷大小便澀利無常或赤或白足㣲腫或昏僻善忘者無澤瀉防風黄耆𤣥參磁石地骨皮有黄芩一兩麥門冬乾地黄逺志各三兩大棗二十枚崔氏治腎蔵虚勞所傷補益者無芎藭𤣥參磁石地骨皮有黄芩逺志各二兩乾地黄三兩麥門冬四兩大棗二十枚治五勞六極八風十二痺補諸不足者無澤瀉甘草五味子防風芍藥生薑𤣥參地骨皮有附子牡丹皮各一兩乾地黄一兩半牡荆子菖蒲桑螵蛸各二兩經心録治腎氣不足耳無所聞者無澤瀉甘草五味子防風黄耆芍藥生薑𤣥參地骨皮有附子牡丹皮牡荆子各一兩乾地黄三兩大棗十五枚名羊腎湯近效方除風下氣强腰脚明耳目除痰飲理榮衛永不染時疾諸風者無當歸芍藥磁石有獨活牛膝各一兩半麥門冬二兩丹參五兩為煮散都分二十四貼每貼入生薑一分杏仁十四枚水三升煮取一升又方􅗑羊腎一具切去脂以水一斗六升煮取一斗三升大棗二十枚桑白皮六兩五味子黄耆蓯蓉防風巴㦸天秦芁澤瀉人參桂心薯蕷丹參逺志茯苓細辛牛膝各三兩石斛生薑各五兩杜仲磁石各八兩右二十二味㕮咀内腎汁中煮取三升分三服相去如人行五里再服增損腎瀝湯治大虚不足小便數嘘吸焦燆引飲膀胱滿急毎年三伏中常服此三劑於方中啇量用之羊腎一具麥門冬地骨皮人參石斛澤瀉栝蔞根乾地黄逺志生薑甘草當歸桂心茯苓五味子桑白皮一作桑寄生各二兩大棗三十枚右十七味㕮咀以水一斗五升先煮腎取一斗二升去腎内藥煮取三升去滓分三服小品方無石斛栝蔞根地骨皮桑白皮茯苓有芎藭黄連龍骨各二兩螵蛸二十枚又治腎氣不足痟渴引飲小便過多腰背疼痛者無石斛栝蔞根地骨皮桑白皮甘草有芎藭二兩黄芩芍藥各一兩桑螵蛸二十枚雞肶胵黄皮一兩崔氏治蔵損虚勞李子豫增損者無石斛栝蔞根地骨皮桑白皮有黄耆黄芩芍藥防風各二兩治左脇氣衝膈上滿頭上有風如蟲行手足頑痺鼻塞脚轉筋不能伸縮兩目時腫痛方猪腎一具防風芎藭橘皮澤瀉桂心石斛各一兩生薑丹參茯苓通草半夏各一兩乾地黄三兩右十三味㕮咀以水一斗半煮腎減三升去腎下藥煮取二升七合去滓分三服五補湯治五臓内虚竭短氣欬逆傷損鬱悒不足下氣通津液方五味子桂心甘草人參各一兩麥門冬小麥各一升生薑八兩千金翼無粳米三合薤白枸杞根白皮各一斤右十味㕮咀以水一斗二升煮取三升每服一升日三口燥者先煮竹葉一把水減一升去葉内諸藥煮之凝唾湯治虚損短氣咽喉凝唾不出如膠塞喉方一名茯苓湯麥門冬五兩人參二兩前胡三兩甘草乾地黄桂心芍藥各一兩大棗三十枚茯苓二兩右九味㕮咀以水九升煮取三升分温三服補湯方車前子三兩防風桂心各三兩巴㦸天丹參乾地黄鹿茸枸杞皮五加皮各五兩右九味㕮咀以水八升煮取三升去滓分三服人參湯治男子五勞七傷胷中逆滿害食乏氣嘔逆兩脅下脹小腹急痛宛轉欲死調中平臓理絶傷方人參當歸芍藥甘草生薑麥門冬白糖桂心各二兩前胡茯苓五味子蜀椒橘皮各一兩枳實三兩大棗十五枚右十五味㕮咀取東流水一斗半漬藥半日用三年陳蘆稍煎取四升内糖復上火煎令十數沸年二十以上六十以下一服一升二十以下六十以上一服七八合雖年盛而久羸者亦服七八合日三夜一不爾藥力不接則不能救病要用勞水陳蘆不則水强火盛猛即藥力不出也貞觀初有人乆患羸瘦殆死余處此方一劑則瘥如湯沃雪所以録記之餘方皆爾不能一一具記内補散治男子五勞六絶其心傷者令人善驚妄怒無常其脾傷者令人腹滿喜噫食竟欲臥面目痿黄其肺傷者令人少精腰背痛四肢厥逆其肝傷者令人少血面黒其腎傷者有積聚小腹腰背滿痺欬唾小便難六絶之為病皆起於大勞脉虚外受風邪内受寒熱令人手足疼痛膝以下冷腹中雷鳴時時泄痢或閉或利面目腫心下憒憒不欲語憎聞人聲方乾地黄莵絲子山茱茰地麥各五分逺志巴㦸天各半兩麥門冬五味子甘草人參蓯蓉石斛桂心茯苓附子各一兩半右十五味治下篩酒服方寸匕日三加至三七無所禁石斛散治大風四肢不收不能自反覆兩肩疼痛身重脛急筋腫不能行時寒時熱足腨如刀刺痛身不能自任此皆得之飲酒中大風露臥濕地寒從下入腰以下冷不足無氣子精虚衆脉寒隂下濕莖消令人不樂恍惚時悲此方除風輕身益氣明目强隂令人有子補不足方石斛十分牛膝二分附子杜仲各四分栢子仁石龍芮芍藥松脂雲母粉山茱茰澤瀉萆薢莵絲子防風細辛桂心各三分右十六味治下篩酒服方寸匕日再隂不起倍莵絲子杜仲腹中痛倍芍藥膝中痛倍牛膝背痛倍萆薢腰中風倍防風少氣倍栢子仁蹷不能行倍澤瀉隨病所在倍三分亦可為丸以棗膏丸如梧子酒服七丸腎瀝散治虚勞百病方􅗑羊腎一具隂乾茯苓一兩半五味子甘草巴㦸天桂心石龍芮牛膝山茱茰防風乾薑細辛各一兩乾地黄二兩人參鍾乳粉石斛莵絲子丹參蓯蓉附子各五分右二十味治下篩合鍾乳粉和攪更篩令匀平旦清酒服方寸匕稍加至二七日再又方治男子五勞七傷八風十二痺無有冬夏悲憂憔悴凡是病皆須服之之方羊腎一具隂乾厚朴五味子女萎細辛牡荆子芍藥巴㦸天石斛白歛石龍芮茯苓山茱茰乾漆礬石龍膽桂心芎藭蓯蓉蜀椒白术菊花續斷逺志人參黄耆澤瀉萆薢黄芩各一兩乾薑附子防風菖蒲牛膝各一兩半桔梗二兩半薯蕷秦芁各二兩右三十七味治下篩酒服方寸匕日三忌房室又方石龍芮續斷桔梗乾薑菖蒲山茱茰茯苓各二兩薯蕷蜀椒芍藥巴㦸天人參龍膽女萎厚朴肉蓯蓉細辛萆薢附子石斛黄耆芎藭白歛烏頭天雄桂心各一兩半秦芁白术礜石一作礬石五味子牡荆子菊花牛膝各一兩逺志二兩半乾漆三兩羊腎一具隂乾右三十六味治下篩酒服方寸匕日三此方比前方無澤瀉黄芩防風有烏頭天雄各一兩半餘並同薯蕷散補丈夫一切病不能具述方薯蕷荆實一方用枸杞子續斷一方用逺志茯苓一方用茯神牛膝莵絲子巴㦸天杜仲各一兩蓯蓉二兩五味子山茱茰一用防風蛇牀子二分右十二味治下篩酒服方寸匕日二夜一惟禁醋蒜自外無忌服後五夜知覺十夜力生十五夜力壮如盛年二十夜力倍若多忘加逺志茯苓體澀加栢子仁服三兩劑益肌肉亦可為丸每服三十丸日二夜一以頭面身體暖為度其藥和平不熱調五臓乆服健力不可當婦人服之面生五色補五勞方五月五日採五加莖七月七日採葉九月九日取根治下篩服方寸匕日三長服去風勞妙治五勞六極七傷虚損方蓯蓉白龍骨陽起石續斷天雄各七分牡蠣五味子蛇牀子乾地黄桑寄生天門冬白石英各二兩地膚子車前子韭子莵絲子各五合地骨皮八分右十七味治下篩酒服方寸匕日三服鍾乳散治五勞七傷虚羸無氣力傷極方鍾乳六兩無問粗細以白净無赤黄黒為上鍋鐺中可盛三二斗并取粟粗糠二合許内鐺中煮五六沸乃内乳煮水欲減又添如故一晬時出以暖水浄淘之曝乾玉硾研不作聲止重宻絹水下澄取用鹿角白者白馬莖别𢷬硫黄别研石斛鐵精人參磁石桂心殭蠶各一兩蛇牀子三兩右十一味為末以棗膏和𢷬三千杵酒服三十丸如梧子日再慎房室及生冷酢滑雞猪魚陳敗寒食鍾乳散治傷損乏少氣力虚勞百病令人丁彊飲食去風冷方見氣極篇中地黄散主益氣調中補絶令人嗜食除熱方生地黄三十斤細切曝乾取生者三十斤𢷬汁漬之令相得出曝乾復如是九反曝𢷬末食後酒服方寸匕勿令絶三石散治風勞毒冷百治不瘥補虚方鍾乳紫石英白石英白术桔梗防風各五分栝蔞根人參蜀椒乾薑附子牡蠣桂心杜仲細辛茯苓各十分右十六味治下篩酒服方寸匕日三行十數歩至五十歩以上服此大佳少年勿用自餘補方通用老少皆宜冬月服之千金翼名更生散赤石脂不用味紫石英蜀椒杜仲茯苓為十三石韋圓黄帝問五勞七傷於高陽負高陽負曰一曰隂衰二曰精清三曰精少四曰精消五曰囊下濕六曰腰一作胷脅苦痛七曰膝厥痛冷不欲行骨熱逺視淚出口乾腹中鳴時有熱小便淋瀝莖中痛或精自出有病如此所謂七傷一曰志勞二曰思勞三曰心勞四曰憂勞五曰疲勞此謂五勞黄帝曰何以治之高陽負曰石韋丸主之石韋細辛礜石逺志茯苓澤瀉菖蒲杜仲蛇牀子肉蓯蓉桔梗天雄牛膝山茱茰栢子仁續斷薯蕷各二兩防風赤石脂各三兩右十九味為末取棗膏如蜜和丸如梧子酒服三十丸日三七日愈二十日百病除長服良崔氏無礜石茯苓澤瀉桔梗薯蕷栝蒌根二兩半云白水侯方五補圓治腎氣虚損五勞七傷腰脚酸疼肢節苦痛目暗􅉩􅉩心中喜忘恍惚不定夜臥多夢覺則口乾食不得味心常不樂多有恚怒房室不舉心腹脹滿四體疼痺口吐酸水小腹冷氣尿有餘瀝大便不利悉主之乆服延年不老四時勿絶一年萬病闕愈之方杜仲巴㦸天人參五加皮五味子天雄牛膝防風逺志石斛薯蕷狗脊各四分乾地黄蓯蓉各十二分鹿茸十五分莵絲子茯苓各五分覆盆子石龍芮各八分萆薢蛇牀子石南白术各三分天門冬七分右二十四味為末蜜丸如梧子酒服十丸日三有風加天雄芎藭當歸黄耆五加皮石南茯神獨活栢子仁白术各三分有氣加厚朴枳實橘皮各三分冷加乾薑桂心吳茱茰附子細辛蜀椒各三分泄精加韭子白龍骨牡蠣鹿茸各三分泄痢加赤石脂龍骨黄連烏梅肉各三分春依方服夏加地黄五分黄芩三分麥門冬四分冷則去此加乾薑桂心蜀椒各三分若不熱不寒亦不須增損直爾服之三劑以上即覺庻事悉佳慎酢蒜鱠陳臭大冷醉吐自外百無所慎稍加至三十丸不得增常以此為度無比薯蕷圓治諸虚勞百損方薯蕷二兩蓯蓉四兩五味子六兩莵絲子杜仲各三兩牛膝山茱茰乾地黄澤瀉茯神一作茯苓巴㦸天赤石脂各一兩右十二味為末蜜丸如梧子食前酒服二十丸加至三十丸日再無所忌惟禁醋蒜陳臭等物服七日後令人健四體潤澤脣口赤手足暖而有光彩消食身體安和音聲清朗是其驗也十日後長肌肉其藥通中入腦鼻必酸疼勿恠若求大肥加燉煌石膏二兩失性健忘加逺志一兩體少潤澤加栢子仁一兩古今録驗有白馬莖二兩共十六味治丈夫五勞七傷頭痛目眩手足逆冷或煩熱有時或冷痺骨疼腰髖不隨食雖多不生肌肉或少食而脹滿體澀無光澤陽氣衰絶隂氣不行此藥能補十一經脉起隂陽通内制外安䰟定魄開三焦破積聚厚腸胃消五臓邪氣除心内伏熱强筋練骨輕身明目除風去冷無所不治補益處廣常須服餌為佳七十老人服之尚有非常力况少者乎大薯蕷圓治男子女人虚損傷絶頭目眩骨節煩痛飲食㣲少羸瘦百病方薯蕷附子古今録作茯苓人參澤瀉各八分天門冬乾地黄黄芩當歸各十分乾漆杏仁阿膠各二分白术白歛古今録作防風芍藥石膏前胡各三分桔梗乾薑桂心各四分大黄六分五味子十六分甘草二十分大豆卷五分古今録作黄耆大棗一百枚右二十四味為末蜜和棗膏𢷬三千杵丸如梧子酒服五丸日三漸增至十丸張仲景無附子黄芩石膏乾漆五味子大黄有神麴十分芎藭防風各六分茯苓五分丸如彈丸每服一丸以一百丸為劑腎氣圓治虚勞腎氣不足腰痛隂寒小便數囊冷濕尿有餘瀝精自出隂痿不起忽忽悲喜方乾地黄八分逺志防風乾薑牛膝麥門冬萎蕤薯蕷石斛細辛地骨皮甘草附子桂心茯苓山茱茰四分蓯蓉鍾乳粉十分羖羊腎一具右十九味為末蜜丸如梧子酒服十五丸日三稍加至三十丸古今録驗無逺志防風乾薑牛膝地骨萎蕤甘草鍾乳有狗脊一兩黄耆四兩人參三兩澤㵼乾薑各二兩大棗一百枚又方治男子婦人勞損虚羸傷寒冷乏少無所不治方石斛二兩紫菀牛膝白术各五分麻仁一分人參當歸茯苓芎藭大豆卷黄芩甘草各六分杏仁蜀椒乾地黄防風桂心各四分羊腎一具一方有蓯蓉六分右十八味為末蜜丸如梧子酒服十丸日再漸增之又方此方勝胡公腎氣丸及五石丸乾地黄茯苓𤣥參各五兩澤瀉薯蕷山茱茰桂心芍藥各四兩附子三兩右九味為末蜜丸如梧子酒服二十丸加至三十丸以知為度千金翼有牡丹皮四兩為十味又方治腎氣不足羸瘦日劇吸吸少氣體重耳聾眼暗百病方桂心四兩乾地黄一斤澤瀉薯蕷茯苓各八兩牡丹皮六兩半夏一兩右七味為末蜜丸如梧子大酒服十丸日三八味腎氣圓治虚勞不足大渴欲飲水腰痛小腹拘急小便不利方乾地黄八兩山茱茰薯蕷各四兩澤瀉牡丹皮茯苓各三兩桂心附子各二兩右八味為末蜜丸如梧子大酒下十五丸日三加至二十五丸仲景云常服去附子加五味子姚公云加五味子三兩蓯蓉四兩張文仲云五味子蓯蓉各四兩肘後方云地黄四兩澤瀉附子各一兩餘各二兩黄耆圓治五勞七傷諸虚不足腎氣虚損目視􅉩􅉩耳無所聞方黄耆乾薑當歸羌活一作白术芎藭甘草茯苓細辛桂心烏頭附子防風人參芍藥石斛乾地黄蓯蓉各二兩棗膏五合羊腎一具右十九味為末以棗膏與蜜為丸如梧子大酒服十五丸日二加至三十丸一方無芎藭乾薑當歸羌活止十四味古今録驗無羊腎有羌活鍾乳紫石英石硫黄赤石脂白石脂礬石各二分名五石黄耆丸又方療虚勞方黄耆鹿茸茯苓烏頭乾薑各三分乾地黄當歸桂心芎藭各四分枸杞白皮莵絲子五味子栢子仁白术各五分大棗二十枚右十五味為末蜜丸如梧子平旦酒服十丸夜十丸以知為度禁如藥法神化圓治五勞七傷氣不足隂下濕癢或生瘡小便數有餘瀝隂頭冷疼失精自出小腹急繞臍痛膝重不能久立目視漠漠見風淚出脛酸精氣衰㣲臥不欲起手足厥冷調中利食方蓯蓉牛膝薯蕷各六分續斷山茱茰大黄各五分逺志澤瀉天雄栢子仁莵絲子人參防風石斛栝蔞根杜仲黄連白术甘草礜石當歸各一兩桂心石南乾薑蛇牀子赤石脂萆薢茯苓細辛菖蒲芎藭各三分右三十一味為末蜜丸如梧子酒服五丸日三加至二十丸三仁九子圓治五勞七傷補益方酸棗仁栢子仁薏苡仁莵絲子菊花子枸杞子蛇牀子五味子菴䕡子地膚子烏麻子牡荆子乾地黄薯蕷桂心各二兩蓯蓉三兩右十六味為末蜜丸如梧子酒服二十丸日二夜一塡骨圓治五勞七傷補五臓除萬病方石斛人參當歸牡䝉石長生石韋白术逺志蓯蓉巴㦸天紫菀茯苓乾薑天雄蛇牀子牛膝牡蠣附子牡丹栢子仁甘草薯蕷阿膠乾地黄五味子各二兩蜀椒三兩右二十六味為末白蜜和丸如梧子大酒服三丸日三通明圓治五勞七傷六極彊力行事舉重重病後骨髓未滿房室所食不消胃氣不平方麥門冬三斤乾地黄石韋各一斤紫菀五味子肉蓯蓉甘草阿膠杜仲逺志茯苓天雄各半斤右十二味為末蜜丸如梧子食上若酒服十丸日再加至二十丸補虚益精大通圓治五勞七傷百病方乾地黄八兩乾薑當歸石斛肉蓯蓉天門冬白术甘草芍藥人參各六兩麻子仁半兩紫菀大黄黄芩各五兩蜀椒三升防風四兩茯苓杏仁各三兩白芷一兩右十九味為末白蜜棗膏丸如彈子空腹服一丸日三服十日效赤石脂圓治五勞七傷每事不如意男子諸疾方赤石脂山茱茰七分防風逺志栝蔞根牛膝杜仲薯蕷各四分石韋三分肉蓯蓉二分蛇牀子六分菖蒲續斷天雄栢子仁各五分右十五味為末蜜棗膏和丸如梧子大空腹服五丸日三服十日知久服不老加莵絲子四分佳鹿角圓補益方鹿角白馬莖石斛薯蕷乾地黄人參莵絲子防風蛇牀子各五分山茱茰杜仲赤石脂澤瀉乾薑各四分石龍芮逺志各三分五味子牛膝巴㦸天各六分天雄二分蓯蓉七分一方無乾薑五味子右二十一味為末蜜丸如梧子酒服三十丸日二忌米醋蓯蓉圓補虚益氣治五臓虚勞損傷隂痺隂下濕癢或生瘡莖中痛小便餘瀝四肢嘘吸陽氣絶陽脉傷方蓯蓉薯蕷各五分蛇牀子逺志各四分莵絲子六分天雄八分五味子七分山茱茰七分巴㦸天四分右九味為末蜜丸如梧子酒服二十丸日二加至二十五丸乾地黄圓治五勞七傷六極臓腑虚弱飲食不下顔色黧黯八風所傷補虚益氣進食資顔色長陽方乾地黄茯苓天雄各七分蛇牀子六分桂心麥門冬各五分逺志蓯蓉杜仲甘草各十分五味子四分阿膠棗肉各八分右十三味為末蜜丸如梧子酒下二十丸日再加至三十丸常服彌佳治虚勞不起囊下癢汗出小便淋瀝莖中數痛尿時赤黄甚者失精劇苦溺血目視􅉩􅉩見風淚出莖中冷精氣衰兩膝腫不能乆立起則目眩補虚方蛇牀子細辛天雄大黄栢子仁菟絲子杜仲茯苓防風萆薢菖蒲澤瀉各四兩逺志牛膝各六分栝蔞根三分山茱茰桂心蓯蓉薯蕷蜀椒石韋曰术各五分右二十二味為末蜜丸如梧子酒服十五丸日再漸加至五十丸十五日身體輕三十日聰明五十日康健復壮覆盆子圓治五勞七傷羸瘦補益令人充健方覆盆子莵絲子各十二分蓯蓉鹿茸巴㦸天白龍骨茯苓天雄白石英五味子續斷薯蕷各十分乾地黄八分蛇牀子五分逺志乾薑各六分右十六味為末蜜丸如梧子酒服十五丸日再細細加至三十丸慎生冷陳臭張文仲方無龍骨鹿茸天雄續斷石英有石斛白术桂心枸杞子人參栢子仁澤瀉各六分牛膝四分山茱茰五分赤石脂甘草各八分細辛四分治五勞七傷虚羸無力傷極方莵絲子五味子各二兩蛇牀子一兩右三味為末蜜丸如梧子每服十丸日三服禁如常法補益方乾漆栢子仁山茱茰酸棗仁各四分右四味為末蜜丸如梧子每服二七丸加至二十丸日二曲囊圓治風冷補虚弱亦主百病方乾地黄薯蕷牡蠣天雄蛇牀子逺志杜仲鹿茸桂心五味子鹿藥草石斛車前子莵絲子肉蓯蓉雄雞肝未連蠶蛾各等分右十七味欲和任意𢷬末蜜丸如小豆大酒服三丸加至七丸日三夜一禁如常法須令常有藥氣大益人服藥十日以後少少得强崔平世治五勞七傷方鍾乳粉萆薢各一分巴㦸天二分乾薑三分一作乾地黄莵絲子蓯蓉各二分右六味為末蜜丸如梧子酒服七丸日三服訖行百歩酒服三合更行三百歩胷中熱定即食乾飯牛羊兎肉任為羮去肥膩餘不忌明目益精長志倍力久服長生耐老方逺志茯苓細辛莵絲子木蘭續斷人參菖蒲龍骨當歸芎藭茯神各五分右十二味為末蜜丸如梧子服七丸至十丸日二夜一滿三年益智磁石酒療丈夫虚勞冷骨中疼痛陽氣不足隂下疥一作痛熱方磁石石斛澤瀉防風各五兩杜仲桂心各四兩天雄桑寄生天門冬黄耆各三兩石南二兩狗脊八兩右十二味㕮咀以酒四斗浸漬服三合漸加至五合日再服亦可單漬磁石服之石英煎治男子女人五勞七傷消枯羸瘦風虚痼冷少氣力無顔色不能動作口苦咽燥眠中不安惡夢驚懼百病方白石英碎如米以醇酒九升銅器中㣲火煎取三升以竹篾攪勿住手去滓澄清紫石英各一斤製同上乾地黄一斤白蜜三斤酥桃仁各三升石斛五兩栢子仁逺志茯苓山茱茰人參麥門冬桂心乾薑五味子白术蓯蓉甘草天雄白芷細辛芎藭黄耆防風薯蕷各二兩右二十四味治下篩内煎中如不足加酒取足為限煎令可丸丸如梧子大酒服二十丸日三稍加至四十丸為度無藥者可單服煎令人肥白充實麋角圓丸取當年新角連腦頂者為上看角根有斫㾗處亦堪用退角根下平者是不堪諸麋角丸方凡有一百一十方此特出衆方之外容成子羔服而羽化夫造此藥取角五具或四具三具兩具一具為一劑先去尖一大寸即各長七八寸取勢截斷量把鎊得即於長流水中以竹器盛懸浸可十宿如無長流水處即於净盆中滿著水浸毎夜易換即将出削去皴皮以利鎊鎊取白處至心即止以清粟米泔浸兩宿初經一宿即乾握去舊水置新絹上曝乾浄擇去惡物粗骨皮及鎊不匀者即以無灰美酒於大白甆器中浸經兩宿其酒及器物隨藥多少其藥及酒俱入浄釡中初武火煮一食久後卽又著火㣲煎如蟹目沸以栁木箆長四尺濶三指徐攪不得住手困則易人時時更添美酒以成煎為度煎之皆須平旦下手不得經兩宿仍看屑消似希膠即以牛乳五大升酥一斤以次漸下後藥麋角一條炙令黄為散與諸藥同制之㯽榔通草秦芁人參甘草莵絲子酒浸兩宿待乾别𢷬肉蓯蓉各一兩右𢷬為散如不要補即不須此藥共煎又可一食時候藥似稠粥即止火少時歇熱氣即投諸藥散相和攪令相得仍待少時漸稠粘堪作丸即以新器盛貯以衆手一時丸就如梧子大若不能衆手丸就旋暖漸丸亦得如粘手著少酥塗手其服餌之法空腹取三果漿以下之如無三果漿酒下亦得初服三十丸日加一丸至五十丸為度日二服初服一百日内忌房室服經一月腹内諸疾自相驅逐有㣲利勿恠漸後多泄氣能食聰耳明目補心神安臓腑填骨髓理腰脚能久立髪白更黒貌老還少患氣者加枳實青木香准前各一大兩若先曾服丹石等藥即以三黄丸食上壓令宣泄如飲酒食麫口乾鼻中氣粗眼澀即以蜜漿飲之即止如不止加三黄丸使㣲利諸凡如此一度發動已後方始調暢服至二百日面皴自展光澤一年齒落更生强記身輕若風日行數百里二年常令人肥飽少食七十以上却成後生三年腸作筋髓預見未明四年常飽不食自見仙人三十已下服之不輟顔一定而不變其藥修合時須淨室中不得令雞犬女人孝子等見婦人服之亦佳治五臓虚勞小腹弦急脹熱方灸腎輸五十壮老小損之若虚冷可至百壮横三間寸灸之備急千金要方卷六十
