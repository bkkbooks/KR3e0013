body:
  text: 備急千金要方卷九十一唐孫思邈撰宋林億等校正針灸心腹第十胸脅通谷章門曲泉膈輸期門食竇陷谷石門主胸脅支滿大杼心輸主胸中鬱鬱本神顱息主胸脅相引不得傾側肝輸脾輸志室主兩脅急痛腎輸主兩脅引痛神堂主胸腹滿三間主胸滿腸鳴陽溪天容主胸滿不得息期門缺盆主胸中熱息賁脅下氣上曲池人迎神道章門中府臨泣天池旋機府輸主胸中滿支溝主脅腋急痛腕骨陽谷主脅痛不得息豐隆丘墟主胸痛如刺竅隂主脅痛咳逆臨泣主季脅支痛胸痺不得息闕陽輔主胸脅痛陽交主胸滿腫環銚至隂主胸脅痛無常處腰脅相引急痛太白主胸脅脹切痛甲乙云腸鳴切痛然骨主胸中寒咳唾有血大鍾主胸喘息脹膽輸章門主脅痛不得卧胸滿嘔無所出大包主胸脅中痛膻中天井主胸心痛華蓋紫宫中庭神藏靈墟胃輸俠溪步郎商陽上廉三里氣戶周榮上管勞官涌泉陽陵泉主胸脅柱滿膺窗主胸脅癰腫乳根主胸下滿痛雲門中府隱白期門肺輸魂門大陵主胸中痛又云雲門主胸中暴逆鳩尾主胸滿咳逆巨闕間使主胸中淡淡又云間使主胸脾背相引中管承滿主脅下堅痛梁門主胸下積氣大泉主胸滿噭呼胸膺痛魚際主痺走胸背不得息關元期門少商主脅下脹經渠丘墟主胸背急胸中彭彭尺澤少澤主短氣脅痛心煩少衝主胸痛口熱凡胸滿短氣不得汗皆針補手太隂以出汗心病支溝大溪然谷主心痛如錐刺甚者手足寒至節不息者死又云然谷主心如懸少氣不足以息大都太白主暴泄心痛腹脹心痛尤甚臨泣主胸痺心痛不得反側甲乙云不得􅒚痛無常處行間主心痛色蒼蒼然如死灰狀終日不得太息通谷巨闕太倉心輸膻中神府主心痛通里主卒痛煩心心中懊憹數欠頻伸心下悸悲恐期門長強天突俠白中衝主心痛短氣尺澤主心痛彭彭然心煩悶亂少氣不足以息腎輸復留大陵雲門主心痛如懸章門主心痛而嘔建里主心痛上搶心不欲食少衝主心痛而寒大泉主心痛肺脹胃氣上逆鳩尾主心寒脹滿不得食息賁唾血厥心痛善噦心疝太息上管主心痛有三蟲多涎不得反側中管主心痛難以俯仰甲乙云身寒心疝衝胃死不知人不容期門主心切痛喜噫酸肓門主心下大堅靈道主心痛悲恐相引瘈瘲間使主心懸如飢郤門曲澤大陵主心痛商丘主心下有寒痛又主脾虛令人病不樂好太息凡卒心痛汗出刺大敦出血立已內關主凡心實者則心中暴痛虛則心煩惕然不能動失智腹病復留中封腎輸承筋隂包承山大敦主小腹痛又云復留主腹厥石門商丘主小腹堅痛下引隂中氣海主小腹疝氣遊行五藏腹中切痛關元委中照海大溪主小腹熱而偏痛膈輸陰谷主腹脹胃管暴痛及腹積聚肌肉痛高曲主腹中積聚時切痛一名商曲四滿主腹僻切痛天樞主腹中盡痛外陵主腹中盡疼崑崙主腹痛喘暴滿氣衝主身熱腹痛腹結主繞臍痛搶心衝門主寒氣滿腹中積痛疼淫濼間使主寒中少氣隱白主腹中寒冷氣脹喘鳩尾主腹皮痛搔癢中極主腹中熱痛水分石門主小腹中拘急痛巨闕上管石門隂蹻主腹中滿暴痛汗出行間主腹痛而熱上柱心心下滿大溪主腹中相引痛涌泉主風入腹中小腹痛豐隆主胸痛如刺腹若刀切痛脹滿病中極主小腹積聚堅如石小腹滿又云中極主寒中腹脹通谷主結積留飲癖囊胸滿飲食不消膀胱輸主堅結積聚上管主心下堅積聚冷脹胃管三膲輸主小腹積聚堅大如盤胃脹食飲不消三里章門京門厲兊內庭隂谷絡却崑崙商丘隂谷曲泉隂陵泉主腹脹滿不得息又云隂陵泉主腹中脹不嗜食脅下滿腹中盛水脹逆不得卧又云商丘主腹中滿嚮嚮然不便心下有寒痛隱白主腹脹逆息又云隱白主腹滿喜嘔尺澤主腹脹喘振栗解溪主腹大下重又云解溪主厥氣上柱腹大大鍾主腹滿便難肝輸包肓主小腹滿水道主小腹脹滿痛引隂中日月大橫主小腹熱欲走太息委中主小腹堅腫關元主寒氣入腹懸樞主腹中積上下行懸鍾主腹滿脾輸大腸輸主腹中氣脹引脊痛食飲多而身羸瘦名曰食晦先取脾輸後取季肋隂市主腹中滿痿厥少氣丘墟主大疝腹堅京門主寒熱腹脹高曲主腹中積聚肓輸主大腹寒疝甲乙云大腹寒中天樞主腹脹腸鳴氣上衝胸氣衝主腹中大熱不安腹有大氣暴脹滿癃淫濼大衝主羸瘦恐懼氣不足腹中悒悒期門主腹大堅不得息脹痺滿小腹尤大太隂郤主腹滿積聚大溪主腹中脹腫衡門主寒氣腹滿腹中積聚疼痛巨闕上管主腹脹五藏脹心腹滿中管主腹脹不通痓大便堅憂思損傷氣積聚腹中甚痛作膿腫往來上下隂交主五藏遊氣三里行間曲泉主腹䐜滿陷谷主腹大滿喜噫衝陽主腹大不嗜食五里主心下脹滿而痛上氣太白公孫主腹脹食不化鼓脹腹中氣大滿漏谷主腸鳴強欠心悲氣逆腹䐜滿急蠡溝主數噫恐悸氣不足腹中悒悒凡腹中熱喜渴涎出是蛔也以手聚而按之堅持勿令得移以大針刺中管久持之中不動乃出針凡腹滿痛不得息正仰臥屈一膝伸一腳並氣衝針入三寸氣至瀉之隂都主心滿氣逆腸鳴陷谷溫留漏谷復留陽綱主腸鳴而痛上廉主腸鳴相追逐胃輸主腹滿而鳴章門主腸鳴盈盈然膺窗主腸鳴泄注太白公孫主腸鳴臍中主腸中常鳴上衝心隂交主腸鳴濯濯如有水聲大小便病豐隆主大小便澀難營衝四穴主大小便不利長強小腸輸主大小便難淋癃水道主三膲約大小便不通秩邉包肓主癃閉下重大小便難會隂主隂中諸病前後相引痛不得大小便又云主小便難竅中熱大腸輸八窖主大小便利陽綱主大便不節小便赤黃腸鳴泄注屈骨端主小便不利大便泄數并灸天樞勞宫主大便血不止尿赤大溪主尿黃大便難中窖石門承山大衝中管大鍾大溪承筋主大便難又云大衝主淋不得尿隂上痛又云中管主小腸有熱尿黃崑崙主不得大便肓輸主大便乾腹中切痛石關主大便閉寒氣結心堅滿中注浮郤主小腹熱大便堅上廉下廉主小便難黃少府三里主小便不利癃腎輸主小便難赤濁滑寒熱橫骨大巨期門主小腹滿小便難隂下縱大敦箕門委中委陽主隂跳遺小便難中極蠡溝漏谷承扶至隂主小便不利失精又云承扶主尻中腫大便直出隂胞有寒小便不利隂陵泉主心下滿寒中小便不利關元主胞閉塞小便不通勞熱石淋又云主石淋臍下三十六疾不得小便并灸足太陽又云主傷中尿血列缺主小便熱痛京門照海主尿黃水道不通又云京門主溢飲水道不通溺黃隂交石門委陽主小腹堅痛引隂中不得小便大陵主目赤小便如血承漿主小便赤黃或時不禁完骨小腸輸白環輸膀胱輸主小便赤黃前谷委中主尿赤難隂谷主尿難隂痿不用中封行間主振寒溲白尿難痛又云行間主癃閉莖中痛凡尿青黃赤白黑青取井黃闕白取經黑取合關元酒泉主胞轉氣淋又主小闕隂陵泉關元主寒熱不節腎病不可以俯仰氣癃尿黃氣衝主腹中滿熱淋閉不得尿曲泉主癃閉隂痿交信主氣淋然谷主癃疝復留主淋又云主血淋懸鍾主五淋大敦氣門主五淋不得尿通里主遺溺曲骨主小腹脹血癃小便難關門中府神門主遺尿甲乙中府作委中隂陵泉陽陵泉主失禁遺尿不自知泄痢病京門然谷隂陵泉主洞泄不化交信主泄痢赤白漏血丹田主泄痢不禁小便絞痛復留主腸澼便膿血泄痢後重腹痛如痓狀脾輸主泄痢不食食不生肌膚小腸輸主泄痢膿血五色重下腫痛關元大溪主泄痢不止京門崑崙主洞泄體痛天樞主冬月重感於寒則泄當臍痛腸胃間遊氣切痛腹哀主便膿血寒中食不化腹中痛尺澤主嘔泄上下出兩脅下痛束骨主腸澼泄長強主頭重洞泄太白主腹脹食不化喜嘔泄有膿血地機主溏瘕腹中痛藏痺隂陵泉隱白主胸中熱暴泄大衝曲泉主溏泄痢注下血腎輸章門主寒中洞泄不化會陽主腹中有寒泄注腸澼便血三膲輸小腸輸下窖意舍章門主腸鳴臚脹欲泄注中窖主腹脹飱泄大腸輸主腸鳴腹䐜腫暴泄消渴病承漿意舍關衝然谷主消渴嗜飲又云意舍主消渴身熱面目黃勞宫主苦渴食不下曲池主寒熱渴隱白主飲渴行間大衝主嗌乾喜渴商丘主煩中渴水腫病公孫主頭面腫水溝主水腫人中滿胃倉主水腫臚脹食飲不下惡寒章門主身潤石水身腫屋翳主身腫皮痛不可近衣中府間使合谷主面腹腫隂交石門主水脹水氣行皮中小腹皮敦敦然小便黃氣滿關元主小腹滿石水四滿然谷主大腹石水關門主身腫身重天樞豐隆厲兊陷谷衝陽主面浮腫又云豐隆主四肢腫身濕天府主身脹逆息不得卧風汗身腫喘息多唾氣衝主大氣石水解溪主風水面胕腫顔黑上廉主風水膝腫三里主水腹脹皮腫陷谷列缺主面目癰腫又云列缺主汗出四肢腫臨泣主掖下腫胸中滿大敦主大腹腫脹臍腹悒悒天牖主乳腫缺盆中腫崑崙主腰尻腫腨跟腫丘墟陽蹻主掖下腫寒熱頸腫曲泉主腹腫復留豐隆主風逆四肢腫隂谷主寒熱腹偏腫完骨巨窖主頭面氣胕腫陽陵泉主頭面腫凡頭目癰腫留飲胸脅支溝刺陷谷出血立已不能食病豐隆主不能食石門主不欲食穀入不化天樞厲兊內庭主食不化不嗜食俠臍急維道主三膲有水氣不能食中封主身黃有微熱不嗜食然谷內庭脾輸主不嗜食胃輸腎輸主胃中寒脹食多身羸瘦又云胃輸主嘔吐筋攣食不下不能食大腸輸周榮主食不下喜飲陽綱期門少商勞宮主飲食不下章門主食飲不化入腹還出熱中不嗜食苦吞而聞食臭傷飽身黃酸疼羸瘦中庭中府主膈寒食不下嘔吐還出食竇主膈中雷鳴察察隱隱常有水聲巨闕主隔中不利中極主飢不能食上管中管主寒中傷飽食飲不化凡食飲不化入腹還出先取下管後取三里瀉之凡不嗜食刺然谷多見血使人立飢嘔吐病商丘幽門通谷主喜嘔又云商丘主脾虛令人病寒不樂好太息多寒熱喜嘔俞府靈墟神藏巨闕主嘔吐胸滿率谷主煩滿嘔吐天容主咳逆嘔沫胃輸腎輸主嘔吐曲澤主逆氣嘔涎中庭中府主嘔逆吐食下還出石門主嘔吐陽陵泉主嘔宿汁心下淡淡維道主嘔逆不止少商勞宫主嘔吐絶骨主病熱欲嘔大鍾大溪主煩心滿嘔魂門陽關主嘔吐不住多涎隱白主膈中嘔吐不欲食膈輸主吐食又灸章門胃管巨闕胸堂主吐食大敦主噦噫又灸巨關內庭主喜頻伸數欠惡聞人音吐血病上管不容大陵主嘔血胸堂脾輸手心主間使胃管天樞肝輸魚際勞宫肩輸大溪主唾血吐血郤門立衄血吐血委中隱白主衄血劇不止大泉神門主唾血振寒嘔血上氣手少隂郤主吐血行間主短氣嘔血胸背痛大衝主面脣色白時時嘔血女子漏血涌泉主衄血不止然谷主咳唾有血凡內損唾血不足外無膏澤地五會主之刺入三分特忌灸凡唾血瀉魚際補尺澤咳逆上氣天容廉泉魄戶氣舍譩嘻扶突主咳逆上氣喘息嘔沫齒噤甲乙云陽氣大逆上滿於胸中憤䐜肩息大氣逆上喘喝坐伏不得息取之天容上氣胸痛取之廉泉咳逆上氣魄戶及氣舍譩嘻主之咽喉鳴喝喘息扶突主之唾沫天容主之頭維主喘逆煩滿嘔沫流汗缺盆心輸肝輸巨闕鳩尾主咳唾血又云鳩尾主噫喘胸滿咳嘔缺盆膻中巨闕主咳嗽期門右手屈臂中橫文外骨上主咳逆上氣又云期門主喘逆卧不安席咳脅下積聚天府主上氣喘不得息然谷天泉陷谷胸堂章門曲泉天突雲門肺輸臨泣肩井風門行間主咳逆維道主咳逆不止扶突主咳逆上氣咽中鳴喘魄戶中府主肺寒熱呼吸不得卧咳逆上氣嘔沫喘氣相追逐大包主大氣不得肺輸腎輸主喘咳少氣百病或中石門主咳逆上氣涎出多唾天池主上氣喉鳴天突華蓋主咳逆上氣喘暴紫宫玉堂大溪主咳逆上氣心煩膻中華蓋主短氣不得息不能言輸府神藏主咳逆上氣喘不得息或中雲門主咳逆上氣涎出多唾呼吸喘悸坐不安席步郎安都主膈上不通呼吸少氣喘息氣户雲門天府神門主喘逆上氣呼吸肩息不知食味俠白主咳乾嘔煩滿庫房中府周榮尺澤主咳逆上氣呼吸多唾濁沫膿血又云中府主肺系急咳輒胸痛少海主氣逆呼吸噫噦嘔經渠行間主喜咳又云經渠主咳逆上氣喘掌中熱大陵少商主咳逆喘又云大陵主咳逆寒熱發勞宫主氣逆噫不止大泉主咳逆胸滿喘不得息三里主咳嗽多唾支溝主咳面赤而熱肩輸主上氣前谷主咳而胸滿咳喘曲澤出血立已又卒咳逆逆氣咳唾噫善咳氣無所出先取三里後取太白章門賁豚氣章門石門隂交主賁豚上氣甲乙云賁豚腹腫章門主之賁豚氣上腹䐜痛莖腫先引腰後引小腹腰臗小腹堅痛下引隂中不得小便兩丸騫石門主之賁豚氣上腹䐜堅痛引隂中不得小便兩丸騫隂交主之關元主賁豚寒氣入小腹期門主賁豚上下歸來主賁豚卵上入引莖痛中極主賁豚上搶心甚則不得息天樞主賁豚脹疝甲乙云氣疝噦嘔面腫賁豚然谷主胸中寒脈代時不至寸口小腹脹上搶心備急千金要方卷九十一
