body:
  text: 備急千金要方卷三十四唐孫思邈撰宋林億等校正傷寒方傷寒不發汗變成狐惑病第十三論方論曰狐惑之病其氣如傷寒默默欲眠目不得閉起卧不安其毒在喉咽為惑病在隂肛者為狐病狐惑之病並惡飲食不欲食聞食臭其面目翕赤翕白翕黑毒食於上者則聲喝也喝一作嗄毒食下部者則乾咽也此由溫毒氣所為食于上者㵼心湯主之食於下者苦參湯淹洗之食于肛外者熏之并用雄黃三片稍置瓦瓶中炭火燒向肛熏之并服湯也治狐惑湯黃連四兩薰草四兩右二味㕮咀白酢漿一斗漬一宿煮取二升分為三服赤小豆當歸散其人脈數無熱微煩默默但欲卧汗出初得之三四日眼赤如鳩眼得之七八日其四眥黃黑能食者膿已成也治之之方以赤小豆三升漬之令生芽足乃復乾之加當歸三兩為末漿水服方寸匕日三即愈㵼心湯其病形不可攻不可灸因火為邪血散脈中傷脈尚可傷臟則劇井輸益腫黃汁出經合外爛肉腐為癰膿此為火疽醫所傷也夫脈數者不可灸因火為邪即為煩因虛逐實血走脈中火氣雖微內攻有力焦骨傷筋血難復也應在瀉心瀉心湯兼治下痢不止腹中愊堅而嘔吐腸鳴者方仲景名半夏瀉心要略名甘草瀉心半夏半升黃芩人參乾薑甘草各三兩黃連一兩大棗十二枚右七味㕮咀以水一斗煮取六升分服一升日三傷寒發黃第十四論灸證針圖方論曰黃有五種有黃汗黃疸榖疸酒疸女勞疸黃汗者身體四肢微腫胸滿不渴汗出如黃蘗汁良由大汗出卒入水中所致黃疸者一身面目悉黃如橘柚暴得熱以冷水洗之熱因留胃中食生黃瓜熏上所致若成黑疸者多死榖疸者食畢頭眩心忪怫鬱不安面發黃由失飢大食胃氣衝熏所致酒疸者心中懊痛足脛滿小便黃面發赤斑黃黑由大醉當風入水所致女勞疸者身目皆黃發熱惡寒小腹滿急小便難由大勞大熱而交接竟入水所致但依後方治之黃汗之為病身體洪腫發熱汗出不渴狀如風水汗染衣色正黃如蘗汁其脈自沈從何得之此病以汗出入水中浴水從汗孔入因而得之黃耆芍藥桂酒湯治黃汗方黃耆五兩芍藥三兩桂心三兩右三味㕮咀以苦酒一升水七升合煎取三升飲一升當心煩也至六七日稍稍自除心煩者苦酒阻故也黃疸之病疸而渴者其病難治疸而不渴其病可治發於隂部其人必嘔發于陽部其人振寒而微熱桂枝黃耆湯治諸病黃疸宜利其小便假令脈浮當以汗解方桂枝芍藥生薑各三兩甘草二兩黃耆五兩大棗十二枚右六味㕮咀以水八升微火煎取三升去滓溫服一升發微汗須臾不汗者飲稀熱粥以助湯若不汗更服湯麻黃醇酒湯治傷寒熱出表發黃疸方麻黃三兩以醇酒五升煮取一升半盡服之溫覆汗出即愈冬月寒時用清酒春月宜用水治黃疸方瓜蒂秫米赤小豆各二七枚右三味治下篩病重者取如大豆二枚內著鼻孔中痛縮鼻須臾當出黃汗或從口中出汁升餘則愈病輕者如一豆不瘥間日復用又下里間以筒使人極吹鼻中無不死大慎之刪繁療天行毒熱通貫臟腑沈伏骨髓之間或為黃疸黑疸赤疸白疸榖疸馬黃等病喘息須臾不絶也大黃圓治同前大黃葶藶子各二兩右二味為末蜜和丸如梧子大未食服十丸日三病瘥止又方大黃二兩黃連三兩黃蘗黃芩各一兩麴衣五合右五味為末蜜和丸如梧子大先食服三丸日三不知加至五丸茵蔯湯治黃疸身體面目盡黃方茵蔯黃連各三兩黃芩二兩大黃甘草人參各一兩梔子二十七枚右七味㕮咀以水一斗煮取三升分三服日三亦治酒疸酒癖三黃散治同前大黃黃連黃芩各四兩右三味治下篩先食服方寸匕日三亦可為丸五苓散治黃疸利小便方豬苓茯苓澤瀉白术桂心各三十銖右五味搗篩為散渴時水服方寸匕極飲水即利小便及汗出愈此方與第九卷方相重以分兩不同故重出秦椒散治黃疸飲少溺多方秦椒六銖瓜蒂半兩右二味治下篩水服方寸匕日三小半夏湯治黃疸小便色不異欲自利腹滿而喘者不可除熱熱除必噦方半夏生薑各半斤右二味㕮咀以水七升煮取一升五合分再服有人常積氣結而死其心上暖以此湯少許汁入口遂活治黃疸方取生小麥苖搗絞取汁飲六七合晝夜三四飲三四日便愈無小麥穬麥亦得用之治黃疸變成黑疸醫所不能治者方土瓜根搗汁一小升頓服日一平旦服至食時病從小便出先須量病人力不得多服力衰則起不得治發黃身面目悉黃如金色小便如濃煮蘗汁衆醫不能療者方茵蔯梔子各四兩黃芩大黃柴胡升麻各三兩龍膽二兩右七味㕮咀以水八升煮取二升七合分三服若身體羸去大黃加梔子五六兩生地黃一升延年録無茵蔯有梔子四兩栝蔞三兩芒硝二兩近效方加枳實二兩夫黃發已久變作桃皮色心下有堅嘔逆不下飲食小便極赤色少四肢逆冷脈深沉極微細遲者不宜服此方得下必變啘也宜與大茵蔯湯除大黃與生地黃五兩服湯盡消息看脈小浮出形小見不甚沈微便可治也脈浮見者黃當明不復作桃皮色心下自寬也大茵蔯湯方次出後十一味者是苦參散治人無漸忽然振寒發黃皮膚黃麴塵出小便赤少大便時閉氣力無異食飲不妨已服諸湯散餘熱不除久黃者宜吐下方苦參黃連瓜蒂黃蘗大黃各一兩葶藶二兩右六味治下篩飲服方寸匕當大吐吐者日一服不吐日再亦得下服五日知可消息不覺退更服之小折便消息之治發黃方茵蔯黃蘗梔子大黃各三兩黃連二兩石五味㕮咀以水九升煮取三升分三服先服湯後服丸方大黃五兩茵蔯梔子各三兩黃芩黃蘗黃連各二兩右六味為末以蜜丸如梧子大白飲服二十丸令微利麻黃連翹赤小豆湯治傷寒瘀熱在裏身體必發黃方麻黃連翹甘草各二兩生薑三兩大棗十二枚杏仁三十枚赤小豆一升生梓白皮切二升右八味㕮咀以勞水一斗先煮麻黃去沫次內諸藥煎取三升分三服茵蔯湯治傷寒七八日內實瘀熱結身黃如橘小便不利腹微脹滿宜下之方茵蔯六兩大黃三兩梔子四十枚右三味㕮咀以水一斗二升先煮茵蔯取五升去滓次內梔子大黃煎取三升分服一升日三小便當利如皂莢沫狀色正赤當腹減黃悉隨小便去也范注用療榖疸小品方用石膏一斤大黃黃蘗湯治發黃腹滿小便不利而赤自汗出此為表和裏實當下之方大黃三兩黃蘗芒硝各四兩梔子十五枚右四味㕮咀以水六升煮取二升去滓內芒硝復煎取一升先食頓飲之茵蔯圓治時行病急黃并瘴癘疫氣及痎瘧之方茵蔯梔子芒硝杏仁各三兩巴豆一兩恆山鱉甲各二兩䜴五兩大黃五兩右九味為末以餳為丸如梧子大飲服三丸以吐利為佳不知加一丸初覺體氣有異急服之即瘥神效治急黃熱氣骨蒸兩目赤脈方芒硝一兩大黃一兩半末生地黃汁八合右三味合和一服五合日二以利為度不須二服治風疸小便或黃或白灑灑寒熱好卧不欲動方三月生艾一束搗取銅器中煎如漆密封之大黃黃連凝水石栝蔞根苦參葶藶各六銖右七味六味為末以艾煎和丸如梧子大先食服五丸日二可至二十丸有熱加苦參渴加栝蔞小便澀加葶藶小便多加凝水石小便白加黃連大便難加大黃濕疸之為病始得之一身盡疼發熱面色黑黃七八日後壯熱熱在裏有血當下去之如豚肝狀其小腹滿者急下之亦治一身盡黃目黃腹滿小便不利方礬石滑石各五兩右二味治下篩以大麥粥汁服方寸匕日三先食服之便利如血者已當汗出瘥寸口脈浮而緩浮則為風緩則為痺痺非中風四肢苦煩脾色必黃瘀熱以行跗陽脈緊而數數則為熱熱則消榖緊則為寒食則滿也尺脈浮為傷腎跗陽脈緊為傷脾風寒相薄食榖即眩榖氣不消胃中苦濁濁氣下流小便不通隂被其寒熱流膀胱身故盡黃名曰榖疸治勞疸榖疸丸方苦參三兩龍膽一兩右二味為末牛膽和為丸如梧子大先食以麥粥飲服五丸日三不知稍加之刪繁方加梔子仁三七枚以豬膽和為丸夫酒疸其脈浮者先吐之沈弦者先下之夫人病酒疸者或無熱靖言了了腹滿欲吐嘔者宜吐之方前苦參散七味者是酒疸必小便不利其候當心中熱足下熱是其證也夫酒疸下之久久為黑疸目青面黑心中如啖蒜虀狀大便正黑皮膚爪之不仁其脈浮弱雖黑微黃故云枳實大黃湯治傷寒飲酒食少飲多痰結發黃酒疸心中懊憹而不甚熱或乾嘔方枳實五枚大黃三兩豆䜴半升梔子七枚右四味㕮咀以水六升煮取二升分三服心中熱疼懊憹皆主之凝水石散治肉疸飲少小便多如白泔色此病得之從酒方凝水石白石脂栝蔞根桂心各三十銖菟絲子知母各十八銖右六味治下篩麥粥飲服五分匕日三服五日知十日瘥茯苓圓治心下縱橫堅而小便赤是酒疸者方茯苓茵蔯乾薑各一兩白术熬枳實各三十銖半夏杏仁各十八銖甘遂六銖蜀椒當歸各十二銖右十味為末蜜和丸如梧子大空腹服三丸日三稍稍加以小便利為度千金翼加黃連一兩大黃十八銖名茵蔯丸治黑疸身體暗黑小便澀半夏湯治酒癖蔭胸心脹滿骨肉沉重逆害飲食乃至小便赤黃此根本虛勞風冷飲食衝心由脾胃內痰所致方半夏一升生薑黃芩茵蔯當歸各一兩前胡枳實甘草大戟各二兩茯苓白术各三兩右十一味㕮咀以水一斗煮取三升分作三服牛膽圓治酒疸身黃麴塵出方牛膽一枚芫花一升蕘花半升瓜蒂三兩大黃八兩右五味四味㕮咀以清酒一斗漬一宿煮減半去滓內牛膽微火煎令可丸如大豆服一丸日移六七尺不知復服一丸至八丸膈上吐膈下下或不吐而自愈大茵蔯湯治內實熱盛發黃黃如金色脈浮大滑實緊數者大發黃多是酒客勞熱食少胃中熱或溫毒內熱者故黃如金色方茵蔯黃蘗各一兩半大黃白术各三兩黃芩甘草茯苓栝蔞根前胡枳實各二兩梔子二十枚右十一味㕮咀以水九升煮取三升分三服得快下消息三四日更治之茵蔯圓治氣淋臚脹腹大身體面目悉黃及酒疸短氣不得息方茵蔯天門冬梔子各四兩大黃桂心各三兩通草石膏各二兩半夏半升右八味蒸大黃通草天門冬半夏梔子曝令乾合搗篩蜜丸如大豆服三丸日三忌生魚以豆羮服不得用酒一方去石膏內滑石二兩不知加至十丸黃家至日晡所發熱而反惡寒此為女勞得之當膀胱急小腹滿體盡黃額上黑足下熱因作黑疸其腹臚脹而滿如欲作水狀大便必黑時溏泄此女勞疸非水也腹滿者難治硝石礬石散治女勞疸方硝石礬石各半兩右二味治下篩大麥粥汁服方寸匕日三重衣覆取汗病隨大小便出小便正黃大便正黑黃疸之為病日晡所發熱惡寒小腹急身體黃額黑大便溏黑足下熱此為女勞腹滿者難治治之方滑石石膏各等分右二味治下篩以大麥粥汁服方寸匕日三小便極利則瘥針灸黃疸法正面圖第一寅門脣裏上齗顳顬上腭中俠人舌下漿俠承巨闕隂縫上管寅門穴從鼻頭直入髮際度取通繩分為三斷繩取一分入髮際當繩頭針是穴治馬黃黃疸等病上齗裏穴正當人中及脣針三鋥治馬黃黃疸等病上腭穴入口裏邊在上縫赤白脈是針三鋥治馬黃黃疸四時等病舌下穴俠舌兩邊針治黃疸等病脣裏穴正當承漿裏邊逼齒齗針三鋥治馬黃黃疸寒暑溫疫等病顳顬穴在眉眼尾中間上下有來去絡脈是針灸之治四時寒暑所苦疸氣溫病等俠人中穴火針治馬黃黃疸疫通身並黃語音已不轉者俠承漿穴去承漿兩邊各一寸治馬黃急疫等病巨闕穴在心下一寸灸七壯治馬黃黃疸急疫等病上管穴在心下二寸灸七壯治馬黃黃疸等病男隂縫穴拔隂反向上灸治馬黃黃疸等病若女人玉門是穴男女針灸無在覆面圖第二風府肝輸熱府脾輸肺輸腎輸心輸跟腳後風府穴在項後入髮際一寸去上骨一寸針之治頭中百病馬黃黃疸等病熱府穴在第二節下兩傍相去各一寸五分針灸無在治馬黃黃疸等病肺輸穴從大椎數第三椎兩傍相去各一寸五分灸主黃疸通治百毒病心輸穴從肺輸數第二椎兩傍相去各一寸五分肝輸穴從心輸數第四椎兩傍相去各一寸五分脾輸穴從肝輸數第二椎兩傍相去各一寸五分腎輸穴從脾輸數第三椎兩傍相去各一寸五分腳後跟穴在白肉後際針灸隨便治馬黃黃疸寒暑諸毒等病側面圖第三耳中子頭頰裏癖石手太陽錢孔太衝耳中穴在耳門孔上橫梁是針灸之治馬黃黃疸寒暑疫毒等病頰裏穴從口吻邊入往對頰裏去口一寸針主治馬黃黃疸寒暑溫疫等病頰兩邊同法手太陽穴手小指端灸隨年壯治黃疸癖石子頭穴還取病人手自捉臂從腕中太澤澤當作淵文向上一夫接白肉際灸七壯治馬黃黃疸等病錢孔穴度乳至臍中屈肋頭骨是灸百壯治黃疸太衝穴針灸隨便治馬黃黃疸溫疫毒等病備急千金要方卷三十四
