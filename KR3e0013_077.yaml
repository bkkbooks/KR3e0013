body:
  text: 備急千金要方卷七十七唐孫思邈撰宋林億等校正備急方諸般傷損第三論方論曰凡被打損血悶搶心氣絶不能言可擘開口尿中令下咽即醒又墮車落馬及車碾木打已死者以死人安著以手袖掩其口鼻眼上一食頃活眼開與熱小便二升治被打擊頭眼青腫方灸肥豬肉令熱㩉上肘後方云治血聚皮膚間不消散者又方牆上朽骨唾於石上研磨塗之乾即易又方炙豬肝貼之又方新殺羊肉乘熱封之又方大豆黃為末水和塗之治被打傷破腹中有瘀血方蒲黃一升當歸桂心各二兩右三味治下篩以酒服方寸匕日三夜一又方劉寄奴延胡索碎骨補各一兩右三味㕮咀以水二升煎取七合復內酒及小便各一合熱溫頓服又方蟅蟲虻蟲水蛭各三十枚桃仁五十枚桂心二兩大黃五兩右六味㕮咀以酒水各五升煮取三升分五服又方生地黃汁三升酒一升半煮取二升七合分三服肘後方從高墮下瘀血脹心面青短氣欲死者又方莨菪子為末傳瘡上白馬蹄散治被打腹中瘀血并治婦人瘀血化血為水方白馬蹄燒令煙盡搗篩酒服方寸匕日三夜一治被歐擊損傷聚血腹滿煩悶方䜴一升以水三升煮三沸分再服不瘥重作更取麻子煮如䜴法不瘥更煮䜴上法治有瘀血者其人喜忘不欲聞人聲胸中氣塞短氣方甘草一而茯苓二兩杏仁五十枚右三味㕮咀以水二升煮取九合分二服治從高墮下傷拆疾痛煩燥啼呌不得臥方取鼠尿燒末以豬膏和塗痛上即急裹之肘後方云裹骨破碎治從高墮下及為木石所迮或因落馬凡傷損血瘀凝積氣絶欲死無不治之方取淨土五升蒸令溜分半以故布數重裹之以尉病上勿令大熱恐破肉冷則易之取痛止即已凡有損傷皆以此法治之神效已死不能言者亦活三十年者亦瘥治墮車馬間馬鞍及諸物隱體肉斷方以酢和麵塗之當歸散治落馬墮車諸傷腕折臂腳痛不止方當歸桂心蜀椒附子各二分澤蘭一分芎藭六分甘草五分右七味並熬令香治下篩酒服方寸匕日三凡是傷損皆服之十日愈小兒亦同救急方云治墜馬落車被打傷腕折臂呌喚痛聲不絶服此散呼吸之間不復大痛十三日筋骨相連黃耆散治腕折方黃耆芍藥各三兩當歸乾地黃附子續斷桂心乾薑通草各二兩大黃一兩蜀椒一合烏頭半兩右十二味治下篩先食酒服五分七日三千金翼無大黃治折骨斷筋方乾地黃當歸羌活苦參各二分右四味治下篩酒服方寸匕日三治腕折骨損痛不可忍者方以大麻根及葉搗取汁飲一升無生麻煮乾麻汁服亦主墜墮撾打瘀血心腹滿短氣治被傷筋絶方取蟹頭中腦及足中髓熬之內瘡中筋即續生治腕折四肢骨碎及筋傷蹉跌方生地黃不限多少熟搗用薄所損傷處肘後方云小品方爛搗熬之以裹傷處以竹片夾裹令遍縳令急勿令轉動一日可十易三日瘥若血聚在折處以刀子破去血治四肢骨碎筋傷蹉跌方以水二升漬䜴三升取汁服之鹿角散治同前右酒服方寸匕日三肘後方治從高墮下若為重物所頓迮得瘀血者又方筋骨傷初破時以熱馬尿傳之無瘢又方大豆二升水五升煮取二升以淳酒六七升合和豆汁服之一日盡如湯沃雪肘後方云治墮迮瘀血無大豆用小豆佳又方羊腦一兩髮灰胡粉胡桃脂各半兩右四味搗和調如膏傳上生布裹治頭破腦出中風口噤方大豆一斗熬去腥勿使太熱搗為末熟蒸氣偏合甑下盆中以酒一斗淋之溫服一升覆取汗傳杏仁膏瘡上紫湯治被傷風入四體角弓反張口噤不能言或産婦墮胎凡得此者大重不過五劑方見第八卷中治丈夫從高墮下傷五臟微者唾血甚者吐血及金瘡傷經崩中皆主之方阿膠艾葉乾薑各二兩芍藥三兩右四味㕮咀以水八升煮取三升去滓內膠令消分二服羸人分三服兼治女人産後崩傷下血過多虛喘腹中絞痛下血不止者服之悉愈大膠艾湯治男子傷絶或從高墮下傷五臟微者唾血及金瘡傷經者方阿膠艾葉甘草當歸芎藭各二兩乾薑一兩芍藥乾地黃各三兩右八味㕮咀以水八升煮取三升去滓內膠令煬分再服羸人分三服此湯治婦人産後崩傷下血過多虛喘欲死腹中激痛下血不止者神良竹皮湯治為兵杖所加木石所迮血在胸背及脅中痛不得氣息方青竹刮取茹亂髮各如雞子大二枚右二味於炭火上炙令焦燥合搗下篩以酒一升煮三沸上一服盡之三服愈治墮馬落車及樹間崩血腹滿短氣方大豆五升以水一斗煮取二升去豆一服令盡劇者不過三作治墮落車馬間心腹積血唾吐無數方乾藕根為末以酒服方寸匕日三如無取新藕汁服桃仁湯治從高墮下落大木車馬間胸腹中有血不得氣息方桃仁十四枚大棗二十枚大黃消石甘草各一枚蒲黃一兩半右六味㕮咀以水三升煮取一升絞去滓適寒溫盡服之當下下不止漬麻汁一杯飲之即止又方治腹中瘀血痛在腹中不出滿痛短氣大小便不通桃仁蟅蟲各三十枚荆芥半分大黃芎藭各三兩當歸桂心甘草各二兩蒲黃五兩右九味㕮咀以水一斗煮取三升分三服又方治墮落瘀血方桃仁五十枚水蛭虻蟲各二十枚甘草桂心當歸各二兩芒硝三兩大黃四兩右八味㕮咀以水八升煮取三升絞去滓適寒溫服一升日三服深師方無芒硝又方桃仁五十枚虻蟲蟅蟲水蛭各三十枚大黃五兩桂心二兩右六味㕮咀以酒水各五升合煎得三升適寒溫飲一升日三服又方治腕折瘀血方桃仁四十枚亂髮一握大黃如指節大一枚右三味以布方廣四寸以繞亂髮燒之㕮咀大黃桃仁以酒三升煮取一升盡服血盡出肘後云仲景方用大黃三兩緋帛子如手大灰亂髮如雞子大灰久用吹單布方一尺灰桃仁四十九枚敗蒲席一握長三寸切甘草一枚如指大以童子小便量多少煎湯成內酒一大盞次下大黃分溫為三服别銼敗蒲席半領煎湯以浴衣被重覆服藥須通利數行痛楚立瘥利及浴水赤勿怪即瘀血也又方桃仁六十枚大黃六兩桂心二兩右三味㕮咀以酒六升煮取三升分三服當下血瘥蒲黃散治從高墮下有瘀血方蒲黃八兩附子一兩右二味為末酒服方寸匕日三不知增之以意消息又方治腕折瘀血方蒲黃一升當歸二兩右二味治下篩先食酒服方寸匕日三又方虻蟲二十枚牡丹一兩右二味治下篩酒服方寸匕血化為水備急方云治久宿血在諸骨節及外不去者二味等分又方取菴䕡草汁飲之子亦可服又方凡被打及産後惡血及一切血皆煮續骨木汁三升飲之治從高墮下崩中方當歸大黃各二分右二味治下篩酒服方寸匕日三治杖瘡方石灰七斤新豬血一升右二味和為丸熟燒之破更丸燒三遍止為末傳上又方釡月下土為細末以油和塗訖臥羊皮上又方服小便良治竹木刺在皮中不出方羊尿燥者燒作灰和豬脂塗刺上若不出重塗乃言不覺刺出時一云用乾羊屎末又方薔薇灰水服方寸匕日三服十日刺出又方酸棗核燒末服之又方鑿柄燒灰酒服二寸匕又方頭垢塗之即出治刺在肉中不出方煮山瞿麥汁飲之日三瘥止又方用牛膝根莖生者併搗以薄之即出瘡已合猶出也又方白茅根燒末以膏和塗之亦治瘡因風致腫者又方鹿角燒末以水和塗之立出久者不過一夕又方嚼白梅以塗之肘後方用烏梅又方嚼䜴塗之又方溫小便漬之治久刺不出方服王不留行即出兼取根為末貼之治惡刺方苦瓠開口內小兒尿煮兩三沸浸病上又方莨菪根火煮浸之冷復易神方也又方李葉棗葉搗絞取汁點上即效又方濃煮大豆汁漬取瘥治惡刺并狐尿刺方以烏父驢尿漬之又方溫白馬尿漬之治因瘡腫痛劇者數日死或中風寒或中水或中狐尿刺主之方燒黍穰若牛馬屎若生桑條取得多煙之物燒熏汁出愈又方燒蠟內瘡中新瘡亦善又方以鳬公英草摘取根莖白汁塗之惟多塗為佳瘥止余以貞觀五年七月十五日夜左手中指背觸著庭樹至曉遂患痛不可忍經十日痛日深瘡日高大色如熟小豆色嘗聞長者之論有此治方試復為之手下即愈痛亦即除瘡亦即瘥不過十日尋常平復此大神效故疏之蜀人名耳瘢菜關中名苟乳乳奴苟切治瘡中水腫方白灰胡粉炭各等分右三味脂和塗瘡孔上水出則痛止治手足卒中刺中水毒方搗韭及藍青置上以火炙熱徹即愈治瘡因風致腫方櫟木根皮一斤濃煮內鹽一把漬之治破傷風腫方厚塗杏仁膏然麻燭遙炙之治因瘡腫痛者皆中水及中風寒所作腫入腹則殺人方溫桑灰汁漬冷復溫之當令熱神祕治刺傷中風水方服黑牛熱尿一服二升三服即止又方蠟一兩熱炙尉薄裹上令水出愈又方魚目燒灰傳之又方熱煮韭拓之又方刮箭羽下漆塗之治瘡犯露腫方凡八月九月中刺手足犯惡露腫殺人不可輕生桑枝三枚內煻灰中推引令極熱斫斷正以枝頭拄瘡口上熱盡即易之盡三枚則瘡自爛仍取薤白搗綿裹著熱灰中使極熱去綿取薤白薄瘡上以布帛急裹之若有腫者便作用薤白最佳治漆瘡方生柳葉三斤細切以水一斗五升煮取七升適寒溫洗之日三肘後方云老柳皮尤妙又方以磨石下滓泥塗之取瘥止大驗又方濃煮鼠查葉以洗漆上亦可搗葉取汁塗之又方爛搗七姑草封之救急方云七姑草和芒硝塗之又方貫衆為末以塗上乾以油和之即愈又方蓮葉燥者一斤以水一斗煮取五升洗瘡上日再又方羊乳汁塗之又方芒硝五兩湯浸以洗之又方取豬膏塗之又方礬石著湯中令消洗之又方宜噉豬肉嚼穄榖塗之備急千金要方卷七十七
