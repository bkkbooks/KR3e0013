body:
  text: 備急千金要方卷七十五唐孫思邈撰宋林億等校正備急方卒死第一方法灸治卒死無脉無他形候隂陽俱竭故也治之方牽牛臨鼻上二百息牛䑛必瘥牛不肯䑛著鹽汁塗面上牛即肯䑛又方牛馬屎絞取汁飲之無新者水和乾者亦得肘後方云乾者以人溺解之此扁鵲法又方炙尉斗尉兩脅下解急方云又治尸厥針灸法針間使各百餘息又灸鼻下人中一名鬼客㕔肘後方云又治尸厥治魘死不自覺者方愼燈火勿令人手動牽牛臨其上即覺若卒不能語取東門上雞頭為末以酒服之治卒魘死方搗韭汁灌鼻孔中劇者灌兩耳張仲景云灌口中治鬼魘不悟方伏龍肝為末吹鼻中又方皂莢為末如大豆許吹鼻中嚏則氣通起死回生集驗方云治中惡辟魘方雄黃如棗大繫左腋下令人終身不魘張文仲云男左女右又方灸兩足大趾叢毛中各二七壯肘後方云華陀法又救卒死中惡治中惡方蔥心黃刺鼻孔中血出愈肘後方云入十八寸無苦使目中血出佳崔氏云男左女右又方大豆二七粒為末雞子黃并酒相和頓服又方使人尿其面上可愈肘後方云此扁鵲法又方灸胃管五十壯愈治中惡并蟲毒方冷水和伏龍肝如雞子大服之必吐又方溫二升猪肪頓服之又方車􅤧脂如雞子大酒服治卒忤方此病即今人所謂中惡者與卒死鬼擊亦相類為治皆參取而用之鹽八合以水三升煮取一升半分二服得吐即愈備急方云治鬼擊若小便不通筆頭七枚燒作灰末水和服之即通又方犢子屎半盞酒三升煮服之亦治霍亂肘後方云治鬼擊大牛亦可用又方書墨為末水服一錢七又方臘月野狐腸燒末以水服方寸匕死鼠灰亦佳灸法治卒忤死灸手十指爪下各三壯餘治同上方備急方云治卒死而張目反折者又灸人中三壯又灸肩井百壯又灸間使七壯又灸巨闕百壯還魂湯治卒感忤鬼擊飛尸諸奄忽氣絶無復覺或已死咬口口噤不開去齒下湯湯入口不下者分病人髮左右足踏肩引之藥下復增取盡一升須臾立蘇方麻黃三兩桂心二兩甘草一兩杏仁七十粒右四味㕮咀以水八升煮取三升分三服肘後方云張仲景方云桂不用治卒死鬼擊及刀兵所傷血漏腹中不出煩滿欲絶方雄黃粉酒服一刀圭日三血化為水治鬼擊病方鬼擊之病得之無漸卒著人如刀刺狀胸脅腹內絞急切痛不可抑按或即吐血或鼻口血出或下血一名鬼排雞屎白如棗大青花麻一把右二味以酒七升煮取三升熱服須㬰發汗若不汗尉斗盛火灸兩脅下使熱汗出愈又方艾如雞子大三枚以水五升煮取二升頓服又方吹酢少許鼻中灸法灸人中一壯立愈不瘥更灸又灸臍上一寸七壯及兩踵白肉際取瘥又灸臍下一寸三壯治五絶方夫五絶者一曰自縊二曰牆壁壓迮三曰溺水四曰魘寐五曰産乳絶取半夏一兩細下篩吹一大豆許內鼻中即活心下溫者一日亦可治治自縊死方凡救自縊死者極須按定其心勿截繩手抱起徐徐解之心下尚溫者以氍毹覆口鼻兩人吹其兩耳又方强臥以物塞兩耳竹筒內口中使兩人痛吹之塞口傍無令氣得出半日死人即噫噫即勿吹也又方搗皂莢細辛屑如胡豆大吹兩鼻中又方刺雞冠血出滴著口中即活男雌女雄又方雞屎白如棗大酒半盞和灌口及鼻中佳又方皂莢為末以蔥葉吹入兩鼻中逆出更吹又方梁上塵如大豆許各內一小竹筒中四人各捉一筒同時吹兩耳兩鼻即活又方尿鼻口眼耳中并捉頭髮一撮如筆管大掣之立活又方雞血塗喉下又方藍青汁灌之又方炙四肢大節陷大指夲文名曰地袖各七壯治熱暍方取道上熱塵土以壅心上少冷即易氣通止又方令暍人仰臥以熱土壅臍上令臍中溫即愈又方可飲熱湯亦可內少乾薑橘皮飲之稍稍咽勿頓使飽但以熱土及壅臍上佳又方濃煮蓼取汁三升飲之即愈不瘥更灌又方張死人口令通以暖湯徐徐灌口中小舉死人頭令湯入腹須臾即蘇又方使人噓其心令暖易人為之又方抱狗子若雞心上尉之又方屋上南畔瓦熱尉心冷易之又方灌地漿一盞即愈又方地黃汁一盞服之又方水半升和麵一大抄服之治落水死方以竈中灰布地令厚五寸以甑側著灰上令死者伏於甑上使頭小埀下炒鹽二方寸匕內竹管中吹下孔中即當吐水水下因去甑下死者著灰中壅身使出鼻口即活又方掘地作坑熬數斛灰內坑中下死人覆灰濕徹即易勿令大熱博人灰冷更易半日即活又方取大甑傾之死人伏其上令死人口臨甑口然葦火二七把燒甑中當死人心下令煙出小入死人鼻口中鼻口中水出盡則活火盡復益之常以手候死人身及甑勿令甚熱當令火氣能使死人心下足得暖卒無甑者於岸側削地如甑空下如竈燒令暖以死人著上亦可用車轂為之勿令隱其腹令死人低頭水得出并炒灰數斛令暖以粉身濕更易溫者又方但埋死人暖灰中頭足俱沒惟開七孔又方倒懸死人以好酒灌鼻中又灌下部又酢灌鼻亦得又方綿裹皂莢內下部中須臾出又方裹石灰內下部中水出盡則活又方倒懸解去衣去臍中垢極吹兩耳起乃止又方熬沙覆死人面上下有沙但出鼻口耳沙冷濕即易又方竈中灰二石埋死人從頭至足出七孔即活又方屈兩腳著生人兩肩上死人背向生人背即負持走行吐出水便活又方解死人衣炙臍中凡落水經一宿猶可活治冬月落水凍四肢直口噤尚有微氣者方以大器中熬灰使暖盛以囊薄其心上冷即易心暖氣通目得轉口乃開可溫尿粥稍稍吞之即活若不先溫其心便持火炙身冷氣與火爭即死治凍爛瘡方猪後懸蹄以夜半時燒研細篩以猪脂和𫝊亦治小兒治入水手足踵痛方搗生胡麻薄之治酒醉中酒恐爛五臟方以湯著槽中漬之冷復易夏亦用湯又方搗茆根汁飲三升又方凡醉不得安臥不動必須使人搖轉不住特忌當風席地及水洗飲水交接治飲酒頭痛方竹茹五兩以水八升煮取五升去滓令冷內破雞子五枚攪勻更煮二沸飲二升使盡瘥治飲酒腹滿不消方煮鹽湯以竹筒灌大孔中治飲酒中毒方煮大豆三沸飲汁三升又方酒漬乾椹汁服之治酒病方蔥白䜴各一升右二味以水四升煮取二升頓服治飲酒房勞虛受熱積日不食四月中熱飲酒不已酒入百脉心氣虛令人錯謬失常方芍藥人參白薇栝蔞根枳實知母各二兩甘草一兩生地黃八兩酸棗仁半升茯神三兩外臺作茯苓右十味㕮咀以水一斗煮取三升分三服治連月飲酒咽喉爛舌上生瘡方大麻仁一升黃芩二兩肘後用黃蘗右二味為末蜜和丸含之千金翼用黃蘗二兩治酒醉不醒方飲葛根汁一斗二升取醒止肘後方云治大醉連日煩毒不堪飲酒令人不醉方柏子仁麻子仁各二兩右二味治下篩為一服進酒三倍又方葛花小豆花各等分右二味合為末服三方寸匕飲時仍進葛根汁芹汁及枇杷葉飲並能倍酒又方九月九日菊花為末臨飲服方寸匕又方小豆花葉隂乾百日為末服之又方五月五日取井中倒生草枝隂乾為末酒服之飲酒令無酒氣方乾蔓菁根二七枚三遍蒸為末取兩錢許酒後水服治惡酒健嗔方空井中倒生草燒灰飲之勿令知又方取其人牀上塵和酒飲之斷酒方柳花臘月鼠頭灰右二味等分為末黃昏時酒服一杯又方酒七升著瓶中熟朱砂半兩著酒中急塞瓶口安著猪圈中任猪搖動經七日取酒盡飲又方正月一日酒五升淋碓頭搗一下取飲之又方故氈中枲耳子七枚燒作灰黃昏時暖一杯酒呪言與病狂人飲也勿令知之後不喜飲酒也又方白猪乳汁一升飲之永不飲酒又方刮馬汗和酒與飲終身不飲又方虎屎中骨燒末和酒與飲又方鸕鷀屎燒灰水服方寸匕永斷又方取毛鷹一過吐毛水煮去毛頓服又方故紡車絃燒灰和酒與服又方驢駒衣燒灰酒飲方寸匕又方自死蠐螬乾搗末和酒與飲永世聞酒名即嘔神驗又方酒客吐中肉七枚隂乾燒末服之又方酒漬汗靴替一宿平旦空腹與飲即吐不喜見酒又方白狗乳汁酒服之又方臘月馬腦和酒服之備急千金要方卷七十五
