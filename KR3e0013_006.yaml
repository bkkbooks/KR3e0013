body:
  text: 備急千金要方卷六唐孫思邈撰宋林億等校正婦人方補益第十八論方論曰凡婦人欲求美色肥白罕比年至七十與少不殊者勿服紫石英令人色黑當服鍾乳澤蘭丸也柏子仁圓治婦人五勞七傷羸冷瘦削面無顔色飲食減少貌失光澤及産後斷緒無子能久服令人肥白補益方柏子仁黃耆乾薑紫石英各二兩蜀椒一兩半杜仲當歸甘草芎藭各四十二銖厚朴桂心桔梗赤石脂蓯蓉五味子白术細辛獨活人參石斛白芷芍藥各一兩澤蘭二兩六銖藁本蕪荑各十八銖乾地黃烏頭一方作牛膝防風各三十銖鍾乳白石英各二兩右三十味為末蜜和酒服二十丸如梧子不知加至三十丸千金翼無烏頭有龍骨防葵茯苓秦芁各半兩為三十三味并治産後半身枯悴大五石澤蘭圓治婦人風虛寒中腹內雷鳴緩急風頭痛寒熱月經不調繞臍惻惻痛或心腹痞堅逆飲食手足冷多夢身體痺痛榮衛不和虛弱不能動及産後虛損並冝服方鍾乳禹餘糧紫石英甘草黃耆各二兩半石膏白石英蜀椒乾薑各二兩澤蘭二兩六銖當歸桂心芎藭厚朴柏子仁乾地黃細辛茯苓五味子龍骨各一兩半石斛遠志人參續斷白术防風烏頭各三十銖山茱萸紫菀各一兩白芷藁本蕪荑各十八銖右三十二味為末蜜和丸如梧子大酒服二十丸加至三十丸千金翼有陽起石二兩小五石澤蘭圓治婦人勞冷虛損飲食減少面無光色腹中冷痛經候不調吸吸少氣無力補益溫中方鍾乳紫石英礬石各一兩半白石英赤石脂當歸甘草各四十二銖石膏陽起石乾薑各二兩澤蘭二兩六銖蓯蓉龍骨桂心各二兩半白术芍藥厚朴人參蜀椒山茱萸各三十銖柏子仁藁本各一兩蕪荑十八銖右二十三味為末蜜和丸如梧子大酒服二十丸加至三十丸日三增損澤蘭圓治産後百病理血氣補虛勞方澤蘭甘草當歸芎藭各四十二銖附子乾薑白术白芷桂心細辛各一兩防風人參牛膝各三十銖柏子仁乾地黃石斛各三十六銖厚朴藁本蕪荑各半兩麥門冬二兩右二十味為末蜜和丸如梧子空腹酒下十五丸至二十丸大補益當歸圓治産後虛羸不足胸中少氣腹中拘急疼痛或引腰背痛或所下過多血不止虛竭乏氣晝夜不得眠及崩中面目脫色唇乾口燥亦治男子傷絶或從高墮下內有所傷藏虛吐血及金瘡傷犯皮肉方當歸芎藭續斷乾薑阿膠甘草各四兩白术吳茱萸附子白芷各三兩桂心芍藥乾地黃十兩右十三味為末蜜和丸如梧子大酒服二十丸日三夜一不知加至五十丸若有真蒲黃加一升絶妙白芷圓治産後所下過多及崩中傷損虛竭少氣面目脫色腹中痛方白芷五兩乾地黃四兩續斷乾薑當歸阿膠各三兩附子一兩右七味為末蜜和丸如梧子大酒服二十丸日四五服無當歸芎藭代入蒲黃一兩妙無續斷犬薊根代紫石英柏子仁圓治女子遇冬天時行溫風至春夏病熱頭痛熱毒風虛百脈沉重下赤白不思飲食而頭眩心悸酸􅀈恍惚不能起居方紫石英柏子仁各三兩烏頭桂心當歸山茱萸澤瀉芎藭石斛逺志寄生蓯蓉乾薑甘草各二兩蜀椒杜衡一作杜仲辛夷各一兩細辛一兩半右十八味為末蜜和丸如梧子酒服二十丸漸加至三十丸日三服一方用牡蠣一兩鍾乳澤蘭圓治婦人久虛羸瘦四肢百體煩疼臍下結冷不能食面目瘀黑憂恚不樂百病方鍾乳二兩澤蘭三兩六銖防風四十二銖人參柏子仁麥門冬乾地黃石膏石斛各一兩半芎藭甘草白芷牛膝山茱萸薯蕷當歸藁本各三十銖細辛桂心各一兩蕪荑半兩艾葉十八銖右二十一味為末蜜和丸如梧子酒服二十丸加至四十丸日二服大澤蘭圓治婦人虛損及中風餘病疝瘕隂中冷痛或頭風入腦寒痺筋攣緩急血閉無子面上遊風去來目淚出多涕唾忽忽如醉或胃中冷逆胸中嘔不止及泄痢淋瀝或五臟六腑寒熱不調心下痞急邪氣咳逆或漏下赤白隂中腫痛胸脅支滿或身體皮膚中澀如麻豆苦癢痰癖結氣或四肢拘攣風行周身骨節疼痛目眩無所見或上氣惡寒灑淅如瘧或喉痺鼻齆風癎癲疾或月水不通魂魄不定飲食無味并産後內衄無所不治服之令人有子方澤蘭二兩六銖藁本當歸甘草各一兩十八銖紫石英三兩芎藭乾地黃柏子仁五味子各一兩半桂心石斛白术一兩六銖白芷蓯蓉厚朴防風薯蕷茯苓乾薑禹餘糧細辛卷柏各一兩蜀椒人參杜仲牛膝蛇牀子續斷艾葉蕪荑各十八銖赤石脂石膏各二兩一有枳實十八銖麥門冬一兩半右三十二味為末蜜和為丸如梧子大酒服二十丸至四十丸久赤白痢去乾地黃石膏麥門冬柏子仁加大麥蘖陳麴龍骨阿膠黃連各一兩半有鍾乳加三兩良小澤蘭圓治産後虛羸勞冷身體尫瘦方澤蘭二兩六銖當歸甘草各一兩十八銖芎藭柏子仁防風茯苓各一兩白芷蜀椒藁本細辛白术桂心蕪荑人參食茱萸厚朴各十八銖石膏二兩右十八味為末蜜和丸如梧子大酒服二十丸日三服稍加至四十丸無疾者依此方春秋二時常服一劑甚良有病虛羸黃瘦者服如前一方無茯苓石膏有芍藥乾薑胡洽十五味無柏子仁人參食茱萸除細辛桂心生用外盡熬令變色為末蜜丸如彈子大內暖酒中服之千金翼無茯苓食茱萸冇乾薑一兩紫石英天門冬圓主風冷在子宫有子常墮落或始為婦便患心痛仍成心疾月水都未曽來服之肥充令人有子方紫石英天門冬禹餘糧各三兩蕪荑烏頭蓯蓉桂心甘草五味子柏子仁石斛人參澤瀉一作澤蘭遠志杜仲各二兩蜀椒卷柏寄生石南雲母當歸一作辛夷烏賊骨各一兩右二十二味為末蜜和為丸梧子大酒服二十丸日二服加至四十丸三石澤蘭圓治風虛不足通血脈補寒冷方亦名石斛澤蘭丸鍾乳白石英各四兩紫石英防風藁本茯神各一兩六銖澤蘭二兩六銖黃耆石斛石膏各二兩甘草當歸芎藭各一兩十八銖白术桂心人參乾薑獨活乾地黃各一兩半白芷桔梗細辛柏子仁五味子蜀椒黃芩蓯蓉芍藥秦芁防葵各一兩厚朴蕪荑各十八銖右三十二味為末蜜和丸如梧子大酒服二十丸加至三十丸日二三服大平胃澤蘭圓治男子女人五勞七傷諸不足定志意除煩滿手足虛冷羸瘦及月水往來不調不能動等方澤蘭細辛黃耆鍾乳各三兩柏子仁乾地黃各二兩半大黃前胡遠志紫石英各二兩芎藭白术蜀椒各一兩半白芷丹參梔子一本用枳實芍藥桔梗秦芁沙參桂心厚朴石斛苦參人參麥門冬乾薑各一兩附子六兩吳茱萸麥蘖各五合陳麴一升棗五十枚作膏右三十二味為末蜜和丸如梧子大酒服二十丸加至三十丸令人肥健一本無乾薑冇當歸三兩澤蘭散治産後風虛方澤蘭九分禹餘糧防風各十分石膏白芷乾地黃赤石脂肉蓯蓉鹿茸芎藭各八分藁本蜀椒白术柏子仁各五分桂心甘草當歸乾薑各七分蕪荑細辛厚朴各四分人參三分右二十二味治下篩酒服方寸匕日三月水不通第十九方桃仁湯治婦人月水不通方桃仁朴硝牡丹皮射干土瓜根黃芩各三兩芍藥大黃柴胡各四兩牛膝桂心各二兩水蛭虻蟲各七十枚右十三味㕮咀以水九升煮取二升半去滓分三服乾薑圓治婦人寒熱羸瘦酸消怠惰胸中支滿肩背脊重痛腹裏堅滿積聚或痛不可忍引腰小腹痛四肢煩疼手足厥逆寒至肘膝或煩滿手足虛熱意欲投水中百節盡痛心下常苦懸痛時寒時熱惡心涎唾喜出每愛鹹酸甜苦之物身體或如雞皮月經不通大小便苦難食不生肌方乾薑芎藭茯苓消石杏仁水蛭虻蟲桃仁蠐螬蟅蟲各一兩柴胡芍藥人參大黃蜀椒當歸各二兩右十六味為末蜜和丸如梧子空心飲下三丸不知加至十丸千金翼以療婦人瘕結脅肋下疾乾漆湯治月水不通小腹堅痛不得近方乾漆萎蕤芍藥細辛甘草附子各一兩當歸桂心芒硝黃芩各二兩大黃三兩吳茱萸一升右十二味㕮咀以清酒一斗浸一宿煮取三升去滓內消煬盡分為三服相去如一炊頃芒硝湯治月經不通方芒硝丹砂末當歸芍藥土瓜根水蛭各二兩大黃三兩桃仁一升右八味㕮咀以水九升煮取三升去滓內丹砂芒硝分為三服治月經不通心腹痛絞欲死通血止痛方當歸大黃芍藥各三兩吳茱萸乾地黃乾薑芎藭虻蟲水蛭各二兩細辛甘草桂心各一兩梔子十四枚桃仁一升右十四味㕮咀以水一斗五升煮取五升分為五服一本有牛膝麻子仁各三兩桃仁湯治月經不通方桃仁一升當歸土瓜根大黃水蛭虻蟲芒硝各二兩牛膝麻子仁桂心各三兩右十味㕮咀以水九升煮取三升半去滓內消令煬分為三服肘後無當歸麻子仁用牡丹射干黃芩芍藥柴胡各三兩為十三味千金翼無虻蟲前胡牡丹湯治婦人盛實有熱在腹月經瘀閉不通及勞熱熱病後或因月經來得熱不通方前胡牡丹玄參桃仁黃芩射干旋復花栝蔞根甘草各二兩芍藥茯苓大黃枳實各三兩右十三味㕮咀以水一斗煮取三升分為三服乾地黃當歸圓治月水不通或一月再來或隔月不至或多或少或淋瀝不斷或來而腰腹刺痛不可忍四體噓吸不欲食心腹堅痛有青黃黑色水下或如清水不欲行動舉體沉重惟思眠卧欲食酸物虛乏黃瘦方乾地黃三兩當歸甘草各一兩半牛膝芍藥乾薑澤蘭人參牡丹各一兩六銖丹參蜀椒白芷黃芩桑耳桂心各一兩蟅蟲四十枚芎藭一兩十八銖桃仁二兩水蛭虻蟲各七十枚蒲黃二合右二十一味為末蜜和丸如梧子大每日空心酒下十五丸漸加至三十丸以知為度一本無牡丹圓治婦人女子諸病後月經閉絶不通及從小來不通并新産後瘀血不消服諸湯利血後餘疢未平冝服之取平復方牡丹三兩芍藥玄參桃仁當歸桂心各二兩虻蟲水蛭各五十枚蠐螬二枚瞿麥芎藭海藻各一兩右十二味為末蜜和丸如梧子大酒下十五丸加至二十丸血盛者作散服方寸匕腹中當轉如沸血自化成水去如小便赤少除桂心用地膚子一兩黃芩牡丹湯治女人從小至大月經未嘗來顔色萎黃氣力衰少飲食無味方黃芩牡丹桃仁瞿麥芎藭各二兩芍藥枳實射干海藻大黃各三兩虻蟲七十枚水蛭五十枚蠐螬十枚右十三味㕮咀以水一斗煮取三升分三服服兩劑後灸乳下一寸黑員際各五十壯治月經不通方取葶藶一升為末蜜丸如彈子大綿裹內隂中入三寸每丸一宿易之有汁出止乾漆圓治月經不通百病不瘥方乾漆土瓜根射干芍藥各一兩半牡丹牛膝黃芩桂心吳茱萸大黃柴胡各一兩六銖桃仁鱉甲各二兩蟅蟲蠐螬各四十枚水蛭虻蟲各七十枚大麻仁四合亂髮雞子大二枚菴䕡子二合右二十味為末以蜜和為丸每日酒下十五丸梧子大漸加至三十丸日三仍用後浸酒服前丸藥浸酒方大麻子三升菴䕡子三升桃仁一升竈屋炲煤四兩土瓜根射干各六兩牛膝八兩桂心四兩右八味㕮咀以清酒三斗絹袋盛藥浸五宿以一盞下前丸藥甚良或單服之亦好當歸圓治女人臍下癥結刺痛如蟲所嚙及如錐刀所刺或赤白帶下十二疾腰背疼痛月水或在月前或在月後方當歸葶藶附子吳茱萸大黃各二兩黃芩桂心乾薑牡丹芎藭各一兩半細辛秦椒柴胡厚朴各一兩六銖牡蒙一方無甘草各一兩虻蟲水蛭各五十枚右十八味為末蜜和丸如梧子大空心酒下十五丸日再有胎勿服之鱉甲圓治女人小腹中積聚大如七八寸盤面上下周流痛不可忍手足苦冷咳噫腥臭兩脅熱如火灸玉門冷如風吹經水不通或在月前或在月後服之三十日便瘥有孕此是河內太守魏夫人方鱉甲桂心各一兩半蜂房半兩玄參蜀椒細辛人參苦參丹參沙參吳茱萸各十八銖蟅蟲水蛭乾薑牡丹附子皂莢當歸芍藥甘草防葵各一兩蠐螬二十枚虻蟲大黃各一兩六銖右二十四味為末蜜和丸如梧子大酒下七丸日三稍加之以知為度又方治婦人因産後虛冷堅結積在腹內月經往來不時苦腹脹滿繞臍下痛引腰背手足煩或冷熱心悶不欲食方鱉甲一兩半乾薑赤石脂丹參禹餘糧當歸白芷一方用术乾地黃各一兩六銖代赭甘草鹿茸烏賊骨殭蠶各十八銖桂心細辛蜀椒附子各一兩右十七味蜜和丸如梧子大空心酒下五丸加至十丸禹餘糧圓治婦人産後積冷堅癖方禹餘糧烏賊骨吳茱萸桂心蜀椒各二兩半當歸白术細辛乾地黃人參芍藥芎藭前胡各一兩六銖乾薑三兩礬石六銖白薇紫菀黃芩各十八銖蟅蟲一兩右十九味為末蜜和丸如梧子空心酒若飲下二十丸日二不知則加之牡蒙圓治婦人産後十二癥病帶下無子皆是冷風寒氣或産後未滿百日胞胳惡血未盡便利於懸圊上及久坐濕寒入胞裏結在小腹牢痛為之積聚小如雞子大者如拳按之跳手隱隱然或如蟲嚙或如針刺氣時搶心兩脅支滿不能食飲食不消化上下通流或守胃管痛連玉門背膊嘔逆短氣汗出小腹苦寒胞中創咳引隂痛小便自出子門不正令人無子腰胯疼痛四肢沉重淫躍一身盡腫乍來乍去大便不利小便淋瀝或月經不通或下如腐肉青黃赤白黑等如豆汁夢想不祥方亦名紫蓋丸牡蒙厚朴消石前胡乾薑蟅蟲牡丹蜀椒黃芩桔梗茯苓細辛葶藶人參芎藭吳茱萸桂心各十八銖大黃二兩半附子一兩六銖當歸半兩右二十味為末蜜和更搗萬杵丸如梧子大空心酒服三丸日三不知則加之至五六丸下青白黃赤物如魚子者病根出矣治月經不通結成癥瘕如石腹大骨立宜此破血下癥方大黃消石各六兩巴豆蜀椒各一兩代赭柴胡熬變色水蛭丹參熬令紫色土瓜根各三兩乾漆芎藭乾薑虻蟲茯苓各二兩右十四味為末巴豆别研蜜和丸如梧子空心酒服二丸未知加五丸日再服千金翼無柴胡水蛭丹參土瓜根大虻蟲圓治月經不通五七年或腫滿氣逆腹脹􅛎痛冝服此數有神驗方虻蟲四百枚蠐螬一升乾地黃牡丹乾漆芍藥牛膝土瓜根桂心各四兩吳茱萸桃仁黃芩牡蒙各三兩茯苓海藻各五兩水蛭三百枚芒硝一兩人參一兩半葶藶五合右十九味為末蜜和丸如梧子大每日空心酒下七丸不知加之日三服千金翼無芒硝人參桂心酒治月經不通結成癥􅛎方桂心牡丹芍藥牛膝乾漆土瓜根牡蒙各四兩吳茱萸一升大黃三兩黃芩乾薑各二兩虻蟲二百枚蟅蟲蠐螬水蛭各七十枚亂髮灰細辛各一兩殭蠶五十枚大麻仁竈突墨三升乾地黃六兩虎杖根鱉甲各五兩菴䕡子二升右二十四味㕮咀以酒四斗分兩甕浸之七日併一甕盛攪令調還分作兩甕初服二合日二加至三四合虎杖煎治腹內積聚虛脹雷鳴四肢沉重月經不通亦治丈夫病方取髙地虎杖根細銼二斛以水二石五斗煮取一大斗半去滓澄濾令淨取好醇酒五升和煎令如餳每服一合消息為度不知則加之又方治月經閉不通結瘕腹大如甕短氣欲死方虎杖根百斤去頭去土曝乾切土瓜根牛膝各取汁二斗右三味㕮咀以水一斛浸虎杖根一宿明旦煎取二斗內土瓜牛膝汁攪令調勻煎令如餳每以酒服一合日再夜一宿血當下若病去但服桃仁煎治帶下經閉不通方桃仁虻蟲各一升朴硝五兩大黃六兩右四味為末别治桃仁以醇苦酒四升內銅鐺中炭火煎取二升下大黃桃仁虻蟲等攪勿住手當欲可丸下朴硝更攪勿住手良久出之可丸乃止取一丸如雞子黃投酒中預一宿勿食服之至晡時下如大豆汁或如雞肝凝血蝦蟇子或如膏此是病下也治月經不通臍下堅結大如杯升發熱往來下痢羸瘦此為氣􅛎一作血􅛎若生肉癥不可為也療之之方生地黃三十斤取汁乾漆一斤為末右二味以漆末內地黃汁中微火煎令可丸每服酒下如梧子大三丸不知加之常以食後服治月經不通甚極閉塞方牛膝一斤麻子三升蒸土瓜根三兩桃仁二升右四味㕮咀以好酒一斗五升浸五宿一服五合漸加至一升日三能多益佳治産後風冷留血不去停結月水閉塞方桃仁麻子仁各二升菴䕡子一升右三味㕮咀以好酒三斗浸五宿每服五合日三稍加至一升五京圓治婦人腹中積聚九痛七害及腰中冷引小腹害食得冷便下方乾薑蜀椒各三兩附子一兩吳茱萸一升當歸狼毒黃芩牡蠣各二兩右八味為末蜜和丸如梧子初服三丸日二加至十丸此出京氏五君故名五京久患冷困當服之雞鳴紫圓治婦人癥􅛎積聚方皂莢一分藜蘆甘草礬石烏喙杏仁乾薑桂心巴豆各二分前胡人參各四分代赭五分阿膠六分大黃八分右十四味為末蜜丸如梧子雞鳴時服一丸日益一丸至五丸止仍從一起下白者風也赤者癥􅛎也青微黃者心腹病遼東都尉所上圓治臍下堅癖無所不治方恆山大黃巴豆各一分天雄二枚苦參白薇乾薑人參細辛狼牙龍膽沙參玄參丹參各三分芍藥附子牛膝茯苓各五分牡蒙四分雚蘆六分一方云二兩三分右二十味為末蜜丸宿勿食服五丸日三大羸瘦月水不調當二十五日服之下長蟲或下種種病出二十五日服中所苦悉愈肌膚盛五十日萬病除斷緒有子牡蠣圓治經閉不通不欲飲食方牡蠣四兩大黃一斤柴胡五兩乾薑三兩芎藭茯苓各二兩半蜀椒十兩葶藶子芒硝杏仁各五合水蛭虻蟲各半兩桃仁七十枚右十三味為末蜜丸如梧子大飲服七丸日三當歸圓治腰腹痛月水不通利方當歸芎藭各四兩虻蟲烏頭丹參乾漆各兩人參牡蠣土瓜根水蛭各二兩桃仁五十枚右十一味為末以白蜜丸如梧子大酒下三丸日三服消石湯治血􅛎月水留瘀血大不通下病散堅血方消石附子虻蟲各三兩大黃細辛乾薑黃芩各一兩芍藥土瓜根丹參代赭蠐螬各二兩大棗十枚桃仁二升牛膝一斤朴硝四兩右十六味㕮咀以酒五升水九升漬藥一宿明旦煎取四升去滓下朴硝消石煬盡分四服相去如炊頃去病後食黃鴨羮勿見風備急千金要方卷六
