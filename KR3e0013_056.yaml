body:
  text: 備急千金要方卷五十六唐孫思邈撰宋林億等校正肺臓方肺痿第六論方論曰寸口脉數其人病欬口中反有濁唾涎沫出何也師曰此為肺痿之病何從得之師曰病熱在上焦因欬為肺痿或從汗岀或從嘔吐或從痟渴小便利數或從便難數被駃藥下重亡津液故得肺痿又寸口脉不出而反發太陽脉早索隂脉不澀三焦踟蹰入而不出隂脉不澀身體反冷其内反煩多唾脣燥小便反難此為肺痿傷於津液便如爛爪下如豚腦但坐發汗故也其病欲欬不得欬欬出乾沫久久小便不利其脉平弱肺痿吐涎沫而不欬者其人不渴必遺溺小便數所以然者上虚不能制下故也此為肺中冷必眩師曰肺痿欲唾咽燥欲飲者自愈自張口者短氣也甘草乾薑湯温臓治肺痿多涎唾小便數肺中冷必眩不渴不欬若渴者屬痟渴法上虚下不能制溲服此湯巳小温覆之方甘草四兩乾薑二兩集驗肘後有大棗十二枚右二味㕮咀以水三升煮取一升半去滓分二服甘草湯治肺痿涎唾多出血心中温温液液方千金翼名温液湯甘草二兩㕮咀以水三升煮取一升半去滓分三服生薑甘草湯治肺痿欬唾涎沫不止咽燥而渴方生薑五兩甘草四兩人參三兩大棗十二枚右四味㕮咀以水七升煮取三升去滓分三服桂枝皂莢湯治肺痿吐涎沫不止方去芍藥加皂莢桂枝生薑各三兩甘草二兩皂莢一兩大棗十五枚右五味㕮咀以水七升煮取三升去滓分三服麻黄湯治肺脹欬而上氣咽燥而喘脉浮者心下有水方麻黄芍藥生薑仲景用乾薑細辛桂心各三兩半夏五味子各半升石膏四兩右八味㕮咀以水一斗煮取三升分三服仲景名此為小青龍加石膏湯用甘草三兩為九味肺癰第七論方論曰病欬唾膿血其脉數實者屬肺癰虚者屬肺痿欬而口中自有津液舌上胎滑此為浮寒非肺痿若口中辟辟燥欬即胸中隐隐痛脉反滑數此為肺癰也問曰病者欬逆師脉之何以知為肺癰當有膿血吐之則死後竟吐膿死其脉何類何以别之師曰寸口脉微而數微則為風數則為熱微則汗出數則惡寒風中於衛呼氣不入熱過於榮吸而不出風傷皮毛熱傷血脉風舍於肺其人則欬口乾喘滿咽燥不渴多唾濁沫時時振寒熱之所過血為凝滯蓄結癰膿吐如米粥始萌可救膿已成則難治寸口脉數趺陽脉緊寒熱相摶故振寒而欬趺陽脉浮緩胃氣如經此為肺癰師曰振寒發熱寸口脉滑而數其人飲食起居如故此為癰腫病醫反不知而以傷寒治之不應愈也何以知有膿膿之所在何以别知其處師曰假令膿在胸中者為肺癰其脉數欬唾有膿血設膿未成其脉自緊數緊去但數膿為已成也桔梗湯治欬胸中滿而振寒脉數咽乾而不渴時時出濁唾腥臭久久吐膿如粳米粥是為肺癰者方桔梗三兩集驗用二兩古今録驗用一兩甘草二兩右二味㕮咀以水三升煮取一升去滓分二服必吐膿血也一方有欵冬花一兩半㵼肺湯治肺癰喘不得臥方葶藶三兩為末大棗二十枚右二味先以水三升煮棗取二升去棗内藥一棗大煎取七合頓服令盡三日服一劑可至三四劑治肺癰胸脇脹一身面目浮腫鼻塞清涕出不聞香臭欬逆上氣喘鳴迫塞未進此方宜先服小青龍湯却服前藥其青龍湯方在十八卷黄昏湯治欬有微熱煩滿胸心甲錯是為肺癰者方黄昏手掌大一片是合昏皮也㕮咀以水三升煮取一升分二服又方薏苡仁𤓰瓣半升桃仁五十枚葦莖切二升水二斗煮取五升去滓右四味㕮咀内葦汁中煮取二升服一升當有所見吐膿血飛尸鬼疰第八論法方灸論曰凡諸心腹痛服衆方熱藥入腹寂然不動但益氣息急者此尸疰病也宜先服甘草汁一升消息少時服瞿麥湯盡一劑得下便覺稍寛并暴癥堅結宿食及女人血堅痛發作無定者神良五疰湯治卒中賊風遁尸鬼邪心腹刺痛大脹急方大黄甘草各三兩當歸芍藥各二兩烏頭十枚生薑蜜各一斤桂心四兩右八味㕮咀别漬大黄以水九升煮取三升烏頭别内蜜中煎令得一升拌湯中去滓分服三合如人行三十里久更進一服日三不止加至四合蜈蚣湯治惡疰邪氣徃來心痛徹背或走入皮膚移動不定苦熱四肢煩疼羸乏短氣方蜈蚣一枚牛黄一分大黄二兩丹砂人參各三分細辛鬼臼當歸桂心乾薑各一兩黄芩麝香各半兩附子四枚右十三味㕮咀以水一斗煮取三升去滓下牛黄麝香分三服治卒中惡賊風寒冷入腹便絞痛或飛尸遁尸發作無時搶心胸滿脇痛如刀刺口噤者方甘草乾薑茯苓乾地黄羊脂當歸細辛各一兩芍藥吳茱茰桂心各二兩梔子仁十五枚右十一味㕮咀以水八升煮取三升去滓内脂烊盡分三服欲利者加大黄三兩治卒中惡風角弓反張或飛尸遁尸心腹絞痛者方乾地黄茯苓芎藭當歸甘草各一兩吳茱茰桂心乾薑芍藥各二兩梔子仁十四枚右十味㕮咀以水八升煮取三升分三服痛甚者加羊脂三兩當歸人參芍藥各一兩心腹堅急加大黄三兩桃皮湯治中惡氣心腹痛胸脇脹滿短氣方桃白皮一握東引者真珠附子各一兩梔子仁十四枚當歸三兩吳茱茰豉各五合桂心二兩右八味㕮咀以水五升煮取二升去滓内真珠末分作二服一方無當歸以下四味桃奴湯治中惡諸尸蠱疰心腹卒絞痛方桃奴當歸人參乾薑各二兩芎藭甘草各三兩丹砂麝香茯苓犀角鬼箭羽桂心各一兩右十二味㕮咀以水九升煮取二升半去滓分二服未食服大便不通腹滿者加大黄三兩芒硝二兩胡洽有䧺黄一兩無丹砂芎藭治卒中風寒冷温氣入腹虚脹急滿搶心胸脇义痛氣息不通脉弦緊汗不出及得傷寒方吳茱茰當歸麻黄獨活甘草桔梗茯苓各二兩桂心青木香石膏大黄犀角各三兩右十二味㕮咀以水九升煮取三升分三服日三治風冷氣入腹忽絞痛緊急如吹大小便閉小腹有氣結如斗大脹滿起其脉弦老者沉遲方瞿麥當歸猪苓鬼箭羽桔梗防己海藻吳茱茰芎藭各二兩桂心大黄各三兩一用犀角二兩右十一味㕮咀以水九升煮取三升分三服治諸雜疰相連續死亦治三十年衆疰方桃根白皮一斤㕮咀以水二斗煮取一斗去滓分八九服須令二日服盡崔氏用桃根白皮治疰在心腹痛不可忍者又方𢷬桃仁二七枚研酒服又方小芥子末雞子白和傅尸疰鬼疰者即五尸之中尸疰又挾諸鬼邪為害者也其變動乃有三十六種至九十九種大畧令人寒熱淋瀝沉沉黙黙不的知其所苦而無處不惡累年積月漸就頓滯以至於死死後復疰易傍人乃至滅門覺如此候者宜急療之之方獺肝一具隂乾治下篩水服一方寸匕日三如一具不瘥更作小附著散治飛尸賊風發時急痛不在一處針則移發一日半日乃瘥須臾復發者方細辛甘草一作莾草天雄各一分桂心三分附子烏頭乾薑各一兩雄黄真珠各半兩右九味治下篩酒服方寸匕不知稍增以知為度胡洽有蜀椒四分不用桂心附子大附著散治五尸疰忤與前状同者方黄芩由䟦椒目細辛雄黄乾薑黄連各一兩金牙犀角麝香牛黄各一分天雄桂心各半兩真珠三分蜈蚣一枚右十五味治下篩酒服一錢七日三以知為度大金牙散治一切疰病方見别卷中金牙散治鬼疰風邪鬼語尸疰或在腰脊胸脇流無常處不喜見人志意不定面脱色目赤鼻張唇乾甲黄者方金牙雄黄鐵精野葛露蜂房芎藭大黄甘草曾青蛇蜕皮真珠丹砂䕡茹乾漆各一分石長生狸骨一作鸛骨桔梗鬼臼鬼箭羽鬼督郵椒目烏頭狼毒蕪荑藜蘆雷丸鼈甲滑石各二分作消石毒公胡燕屎牛黄各三分人參狼牙寒水石桂心各四分石膏五分蜈蚣蜥蝪附子各一枚蜣蜋亭長各七枚元青徐長卿斑猫各十四枚貝母二枚右四十五味治下篩先食以酒服一刀圭日再不知漸加之蟲隨大小便出崔氏名蜀金牙散白术散治風入臓腑悶絶常自躁痛或風疰入身冷疰鬼疰飛尸惡氣腫起或左或右或前或後或内或外針灸流移無有常處驚悸腹脹氣滿心頭痛或恍惚悲懼不能飲食或進或退隂下濕癢或大便有血小便赤黄房中勞極方白术十四枚附子秦芁人參牡蠣蜀椒細辛黄芩芎藭牛膝各三分乾薑桂心防風各五分茯苓桔梗當歸獨活柴胡各四分烏頭甘草麻黄石南莾草栝蔞根天雄杜仲各二分右二十六味治下篩平旦酒服五分匕訖如人行七里久勢欲解更飲酒五合為佳太乙備急散治卒中惡客忤五尸入腹鬼刺鬼痱及中蠱疰吐血下血及心腹卒痛腹滿傷寒熱毒病六七日方雄黄桂心芫花各二兩丹砂蜀椒各一兩藜蘆巴豆各一分野葛三分附子五分右九味巴豆别治如脂餘合治下篩以巴豆合和更𢷬合和調置銅器中宻貯之勿泄有急疾水服錢五匕可加至半錢匕老小半之病在頭當鼻衂在膈上吐在膈下利在四肢當汗出此之所為如湯沃雪手下皆愈方宜祕之非賢不傳龍牙散治百疰邪鬼飛尸萬病方龍牙茯苓各二兩半雄黄棗膏芍藥各五分乾地黄石斛胡燕屎各三分鬼箭羽烏頭羗活露蜂房曽青真珠桂心杏仁防風桃奴鬼臼鸛骨各一兩人參大黄各一兩半白术二兩蘓子四合銅鏡鼻甘草橘皮芎藭鬼督郵逺志鼈甲各半兩狸隂二具蜈蚣一枚右三十三味治下篩酒服一刀圭以知為度當有蟲從大便出治鬼疰蠱疰毒氣變化無常者方犀角麝香丹砂雄黄蜈蚣鮫魚皮丁香鹿角龍骨蘘荷根蜀椒乾薑各一分貝子一枚右十三味治下篩酒服方寸匕加至二匕日三備急散治卒中惡風氣忤迷絶不知人方見别卷三味備急丸是治暴心痛面無顔色欲死者方以布褁鹽如彈丸大燒令赤置酒中消服之利即愈治蠱疰方燒猫兒屎灰水服之用雄猫兒黒奴散治卒得惡疰腹脹方釡下墨一合鹽二合右二味合治以水一升半煮取八合一服令盡須臾吐下即瘥治哭疰方梳齒間刮取垢水服之又方亂髪一兩臘月豬脂一合右二味取豬脂煎髪令消烊服之蟲死矣又方熬大豆帛裹熨之治一切病食疰方凡食上得病名為食疰取釡下土雞子大為末酢泔清一升和服之行五十歩吐即瘥又方還取本食種數多少相似各少許和合布裹燒灰如杏仁大水服之鸛骨圓治遁尸飛尸積聚胷痛連背走無常處或在臓或腫在腹或奄奄然而痛者方鸛骨三寸丹砂一作丹參牡蠣一作牡丹雄黄莾草各四分藜蘆桂心野葛各二分斑猫芫青各十四枚巴豆四十枚蜈蚣一枚右十二味為末蜜丸如小豆毎服二丸日三以知為度蜥蝪圓治癥堅水腫飛尸遁尸寒尸喪尸尸疰骨血相注惡氣鬼忤蛄毒邪氣徃來夢寤存亡流飲結積虎狼所齧痸犬所咋鴆毒入人五臓服藥以殺其毒毒即消婦人邪氣鬼忤亦能遣之之方方與積聚篇重蜥蝪蜈蚣各二枚蝱蟲杏仁各三十枚地膽五十枚䗪蟲四十枚朴硝巴豆各七分澤漆鬼督郵桑赤雞桃奴犀角各二分乾薑四分虎骨六分甘草一兩芍藥甘遂各五分欵冬花三分蜣蜋十四枚右二十味别治巴豆杏仁如膏内諸藥末研調下蜜𢷬二萬杵丸如麻子大食前服三丸日一不下加之不取吐下者一丸旦服有人風冷疰癖堅二十年得愈桔梗圓治毒疰鬼疰食疰冷疰痰飲宿食不消酒癖諸病桔梗藜蘆皂莢巴豆附子各二兩右五味為末蜜和𢷬萬杵丸如梧子宿不食平旦飲服二丸仰臥服勿眠至食時膈上吐膈下下去惡物如科斗蝦蟇子或長一二尺下後當大虚口乾可作雞羮飲五合太極飲食粥一升三四日病未盡更服忌如藥法十疰圓治十種疰氣疰勞疰鬼疰冷疰生人疰死人疰尸疰食疰水疰土疰等方雄黄巴豆各二兩人參甘草麥門冬細辛一作藁木桔梗附子皂莢蜀椒各一兩右十味末蜜丸如梧子大空腹服五丸日再稍加以知為度太乙神明陷氷圓治諸病破積聚心下支滿寒熱鬼疰長病欬逆唾噫辟除衆惡鬼逐邪氣鬼擊客忤中惡胸中結氣咽中閉塞有進有退繞臍絞痛惻惻隨上下按之挑手心中愠愠如有蟲状毒疰相染甚至滅門者方雄黄桂心丹砂礬石一作礜石藜蘆大黄各二兩元青五枚真珠附子各一兩半麝香人參犀角鬼􅍫射罔牛黄各一兩蜈蚣蜥蝪各一枚烏頭八枚杏仁三十枚斑猫樗雞地膽各七枚當歸三兩巴豆一分右二十四味為末蜜和𢷬三萬杵丸如小豆先食服二丸日再不止稍増以藥二丸著門上令衆邪不近傷寒服之無不愈若至病家及視病人夜行獨宿服二丸衆邪不能近也胡洽無元青桂心真珠麝香人參犀角烏頭射㒺蜥蝪樗雞牛黄當歸只十二味與積聚篇重江南度世圓治萬病癥結積聚伏尸長病寒熱疰氣流行皮中乆病著牀肌肉消盡四肢煩熱嘔逆不食傷寒時氣惡疰汗出口噤不開心痛方蜀椒三兩人參細辛甘草各二兩茯苓真珠大黄乾薑丹砂野葛桂心雄黄麝香鬼􅍫各一兩烏頭牛黄各二分附子紫菀各六分巴豆六十枚蜈蚣二枚右二十味為末蜜丸如小豆飲服二丸加至四丸日二加獺肝一具尤良大度世圓治萬病與前状同者方牛黄大黄雄黄細辛附子真珠甘草人參射罔丹砂鬼臼莾草各一兩蜀椒麝香鬼箭羽茯苓桂心紫菀各二兩乾薑三兩野葛一尺蜥蝪蜈蚣各一枚地膽五十枚元青二十枚樗雞三十枚巴豆仁八十枚右二十六味為末蜜丸如小豆飲服二丸日二先食服之治疰病相染易及霍亂中惡小兒客忤長病方獺肝一具蜈蚣一枚麝香一分雄黄莾草丹砂鬼􅍫犀角巴豆大黄牛黄各一兩右十一味末蜜丸如麻子空腹服二丸至三丸以止為度雷氏千金圓治行諸氣宿食不消飲食中惡心腹痛如刺及瘧方消石三分大黄五分桂心乾薑各二兩巴豆仁六十枚右五味為末𢷬三千杵蜜丸如大豆服二丸神驗無比已死者拆齒灌之治卒得尸疰毒痛徃來方杏仁亂髪灰各等分右二味研如脂丸如梧子每服酒下三丸日三姚氏猪膏和丸治遁尸尸疰心腹刺痛不可忍者方桂心乾薑各一兩巴豆仁二兩右三味治下篩以上酢和如泥傅病上乾即易之治遁尸尸疰心腹及身有痛處不得近者方取艾小挼令碎著痛上厚一寸餘熱湯和灰令强熱置艾上冷即易不過二三度瘥治遁尸飛尸又治暴風毒腫流入四肢頭面方白芥子一升蒸熟𢷬以黄丹二兩攪和分作兩分用疎布袋盛更蒸使熱以薄痛上當更迭蒸袋常使熱薄之如此三五度即定治人皮膚中痛名曰癥疰方醋和燕窠土傅之治走疰方燒車釭令熱暫入水以濕布裹熨病上治三十年氣疰方豉心半升生椒一合右二味以水二升煮取半升適寒温用竹筒縮取汁令病者側臥手擘大孔射灌之少時當出惡物此法垂死悉治得瘥百千不可具説灸法凡五尸者飛尸遁尸風尸沉尸尸疰也今皆取一方兼治之其状腹痛脹急不得氣息上衝心胸傍攻兩脇或纍塊踊起或攣引腰背治之之法灸乳後三寸男左女右可二七壮不止者多其壮數取愈止又灸兩手大拇指頭各七壮又灸心下三寸十壮又灸乳下一寸隨病左右多其壮數又以細䋲量患人兩乳頭内即裁斷中屈之又從乳頭向外量使當肋鏬於䋲頭灸三壮或七壮男左女右卒疰忤攻心胷灸第七椎隨年壮又灸心下一寸三壮又灸手肘文隨年壮一切病食疰灸手小指頭隨年壮男左女右五毒疰不能飲食百病灸心下三寸胃管十壮水疰口中涌水經云肺來乗腎食後吐水灸肺輸又灸三隂交又灸期門穴在乳下二肋間㵼肺補腎也各隨年壮一切疰無新乆先仰臥灸兩乳邊邪下三寸第三肋間隨年壮可至三百壮又治諸氣神良一名疰市備急千金要方卷五十六
