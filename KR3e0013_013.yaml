  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0013_WYG_013-1a, image: WYG0735/WYG0735-0167a.png}
body:
  text: 備急千金要方卷十三唐孫思邈撰宋林億等校正少小嬰孺方癰疽瘰癧第八論法方灸漏蘆湯治小兒熱毒癰疽赤白諸丹毒瘡癤方漏蘆連翹肘後用白薇白歛芒硝肘後用芍藥甘草各六銖大黄一兩升麻枳實麻黄黄芩各九銖右十味㕮咀以水一升半煎取五合兒生一日至七日取一合分三服八日至十五日取一合半分三服十六日至二十日取二合分三服二十日至三十日取三合分三服三十日至四十日取五合分三服肘後治大人各用二兩大黄三兩以水一斗煮取三升分三服其丹毒須針鑱去血經心録無連翹有知母芍藥犀角各等分五香連翹湯治小兒風熱毒腫腫色白或有惡核瘰癧附骨癰疽節解不舉白丹走竟身中白軫瘙不已方青木香薰陸香雞舌香沉香麻黄黄芩各六銖大黄二兩麝香三銖連翹海藻射干升麻枳實各半兩竹瀝三合右十四味㕮咀以水四升煮藥減半内竹瀝煮取一升二合兒生百日至二百日一服三合二百日至朞歲一服五合一方不用麻黄連翹圓治小兒無故寒熱强徤如故而身體頸項結核瘰癧及心腹脇背裏有堅核不痛名為結風氣腫方連翹桑白皮白頭翁牡丹防風黄蘗桂心香豉獨活秦芁各一兩海藻半兩右十一味為末蜜丸如小豆三歲兒飲服五丸加至十丸五歲已上者以意加之治丹毒大赤腫身壯熱百病不折方寒水石十六銖石膏十三銖藍青十二銖用乾者犀角柴胡杏仁各八銖知母十銖甘草五銖羚羊角六銖芍藥黄芩各七銖梔子十一銖竹瀝一升生葛汁四合澄清蜜二兩右十五味㕮咀以水五升并竹瀝煮取三升三合去滓内杏仁脂葛汁蜜微火煎取二升一二歲兒服二合大者量加之麻黄湯治小兒丹腫及風毒風疹方麻黄一兩半獨活射干甘草桂心青木香石膏黄芩各一兩右八味㕮咀以水四升煮取一升三歲兒分為四服日再又方治小兒惡毒丹及風疹方麻黄升麻葛根各一兩射干雞舌香甘草各半兩石膏半合右七味㕮咀以水三升煮取一升三歲兒分三服日三搨湯治小兒數十種丹方大黄甘草當歸芎藭白芷獨活黄芩芍藥升麻沉香青木香木蘭皮各一兩芒硝三兩右十三味㕮咀以水一斗二升煮取四升去滓内芒硝以綿揾湯中適寒温搨之乾則易之取瘥止治小兒溺竈丹初從兩股及臍間起走入隂頭皆赤方桑根皮切一斗以水二斗煮取一斗以洗浴之治小兒丹毒方𢷬慎火草絞取汁塗之良其丹毒方具在别卷治小兒赤遊腫若徧身入心腹即能殺人方𢷬伏龍肝為末以雞子白和傅乾易之又方白豆末水和傅之勿令乾治小兒半身皆紅赤漸漸長引者方牛膝甘草右二味㕮咀合得五升以水八升煮三沸去滓和㐲龍肝末傅之治小兒身赤腫起者方熬米粉令黒以唾和傅之又方伏龍肝亂髮灰右二味為末以膏和傅之治小兒卒腹皮青黒方以酒和胡粉傅上若不急治須臾便死又灸臍上下左右去臍半寸并鳩尾骨下一寸凡五處各三壯五香枳實湯治小兒著風熱㾦㿔堅如麻豆粒瘡癢搔之皮剝汁出或徧身頭面年年常發者方青木香九銖麝香六銖雞舌香薫陸香沉香防風秦芃漏蘆各半兩升麻黄芩白歛麻黄各一兩枳實一兩半大黄一兩十八銖右十四味㕮咀以水五升煮取一升八合兒五六歲者一服四五合七八歲者一服六合十歲至十四五者加大黄半兩足水為一斗煮取二升半分三服治小兒火灼瘡一身盡有如麻豆或有膿汁乍痛乍癢方甘草芍藥白斂黄芩黄連黄蘗苦參各半兩右七味為末以蜜和傅之日二夜一亦可作湯洗之治小兒瘡初起熛漿似火瘡名曰熛瘡亦名爛瘡方桃仁熟𢷬以面脂和傅之亦治徧身赤腫起又方馬骨燒灰傅之水銀膏治小兒熱瘡方水銀胡粉松脂各三兩右三味以豬脂四升煎松脂水氣盡下二物攪令匀不見水銀以傅之治小兒上下徧身生瘡方芍藥黄連黄芩各三兩苦參八兩大黄二兩蛇床子一升黄蘗五兩㧞葜一斤右八味㕮咀以水二斗煮取一斗以浸浴兒苦參湯浴小兒身上下百瘡不瘥方苦參八兩地榆黄連王不留行獨活艾葉各五兩竹葉二升右七味㕮咀以水三斗煮取一斗以浴兒瘡上浴訖傅黄連散治三日小兒頭面瘡起身體大熱方升麻柴胡石膏各六銖甘草當歸各十二銖大黄黄芩各十八銖右七味㕮咀以水四升煮取二升分服日三夜一量兒大小用之治小兒身體頭面悉生瘡方榆白皮隨多少曝令燥下篩醋和塗綿以傅瘡上蟲自出亦可以猪脂和塗之枳實圓治小兒病風瘙癢痛如疥搔之汁出徧身㾦㿔如麻豆粒年年喜發面目虚肥手足乾枯毛髮細黄及肌膚不光澤鼻氣不利此則少時熱盛極體當風風相薄所得也不早治之成大風疾方枳實一兩菊花蛇床子防風蒺藜子白薇浮萍各一兩天雄麻黄漏蘆各半兩右十味為末蜜和如大豆許五歲兒飲服十丸加至二十丸日二五歲已上者隨意加之兒大者可為散服治小兒風瘙疹方蒴藋防風羊桃石南秦椒升麻苦參茵芋芫花一云茺蔚蒺藜蛇床子枳實礬石各一兩右十三味㕮咀以漿水三斗煮取一斗去滓内礬令小沸浴之又方牛膝末酒服方寸匕漏瘡多年不瘥𢷬末傅之亦主骨疽癲疾瘰癧絶妙澤蘭湯主丹及疹入腹殺人方澤蘭芎藭附子茵芋藁本莽草細辛各十二銖右七味㕮咀以水三升煮取一升半分四服先與此湯然後作餘治治小兒手足及身腫方巴豆五十枚去心皮以水三升煮取一升以綿内湯中拭病上隨手消并治疹又方以小便温暖漬之良論曰小兒頭生小瘡浸淫疽癢黄膏出不生痂連年不瘥者亦名妬頭瘡以赤龍皮湯及天麻湯洗之内服漏蘆湯不宜傅飛烏膏散及黄連胡粉水銀膏散方具在别卷藜蘆膏治小兒一切頭瘡久即疽癢不生痂方藜蘆黄連雄黄黄芩松脂各二兩猪脂半斤礬石五兩右七味為末煎令調和先以赤龍皮天麻湯洗訖傅之赤龍皮槲木皮是也治小兒頭瘡經年不瘥方松脂苦參黄連各一兩半大黄胡粉各一兩黄芩水銀各一兩六銖礬石半兩蛇床子十八銖右九味為末以臘月猪脂和研水銀不見傅之又方取屋塵末和油瓶下滓以皂莢湯洗傅之又方取大蟲脂傅之亦治白秃又方髮中生瘡頂白者皆以熊白傅之治小兒頭瘡方胡粉一兩黄連二兩右二味為末洗瘡去痂拭乾傅之即瘥更發如前傅之又方胡粉連翹各一兩水銀半兩右三味以水煎連翹内胡粉水銀和調傅之又方白松脂胡粉各二兩水銀一兩猪脂四兩右四味合煎去滓内水銀粉調傅之大人患同苦參湯治小兒頭瘡方苦參黄芩黄連黄蘗甘草大黄芎藭各一兩蒺藜子三合右八味㕮咀以水六升煮取三升漬布搨瘡上日數過治小兒頭上惡毒腫痤癤諸瘡方男子屎尖燒灰和臘月猪脂先以酢泔清淨洗拭乾傅之治小兒秃頭瘡方取雄雞屎陳醬汁苦酒和以洗瘡了傅之又方芫花臘月猪脂和如泥洗去痂傅之日一度千金翼治白秃治小兒頭秃瘡方葶藶子細末先洗傅之又方不中水蕪菁葉燒作灰和猪脂傅之治小兒頭秃瘡無髮苦癢方野葛末猪脂羊脂各一兩右三味合煎令消待冷以傅之不過三上治少小頭不生髮一物楸葉方楸葉𢷬取汁傅頭上立生治小兒頭不生髮方燒鯽魚灰末以醬汁和傅之治小兒瘻瘡方冡中石灰傅之厚著之良又方燒桑根灰傅之并燒烏羊角作灰相和傅之治小兒疽瘻方丹砂大黄各三十銖雄黄䕡茹漆頭者雌黄各二十四銖礬石馬齒者莽草各十八銖黄連三十六銖右八味㕮咀以猪脂一升三合微火煎三上三下膏成去滓下諸色末攪凝傅之治小兒惡瘡方熬䜴令黄為末傅瘡上不過三傅愈治小兒疽極月初即生常有黄水出方酢和油煎令如粥及熱傅之二日一易欲重傅則以皂莢湯洗瘡乃傅之治小兒月蝕瘡隨月生死方以胡粉和酥傅之五日瘥治月蝕九竅皆有瘡者方燒蚯蚓屎末和猪膏傅之又方水和粉傅之治小兒浸淫瘡方竈中黄土髮灰右二味各等分為末以猪脂和傅之治小兒黄爛瘡方四交道中土竈下土右二味各等分為末以傅亦治夜啼又方燒艾灰傅之又方燒牛屎傅之亦可滅瘢治小兒疥方燒竹葉為灰雞子白和傅之日三亦治疥瘡又方燒亂髮灰和臘月猪脂傅之又方以臭酥和胡粉傅之治小兒頭面瘡疥方麻子五升為末以水和絞取汁與蜜和傅之若有白犬膽傅之大佳治小兒濕癬方枸杞根𢷬作末和臘月猪膏傅之又方桃青皮𢷬末和醋傅之日二又方煎馬尿以洗又方揩破以牛鼻上津傅之又方燒狗屎灰和猪脂塗之治小兒身上生赤疵方取馬尿洗日四五度治小兒身上有赤黒疵方針父脚中取血貼疵上即消又方取狗熱屎傅之皮自卷落治小兒疣目方以針及小刀子決目四面令血出取患瘡人瘡中汁黄膿傅之莫近水三日即膿潰根動自脫落備急千金要方卷十三
