body:
  text: 備急千金要方卷六十五唐孫思邈撰宋林億等校正丁腫方丁腫第一論方證法灸論曰夫稟形之類須存攝養將息失度百病萌生故四時代謝隂陽遞興此二氣更相擊怒當是時也必有暴氣夫暴氣者每月之中必有卒然大風大霧大寒大熱若不時避人忽遇之此皆入人四體頓折皮膚流注經脉遂使腠理壅隔榮衛結滯隂陽之氣不得宣泄變成癰疽丁毒惡瘡諸腫至於丁腫若不預識令人死不逮辰若著訖乃欲求方其人已入木矣所以養生之士須早識此方凡是瘡痍無所逃矣凡療丁腫皆刺中心至痛又刺四邉十餘下令血出去血𫝊藥藥氣得入針孔中佳若不達瘡內療不得方又其腫好著口中頰邉舌上見赤黑如珠子磣痛應心是也是秋冬寒毒久結皮中變作此疾不即療之日夜根長流入諸脉數道如箭入身捉人不得動搖若不慎口味房室死不旋踵經五六日不瘥眼中見火光神惛口乾心煩即死也一曰麻子丁其狀肉上起頭大如黍米色稍黑四邉微赤多癢忌食麻子及衣布并入麻田中行二曰石丁其狀皮肉相連色烏黑如黑豆甚硬刺之不入肉內隱隱微疼忌瓦礫磚石之屬三曰雄丁其狀皰頭黑黶四畔仰瘡皰漿起有水出色黃大如錢孔形高忌房事四曰雌丁其狀瘡頭稍黃向裏黶亦似灸瘡四畔皰漿起心凹色赤大如錢孔忌房事五曰火丁其狀如湯火燒灼瘡頭黑黶四邉有皰漿起如赤粟米忌火炙爍六曰爛丁其狀色稍黑有白瘢瘡中潰潰則有膿水流出瘡形大小如匙面忌沸熱食爛帛物七曰三十六丁其狀頭黑浮起形如黑豆四畔起大赤色今日生一明日二後日三乃至十若滿三十六藥所不能治如未滿三十六者可治俗名黑皰忌嗔怒畜積愁恨八曰蛇眼丁其狀瘡頭黑皮上浮生形如小豆狀似蛇眼大體硬忌惡眼看并嫉妬人見之及毒藥九曰鹽膚丁其狀大如匙面四畔皆赤有黑粟粒起忌食鹹物十曰水洗丁其狀大如錢形或如錢孔大瘡頭白裏黑黶汁出中硬忌飲漿水水洗渡河十一曰刀鎌丁其狀瘡闊狹如薤葉大長一寸左側肉黑如燒爍忌刺及刀鎌切割鐵創所傷可以藥治十二曰浮漚丁其狀瘡體曲圓少許不合長而狹如薤葉大內黃外黑黑處刺不痛內黃處刺之則痛十三曰牛拘丁其狀肉皰起搯不破右十三種瘡初起必先癢後痛先寒後熱熱定則寒多四肢沉重頭痛心驚眼花若大重者則嘔逆嘔逆者難治其麻子丁一種始末惟癢所録忌者不得犯觸犯觸者即難療其浮漚丁牛拘丁兩種無所禁忌縱不療亦不能殺人其狀寒熱與諸丁同皆以此方療之萬不失一欲知犯觸之狀但脊强瘡痛極甚不可忍者是也治十三種丁方右用枸杞其藥有四名春名天精夏名枸杞秋名却老冬名地骨春三月上建日採葉夏三月上建日採枝秋三月上建日採子冬三月上建日採根凡四時初逢建日取枝葉子根等四味並曝乾若得五月五日午時合和大良如不得依法採者但得一種亦得用緋繒一片以裹藥取匝為限亂髮雞子大牛黃梧子大反鈎棘針二十七枚末赤小豆七粒末先於緋上薄布亂髮以牛黃末等布上曝即捲緋繒作團以髮作繩十字縳之尉斗中急火熬令沸沸定後自乾即刮取搗作末絹篩以一方寸匕取枸杞四味合搗絹篩取二匕和合前一匕共為三匕令相得入分為一分早朝空腹酒服一分日二齊州榮姥方凡是丁腫皆用治之牡蠣九兩爛者鍾乳枸杞根皮各二兩白石英一兩桔梗一兩半白薑石一斤軟黃者右六味各搗絹篩合和令調先取伏龍肝九升為末以清酒一斗二升攪令渾澄清取二升和藥捻作餅子大六分厚二分其濁滓仍置盆中布餅子於籠上以一幅紙藉盆上以泥酒氣蒸之仍數攪令氣散發經半日藥餅子乾乃內瓦缸中每一重紙一重藥遍布勿令相著以泥密封三七日乾以紙袋貯置乾處舉之用法以針刺瘡中心深至瘡根并刺四畔令血出以刀刮取藥如大豆許內瘡上若病重困日夜三四度輕者一二度著重者二日根爛始出輕者半日一日爛出當看瘡浮起是根出之候若根出已爛者勿停藥仍著之藥甚安穩令生肌易其病在口咽及胸腹中者必外有腫異相也寒熱不快疑是此病即以飲或清水和藥如二杏仁許服之日夜三四服自然消爛或以物剔吐根出即瘥若根不出亦瘥當看精神自覺醒悟合藥以五月五日為上時七月七日次之九月九日臘月臘日皆可若急須藥他日亦得要之不及良日也修合須清淨燒香不得觸穢毋令孝子不具足人産婦六畜雞犬等見之凡有此病忌房室猪牛雞魚生韭蔥蒜藝薹胡荽葵酒醋麵等若犯諸忌而發動者取枸杞根湯和藥服並如後方其二方本是一家智者評論以後方最是真本趙嬈方薑石二十五兩牡蠣十兩崔氏作七兩茯苓三兩枸杞根皮四兩右四味各搗篩合和先取新枸杞根合皮切六升水一斗半煎取五升去滓內狗屎崔氏云尿二升攪令調澄取清和前藥熟搗捻作餅子隂乾病者以兩創針當頭直刺瘡痛徹拔針出刮取藥末著急內瘡孔中勿令歇氣并遍封瘡頭上即脹起針挑根即出重者半日已上或已消爛挑根不出亦自瘥勿憂其病在內者外當有腫相應並皆惡寒發熱疑有瘡者以水半盞刮取藥如桐子大五枚和服之日夜三服即自消也若須根出服藥經一日以雞羽剔吐即隨吐根出若不出根亦自消爛在外者亦日夜三度𫝊藥根出後常𫝊勿住即生肉易瘥若犯諸忌而發動者取枸杞根合皮骨切三升以水五升煎取二升去滓研藥末一錢匕和枸杞汁一盞服之日二三服并單飲枸杞汁彌佳又以枸杞汁攪白狗屎取汁服之更良合訖即用不待乾所言白狗屎是狗食骨其屎色如石灰故直言狗白屎也如預造取五月五日七月七日九月九日臘月臘日者尤良神驗或有人忽喉中痛乍寒乍熱者即是其病當急以此藥療之無故而痛惡寒發熱者亦是此病但依前服之立瘥前後二方同是一法其用一同亦主癰疽甚效治丁腫病忌見麻勃見之即死者方胡麻燭燼針沙各等分右三味為末以醋和𫝊之又方石灰三分馬齒菜二分右二味搗以雞子白和𫝊之又方針刺四邉及中心塗雄黃末立愈神驗一云塗黃土又方鼠新坌土以小兒尿和傳之又方鐵衣末以人乳汁和𫝊之立可又方小豆花為末𫝊之瘥又方以人屎尖𫝊之立瘥又方以四神丹一枚當頭上安經宿根即出矣治一切丁腫方右用蒼耳根莖苖子但取一色燒為灰醋泔淀和如泥塗上乾即易不過十度根即拔神良余以正觀四年忽口角上生丁腫造甘子振家母為帖藥經十日不瘥余以此藥塗之得愈已後常作此藥以救人無有不瘥者故特論之以傳後嗣丁腫方殆有千首皆不及此雖齊州榮姥方亦不能勝此物造次易得也又方取鐵漿每飲一斗立瘥又方麵和臘月猪脂封上瘥又方蒺藜子一升燒灰釅醋和封上經宿便瘥或針破頭封上更佳又方皂莢子取仁作末𫝊之五日內瘥玉山韓光方韓光治丁腫人也正觀初衢州徐使君訪得此方右用艾蒿一擔燒作灰於竹筒中淋取汁以一二合和右灰如麵漿以針刺瘡中至痛即㸃之㸃三遍其根自拔亦大神驗正觀中用治三十餘人得瘥故録之魚臍丁瘡似新火針瘡四邉赤中央黑可針刺之若不大痛即殺人治之方右以臘月魚頭灰和髮灰等分以雞溏屎和𫝊上此瘡見之甚可即能殺二外臺不用髮灰以雞子清和塗又方以寒食餳𫝊之良硬者燒灰塗帖即瘥治魚臍瘡頭白似腫痛不可忍者方先以針刺瘡四畔作孔搗白苣取汁滴著瘡孔內又方𫝊水獺屎大良治赤根丁方右熬白粉令黑蜜和𫝊之良又方以新坌鼠壤水和塗之熱則易又方馬牙齒搗末臘月猪脂和𫝊之根即拔燒灰用亦可犯丁瘡方蕪菁根鐵生衣各等分右二味和搗以大針刺作孔復削蕪菁根如針大以前鐵生衣塗上刺孔中又塗所搗者封上仍以方寸匕緋帛塗帖之有膿出即易須臾拔根出立瘥忌油膩生冷醋滑五辛陳臭粘食又方刺瘡頭及四畔令汁極出搗生栗黃𫝊上以麵圍之勿令黃出從旦至午即根拔矣又方以麵圍瘡如前法以針亂刺瘡銅器煮醋令沸瀉著麵圍中令容一盞冷則易之三度根即出又方取蛇蛻皮如雞子大以水四升煮三四沸去滓頓服立瘥又方燒蛇蛻皮灰以雞子清和塗瘥又方取蒼耳苖搗取汁一二升飲之滓𫝊上立瘥又方灸掌後橫文後五指男左女右七壯即瘥已用得效丁腫灸法雖多然此一法甚驗出於意表也備急千金要方卷六十五
