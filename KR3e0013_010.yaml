body:
  text: 備急千金要方卷十唐孫思邈撰宋林億等校正少小嬰孺方驚癎第三論方候癎法灸法論曰少小所以有癎病及痙病者皆由臟氣不平故也新生即癎者是其五臟不收斂血氣不聚五脈不流骨法不成也多不全育其一月四十日已上至期歲而癎者亦由乳養失理血氣不和風邪所中也病先身熱掣瘲驚啼呌喚而後發癎脈浮者為陽癎病在六腑外在肌膚猶易治也病先身冷不驚掣不啼呼而病發時脈沉者為隂癎病在五臟內在骨髓極難治也病發身軟時醒者謂之癎也身強直反張如弓不時醒者謂之痙也諸反張大人脊不容側手小兒容三指者不可復治也凡脈浮之與沉以判其病在隂陽表裏耳其浮沉復有大小滑澀虛實遲駛諸證各依脈形為治神農本草經説小兒驚癎有一百二十種其證候微異於常便是癎候也初出腹血脈不斂五臟未成稍將養失宜即為病也時不成人其經變蒸之後有病餘證並寬惟中風最暴卒也小兒四肢不好驚掣氣息小異欲作癎及變蒸日滿不解者並宜與龍膽湯凡小兒之癎有三種有風癎有驚癎有食癎然風癎驚癎時時有之十兒之中未有一二是風驚者凡是先寒後熱發者皆是食癎也驚病皆按圖灸之風癎當與豬心湯食癎當下乃愈紫丸佳凡小兒所以得風癎者緣衣暖汗出風因入也風癎者初得之時先屈指如數乃發作者此風癎也驚癎者起于驚怖大啼乃發作者此驚癎也驚癎微者急持之勿復更驚之或自止也其先不哺乳吐而變熱後發癎者此食癎早下則瘥四味紫丸逐癖飲最良去病速而不虛人赤丸本無赤丸方諸醫方並無按此服四味紫丸不得下者當以赤丸赤丸差駃病重者當用之今次後癖結脹滿篇中第一方八味名紫雙丸者用朱砂色當赤用巴豆又用甘遂比紫丸當駃疑此即赤丸也差駃病重者當用之凡小兒不能乳哺當與紫丸下之小兒始生生氣尚盛但有微惡則須下之必無所損及其愈病則致深益若不時下則成大疾疾成則難治矣凡下四味紫丸最善雖下不損人足以去疾若四味紫丸不得下者當以赤丸下之赤丸不下當倍之若已下而有餘熱不盡當按方作龍膽湯稍稍服之并摩赤膏方見本篇末風癎亦當下之然當以豬心湯下之驚癎但按圖灸之及摩生膏方見本篇末不可大下也何者驚癎心氣不定一作足下之內虛益令甚爾驚癎甚者特為難治故養小兒常慎驚勿令聞大聲抱持之間當安徐勿令驚怖又天雷時當塞兒耳并作餘細聲以亂之也凡養小兒皆微驚以長其血脈但不欲大驚大驚乃灸驚脈若五六十日灸者驚復更甚生百日後灸驚脈乃善兒有熱不欲哺乳卧不安又數驚此癎之初也服紫丸便愈不愈復與之兒眠時小驚者一月輒一以紫丸下之減其盛氣令兒不病癎也兒立夏後有病治之慎勿妄灸不欲吐下但以除熱湯浴之除熱散粉之除熱湯散見下篇傷寒條中除熱赤膏摩之又以膏塗臍中令兒在涼處勿禁水漿常以新水飲之小兒衣甚薄則腹中乳食不消不消則大便皆醋臭此欲為癖之漸也便將紫丸以微消之服法先從少起常令大便稀勿大下也稀後便漸減之不醋臭乃止藥也凡小兒冬月下無所畏夏月下難瘥然有病者不可不下下後腹中當小脹滿故當節哺乳數日不可妄下又乳哺小兒當令多少有常劑兒漸大當稍稍增之若減少者此腹中已有小不調也便微服藥勿復哺之但當與乳甚者十許日微者五六日止哺自當如常若都不肯食哺而但欲乳者此是有癖為疾重要當下之不可不下不下則致寒熱或吐而發癎或更致下痢此皆病重不早下之所為也此即難治矣但先治其輕時兒不耗損而病可速愈凡小兒屎黃而臭者此腹中有伏熱宜微將服龍膽湯若白而醋臭者此挾宿寒不消也當服紫丸微者少與藥令內消甚者少增藥令小下皆復節乳哺數日令胃氣平和若不節乳哺則病易復復下之則傷其胃氣令腹脹滿再三下之尚可過則傷矣凡小兒有癖其脈大必發癎此為食癎下之便愈當審候掌中與三指脈不可令起而不時下致於發癎則難療矣若早下之此脈終不起也脈在掌中尚可早療若至指則病增矣凡小兒腹中有疾生則身寒熱寒熱則血脈動動則心不定心不定則易驚驚則癎發速也候癎法夫癎小兒之惡病也或有不及求醫而致困者也然氣發于內必先有候常宜審察其精神而採其候也手白肉魚際脈黑者是癎候魚際脈赤者熱脈青大者寒脈青細者為平也鼻口乾燥大小便不利是癎候眼不明上視喜陽是癎候耳後完骨上有青絡盛卧不靜是癎候青脈刺之令血出也小兒髮逆上啼笑面暗色不變是癎候鼻口青時小驚是癎候目閉青時小驚是癎候身熱頭常汗出是癎候身熱吐哯而喘是癎候身熱目時直視是癎候喜欠目上視是癎候身熱目視不精是癎候目瞳子卒大黑于常是癎候卧惕惕而驚手足振搖是癎候卧夢笑手足動搖是癎候意氣下而妄怒是癎候咽乳不利是癎候身熱小便難是癎候吐痢不止厥痛時起是癎候弄舌搖頭是癎候已上諸候二十餘條皆癎之初也見其候便爪其陽脈所應灸爪之皆重手令兒驟啼及足絶脈亦依方與湯直視瞳子動腹滿轉鳴下血身熱口噤不得乳反張脊強汗出發熱為卧不悟手足掣瘲喜驚凡八條癎之極者也如有此非復湯爪所能救便當時灸之論曰若病家始發便來詣師師可診候所解為法作次序治之以其節度首尾取瘥也病家已經雜治無次序不能制病病則變異其本候後師便不知其前證虛實直依其後證作治亦不得瘥也要應精問察之為前師所配依取其前蹤迹以為治乃無逆耳前師處湯本應數劑乃瘥而病家服一兩劑未效便謂不驗已後更問他師師不尋前人為治寒溫次序而更為治而不次前師治則弊也或前已下之後須平和療以接之而得瘥也或前人未下之或不去者或前治寒溫失度後人應調治之是為治敗病皆須邀射之然後免耳不依次第及不審察必及重弊也龍膽湯治嬰兒出腹血脈盛實寒熱溫壯四肢驚掣發熱大吐哯者若已能進哺中食實不消壯熱及變蒸不解中客人鬼氣并諸驚癎方悉主之十歲已下小兒皆服之小兒龍膽湯第一此是新出腹嬰兒方若日月長大者以次依此為例若必知客忤及有魃氣者可加人參當歸各如龍膽多少也一百日兒加三銖二百日兒加六銖一歲兒加半兩餘藥皆準耳龍膽鈎藤皮柴胡黃芩桔梗芍藥茯苓一作茯神甘草各六銖蜣蜋二枚大黃一兩右十味㕮咀以水一升煮取五合為劑也服之如後節度藥有虛實虛藥如足數合水也兒生一日至七日分一合為三服兒生八日至十五日分一合半為三服兒生十六日至二十日分二合為三服兒生二十日至三十日分三合為三服兒生三十日至四十日盡以五合為三服皆得下即止勿再服也大黃湯治少小風癎積聚腹痛夭矯二十五癎方大黃人參細辛乾薑當歸甘皮各三銖右六味㕮咀以水一升煮取四合服如棗許日三白羊鮮湯治小兒風癎胸中有疾白羊鮮三銖蚱蟬二枚大黃四銖甘草鈎藤皮細辛各二銖牛黃如大豆四枚蛇蛻皮一寸右八味㕮咀以水二升半煮取一升二合分五服日三若服已盡而癎不斷者可更加大黃鈎藤各一銖以水漬藥半日然後煮之增損續命湯治小兒卒中風惡毒及久風四肢角弓反張不隨并軃􅂒僻不能行步方麻黃甘草桂心各一兩芎藭葛根升麻當歸獨活各十八銖人參黃芩石膏各半兩杏仁二十枚右十二味㕮咀以水六升煮麻黃去上沫乃納諸藥煮取一升二合三歲兒分為四服一日令盡少取汗得汗以粉粉之石膏湯治小兒中風惡痱不能語口眼了戻四肢不隨方石膏一合麻黃八銖甘草射干桂心芍藥當歸各四銖細辛二銖右八味㕮咀以水三升半先煮麻黃三沸去上沫內餘藥煮取一升三歲兒分為四服日三治少小中風狀如欲絶湯方大黃牡蠣龍骨栝蔞根甘草桂心各二十銖赤石脂寒水石各六銖右八味㕮咀以水一升內藥重半兩煮再沸絞去滓半歲兒服如雞子大一枚大兒盡服入口中即愈汗出粉之藥無毒可每日二服有熱加大黃不汗加麻黃無寒水石朴消代之二物石膏湯治少小中風手足拘急方石膏如雞子大一塊碎真珠一兩右以水二升煮石膏五六沸內真珠煮取一升稍稍分服桂枝湯治少小中風脈浮發熱自汗出項強鼻鳴乾嘔方桂心生薑甘草芍藥各一兩大棗四枚右五味㕮咀三物以水三升煮取一升分三服此方與傷寒篇中方相重二物驢毛散治少小新生中風方驢毛一把取背前交脊上會中抆取如手母指大一把麝香二豆大右以乳汁和銅器中微火煎令焦熱出為末小兒不能飲以乳汁和之葦筒貯瀉著咽中然後飲乳令入腹茵芋圓治少小有風癎疾至長不除或遇天隂節變便發動食飲堅強亦發百脈攣縮行步不正言語不便者服之永不發方茵芋葉鉛丹秦芁鈎藤皮石膏杜蘅防葵各一兩菖蒲黃芩各一兩半松蘿半兩蜣蜋十枚甘草三兩右十二味為末蜜丸如小豆大三歲已下服五丸三歲已上服七丸五歲已上服十丸十歲已上可至十五丸鎮心圓治小兒驚癎百病鎮心氣方銀屑十二銖水銀二十銖牛黃六銖大黃六分茯苓三分茯神遠志防已白斂雄黃人參芍藥各二分紫石英真珠防葵鐵精各四分右十六味先以水銀和銀屑如泥别治諸藥和丸二歲兒如麻子二丸隨兒大小增之一方無牛黃一味丹參赤膏治少小心腹熱除熱方丹參雷丸芒硝戎鹽大黃各一兩右五味㕮咀以苦酒半升浸四種一宿以成錬豬肪一斤煎三上三下去滓乃內芒硝膏成以摩心下冬夏可用一方但用丹參雷丸亦佳五物甘草生摩膏治少小新生肌膚幼弱喜為風邪所中身體壯熱或中大風手足驚掣方甘草防風各一兩白术桔梗各二十銖雷丸二兩半右㕮咀以不中水豬肪一斤煎為膏以煎藥微火上煎消息視稠濁膏成去滓取如彈丸大一枚灸手以摩兒百過寒者更熱熱者更寒小兒雖無病早起常以膏摩𩕄上及手足心甚辟寒風灸法論曰小兒新生無疾慎不可逆針灸之如逆針灸則忍痛動其五脈因喜成癎河洛關中土地多寒兒喜病痙其生兒三日多逆灸以防之人灸頰以防噤有噤者舌下脈急牙車筋急其土地寒皆決舌下去血灸頰以防噤也吳蜀地溫無此疾也古方既傳之今人不詳南北之殊便按方而用之是以多害於小兒也所以田舍小兒任其自然皆得無有夭橫也小兒驚啼眠中四肢掣動變蒸未解慎不可針灸爪之動其百脈仍因驚成癎也惟隂癎噤痙可針灸爪之凡灸癎當先下兒使虛乃承虛炙之未下有實而灸者氣逼前後不通殺人癎發平旦者在足少陽晨朝發者在足厥隂日中發者在足太陽黃昏發者在足太隂人定發者在足陽明夜半發者在足少隂右癎發時病所在視其發早晚灸其所也夫癎有五藏之癎六畜之癎或在四肢或在腹內當審其候隨病所在灸之雖少必瘥若失其要則為害也肝癎之為病面青目反視手足搖灸足少陽厥隂各三壯心癎之為病面赤心下有熱短氣息微數灸心下第二肋端宛宛中此為巨闕也又灸手心主及少隂各三壯脾癎之為病面黃腹大喜痢灸胃管三壯俠胃管傍灸二壯足陽明太隂各二壯肺癎之為病而目白口沫出灸肺輪三壯又灸手陽明太隂各二壯腎癎之為病面黑正直視不搖如尸狀灸心下二寸二分三壯又灸肘中動脈各二壯又灸足太陽少隂各二壯膈癎之為病目反四肢不舉灸風府又灸頂上鼻人中下脣承漿皆隨年壯腸癎之為病不動搖灸兩承山又灸足心兩手勞宫又灸兩耳後完骨各隨年壯又灸臍中五十壯右五藏癎證候馬癎之為病張口搖頭馬鳴欲反折灸項風府臍中三壯病在腹中燒馬蹄末服之良牛癎之為病目正直視腹脹灸鳩尾骨及大推各三壯燒牛蹄末服之良羊癎之為病喜揚目吐舌灸大椎上三壯豬癎之為病喜吐沫灸脊骨兩傍各一寸七壯犬癎之為病手屈拳攣灸兩手心一壯灸足太陽一壯灸肋户一壯雞癎之為病搖頭反折喜驚自搖灸足諸陽各三壯右六畜癎證候小兒暴癎灸兩乳頭女兒灸乳下二分治小兒暴癎者身軀正直如死人及腹中雷鳴灸太倉及臍中上下兩傍各一寸凡六處又灸當腹度取背以繩繞頸下至臍中竭轉繩向背順脊下行盡繩頭灸兩傍各一寸五壯若面白啼聲色不變灸足陽明太隂若目反上視眸子動當灸囟中取之法橫度口盡兩吻際又橫度鼻下亦盡兩邊折去鼻度半都合口為度從額上髮際上行度之灸度頭一處正在𩕄上末合骨中隨手動者是此最要處也次灸當額上入髮二分許直望鼻為正次灸其兩邊當目瞳子直上入髮際二分許次灸頂上回毛中次灸客主人冗在眉後際動脈是次灸兩耳門當耳開口則骨解開動張陷是也次灸兩耳上捲耳取之當捲耳上頭是也一法大人當耳上橫三指小兒各自取其指也次灸兩耳後完骨上青脈亦可以針刺令血出次灸玉枕項後高骨是也次灸兩風池在項後兩轅動肋外髮際陷中是也次灸風府當項中央髮際亦可與風池三處高下相等次灸頭兩角兩角當回毛兩邊起骨是也右頭部凡十九處兒生十日可灸三壯三十日可灸五壯五十日可灸七壯病重者具灸之輕者惟灸囟中風池玉枕也艾使熟炷令平正著肉火勢乃至病所也艾若生炷不平正不著肉徒灸多炷故無益也若腹滿短氣轉鳴灸肺募在兩乳上第二肋間宛宛中懸繩取之當瞳子是次灸膻中次灸胸堂次灸臍中次灸薜息薜息在兩乳下第一肋間宛宛中是也次灸巨闕大人去鳩尾下一寸小兒去臍作六分分之去鳩尾下一寸是也并灸兩邊次灸胃管次灸金門金門在榖道前囊之後當中央是也從隂囊下度之大孔前中分之右腹部十二處胸堂巨闕胃管十日兒可灸三壯一月已上可五壯隂下縫中可三壯或云隨年壯強反張灸大椎并灸諸藏輸及督脊上當中從大椎窮骨中屈更從大椎度之灸度下頭是督脊也右背部十二處十日兒可灸三壯一月已上可灸五壯若手足掣瘲驚者灸尺澤次灸陽明次灸少商次灸勞宫次灸心主次灸合谷次灸三關次灸少陽右手部十六處其要者陽明少商心主尺澤合谷少陽也壯數如上又灸伏兔次灸三里次灸腓腸次灸鹿溪次灸陽明次灸少陽次灸然谷右足部十四處皆要可灸壯數如上手足陽明謂人四指凡小兒驚癎皆灸之若風病大動手足掣瘲者盡灸手足十指端又灸本節後備急千金要方卷十
