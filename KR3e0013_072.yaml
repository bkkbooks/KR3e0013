body:
  text: 備急千金要方卷七十二唐孫思邈撰宋林億等校正解毒雜治方解食毒第一論方論曰凡人跋涉山川不諳水土人畜飲啖誤中於毒素不知方多遭其斃豈非枉橫耶然而大聖久設其法以救活之正為貪生嗜樂忽而不學一朝逄遇便自甘心竟不識其所以今述神農黃帝解毒方法好事者可少留意焉治諸食中毒方飲黃龍湯及犀角汁無不治也飲馬尿亦良治飲食中毒煩悶方苦參三兩㕮咀以酒二升半煮取一升頓服取吐愈治食百物中毒方掘厠傍地深一尺以水滿坑中取厠籌七枚燒令煙以投坑中乃取水汁飲四五升即愈急者不可得但掘地著水即取飲之又方服生韭汁數升又方含貝子一枚須臾吐食物瘥治食六畜肉中毒方各取六畜乾屎為末水服佳若是自死六畜肉毒水服黃蘗末方寸匕須臾服與佳又方燒小豆一升為末服三方寸匕神良又方水服竈底黃土方寸匕治食生肉中毒方掘地深三尺取下土三升以水五升煮土五六沸取上浮清者飲一升立愈治食牛肉中毒方狼牙燒灰水服方寸匕良一作豬牙又方溫湯服豬脂良又方水煮甘草汁飲之治食牛馬肉中毒方飲人乳汁良治食馬肉血洞下欲死方豉二百粒杏仁二十枚右二味㕮咀蒸五升米下飯熟搗之再服令盡又方蘆根汁飲以欲即解治生食馬肝毒殺人方牡鼠屎二七枚兩頭尖者是以水研飲之不瘥更作治食野菜馬肝肉諸脯肉毒方取頭垢如棗核大吞之起死人又方燒狗屎灰水和絞取汁飲之立愈又方燒豬骨為末水服方寸匕治食百獸肝中毒方頓服豬脂一斤佳亦治陳肉毒治食狗肉不消心中堅或腹脹口乾大渴心急發熱狂言妄語或洞下方杏仁一升合皮研以沸湯三升和絞取汁分三服狗肉完片皆出即靜良驗治食豬肉中毒方燒豬屎為末服方寸匕犬屎亦佳治漏脯毒方張文仲云茅室諸水迷脯為漏脯搗韭汁服之良大豆汁亦得治鬱肉濕脯毒方張文仲云肉閉在密器中經宿者為濕脯燒狗屎為末水服方寸匕凡生肉熟肉皆不用深藏密蓋不泄氣皆殺人又肉汁在器中密蓋氣不泄者亦殺人治脯在黍米中毒方麴一兩鹽兩撮以水一升煮服之良治牛射罔脯毒及餅臛中毒方取貝子為末水服如豆佳不瘥又服人以雉肉作餅臛因食皆吐下治之方犀角為末服方寸匕得靜甚佳治食鵝鴨肉成病胸滿面赤不下食者方服秫米泔良治食魚中毒方煮橘皮停極冷飲之立驗肘後方云治食魚中毒面腫煩亂者治食魚中毒面腫煩亂及食鱸魚中毒欲死者方銼蘆根春取汁多飲良并治蟹毒亦可取蘆葦茸汁飲之愈治食魚膾及生肉在胸膈中不化吐之不出便成癥瘕方厚朴三兩大黃二兩右二味㕮咀以酒二升煮取一升盡服立消人強者大黃用酒三升煮取二升再服之治食魚膾不消方大黃三兩切朴硝二兩右二味以酒二升煮取一升頓服之仲景方有橘皮一兩肘後方云治食豬肉遇冷不消必成瘕下之方亦無橘皮又方舂馬鞭草飲汁一升即消生薑亦良肘後方云亦宜服諸吐藥又方鮐魚皮燒灰水服無完皮壞刀裝取之一名鮫魚皮古今録驗云治食鯸鮧魚傷毒又方魚皮燒灰水服方寸匕又方魚鱗燒灰水服方寸匕食諸鮑魚中毒亦用之治食蟹中毒方冬瓜汁服二升冬瓜亦可食治食諸菜中毒方甘草貝齒胡粉各等分右三味治下篩水服方寸匕小兒尿乳汁共服二升亦好治食山中樹菌中毒方人屎汁服一升良解百藥毒第二論毒方解論曰甘草解百藥此實如湯沃雪有同神妙有人中烏頭巴豆毒甘草入腹即定中藜蘆毒蔥湯下咽便愈中野葛毒土漿飲訖即止如此之事其驗如反掌要使人皆知之然人皆不肯學誠可歎息方稱大豆汁解百藥毒余每試之大懸絶不及甘草又能加之為甘豆湯其驗尤竒有人服玉壺丸治嘔不能已百藥與之不止藍汁入口即定如此之事皆須知之此則成規更不須試練也解毒方中條例極多若不指出一二學者不可卒知餘方例爾石藥毒用白鴨屎人參汁雄黃毒用防己鐡粉毒用磁石礜石毒用大豆汁白鵝膏防葵毒用葵根汁桔梗毒用白粥甘遂毒用大豆汁大戟毒用菖蒲汁躑躅毒用梔子汁雞子毒用淳醋馬刀毒用清水野芋毒用土漿人糞汁杏仁毒用藍子汁百藥毒用甘草薺苨大小豆汁藍葉根實汁金銀毒用水銀服數兩即出雞子汁及屎白燒豬脂和水淋雞屎汁煮蔥白汁鴨血及屎汁芫花毒用防己防風甘草桂汁野葛毒用雞子清葛根汁甘草汁鴨頭熱血豬膏雞屎人屎藜蘆毒用雄黃湯煮蔥汁烏頭天雄附子毒用大豆汁逺志防風棗肉飴糖射罔毒用藍汁大小豆汁竹瀝大麻子汁藕芰汁六畜血貝齒屑蚯蚓屎半夏毒用生薑汁及煮乾薑汁莨菪毒用薺苨甘草犀角蟹汁升麻狼毒毒用杏仁藍汁白斂鹽汁木占斯巴豆毒用煮黃連汁大豆汁菖蒲汁生藿汁肘後云小豆藿煮寒水石汁蜀椒毒用葵子汁蒜桂汁豉汁人尿冷水土漿雞毛燒吸煙及調水服斑貓元青毒用豬膏大豆汁戎鹽藍汁鹽湯煮豬膏巴豆服藥過劑悶亂者用水和胡粉水和葛粉地漿蘘荷汁粳米瀋豉汁乾薑黃連飴糖飲藍汁吞雞子黃解諸菌毒掘地作坑以水沃中攪令濁澄清飲之名地漿解一切毒藥發不問草石始覺惡即服此方豉三升生麥門冬蔥白各八兩右三味㕮咀以水七升煮取二升半分三服雞腸草散解諸毒方雞腸草三分薺苨升麻各四分芍藥當歸甘草各二分坌土一分藍子一合右八味治下篩水服方寸匕多飲水為佳若為蜂蛇等毒蟲所螫以針刺螫上血出著藥如小豆許於瘡中令濕瘥為射罔箭所中削竹如叉股長一尺五寸以綿纒繞水沾令濕取藥內瘡中隨瘡深淺令至底止有好血出即休若服藥有毒水服方寸匕毒解痛止愈解毒藥散方薺苨一分藍并花二分右二味七月七日取藍隂乾搗篩水和服方寸匕日三又方中毒者取秦燕毛二枚燒灰服解一切毒方母豬屎水和服之又水三升三合和米粉飲之解鴆毒及一切毒藥不止煩悶方甘草蜜各四分梁米粉一升右三味以水五升煮甘草取二升去滓歇大熱內粉湯中攪令勻調內白蜜更煎令熟如薄粥適寒溫飲一升治食莨菪悶亂如卒中風或似熱盛狂病服藥即劇方飲甘草汁藍青汁即愈治野葛毒以死口噤者方取青竹去兩節拄兩脅臍上內冷水注之暖即易須臾口開開即服藥立活惟須數易水治鈎吻毒困欲死面青口噤逆冷身痺方肘後方云鈎吻茱萸食芥相似而所生之傍無他草又莖有毛誤食之殺人薺苨八兩㕮咀以水六升煮取三升冷如人體服五合日三夜二凡煮薺苨惟令濃佳又方煮桂汁飲之又方噉蔥涕佳蔥涕治諸毒治腹中有鐡方白折炭刮取末井花水服三錢不過再服備急千金要方卷七十二
