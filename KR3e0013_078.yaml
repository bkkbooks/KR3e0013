  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0013_WYG_078-1a, image: WYG0735/WYG0735-0796a.png}
body:
  text: 備急千金要方卷七十八唐孫思邈撰宋林億等校正備急方火瘡等病第四論呪方論曰凡火燒損愼勿以冷水洗之火瘡得冷熱氣更深轉入骨壞人筋骨難瘥初被火燒急向火更炙雖大痛强忍之一食久即不痛神驗治火燒悶絶不識人以新尿冷飲之及冷水和蜜飲之口噤絞開與之然後以下方治之治火瘡方梔子四十枚白歛黄芩各五兩右三味㕮咀以水五升油一升合煎令水氣歇去滓待冷以淋之令溜去火熱毒則肌得寛也作二日任意用膏𫝊湯散治之又方熬油麻爲末和梔子仁塗之惟厚爲佳已成瘡者燒白糖灰粉之即燥立瘥治火燒瘡方死鼠頭一枚以臘月猪膏煎令消盡以𫝊乾即𫝊之瘥不作瘢神效亦治小兒火瘡治火瘡敗壊方柏白皮切以臘月猪膏合淹相得煮四五沸色變去滓𫝊瘡上肘後方云柳白皮又方栢白皮蛇銜生地黄梔子仁黄芩苦竹葉各一分右六味㕮咀以羊髓半升煎三上三下去滓塗上瘥止治火爛瘡膏方竹葉甘草各二兩柏白皮四兩右三味㕮咀以猪脂一斤半煎三上三下去滓冷以𫝊之集騐方用生地黄四兩又方榆白皮嚼熟塗之治一切湯火所傷方初著即以女人精汁塗之瘥治湯沃人肉爛壊方杏仁附子二兩甘草一兩羊脂五兩松脂雞子大右五味㕮咀以不中水猪膏五兩煎塗之炙及湯火所損晝夜啼呼止痛滅瘢方羊脂松脂各二分猪膏蠟各一右四味取松脂破銚中切脂嚼蠟著松明上少傾銚火令滓漬皆消以杯承汁𫝊之松明是肥松木節也治炙瘡方甘草當歸各一兩胡麻外臺用胡粉羊脂各六分右四味㕮咀以猪膏五合煎去滓𫝊之又方蠟三兩松脂五兩右二味合煎塗紙貼之日三又方取車􅤧脂塗上又方凡灸瘡不瘥日别灸上六七壯自瘥又方石灰一兩𢷬為細末絹篩猪脂和令相得微火上煎數沸以煖湯先洗瘡訖以布裹灰熨瘡上三過便以藥貼瘡上灸之又𢷬薤𫝊之治灸瘡痛腫急方𢷬竈下黄土以水和煮令熱漬之治灸瘡中風冷腫痛方但向火灸之瘡得熱則瘡快至痛止日六七灸愈薤白膏治灸瘡生肉止痛方薤白當歸各二兩白芷一兩羊髓一斤右四味㕮咀合煎以白芷色黄藥成去滓取𫝊之日三又方治灸瘡膿壊不瘥方薤白一握胡粉石灰各一兩臘月猪脂一升右四味先煎薤白令黄去之綿裹石灰煎數沸去之次入胡粉内膏中令調塗故布貼上日三又方白蜜一兩烏賊骨二枚一方作一兩右二味相和塗之治針炙瘡血出不止方燒人屎灰以𫝊之又方死蜣蜋爲末以猪脂和塗之論曰治金瘡者無大小冬夏及始初傷血出便以石灰厚𫝊裹之既止痛又速愈無石灰灰亦可用若瘡甚深未宜速合者内少骨石令瘡不時合也凡金瘡出血其人必渴當忍之噉燥食并肥膩之物以止渴愼勿鹹食若多飲粥及漿犯即血動溢出殺人又忌愼怒大言笑思想隂陽行動作勞多食酸鹹飲酒熱羮臛軰瘡瘥後猶爾出百日半年乃可復常也治金瘡大㪚方五月五日平旦使四人出四方各於五里内採一方草木莖葉每種各半把勿令漏脱一事日正午時細切碓𢷬并石灰極爛熟一石草斷一斗石灰先鑿大實中桑樹令可受藥取藥内孔中實築令堅仍以桑樹皮蔽之以麻𢷬石灰極宻泥之令不泄氣又以桑皮纒之使牢至九月九日午時取出隂乾百日藥成𢷬之日曝令乾更𢷬絹篩貯却凡一切金瘡傷折出血登時以藥封裹治使牢勿令動轉不過十日即瘥不腫不膿不畏風若傷後数日始得藥須煖水洗令血出然後𫝊之此藥大騐平時無事宜多合以備倉卒金瘡之要無出於此雖突厥質汗黄末未能及之肘後方云用百草心五月五日作七月七日出又方燒乾梅爲炭𢷬末𫝊之一宿即瘥亦治打傷又方磁石𢷬末𫝊之止痛斷血又方取桑白汁塗桑白皮裹之或石灰封之妙又方麻葉三斤以水三升熟煮取二升半爲一服又方飲麻子汁数升小品方云治毒箭所傷又方蚯蚓屎以水服方寸匕日三又方杏仁石灰爲細末以猪脂和封之亦主犬馬金瘡止痛太良治金瘡血出不止方煮桑根十沸服一升即止又方𢷬車前汁𫝊之血即絶連根取用亦效又方柳絮封之又方以蜘蛛幕貼之血即止又方以人精塗之又方飲人尿五升愈内補散治金瘡出血多虚竭方蓯蓉甘草芍藥各四兩蜀椒三兩乾薑二兩當歸芎藭桂心黄芩呉茱萸人參厚朴白芨古今録驗作桑白皮黄耆各一兩右十四味治下篩以酒服方寸匕日三又方當歸三兩乾薑三分芍藥辛夷各五分甘草二分右五味治下篩酒服方寸匕日三夜一治金瘡内漏血不出方牡丹皮爲散水服三指撮立尿出血治金瘡内漏方還自取瘡中血著杯中水和服之愈又方蒲黄二兩七月七日麻勃一兩右二味酒服一錢七日三夜二二物湯治金瘡腹中瘀血方大麻子三升大蔥白二七枚右使數人各𢷬令熟著九升水煮取一升半頓服若血出不盡腹中有膿血更合服當吐膿血内塞散治金瘡方黄耆當歸芎藭白芷乾薑黄芩芍藥續斷各二兩附子半兩細辛一兩鹿茸三兩右十一味治下篩先食酒服五分匕日三稍増至方寸匕治金瘡煩滿方赤小豆一升以苦酒漬之熬令燥復漬滿三日令色黒服方寸匕日三治金瘡苦痛方楊木白皮熬令燥爲末服方寸匕日三又以𫝊瘡愈治金瘡若刺瘡痛不可忍百治不瘥者方蔥一把以水三升煮數沸取漬洗止痛良治金瘡煩痛大便不利方大黄黄芩闕右二味爲末蜜和丸如梧桐子大先食服十丸日三治金瘡不止令唾止痛呪法呪曰某甲今日不良爲某所傷上告天皇下告地王清血莫出濁血莫揚良藥百裹不如熟唾日二七痛唾之即止又法我按先師夲法男師在左女師在右上白東王公下白西王母北斗七星黄姑織女請制水之法清旦明呪不痕不膿不疼不痛羅肺得肺羅肝得肝羅肉得肉不任軀姥儂夫自来小兒為日不吉不良某甲為刀斧槊箭熊虎湯火所傷三唾三呵平復如故急急如律令此法不復須度受但存念稽急歆誦之非止治百毒所傷亦治癰疽隨所患轉後語呼之良驗一切瘡毒並皆用之續斷散治金瘡中筋骨方續斷五兩細辛蛇銜地榆乾地黄四兩當歸芎藭芍藥蓯蓉各三兩人參甘草附子各二兩乾薑蜀椒桂心各一兩半右十五味治下篩酒服一方寸匕日三治金瘡腸出方磁石滑石鐵精各三兩右三味爲末粉腸上後用磁石末飲服方寸匕日五夜二腸即入又方取人屎乾爲末以粉腸即入治被傷腸出不斷者方肘後方云治腸出欲燥而草土著腸者作大麥粥取汁洗腸推内之常研米粥飲之二十日稍稍作强糜百日後乃可瘥地黄膏治金瘡火瘡炙瘡不能瘥者方生地黄切一升𢷬絞取汁三合薫陸香松脂杏仁蠟各二兩羊腎脂五合煎烏麻油二升石鹽一兩研如粉右八味先下蠟微火令消次内羊脂令消次下油次下松脂令消次下杏仁次下薫陸次下地黄汁次下石鹽以微火煎令地黄汁水氣盡以綿濾停凝一切諸瘡初傷皆用𫝊之日三夜二愼生冷猪雞魚肉此膏治瘡法先食惡肉不著痂先從内瘥乃至平復無痂不畏風不膿大大要妙治金瘡血出不止方蒲黄一斤當歸二兩右二味治下篩酒服方寸匕日二又方取蔥葉炙取汁塗瘡上即止若爲婦人所驚者取婦人中衣火炙令熱以熨瘡上又方取䜴三升熱湯漬食頃絞去滓内蒲黄三合頓服及作紫湯服之紫湯方在産婦篇中治金瘡箭在肉中不出方白歛半夏各等分右二味治下篩酒服方寸匕日三瘡淺十日出瘡深二十日出終不住肉中治卒中箭不出或肉中有聚血方取女人月經布燒灰屑酒服之治箭鏃及諸刀刅在咽喉胷膈諸隠䖏不出者方牡丹皮一分白鹽二分肘後作白歛右二味治下篩以酒服方寸匕日三服出又方取栝蔞汁塗箭瘡上即出又方酒服瞿麥方寸匕日三瘥治毒箭所中方𢷬藍汁一升飲之并以薄瘡上若無藍取青布漬絞汁服之并淋瘡中鏃不出𢷬死鼠肝塗之又方煎地黄汁作丸服之百日箭出又方多飲葛根汁并治一切金瘡又方雄黄為末𫝊之當沸汁出愈又方𢷬葛根汁飲之又葛白屑熬黄𫝊瘡止血又方内鹽臍中炙之又方貝齒末服一錢匕又方煮蘆根汁飲三升治中射網箭方藍子五合升麻八兩王不留行甘草各等分右四味治下篩冷水服二方寸匕日三夜二又以水和塗瘡乾易之治針折入肉中方刮象牙爲末水和聚著折針上即出又方以鼠腦塗之又方磁石吸鐵者著上即出備急千金要方卷七十八
