body:
  text: 備急千金要方卷二十一唐孫思邈撰宋林億等校正七竅病方面藥第九方五香散治䵟皰黶􅍍黒運赤氣令人白光潤方黄耆白茯苓萎㽔杜若大豆黄卷商陸各二兩白芷當歸白附子冬𤓰仁杜蘅白殭蠶辛夷仁香附子丁子香蜀水花旋覆花防風木蘭芎藭藁本皁莢白膠杏仁天門冬土𤓰根白术梅肉酸漿水萍各三兩畢豆四兩豬􅏬二具曝乾右三十二味治下篩取洗面二七日白一年與衆别洗手面令白淨恱澤澡豆方白豆麫一升麫三升溲豬􅏬為餅曝乾𢷬篩冬𤓰仁四合豬􅏬兩具大者細切白茯苓白芷白鮮皮栝蔞子白术白附子白斂莵絲子土𤓰根羌活萎㽔桃仁杏仁商陸芎藭各一兩右十九味合𢷬篩入麫豬􅏬拌勻更𢷬每日常用以漿水洗甚良又方畢豆麫一升栝蔞實三兩一方不用豬􅏬五貝細切土𤓰根白茯苓萎㽔各五兩皂莢三挺右七味𢷬篩將豬􅏬拌和更𢷬令勻每旦洗手面百日白淨又方白芷白斂白术桃仁冬𤓰仁杏仁萎㽔各等分皂莢倍其數右八味為末絹篩洗手面時即用又方畢豆麫三升大豆黄麫亦得白芷青木香甘松香零陵香藿香各二兩冬葵子一本又用冬𤓰子栝蔞仁四兩右八味𢷬篩用如常法令人面白淨恱澤方白斂白术白附子白芷各二兩豬􅏬三具水漬去赤汁研藁本三兩右六味為末先以蕪菁子半升又酒水各半升相和煎數沸研如泥合諸藥内酒水中以甆器貯封三日每夜取傅面旦以漿水洗之令人面潔白恱澤顔色紅潤方豬􅏬五具蕪菁子二兩栝蔞子五兩桃仁三兩右四味以酒和熟𢷬傅之慎風日又方採三株桃花隂乾為末空心飲服方寸匕日三并細腰身又方酒漬桃花服之好顔色治百病三月三日收澡豆治手乾燥少潤膩方大豆黄五升赤小豆去皮零陵香子苜蓿各一升冬𤓰仁茅香各六合丁香五合麝香一兩豬􅏬五具細切右九味細𢷬羅與豬􅏬相合和曝乾再𢷬篩取洗手面又方大豆末二升絹篩豬􅏬五具乾之蒴藋灰一兩甘松香零陵香二兩白茯苓藁本白芷各四兩白商陸五兩右九味為末調和訖與豬􅏬相和更𢷬令勻欲用稍稍取以洗手面八九月合冷處貯之三月已後勿用神良面脂主恱澤人面耐老方冬𤓰仁白芷商陸芎藭各三兩當歸藁本靡蕪土𤓰根去皮桃仁各一兩萎㽔細辛防風各一兩半木蘭皮辛夷甘松香麝香白殭蠶白附子梔子花零陵香半兩豬􅏬三具切水漬六日欲用時以酒挼取汁漬藥右二十一味薄切綿裹以豬􅏬汁漬一宿平旦以煎豬脂六升微火三上三下白芷色黄膏成去滓入麝收于甆器中取塗面又方治面上皴黒凡是面上疾皆主之方丁香零陵香梔子花桃仁白斂茯苓土𤓰根莵絲子防風沉香辛夷當歸麝香藁本商陸芎藭各三兩萎㽔一作白芨藿香一本無白芷甘松香白殭蠶木蘭皮各二兩半蜀水花青木香二兩冬𤓰仁四兩羊腎脂鵝脂各一兩半羊髓一升生豬脂三升右二十九味㕮咀先以美酒五升挼豬􅏬六具取汁漬藥一宿于豬脂中微火極煎三上三下白芷色黄以綿一大兩生布中絞去滓入麝香末以白术箆攪至凝乃止任性用之良面膏去風寒令人面光恱却老去皺方青木香白附子白蠟白芷芎藭零陵香香附子各二兩茯苓甘松香各一兩羊髓一升半鍊右十味㕮咀以酒水各半升浸藥經宿次日煎三上三下候酒水盡膏成去滓取傅面如壯若有䵟􅍍皆落玉屑面膏治面無光澤皮肉皴黒久用令人潔白光潤方玉屑細研土𤓰根白附子商陸芎藭萎㽔冬𤓰仁桃仁白芷木蘭辛夷各一兩莵絲子青木香藁本當歸黄耆白殭蠶藿香細辛各十八銖麝香防風各半兩鷹屎白蜀水花一合豬􅏬三具細切白犬脂鵝脂熊脂豬肪脂各一升右二十八味先以水浸豬鵝犬熊脂數易水浸冷血脉盡乃可用㕮咀諸樂清酒一斗漬一宿明旦生擘豬鵝等脂安藥中取銅鐺于炭火上微煎至暮時乃熟以綿濾置甆器中仍以練繫白芷片看色黄即膏成其豬􅏬取浸藥酒挼取汁安鐺中其玉屑蜀水花鷹屎白麝香為末膏成安藥中攪令勻旋取傅面玉屑面脂方玉屑白附子白茯苓青木香萎㽔白木白殭蠶蜜陀僧甘松香烏頭商陸石膏黄耆胡粉芍藥槀本防風芒硝白檀各一兩當歸土𤓰根桃仁芎藭各二兩辛夷桃花白頭弱零陵香細辛知母各半兩豬脂一升羊腎脂白犬脂鵝脂各一合右三十三味切以酒水各一升合漬一宿出之用銅器微火煎令水氣盡候白芷色黄去滓停一宿旦以栁枝攪白乃用之又方令黒者皆白老者皆少方玊屑寒水石木蘭皮旋覆花珊瑚丁香土𤓰根蜀水花白茯苓芎藭莵絲子辛夷仁冬𤓰仁白頭翁當歸藁本白殭蠶青木香蕪菁子梔子花細辛萎㽔商陸白芷防風黄耆桃仁藿香前胡桂心半夏白斂杏仁蘼蕪芒硝杜蘅麝香秦椒礜石秦皮杜若升麻蜀椒黄芩白薇各六銖栝蔞仁一兩熊脂鵝脂羊髓牛髓白狗脂五合鷹屎白一合清酒豬肪脂各一升右五十四味㕮咀酒漬一宿内脂等合煎三上三下酒氣盡膏成絞去滓下麝香末攪至凝色變乃止甆器宻貯勿洩氣錬脂法凡合面脂先須知錬脂法以十二月買極肥大豬脂水漬七八日日一易水煎取清脂没水中鍊鵝熊脂皆如此法治外膏主面䵟􅍍方白芷白蠟各二兩白附子辛夷防風烏頭零陵香藿香萎㽔各半兩藁本一兩商陸麝香各六銖麻油二合羊脂五合牛脂鵝脂各一升右十六味薄切醋漬浹洽經一宿旦合煎候白芷色黄膏成以皂莢湯洗面傅之日三甚良又方雞子三枚胡粉細研丁香各一兩右三味先以醋一升漬七日後取雞子白調香粉令勻以漿水洗面傅之又方白礬石硫黄白附子各六銖右三味為末以酢一盞漬三日夜淨洗面傅之莫見風日慎三七日可白如雪白面方牡蠣三兩土𤓰根一兩右二味為末白蜜和取塗面即白如玉旦以温漿水洗之宜慎風日豬蹄湯洗手面令光潤方豬蹄一具桑白皮芎藭萎㽔白芷白茯苓各三兩商陸一作當歸白术各二兩右八味㕮咀以水三斗煎豬蹄及藥取一斗去滓毎温一盞洗手面大佳豬蹄漿急面皮去老皺主光澤方大豬蹄一具淨治如食法以水二升清漿水一升不渝釡中煮成膠用洗手面又以此藥和澡豆夜塗面旦用漿水洗面皮即急鹿角散令百歲老人面如少年時主光澤潔白方鹿角長一握牛乳三升芎藭細辛天門冬白芷白术白斂白附子酥各三兩杏仁五七枚右十一味㕮咀先以水漬鹿角一百日出之與諸藥内牛乳中緩火煎令汁盡出角以白練袋盛餘藥勿收至夜取牛乳石上磨鹿角取塗面旦以漿洗之無乳小便研亦得治面黒不淨洗手面澡豆方白豆屑二升白附子甘松香丁子香白芷白殭蠶鷹屎白白檀香白术木香一用藁本芎藭白鮮皮各三兩大棗杏仁各三十枚麝香二兩白梅肉三七枚麫三升冬𤓰仁五合豬􅏬三具雞子白七枚土𤓰根一兩又一本用甜𤓰子右二十一味先以豬􅏬和麫曝乾然後合諸藥𢷬末又以白豆屑二升為散毎旦用盥洗十日色白如雪三十日如凝脂神驗千金翼無白殭𧖟芎藭白附子大棗有桂心三兩鉛丹散治面黒令人面白如雪方鉛丹三十銖真女菀六十銖右二味治下篩酒服一刀圭日三男十日女二十日知知則止黒色皆從大便出面白如雪白楊皮散治面與手足黒令光澤潔白方白楊皮十八銖一方用桔皮桃花一兩白𤓰子仁三十銖右三味治下篩温酒服方寸匕日三欲白加𤓰子欲赤加桃花三十日面白五十日手足俱白治面黒生䵟皰方白斂十二銖生礜石救急方無白石脂六銖杏仁三銖右四味研和雞子白夜卧塗面上旦用井花水洗之治面䵟皰令人恱白方栝蔞子六合白石脂五合雀屎二合去黒麝香右四味𢷬篩别研麝香雀屎白石脂和合取生莵絲苖汁和之如薄泥先用澡豆洗去面上垢膩次以藥塗䵟上日夜三四度平旦温漿水洗之治䵟􅍍烏靨令面潔白方馬珂二兩白附子鷹屎白珊瑚各一兩右四味研成粉和勻用人乳調毎夜取傅面明旦温漿水洗之去面上靨子黒痣方夜以温漿水洗面以生布揩靨子令赤痛水研白旃檀取濃汁塗靨子上旦覆以暖漿水洗之次以鷹屎白傅其上洗面去䵟􅍍主恱白方豬􅏬兩具去脂豆麫四升冬𤓰仁半升皂莢五挺細辛白术各一兩防風白斂白芷各二兩商陸三兩右十味和土𤓰根一兩𢷬絹羅取大猪蹄一具煮令爛作汁和散為餅曝乾再𢷬為末羅取盥洗不過一年恱白桃仁澡豆主恱澤去䵟􅍍方桃仁蕪菁子一兩畢豆麫二升白术六合土𤓰根七合右五味合和𢷬篩以酢漿水洗手面桃花圓治面黒䵟令人潔白光恱方桃花二升桂心鳥喙甘草各一兩右四味為末白蜜丸如大豆許毎服十丸日二服十日易形一方有白附子甜𤓰子杏仁各二兩為七味治面䵟􅍍内外兼治方成鍊松脂為末温酒服三合日三服盡三升無不瘥治面䵟方李子仁為末和雞子白傅一宿即落又方甘草二兩末白羊乳二升羊􅏬二具水浸去汁小切右三味相和一宿先以酢漿洗面生布拭夜傅藥兩遍明旦以豬蹄湯洗却毎夜洗之又方白附子為末酒和傅之即落又方桂心蜜石鹽各等分右三味為末相和又方以上朱砂研細如粉和白蜜塗之旦以酢漿洗却大驗又方白附子香附子白檀馬珂紫檀各一兩右五味為末白蜜和如杏仁大隂乾臨用以水研塗面旦以温水洗却忌風油七日面色如蓮花又方水和丹砂末服方寸匕男七日女二七日色白如雪治人面䵟􅍍黒膚色粗陋皮厚狀醜方羖羊脛骨為末以雞子白和傅之旦以白淨粱米泔洗之三日白如雪又方白蜜和茯苓粉傅之七日愈又方杏仁酒浸皮脱𢷬碎絹袋盛夜取拭面又方酒浸雞子三枚宻封四七日成傅面白如雪又方杏仁為末雞子白右二味相和夜塗面明旦以米泔洗之治面多䵟􅍍皮因粗澁令人不老皆主之方朱砂雄黄各三兩水銀霜半兩黄鷹糞一升上胡粉二兩右五味並細研如粉以面脂和淨洗面夜塗之以手細摩令熱明旦不廢作壯然須五日一洗面一塗不過三遍所有惡物一切皆除數倍少嫩慎風日不傳神祕治面䵟􅍍令恱澤光白潤好及手皴方猪蹄兩具治如食法白粱米一升洗令浄右二味以水五斗合煮猪蹄爛取清汁三斗用煮後藥白茯苓商陸各五兩萎㽔三兩白芷藁本各二兩右五味㕮咀用前藥汁三斗并研杏仁一升合煮取一斗五升去滓甆瓶盛貯内甘松零陵香末各一兩入膏中攪令勻綿羃之毎夜取塗手面治面黒䵟􅍍皮皺皴散方白附子蜜陀僧牡蠣茯苓芎藭各二兩右五味為末和以羖羊乳夜塗面以手摩之旦用漿水洗不過五六度一重皮脫䵟瘥矣治面䵟􅍍方沉香牛黄薫陸香雌黄鷹屎丁香玉屑各十二銖水銀六銖右八味為細末蜜和以傅之白𤓰子圓治面䵟􅍍令色白方白𤓰子二兩逺志藁本杜蘅雲母粉車前子白芷當歸各一兩細辛栢子仁栝蔞仁橘皮白石脂鉛丹各半兩天門冬三兩右十五味為末蜜和丸如梧子大空腹服二十丸日三治粉滓䵟􅍍方白斂十二銖白石脂六銖右二味𢷬篩以雞子白和夜卧塗面旦用井花水洗白去粉滓䵟􅍍皴皰及茸毛令面恱澤光潤如十四五時方黄耆白术白歛萎㽔土𤓰根商陸蜀水花鷹屎白一兩防風一兩半白芷細辛青木香白附子芎藭杏仁各二兩右十五味為末以雞子白和作挺隂乾石上研取漿水塗面夜用旦以水洗之細絹羅如粉佳治面粉滓方熬礬石以清酒和傅之不過三上又方𢷬生莵絲苖汁塗不過三上治年少氣盛面生疱瘡方胡粉半兩水銀一兩一方有真珠右二味以臘月豬脂和熟研令水銀消向暝以傅面旦起布拭之慎勿水洗至暝又取傅面不過三上瘥白膏治面􅖟疱疥癰惡瘡方附子十五枚蜀椒一升野葛一尺五寸右三味㕮咀以酢漬一宿猪膏一斤煎令附子色黄去滓塗之日三上治面􅖟皰方鸕鷀屎一升為末以臘月猪脂和令勻夜傅之治面􅖟方木蘭皮一斤以三年酢漬令没百日曝乾為末温酒服方寸匕日三治面皰方淳酒二升牛膽羖羊膽各一具右三味合煮三五沸傅之又方薺苨肉桂各二兩右二味為末以酢漿服方寸匕日一服亦治䵟􅍍及滅瘢去黒痣又方冬葵子栢子仁冬𤓰子茯苓各等分右四味為末酒服方寸匕食後服日三治面皰甚者又方生地黄三斤枸杞根一十斤右二味先𢷬枸杞次𢷬地黄曝乾合篩空腹酒服方寸匕日三久服顔如童子此祕方也梔子圓治酒􅖟鼻皰方梔子仁䜴各三升大黄六兩木蘭皮半兩芎藭甘草各四兩右六味為末蜜和丸如梧桐子初服十丸日三稍加至十五丸治鼻皰方蒺藜子梔子仁䜴各一升木蘭皮半斤一本無右四味為末以酢漿水和如泥夜傅之日未出時暖水洗却亦主滅瘢痕治面上風毒方玉屑蜜陀僧珊瑚各二兩白附子三兩右四味為末以酥和夜傅旦洗之亦滅除瘢㾗治面有熱毒惡瘡方胡粉熬黄蘗炙黄連各等分右三味為末取傅上瘥止若瘡乾以面脂調塗之日三治滅瘢㾗方猪脂三斤飼烏雞一隻三日令盡後取白屎内白芷當歸各一兩煎白芷色黄去滓内鷹屎白半兩攪令調傅之日三又方禹餘糧半夏等分為末以雞子黄和先以新布拭瘢處令赤後用藥傅之勿見風日二十日瘥十年者亦滅又方以人精和鷹屎白傅之日二白蜜亦得無問新舊必除又方白附子杜若細辛各半兩辛夷一兩鷹屎白一合右五味為末治取傅之亦滅瘢㾗治瘢㾗凸出方鷹屎白一兩衣白魚二七枚右二味為末蜜和以傅日三五度良又方鷹屎白二兩白殭蠶一兩半右二味為末以白蜜和傅上日三慎五辛生菜又方春夏以大麥麨秋冬以小麥麨好細絹下篩以酥和封上又方臘月猪脂四升煎大鼠一枚令消盡以生布揩拭瘢處令赤塗之不過四五上又方以熱瓦熨之又方以凍凌熨之治身及面上印文方針刺字上破以醋調赤土薄之乾又易以黒滅即止又方以未滿月小兒屎傅上一月即没備急千金要方卷二十一
