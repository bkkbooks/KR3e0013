body:
  text: 備急千金要方卷二十六唐孫思邈撰宋林億等校正治諸風方賊風第三論法方灸桂枝酒治肝虚寒卒然瘖啞不聲踞坐不得面目青黒四肢緩弱遺失便利厲風所損方桂枝芎藭獨活牛膝薯蕷甘草各三兩附子二兩防風茯苓天雄茵芋杜仲蒴藋根白术各四兩乾薑五兩躑躅猪椒葉根皮各一升大棗四十枚右十八味㕮咀以酒四斗漬七日毎服四合日二加至五六合肝風占候其口不能言當灸鼻下人中次灸大椎次灸肝輸第九椎下是五十壯餘處隨年壯眼暗灸之得明二三百壯良大定心湯治心氣虚悸恍惚方見别卷中乾薑附子湯治心虚寒風半身不遂骨節離解緩弱不收便利無度口面喎邪方乾薑附子各八兩桂心麻黄各四兩芎藭三兩右五味㕮咀以水九升煮取三升分三服三日後服一劑側子酒治心寒或笑或呻口欹方見别卷中芎藭湯治卒中風四肢不仁善笑不息方芎藭一兩半黄芩石膏一用黄連當歸秦艽麻黄桂心乾薑甘草各一兩杏仁二十一枚右十味㕮咀以水九升煮取三升分三服荆瀝湯治心虚寒隂氣傷寒損心驚掣悸語聲寛急混濁口喎冒昧好自笑厲風傷心方荆瀝三升母薑取汁一升麻黄白术芎藭各四兩防風桂心升麻茯苓逺志人參羗活當歸各三兩防已甘草各二兩右十五味㕮咀以水一斗五升煎麻黄兩沸去沫次下諸藥煮取三升去滓下荆瀝薑汁煎取四升分四服日三夜一白术酒補心志定氣治心虚寒氣性反常心手不随語聲冒昧其疾源厲風損心具如前方所說無藭白术切地骨皮荆實各五斗菊花三斗右四味以水三石煮取一石五斗去滓澄清取汁釀米二石用麴如常法酒熟隨能飲之常取半醉勿令至吐治心風寒方灸心輸各五十壯第五節兩邊各一寸半是依源麻黄湯治脾虚寒厲風所傷舉體消瘦語音沉澀如破鼓聲舌强不轉而好咽唾口噤唇黒四肢不舉身重如山便利無度方見别卷中半夏湯温中下氣治脾寒語聲憂懼舌本捲縮嗔喜無度惛悶恍惚脹滿方半夏大麻仁熬研為脂生薑各一升芍藥茯苓五味子桂心橘皮各三兩白术四兩附子五兩甘草二兩大棗三十枚右十二味㕮咀以水一斗二升煮取三升去滓下大麻仁脂更上火一沸分三服當歸圓補脾安胃調氣止痛治脾虚寒身重不舉語音沉鼓厲風傷痛便利無度方當歸酸棗仁乾薑各八兩芎藭乾地黄天雄各六兩地骨皮黄耆各七兩大棗二十枚呉茱萸五合甘草秦椒葉厚朴秦芃各四兩桂心防風附子白术各五兩右十八味為末蜜丸如梧子酒服三十丸加至四十丸日再服脾風占候聲不出或上下手當灸手十指頭次灸人中次灸大椎次灸兩耳門前脉去耳門上下行一寸是次灸兩大指節上下各七壯治脾風方脾風者總呼為八風灸脾輸夾脊兩邊各五十壯凡人脾輸無定所隨四季月應病即灸臟輸是脾穴此法甚妙依源麻黄續命湯治肺虚寒厲風所中嘘吸戰掉聲嘶塞而散下氣息短憊四肢痺弱面色青葩遺失便利冷汗出麻黄六兩大棗五十枚杏仁白术石膏各四兩桂心人參乾薑茯苓各三兩當歸芎藭甘草各二兩右十二味㕮咀以水一斗二升煮麻黄去沫次下諸藥煎取三升去滓分三服舊方無白术茯苓今方無黄芩轉以依經逐病増損八風防風散治肺寒虚傷語音嘶下拖氣用力戰掉緩弱羸瘠厲風入肺方防風獨活芎藭秦椒乾薑黄耆附子四十二銖天雄麻黄五味子山茱萸石膏各三十六銖秦芃桂心薯蕷細辛當歸防已人參杜仲各三十銖甘草十二銖貫衆二枚甘菊紫菀二十右二十四味治下篩毎服方寸匕酒調進至兩匕日再温中生薑湯治肺虚寒羸瘦緩弱戰掉嘘吸胷滿肺痿方生薑二斤桂心橘皮四兩甘草麻黄三兩右五味㕮咀以水一斗煮取二升半分三服先煎麻黄兩沸去沫然後入諸藥合煮治肺寒方灸肺輸百壯腎瀝湯治腎寒虚為厲風所傷語音謇吃不轉偏枯胻脚偏跛蹇緩弱不能動口喎言音混濁便利仰人耳偏聾塞腰背相引隨病用藥依源増損方羊腎一具黄耆芎藭桂心當歸人參防風甘草五味子各三兩𤣥參茯苓芍藥各四兩磁石五兩地骨皮二升切生薑八兩右十五味㕮咀以水一斗五升煮羊腎取七升下諸藥取三升去滓分三服可服三劑茵芋酒治耳聾口欹等病方見别卷乾地黄圓治腎虚呻吟喜恚怒反常心性陽氣弱腰背彊急髓冷方乾地黄山茱萸天門冬桂心續斷各一兩半栢子仁杜仲牛膝蓯蓉各四十二銖茯苓天雄鍾乳各二兩松脂逺志乾薑各三十銖菖蒲薯蕷甘草各一兩右十八味末蜜丸梧子大酒服三十丸日二加至四十丸治腎寒方灸腎輸百壯大巖蜜湯治賊風腹中絞痛并飛尸遁注發作無時發即搶心脹滿脇下如錐刀刺并主少隂傷寒方梔子十五枚甘草乾地黄細辛羊脂青羊角亦得茯苓吳茱萸芍藥小品用芎藭乾薑當歸桂心各一兩右十一味㕮咀以水八升煮取三升去滓内脂令烊分三服温服相去如人行十里須若痛甚者加羊脂三兩當歸芍藥人參各一兩心腹脹滿堅急者加大黄三兩胡洽不用梔子羊脂茯苓桂心名巖蜜湯小巖蜜湯治惡風角弓反張飛尸入腹絞痛悶絶徃來有時筋急少隂傷寒口噤不利方大黄二兩雄黄青羊脂各一兩當歸乾薑桂心乾地黄芍藥甘草細辛各四兩吳茱萸三兩右十一味㕮咀以水二斗煮取六升分六服重者加藥用水三斗煮取九升分十服排風湯治諸毒風邪氣所中口噤悶絶不識人及身體疼煩面目手足暴腫者方犀角貝子升麻羚羊角各一兩右四味治下篩為粗散以水二升半内四方寸匕煮取一升去滓服五合殺藥者以意増之若腫和雞子傅上日三度老小可斟酌加減神良亦可多合備用烏頭湯治寒疝腹中絞痛賊風入腹攻五臟拘急不得轉側呌呼發作有時使人隂縮手足厥逆方烏頭十五枚要畧用五枚大棗十枚甘草二兩芍藥四兩桂心六兩老薑一斤右六味㕮咀以水七升煮五味取三升去滓别𢷬烏頭去皮四破蜜二升微火煎令減五六合内湯中煮兩小沸去滓服一合日三間食彊者三合以如醉狀為知不知増之治賊風所中腹内攣急方麻黄四兩甘草一尺石膏鬼箭羽各雞子大右四味㕮咀以東流水二升煮取一升頓服之論曰夫歴節風著人久不治者令人骨節蹉跌變成癲病不可不知古令以來無問貴賤徃徃苦之此是風之毒害者也治之雖有湯藥而並不及松膏松節酒若覊旅家貧不可急辦者宜服諸湯猶勝不治但於痛處灸三七壯佳防風湯治身體四肢節解如墮脫腫按之皮陷頭眩短氣温温悶亂欲吐者方防風白术知母桂心各四兩芎藭芍藥杏仁甘草各三兩半夏生薑各五兩右十味㕮咀以水一斗煮取三升分四服日三夜一古今録驗方無半夏杏仁芎藭用附子二枚為八味羌活湯治中風身體疼痛四肢緩弱不遂及産後中風方羌活桂心芍藥葛根麻黄乾地黄各三兩甘草二兩生薑五兩右八味㕮咀以清酒三升水五升煮取三升温服五合日三服防已湯治風歴節四肢疼痛如槌鍜不可忍者方防已茯苓白术桂心生薑各四兩甘草三兩人參三兩烏頭七枚右八味㕮咀以苦酒一升水一斗煮取三升半一服八合日三夜一當覺焦熱痺忽忽然慎勿怪也若不覺復合服以覺乃止凡用烏頭皆去皮熬令黒乃堪用不然至毒人宜慎之千金翼不用苦酒治濕風體痛欲折肉如錐刀所刺方附子乾薑芍藥茯苓人參甘草桂心各二兩白术四兩右八味㕮咀以水八升煮取二升日三服一方去桂心用乾地黄二兩大棗湯治歴節疼痛方大棗十五枚附子一枚甘草一尺黄耆四兩生薑二兩麻黄五兩右六味㕮咀以水七升煮取三升毎服一升日三服犀角湯治熱毒流入四肢歴節腫痛方犀角二兩羚羊角一兩前胡黄芩梔子仁射干各三兩大黄升麻各四兩豉一升右九味㕮咀以水九升煮取三升去滓分三服治歴節諸風百節酸痛不可忍方松脂三十斤鍊五十遍酒煮十遍不能五十遍二十遍亦可鍊酥三升温和松脂三升熟攪令極調匀且空腹酒服方寸匕日三數數食麫粥為佳慎血腥生冷物酢果子百日已後瘥松節酒治歴節風四肢疼痛猶如解落方松節三十斤猪椒葉三十斤細剉各用水四石煮取一石右二味澄清合漬乾麴五斤候發以糯米四石五斗釀之依家醖法四酘勿令傷冷熱第一酘時下後諸藥栢子仁天雄萆薢芎藭各五兩秦芃六兩人參茵芋各四兩防風十兩磁石十一兩末獨活十二兩右十味㕮咀内飯中炊如常酘法酘足訖封頭四七日壓取清適性服之勿至醉吐石膏湯逐風毒方石膏雞子大三枚雞子二枚甘草一尺麻黄三兩杏仁四十枚右五味㕮咀以水三升破雞子内水中烊令相得内藥煮取一升服之覆取汗汗不出燒石熨取汗出為佳治歴節風方松膏一升酒三升浸七日毎服一合日再數劑愈又方松葉三十斤酒二石五斗漬三七日服一合日五六度備急千金要方卷二十六
