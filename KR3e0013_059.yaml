body:
  text: 備急千金要方卷五十九唐孫思邈撰宋林億等校正腎臟方腎臟脉論第一論曰腎主精腎者生來精靈之本也為後宫內官則為女主所以天之在我者德也地之在我者氣也德流氣薄而生者也故生來謂之精精者腎之藏耳者腎之官也腎氣通於耳耳和則能聞五音矣腎在竅為耳然則腎氣上通於耳下通於隂也左腎壬右腎癸循環𤣥宫上出耳門候聞四逺下回玉海俠脊左右與臍相當經於上焦榮於中焦衛於下焦外主骨內主膀胱腎重一斤一兩有兩枚神名㵱㵱主藏精號為精藏隨節應㑹故云腎藏精精舍志在氣為缺在液為唾腎氣虛則厥逆實則脹滿四肢正黑虛則使人夢見舟船溺人得其時夢伏水中若有畏怖腎氣盛則夢腰脊兩解不相屬厥氣客於腎則夢臨淵沒居水中凡腎藏象水與膀胱合為腑其經足少隂與太陽為表裏其脉沉相於秋王於冬冬時萬物之所藏百蟲伏蟄陽氣下陷隂氣上升陽氣中出隂氣冽而為霜遂不上升化為霜雪猛獸伏蟄蜾蟲匿藏其脉為沉沉為隂在裏不可發汗發之者如蜾蟲出見其霜雪隂氣在表陽氣在藏慎不可下下之者傷脾脾土弱即水氣妄行如魚出水蛾入湯重客在裏慎不可熏熏之逆客其息則喘無持客熱令口爛瘡隂脉且解血散不通正陽遂厥隂不往從客熱狂入內為結胸脾氣遂弱清溲痢通冬脉如營冬脉者腎也北方水也萬物之所以合藏也故其氣來沉以摶故曰營反此者病何如而反其氣來如彈石者此謂太過病在外其去如數者此謂不及病在中太過則令人解俠脊脉痛而少氣不欲言不及則令人心懸如病饑䏚中清脊中痛小腹滿小便變赤黃腎脉來喘喘纍纍如勾按之而堅曰平冬以胃氣為夲腎脉來如引葛按之益堅曰腎病腎脉來發如奪索辟辟如彈石曰腎死真腎脉至摶而絶如以指彈石辟辟然色黃黑不澤毛折乃死冬胃微石曰平石多胃少曰腎病但石無胃曰死石而有勾曰夏病勾甚曰金病凡人以水榖為本故人絶水榖則死脉無胃氣亦死所謂無胃氣者但得真藏脉不得胃氣也所謂脉不得胃氣者肝不弦腎不石也腎藏精精舍志盛怒不止則傷志志傷則善忘前言腰脊痛不可以俯仰屈伸毛悴色夭死於季夏足少隂氣絶則骨枯少隂者冬脉也伏行而濡滑骨髓者也故骨不濡則肉不能著骨也骨肉不相親即肉濡而却肉濡而却故齒長而垢髮無澤髮無澤者骨先死戊篤已死土勝水也腎死藏浮之堅按之亂如轉丸益下入尺中者死冬腎水王其脉沉濡而滑曰平反得微澀而短者是肺之乘腎母之歸子為虛邪雖病易治反得弦細而長者是肝之乘腎子之乘母為實邪雖病自愈反得大而緩者是脾之乘腎土之尅水為賊邪大逆十死不治反得浮大而洪者是心之乘腎火之陵水為微邪雖病即瘥左手關後尺中隂絶者無腎脉也若足下熱兩髀裏急精氣竭少勞倦所致刺足太陽治陽左手關後尺中隂實者腎實也若恍惚健忘目視􅉩􅉩耳聾悵悵善鳴刺足少隂治隂右手關後尺中隂絶者無腎脉也若足逆冷上搶胸痛夢入水見鬼善魘寐黑色物來掩人上刺足太陽治陽右手關後尺中隂實者腎實也若骨疼腰脊痛內寒熱刺足少隂治隂腎脉沉細而緊再至曰平三至曰離經病四至脫精五至死六至命盡足少隂脉也腎脉急甚為骨痿癲疾微急為奔豚沉厥足不收不得前後緩甚為折脊微緩為洞下洞下者食不化入咽還出大甚為隂痿微大為石水起臍下以至小腹腫垂垂然上至胃管死不治小甚為洞泄微小為消疸滑甚為癃㿗微滑為骨痿坐不能起目無所見視見黑花澀甚為大癰微澀為不月水沉痔腎脉摶堅而長其色黃而赤當病折腰其耎而散者當病少血黑脉之至也上堅而大有積氣在小腹與隂名曰腎痺得之沭浴清水而臥扁鵲曰腎有病則耳聾腎在竅為耳然則腎氣上通於耳五臟不和則九竅不通隂陽俱盛不得相營故曰關格關格者不得盡期而死也腎在聲為呻在變動為栗在志為恐恐傷腎精氣并於腎則恐藏主冬病在藏者取之井病先發於腎小腹腰脊痛脛痠一日之膀胱背膂筋痛小便閉二日上之心心痛三日之小腸脹四日不已死冬大晨夏晏晡病在腎夜半慧日乘四季甚下晡靜假令腎病中央若食牛肉及諸土中物得之不者當以長夏時發得病以戊巳日也凡腎病之狀必腹大脛腫痛喘咳身重寢汗出憎風寒即胸中痛大腹小腹痛清厥意不樂取其經足少隂太陽血者腎脉沉之而大堅浮之而大緊若手足骨腫厥而隂不興腰脊痛小腹腫心下有水氣時脹閉時泄得之浴水中身未乾而合房內及勞倦發之腎病其色黑其氣虛弱吸吸少氣兩耳苦聾腰痛時時失精飲食减少膝以下清其脉沉滑而遲此為可治宜服內補散建中湯腎氣丸地黃煎春當刺涌泉秋刺伏留冬刺隂谷皆補之夏刺然谷季夏刺太溪皆瀉之又當灸京門五十壯背第十四椎百壯邪在腎則骨痛隂痺隂痺者按之而不得腹脹腰痛大便難肩背頸項强痛時眩取之涌泉崑崙視有血者盡取之有所用力舉重若入房過度汗出如浴水則傷腎腎中風腎中寒腎水者其人腹大臍腫腰痛不得溺隂下濕如牛鼻頭汗其足逆寒大便反堅一云面反瘦腎脹者腹滿引背央央然腰髀一作痺痛腎著之病其人身體重腰中冷如氷狀一作如水洗狀一作如坐水中形如水狀反不渴小便自利食飲如故是其證也病屬下焦從身勞汗出衣裏冷濕故久久得之腎著之為病從腰以下冷腰重如帶五千錢診得腎積脉沉而急若脊與腰相引痛饑則見飽則減小腹裏急口乾咽腫傷爛目􅉩􅉩骨中寒主髓厥善忘色黑腎之積名曰奔豚發於小腹上至心下如豚奔走之狀上下無時久久不愈病喘逆骨痿少氣以夏丙丁日得之何也脾病傳腎腎當傳心心適以夏王王者不受邪腎復欲還脾脾不肯受因流結為積故知奔豚以夏得之腎病手足逆冷面赤目黃小便不禁骨節煩疼小腹結痛氣衝於心其脉當沉細而滑今反浮大其色當黑而反黃此是土之尅水為大逆十死不治羽音人者主腎聲也腎聲呻其音瑟其志恐其經足少隂厥逆太陽則榮衛不通隂陽翻祚陽氣內伏隂氣外升升則寒寒則虛虛則厲風所傷語言謇吃不轉偏枯腳偏跛蹇若在左則左腎傷在右則右腎傷其偏枯風體從鼻而分半邊至腳緩弱不遂口亦欹語聲混濁便利仰人耳偏聾塞腰背相引甚則不可治腎瀝湯主之方見别卷中又呻而好恚恚而善忘恍惚有所思此為土尅水陽擊隂隂氣伏而陽氣起起則熱熱則實實則怒怒則忘耳聽無聞四肢滿急小便赤黃語音口動而不出笑而看人此為邪熱傷腎甚則不可治若面黑黃耳不應亦可治腎病為瘧者令人悽悽然腰脊痛宛轉大便難目眴眴然身掉不定手足寒恆山湯主之方見别卷中若其人本來不吃忽然謇吃而好嗔恚反於常性此腎已傷雖未發覺已是其候見人未言而前開口笑還閉口不聲舉手柵腹一作把眼此腎病聲之候也虛實表裏浮沉清濁宜以察之逐以治之黑為腎腎合骨黑如烏羽者吉腎主耳耳是腎之餘其人水形相比於上羽黑色大頭曲面廣頥小肩大腹小手足發行搖身下尻長背延延也不敬畏善欺紿人戮死耐秋冬不耐春夏春夏感而生病主足少隂汙汙然耳大小髙下厚薄偏圓則腎應之正黑色小理者則腎小小即安難傷粗理者則腎大大則虛虛則腎寒耳聾或鳴汗出腰痛不得俯仰易傷以邪耳髙者則腎髙髙則實實則腎熱背急綴痛耳膿血出或生肉塞耳耳後陷者則腎下下則腰尻痛不可以俯仰為狐疝耳堅者則腎堅堅則腎不受病不病腰痛耳薄者則腎脆脆則傷熱熱則耳吼閙善病消疸耳好前居牙車者則腎端正端正則和利難傷耳偏髙者則腎偏欹偏欹則善腰尻偏痛凡人分部骨陷者必死不免俠膀胱并太陽為腎之部骨當其處陷也而藏氣通於內外部亦隨而應之沉濁為內浮清為外若色從外走內者病從外生部處起若色從內出外者病從內生部處陷內病前治隂後治陽外病前治陽後治隂陽主外隂主內凡人生死休否則藏神前變形於外人腎前病耳則為之焦枯若腎前死耳則為之黑敢黑焦癖若天中等分墓色應之必死不治看應增損斟酌賖促賖不出四百日內促則旬日之間腎病少愈而卒死何以知之曰黃黑色黶㸃如拇指應耳此必卒死腎絶四日死何以知之齒為暴黑面為正黑目中黃腰中欲折自汗出如流面黑目青一作白腎氣內傷病因留積八日當亡是死變也面黃目黑不死黑如炲死吉凶之色天中等分左右發色不正此是隂陽官位相法若不遭官事而應死也其人面目帶黃黑連耳左右年四十以上百日死若偏在一邊最凶必死兩邊有年上無三年之內禍必至矣冬水腎脉色黑主足少隂脉也少隂何以主腎曰腎者主隂隂水也皆生於腎此脉名曰太衝凡五十七穴冬取其井滎冬者水始治腎方閉陽氣衰少隂氣堅盛太陽氣伏沉陽脉乃去故取井以下隂氣逆取滎以通素問作實陽氣其脉本在內踝下二寸應舌下兩脉其脉根于涌泉涌泉在腳心下大拇指筋是其筋起於小指之下入足心並太隂之筋而邪走內踝之下結於踵與太陽之筋合而上結於內輔下並太隂之筋而上循隂股結於隂器循脊內俠膂上至項結於枕骨與太陽之筋合其脉起於小指之下斜趣足心出然骨之下循內踝之後别入跟中以上腨內出膕中內亷上股內後亷貫脊屬腎絡膀胱其直者從腎上貫肝鬲入肺中循喉嚨俠舌本其支者從肺出絡心注胸中合足太陽為表裏太陽本在跟以上五寸中同會于手太隂其足少隂之别名曰太鍾當踝後繞跟别走太陽其别者並經上走於心包下貫腰脊主腎生病病實則膀胱熱熱則閉癃癃則陽病陽脉反逆大於寸口再倍其病則口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛灸則强食而生災緩帶被髮大杖重履而步虛則膀胱寒寒則腰痛痛則隂脉反小於寸口其病則饑而不欲食面黑如炭色咳唾則有血喉鳴而喘坐而欲起目􅉩􅉩無所見心懸若病饑狀氣不足則善恐心惕惕若人將捕之是為骨厥冬三月者主腎膀胱黑骨溫病也其源從太陽少隂相摶藴積三焦上下壅塞隂毒內行臟腑受客邪之氣則病生矣其病相反若腑虛則為隂毒所傷裏熱外寒意欲守火而引飲或腰中痛欲折若臟實則為陽溫所損胸脅切痛類如刀刺不得動轉熱彭彭若服冷藥過差而便洞瀉故曰黑骨溫病也扁鵲曰灸肝脾腎三輸主治丹金毒黑溫之病當依源為理調臟理腑清濁之病不生也腎虛實第二脉法方灸腎實熱左手尺中神門以後脉隂實者足少隂經也病苦舌燥咽腫心煩嗌乾胸脅時痛喘咳汗出小腹脹滿腰背强急體重骨熱小便赤黃好怒好忘足下熱痛四肢黑耳聾名曰腎實熱也脉經云腎實熱者病苦膀胱脹閉小腹與腰脊相引痛也右手尺中神門以後脉隂實者足少隂經也病苦痺身熱心痛脊脅相引痛足逆熱煩名曰腎實熱也瀉腎湯治腎實熱小便脹滿四肢正黑耳聾夢腰脊離解及伏水等氣急方芒硝茯苓黃芩各三兩生地黃汁菖蒲各五兩磁石八兩碎如雀頭大黃切一升用水密器中宿漬𤣥參細辛各四兩甘草二兩右十味㕮咀以水九升煮七味取二升半去滓下大黃內藥汁中更煮減二三合去大黃內地黃汁微煎一兩沸下芒硝分為三服治腎熱好怒好忘耳聼無聞四肢滿急腰背轉動彊直方柴胡茯神外臺作茯苓黃芩澤瀉升麻杏仁大青芒硝各三兩淡竹葉地黃各切一升磁石四兩羚羊角一兩右十二味㕮咀以水一斗煮取三升去滓下芒硝分三服治腎熱小便黃赤不出出如梔子汁或如黃蘗汁每欲小便莖頭即痛方榆白皮切冬葵子各一升車前子切二升滑石八兩碎子芩通草瞿麥各三兩石韋四兩右八味㕮咀以水二斗先煮車前草取一斗去滓澄清取九升下諸藥煮取三升五合去滓分四服腎膀胱俱實左手尺中神門以後脉隂陽俱實者足少隂與太陽經俱實也病苦脊强反折戴眼氣上搶心脊痛不能自反側名曰腎與膀胱俱實也右手尺中神門以後脉隂陽俱實者足少隂與太陽經俱實也病苦癲疾頭重與目相引痛厥欲走反眼大風多汗名曰腎膀胱俱實也腎虛寒左手尺中神門以後脉隂虛者足少隂經也病苦心中悶下重足腫不可以按地名曰腎虛寒也右手尺中神門以後脉隂虛者足少隂經也病苦足脛小弱惡寒脉代絶時不至足寒上重下輕行不可按地小腹脹滿上搶胸痛引脅下名曰腎虛寒也治腎氣虛寒隂痿腰脊痛身重緩弱言音混濁陽氣頓絶方蓯蓉白术巴㦸天麥門冬茯苓甘草牛膝五味子杜仲各八兩車前子乾薑各五兩生乾地黃五斤右十二味治下篩食後酒服方寸匕日三治腎風虛寒方灸腎輸百壯對臍兩邊向後俠脊相去各一寸五分腎膀胱俱虛左手尺中神門以後脉隂陽俱虛者足少隂與太陽經俱虛也病苦小便利心痛背寒時時小腹滿名曰腎膀胱俱虛也右手尺中神門以後脉隂陽俱虛者足少隂與太陽經俱虛也病苦心痛若下重不自收纂反出時時苦洞泄寒中泄腎心俱痛名曰腎膀胱俱虛也腎勞第三論方論曰凡腎勞病者補肝氣以益之肝王則感於腎矣人逆冬氣則足少隂不藏腎氣沉濁順之則生逆之則死順之則治逆之則亂反順為逆是謂關格病則生矣梔子湯治腎勞實熱小腹脹滿小便黃赤末有餘瀝數而少莖中痛隂囊生瘡方梔子仁芍藥通草石韋各三兩石膏五兩滑石八兩子芩四兩生闕榆白皮淡竹葉切各一升右十味㕮咀以水一斗煮取三升去滓分三服麻黃根粉治腎勞熱隂囊生瘡方麻黃根石硫黃各三兩米粉五合右三味治下篩安絮如常用粉法搭瘡上粉濕更搭之治腎勞熱妄怒腰脊不可俯仰屈伸煮散方丹參牛膝葛根杜仲乾地黃甘草猪苓各二兩半茯苓逺志子芩各一兩十八銖五加皮石膏各三兩羚羊角生薑橘皮各二兩淡竹葉鴨子大右十六味治下篩為粗散以水三升煮兩方寸匕帛裹之時用動取八合為一服日二服治虛勞隂陽失度傷筋損脉噓吸短氣漏溢泄下小便赤黃隂下濕癢腰脊如折顔色隨落方隨一作墮萆薢棗肉生地黃桂心杜仲麥門冬各一斤右六味㕮咀以酒一斗五升漬三宿出曝乾復漬如此候酒盡取乾治下篩食後酒服方寸匕日三治腎勞虛冷乾枯憂恚內傷久坐濕地則損腎方秦芁牛膝芎藭防風桂心獨活茯苓各四兩乾闕一作乾闕麥門冬地骨皮各三闕兩闕各五兩石斛六兩闕五加皮十兩薏苡仁一兩大麻子二升右十七味㕮咀以酒四斗漬七日每服七合日二服精極第四論法方灸論曰凡精極者通治五臟六腑之病候也若五臟六腑衰則形體皆極眼視而無明齒焦而髮落身體重則腎水生耳聾行步不正凡陽邪害五臟隂邪損六腑陽實則從隂引陽隂虛則從陽引隂若陽病者主髙髙則實實則熱眼視不明齒焦髮脫腹中滿滿則歷節痛痛則宜瀉於內若隂病者主下下則虛虛則寒身體重則腎水生耳聾行步不正邪氣入內行於五臟則咳咳則多涕唾面腫氣逆邪氣逆於六腑淫虛厥於五臟故曰精極也所以形不足溫之以氣精不足補之以味善治精者先治肌膚筋脉次治六腑若邪至五臟已半死矣扁鵲曰五隂氣俱絶不可治絶則目系轉轉則目精奪為志先死逺至一日半日非醫所及矣宜須精研以表治裏以左治右以右治左以我治彼疾皆瘥矣竹葉黃芩湯治精極實熱眼視無明齒焦髮落形衰體痛通身虛熱方竹葉切二升黃芩茯苓各三兩甘草麥門冬大黃各二兩生薑六兩芍藥四兩生地黃切一升右九味㕮咀以水九升煮取三升去滓分三服治精極五臟六腑俱損傷虛熱遍身煩疼骨中㾓痛煩悶方生地黃汁二升麥門冬汁赤蜜各一升竹瀝一合石膏八兩人參芎藭桂心甘草黃芩麻黃各三兩當歸四兩右十二味㕮咀以水七升先煮八味取二升去滓下地黃等汁煮取四升分四服日三夜一治五勞六極虛羸心驚尫弱多魘忘湯方茯苓四兩甘草芍藥桂心乾薑各三兩大棗五枚逺志人參各二兩右八味㕮咀以水八升煮取三升分三服治虛勞少精方鹿角為末白蜜和丸如梧子大每服七丸日三服十日大效又方漿水煮蒺藜子令熟取汁洗隂二十日大效棘刺圓治虛勞諸氣不足夢泄失精方棘刺乾薑莵絲子各二兩天門冬烏頭小草防葵薯蕷萆薢細辛石龍芮枸杞子巴㦸天萎蕤石斛厚朴牛膝桂心各一兩右十八味為末蜜丸如梧子大酒服五丸日二服深師方以蜜雜雞子白各半和丸若患風痿痺氣體不便熱煩滿少氣痟渴加萎蕤天門冬莵絲子身黃汗小便赤黃不利加石龍芮枸杞子關節腰背痛加萆薢牛膝寒中氣脹時泄數唾吐嘔加厚朴乾薑桂心隂囊下濕精少小便餘瀝加石斛以意增之古今録驗以乾地黃代乾薑以麥門冬代天門冬以杜仲代薯蕷以柏子仁代枸杞子以蓯蓉代萎蕤用治男子百病小便過多失精治夢中泄精尿後餘瀝及尿精方人參麥門冬赤石脂逺志續斷鹿茸各一兩半柏子仁丹參韭子各一兩六銖茯苓龍齒磁石蓯蓉各二兩乾地黃三兩右十四味為末蜜丸如梧子大酒服二十丸日再稍加至三十丸治虛損小便白濁夢泄方莵絲子車前子韭子各一升礬石當歸各二兩附子芎藭各三兩桂心一兩右八味為末蜜丸如梧子大酒服五丸日三又方大棗五十枚韭子五合黃耆人參甘草乾薑當歸龍骨半夏芍藥各二兩右十味為末蜜丸如梧子大酒服五丸日三服韭子圓治房室過度精泄自出不禁腰背不得屈伸食不生肌兩腳苦弱方韭子一升甘草桂心紫石英禹餘糧逺志山茱茰當歸天雄紫菀薯蕷細辛茯苓殭蠶菖蒲人參杜仲白术乾薑芎藭附子石斛天門冬各一兩半蓯蓉黃耆莵絲子乾地黃蛇床子各二兩大棗五十枚牛髓乾漆各四兩右三十一味為末牛髓合白蜜棗膏合搗三千杵空腹服如梧子大十五丸日再可加至二十丸韭子散治小便失精及夢泄精方韭子麥門冬各一升莵絲子車前子各二合芎藭二兩白龍骨三兩右六味治下篩酒服方寸匕日三不止稍增甚者夜一服肘後用澤瀉一兩半棗仁湯治大虛勞夢泄精莖核微弱血氣枯竭或醉飽傷於房室驚惕忪悸小腹裏急方棗核仁二合澤瀉人參芍藥桂心各一兩黃耆甘草茯苓白龍骨牡蠣各二兩生薑二斤半夏一斤右十二味㕮咀以水九升煮取四升一服七合日三若不能食小腹急加桂心六兩治夢泄失精方韭子一升治下篩酒服方寸匕日再服立效治虛勞尿精方韭子一升稻米二升右以水一斗七升煮如粥取汁六升為三服精溢同此又方石榴皮外臺作柘白皮桑白皮切各五合右二味以酒五升煮取三升分三服又方乾膠三兩為末以酒二升和分三服溫服瘥止一方用鹿角膠又方新韭子二升十月霜後採者用好酒八合漬一宿明旦日色好童子向南搗一萬杵平旦溫酒五合服方寸匕日再禁精湯治失精羸瘦痠削少氣目視不明惡聞人聲方韭子二升粳米一升右二味於銅器中合熬米黃黑及熱以好酒一斗投之絞取汁七升每服一升日三盡二劑羊骨湯治失精多睡目􅉩􅉩方羊骨一具飴糖半斤生地黃白术各三斤大棗二十枚桑白皮厚朴阿膠各一兩麥門冬人參芍藥生薑甘草各三兩茯苓四兩桂心八兩右十五味㕮咀以水五斗煮羊骨去骨取汁三斗煮藥取八升湯成下膠飴令煬平旦服一升後旦服一升灸法虛勞尿精灸第七椎兩傍各三十壯又灸第十椎兩傍各三十壯又灸第十九椎兩傍各二十壯又灸陽陵泉隂陵泉各隨年壯夢泄精灸三隂交二七壯夢斷神良內踝上大脉並四指是丈夫夢失精及男子小便濁難灸腎輸百壯男子隂中疼痛溺血精出灸裂缺三十壯失精五臟虛竭灸屈骨端五十壯隂上橫骨中央宛曲如却月中央是也此名橫骨男子虛勞失精隂上縮莖中痛灸大赫三十壯穴在屈骨端三寸男子虛勞失精隂縮灸中封五十壯男子腰脊冷疼溺多白濁灸脾募百壯男子失精膝脛疼痛冷灸曲泉百壯穴在膝內屈文頭骨極第五論法方灸論曰骨極者主腎也腎應骨骨與腎合又曰以冬遇病為骨痺骨痺不巳復感於邪內舍於腎耳鳴見黑色是其候也若腎病則骨極牙齒苦痛手足㾓疼不能久立屈伸不利身痺腦髓痠以冬壬癸日中邪傷風為腎風風歷骨故曰骨極若氣隂隂則虛虛則寒寒則面腫垢黑腰脊痛不能久立屈伸不利其氣衰則髮墮齒槁腰背相引而痛痛甚則咳唾甚若氣陽陽則實實則熱熱則面色炲隱曲膀胱不通牙齒腦髓苦痛手足痠㾓耳鳴色黑是骨極之至也須精别隂陽審其清濁知其分部視其喘息善治病者始於皮膚筋脉即須治之若入臟腑則半死矣扁鵲曰骨絶不治㾓而切痛伸縮不得十日死骨應足少隂少隂氣絶則骨枯髮無澤骨先死矣三黃湯治骨極主腎熱病則膀胱不通大小便閉塞顔色枯黑耳鳴虛熱方大黃切别漬水一升黃芩各三兩梔子十四枚甘草一兩芒硝二兩右五味㕮咀以水四升先煮黃芩梔子甘草取一升五合去滓下大黃又煮兩沸下芒硝分三服灸法腰背不便筋攣痺縮虛熱閉塞灸第二十一椎兩邊相去各一寸五分隨年壯小便不利小腹脹滿虛乏灸小腸輸隨年壯骨虛實第六論法方灸論曰骨虛者痠疼不安好倦骨實者苦煩熱凡骨虛實之應主於腎膀胱若其臟腑有病從骨生熱則應臟寒則應腑虎骨酒治骨虛酸疼不安好倦主膀胱寒方虎骨一具通炙取黃焦汁盡碎如雀頭大釀米三石麴四斗水三石如常釀酒法所以加水麴者其骨消麴而飲水所以加之也酒熟封頭五十日開飲之治骨實苦酸疼煩熱煎方葛根汁生地黃汁赤蜜各一升麥門冬汁五合右四味相和攪調微火上煎三四沸分三服治骨髓中疼方虎骨四兩芍藥一斤生乾地黃五斤右三味㕮咀以清酒一斗漬三宿曝乾復入酒中如此取酒盡為度搗篩酒服方寸匕日三治骨髓冷疼痛方取地黃汁一石酒二斗相攪重煎溫服日三補髓又方灸上亷七十壯三里下三寸是穴治虛勞冷骨節疼痛無力方豉二斤地黃八斤右二味兩度蒸曝乾為散食後以酒一升進二方寸匕日再服亦治虛熱又方天門冬為散酒服方寸匕日三一百日取瘥腰痛第七論針方灸法導引法論曰凡腰痛有五一曰少隂少隂腎也十月萬物陽氣皆衰是以腰痛二曰風痺風寒著腰是以腰痛三曰腎虛役用傷腎是以腰痛四曰䐴腰墜墮傷腰是以腰痛五曰取寒眠地為地氣所傷是以腰痛痛不止引牽腰脊皆痛杜仲酒治腎脉逆小於寸口膀胱虛寒腰痛胸中動通四時用之方杜仲乾薑各四兩一云乾地黃萆薢羌活天雄蜀椒桂心芎藭防風秦芁烏頭細辛各三兩五加皮石斛各五兩栝蔞根地骨皮續斷桔梗甘草各一兩右十九味㕮咀以酒四斗漬四宿初服五合加至七八合日再通治五種腰痛又方桑寄生牡丹皮鹿茸桂心右四味各等分治下篩酒服方寸匕日三又方單用鹿茸與角亦愈治腎虛腰痛方萆薢桂心白术各三分牡丹皮二分右四味治下篩酒服方寸匕日三亦可作湯服之甚良又方附子二分桂心牡丹皮各半兩右三味治下篩酒服一刀圭日再甚驗腎著湯腎著之為病其人身體重腰冷如水洗狀不渴小便自利食飲如故是其證也從作勞汗出衣裏冷濕久久得之腰以下冷痛腹重如帶五千錢者方古今録驗名甘草湯甘草二兩乾薑三兩茯苓白术各四兩右四味㕮咀以水五升煮取三升分三服腰中即溫腎著散方杜仲桂心各三兩甘草澤瀉牛膝乾薑各二兩白术茯苓各四兩右八味治下篩為粗散一服三方寸匕酒一升煮五六沸去滓頓服日再治腰疼不得立方甘遂桂心一作附子杜仲人參各二兩右四味治下篩以方寸匕內羊腎中炙令熟服之治腰痛方萆薢杜仲枸杞根各一斤右三味㕮咀好酒三斗漬之內罌中密封頭於銅器中煮一日服之無節度取醉杜仲圓補之之方杜仲一兩石斛二分乾薑乾地黃各三分右四味為末蜜丸如梧子大酒服二十丸日再丹參圓治腰痛并冷痺方丹參杜仲牛膝續斷各三兩桂心乾薑各二兩右六味為末蜜丸如梧子每服二十丸日再夜一禁如藥法獨活寄生湯腰背痛者皆是腎氣虛弱臥冷濕當風得之不時速治喜流入腳膝或為偏枯冷痺緩弱疼重若有腰痛攣腳重痺急宜服之方見别卷中治腰脊苦痛不遂方大豆三斗熬一斗煮一斗蒸一斗酒六斗甕一口蒸令極熱豆亦熱內甕中封閉口秋冬二七日於甕口作孔出取服五合日夜二三服又方地黃花為末酒服方寸匕日三又方鹿角去上皮取白者熬令黃為末酒服方寸匕日三特禁生魚餘不禁新者良陳者不佳服角心中黃處亦不中服大神良又方羊腎為末酒服二方寸匕日三又方三月三日收桃花取一斗一升井花水三斗麴六升米六升炊之一時釀熟去糟每服一升日三服若作食飲用河水禁如藥法神良治丈夫腰腳冷不隨不能行方上醇酒三斗水三斗合著甕中溫漬腳至膝三日止冷則甕下常著灰火勿使冷手足煩者小便三升盆中溫漬手足腰䐴痛導引法正東坐收手抱心一人於前據躡其兩膝一人後捧其頭徐牽令偃臥頭到地三起三臥止便瘥針灸法腰䐴痛宜針決膝腰句畫中青赤路脉出血便瘥腰痛不得俯仰者令患人正立以竹柱地度至臍斷竹乃以度度背脊灸竹上頭處隨年壯灸訖藏竹勿令人得知腰痛灸腳跟上橫文中白肉際十壯良又灸足巨陽七壯巨陽在外踝下又灸腰目窖七壯在尻上約左右是又灸八窖及外踝上骨約中腰卒痛灸窮骨上一寸七壯左右一寸各灸七壯備急千金要方卷五十九
