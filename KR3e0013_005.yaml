body:
  text: 備急千金要方卷五唐孫思邈撰宋林億等校正婦人方惡露第十四方乾地黃湯治産後惡露不盡除諸疾補不足之方乾地黃三兩芎藭桂心黃耆當歸各二兩人參防風茯苓細辛芍藥甘草各一兩右十一味㕮咀以水一斗煮取三升去滓分三服日再夜一桃仁湯治産後往來寒熱惡露不盡方桃仁五兩吳茱萸二升黃耆當歸芍藥各三兩生薑醍醐百錬酥柴胡各八兩右八味㕮咀以酒一斗水二升合煮取三升去滓適寒溫先食服一升日三澤蘭湯治産後惡露不盡腹痛不除小腹急痛痛引腰背少氣力方澤蘭當歸生地黃各二兩甘草一兩半生薑三兩芍藥一兩大棗十枚右七味㕮咀以水九升煮取三升去滓分三服日三墮身欲死服亦瘥甘草湯治産乳餘血不盡逆搶心胸手足逆冷脤乾腹脹短氣方甘草芍藥桂心阿膠各三兩大黃四兩右五味㕮咀以東流水一斗煮取三升去滓內阿膠令煬分三服一服入腹中面即有顔色一日一夜盡此三升即下腹中惡血一二升立瘥當養之如新産者大黃湯治産後惡露不盡方大黃當歸甘草生薑牡丹芍藥各三兩吳茱萸一升右七味㕮咀以水一斗煮取四升去滓分四服一日令盡加人參二兩名人參大黃湯柴胡湯治産後往來寒熱惡露不盡方柴胡生薑各八兩桃仁五十枚當歸黃耆芍藥各三兩吳茱萸二升右七味㕮咀以水一斗三升煮取三升去滓先食服一升日三千金翼以清酒一斗煮蒲黃湯治産後餘疾有積盡不去腹大短氣不得飲食上衝胸脅時時煩憒逆滿手足悁疼胃中結熱方蒲黃半兩大黃芒硝甘草黃芩各一兩大棗三十枚右六味㕮咀以水五升煮取一升清朝服至日中下若不止進冷粥半盞即止若不下與少熱飲自下人羸者半之千金翼名大黃湯而不用芒硝銅鏡鼻湯治産後餘疾惡露不除積聚作病血氣結搏心腹疼痛方銅鏡鼻十八銖燒末大黃二兩半芍藥乾地黃芎藭乾漆芒硝各二兩亂髮雞子火燒大棗三十枚右九味㕮咀以水七升煮取二升二合去滓內髮灰鏡鼻末分三服小銅鏡鼻湯治如前狀方銅鏡鼻十銖燒末大黃甘草黃芩芒硝乾地黃各二兩桃仁五十枚右七味㕮咀以酒六升煮取三升去滓內鏡鼻末分三服亦治遁尸心腹及三十六尸疾梔子湯治産後兒生處空流血不盡小腹絞痛方梔子三十枚以水一斗煮取六升內當歸芍藥各二兩蜜五合生薑五兩羊脂一兩於梔子汁中煎取二升分三服日三生地黃湯治産後三日至七日腹中餘血未盡絞痛强滿氣息不通方生地黃五兩生薑三兩大黃芍藥茯苓細辛桂心當歸甘草黃芩各一兩半大棗二十枚右十一味㕮咀以水八升煮取二升半去滓分三服日三大黃乾漆湯治新産後有血腹中切痛方大黃乾漆乾地黃桂心乾薑各二兩右五味㕮咀以水三升清酒五升煮取三升去滓溫服一升血當下若不瘥明旦服一升滿三服病無不瘥麻子酒治産後血不去方麻子五升搗以酒一斗漬一宿明旦去滓溫服一升先食服不瘥夜服一升不吐下忌房事一月將養如初産法升麻湯治産後惡物不盡或經一月半歲一歲方升麻三兩以清酒五升煮取二升去滓分再服當吐下惡物勿怪良治産後惡血不盡腹中絞刺痛不可忍方大黃黃芩桃仁各三兩桂心甘草當歸各二兩芍藥四兩生地黃六兩右八味㕮咀以水九升煮取二升半去滓食前分三服治産後漏血不止方露蜂房敗船茹右二味等分作灰取酪若漿服方寸匕日三又方大黃三兩芒硝一兩桃仁水蛭虻蟲各三十枚甘草當歸各二兩􅟟蟲四十枚右八味㕮咀以水三升酒一升合煮取三升去滓分三服當下血又方桂心蠐螬各二兩栝蔞根牡丹各三兩䜴一升右五味㕮咀以水八升煮取三升去滓分三服治産後血不可止者方乾菖蒲三兩以清酒五升漬煮取三升分再服即止治産後惡血不除四體並惡方續骨木二十兩破如算子大以水一斗煮取三升分三服相去如人行十里久間食粥或小便數或惡血下即瘥此木得三遍煮治産後下血不盡煩悶腹痛方羚羊角燒成灰刮取三兩芍藥二兩熬令黃枳實一兩細切熬令黃右三味治下篩煮水作湯服方寸匕日再夜一稍加至二匕又方鹿角燒成灰搗篩煮䜴汁服方寸匕日三夜再稍加至二匕不能用䜴清煮水作湯服之又方搗生藕取汁飲二升甚驗又方生地黃汁一升酒三合和溫頓服之又方赤小豆搗散取東流水和服方寸匕不瘥更服治産後血􅛎痛方古鐵一斤稱鎚斧頭鐵杵亦得炭火燒令赤內酒五升中稍稍服之神妙治婦人血􅛎心腹積聚乳餘疾絶生小腹堅滿貫臍中熱腰背痛小便不利大便難不下食有伏蟲臚脹癰疽腫久寒留熱胃管有邪氣方半夏一兩六銖石膏藜蘆牡蒙蓯蓉各十八銖桂心乾薑各一兩烏喙半兩巴豆六十枚研如膏右九味為末蜜丸如小豆服二丸日三及治男子疝病治婦人血瘕痛方乾薑烏賊魚骨各一兩右二味治下篩酒服方寸匕日三又方末桂心溫酒服方寸匕日三下痢第十五方膠蠟湯治産後三日內下諸雜五色痢方阿膠黃蘗各一兩蠟如棊子三箇當歸一兩半黃連二兩陳廪米一升右六味㕮咀以水八升煮米蟹目沸去米內藥煮取二升去滓內膠蠟令煬分四服一日令盡桂蜜湯治産後餘寒下痢便膿血赤白日數十行腹痛時時下血方桂心甘草各二兩乾薑二兩附子一兩蜜一升當歸三兩赤石脂十兩右七味㕮咀以水六升煮取三升去滓內蜜煎一兩沸分三服日三治産後下赤白腹中絞痛湯方芍藥乾地黃各五兩甘草阿膠艾葉當歸各二兩右六味㕮咀以水七升煮取二升半去滓內膠令煬分三服治産後赤白下久不斷身面悉腫方大豆微熬小麥蒲黃各一升吳茱萸半升右四味以水九升煮取三升去滓分三服此方神驗亦可以水五升酒一斗煎取四升分四服治産後痢赤白心腹刺痛方薤白一兩當歸二兩酸石榴皮三兩地榆根四兩粳米五合右五味㕮咀以水六升煮取二升半去滓分三服必效方加厚朴一兩阿膠人參甘草黃連各一兩半當歸湯治産後下痢赤白腹痛方當歸龍骨各三兩乾薑白术各二兩芎藭二兩半甘草白艾熟者附子各一兩右八味㕮咀以水六升煮取二升去滓分三服一日令盡白頭翁湯治産後下痢兼虛極方白頭翁阿膠秦皮黃連甘草各二兩黃蘗三兩右六味㕮咀以水七升煮取二升半去滓內膠令煬分三服日三鱉甲湯治産後早起中風冷泄痢及帶下方鱉甲如手大當歸黃連乾薑各二兩黃蘖長一尺廣三寸右五味㕮咀以水七升煮取三升去滓分三服日三千金翼加白頭翁一兩龍骨圓治産後虛冷下血及穀下晝夜無數兼治産後惡露不斷方龍骨四兩乾薑甘草桂心各二兩右四味為末蜜和暖酒服二十丸如梧子日三一方用人參地黃各二兩阿膠圓治産後虛冷洞下心腹絞痛兼泄㵼不止方阿膠四兩人參甘草龍骨桂心乾地黃白术黃連當歸附子各二兩右十味為末蜜丸如梧子溫酒服二十丸日三澤蘭湯治産後餘疾寒下凍膿裏急胸脅滿痛咳嗽嘔血寒熱小便赤黃大便不利方澤蘭石膏各二十四銖當歸甘草厚朴各十八銖逺志三十銖藁本芎藭各十五銖乾薑人參桔梗乾地黃各十二銖白术蜀椒白芷柏子仁防風山茱萸細辛各九銖桑白皮麻子仁各半升右二十一味㕮咀以水一斗五升先內桑白皮煮取七升半去之內諸藥煮取三升五合去滓分三服乾地黃湯治産後下痢方乾地黃二兩白頭翁黃連各一兩蜜蠟一方寸阿膠如手掌大一枚右五味㕮咀以水五升煮取二升半去滓內膠蠟令煬分三服日三千金翼用乾薑一兩生地黃湯治産後忽著寒熱下痢方生地黃五兩甘草黃連桂心各一兩大棗二十枚赤石脂二兩淡竹葉二升一作竹皮右七味㕮咀以水一斗煮竹葉取七升去滓內藥煮取二升半分三服日三藍青圓治産後下痢方藍青熬附子鬼臼蜀椒各一兩半厚朴阿膠甘草各二兩艾葉龍骨黃連當歸各三兩黃蘗茯苓人參各一兩右十四味為末蜜和丸如梧子每服二十丸空腹飲下一方用赤石脂四兩赤石脂圓治産後虛冷下痢方赤石脂三兩當歸白术黃連乾薑秦皮甘草各二兩蜀椒附子各一兩右九味為末蜜和丸如梧子酒服二十丸日三千金翼作散空腹飲服方寸匕赤散治産後下痢方赤石脂代赭各三兩桂心一兩右三味治下篩酒服方寸匕日三十日愈黑散治産後下痢方麻黃貫衆桂心各一兩甘草乾漆各三兩細辛二兩右六味治下篩酒服五撮日再五日愈麥粥下尤佳黃散治産後下痢方黃連二兩黃芩䗪蟲乾地黃各一兩右四味治下篩酒服方寸匕日三十日愈龍骨散治産後痢方五色龍骨代赭赤石脂黃蘗根皮蜜灸令焦艾各一兩半黃連二兩右六味治下篩飲服方寸匕日三淋渴第十六栝蔞湯治産後小便數兼渴方栝蔞根麥門冬甘草黃連各二兩人參生薑各三兩大棗十五枚桑螵蛸二十枚右八味㕮咀以水七升煮取二升半分三服又方治産後渴不止方栝蔞根四兩人參麥門冬各三兩甘草崔氏不用乾地黃各二兩大棗二十枚土瓜根五兩崔氏用蘆根右七味㕮咀以水一斗二升煮取六升分六服雞肶胵湯治産後小便數方雞肶胵二三具雞腸三具洗乾地黃當歸甘草各二兩麻黃四兩厚朴人參各三兩生薑五兩大棗二十枚右十味㕮咀以水一斗煮肶胵及腸大棗取七升去滓內諸藥煎取三升半分三服治婦人結氣成淋小便引痛上至小腹或時溺血或如豆汁或如膠飴每發欲死食不生肌面目萎黃師所不能治方具齒四枚燒作末葵子一升石膏五兩碎滑石二兩末右四味以水七升煮二物取二升去滓內二末及猪脂一合更煎三沸分三服日三不瘥再合服石韋湯治産後卒淋氣淋血淋石淋方石韋黃芩通草甘草各二兩榆皮五兩大棗三十枚葵子二升白术産寶用芍藥生薑各三兩右九味㕮咀以水八升煮取一升半分三服集驗無甘草生薑崔氏同産寶不用薑棗葵根湯治産後淋澀方葵根二兩車前子亂髮燒灰大黃桂心滑石各一兩通草三兩生薑六兩冬瓜練七合作汁右九味㕮咀以水七升煮取二升半分三服千金翼不用冬瓜練茅根湯治産後淋方白茅根一斤瞿麥茯苓各四兩地脉人參各二兩生薑三兩桃膠甘草各一兩鯉魚齒一百枚右九味㕮咀以水一斗煮取二升半分三服滑石散治産後淋方滑石五兩通草車前子葵子各四兩右四味治下篩酢漿水服方寸匕稍加至二匕竹葉湯治産後虛渴少氣力方竹葉三升生薑半夏各三兩大棗十四枚小麥五合甘草茯苓人參各一兩麥門冬五兩右九味㕮咀以水九升煮竹葉小麥取七升去滓內諸藥更煎取二升半一服五合日三夜一雜治第十七方法灸治婦人勞氣食氣胃滿吐逆其病頭重結痛小便赤黃大下氣方烏頭黃芩巴豆各半兩半夏三兩大黃八兩戎鹽一兩半䗪蟲桂心苦參各十八銖人參消石各一兩右十一味為末以蜜青牛膽拌和搗三萬杵丸如梧子宿不食酒服五丸安卧須臾當下下黃者小腹積也青者疝也白者內風也如水者留飲也青如粥汁膈上邪氣也血如腐肉者傷也赤如血者乳餘疾也如蟲刺者蠱也既下必渴渴飲粥饑食酥糜三日後當溫食食必肥濃三十日平復亦名破積烏頭丸主心腹積聚氣悶脹疝瘕內傷瘀血産乳餘疾及諸不足竹茹湯治婦人汗血吐血尿血下血方竹茹二升人參芍藥桔梗芎藭當歸甘草桂心各一兩乾地黃四兩右九味㕮咀以水一斗煮取三升分三服治婦人自少患風頭疼眼眩方石南一方用石韋細辛天雄茵芋各二兩薯蕷防風貫衆獨活蘼蕪各四兩乾薑山茱萸各三兩右十一味㕮咀以酒三斗漬五日初飲二合日三服後稍稍加之治婦人經服硫黃丸忽患頭痛項冷冷歇又心胸煩熱眉骨眼眥癢痛有時生瘡喉中乾燥四體痛癢方栝蔞根麥門冬龍膽各三兩大黃二兩杏仁二升土瓜根八兩右六味為末蜜丸如梧子大飲服十枚日三後漸加之治婦人患癖按時如有三五箇而作水聲殊不得寢食常心悶方牽牛子三升治下篩飲服方寸匕日一服三十服後可服好硫黃一兩治婦人忽與鬼交通方松脂二兩雄黃一兩末右二味先煬松脂乃內雄黃末以虎爪攪令相得藥成取如雞子中黃夜卧以煮燻籠中燒令病人取自升其上以被自覆惟出頭勿令過熱及令氣得泄也厚朴湯治婦人下焦勞冷膀胱腎氣損弱白汁小便俱出厚朴如手大長四寸以酒五升煮兩沸去滓取桂一尺為末內汁中調和一宿勿食旦頓服之溫經湯治婦人小腹痛方茯苓六兩土瓜根芍藥各三兩薏苡仁半斤右四味㕮咀以酒三升漬一宿旦加水七升煎取二升分再服半夏厚朴湯治婦人胸滿心下堅咽中帖帖如有炙肉臠吐之不出咽之不下方半夏一升厚朴三兩茯苓四兩生薑五兩蘇葉二兩右五味㕮咀以水七升煮取四升分四服日三夜一不瘥頓服一方無蘇葉生薑治婦人氣方平旦服烏牛尿日一止昆布圓治婦人胸中伏氣方昆布海藻芍藥桂心白石英欵冬花桑白皮人參各二兩柏子仁茯苓鍾乳各二兩半紫菀甘草各一兩乾薑一兩六銖吳茱萸五味子細辛各一兩半杏仁百枚橘皮蘇子各五合右二十味為末蜜和丸如梧子酒服二十丸日再加至四十丸治婦人無故憂恚胸中迫塞氣不下方芍藥滑石黃連石膏山茱萸前胡各一兩六銖大黃麥門冬細辛生薑各一兩半夏十八銖桂心半兩右十二味為末蜜丸如梧子酒服二十丸加至三十丸日三服治婦人斷産方蠶子故紙方一尺燒為末酒服之終身不産又方油煎水銀一日勿息空肚服棗一枚永斷不損人治勞損産後無子隂中冷溢出子門閉積年不瘥身體寒冷方防風一兩半桔梗三十銖人參一兩菖蒲半夏丹參厚朴乾薑紫菀杜蘅各十八銖秦芁白斂牛膝沙參各半兩右十四味為末白蜜和丸如小豆食後服十五丸日三服不知增至二十丸有娠止夫不在勿服之服藥後七日方合隂陽五加酒治産後癖瘦玉門冷方五加皮枸杞子各二升蛇牀子一升杜仲各一升乳牀半斤乾地黃丹參各二兩乾薑三兩天門冬四兩右九味㕮咀以絹袋子盛酒三斗漬三宿一服五合日再稍加至十合佳治子門閉血聚腹中生肉癥藏寒所致方乾漆半斤生地黃汁三升生牛膝汁一斤右三味先搗漆為散內汁中攪微火煎為丸如梧子大酒服三丸日再若覺腹中痛食後服之治産後勞玉門開而不閉方硫黃四兩吳茱萸一兩半菟絲子一兩六銖蛇牀子一兩右四味為散以水一升煎二方寸匕洗玉門日再洗治産後隂道開而不閉方石灰一斗熬令燒草以水二斗投之適寒溫入汁中坐漬之須臾復易坐如常法此方已效千金不傳黃芩散治婦人隂脫方黃芩蝟皮當歸各半兩芍藥一兩牡蠣竹皮各二兩半狐莖一具千金翼用松皮右七味治下篩飲服方寸匕日三禁舉重房勞冷食硫黃散治同前硫黃烏澤魚骨各半兩五味子三銖右三味治下篩以粉其上良日再三粉之當歸散治同前當歸黃芩各二兩蝟皮半兩牡蠣二兩半芍藥一兩六銖右五味治下篩酒服方寸匕日三服禁舉重良治産後隂下脫方蛇床子一升布裹炙尉之亦治産後隂中痛又方燒人屎為末酒服方寸匕日三又方燒敝帚頭為灰酒服方寸匕又方鱉頭五枚燒末以井花水服方寸匕日三又方皂莢半兩半夏大黃細辛各十八銖蛇床子三銖右五味治下篩用薄絹囊盛大如指內隂中日二易即瘥又方吳茱萸蜀椒各一升戎鹽如雞子大右三味皆熬令變色為末以綿裹如半雞子大內隂中日一易二十日瘥治婦人隂下脫若脫肛方羊脂煎訖適冷暖取塗上以鐵精傅脂上多少令調以火灸布令暖尉肛上漸推內之然後末磁石酒服方寸匕日三治隂下挺出方蜀椒廣濟方不用烏頭白芨各半兩右三味治末以方寸匕綿裹內隂中入三寸腹中熱易之日一度明旦乃復著七日愈當歸湯治産後臟中風冷隂腫痛方當歸獨活白芷地榆各三兩敗醬千金翼不用礬石各二兩右六味以水一斗半煮取五升適冷暖稍稍洗隂日三又方熟搗桃仁傅之良日三度灸法月水不利賁豚上下并無子灸四滿三十壯穴在丹田兩邊相去各湯升半丹田在臍下二寸是也婦人胞落頽灸臍中三百壯又灸身交五十壯三報在臍下橫文中又灸背脊當臍五十壯又灸五泉五十壯三報又灸龍門二十壯三報在玉泉下女人隂內外之際此穴卑今廢不針灸婦人胞下垂注隂下脫灸俠玉泉三寸隨年壯三報婦人隂冷腫痛灸歸來三十壯三報俠玉泉五寸是其穴婦人欲斷産灸右踝上一寸二壯即斷備急千金要方卷五
