body:
  text: 備急千金要方卷五十七唐孫思邈撰宋林億等校正大腸腑方大腸腑脉論第一論曰大腸腑者主肺也鼻柱中央是其候也肺合氣於大腸大腸者為行道傳寫之腑也號監倉椽重二斤十二兩長一丈二尺廣六寸當臍右回疊積還反十二曲貯水榖一斗二升主十二時定血脉和利精神千金明堂外臺同難經云長二丈一尺大四寸徑一寸之少半十六曲盛榖一斗水七升半鼻遂以長以候大腸右手關前寸口陽絶者無大腸脉也若少氣心下有水氣立秋節即咳刺手太隂治隂在魚際間右手關前寸口陽實者大腸實也若腸中切痛如針刀所刺無休息時刺手陽明治陽在手腕中瀉之大腸病者腸中切痛而鳴濯濯冬日重感于寒則泄當臍而痛不能久立與胃同候取巨虛上亷腸中雷鳴氣上衝胸脅不能久立邪在大腸刺肓之原巨虛上亷二里大腸脹者腸鳴而痛寒則泄食不化大腸有寒鶩溏有熱便腸垢大腸有宿食寒栗發熱有時如瘧狀肺前受病移於大腸肺咳不已咳則遺失便利厥氣客於大腸則夢田野肺應皮皮厚者大腸厚皮薄者大腸薄皮緩腹裹大者大腸緩而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結扁鵲云手太隂與陽明為表裏大腸若病實則傷熱熱則脹滿不通口為生瘡食下入腸腸實而胃虛食下胃胃實而腸虛所以實而不滿乍實乍虛乍來乍去虛則傷寒寒則腸中雷鳴泄青白之利而發於氣水根在大腸方見治水篇中大腸絶不治何以知之泄利無度利絶則死手陽明之脉起於大指次指之端外側循指上亷出合谷兩骨之間上入兩筋之中循臂上亷上入肘外亷循臑外前亷上肩出髃骨之前亷上出柱骨之㑹上下入缺盆絡肺下膈屬大腸其肢者從缺盆直而上頸貫頰入下齒縫中還出俠口交人中左之右右之左上俠鼻孔是動則病齒痛䪼腫是主津所生病者目黃口乾􅍠衄喉痺肩前臑痛大指次指痛不用氣盛有餘則當脉所過者熱腫虛則寒栗不復盛者則人迎大三倍於寸口虛者則人迎反小於寸口也大腸虛實第二脉法方灸大腸實熱右手寸口氣口以前脉陽實者手陽明經也病苦腸滿善喘咳面赤身熱喉咽中如核狀名曰大腸實熱也生薑泄腸湯治大腸實熱腹脹不通口為生瘡者方生薑橘皮青竹茹黃芩梔子仁白术各三兩桂心一兩茯苓芒硝各二兩生地黃十兩大棗十四枚右十一味以水七升煮取三升去滓下芒硝分二服治腸中臚脹不消方灸大腸輸四十九壯大腸有熱腸鳴腹滿俠臍痛食不化喘不能久立巨虛上亷主之大腸虛冷右手寸口氣口以前脉陽虛者手陽明經也病苦胸中喘腸鳴虛渴脣乾目急善驚泄白名曰大腸虛冷也黃連補湯治大腸虛冷痢下青白腸中雷鳴相逐方黃連四兩茯苓芎藭各三兩酸石榴皮五片伏龍肝雞子大一枚地榆五兩右六味以水七升煮取二升半去滓下伏龍肝末分三服治腸中雷鳴相逐痢下方灸承滿五十壯穴在俠巨闕相去五寸巨闕在心下一寸灸之者俠巨闕兩邊各二寸半治腸中常鳴時上衝心方灸臍中食飲不下腹中雷鳴大便不節小便赤黃陽綱主之腹脹腸鳴氣上衝胸不能久立腹中痛濯濯冬日重感於寒則泄當臍而痛腸胃間遊氣切痛食不化不嗜食身腫俠臍急天樞主之腸鳴而痛溫留主之肛門論第三論曰肛門者主大行道肺大腸候也號為通事令史重十二兩長一尺二寸廣二寸三分應十二時若臟傷熱則肛門閉塞大行不通或腫縮入生瘡若腑傷寒則肛門開大行洞寫肛門凸出良久乃入熱則通之寒則補之虛實和平依經調理方見别卷中皮虛實第四論方論曰夫五臟六腑者內應骨髓外合皮毛膚肉若病從外生則皮毛膚肉關格强急若病從內發則骨髓㾓疼然隂陽表裏外皮內髓其病源不可不詳之也皮虛者寒皮實者熱凡皮虛實之應主于肺大腸其病發於皮毛熱則應臟寒則應腑蒴藋蒸湯治皮虛主大腸病寒氣關格方蒴藋根葉切三升菖蒲葉切二升桃葉皮枝銼三升細糠一斗秫米五升右五味以水一石五斗煮取米熟為度大盆器貯之於盆上作小竹牀子罩盆人身坐牀中四靣周回將席薦障風身上以衣被蓋覆若氣急時開孔對中泄氣取通身接汗可得兩食久許如此三日蒸還溫藥足汁用之若盆裏不過熱盆下安炭火非但治寒但是皮膚一切勞冷悉皆治之梔子煎治皮實主肺病熱氣方梔子仁枳實大青杏仁柴胡芒硝各二兩生地黃淡竹葉切各一升生𤣥參五兩石膏八兩右十味以水九升煮取三升去滓下芒硝分為三服咳嗽第五論方證法灸論曰經云五臟六腑皆令咳肺居外而近上合於皮毛皮毛喜受邪故肺獨易為咳也邪客於肺則寒熱上氣喘汗出咳動肩背喉鳴甚則唾血肺咳經久不已傳入大腸其狀咳則遺糞腎咳者其狀引腰背痛甚則咳涎腎咳經久不已傳入膀胱其狀咳則遺尿肝咳者其狀左脅痛甚者不得轉側肝咳經久不已傳入膽其狀咳則清苦汁出心咳者其狀引心痛喉中介介如梗甚者喉痺咽腫心咳經久不已傳入小腸其狀咳則失氣脾咳者其狀左脅痛隂隂引肩背甚者不得動動則咳劇經久不已傳入胃其狀咳而嘔嘔甚則長蟲出久咳不已三焦受之三焦咳之狀咳而腸滿不能飲食此皆衆於胃關於肺使人多涕唾而面浮腫氣逆也右順時有風寒冷人觸冒解脫傷皮毛間入腑臟為咳上氣如此也有非時忽然暴寒傷皮膚中與肺合則咳嗽上氣或胸脅義痛咳唾有血者是其熱得非時之寒暴薄之不得漸散伏結深喜肺癰也因咳服溫藥咳尤劇及壯熱吐膿血汗出惡寒是也天有非時寒者急看四時方也問曰咳病有十何謂也師曰有風咳有寒咳有肢咳有肝咳有心咳有脾咳有肺咳有腎咳有膽咳有厥隂咳問曰十咳之證以何為異師曰欲語因咳言不得竟謂之風咳飲冷食寒因之而咳謂之寒咳心下堅滿咳則肢痛其脉反遲謂之肢咳咳則引脅下痛謂之肝咳咳而唾血引手少隂謂之心咳咳而涎出續續不止引小腹謂之脾咳咳引頸項而唾涎沫謂之肺咳咳則耳無所聞引腰并臍中謂之腎咳咳而引頭痛口苦謂之膽咳咳而引舌本謂之厥隂咳風咳者不下之寒咳肢咳肝咳刺足太衝心咳刺手神門脾咳刺足太白肺咳刺手太泉腎咳刺足太溪膽咳刺足陽陵泉厥隂咳刺手太陵夫久咳為㽷咳而時發熱脉在九􅀢一作卒弦者非虛也此為胸中寒實所致也當吐之夫咳家其脉弦欲行吐藥當相人强弱而無熱乃可吐耳咳家其人脉弦為有水可與十棗湯下之方見下不能臥出者隂不受邪故也留飲咳者其人咳不得臥引項上痛咳者如小兒掣縱狀夫酒客咳者必致吐血此坐久極飲過度所致也其脉沉者不可發汗久咳數歲其脉弱者可治實大數者死其脉虛者必善冒其人本有支飲在胸中故也治屬飲家上氣汗出而咳屬飲家咳而小便利若失溺不可發汗汗出即厥逆冷夫病吐血喘咳上氣其脉數有熱不得臥者死寒家咳而上氣其脉數者死謂其人形損故也脉大而散散者為氣實而血虛名曰有表無裏上氣面胕腫肩息其脉浮大不治加痢尤甚上氣躁而喘者屬肺脹欲作風水發汗愈小青龍湯治咳逆倚息不得臥方麻黃芍藥細辛桂心乾薑甘草各三兩五味子半夏各半升右八味㕮咀以水一斗先煮麻黃减二升去上沫乃內諸藥煮取三升去滓分三服弱者服半升若渴去半夏加栝蔞根三兩若微痢去麻黃加蕘花如雞子大若食飲噎者去麻黃加附子一枚若小便不利小腹滿者去麻黃加茯苓四兩若喘者去麻黃加杏仁半升青龍湯下已多唾口燥寸脉沉尺脉微手足厥逆氣從小腹上衝胸咽手足痺其面翕熱如醉狀因復下流隂股小便難時復冒者與茯苓桂心甘草五味子湯治其氣衝方茯苓四兩桂心甘草各二兩五味子半升右四味㕮咀以水八升煮取三升去滓分三服溫服衝氣即低而反更咳胸滿者用茯苓甘草五味子去桂心加乾薑細辛以治其咳滿方茯苓四兩甘草乾薑細辛各三兩五味子半升右五味㕮咀以水八升煮取三升去滓溫服半升日三咳滿即止而更復渴衝氣復發者以細辛乾薑為熱藥也服之當遂渴而渴反止者為支飲也支飲法當冒冒者必嘔嘔者復內半夏以去其水方半夏五味子各半升茯苓四兩細辛乾薑甘草各二兩右六味㕮咀以水八升煮取三升去滓溫服半升日三水去嘔止其人形腫者應內麻黃以其人遂痺故不內麻黃內杏仁方杏仁五味子半夏各半升茯苓四兩細辛乾薑甘草各三兩右七味㕮咀以水一斗煮取三升去滓溫服半升日三若逆而內麻黃者其人必厥所以然者以其人血虛麻黃發其陽故也若面熱如醉此為胃熱上衝熏其面加大黃利之方大黃乾薑細辛甘草各三兩茯苓四兩五味子半夏杏仁各半升右八味㕮咀以水一斗煮取三升去滓溫服半升日三咳而上氣肺脹其脉浮心下有水氣脅下痛引缺盆設若有實者必躁其人常倚伏小青龍加石膏湯主之之方石膏乾薑桂心細辛各二兩芍藥甘草各三兩麻黃四兩半夏半升五味子一升右九味㕮咀以水一斗先煮麻黃减二升下藥煮取二升半强者服一升羸者減之小兒四合仲景用治肺脹咳而上氣煩躁而喘脉浮者心下有水外臺同澤漆湯治上氣其脉沉者方澤漆三斤細切以東流水五斗煮取一斗五升去滓澄清半夏半升生薑紫菀一作紫參白前各五兩黃芩甘草桂心人參各三兩右九味內澤漆汁中煮取五升每服五合日三夜一麥門冬湯下氣止逆治大逆上氣咽喉不利方麥門冬汁三升半夏一升粳米三合人參甘草各二兩大棗二十枚右六味以水一斗二升煮取六升去滓每服半升日三夜一射干麻黃湯治咳而上氣喉中如水雞聲者方射干細辛欵冬花紫菀各三兩麻黃生薑各四兩大棗七枚半夏五味子各半升右九味㕮咀以東流水一斗二升先煮麻黃去上沫內藥煮取三升去滓分三服日三厚朴麻黃湯治咳而大逆上氣胸滿喉中不利如水雞聲其脉浮者方厚朴五兩麻黃四兩石膏細辛乾薑各二兩小麥一升杏仁半夏五味子各半升右九味㕮咀以水一斗二升煮小麥熟去麥內藥煮取三升去滓分三服日三麻黃石膏湯治上氣胸滿者方麻黃四兩石膏一枚雞子大厚朴五兩小麥一升杏仁半升右五味以水一斗先煮小麥熟去之下藥煮取三升去滓分三服深師用治久逆上氣喉中如水雞鳴名小殳柸湯咳者加五味子半夏各半升乾薑三纍皂莢圓治咳逆上氣時時唾濁但坐不得臥方皂莢八兩為末蜜丸如梧子大以棗膏和湯服三丸日三夜一必效方以酥炙皂莢十棗湯夫有支飲家咳煩胸中痛者不卒死至一百日一歲可與此方大棗十枚大㦸甘遂芫花各等分右大㦸甘遂芫花搗為末以水一升五合煮棗取八合去滓內藥末强者一錢匕羸者半錢頓服之平旦服而不下者平旦更加藥半錢下後自然補養咳而引脅下痛者亦十棗湯主之方見前溫脾湯治食飽而咳者方甘草四兩大棗二十枚右二味㕮咀以水五升煮取二升分三服溫服之若咽中痛而聲鳴者加乾薑一兩百部根湯治嗽不得臥兩眼突出方百部根生薑各一斤細辛甘草各三兩貝母五味子白术各二兩桂心四兩麻黃六兩右九味㕮咀以水一斗二升煮取三升去滓分三服古今録驗用杏仁四兩紫菀三兩海藻湯治咳而下利胸中痞而短氣心中時悸四肢不欲動手足煩不欲食肩背痛時惡寒方海藻四兩五味子半夏各半升生薑一兩細辛二兩茯苓六兩杏仁五十枚右七味㕮咀以水一斗煮取三升去滓分三服日三一方無五味子生薑白前湯治水咳逆上氣身體浮腫短氣脹滿晝夜倚壁不得臥咽中作水雞鳴方白前紫菀半夏大㦸各二兩右四味㕮咀以水一斗浸一宿明旦煮取三升分三服治九種氣嗽欲死百病方乾薑半夏細辛紫菀吳茱茰蕘花一作芫花茯苓甘草甘遂防葵人參烏頭大黃杏仁各一分葶藶二分巴豆厚朴白薇各三分五味子逺志前胡菖蒲枳實蜀椒皂莢當歸大㦸桂心各半分右二十八味為末蜜丸如梧子大先食服二丸日三服以知為度不知增之麻黃散治上氣嗽方麻黃半斤杏仁百枚甘草三兩桂心一兩右四味治下篩别研杏仁如脂內藥末和合臨氣上時服一方寸匕食久氣未下更服一方寸匕可至三匕氣發便服即止一方去桂心甘草太醫令王叔和所撰御服蜀椒圓治上氣咳嗽甚良方蜀椒五分烏頭杏仁菖蒲礜石一云礬石皂莢各一分細辛款冬花紫菀乾薑各三分吳茱茰麻黃各四分右十二味為末蜜丸如梧子大暮臥吞二丸治二十年久嗽不過二十丸通氣圓治久上氣咳嗽咽中腥臭虛氣攪心痛眼疼耳中嘈嘈風邪毒疰時氣食不生肌胸中膈塞嘔逆多唾惡心心下堅滿飲多食少惡疰淋痛病方飴糖三升蜀椒二升杏仁一升蜈蚣五節大附子五枚乾薑人參各四分桂心六分烏頭七分天門冬十分右十味為末别治杏仁如脂稍稍內藥末搗千杵煬糖乃內藥末中令調和含如半棗一枚日六七夜三四服以胸中溫如度若夢與鬼交通及飲食者全用蜈蚣食不消加杏仁五合小腹急腰痛加天門冬杜仲有風加烏頭三枚附子一枚立夏後勿加也有留飲加葶藶一兩治咳嗽上氣方蜀椒桂心海蛤各四分昆布海藻乾薑細辛各六分麥門冬十分右八味為末蜜丸梧子大飲服十丸加至二十丸日三服有人風虛中冷胸中滿上氣喉中如吹管聲吸吸氣上欲咳服此方得瘥治咳嗽胸脅支滿多唾上氣方礜石一作礬石烏頭一方不用菖蒲各一分細辛黃環各二分欵冬花紫菀杏仁各三分吳茱茰四分乾薑五分蜀椒五合右十一味為末蜜丸梧子大每服一丸著牙上咽汁日五六服劇者常含不止又方薑汁一升半砂糖五合右二味煎薑汁減半內糖更煎服之又方白糖五分皂莢末一方寸匕右二味先微暖糖令消內皂莢末合和相得丸如小豆先食服二丸又方酒一升半浸肥皂莢兩挺經宿煮取半升分三服七日忌如藥法若吐多以酢飯三四口止之又方巴豆炮去皮勿傷破肉白飲吞下初日二枚二日三枚又方服芥子七丸以油酒下之射干煎治咳嗽上氣方生射干欵冬花各二兩紫菀細辛桑白皮附子甘草各二分白蜜竹瀝生薑汁各一升一云乾薑五兩飴糖五兩右十一味以射干先內白蜜并竹瀝中煎五六沸去之㕮咀六物以水一升合浸一宿煎七上七下去滓乃合飴薑一汁煎如餔服如酸棗一丸日三劇者夜二不止加之以止為度杏仁煎治冷嗽上氣鼻中不利方杏仁五合五味子欵冬花各三合紫菀乾薑各二兩桂心三兩甘草四兩麻黃一升右八味以水一斗煮麻黃取四升治諸藥為末又內膠飴半斤白蜜一斤合內汁中攪令相得煎如飴先食服如半棗許日三服不知加之以知為度又方治忽暴嗽失聲語不出方杏仁薑汁砂糖蜜各一升五味子紫菀各三兩通草貝母各四兩桑根白皮五兩右九味㕮咀以水九升煮取三升去滓內杏仁脂薑汁蜜糖和攪微火煎取四升初服三合日再夜一後稍加通聲膏方五味子欵冬花通草各三兩人參細辛青竹皮桂心菖蒲各二兩杏仁薑汁各一升白蜜二升棗膏三升酥五升右十三味㕮咀以水五升微火煎三上三下去滓內薑汁棗膏酥蜜煎令調和酒服棗大一丸杏仁飲子治暴熱嗽方杏仁四十枚紫蘇子一升橘皮一兩柴胡四兩右四味㕮咀以水一斗煮取三升分三服常作飲服蘇子煎治上氣咳嗽方蘇子生薑汁地黃汁白蜜杏仁各二升右五味搗蘇子以地黃汁薑汁澆之以絹絞取汁更搗以汁澆又絞令味盡去滓熬杏仁令黃黑治如脂又以向汁澆之絹絞往來六七度令味盡去滓內蜜合和置銅器中於湯上煎之令如飴每服方寸匕日三夜一崔氏無地黃汁又方乾薑末三兩膠飴一斤右二味和令調蒸五升米下冷以棗大含稍稍咽之日五夜二芫花煎治新久嗽方芫花乾薑各二兩白蜜二升右三味為末內蜜中令相和微火煎令如糜每服如棗核大一枚日三夜一以知為度欲利者多服深師以治冷飲嗽又治三十年久嗽者以水五升煮芫花取三升去滓內薑加蜜合煎如糜服之欵冬煎治同前欵冬花乾薑末紫菀各三兩五味子二兩芫花一兩熬令赤右五味㕮咀先以水一斗煮三味取三升半去滓內芫花乾薑末加蜜三升合投湯中令調於銅器中微火煎令如糖每服半棗許日三治三十年咳嗽或飲或咳寒氣嗽雖不同悉主之之方細辛欵冬花防風紫菀各三兩藜蘆二兩蜀椒五合右六味㕮咀取藜蘆先著銅器中次紫菀次細辛次欵冬花次椒以大棗百枚間著諸藥間以水一斗二升微火煮令汁盡出棗曝令燥雞鳴時服半棗不知明旦服一枚以胸中溫溫為度若强人欲嗽吐者方小增服之便吐膿囊裹結吐後勿冷飲食咳愈止藥藥勢靜乃食不爾令人吐不已治三十年久嗽方百部根二十斤搗取汁煎如飴服一方寸匕日三服外臺和飴一斤煎成煎以溫粥飲調下深師方以白蜜二升更煎五六沸服三合又方紫菀二兩欵冬花三兩右二味治下篩先食飲服一方寸匕日三服七日瘥又方白蜜一斤生薑二斤取汁右二味先稱銅銚知斤兩訖內蜜復稱知數次內薑汁以微火煎令薑汁盡惟有蜜斤兩在止旦服如棗大含一丸日三服禁一切雜食治久嗽不瘥方兔屎四十九枚碙砂二分胡桐律一分右三味為末蜜和丸如梧子大每服三丸以粥飲下日三吐冷物盡即瘥治積年咳嗽喉中呀聲一發不得坐臥方紫菀貝母半夏桑根白皮五味子射干百部各五分欵冬花皂莢乾薑橘皮鬼督郵細辛各四分白石英杏仁各八分蜈蚣二枚右十六味為末蜜和丸如梧子大飲服十丸日再稍加至二十丸崔氏無半夏射干乾薑橘皮鬼督郵細辛白石英用麻黃二兩芫根白皮一兩半以煮棗湯送下欵冬圓治三十年上氣咳嗽唾膿血喘息不得臥方欵冬花乾薑蜀椒吳茱茰桂心菖蒲各五分人參細辛蕘花紫菀甘草桔梗防風芫花茯苓皂莢各三分右十六味為末蜜丸如梧子大酒服三丸日三服又方欵冬花紫菀細辛石斛防風芎藭人參當歸藁本甘草蜀椒白术半夏天雄菖蒲鍾乳桂心麻黃各三兩獨活二兩烏頭芫花附子各一兩桃仁二十枚大棗二十五枚右二十四味為末蜜丸如梧子大酒服二十丸日二服不止加之酒漬服亦得又方欵冬花乾薑桂心紫菀各三分細辛二分杏仁皂莢礜石一作礬石菖蒲烏頭各一分蜀椒五合吳茱茰六合右十二味為末蜜丸如梧子大酒服五丸日三夜一二十年嗽不過五十日愈患咳嗽喉鳴上氣服一劑永瘥治肺傷咳唾膿血腸澀背氣不能食惡風目暗􅉩􅉩足脛寒冷方白膠生薑各五兩桂心人參紫菀各二兩大棗二十枚乾地黃切半升桑白皮切二升芎藭大麻仁飴糖各一升大麥三升右十二味㕮咀以水一斗五升煮麥取一斗去麥下藥煮取三升分五服五味子湯治唾中有膿血牽胸脅痛方五味子桔梗紫菀甘草續斷各二兩竹茹三兩赤小豆一升桑根白皮地黃各五兩右九味㕮咀以水九升煮取二升七合分為三服竹皮湯治咳逆下血不息方生竹皮三兩紫菀二兩飴糖一斤生地黃切一升右四味㕮咀以水六升煮取三升去滓分三服百部圓治諸嗽不得氣息唾膿血方百部根三兩升麻半兩桂心五味子甘草紫菀乾薑各一兩右七味為末蜜和丸如梧子大每服三丸日三以止為度治上氣咳嗽喘息喉中有物唾血方生薑汁杏仁各二升糖蜜各一升猪膏二合右五味先以猪膏煎杏仁色黃出之以紙拭令淨搗如膏合薑汁糖蜜等合煎令可丸每服如杏核一枚日夜六七服漸漸增加治一切肺病咳嗽膿血及唾血不止方好酥三十斤三遍錬停取凝當出醍醐服一合日三服瘥止一切藥皆不出此神方又方三錬酥如雞子黃適寒溫灌鼻中日再夜一鍾乳七星散治寒冷咳嗽上氣胸滿唾膿血方又名吸散鍾乳礬石欵冬花桂心各等分右四味治下篩作如大豆七聚七星形以小筒吸取酒送下先食服日三不止加之數試大驗又云臨并吸服之又方鍾乳細辛欵冬花天雄紫菀石膏各等分右六味治下篩取如大豆匕聚如前法吸之日二只得食粥七日嗽愈乃止若大豆聚不知小益之勿太多七星散治三十年咳嗽方欵冬花紫菀桑根白皮代赭細辛伏龍肝各一兩右六味治下篩作七星聚聚如藊豆者以竹筒口當藥上一一吸咽之令藥入腹中先食日三丸服四日日復作七星聚以一臠肉灸令熟以展轉藥聚上令藥悉遍肉上仰臥咀嚼之細細咽汁令藥力歆歆割割然毒氣入咽中藥力盡總咽却取瘥止未瘥復作如初羊牛鹿肉皆可猪肉不可用治嗽熏法以熟艾薄薄布紙上紙廣四寸後以硫黃末薄布艾上務令調均以荻一枚如紙長捲之作十枚先以火燒纒下去荻煙從孔出口吸煙咽之取吐止明旦復熏之如前日一二止自然可瘥得食白粥餘皆忌恐是熏黃如硫黃見火必焰矣又方熏黃一兩研令細以蠟紙并上熏黃令與蠟相入調勻捲之如前法熏之亦如上法日一二止以吐為度七日將息後以羊肉羮補之又方爛青布廣四寸布上布艾艾上布青礬末礬上布少熏黃末又布少鹽又布少豉末急捲之燒令著內燥罐中以紙䝉頭更作一小孔口吸取煙細細咽之以吐為度若心胸悶時略歇煙盡止日一二度用三捲不盡瘥三七日慎油膩論曰凡上氣多有服吐藥得瘥亦有針灸得除者宜深體悟之灸法嗽灸兩乳下黑白際各百壯即瘥又以蒲當乳頭周匝圍身令前後正平當脊骨解中灸十壯又以繩橫量口中折繩從脊灸繩兩頭邊各八十壯三報三日畢兩邊者是口合度灸從大椎數下行第五節下第六節上穴在中間此即神道穴隨年壯并主上氣灸手屈臂中有橫文外骨捻頭得痛處十四壯良上氣咳嗽短氣氣滿食不下灸肺募五十壯上氣咳逆短氣風勞百病灸肩井二百壯上氣短氣咳逆胸背痛灸風門熱府百壯上氣咳逆胸滿短氣牽背痛灸巨闕期門各五十壯上氣咳逆短氣胸滿多唾唾惡冷痰灸肺輸五十壯上氣胸滿短氣咳逆灸雲門五十壯上氣咳逆胸痺背痛灸胸堂百壯不針上氣咳逆灸亶中五十壯上氣氣閉咳逆咽冷聲破喉猜猜灸天瞿五十壯一名天突逆氣虛勞寒損憂恚筋骨攣痛心中咳逆泄注腹滿喉痺頸項强腸痔逆氣痔血隂急鼻衄骨痛大小便澀鼻中乾煩滿狂走易氣凡二十二病皆灸絶骨五十壯穴在內踝上三寸宛宛中備急千金要方卷五十七
