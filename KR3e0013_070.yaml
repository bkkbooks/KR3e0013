body:
  text: 備急千金要方卷七十唐孫思邈撰宋林億等校正痔漏方腸癰第二論法方灸論曰卒得腸癰而不曉其病候愚醫治之錯則殺人腸癰之為病小腹重而强抑之則痛小便數似淋時時汗出復惡寒其身皮皆甲錯腹皮急如腫狀其脉數者小有膿也巢源云數者已有膿也其脉遲緊者未有膿也甚者腹脹大轉側聞水聲或繞臍生瘡或膿從臍中出或大便出膿血問曰官羽林婦病醫脉之何以知婦人腸中有膿為下之即愈師曰寸口脉滑而數滑則為實數則為熱滑則為榮數則為衛衛數下降榮滑上升榮衛相干血為濁敗小腹痞堅小便或澀或復汗出或復惡寒膿為已成設脉遲緊即為瘀血血下則愈大黃牡丹湯治腸癰方大黃四兩牡丹三兩芒硝二兩瓜子一升桃仁五十枚右五味㕮咀以水五升煮取一升頓服當下膿血刪繁方用芒硝半合瓜子五合劉涓子用消石三合云腸癰之病小腹痞堅或偏在膀胱左右其色或白堅大如掌熱小便欲調時白汗出其脉遲堅者未成膿可下之當有血脉數膿成不復可下肘後名瓜子湯腸癰湯方牡丹甘草敗醬生薑茯苓各二兩桔梗薏苡仁麥門冬各三兩丹參芍藥各四兩生地黃五兩右十一味㕮咀以水一斗煮取三升分三服日三又方薏苡仁一升牡丹皮桃仁各三兩瓜瓣仁二升右四味㕮咀以水六升煮取二升分再服姚氏不用桃仁用杏仁崔氏有芒硝二兩云腹中㽲痛煩毒不安或脹滿不下飲食小便澀此病多是腸癰人多不識婦人産後虛熱者多成此病縱非癰疽但是便服此湯無他損也又方雄雞頂上毛并屎燒作末空心酒服之又方截取檐頭尖少許燒灰水和服當作孔出膿血取愈凡腸癰其狀兩耳輪文理甲錯初患腹中苦痛或繞臍有瘡如粟皮熱便膿血出似赤白下不治必死方馬蹄灰以雞子白和塗即拔氣不過再又方瓜子三升搗末以水三升煮取一升五合分三服又方死人塜上土作泥塗之治內癰未作頭者方右用伏雞屎服之即瘥又方馬牙灰雞子和塗之乾則易灸腸癰法屈兩肘正灸肘頭鋭骨各百壯則下膿血即瘥論曰産後宜勤濟乳不宜令汗蓄積蓄積不去便結不復出惡汗於內引熱溫壯結堅牽掣痛大渴引飲乳急痛手不得近成妬乳非癰也急灸兩手魚際各二十七壯斷癰脉也不復惡手近乳汁亦自出便可手助迮捋之則乳汁大出皆如膿狀內服連翹湯外以小豆薄塗之便瘥婦人女子乳頭生小淺熱瘡癢搔之黃汁出浸淫為長百種治不瘥者動經年月名為妬乳婦人飲兒者乳皆欲斷世謂苟抄乳是也宜以赤龍皮湯及天麻湯洗之𫝊二物飛烏膏及飛烏散佳若始作者可𫝊黃芩漏蘆散及黃連胡粉散並佳赤龍皮湯方右用槲皮切三升以水一斗煮取五升夏冷用之冬溫用之分以洗乳亦洗諸深敗爛久瘡洗竟𫝊膏散天麻湯方右用天麻草切三升以水一斗半煮取一斗隨寒熱分洗乳以殺癢也此草葉如麻冬生夏著花赤如鼠尾花也亦以洗浸淫黃爛熱瘡癢疽濕隂蝕小兒頭瘡洗竟𫝊膏散飛烏膏方傾粉是燒朱砂作水銀上黑烟也一作緗粉礬石各三兩右二味為末以甲煎和如脂以𫝊乳瘡日三𫝊作散者不須和汁自著者可用散及諸熱瘡黃爛瘡浸淫汁癢丈夫隂蝕癢濕瘡小兒頭瘡月蝕口邉肥瘡瘑瘡等並皆主之黃連胡粉散黃連二兩胡粉十分水銀一兩右三味黃連為末相和耎皮裹熟挼之自能和合縱不得成一家亦得水銀細散入粉中也以𫝊乳瘡諸濕瘡黃爛肥瘡等若乾著甲煎為膏治妬乳乳生瘡方蜂房猪甲中土車轍中土各等分右三味為末苦酒和𫝊之鹿角散治婦人乳生瘡頭汁出疼痛欲死不可忍者方鹿角三分甘草一分右二味治下篩和以雞子黃於銅器中置溫處炙上𫝊之日再即愈神驗不𫝊治妬乳方右以葵莖灰搗篩飲服方寸匕日三即愈集驗方直搗為散不為灰又方燒自死蛇為灰和以猪膏塗之大良灸法右以蒲黃度口以度從乳上行灸度頭二七壯論曰産後不自飲兒并失兒無兒飲乳乳蓄喜結癰不飲兒令乳上腫者以雞子白和小豆散𫝊乳房令消結也若飲兒不泄者數捻去之亦可令大孩子含水使口中令為嗍取滯乳汁吐去之不含水漱去熱喜令乳頭作瘡乳孔塞也凡女人多患乳癰年四十以下治之多瘥年五十已上慎勿治治之多死不治自得終天年連翹湯治妬乳乳癰方連翹芒硝各二兩芍藥射干升麻防己杏仁黃芩大黃柴胡甘草各三兩右十一味㕮咀以水九升煮取二升五合分三服治乳癰方麥門冬一升黃芩芍藥茯苓各二兩桑寄生人參黃耆防風甘草各三兩粘糖八兩大棗五枚右十一味㕮咀以水一斗煮取三升去滓內糖一沸分四服又方先服前件湯五日後服此丸即愈方天門冬五兩澤蘭五分大黃十分升麻六分羌活桑寄生防風人參黃耆乾地黃白芷通草各二分黃芩枳實五味子茯神天雄芎藭當歸各一兩右十九味為末蜜丸酒服二十丸日二加至四十丸治乳癰始作方廣濟方云治乳癰大堅硬赤紫色衣不得近痛不可忍者大黃棟實芍藥馬蹄各等分右四味治下篩飲服方寸匕取汗出瘥廣濟方云酒服方寸匕覆取汗當睡著覺後腫處散不痛經宿乃消排膿散治乳癰除惡肉方蓯蓉鐵精桂心細辛黃芩防己一作防風芍藥人參乾薑芎藭當歸各三分甘草五分右十二味治下篩酒服方寸匕日三夜一服藥十日膿血出多勿怪又方生地黃三升芒硝三合䜴一升右三味合搗𫝊上熱即易之取瘥止一切癰腫皆用之一方單用地黃𫝊之治妬乳乳癰腫方右取研米槌二枚灸令熱以絮及故帛㩉乳上以槌更互尉之瘥止已用立效治乳癰堅方右以水罐中盛醋泔清燒石令熱內中沸止更燒如前少熱內乳漬之及冷更燒石內漬不過三度燒石愈又方黃芩白斂芍藥各等分右三味為末以漿水飲服半錢七日三若左乳汁結者即捋去右乳汁若右乳汁結者可捋去左乳汁小品云治妬乳治乳癰方大黃鼠屎新者各一分黃連二分右三味搗為末以黍米粥清和𫝊乳四邉痛止即愈無黍米粟米粳米亦得又方大黃莽草各二分伏龍肝十二分生薑二分右四味搗為末以酢和塗乳痛即止有效又方鹿角治下篩以猪脂上清汁服方寸匕不過再服亦可以醋漿水服又方取蔥白搗𫝊之并絞汁一升頓服即愈治乳癰二三百日衆療不瘥但堅紫色青桞根尉方右以栁根削取上皮搗令熟熬令溫盛著練囊中尉乳上乾則易之一宿即愈蒺藜圓治婦人乳腫痛除熱方蒺藜子大黃各一兩敗醬一分桂心人參薏苡仁附子黃連黃耆雞骨當歸枳實芍藥通草各二分右十四味為末蜜丸如梧子大未食飲服三丸不知益至五丸日三無所忌一方無大黃敗醬黃連通草為散酒服方寸匕備急千金要方卷七十
