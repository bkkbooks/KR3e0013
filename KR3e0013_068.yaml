body:
  text: 備急千金要方卷六十八唐孫思邈撰宋林億等校正丁腫方瘭疽第六論方論曰瘭疽者肉中忽生點子如豆粒小者如黍粟極者如梅李或赤或黑或青或白其狀不定有根不浮腫痛傷之應心根深至肌經久便四面悉腫皰黯熟紫黑色能爛壞筋骨若毒散逐脈入臟殺人南人名為拓著毒厚肉處即割去之亦燒鐵烙之令焦如炭或灸百壯或飲葵根汁或飲藍青汁若犀角汁及升麻汁竹瀝黃龍湯等諸單方治專去其熱取瘥其病喜著十指故與代指相似人不識之呼作代指不急治之亦逐脈上入臟殺人南方人得之皆斬去其指初指頭先作黯皰後始腫赤黑黯瘮痛入心是也代指者先腫􅂒熱痛色不黯緣爪甲邉結膿劇者爪皆脫落此謂之代指病也但得一物冷藥汁拓漬之佳若熱盛服漏蘆湯及拓漬之傳升麻膏亦可針去血不妨洗漬塗膏也復有惡肉病者身上忽有肉如赤豆粒突出便長推出如牛馬乳上如雞冠狀不治自長出不止亦不痛癢此由春冬時受惡風入肌脈中變成此疾治之宜服漏蘆湯外燒鐵烙之日日為之令焦盡即以升麻膏傳上積日乃瘥又有赤脈病者身上忽有赤脈絡起隴聳如死蚯蚓之狀視之如有水在脈中長短皆逐脈所處此由春冬受惡風入絡脈中其血肉瘀所作也宜五香連翹湯及竹瀝等治之刺去其血仍傳丹參膏亦用白雞屎塗之良惡核病者肉中忽有核纍纍如梅李核小者如豆粒皮肉瘮痛壯熱􅂒索惡寒是也與諸瘡根瘰癧結筋相似其瘡根瘰癧因瘡而生是緩無毒惡核病卒然而起有毒若不治入腹煩悶殺人皆由冬月受溫風至春夏有暴寒相搏氣結成此毒也但服五香湯主之又以小豆末傳之亦煮湯漬時時洗之消後以丹參膏傳之令餘核盡消凡惡核初似被射公毒無常定處多惻惻然痛或時不痛人不痛者便不憂不憂則救遲救遲即殺人是以宜早防之尤忌魚雞豬牛馬驢等肉其疾初如粟米或似麻子在肉裏而堅似皰長甚速初得多惡寒須臾即短氣取吳茱萸五合作末水一升和之絞取汁頓服以滓傳上須臾服此汁令毒散止即不入腹也入腹則致禍矣切慎之凡㾫病喜發四肢其狀赤脈起如編繩急痛壯熱其發於腳喜從腨起至踝亦如編繩故云㾫病也發於腎喜著腋之下皆由久勞熱氣盛為濕涼所折氣結筋中成此病也若不即治其久潰膿亦令人筋攣縮也若不消潰其熱氣不散多作􅀈病漏蘆湯主之瀉後鋒針數針去惡血氣針瀉其根核上傳小豆末取消為度又用治丹法治之亦用治癰三味甘草散傳之若潰傳膏散如癰法惡核㾫病瘭疽等多起嶺表中土鮮有南方人所食雜類繁多感病亦復不一仕人往彼深須預防防之無法必遭其毒惟須五香湯小豆散吳茱茰皆其要藥凡附骨疽者以其無破外臺作故附骨成膿故名附骨疽喜著大節解中丈夫産婦喜著䏶中小兒亦著脊背大人急著者先覺痛不得動搖按之應骨痛經日便覺皮肉漸急洪腫如肥狀是也小兒才手近便六腑呼即是肢節有痛候也大人緩著者先覺肌烘烘然經日便覺痛痺不隨小兒四肢不能動搖亦如不隨狀看肢節解中若有崩烘烘處不知是附骨疽令遍身成腫不至潰體皆有青黯大人亦有不别呼為賊風風腫不知是疽也凡人身體患熱當風取涼風入骨解中風熱相摶便成附骨疽其候嗜眠沈重忽忽耳鳴又秋夏露卧為冷所折風熱伏結而作此疾急者熱多風少緩者風多熱少小兒未知取風冷何故而有此疾由其血盛肌嫩為風折之即使凝結故也凡初得附骨疽即須急服漏蘆湯下之傳小豆散得消可服五香連翹湯方見癰疽條中凡賊風其人體卒無熱中暴風冷即骨解深痛不廢轉動按之應骨痛久即結痛或結瘰癧其附骨疽久即腫而結膿以此為異宜若治附骨作賊風則增益病深膿多若治賊風作附骨即加風冷遂成瘰癧偏枯攣曲之疾也療之之效皆在善始耳此非天下至精其孰能與於此若候附骨與賊風為異者附骨之始未腫但痛而已其賊風但痛不熱附骨則其上壯熱四體乍寒乍熱小便赤大便澀而無汗若得下却熱并開發腠理便得消也縱不消盡亦得浮淺近外凡賊風但夜痛骨不可按抑不得回轉痛處不壯熱亦不乍寒乍熱多覺身體索索然冷欲得熱尉痛處即小寬時復有汗出此為賊風證也宜針灸尉􅏼諸服治風藥即愈方見風條中又有風熱毒相搏為腫其狀先腫上生瘭漿如火灼處名曰風熱毒治之一如丹法又有洪燭瘡身上忽生瘭漿如沸湯灑劇者遍頭面亦有胸脅腰腹腫緩通體如火湯灼瘭起者是也治之法急服漏蘆湯下之外以升麻膏傳之其間傳升麻膏若無效一依傳丹方凡熱瘡起便生白膿黃爛瘡起即淺但出黃汁名肥瘡浸淫瘡者淺搔之曼延長不止搔癢者初如疥搔之轉生汁相連著是也瘑瘡者初作亦如肥瘡喜著手足常相對生隨月生死痛癢坼裂春夏秋冬隨瘥劇者是也有久癰餘瘡敗為深疽者在腨脛間喜生瘡中水惡露寒凍不瘥經年成骨疽亦名胻瘡深爛青黑四邉堅強中央膿血汁出百藥不瘥汁潰好肉處皆虛腫亦有碎骨出者可溫赤龍皮湯漬方見七十卷腸癰篇夏月日日洗冬月四日一洗青肉多可傳白䕡茹散食去惡肉可三日傳之止後長傳家豬屎散得瘥止取豬屎燒灰作末如粉致瘡中令滿白汁出吮去隨更傳之瘥止若更青肉復著白䕡茹散如前法家豬屎散取平復凡骨疽百療不瘥者可瘡上以次灸之三日三夜便瘥如瘡不瘥瘥而復發骨從孔中出者名為骨疽取先死烏雌雞一隻去肉取骨熬焦如炭取三家牛棓木刮取屑三家甑箄各一兩皆燒成炭合導瘡中碎骨當出數片瘥治瘭疽祕方射干甘草枳實升麻乾地黃黃芩各二兩麝香二分前胡三分犀角六分大黃十分右十味㕮咀以水九升煮取三升下大黃一沸去滓內麝分三服瘥止不限劑數此方世所不傳神良無比外臺無黃芩云翼深師加黃芩麻黃白薇枳實升麻松葉治瘭疽諸疽十指頭焮赤癢痛方千金翼名豬蹄湯白芷大黃芎藭黃芩黃連甘草細辛藁本當歸藜蘆莽草各一兩右十一味㕮咀以水二斗先煮豬蹄一具取一斗煮藥取五升浸瘡即瘥治瘭疽浸淫多汁日漸大方黃連二兩胡粉甘草䕡茹各二分右四味治下篩以粉瘡上日三四度治瘭疽著手足肩背纍纍如米起色白刮之汁出瘥後復發方黃耆六分升麻四分欵冬花二分附子苦參范注無赤小豆各一分右六味治下篩酒服方寸匕稍加日三服又方虎屎白者以馬屎和曝乾燒為灰粉之良又方青木香滑石龍骨各三兩胡粉一兩米粉一升右五味為末稍以粉病上日三又方竈屋塵竈突墨釡下土各一升右三味合研令勻以水一斗煮三沸取汁洗日三四度治瘭疽著手足肩背忽發纍纍如赤豆剝之汁出者方鯽魚長三寸者亂髮雞子大豬脂一升右三味煎為膏傳之又方熬蕪菁子搗碎帛褁展轉傳上良又方以麻子熬作末摩上良又方酒和麵傳之又方以豬膽傳之良又方剝去瘡痂溫醋泔清洗之以胡燕窠和百日男兒屎如膏傳之又方亂髮灰服方寸匕日三亦治發背又方煮藝薹菜取汁一升服之并食乾熟藝薹數頓少與鹽醬冬月研子水和服之又方枸杞根并葵根葉煮汁煎令如糖隨意服之又方臘月糖晝夜連浸數日乃愈治疽潰後方以鹽湯洗拭了燒皂莢灰粉上良又方以牛耳中垢傳之良又方梁上塵和車􅤧中脂傳之又方以生麻油滓綿裹布瘡上蟲出又方以沸湯灌瘡中三四遍湯一作餳治疽似癰而小有異膿如小豆汁今日去明日滿者方右用藝薹熟搗濕布袋盛之埋熱灰中更互尉之不過再三度安瘥冬用乾者又方皂莢煎湯洗瘡拭乾以蘗皮為末傳之勿令作痂治疽卒著五指筋急不得屈伸者方右灸踝骨中央數十壯或至百壯治風疽方凡腳腨及曲䐐中癢搔則黃汁出是也灸法見後右以青竹筒一枚徑一寸半長三尺當中著大豆一升以粳馬屎二物燒為火當竹筒中燒之以器承兩頭取汁先以泔清和鹽熱洗瘡了即塗豆汁不過三度極效又方嚼胡麻傳以綿裹之日易神良治石疽狀如痤癤而皮厚方右搗榖子傳之亦治金瘡治久癰瘡敗壞成骨疽方右用末龍骨粉瘡四面厚二分以膏著瘡中日二易蟲出如髮盡愈膏方如左大蝦蟆一枚自死者亂髮一塊雞子大豬脂一斤右三味取一味內脂中煎略消盡下待冷更內鹽一合攪和充前用治瘡久不瘥瘥而復發骨從孔中出名為骨疽方以豬膽和楸葉搗封之又方搗白楊葉末傳之又方搗蕪菁子傳之帛褁日一易又方穿地作坑口小裏大深三尺取乾雞屎二升以艾及荆葉搗碎和雞屎令可燃火坑中燒之令煙出內疽於坑中熏之以衣擁坑口勿泄氣半日當有蟲出甚效治附骨疽方檞皮燒末飲服方寸匕又方新剝鼠皮如錢孔大貼腫上即膿出已潰者取豬脊上脂貼之又方灸間使後一寸隨年壯立瘥治久疽方右用鯽魚破腹勿損內白鹽於腹中以針縫之於銅器中火上煎令乾作末傳疽瘡中無膿者以豬脂和傳上小疼痛無怪也十日瘥苦瓠散治浸淫瘡方瘡表裏相當名浸淫瘡苦瓠一兩蜂房蛇蛻各半兩大豆半合梁上塵一合右五味治下篩以粉為粥和傳紙上貼之日三古今録無大豆又方以煎餅乘熱拓之亦治細癬又方豬牙車骨年久者槌破燒令脂出熱塗之又方取苦棟皮若枝燒作灰傳上乾者豬脂和塗之并治小兒禿瘡及諸惡瘡治瘑瘡方右用醋一升溫令沸以生薤一把內中封瘡上瘥為度又方搗桃葉和鯉魚鮓糂封之亦可以鮓傳上又方炒臘月糖傳之又方燒故履系為末傳之又方燒松根取脂塗之治燥瘑方右用醋和灰塗之又方熱牛屎塗之治濕瘑方右燒乾蝦蟆豬脂和傳之治瘑病百療不瘥方楝實一升桃皮苦參地榆根各五兩右四味㕮咀以水一斗煮取五升稍溫洗之日一度治久瘑疥濕瘡浸淫日廣癢不可堪搔之黃汁出瘥後復發方右用羊蹄根淨去土細切熟熬以醋和熟搗淨洗瘡傳上一時間以冷水洗之日一度又隂乾作末癢時搔則汁出以粉之又以生蔥根揩之千金翼無蔥字治一切瘑瘡凡腳腨及曲䐐中癢搔則黃汁出是名風疽右灸足大趾竒間二七壯又灸大趾頭亦佳治諸瘡因風致腫方右燒白芋灰溫湯和厚三分傳瘡上乾即易五六度瘥又方櫟根皮三十斤銼以水三斛煮令熱下鹽一把令的的然熱以浸瘡當出膿血日日為之瘥止治惡露瘡方以搗薤菜傳瘡口以大艾炷灸藥上令熱入內即瘥治惡瘡方礬石松脂亂髮蠟各二分豬膏四兩右五味煎髮候消內礬石次內松脂次內蠟去滓先刮洗瘡令淨然後用藥塗之日再三不痛久瘡時愈新瘡遲愈瘑疥癢瘡頭秃皆即愈生髮勝飛黃膏又方燒萹竹灰和楮白汁塗之又方羊屎麻根燒煙斷膏和封上有汁者乾傳之又方麵一升作餅大小以覆瘡灸上令熱汁出盡瘥治惡瘡似火爛洗湯右用白馬屎曝乾以河水和煮十沸絞取汁洗之治惡瘡其大如錢名曰馬疥方右以水漬自死蛇一頭令爛去骨以汁塗之隨手瘥治惡瘡十年不瘥似癩者方右用蛇蛻皮一枚燒為末下篩豬脂和傳之醋和亦得又方苦瓠一枚㕮咀煮取汁洗之日三度又煎以塗癬甚良當先以泔淨洗乃塗三日瘥又方燒猳豬屎傳之又方鹽湯洗搗地黃葉貼之又方燒莨菪子為末傳之又方燒鯽魚灰和醬清傳之烏膏治惡瘡方雄黃雌黃芎藭升麻烏頭防己竹灰黃連黃蘗水銀各二兩胡粉一分蠟三兩杏仁三十枚巴豆二十枚松脂亂髮各一雞子大右十六味㕮咀以豬膏三升急煎令髮消去滓停小冷入真珠三錢匕攪令相得以傳之凡用膏先淨洗瘡拭乾乃傳上傳訖以赤石脂黃連散粉之千金翼無竹灰水銀蠟治種種諸瘡不愈者方水銀一兩黃連二兩京墨三分右三味治下篩以不中水豬膏和傳上不過再三度瘥神良若欲多作任人水銀大須熟研其藥惟不治金瘡治反花瘡并治積年諸瘡方右取牛蒡根熟搗和臘月豬脂封上瘥止并治久不瘥諸腫惡瘡漏瘡等皆瘥又方取馬齒菜搗封上瘥止又方取蜘蛛膜貼上數易之瘥止治身瘡及頭瘡不止方右取菖蒲為末傳上日三夜二治瘡久不瘥方蕪荑藜蘆各一兩薑黃青礬雄黃各一分苦參沙參各三分附子一枚右八味治下篩先以藍汁洗瘡去痂乾拭傳上小兒一炊久剝去之大人半日才剝再傳不過三四度愈治諸瘡久不瘥并治六畜方右用棗膏三升水三斗煮取一斗半數洗取愈治代指方右用甘草二兩㕮咀水五升煮取一升半漬之若無用芒硝代又方以唾和白􅗠砂先搜麵作碗子盛唾次著􅗠砂如唾許以爪甲著中一日瘥又方以毛雜黃土作泥泥指上厚五分許內糖灰中煨之令熱可忍泥乾即易不過數度瘥又方刺指熱飯中二七遍又方以麻沸湯漬之即愈又方單煮地榆湯漬之半日又方取萎黃蔥葉煮沸漬之又方以蜀椒四合水一升煮三沸漬之又方先刺去膿血炙魚鮓皮令溫以纒裹周匝痛止便愈治指痛欲脫方右用豬脂和鹽煮令消熱內指中一食久住千金翼和乾薑治手足指掣痛不可忍方右用醬清和蜜溫塗之又方灸指端七壯立瘥治手足指逆臚方此緣厠上搔頭所致右還坐厠上以指到捋二七下即瘥又方青珠一分乾薑二分右二味搗以粉瘡上日三治手足皴裂逆臚代指方右酒搦豬􅏬洗之慎風冷治冬月冒涉凍凌面目手足皴瘃及始熱痛欲瘃者方右取麥窠煮令濃熱洗之治凍指瘃欲墮方右用馬屎三升以水煮令沸漬半日愈治手足皴劈破裂血出疼痛方右用豬脂著熱酒中洗之治手足皴痛方右用煮茄子根洗之又方芎藭三分蜀椒二分白芷防風鹽各一兩右五味㕮咀以水四升煎取濃塗之或豬脂煎更良治尸腳方凡人腳無冬夏常拆裂者是右用雞屎一升水二升煮數沸停水冷漬半日瘥止亦用馬屎忌踏酒吐及婦人穢血又方煬膠膠乾故帛貼方治割甲侵肉不瘥方右以􅗠砂礬石為末裹之以瘥為候又方搗鬼針草苗汁鼠黏草根和臘月豬脂傳之備急千金要方卷六十八
