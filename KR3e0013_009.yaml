body:
  text: 備急千金要方卷九唐孫思邈撰宋林億等校正少小嬰孺方初生出腹第二論論曰小兒初生先以綿裹指拭兒口中及舌上青泥惡血此為之玉衡一作銜若不急拭啼聲一發即入腹成百病矣兒生落地不作聲者取暖水一器灌之須臾當啼兒生不作聲者此由難産少氣故也可取兒臍帶向身却捋之令氣入腹仍呵之至百度啼聲自發亦可以蔥白徐徐鞭之即啼兒已生即當舉之舉之遲晚則令中寒腹內雷鳴乃先浴之然後斷臍不得以刀子割之須令人隔單衣物咬斷兼以暖氣呵七遍然後纒結所留臍帶令至兒足趺上短則中寒令兒腹中不調常下痢若先斷臍然後浴者則臍中水臍中水則發腹痛其臍斷訖連臍帶中多有蟲宜急剔撥去之不爾入兒腹成疾斷兒臍者當令長六寸長則傷肌短則傷藏不以時斷若挼汁不盡則令暖氣漸微自生寒令男臍風生兒宜用其父故衣裹之生女宜以其母故衣皆勿用新帛為善不可令衣過厚令兒傷皮膚害血脉發雜瘡而黃兒衣綿帛特忌厚熱慎之慎之凡小兒始生肌膚未成不可暖衣暖衣則令筋骨緩弱宜時見風日若都不見風則令肌膚脆軟便易中傷皆當以故絮衣之勿用新綿也凡天和暖無風之時令母將兒於日中嬉戲數見風日則血凝氣剛肌肉牢密堪耐風寒不致疾病若常藏在幃帳之中重衣溫暖譬猶隂地之草木不見風日軟脆不堪風寒也凡裹臍法椎治白練令柔軟方四寸新綿厚半寸與帛等合之調其緩急急則令兒吐哯兒生二十日乃解視臍若十許日兒怒啼似衣中有刺者此或臍燥還刺其腹當解之易衣更裹裹臍時閉户下帳然火令帳中溫暖換衣亦然仍以溫粉粉之此謂冬時寒也若臍不愈燒絳帛末粉之若過一月臍有汁不愈燒蝦蟆灰粉之日三四度若臍中水及中冷則令兒腹絞痛夭糾啼呼面目青黑此是中水之過當灸粉絮以尉之不時治護臍至腫者當隨輕重重者便灸之乃可至八九十壯輕者臍不大腫但出汁時時啼呼者搗當歸末和胡粉傅之炙絮日尉之至百日愈以啼呼止為候若兒糞青者冷也與臍中水同兒洗浴斷臍竟䙀抱畢未可與朱蜜宜與甘草湯以甘草如手中指一節許打碎以水二合煮取一合以綿纒沾取與兒吮之連吮汁計得一蜆殼入腹止兒當快吐吐去心胸中惡汁也如得吐餘藥更不須與若不得吐可消息計如飢渴須臾更與之若前所服及更與並不得吐者但稍稍與之令盡此一合止如得吐出惡汁令兒心神智慧無病也飲一合盡都不吐者是兒不含惡血耳勿復與甘草湯乃可與朱蜜以鎮心神安魂魄也兒新生三日中與朱蜜者不冝多多則令兒脾胃冷腹脹喜隂癎氣急變禁痙而死新生與朱蜜法以飛鍊朱砂如大豆許以赤蜜一蜆殼和之以綿纒筯頭沾取與兒吮之得三沾止一日令盡此一豆許可三日與之則用三豆許也勿過此則傷兒也與朱蜜竟可與牛黃如朱蜜多少也牛黃益肝膽除熱定精神止驚辟惡氣除小兒百病也新生三日後應開腸胃助榖神可研米作厚飲如乳酪厚薄以豆大與兒咽之頻咽三豆許止日三與之滿七日可與哺也兒生十日始哺如棗核二十日倍之五十日如彈丸百日如棗若乳汁少不得從此法當用意小增之若三十日而哺者令兒無疾兒哺早者兒不勝穀氣令生病頭面身體喜生瘡愈而復發令兒尫弱難養三十日後雖哺勿多若不嗜食勿强與之不消復生疾病哺乳不進者腹中皆有痰癖也當以四物紫丸微下之節哺乳數目便自愈小兒微寒熱亦當爾利之要當下之然後乃瘥凡乳兒不欲太飽飽則嘔吐每候兒吐者乳太飽也以空乳乳之即消日四乳兒若臍未愈乳兒太飽令風中臍也夏不去熱乳令兒嘔逆冬不去寒乳令兒咳痢母新房以乳兒令兒羸瘦交脛不能行母有熱以乳兒令變黃不能食母怒以乳兒令喜驚發氣疝又令上氣癲狂母新吐下以乳兒令虛羸母醉以乳兒令身熱腹滿凡新生小兒一月內常飲猪乳大佳凡乳母乳兒當先極挼散其熱氣勿令汁奔出令兒噎輒奪其乳令得息息已復乳之如是十返五返視兒饑飽節度知一日中幾乳而足以為常又常捉去宿乳兒若卧乳母當以臂枕之令乳與兒頭平乃乳之令兒不噎母欲寐則奪其乳恐填口鼻又不知饑飽也浴兒法凡浴小兒湯極須令冷熱調和冷熱失所令兒驚亦致五藏疾也凡兒冬不可久浴浴久則傷寒夏不可久浴浴久則傷熱數浴背冷則發癎若不浴又令兒毛落新生浴兒者以猪膽一枚取汁投湯中以浴兒終身不患瘡疥勿以雜水浴之兒生三日宜用桃根湯浴桃根李根梅根各二兩枝亦得㕮咀之以水三斗煮二十沸去滓浴兒良去不祥令兒終身無瘡疥治小兒驚辟惡氣以金虎湯浴金一斤虎頭骨一枚以水三斗煮為湯浴但須浴即煮用之凡小兒初出腹有鵝口者其舌上有白屑如米劇者鼻中亦有之此由兒在胞胎中受榖氣盛故也或妊娠時嗜糯米使之然治之之法以髮纒筯頭沾井花水撩拭之三日如此便脫去如不脫可煮栗荴汁令濃以綿纒筯頭拭之若春夏無栗荴可煮栗木皮如用井花水法小兒初出腹有連舌舌下有膜如石榴子中隔連其舌下後喜令兒言語不發不轉也可以爪摘斷之微有血出無害若血出不止可燒髮作灰末傅之血便止也小兒出腹六七日後其血氣收斂成肉則口舌喉頰裏清淨也若喉裏舌上有物如蘆籜盛水狀者若懸癰有脹起者可以綿纒長針留創處如粟米許大以針刺決之令氣泄去青黃赤血汁也一刺之止消息一日未消者來日又刺之不過三刺自消盡餘小小未消三刺亦止自然得消也有著舌下如此者名重舌有著頰裏及上腭如此者名重腭有著齒齗上者名重齗皆刺去血汁也小兒生輒死治之法當候視兒口中懸癰前上腭有胞者以指摘取頭決令潰去血勿令血入咽入咽殺兒急急愼之小兒初出腹骨肉未斂肌肉猶是血也血凝乃堅成肌肉耳其血沮敗不成肌肉則使面目繞鼻口左右悉黃而啼閉目聚口撮面口中乾燥四肢不能伸縮者皆是血脉不斂也恐不育若有如此者皆冝與龍膽湯也方出下驚癎篇相兒命短長法兒初生呌聲連延相屬者夀聲絶而復揚急者不夀啼聲散不成人啼聲深不成人臍中無血者好臍小者不夀通身軟弱如無骨者不夀鮮白長大者夀自開目者不成人目視不正數動者大非佳汗血者多厄不夀汗不流不成人小便凝如脂膏不成人頭四破不成人常搖手足者不成人早坐早行早齒早語皆惡性非佳人頭毛不周匝者不成人髮稀少者强不聽人一作不聰額上有旋毛者早貴妨父母兒生枕骨不成者能言而死尻骨不成者能倨而死掌骨不成者能匍匐而死踵骨不成者能行而死臏骨不成者能立而死身不收者死魚口者死股間無生肉者死頥下破者死隂不起者死隂囊下白者死赤者死卵縫通逹黑者夀論曰兒三歲已上十歲已下視其性氣髙下即可知其夭夀大略兒小時識悟通敏過人者多夭大則項橐顔回之流是也小兒骨法成就威儀回轉遲舒稍費人精神雕琢者夀其預知人意回旋敏速者亦夭即楊修孔融之徒是也由此觀之夭夀大略可知也亦猶梅花早發不覩歲寒甘菊晚成終于年事是知晚成者夀之兆也備急千金要方卷九
