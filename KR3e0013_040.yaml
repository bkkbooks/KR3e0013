body:
  text: 備急千金要方巻四十唐孫思邈撰宋林億等校正心臟方心臟脉論第一論曰心主神神者五臟專精之本也為帝王監領四方夏王七十二日位在南方離宫火也有生之來謂之精兩精相搏謂之神所以任物謂之心神者心之藏也舌者心之官故心氣通於舌舌和則能審五味矣心在竅為耳夫心者火也腎者水也水火相濟心氣通於舌舌非竅也其通于竅者寄見於耳左耳丙右耳丁循環炎宫上出脣口知味榮華於耳外主血内主五音心重十二兩中有三毛七孔盛精汁三合神名呴呴主藏神號五神居隨節應㑹故云心藏脉脉舍神在氣為吞在液為汗心氣虚則悲不已實則笑不休心氣虚則夢救火陽物得其時則夢燔灼心氣盛則夢喜笑及恐畏厥氣客於心則夢邱山煙火凡心臟象火與小腸合為腑其經手少隂與太陽為表裏其脉洪相于春王于夏夏時萬物洪盛垂枝布葉皆下垂如曲故名鉤心脉洪大而長洪則衛氣實實則氣無從出大則榮氣萌萌洪相薄可以發汗故名曰長長洪相得即引水漿溉灌經絡津液皮膚大陽洪大皆是母軀幸得戊巳用牢根株陽氣上出汗見于頭五内乾枯胞中空虚醫反下之此為重虚脉浮有表無裏陽無所使不但危身并中其母夏脉如鉤夏脉心也南方火也萬物之所以盛長也故其氣來盛去衰故曰鉤反此者病何如而反其氣來盛去亦盛此謂太過病在外其來不盛去反盛此謂不及病在内太過則令人身熱而膚痛為浸淫不及則令人煩心上見欬唾下為氣泄心脉來累累如連珠如循琅玕曰平夏以胃氣為本心脉來喘喘連屬其中微曲曰心病心脉來前曲後居如操帶鉤曰心死真心脉至堅而搏如循薏苡子累累然色赤黒不澤毛折乃死夏胃微鉤曰平鉤多胃少曰心病但鉤無胃曰死胃而有石曰冬病石甚曰今病心藏脉脉舍神怵惕思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死于冬手少隂氣絶則脉不通少隂者心脉也心者脉之合也脉不通則血不流血不流則髮不澤面黒如㯃葉者血先死壬篤癸死水勝火也心死藏浮之實如豆麻擊手按之益躁疾者死夏心火王其脉浮大而散一作弦日平反得弦細而長者是肝之乗心母之歸子為虚邪雖病易治反得大而緩者是脾之乗心子之乗母為實邪雖病自愈反得沉濡而滑者是腎之乗心水之尅火為賊邪大逆十死不治反得微澀而短者是肺之乗心金之陵火為微邪雖病即瘥腎乗心必癃左手關前寸口隂絶者無心脉也若心下熱痛掌中熱時時善嘔口中傷爛刺手少陽治陽左手關前寸口隂實者心實也若心下有水氣憂恚發之刺手心主治隂心脉來累累如貫珠滑利再至曰平三至曰離經病四至脫精五至死六至命盡手少隂脉也心脉急甚為瘈瘲微急為心痛引背食不下緩甚為狂笑微緩為伏梁在心下上下行有時唾血大甚為喉介微大為心痺引背善淚出小甚為善噦微小為消癉滑甚為善渇㣲滑為心疝引臍小腹鳴濇甚為瘖微濇為血溢維厥耳鳴癲疾心脉摶堅而長當病舌巻不能言其濡而散者當病痟渇自己渇一作環赤脉之至也喘而堅詮曰有積氣在中時害於食名心痺得之外疾思慮而心虚故邪從之扁鵲曰心有病則口生瘡腐爛心在聲為笑在變動為憂在志為喜喜傷心精氣并於心則喜心虚則悲悲則憂實則笑笑則喜時主夏病者時間時甚知其源取其輸觀其應審其害病先發于心者心痛一日之肺喘欬三日之肝脇痛支滿五日之脾閉塞不通身痛體重三日不已死冬夜半夏日中病在心日中慧夜半甚平旦静假令心病北行若食豚魚得之不者當以冬時發得病以壬癸日方凡心病之狀胷内痛脇支滿兩脇下痛膺背肩甲間痛兩臂内痛虚則胷腹大脇下與腰背相引而痛取其經手少隂太陽舌下血者其變病刺郄中血者心脉沉之小而緊浮之不喘苦心下聚氣而痛食不下喜咽唾時手足熱煩滿時忘不樂喜太息得之憂思心病其色赤心痛短氣手掌煩熱或啼笑罵詈悲思愁慮面赤身熱其脉實大而數此為可治宜服闕宜服者藥春當刺中衝夏刺勞宫季夏刺太陵皆補之秋刺間使冬刺曲澤皆瀉之皆是手心中心胞胳經又當灸巨闕五十壯背第五椎百壯邪在心則病心痛善悲時眩仆視有餘不足而調其輸愁憂思慮則傷心心傷則苦驚喜忘善怒心中風者翕翕發熱不能起心中飢則飲食食則嘔心中寒者其人病心如噉蒜虀狀劇者心痛徹背背痛徹心如蠱注其脉浮者自吐乃愈也心傷其人勞倦頭面赤而下重心中痛徹背自煩發熱當臍跳手其脉弦此為心臓傷所致也邪哭使魂魄不安者血氣少也血氣少者屬于心心氣虚者其人即畏合目欲眠夢逺行而精神離散魂魄妄行隂氣衰者即為癲陽氣衰者即為狂五臟者魂魄之宅舍精神之所依託也魂魄飛揚者其五臟空虚也即邪神居之神靈所使鬼而下之脉短而微其藏不足則魂魄不安魂屬于肝魄屬于肺肺主津液即為涕泣出肺氣衰者即泣出肝氣衰者魂則不安肝主善怒其聲呼心水者其人身體腫一作重而少氣不得卧煩而躁其隂大腫真心痛手足清至節心痛甚者旦發夕死夕發旦死心腹痛懊憹發作腫聚徃來上下行痛有休作心腹中熱善渇涎出者是蚘咬也以手聚而堅持之無令得移以大針刺之久持之蟲不動乃出針腸中有蟲蚘咬皆不可取以小針心脹者煩心短氣卧不安凡心脉急名曰心疝小腹當有形其以心為壯藏小腸為之使故小腹當有形診得心積沉而芤時上下無常處病胷滿悸腹中熱面赤咽乾心煩掌中熱甚則唾血身瘈瘲主血厥夏差冬劇色赤也心之積名曰伏梁起於臍上上至心大如臂久久不愈病煩心心痛以秋庚辛日得之何也腎病傳心心當傳肺肺適以秋王王者不受邪心復欲還腎腎不肯受因留結為積故知伏梁以秋得之心病煩悶少氣大熱熱上傷心嘔欬吐逆狂語汗出如珠身體厥冷其脉當浮今反沉濡而滑其色當赤而反黒者此是水之尅火為大逆十死不治徴音人者主心聲也心聲笑其音竽其志喜其經手少隂厥逆太陽則榮衛不通隂陽反錯陽氣外擊隂氣内傷傷則寒寒則虚虚則驚掣心悸定心湯主之方見别巻語聲前寛後急後聲不續前混後濁口喎冒昧好自笑此為厲風入心荆瀝湯主之方見别巻心虚風寒半身不遂骨節離解緩弱不收便利無度口面喎邪薑附湯主之方見别巻此病不盈旬日宜急治之又笑而呻呻而反憂此為水剋大隂擊陽隂起而陽伏伏則實實則傷熱熱則狂悶亂冒昧言多謬誤不可採聽此心已傷若其人口脣正赤可療青黄白黒不可療也心病為瘧者令人心煩甚欲得清水反寒多不甚熱方見别巻若其人本來心性和雅而忽弊急反於常白术酒主之方見别巻或言未竟便住以手剔脚爪此人必死禍雖未及名曰行尸此心病聲之候也虚則補之實則㵼之不可治者明以察之赤為心心合脉赤如雞冠者吉心主舌舌是心之餘其人火形相比於上徴赤色廣䀕兊面小頭好肩背髀腹小手足形安地疾行摇肩背肉滿有氣輕財少信多慮見事明了好顧急心不夀暴死耐春夏不耐秋冬秋冬感而生病主手少隂竅竅然􅐳骭長短傾正則心應之正赤色小理者則心小小則邪弗能傷易傷以憂粗理者則心大大則虚虚則寒寒則憂不能傷易傷於邪無􅐳骭者則心高高則實實則熱熱則滿于肺中悶而善忘難開以言􅐳骭小短舉者則心下下則藏外易傷于寒易恐以言􅐳骭長者則心堅堅則藏安守固􅐳骭弱以薄者則心脆脆則善病消癉熱中􅐳骭直下不舉者則心端正端正則和利難傷􅐳骭向一方者則心偏傾偏傾則操持不一無守司也下云若􅐳骭小短薄弱而下則心下下則虚虚則傷寒病憂恚内損心暴痛而好唾清涎口臭蟲齒痛侵脣齒若􅐳骭高起則心高高則實實則熱熱則滿于心悶而善忘恐悸喉燥口痛牙癰舌傷小兒則便祕口重舌鵝口聲嘶方見頭面篇中凡人部分陷起者必有病生小腸太陽為心之部其處陷起即病生矣藏含内外沉濁屬内浮清居外若外病内入小腹滿起内病裏出所部陷沒外入内前治陽後補隂内出外前補隂後㵼陽陽則實熱隂則虚寒在陽主外在隂主内凡人死生休咎則藏神前變形于外人心前病則口為之開張若心前死則枯黒語聲不轉若天中等分墓色應之即死不治看應増損斟酌賖促賖則不出四百日内促則不腠旬月之間心病少愈而卒死何以知之曰赤黒色黯㸃顔即若見顔度年上必卒死心絶一日死何以知之兩目回回直視肩息立死凡面赤目白憂恚思慮心氣内索面色反好急求棺槨不過十日死又面黄目赤不死赤如衃血死吉凶之色若在于分部朏朏而見赤黒入口此必死不出其年名曰行尸若年上無應三年之中病必死矣夏大心脉色赤主手太陽也夏取盛經分腠夏者火始治心氣始長脉瘦氣弱陽氣留溢熱熏分腠内至于經故取盛經分腠絶膚而病去者邪居淺也所謂盛經者陽脉也其脉本在外踝之後應在命門之上三寸命門者在心上一寸也脉根在少澤少澤在手小指端其筋起於小指之上結於腕上循臂内亷結肘内兊骨之後彈之應小指之上入結腋下其支者後走腋後亷上繞肩甲循頸出足太陽之筋前結于耳後完骨其支者入耳中直出耳上下結于頷上屬目外眥其脉起于小指之端循手外側上腕出踝中直上循臂骨下亷出肘内側兩骨之間上循臑外後亷出肩解繞肩甲交肩上入缺盆向腋絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目兊眥却入耳中其支者别頰上頻抵鼻至目内眥斜絡于顴合手少隂為表裏少隂本在兊骨之端應在背後同㑹于手太隂其手太陽之别名曰支正上腕五寸内注少隂其别者上走肘絡肩髃主心生病病實則小腸熱熱則節弛弛則陽病陽脉大反逆于寸口再倍病則嗌痛頷腫耳聾目黄卧不能言悶則急坐虚則小腸寒寒則生肬肬則隂病隂脉反小于寸口過於一倍病則短氣百節痛筋急頸痛不能轉顧此盡是手太陽小腸經筋脉支别為病今取心主胞胳少隂心經附于後手心主之别名曰内關去腕五寸甲乙作二寸出于兩筋間循經以上繫於心包絡心系氣實則心痛虚則為煩心取之兩筋間手心主之脉起于胷中出屬心包下膈歴絡三焦其支者循胷出脇下腋三寸上抵腋下循臑内行太隂少隂之間入肘中下臂行兩筋之間入掌中循中指出其端其支者别掌中循小指次指出其端也動則病手心熱肘臂攣急腋腫甚則胸脇支滿心中澹澹大動面赤目黄善笑不休是主脉所生病者煩心心痛掌中熱為此諸病盛則瀉之虚則補之熱則疾之寒則留之陷下則灸之不盛不虚以經取之盛者則寸口大一倍于人迎虚者則寸口反小于人迎手少隂之别名曰通理在腕後一寸别而上行循經入咽中系舌本屬目系其實則大膈虚則不能言取之掌後一寸别走太陽手少隂之脉起于心中出屬心系上膈絡小腸其支者從心系上俠咽系目系系曰系一作循胸而出脇其直者復從心系却上肺出腋下下循臑内後亷行太隂心主之後下肘内亷循臂内後亷抵掌後兊骨之端入掌後内亷循小指之内出其端是動則病嗌乾心痛渇而欲飲是為臂厥是主心所生病者目黄脇滿痛臑臂内後亷痛厥掌中熱痛為此諸病盛則瀉之虚則補之盛者則寸口大再倍于人迎虚者則寸口反小於人迎手少隂之脉獨無輸何也曰少隂者心脉也心者五臟六腑之大主也為帝王精神之所舎其藏堅固邪不能容容之則傷心心傷則神去神去則身死矣故諸邪在於心者皆在心之包胳包胳者心主之脉也故少隂無輸也少隂無輸心不病乎曰其外經腑病臟不病故獨取其經于掌後兊骨之端也夏三月主心小腸赤脉㩌病也其源從少隂太陽之氣相搏而停則榮衛不通皮肉痛起太陽動發少隂淫邪之氣因而作則臟腑隨時受夏疫病也其病相若腑虚則為隂邪氣所傷身戰脉掉捉所不禁臟實則為陽毒所侵肉熱口開舌破咽塞聲嘶故曰赤脉㩌病方見傷寒卷中扁鵲云灸腎肝心三輸主治丹一作痺毒病當依源為治表治隂陽調和臟腑疾不生矣心虚實第二脉法方灸心實熱左手寸口人迎以前脉隂實者手少隂經也病苦閉大便不利腹滿四肢重身熱名曰心實熱也石膏湯治心熱實或欲吐吐而不出煩悶喘急頭痛方石膏一斤淡竹葉香䜴各一升小麥三升地骨皮五兩茯苓三兩梔子仁三七枚右七味㕮咀先以水一斗五升煮小麥竹葉取八升澄清次下諸藥煮取二升去滓分三服外臺名㵼肺湯㵼心湯治老小下利水榖不消腸中雷鳴心下痞滿乾嘔不安方人參黄芩甘草各一兩乾薑一兩半黄連二兩半夏三兩大棗十二枚右七味㕮咀以水八升煮取二升半分三服并治霍亂若寒加附子一枚渇加栝蔞根二兩嘔加橘皮一兩痛加當歸一兩客熱以生薑代乾薑心小腸俱實左手寸口人迎以前脉隂陽俱實者手少隂與巨陽經俱實也病苦頭痛身熱大便難心腹煩滿不得卧以胃氣不轉水榖實也名曰心小腸俱實竹瀝湯治心實熱驚夢喜笑恐畏悸懼不安方淡竹瀝生地黄汁各一升石膏八兩芍藥白术人參梔子仁各二兩赤石脂紫菀知母茯神各二兩右十一味㕮咀以水九升煮十味取二升七合去滓下竹瀝更煎取三升若須利入芒硝二兩去芍藥分三服茯神散治心實熱口乾煩渇眠卧不安方茯神麥門冬各三十六銖通草升麻各三十銖紫菀桂心各十八銖知母一兩赤石脂四十二銖大棗二十枚淡竹茹雞子大一枚右十味治下篩為粗散以帛裹方寸匕井花水二升半煮取九合時動裹子為一服日再瀉心湯治心氣不足吐血衂血方大黄二兩黄連黄芩各一兩右三味㕮咀以水三升煮取一升頓服亦治霍亂安心散治心熱滿煩悶驚恐方白芍藥逺志宿薑二兩茯苓赤石脂麥門冬知母紫菀石膏各四十二銖人參二十四銖桂心麻黄黄芩各三十銖萎蕤三十六銖甘草十二銖右十五味治下篩為粗散先以水五升淡竹葉一升煮取三升去滓煮散一方寸匕半以絹裹煮時動之煎取八合為一服日再治不能食胷中滿膈上逆氣悶熱方灸心輸二七壯小兒減之心虚寒左手寸口人迎以前脉隂虚者手少隂經也病苦悸恐不樂心腹痛難以言心如寒恍惚名曰心虚寒也茯苓補心湯治心氣不足善悲愁恚怒衂血面黄煩悶五心熱或獨語不覺咽喉痛舌本强冷涎出一作汗出善忘恐徙不定婦人崩中面色赤方茯苓四兩桂心甘草各二兩紫石英人參各一兩大棗二十枚麥門冬三兩赤小豆二十四枚右八味㕮咀以水七升煮取二升分三服半夏補心湯治心虚寒心中脹滿悲憂或夢山丘平澤者方半夏六兩宿薑五兩茯苓桂心枳實橘皮各三兩白术四兩防風逺志各二兩右九味㕮咀以水一斗煮取三升分三服牛髓圓通治百病虚瘠羸乏等方牛髓羊髓棗膏白蜜酥各一升麥門冬芎藭桂心當歸茯苓一云茯神甘草羌活各三十銖乾地黄乾薑三十六銖五味子人參防風各一兩細辛十八銖白术四十二銖右十九味切𢷬十四味再篩别研棗膏和散次與諸髓蜜和攪令相得内銅鉢中於釡沸湯中煎之取堪為丸如梧子大酒服三十丸稍加至四十丸日再服心小腸俱虚左手寸口人迎以前脉隂陽俱虚者手少隂與巨陽經俱也病苦洞泄若寒少氣四肢厥腸澼名曰心小腸俱虚大補心湯治虚損不足心氣弱悸或時妄語四肢損變氣力顔色不榮方黄芩附子各一兩甘草茯苓麥門冬乾地黄桂心阿膠各三兩半夏逺志石膏各四兩生薑六兩粘糖一斤大棗二十枚右十四味取十三味㕮咀以水一斗五升煮取五升湯成下糖分四服補心圓治臟虚善恐怖如魘狀及女人産後餘疾月經不調方當歸防風芎藭附子芍藥甘草蜀椒乾薑細辛桂心半夏厚朴大黄猪苓各一兩茯苓一方用茯神逺志各二兩右十六味為末蜜丸如梧子酒服五丸日三不知加至十丸冷極加熱藥心勞第三論方論曰心勞病者補脾氣以益之脾王則感於心矣人逆夏氣則手太陽不長而心氣内洞順之則生逆之則死順之則治逆之則亂反順為逆是謂關格病則生矣大黄洩熱湯治心勞熱口為生瘡大便苦難閉澀不通心滿痛小腸熱方大黄澤㵼黄芩芒硝梔子仁三兩桂心通草二兩石膏八兩甘草一兩大棗二十枚右十味㕮咀用水九升先以水一升别漬大黄一宿餘八升水煮諸藥取二升五合去滓下大黄煮兩沸去滓下芒硝令烊分三服備急千金要方巻四十
