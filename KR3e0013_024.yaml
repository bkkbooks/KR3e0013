body:
  text: 備急千金要方卷二十四唐孫思邈撰宋林億等校正風毒脚氣方諸散第三方例曰大法春秋宜服散八風散治風虚面青黒土色不見日月光脚氣痺弱凖紅面青黒主腎不見日月光主肝宜補腎治肝方菊花三兩石斛天雄各一兩半人參附子甘草各一兩六銖鍾乳薯蕷續斷黄耆澤瀉麥門冬逺志細辛龍膽秦艽石韋菟絲子牛膝菖蒲杜仲茯苓乾地黄栢子仁蛇牀子防風白术乾薑萆薢山茱萸各一兩五味子烏頭各半兩蓯蓉二兩右三十三味治下篩酒服方寸匕日三不效加至二匕大八風散治諸緩風濕痺脚弱方巴㦸天黄耆桂心細辛天雄萆薢蓯蓉牡荆子薯蕷菊花萎㽔山茱萸秦艽黄芩石斛白术礜石一作礬石厚朴龍膽人參蜀椒各半兩附子五味子各十八銖菖蒲茯苓牛膝千金翼作乾薑烏喙逺志各一兩桔梗三十銖芎藭白歛芍藥各六銖右三十二味治下篩酒服半寸匕日三未驗稍増令微覺胡洽無桔梗内補石斛秦芃散治風虚脚弱手足拘攣疼痺不能行脚趺腫上膝小腹堅如䋲約氣息常如憂恚不能食飲者皆由五勞七傷腎氣不足受風濕故也此方悉主之石斛附子天雄桂心獨活天門冬各一兩秦芃烏頭人參乾薑當歸防風杜仲各三十銖山茱萸莽草桔梗細辛麻黄前胡五味子各十八銖蜀椒白芷白术各半兩右二十三味治下篩酒服方寸匕日再服不知稍増至二匕虚人三建皆炮實人亦可生用風氣者本因腎虚既得病後毒氣外滿則灸洩其氣内滿則藥馳之當其救急理必如此至于風消退四體虚弱餘毒未除不可便止宜服此散推陳致新極為良妙此既人情可觧無可疑焉秦芃散治風無久新卒得不知人四肢不仁一身盡痛偏枯不隨不能屈伸洒洒寒熱頭目眩倒或口面喎僻方秦艽乾薑桔梗附子各一兩天雄當歸天門冬人參白术蜀椒各十銖烏頭細辛各十八銖甘草白芷山茱萸麻黄前胡防風五味各半兩右十九味治下篩酒服方寸匕日三若老人少服之胡洽無天門冬前胡有莽草桂心防已萆薢白歛黄耆為二十三味單服松脂治一切風及大風脚弱風痺方薫陸法亦同松脂三十斤以㯶皮袋盛繫頭鐺底布竹木置袋於上以石三五顆壓之下水于鐺中令滿煮之膏浮出得盡以後量更二十沸接置于冷水中易袋洗鍋更煮如此九遍藥成𢷬篩為散以麤羅下之用酒服一方寸匕日二初和藥以冷酒藥入腹後飲熱酒行藥以知為度如覺熱即減不減令人大小便秘澀若澀宜食蔥羮仍自不通宜服生地黄汁微取泄利除忌大麻子以外無所禁若欲斷米加茯苓與松脂等分蜜和為圓但食淡麫餺飥日兩度食一食一小椀勿多食也作餺飥法硬和麫熟挼煮五十沸漉出冷水淘更置湯中煮十餘沸然後漉出食之服松脂三十日後即覺有驗兩脚似有水流下是效如恐秘澀和一斤松脂茯苓與棗栗許大酥即不澀服經一百日後脚氣當愈仙經曰服松脂一年増夀一年服二年増夀二年及服之十年則増夀十年淮南八公石斛萬病散治風濕疼腰脚不隨方防風茯苓菊花細辛蜀椒乾薑雲母蓯蓉人參乾地黄附子石斛杜仲逺志菟絲子天雄萆薢桂心牛膝蛇牀子白术薯蕷巴㦸菖蒲續斷山茱萸各一兩五味子半兩右二十七味治下篩酒服方寸匕日再茱萸散治冷風脚跛偏枯半身不隨晝夜呻吟醫所不治吳茱萸乾薑白斂牡荆千金翼作牡桂附子天雄狗脊乾漆薯蕷秦艽防風各半兩右十一味治下篩先食服方寸匕日三藥入肌膚中淫淫然三日知一月瘥酒醴第四例方例曰凡合酒皆薄切藥以絹袋盛藥内酒中密封頭春夏四五日秋冬七八日皆以味足為度去滓服酒盡後其滓𢷬酒服方寸匕日三大法冬宜服酒至立春宜停石斛酒治風虚氣滿脚疼痺攣弱不能行方石斛丹參五加皮各五兩側子秦芃杜仲山茱萸牛膝各四兩桂心乾薑羌活芎藭橘皮黄耆白前蜀椒茵芋當歸各三兩薏苡仁一升防風二兩鍾乳八兩𢷬碎别絹袋盛繫大藥袋内右二十一味㕮咀以清酒四斗漬三日初服三合日再稍稍加以知為度烏麻酒方烏麻五升微熬𢷬碎以酒一斗漬一宿隨所能飲之盡更作甚良鍾乳酒治風虚勞損脚疼冷痺羸瘦攣弱不能行方鍾乳八兩丹參六兩石斛杜仲天門冬各五兩牛膝防風黄耆芎藭當歸各四兩附子桂心秦芃乾薑各三兩山茱萸薏苡仁各一升右十六味㕮咀以清酒三斗漬之三日初服三合日再後稍加之以知為度枸杞菖蒲酒治緩急風四肢不隨行步不正口急及四體不得屈伸方菖蒲五斤枸杞根一伯斤右二味細剉以水四石煮取一石六斗去滓釀二斛米酒熟稍稍飲之虎骨酒治骨髓疼痛風經五臟方虎骨一具炭火灸令黄色槌刮取碎𢷬研得數日清酒六升浸五宿隨性多少稍飲之易云虎嘯風生龍吟雲起此亦有情與無情相感治風之效故亦無疑蓼酒治胃管冷不能飲食耳目不聰明四肢有氣冬卧脚冷服此酒十日後目既精明體又充壯方八月三日取蓼曝燥把之如五升大六十把水六石煮取一石去滓以釀酒如常法隨多少飲之已用訖效甚速小黄耆酒大治風虚痰癖四肢偏枯兩脚弱手不能上頭或小腹縮痛脇下攣急心下有伏水脇下有積飲夜喜夢悲愁不樂恍惚善忘此由風虚五臟受邪所致或久坐腰痛耳聾卒起眼眩頭重或舉體流腫疼痺飲食惡冷濇濇惡寒胷中痰滿心下寒疝藥皆主之及婦人産後餘疾風虚積冷不除者方黄耆附子蜀椒防風牛膝細辛桂心獨活白术芎藭甘草各三兩秦芃烏頭集驗用薯蕷三兩大黄葛根乾薑山茱萸各二兩當歸二兩半右十八味㕮咀少壯人無所熬練虚老人微熬之以絹袋中盛清酒二斗漬之春夏五日秋冬七日可先食服一合不知可至四五合日三服此藥攻痺甚佳亦不令人吐悶小熱宜冷飲食大虚加蓯蓉二兩下利加女萎三兩多忘加石斛菖蒲紫石各二兩心下多水者加茯苓人參各二兩薯蕷三兩酒盡可更以酒二斗重漬滓服之不爾可曝滓𢷬下酒服方寸匕不知稍増之服一劑得力令人耐寒冷補虚治諸風冷神良黄耆酒治風虚脚疼痿弱氣悶不自收攝兼補方黄耆烏頭附子乾薑秦芃蜀椒芎藭獨活白术牛膝蓯蓉細辛甘草各三兩葛根當歸菖蒲各二兩半山茱萸桂心鍾乳栢子仁天雄石斛防風各二兩大黄石南各一兩右二十五味㕮咀無所熬練清酒三斗漬之先食服一合不知可至五合日三以攻痺為佳大虚加蓯蓉下利加女萎多忘加菖蒲各三兩胡洽有澤㵼三兩茯苓二兩人參茵芋半夏栝蔞芍藥各一兩無秦艽芎藭牛膝蓯蓉甘草葛根當歸菖蒲鍾乳大黄為二十二味名大黄耆湯茵芋酒治大風頭眩重目瞀無所見或仆地氣絶半日乃蘇口喎噤不開半身偏死拘急痺痛不能動摇歴節腫痛骨中酸疼手不得上頭足不得屈伸不能躡履行欲傾跛皮中動淫淫如有蟲啄軫癢搔之生瘡甚者狂走有此諸病藥皆主之方茵蕷烏頭石南防風蜀椒女萎附子細辛獨活卷栢桂心天雄秦艽防已各一兩躑躅二兩右十五味㕮咀少壯人無所熬練虚老人薄熬之清酒二斗漬之冬七日夏三日春秋五日初服一合不知加至二合寜從少起日再以微痺為度胡洽無蜀椒獨活卷栢為十二味大金牙酒治瘴癘毒氣中人風冷濕痺口喎面戾半身不遂手足拘攣厯節腫痛甚者小腹不仁名曰脚氣無所不治方金牙一斤側子附子天雄人參蓯蓉茯苓當歸防風黄耆薯蕷細辛桂心萆薢萎㽔白芷桔梗黄芩逺志牡荆子芎藭地骨皮五加皮杜仲厚朴枳實白术牛膝丹參各三兩獨活半斤茵芋石南狗脊各二兩磁石十兩薏苡仁麥門冬各一升生石斛八兩蒴藋四兩生地黄切二升右三十九味㕮咀以酒八斗漬七日温服一合日四五夜一石藥細研别絹袋盛共藥同漬藥力和善主治極多凡是風虚四體小覺有風痾者皆須將服之無所不治也服者一依方修合不得輙信人大言浪有加減鍾乳酒治虚損通順血脉極補下氣方鍾乳石斛蓯蓉各五兩附子甘菊各二兩右五味㕮咀以清酒三斗漬服二合日再稍増至一升秦芁酒治四肢風手臂不收髀脚疼弱或有拘急攣縮屈指偏枯痿躄痟小不仁頑痺者悉主之方秦芃天門冬五加皮牛膝附子桂心各三兩巴㦸天杜仲石南細辛各二兩獨活一兩薏苡仁一兩右十二味㕮咀以酒二斗漬之得氣味可服三合漸加至五六合日三夜一术膏酒治脚弱風虚五勞七傷萬病皆主之方生白术淨洗一石五斗𢷬取汁三斗煎取半濕荆二十五束束别三尺圍各長二尺五寸徑頭二寸燒取瀝三斗煎取半青竹三十束束别三尺圍各長二尺五寸徑一寸燒取瀝三斗煎取半生地黄根五大斗麤大者𢷬取汁三斗煎取半生五加根三十六斤淨洗訖剉于大釡内以水四石煎之去滓澄清取汁七斗以銅器中盛大釡内水上煎之取汁三斗五升其煎諸藥法一準五加例右件白术等五種藥總計得汁九斗五升好糯米一石五斗上小麥麴八斤曝乾為末以藥汁六斗浸麴五日待麴起第一投淨淘米七斗令得三十遍下米置浄席上以生布拭之勿令不淨然後炊之下饙以餘藥汁浸饙調强弱更蒸之待饙上痂生然後下于席上調强弱冷熱如常釀酒法醖之甕中密蓋頭三日後第二投更淘米四斗一如前法投之三日後即加藥如左桂心甘草白芷細辛防風當歸麻黄芎藭各六兩附子五兩牛膝九兩乾薑五加皮各一斤右十二味㕮咀訖第三投以米四斗淨淘如前法還以餘汁澆饙重蒸待上痂生下置席上調冷熱如常釀法和上件藥投之三日外然後嘗甘苦得中訖密封頭二七日乃壓取清酒一服四合日再服細細加以知為度温酒不得過熱慎生冷酢滑猪鯉魚蒜牛肉等松葉酒主脚弱十二風痺不能行服更生散數劑及衆治不得力服此一劑便能逺行不過兩劑方松葉六十斤㕮咀以水四石煮取四斗九升以釀五斗米如常法别煮松葉汁以漬米并饙飯泥釀封頭七日發澄飲之取醉得此力者甚衆神妙治脚氣方好豉三斗蒸一石米下曝乾如是三上以酒五斗漬七日去滓飲惟醉為佳酒盡更以二斗半漬之飲之如初側子酒治風濕痺不仁脚弱不能行方側子牛膝丹參山茱萸蒴藋根杜仲石斛各四兩防風乾薑蜀椒細辛獨活秦芃桂心芎藭當歸白木茵芋各三兩五加皮五兩薏苡仁一升右二十味㕮咀絹袋盛清酒四斗漬六宿初服三合稍加以知為度患目昏頭眩者彌精膏第五例方例曰凡作膏常以破除日無令喪孝汚穢産婦下賤人雞犬禽獸見之病在外火灸摩之在内温酒服如棗核許神明白膏治百病中風惡氣及頭面諸病青盲風目爛眥管瞖耳聾鼻塞齲齒齒根挺痛及癰痔瘡癬疥等方吳茱萸蜀椒芎藭白术前胡崔氏作白前白芷各一升附子三十枚桂心當歸細辛各二兩右十味㕮咀淳苦酒於銅器中淹浸諸藥一宿以成煎猪膏十斤炭火上煎三沸三上三下白芷色黄為候病在腹内温酒服如彈丸一枚日三目痛取如黍米内兩眥中以目向風無風可以扇扇之諸瘡痔齲齒耳鼻百病主之皆以膏傅病在皮膚灸手摩病上日三肘後九味無桂心衛侯青膏治百病久風頭眩鼻塞清涕淚出霍亂吐逆傷寒咽痛脊背頭項强偏枯拘攣或緩或急或心腹久寒積聚疼痛欬逆上氣往來寒熱鼠漏瘰癧厯節疼腫關節盡痛男子七傷臚脹腹滿羸瘦不能飲食婦人生産餘疾諸病瘑疥惡瘡癰腫隂蝕黄疸發背馬鞍牛領瘡腫方當歸栝蔞根乾地黄甘草蜀椒各六兩半夏七合桂心芎藭細辛附子各四兩黄芩桔梗天雄藜蘆皂莢各一兩半厚朴烏頭莽草乾薑人參黄連寄生續斷戎鹽各三兩黄野葛二分生竹茹六升巴豆二十枚石南杏仁各一兩猪脂三斗苦酒一斗六升右三十一味㕮咀諸藥以苦酒漬一宿以猪脂微火上煎之三下三上膏成病在内以酒服如半棗在外摩之日三神明青膏治鼻中干灌之并摩服方蜀椒五合皂莢黄芩石南黄連雄黄桂心藜蘆各三銖白术芎藭大黄澤瀉各七銖烏頭莽草續斷人參各五銖半夏當歸各十二銖乾地黄十一銖萎㽔細辛各十銖附子桔梗各二銖乾薑六銖戎鹽杏子大一枚右二十五味㕮咀以苦酒一斗漬之羊髓一斤為東南三隅竈内諸藥炊以葦薪作三聚新好土藥沸即下置土聚上三沸三下訖藥成以新布絞去滓病在外火灸摩之在内温酒服如棗核日三後稍益以知為度太傅白膏治百病傷寒咽喉不利頭項强痛腰脊兩脚疼有風痺濕腫難屈伸不能行步若風頭眩鼻塞有附息肉生瘡身體隠軫風搔鼠漏瘰癧諸疽惡瘡馬鞍牛領腫瘡及久寒結堅在心腹痛胷痺煩滿不得眠飲食欬逆上氣往來寒熱婦人産後餘疾耳目鼻口諸疾悉主之亦曰太一神效膏方蜀椒一升升麻切一升附子三兩巴豆芎藭各三十銖杏仁五合狸骨細辛各一兩半白芷半兩甘草二兩白术六兩一方用當歸三兩右十二味㕮咀苦酒淹漬一宿以猪脂四斤微火煎之先削附子一枚以繩繫著膏中候色黄膏成去滓傷寒心腹積聚諸風腫疾頸項腰脊强偏枯不仁皆摩之日一癰腫惡瘡鼠瘻瘰癧炙手摩之耳聾取如大豆灌之目痛淚出縹白瞖如珠當瞳子視無所見取如粒米傅白上令其人自以手掩之須臾即愈便以水洗視如平復且勿當風三十日後乃可行鼻中痛取如大豆内鼻中并以摩之齲齒痛以綿裹如大豆著痛齒上咋之中風面目鼻口喎僻以摩之若晨夜行辟霜霧眉睫落數數以鐵漿洗用膏摩之曲魚膏治風濕疼痺四肢嚲弱偏跛不仁并癰腫惡瘡方大黄黄芩莽草巴豆野葛牡丹躑躅芫花蜀椒皂莢藜蘆附子各一兩右十二味㕮咀以苦酒漬藥一宿以成煎猪膏三斤微火煎三沸一下别内白芷一片三上三下白芷色黄藥成去滓微火灸手摩病上日三野葛膏治惡風毒腫疼痺不仁瘰癧惡瘡癰疽腫脛脚弱偏枯百病方野葛犀角蛇銜莽草外臺作茵芋烏頭桔梗升麻防風蜀椒乾薑鼈甲雄黄巴豆各一兩丹參三兩躑躅花一升右十五味㕮咀以苦酒四升漬之一宿以成煎猪膏五斤微火煎三上三下藥色小黄去滓以摩病上此方不可施之猥人慎之胡洽無丹參躑躅有細辛又蘇恭以白芷防已吳茱萸附子當歸代巴豆雄黄蛇銜防風鼈甲蒼梧道士陳元膏治一切風濕骨肉疼痺方當歸細辛芎藭各一兩桂心五寸天雄三十枚生地黄三斤白芷一兩半丹砂二兩乾薑十累烏頭三兩松脂八兩猪肪十斤右十二味㕮咀以地黄汁漬藥一宿煎猪肪去滓内藥煎十五沸去滓内丹砂末熟攪用火灸手摩病上日千遍瘥胡洽有人參防風各三兩附子三十枚雄黄二兩為十五味肘後千金翼有附子二十二銖雄黄二兩半大酢三升為十五味崔氏與千金翼同裴公八毒膏治卒中風毒腹中絞刺痛飛尸入臟及魘寐不寤尸厥奄忽不知人宿食不消温酒服如棗核大得下止若毒氣甚咽喉閉塞不能嚥者折齒内葱葉口中以膏灌葱葉中令下病腫者向火摩腫上若歲中多温欲省病及行霧露中酒服之内鼻中亦得方蜀椒當歸雄黄丹砂各二兩烏頭巴豆各一升薤白一斤莽草四兩右八味㕮咀苦酒三升漬一宿用猪脂五斤東向竈葦薪火煎之五上五下候薤白黄色絞去滓研雄黄丹砂如粉内之攪至凝乃正膏成盛不津器中諸蜈蚣蛇蜂等毒者以膏置瘡上病在外悉傅之摩之以破除日合一方用礜石一兩蜈蚣二枚是名八毒膏肘後不用巴豆莽草名五毒膏備急千金要方卷二十四
