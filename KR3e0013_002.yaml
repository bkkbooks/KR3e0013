body:
  text: 備急千金要方卷二唐孫思邈撰宋林億等校正婦人方求子第一論女方男灸法轉為法論曰夫婦人之别有方者以其胎妊生産崩傷之異故也是以婦人之病比之男子十倍難療經言婦人者衆隂所集常與濕居十四已上隂氣浮溢百想經心内傷五藏外損姿顔月水去留前後交互瘀血停凝中道斷絶其中傷墮不可具論生熟二臟虚實交錯惡血内漏氣脉損竭或飲食無度損傷非一或瘡痍未愈便合隂陽或便利於懸厠之上風從下入便成十二痼疾所以婦人别立方也若是四時節氣為病虚實冷熱為患者故與丈夫同也惟懐胎妊而挾病者避其毒藥耳其雜病與丈夫同則散在諸卷中可得而知也然而女人嗜慾多於丈夫感病倍於男子加以慈戀愛憎嫉妬憂恚染著堅牢情不自抑所以為疾根深療之難瘥故養生之家特須教子女學習此三卷婦人方令其精曉即于倉卒之秋何憂畏也夫四德者女子立身之樞機産育者婦人性命之長務若不通明于此則何以免于夭枉者哉故傅母之徒亦不可不學常宜繕寫一本懐挾隨身以防不虞也論曰人之情性皆願賢已而疾不及人至於學問則隨情逐物墮於事業詎肯專一推求至理莫不虚棄光隂没齒無益夫婚姻養育者人倫之本王化之基聖人設教備論厥旨後生莫能精曉臨事之日惛爾若愚是則徒願賢已而疾不及人之謬也所實不逹賢已之趣而妄狥虚聲以終無用今具述求子之法以貽後嗣同志之士或可覽焉論曰夫欲求子者當先知夫妻本命五行相生及與德合并本命不在子休廢死墓中者則求子必得若其本命五行相尅及與刑殺衝破并在子休廢死墓中者則求子了不可得慎無措意縱或得者於後終亦累人若其相生并遇福德者仍須依法如方避諸禁忌則所誕兒子盡善盡美難以具陳禁忌法受胎時日推王相貴宿日法在二十七卷中論曰凡人無子當為夫妻俱有五勞七傷虚羸百病所致故有絶嗣之患夫治之之法男服七子散女服紫石門冬圓及坐藥盪胞湯無不有子也七子散治丈夫風虚目暗精氣衰少無子補不足方五味子鍾乳粉牡荆子莵絲子車前子菥蓂子石斛乾地黄薯蕷杜仲鹿茸遠志各八銖附子蛇床子芎藭各六銖山茱萸天雄人參茯苓黄耆牛膝各五銖桂心十銖蓯蓉十一銖巴㦸天十二銖右二十四味治下篩酒服方寸匕日二不知増至二匕以知為度禁如藥法不能酒者蜜和圓服亦得一方加覆盆子八銖求子法一依後房中篇朴硝盪胞湯治婦人立身已來全不産及斷緒久不産三十年者方朴硝牡丹當歸大黄桃仁生用各三銖細辛厚朴桔梗人參赤芍藥茯苓桂心甘草牛膝橘皮各二銖附子六銖䖟蟲水蛭各十枚右十八味㕮咀以清酒五升水五升合煮取三升分四服日三夜一毎服相去三時更服如常覆被取少汗汗不出冬日著火籠之必下積血及冷赤膿如赤小豆汁本為婦人子宫内有此惡物使然或天隂臍下痛或月水不調為有冷血不受胎若斟酌下盡氣力弱大困不堪更服亦可二三服即止如大悶不堪可食酢飯冷漿一口即止然恐去惡物不盡不大得藥力若能忍服盡大好一日後仍著導藥千金翼方不用桔梗甘草治全不産及斷緒服前朴硝湯後著坐導藥方皂莢山茱萸千金翼作苦瓠當歸各一兩細辛五味子乾薑各二兩大黄礬石戎鹽蜀椒各半兩右十味為末以絹袋盛大如指長三寸盛藥令滿内婦人隂中坐卧任意勿行走急小便時去之更安新者一日一度必下青黄冷汁汁盡即止可幸御即有子若未見病出亦可至十日安之一本别有葶藶砒霜各半兩此藥為服朴消湯恐去冷惡物出不盡以導藥下之值天隂冷不疼不須著導藥亦有著鹽為導藥者然不如此藥其服朴消湯後即安導藥經一日外服紫石門冬丸紫石門冬圓治全不産及斷緒方紫石英天門冬各三兩當歸芎藭紫葳卷栢桂心烏頭乾地黄牡䝉千金翼作牡荆外臺作牡蒙禹餘糧石斛辛夷各二兩人參桑寄生續斷細辛厚朴乾薑食茱萸牡丹牛膝各三十銖栢子仁一兩薯蕷烏賊骨甘草各一兩半右二十六味為末蜜和丸如梧桐子大酒服十丸日三漸増至三十丸以腹中熱為度不禁房室夫行不在不可服禁如藥法比來服者不至盡劑即有娠白薇圓主令婦人有子方白薇細辛防風人參秦椒白歛一云白芷桂心牛膝秦芁蕪荑沙參芍藥五味子白殭𧖟牡丹蠐螬各一兩乾漆栢子仁乾薑卷栢附子芎藭各三十銖桃仁紫石英各一兩半鍾乳乾地黄白石英各三兩鼠婦半兩水蛭䖟蟲各十五枚吳茱萸十八銖麻布叩􅀈頭一尺燒右三十二味為末蜜和丸如梧桐子大酒服十五丸日再稍加至三十丸當有所去小覺有異即停服又方治久無子或斷緒上熱下冷百病皆治之方白薇乾地黄乾薑車前子蜀椒各十八銖紫石英藁本石膏菴䕡子卷栢各三十銖澤蘭赤石脂白龍骨逺志麥門冬茯苓太乙餘糧各二兩當歸芎藭蛇牀子各一兩白芷覆盆子桃仁人參各一兩半桂心蒲黄各二兩半細辛三兩橘皮半兩右二十八味為末蜜和丸如梧子大酒服十五丸日再漸増以知為度亦可至五十丸慎猪雞生冷酢滑魚蒜驢馬牛肉等覺有娠即停三月正擇食時可食牛肝及心至四月五月不須但不可故殺令子短夀遇得者大良金城大守白薇圓治月水不利閉塞絶産十八年服此藥二十八日有子方白薇細辛各三十銖人參杜蘅古今録驗用牡蠣牡蒙厚朴半夏白殭𧖟當歸紫菀各十八銖牛膝沙參乾薑秦芁各半兩蜀椒附子防風各一兩半右十七味為末蜜和丸如梧子大先食服三丸不知稍増至四五丸此藥不可長服覺有娠即止用之大驗崔氏有桔梗丹參十八銖論曰古者求子多用慶雲散承澤圓今代人絶不用此雖未試驗其法可重故述之慶雲散治丈夫陽氣不足不能施化施化無成方覆盆子五味子各一升莵絲子二升天雄一兩石斛白术各三兩桑寄生四兩天門冬九兩紫石英二兩右九味治下篩酒服方寸匕先食服日三素不耐冷者去寄生加細辛四兩陽氣不少而無子者去石斛加㯽榔十五枚承澤圓治婦人下焦三十六疾不孕絶産方梅核仁辛夷各一升葛上亭長七枚溲疏三兩藁本一兩澤蘭子五合右六味為末蜜和丸如大豆先食服二丸日三不知稍増若腹中無堅癖積聚者去亭長加通草一兩惡甘草和藥先以苦酒搜散乃納少蜜和為丸大黄圓治帶下百病無子服藥十日下血二十日下長蟲及青黄汁三十日病除五十日肥白方大黄破如米豆熬令黒柴胡朴硝乾薑各一升芎藭蜀椒二兩茯苓如雞子大一枚右七味為末蜜和丸如梧桐子大先食服七丸米飲下加至十丸以知為度五日㣲下吉祥圓治女人積年不孕方天麻柳絮牡丹茯苓乾地黄桂心各一兩五味子桃花白术芎藭各二兩覆盆子一斗桃仁一百枚莵絲子楮實子各一升右十四味為末蜜和丸如豆大毎服空心飲苦酒下五丸日中一服晩一服消石大黄圓治十二瘕癖及婦人帶下絶産無子并服寒食藥而腹中有癖者當先服大丸下之乃服寒食藥大丸不下水榖但下病耳不至令人虚極方見第十一卷中秦椒圓治婦人絶産生來未産盪滌腑臟使玉門受子精秦椒天雄各十八銖𤣥參人參白斂鼠婦白芷黄耆桔梗露蜂房白殭蠶桃仁蠐螬白薇細辛蕪荑各一兩牡蒙沙參防風甘草牡丹皮牛膝卷栢五味子芍藥桂心大黄石斛白术各三十銖栢子仁茯苓當歸乾薑各一兩半澤蘭乾地黄芎藭各一兩十八銖乾漆白石英紫石英附子各二兩鍾乳二兩半水蛭七十枚䖟蟲一百枚麻布叩複頭七尺燒右四十四味為末蜜丸如梧子大酒服十丸日再稍加至二十丸若有所去如豆汁鼻涕此是病出覺有異即停灸法婦人絶子灸然谷五十壯在内踝前直下一寸婦人絶嗣不生胞門閉塞灸關元三十壯報之婦人妊子不成若墮落腹痛漏見赤灸胞門五十壯在關元左邊二寸是也右邊二寸名子户婦人絶嗣不生灸氣門穴在關元傍三寸各百壯婦人子藏閉塞不受精疼灸胞門五十壯婦人絶嗣不生漏赤白灸泉門十壯三報穴在横骨當隂上際論曰隂陽調和二氣相感陽施隂化是以有娠而三隂所㑹則多生女但妊娠二月名曰始膏精氣成于胞裏至于三月名曰始胎血脉不流象形而變未有定儀見物而化是時男女未分故未滿三月者可服藥方術轉之令生男也丹參圓治婦人始覺有娠養胎并轉女為男方丹參續斷芍藥白膠白术栢子仁甘草各二兩人參芎藭乾薑各三卜銖吳茱萸橘皮當歸各一兩十八銖白芷冠纓燒灰各一兩乾地黄一兩半蕪荑十八銖犬卵一具乾東門上雄雞頭一枚右十九味為末蜜和丸如梧子大酒服十丸日再稍加至二十丸又方取原蠶屎一作矢一枚井花水服之日三又方取弓弩弦一枚綘囊盛帶婦人左臂一法以繋腰下滿百日去之又方取雄黄一兩綘囊盛帶之要女者帶雌黄又方以斧一柄於産婦卧牀下置之仍繋刅向下勿令人知如不信者待雞抱卵時依此置於窠下一窠兒子盡為雄也妊娠惡阻第二論方法論曰何以知婦人妊娠脉平而虚者乳子法也經云隂搏陽别謂之有子此是血氣調和陽施隂化也診其手少隂脉動甚者妊子也少隂心脉也心主血脉又腎名胞門子户尺中腎脉也尺中之脉按之不絶法妊娠也三部脉沉浮正等按之無絶者有娠也妊娠初時寸㣲小呼吸五至三月而尺數也妊娠四月欲知男女者左疾為男右疾為女左右俱疾為産二子又法左手沉實為男右手浮大為女左右手俱沉實猥生二男俱浮大猥生二女尺脉若左偏大為男右偏大為女左右俱大産二子大者如實狀又法左手尺中浮大者男右手尺中沉細者女若來而斷絶者月水不利又法左右尺俱浮為産二男不然女作男生俱沉為産二女不爾男作女生又法得太隂脉為男得太陽脉為女太隂脉沉太陽脉浮又遣妊娠人面南行還復呼之左迴首者是男右逥首者是女又看上圊時夫從後急呼之左逥首是男右逥首是女又婦人妊娠其夫左乳房有核是男右乳房有核是女妊娠欲知將産者懐妊離經其脉浮設腹痛引腰脊為今出也但離經者不病也又法欲生其脉離經夜半覺痛日中則生也論曰凡婦人虚羸血氣不足腎氣又弱或當風飲冷太過心下有淡水者欲有胎而喜病阻所謂欲有胎者其人月水尙來顔色肌膚如常但苦沉重憒悶不欲食飲又不知其患所在脉理順時平和則是欲有妊也如此經二月日後便覺不通則結胎也阻病者患心中憒憒頭重眼眩四肢沉重懈惰不欲執作惡聞食氣欲噉鹹酸果實多卧少起世謂惡食其至三四月日已上皆大劇吐逆不能自勝舉也此由經血既閉水漬于藏藏氣不宣通故心煩憒悶氣逆而嘔吐也血脉不通經絡否澁則四肢沉重挾風則頭目眩也覺如此候者便冝服半夏茯苓湯數劑後將茯苓丸淡水消除便欲食也既得食力體强氣盛力足養胎母便健矣古今治阻病方有十數首不問虚實冷熱長少殆死者活于此方半夏茯苓湯治妊娠阻病心中憒悶空煩吐逆惡聞食氣頭眩體重四肢百節疼煩沉重多卧少起惡寒汗出疲極黄瘦方半夏生薑各三十銖乾地黄茯苓各十八銖橘皮旋復花細辛人參芍藥芎藭桔梗甘草各十二銖右十二味㕮咀以水一斗煮取三升分三服若病阻積月日不得治及服藥冷熱失候病變客熱煩渇口生瘡者去橘皮細辛加前胡知母各十二銖若變冷下痢者去乾地黄入桂心十二銖若食少胃中虚生熱大便閉塞小便赤少者宜加大黄十八銖去地黄加黄芩六銖餘依方服一劑得下後消息看氣力冷熱増損方調定更服一劑湯便急服茯苓丸令能食便强健也忌生冷醋滑油膩菘菜海藻茯苓圓治妊娠阻病患心中煩悶頭眩重憎聞飲食氣便嘔逆吐悶顛倒四肢垂弱不自勝持服之即效要先服半夏茯苓湯兩劑後可服此方茯苓人參桂心熬乾薑半夏橘皮各一兩白术葛根甘草枳實各二兩右十味為末蜜和為丸如梧子飲服二十丸漸加至三十丸日三肘後不用乾薑半夏橘皮白术葛根只五味又云妊娠忌桂故熬治妊娠惡阻嘔吐不下食方青竹茹橘皮各十八銖茯苓生薑各一兩半夏三十銖右五味㕮咀以水六升煑取二升半分三服不瘥頻作橘皮湯治妊娠嘔吐不下食方橘皮竹茹人參白术各十八銖生薑一兩厚朴十二銖右六味㕮咀以水七升煑取二升半分三服不瘥重作養胎第三論月方胎禁忌逐養論曰舊說凡受胎三月逐物變化禀質未定故妊娠三月欲得觀犀象猛獸珠玉寳物欲得見賢人君子盛德大師觀禮樂鍾鼓爼豆軍旅陳設焚燒名香口誦詩書古今箴誡居處簡靜割不正不食席不正不坐彈琴瑟調心神和情性節嗜慾庶事清淨生子皆良長夀忠孝仁義聰慧無疾斯蓋文王胎教者也論曰兒在胎日月未滿隂陽未備腑臟骨節皆未成足故自初迄于將産飲食居處皆有禁忌妊娠食羊肝令子多厄食山羊肉令子多病妊娠食驢馬肉令子延月食騾肉産難妊娠食兎肉犬肉令子無音聲并缺脣妊娠食雞子及乾鯉魚令子多瘡妊娠食雞肉糯米令子多寸白蟲妊娠食椹并鴨子令子倒出心寒妊娠食雀肉并豆醬令子滿面多䵟􅍍黒子妊娠食雀肉飲酒令子心淫情亂不畏羞恥妊娠食鼈令子短項妊娠食永漿絶胎妊娠勿向非常地大小便必半産殺人徐之才逐月養胎方妊娠一月名始肧飲食精熟酸美受御宜食大麥毋食腥辛是謂才正妊娠一月足厥隂脉養不可針灸其經足厥隂内屬於肝肝主筋及血一月之時血行否澀不為力事寢必安靜無令恐畏妊娠一月隂陽新合為胎寒多為痛熱多卒驚舉重腰痛腹滿胞急卒有所下當預安之宜服烏雌雞湯方烏雌雞一隻治如食法茯苓阿膠各二兩吳茱萸一升麥門冬五合人參芍藥白术各三兩甘草生薑各一兩右十味㕮咀以水一斗二升煑雞取汁六升去雞下藥煎取三升内酒三升并膠烊盡取三升放温毎服一升日三補胎湯若曽傷一月胎者當預服此方細辛一兩防風二兩乾地黄白术各三兩生薑四兩吳茱萸大麥各五合烏梅一升右八味㕮咀以水七升煮取二升半分三服先食服寒多者倍細辛茱萸熱多渇者去之加栝蔞根二兩若有所思去大麥加栢子仁三合一方有人參一兩妊娠二月名始膏無食辛臊居必靜處男子勿勞百節皆痛是為胎始結妊娠二月足少陽脉養不可針灸其經足少陽内屬于膽主精二月之時兒精成于胞裹當慎護驚動也妊娠二月始隂陽踞經有寒多壊不成有熱即萎悴中風寒有所動揺心滿臍下懸急腰背强痛卒有所下乍寒乍熱宜服艾葉湯方艾葉丹參當歸麻黄各二兩人參阿膠各三兩甘草四分生薑六兩大棗十二枚右九味㕮咀以酒三升水一斗煮減半去滓内膠煎取三升分三服一方用烏雌雞一隻宿肥者治如食法割頭取血内三升酒中相和次以水一斗二升先煮取汁去雞内藥煎取三升内血酒并膠煎取三升分温三服黄連湯若曽傷二月胎者當預服此方黄連人參各一兩吴茱萸五合生薑三兩生地黄五兩一方用阿膠右五味㕮咀以酢漿七升煮取三升分四服日三夜一十日一修合若頗覺不安加烏梅一升加烏梅者不用漿直取水耳一方用當歸半兩妊娠三月名始胎當此之時未有定儀見物而化欲生男者操弓矢欲生女者弄珠璣欲子美好數視璧玉欲子賢良端坐清虚是謂外象而内感者也妊娠三月手心主脉養不可針灸其經手心主内屬于心無悲哀思慮驚動妊娠三月為定形有寒大便青有熱小便難不赤即黄卒驚恐憂愁嗔怒喜頓仆動于經脉腹滿繞臍苦痛或腰背卒有所下雄雞湯方雄雞一隻治如食法黄芩白术生薑各一兩麥門冬五合芍藥四兩大棗十二枚擘甘草人參茯苓阿膠各二兩右十一味㕮咀以水一斗三升煮雞減半出雞内藥煮取半内清酒三升并膠煎取三升分三服一日令盡當温卧一方用當歸芎藭各二兩不用黄芩生薑茯神湯若曽傷三月胎者當預服此方茯神丹參龍骨各一兩阿膠當歸甘草人參各二兩大棗二十一枚赤小豆二十一枚右九味㕮咀以酢漿一斗煮取三升分四服先食服七日後服一劑腰痛者加桑寄生二兩深師有薤白二兩麻子一升妊娠四月始受水精以成血脉食宜稻粳羮宜魚雁是謂盛血氣以通耳目而行經絡妊娠四月手少陽脉養不可針灸其經手少陽内輸三焦四月之時兒六腑順成當靜形體和心志節飲食妊娠四月有寒心下愠愠欲嘔胷膈滿不欲食有熱小便難數數如淋狀臍下苦急卒風寒頸項强痛寒熱或驚動身軀腰背腹痛徃來有時胎上迫胷心煩不得安卒有所下菊花湯方菊花雞子大一枚麥門冬一升大棗十二枚人參一兩半甘草當歸各二兩麻黄阿膠各三兩半夏四兩生薑五兩右十味㕮咀以水八升煮減半内清酒三升并阿膠煎取三升分三服温卧當汗以粉粉之護風寒四五日一方用烏雌雞一隻煮水煎藥調中湯若曽傷四月胎者當預服此方白芍藥生薑各四兩厚朴枳實生李根白皮白术柴胡各三兩續斷芎藭甘草各一兩當歸一兩半烏梅一升右十二味㕮咀以水一斗煮取三升分四服日三夜一八日後復服一劑妊娠五月始受火精以成其氣卧必晏起沐浴浣衣深其居處厚其衣服朝吸天光以避寒殃其食稻麥其羮牛羊和以茱萸調以五味是謂養氣以定五臟妊娠五月足太隂脉養不可針灸其經足太隂内輸于脾五月之時兒四肢皆成無大饑無甚飽無食乾燥無自炙熱無太勞倦妊娠五月有熱苦頭眩心亂嘔吐有寒苦腹滿痛小便數卒有恐怖四肢疼痛寒熱胎動無常處腹痛悶頓欲仆卒有所下阿膠湯主之之方阿膠四兩人參一兩生薑六兩當歸芍藥甘草黄芩各二兩旋復花二合吳茱萸七合麥門冬一升右十味㕮咀以水九升煑藥減半内清酒三升并膠微火煎取三升半分四服日三夜一先食服便愈不瘥再服一方用烏雌雞一隻割取咽血内酒中以水煑雞以煎藥減半内酒并膠煎取三升半分四服安中湯曽傷五月胎者當預服此方黄芩一兩當歸芎藭乾地黄人參各二兩甘草芍藥各三兩生薑六兩麥門冬一升五味子大麻仁各五合大棗二十五枚右十二味㕮咀以水七升清酒五升煮取三升半分四服日三夜一七日復服一劑妊娠六月始受金精以成其筋身欲微勞無得静處出逰于野數觀走犬及視走馬食宜鷙鳥猛獸之肉是謂變腠理紉筋以養其力以堅背膂妊娠六月足陽明脉養不可針灸其經足陽明内屬于胃主其口目六月之時兒口目皆成調五味食甘美無太飽妊娠六月卒有所動不安寒熱徃來腹内脹滿身體腫驚怖忽有所下腹痛如欲産手足煩疼宜服麥門冬湯方麥門冬一介人參甘草黄芩各二兩乾地黄三兩阿膠四兩生薑六兩大棗十五枚右八味以水七升煮減半内清酒二升并膠煎取三升分三服中間進糜粥一方用烏雌雞一隻煑水以煎藥柴胡湯若曽傷六月胎者當預服此方柴胡四兩蓯蓉一兩白术芍藥一作紫葳甘草麥門冬芎藭各二兩生薑六兩乾地黄五兩大棗三十枚右十味㕮咀以水一斗煮取三升分四服日三夜一中間進糜粥勿食生冷及堅硬之物七日更服一劑妊娠七月始受木精以成其骨勞身摇肢無使定止動作屈伸以運血氣居處必燥飲食避寒常食稻粳以密腠理是謂養骨而堅齒妊娠七月手太隂脉養不可針灸其經手太隂内屬于肺主皮毛七月之時兒皮毛已成無大言無號哭無薄衣無洗浴無寒飲妊娠七月忽驚恐揺動腹痛卒有所下手足厥冷脉若傷寒煩熱腹滿短氣常苦頸項及腰背强蔥白湯主之之方蔥白長三四寸十四莖半夏麥門冬各一升旋復花二合黄芩一兩人參一兩半甘草當歸黄耆各三兩阿膠四兩生薑八兩右十一味㕮咀以水八升煮減半内清酒三升及膠煎取四升毎服一升日三夜一温卧當汗出若不出者加麻黄一兩煮服如前法若秋後勿强漬汗一方以黄雌雞一隻割咽取血内酒中煮雞取汁以煎藥杏仁湯若曽傷七月胎者當預服此方杏仁甘草各二兩紫菀一兩鍾乳乾薑各三兩麥門冬吳茱萸一升粳米五合五味子三合右九味㕮咀以水八升煮取三升半分四服日三夜一中間進食七日服一劑一方用白雞一隻煮汁煎藥妊娠八月始受土精以成膚革和心静息無使氣極是謂密腠理而光澤顔色妊娠八月手陽明脉養不可針灸其經手陽明内屬于大腸主九竅八月之時兒九竅皆成無食燥物無輙失食無忍大起妊娠八月中風寒有所犯觸身體盡痛乍寒乍熱胎動不安常苦頭眩痛繞臍下寒時時小便白如米汁或青或黄或使寒慄腰背苦冷而痛目􅉩􅉩芍藥湯主之之方芍藥四兩生薑四兩厚朴二兩甘草當歸白术人參各三兩薤白切一升右八味㕮咀以水五升清酒四升合煮取三升分三服日再夜一一方用烏雌雞煮汁以煎藥葵子湯若曽傷八月胎者當預服此方葵子二升甘草厚朴各二兩白术柴胡各三兩芍藥四兩生薑六兩大棗二十枚右八味㕮咀以水九升煮取三升分三服日三凡十日一劑一方用烏雌雞一隻煮水以煎藥妊娠九月始受石精以成皮毛六腑百節莫不畢備飲醴食甘緩帶自持而待之是謂養毛髮致才力妊娠九月足少隂脉養不可針灸其經足少隂内屬于腎腎主續縷九月之時兒脉續縷皆成無處濕冷無著灸衣妊娠九月若卒得下痢腹滿懸急胎上衝心腰背痛不可轉側短氣半夏湯方半夏麥門冬吳茱萸當歸阿膠各三兩乾薑一兩大棗十二枚右七味㕮咀以水九升煮取三升去滓内白蜜八合㣲火上温服四服痢即止一方用烏雌雞一隻煮汁煎藥猪腎湯若曽傷九月胎者當預服此方猪腎一具茯苓桑寄生乾薑乾地黄芎藭各三兩白术四兩附子中者一枚大豆三合麥門冬一升右十味㕮咀以水一斗煮腎令熟去腎内諸藥煎取三升半分四服日三夜一凡十日更一劑妊娠十月五臟俱備六腑齊通納天地氣于丹田故使關節人神皆備但俟時而生妊娠一月始胎二月始膏三月始胞四月形體成五月能動六月筋骨立七月毛髮生八月臟腑具九月穀氣入胃十月諸神備日滿即産矣宜服滑胎藥八月即服丹參膏養胎臨月服令滑而易産方丹參半斤芎藭當歸各二兩蜀椒五合有熱者以大麻仁五合代右四味㕮咀以清酒溲濕停一宿以成煎猪膏四升㣲火煎膏色赤如血膏成新布絞去滓毎日取如棗許内酒中服之不可逆服至臨月乃可服舊用常驗甘草散令易生母無疾病未生一月日預服過三十日行歩動作如故兒生墮地皆不自覺方甘草一兩黄芩一用茯苓乾薑吴茱萸大豆黄卷麻子仁桂心大麥糵各三兩一方用粳米右八味治下篩酒服方寸匕日三煖水服亦得千金圓主養胎治産難顛倒胞不出服一丸傷毁不下産餘病汗不出煩滿不止氣逆滿以酒服一丸一名保生丸甘草貝母秦椒大豆黄卷乾薑桂心黄芩粳米一作糯米石斛石膏各六銖當歸十二銖麻子三合右十二味為末蜜和丸如彈子大毎服一丸日三用棗湯下一方用蒲黄一兩蒸大黄圓治妊娠養胎令易産方大黄三十銖蒸枳實芎藭白术杏仁各十八銖芍藥乾薑厚朴各十二銖吳茱萸一兩右九味為末蜜丸如梧桐子大空腹酒下二丸日三不知稍加之滑胎令易産方阿膠八兩滑石三兩車前子一升右三味治下篩飲服方寸匕日再至生月乃服藥利九竅不可先服備急千金要方卷二
