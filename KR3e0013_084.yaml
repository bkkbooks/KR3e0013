body:
  text: 備急千金要方卷八十四唐孫思邈撰宋林億等校正平脈平脈大法第一論論曰夫脈者醫之大業也既不深究其道何以為醫者哉是以古之哲醫寤寐俯仰不與常人同域造次必於醫顛沛必於醫故能感於鬼神通於天地可以濟衆可以依憑若與常人混其波瀾則庶事隳壞使夫物類將何仰焉由是言之學者必當屏棄俗情凝心於此則和鵲之功因兹可得而致也經曰診脈之法常以平旦隂氣未動陽氣未散飲食未進經脈未盛絡脈調均氣血未亂故乃可診有過之脈脈經云過此非也均脈動靜而視精明察五色觀五藏有餘不足六腑強弱形之盛衰可以此參互訣生死之分也又曰平脈者皆於平旦勿食勿語消息體氣設有所作亦如食頃師亦如之既定先診寸口初重指切骨定畢便漸舉指令指不厚不薄與皮毛相得如三菽之重於輕重之間隨人強弱肥瘦以意消息進退舉按之宜稱其浮沉諸類應於四時五行與人五臟相應不爾者以其輕重相薄尋狀論寒暑得失凡人稟形氣有中適有躁靜各各不同氣脈潮動亦各隨其性韻故一呼而脈再至一吸而脈再至呼吸定息之間復一至合為五至此為平和中適者也春秋日夜正等無餘分時也其餘日則其呼而脈至多吸而脈至少或吸而脈至多呼而脈至少此則不同如冬夏日夜長短之異也凡氣脈呼吸法晝夜變通效四時然於呼吸定息應五至之限無有虧僻猶晷刻與四時有長短而歲功日數無遺也若人有羸有壯其呼吸雖相壓遏而晝夜息度隨其漏刻是謂呼吸象晝夜變通效四時夫診脈當以意先自消息壓取病人呼吸以自同而後察其脈數計於定息之限五至者為平人若有盈縮尋狀論病源之所宜也問曰何謂三部脈答曰寸關尺也凡人修短不同其形各異有尺寸分三關之法從肘腕中橫文至掌魚際後文却而十分之而入取九分是為尺從魚際後文却還度取十分之一則是寸寸十分之而入取九分之中則寸口也此處其骨自高故云隂得尺內一寸陽得寸內九分從寸口入却行六分為關分從關分又入六分為尺分又曰從魚際至高骨却行一寸其中名曰寸口從寸口至尺名曰尺澤故曰尺寸寸後尺前名曰關陽出隂入以關為界如天地人為三界寸主射上焦頭及皮毛竟手上部關主射中焦腹及腰中部尺主射下焦小腹至足下部此為三部法象三才天地人頭腹足為三元也夫十二經皆有動脈獨取寸口以決五臟六腑死生吉凶之候者何謂也然寸口者脈之大會手太隂之動脈也人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸人一日一夜凡一萬三千五百息脈行五十度周於其身漏水下百刻榮衛行陽二十五度行隂亦二十五度為一周晬時也故五十度而復會於手太隂太隂者寸口也即五臟六腑之所終始故法取於寸口人有三百六十脈法三百六十日也診五臟脈輕重法第二初持脈如三菽之重與皮毛相得者肺部金秋三月庚辛之氣如六菽之重與血脈相得者心部火夏三月丙丁之氣如九菽之重與肌肉相得者脾部土王四季季夏六月戊巳之氣如十二菽之重與筋平者肝部木春三月甲乙之氣按之至骨舉之來疾者腎部水冬三月壬癸之氣心肺俱浮何以别之然浮而大散者心也相火浮散浮而短澀者肺也法金吝澀腎肝俱沉何以别之然牢而長者肝也如卉生苖吐穎按之耎舉指來實者腎也濡弱如水舉重勝船脾者中州故其脈在中是隂陽之脈也千金翼云遲緩而長者脾也指下形狀第三浮脈舉之有餘按之不足浮於指下沉脈舉之不足按之有餘重按之乃得澀脈細而遲往來難且散或一止復來一曰浮而短一曰短而止或如散滑脈往來前却流利展轉替替然與數相似一曰浮中如有九一曰漉漉如欲脫洪脈極大在指下一曰浮而大細脈小大於微常有但細耳微脈極細而軟或欲絶若有若無一曰小也一曰手下快一曰薄一曰按之如欲盛也弦脈舉之無有按之如張弓弦狀一曰如張弓弦按之不移又曰浮緊弓為弦也緊脈數如切繩狀一曰如轉索之無常遲脈呼吸三至去來極遲一曰舉之不足按之盡牢一曰按之盡牢舉之無有散脈去來促急一曰一息云土至一曰數者進之名緩脈去來亦遲小駃於遲一曰浮大而軟隂與陽同著弱脈極軟而沉細按之欲絶指下一曰按之乃得舉之即無動脈見於關上無頭尾大如豆厥厥動搖伏脈極重指著骨乃得一曰關上沈不出名曰伏一曰手下裁動一曰按之不足舉之無有芤脈浮大而軟按之中央空兩邉實一曰指下無兩傍有軟脈極軟而浮細一曰按之無有舉之有餘一曰細小如軟千金翼軟作濡虛脈遲大而軟按之不足隱指豁豁然空實脈大而長微強按之隱指愊愊然一曰沈浮皆得促脈來去數時一止結脈往來緩時一止復來脈結者生代脈來數中止不能自還因而復動脈代者死散脈大而散散者氣實血虛有表無裏革脈有似沈伏實大而長微弦千金翼以革為牢弦與緊相類軟與弱相類浮與芤相類又曰浮與洪相類微與澀相類沈與伏相類緩與遲相類又曰軟與遲相類革與實相類翼作牢與實相類􅉸與數相類五臟脈所屬第四心部在左手關前寸口亦名人迎肝部在左手關上腎部在左手關後尺中肺部在右手關前寸口亦名氣口脾部在右手關上腎部在右手關後尺中脈法讃云肝心出左脾肺出右腎與命門俱出尺部魂魄榖神皆見寸口左主司官右主司府左大順男右大順女關前一分人命之主左為人迎右為氣口神門決斷兩在關後人無二脈病死不愈諸經損減各隨其部三隂三陽一云按察隂陽誰先誰後隂病治官官藏內也陽病治府府外也竒邪所舍如何捕取審而知之針入病愈脈有三部隂陽相乘榮衛氣血而行人躬呼吸出入上下於中因息遊布津液流通隨時動作效象形容春弦秋浮冬沈夏洪察色觀脈大小不同一時之間變無經常尺寸參差或短或長上下乖錯或存或亡病輒改易進退低昂心迷意惑動失紀綱願為縷陳令得分明師曰子之所問道之根源脈有三部尺寸及關榮衛流行不失衡銓腎沈心洪肺浮肝弦此自常經不失銖分出入升降漏刻周旋水下二刻脈一周身旋復寸口虛實見焉變化相乘隂陽相干風則浮虛寒則緊弦沈潛水畜支飲急弦動弦為痛數洪熱煩設有不應知變所緣三部不同病各異端太過可怪不及亦然邪不空見終必有姦審察表裏三焦别分知邪所舍消息診看料度腑臟獨見若神分别病形狀第五脈數則在腑遲在臟脈長而弦病在肝脈經作出於肝脈小血少病在心扁鵲云脈大而洪出於心脈下堅上虛病在脾胃脈滑一作澀而微浮病在肺脈大而堅病在腎扁鵲云小而緊脈滑者多血少氣脈澀者少血多氣脈大者血氣俱多又云脈來大而堅者血氣俱實脈小者血氣俱少又云脈來細而微者血氣俱虛沈細滑疾者熱遲緊為寒脈經云洪數􅉸疾為熱澀遲沈細為寒脈盛滑緊者病在外熱脈小實而緊者病在內冷脈小弱而澀謂之久病脈滑浮而疾者謂之新病脈浮滑其人外熱風走刺有飲難治脈沈而緊上焦有熱下寒得冷即便下脈沈而細下焦有寒小便數時苦絞痛下利重脈浮緊且滑直者外熱內冷不得大小便脈洪大緊急病速進在外苦頭發熱癰腫脈細小緊急病速進在中寒為疝瘕積聚腹中刺痛脈沈重而直前絶者病血在腸間脈沈重而中散者因寒食成癥脈直前而中散絶者病消渴一云病浸淫瘡脈沈重前不至寸口徘徊絶者病在肌肉遁尸脈左轉而沈重者氣微陽在胸中脈右轉出不至寸口者內有肉癥脈纍纍如貫珠不前至有風寒在大腸伏留不去脈纍纍如止不至寸口軟者結熱在小腸膜中伏留不去脈直前左右彈者病在血脈中胚血也脈後而左右彈者病在筋骨中也脈前大後小即頭痛目眩脈前小後大即胸滿短氣上部有脈下部無脈其人當吐不吐者死上部無脈下部有脈雖困無所苦夫脈者血之府也長則氣治短則氣病數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細太素作滑則氣少澀則心痛渾渾革革至如涌泉病進而危弊弊綽綽其去如弦絶者死短而急者病在上長而緩者病在下沈而弦急者病在內浮而洪大者病在外脈實者病在內脈虛者病在外在上為表在下為裏浮為在表沈為在裏滑為實為下又為陽氣裏數為虛為熱浮為風為虛動為痛為驚沈為水為實又為鬼疰弱為虛為悸遲則為寒澀則少血緩則為虛洪則為氣一作熱緊則為寒弦數為瘧瘧脈自弦弦數多熱弦遲多寒微則為虛代散則死弦為痛痺一作浮為風疰偏弦為飲雙弦則脅下拘急而痛其人澀澀惡寒脈大寒熱在中伏者霍亂安臥脈盛謂之脫血凡亡汗肺中寒飲冷水咳嗽下利胃中虛冷此等其脈並緊浮而大者風浮大者中風頭重鼻塞浮而緩皮膚不仁風寒入肌肉滑而浮散者攤緩風滑為鬼疰澀而緊痺病浮洪大長者風眩癲疾大堅疾者癲病弦而鈎脅下如刀刺狀如蜚尸至困不死緊而急者遁尸洪大者傷寒熱病浮洪大者傷寒秋吉春成病浮而滑者宿食浮滑而疾者食不消脾不磨短疾而滑酒病浮而細滑傷飲遲而澀中寒有癥結駃而緊積聚有擊痛弦急疝瘕小腹痛又為癖病一作疽病遲而滑者脹盛而緊曰脹弦小者寒澼沈而弦者懸飲內痛弦數有寒飲冬夏難治緊而滑者吐逆小弱而澀胃反遲而緩者有寒微而緊者有寒沈而遲腹藏有冷病微弱者有寒少氣實緊胃中有寒苦不能食時時利者難治一作時時嘔稽難治滑數心下結熱盛滑疾胃中有熱緩而滑曰熱中沈而急病傷暑暴發虛熱浮而絶者氣辟大而滑中有短氣浮短者其人肺傷諸氣微少不過一年死法當嗽也沈而數中水冬不治自愈短而數心痛心煩弦而緊脅痛臟傷有瘀血一作有寒血沈而滑為下重亦為有膂痛脈來細而滑按之能虛因急持直者僵仆從高墮下病在內微浮秋吉冬成病微數雖甚不成病不可勞浮滑疾緊者以合百病久易愈陽邪來見浮洪隂邪來見沈細水榖來見堅實脈來乍大乍小乍長乍短者為崇脈來洪大嫋嫋者崇脈來沈沈澤澤四肢不仁而重土崇脈與肌肉相得久持之至者可下之弦小緊者可下之緊而數寒熱俱發必下乃愈弦遲者宜溫藥緊數者可發其汗三關主對法第六諸浮諸弦諸沈諸緊諸澀諸滑若在寸口膈以上病頭部若在關上胃以下病腹部若在尺中腎以下病腰腳部平寸口脈主對法寸口脈滑而遲不沈不浮不長不短為無病左右同法寸口太過與不及寸口之脈中手短者曰頭痛中手長者曰足脛痛中手促上擊者曰肩背痛寸口脈沈而堅者曰病在中寸口脈浮而盛者曰病在外寸口脈沈而弱者曰寒熱及疝瘕小腹痛熱一作氣又作中寸口脈沈而弱髮必墮落寸口脈沈而緊苦心下有寒時時痛有積邪寸口脈沈而滑者胸中有水氣面目腫有微熱為風水寸口脈沈大而滑沈即為血實滑即為氣實血氣相摶入臟即死入腑即愈寸口脈沈胸中短氣寸口脈沈而喘者寒熱寸口脈浮而滑頭中痛寸口脈浮大按之反澀尺中亦微而澀故知有滯氣宿食寸口脈弦而緊弦即衛氣不行衛氣不行即惡寒水流走腸間寸口脈緊或浮膈上有寒肺下有水氣脈緊上寸口者中風風頭痛亦如之翼云亦為傷寒頭痛脈弦上寸口者宿食降者頭痛寸口脈弦大婦人半生漏下男子亡血失精寸口脈微而弱微即惡寒弱則發熱當發不發骨節疼煩當煩不煩與極汗出寸口脈微而弱氣血俱虛男子吐血婦人下血嘔汗出寸口脈動而弱動即為驚弱即為悸寸口脈緩而遲緩即為虛遲即為寒虛寒相摶則欲溫食食冷即咽痛寸口脈遲而緩遲則為寒緩即為氣寒氣相摶則絞而痛寸口脈遲而澀遲即為寒澀為少血脈來過寸入魚際者遺尿脈出魚際逆氣喘息寸口脈但實者心勞寸口脈潎潎如羮上肥陽氣微連連如蜘蛛絲隂氣衰兩手前部陽絶者苦心下寒毒喙中熱寸口脈偏絶則臂偏不遂其人兩手俱絶者不可治寸口脈來暫大暫小者隂絡也苦隂風痺應時自發身洗洗也寸口脈來暫小暫大者陽絡也苦皮膚病汗出惡寒下部不仁寸口脈浮中風發熱頭痛宜服桂枝湯葛根湯針風地風府向火炙身摩治風膏覆令汗出寸口脈緊苦頭痛是傷寒宜服麻黃湯發汗針眉衝顳顬摩傷寒膏寸口脈微苦寒為衄宜服五味子湯麻黃茱萸膏令汗出寸口脈數即為吐以有熱在胃管熏胸中宜服藥吐之及針胃管服除熱湯若傷寒七八日至十日熱在中煩滿渴者宜服知母湯寸口脈洪大胸脅滿宜服生薑湯白薇丸亦可紫菀湯下之針上管期門章門寸口脈緩皮膚不仁風寒在肌肉宜服防風湯以藥薄尉之佳炙諸治風穴寸口脈滑陽實胸中壅滿吐逆宜服前胡湯針太陽巨闕瀉之寸口脈弦心下愊愊微頭痛心下有水氣宜服甘遂丸針期門瀉之寸口脈弱陽氣虛弱自汗出宜服茯苓湯內補散將適飲食消息勿極勞針胃管補之寸口脈澀是胃氣不足宜服乾地黃湯自飬調和飲食針胃管一作三里補之寸口脈芤吐血微芤者衄血空虛去血故也宜服竹皮湯黃土湯炙膻中寸口脈伏胸中逆氣噎塞是諸氣上衝胸中宜服前胡湯大三建丸針巨闕瀉寸口脈沈胸中引脅痛胸中有水氣宜服澤漆湯針巨闕瀉之寸口脈軟弱自汗出是虛損病宜服乾地黃湯薯蕷丸內補散牡蠣散并粉針大衝補之寸口脈遲上焦有寒心痛咽酸吐酸水宜服附子湯生薑湯茱茰丸調和飲食以暖之寸口脈實即生熱在脾肺嘔逆氣塞虛則生寒在脾胃食不消化熱即宜服竹葉湯葛根湯寒即茱萸丸生薑湯寸口脈細發熱嘔吐宜服黃芩龍膽湯吐不止宜服橘皮桔梗湯灸中府平關脈主對法關上脈浮而大風在胃中張口肩息心下淡淡食欲嘔關上脈微浮積熱在胃中嘔吐蛔蟲心健忘關上脈滑而大小不均必吐逆是為病方欲來不出一二日復欲發動其人欲多飲飲即注利如利止者生不止者死關上脈緊而滑者蛔動關上脈弦而長翼作大有痛如刀刺之狀在臍左右上下脈經云有積在臍左右上下關上脈澀而堅大而實按之不減有力為中焦實有伏結在脾肺氣塞實熱在胃中關上脈襜襜大而尺寸細者其人必心腹冷積癥瘕結聚欲熱飲食關上脈時來時去乍大乍小乍疏乍數者胃中寒熱羸劣不欲飲食如瘧狀關上脈浮腹滿不欲食浮為虛滿宜服平胃丸茯苓湯生薑前胡湯針胃管先瀉後補之關上脈緊心下苦滿痛脈緊為實宜服茱萸當歸湯又加大黃二兩佳脈經云又大黃湯兩治之佳針巨闕下管瀉之關上脈微胃中冷心下拘急宜服附子湯生薑湯附子丸針巨闕補之關上脈數胃中有客熱宜服知母湯一作丸除熱湯針巨闕上管瀉之關上脈緩不欲食此脾胃氣不足宜服平胃丸補脾湯又針章門補之關上脈滑胃中有熱滑為熱實氣滿故不欲食食即吐逆宜服朴硝麻黃湯平胃丸一作宜服紫菀湯人參大平胃散針胃管瀉之關上脈弦胃中有冷心下厥逆脈弦胃氣虛宜服茱萸湯溫調飲食針胃管補之關上脈弱胃氣虛胃中有客熱脈弱為虛熱作病且説云有熱不可大攻之熱去即寒起正宜服竹葉湯針胃管補之關上脈細虛腹滿宜服生薑湯茱萸蜀椒湯白薇丸針灸三管關上脈澀血氣逆冷脈澀為血虛宜服乾地黃湯四補散針足大衝上補之關上脈芤大便去血宜服生地黃并生竹皮湯灸膈輸若重下去血針關元甚者服龍骨丸關元一作巨闕關上脈伏有水氣溏泄宜服水銀丸針關元利小便止溏泄便止關上脈洪胃中熱必煩滿宜服平胃丸針胃管先瀉後補之關上脈沈心下有冷氣苦滿吞酸宜服白薇丸茯苓丸附子湯針胃管補之關上脈軟苦虛冷脾氣弱重下病宜服赤石脂湯女萎丸針關元補之關上脈遲胃中寒宜服桂枝丸茱萸湯針胃管補之關上脈實胃中痛宜服梔子湯茱萸烏頭丸針胃管補之關上脈勞脾胃氣塞盛熱即腹滿嚮嚮宜服紫菀丸瀉脾丸針灸胃管瀉之平尺脈主對法尺脈浮者客陽在下焦尺脈弱下焦冷無陽氣上熱衝頭面尺脈弱寸強胃絡脈傷尺脈偏滑疾面赤如醉外熱則疾尺脈細微溏泄下冷利素問云尺寒脈細謂之後泄尺脈虛小者足脛寒痿痺腳疼尺脈澀下血不利多汗素問云尺澀脈􅉸謂之多汗尺脈沈而滑者寸白蟲尺脈細而急者筋攣痺不能行尺脈大者熱在脬中小便赤痛尺脈粗常熟者謂之熱中腰胯疼小便赤熱尺脈按之不絶婦人血閉與關相應和滑者男子氣血實婦人即為妊娠尺脈來而斷絶者男子小腹有滯氣婦人月水不利尺脈俱軟弱內愠熱手足逆冷汗出尺脈俱沈關上無有者苦心下喘尺脈俱沈關上若有苦寒心下痛隂中冷腳痺尺脈俱微少心力不欲言血氣不足其人腳弱短氣尺脈俱數手足頭面有熱俱遲有寒手足頭面有冷風尺脈浮下熱風小便難宜服瞿麥湯滑石散針橫骨關元瀉之尺脈緊臍下痛宜服當歸湯灸天樞針關元補之尺脈微厥逆小腹中拘急有寒氣宜服小建中湯針氣海尺脈數惡寒臍下熱痛小便赤黃宜服雞子湯白魚散針橫骨瀉之尺脈緩腳弱下腫一無此四字小便難有餘瀝宜服滑石湯瞿麥散針橫骨瀉之尺脈滑血氣實經脈不利宜服朴硝煎大黃湯下去經血針關元瀉之尺脈弦小腹疼小腹及腳中拘急宜服建中湯當歸湯針氣海瀉之尺脈弱氣少發熱骨煩宜服前胡湯乾地黃茯苓湯針關元補之尺脈澀足脛逆冷小便赤宜服附子四逆湯針足大衝補之尺脈孔下焦虛小便去血宜服竹皮生地黃湯灸丹田關元尺脈伏小腹痛癥疝水榖不化宜服大平胃丸桔梗丸針關元補之尺脈沈腰背痛宜服腎氣丸針京門補之尺脈軟腳不收風痺一無此五字小便難宜服瞿麥湯白魚散針關元瀉之尺脈牢腹滿隂中急宜服葶藶子茱萸丸針丹田關元中極尺脈遲下焦有寒宜服桂枝丸針氣海關元瀉之尺脈實小腹痛小便不禁宜服當歸湯加大黃一兩利大便針關元補之備急千金要方卷八十四
