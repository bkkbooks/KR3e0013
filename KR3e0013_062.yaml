body:
  text: 備急千金要方卷六十二唐孫思邈撰宋林億等校正膀胱腑方霍亂第六論方證法灸論曰原霍亂之為病也皆因飲食非關鬼神夫飽食肫膾復餐乳酪海陸百品無所不噉眠臥冷席多飲寒漿胃中諸食結而不消陰陽二氣擁而反戾陽氣欲升陰氣欲降陰陽乖隔變成吐痢頭痛如破百節如解遍體諸筋皆為回轉論證雖小卒病之中最為可畏雖臨深履危不足以諭之養生者宜達其旨趣庶可免於夭橫矣凡霍亂務在溫和將息若冷即遍體轉筋凡此病定一日不食為佳仍須三日少少喫粥三日已後可恣意食息七日勿雜食為佳所以養脾氣也大凡霍亂皆中食膾酪及飽食雜物過度不能自裁夜臥失覆不善將息所致以此隕命者衆人生稟命以五臟為主夫五臟者即是五行內為五行外為五味五行五味更宜扶抑所以春夏秋冬逆調理之食啖不可過度凡飲食於五臟相剋者為病相生者無他經曰春不食辛夏無食鹹季夏無食酸秋無食苦冬無食甘此不必全不食但慎其太甚耳諺曰百病從口生蓋不虛也四時昏食不得太飽皆能生病從夏至秋分忌食肥濃然熱月人自好冷食更與肥濃兼食果菜無節極遂逐冷眠臥冷水洗浴五味更相剋賊雖欲無病不可得也所以病苦人自作之非關運也書曰非天夭人人中自絶命此之謂也凡諸霍亂忌與米飲胃中得米即吐不止但與厚朴葛根飲若冬瓜葉飲但沾清咽喉而不可多與若服湯時隨服吐者候吐定乃止診脈絶不通以桂合葛根為飲吐下心煩肉熱汗不出不轉筋脈急數者可犀角合葛根為飲吐下不止發熱心煩欲飲水可少飲米粉汁為佳若不止可與葛根薺苨飲服之問曰病有霍亂者何師曰嘔吐而利此為霍亂問曰病者發熱頭痛身體疼惡寒而復吐利當屬何病師曰當為霍亂霍亂吐利止而復發熱也傷寒其脈微澀本是霍亂今是傷寒却四五日至陰經上轉入陰必利本反下利者不可治也霍亂吐多者必轉筋不渴即臍上築霍亂而臍上築者為腎氣動當先治其築治中湯主之去术加桂心去术者以术虛故也加桂者恐作賁豚也霍亂而臍上築吐多者若下多者霍亂而驚悸霍亂而渴霍亂而腹中痛嘔而吐利嘔而利欲得水者皆用治中湯主之治中湯治霍亂吐下脹滿食不消化心腹痛方人參乾薑白术甘草各三兩右四味㕮咀以水八升煮取三升分三服不瘥頻服三劑逺行防霍亂依前作丸如梧子大服三十丸如作散服方寸匕酒服亦得若轉筋者加石膏三兩仲景云若臍上築者腎氣動也去术加桂心四兩吐多者去术加生薑三兩下多者復用术悸者加茯苓二兩渴欲得水者加术合前胡四兩半腹中痛者加人參合前胡四兩半若寒者加乾薑合前胡四兩半腹滿者去术加附子一枚服湯後一食頃服熱粥一升微自溫勿發揭衣被也桂枝湯治吐利止而身體痛不休者當消息和解其外以此湯小和之方見傷寒篇中四順湯治霍亂轉筋肉冷汗出嘔啘者方附子一兩人參乾薑甘草各三兩右四味㕮咀以水六升煮取二升分三服范注云利甚加龍骨二兩四逆湯治多寒手足厥冷脈絶方生薑八兩當歸芍藥細辛桂心各三兩大棗二十五枚通草甘草各二兩吳茱茰二升右九味㕮咀以水六升酒六升合煮取五升分五服舊方用棗三十枚今以霍亂病法多痞故除之如退棗入葛根二兩佳霍亂四逆加半夏一合附子小者一枚惡寒乃與大附子又方治吐下而汗出小便復利或下利清榖裏寒外熱脈微欲絶或發熱惡寒四肢拘急手足厥方甘草二兩乾薑一兩半附子一枚右三味㕮咀以水三升煮取一升二合溫分再服強者可與大附子一枚乾薑至三兩廣濟方若吐後吸吸少氣及下而腹滿者加人參一兩通脈四逆湯治吐利已斷汗出而厥四肢拘急不解脈微欲絶方大附子一枚甘草一兩半乾薑三兩強者四兩右三味㕮咀以水三升煮取一升二合分二服脈出即愈若靣色赤者加蔥白九莖腹中痛者去蔥加芍藥二兩嘔逆加生薑三兩咽痛去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩皆與方相應乃服之仲景用通脈四逆加豬膽汁湯竹葉湯治霍亂吐利已服理中四順等湯熱不解者方竹葉一握小麥一升生薑十纍甘草人參附子芍藥各一兩橘皮當歸桂心各二兩白术三兩右十一味㕮咀以水一斗半先煮竹葉小麥取八升去滓下藥煮取三升分三服上氣者加吳茱茰半升即瘥理中四順湯皆大熱若有熱宜竹葉湯古今録驗無芍藥甘草瀉心湯治婦人霍亂嘔逆吐涎沫醫反下之心下即痞當先治其涎沫可服小青龍湯涎沫止次治其痞可與此方甘草四兩乾薑黃芩各三兩黃連一兩半夏半升大棗十二枚右六味㕮咀以水一斗煮取六升分六服小青龍湯治婦人霍亂嘔吐方見第十八卷中附子粳米湯治霍亂四逆吐少嘔多者方中附子一枚粳米五合半夏半升大棗十枚乾薑仲景方無甘草各一兩右六味㕮咀以水八升煮藥取米熟去滓分三服理中散治年老羸劣冷氣惡心飲食不化心腹虛滿拘急短氣霍亂嘔逆四肢厥冷心煩氣悶流汗扶老方麥門冬乾薑各六兩人參白术甘草各五兩附子茯苓各三兩右七味治下篩以白湯三合服方寸匕常服將蜜丸如梧子大酒服二十丸人參湯治毒冷霍亂吐利煩嘔轉筋肉冷汗出手足指皆腫喘息垂死絶語音不出百方不效脈不通者服此湯取瘥乃止隨吐續服勿止并灸之之方人參附子厚朴茯苓甘草橘皮當歸葛根乾薑桂心各二兩右十味㕮咀以水七升煮取二升半分為三服治霍亂蠱毒宿食不消積冷心腹煩滿鬼氣方右用極鹹鹽湯三升熱飲一升刺口令吐宿食使盡不吐更服吐訖復飲三吐乃住靜止此法大勝諸治俗人以為田舍淺近法鄙而不用守死而已凡有此病即須先用之治霍亂方藊豆香薷各一升右二味以水六升煮取二升分服單用亦得治霍亂洞下不止者方右用艾一把水三升煮取一升頓服之良又方香葇一把水四升煮取一升頓服之青木香亦佳治霍亂吐下腹痛方右以桃葉煎汁服一升立止冬用皮治霍亂引飲輒乾嘔方右用生薑五兩㕮咀以水五升煮取二升半分二服高良薑大佳杜仲圓治霍亂久將逺行預備方杜仲藿香白术橘皮吳茱茰乾薑人參厚朴木香雞舌香瞿麥桂心葧荷女萎茴香右十五味等分為未蜜丸如梧子酒下二十丸治霍亂永不發丸方虎掌薇銜各二兩枳實附子人參檳榔乾薑各三兩厚朴六兩皂莢三寸白术五兩右十味為未蜜丸如梧子大每服酒下二十丸日三武德中有德行尼名淨明患此已久或一月一發或一月再發發即至死時在朝大醫蔣許甘巢之徒亦不能識余以霍亂治之處此方得愈故疏而記之凡先服石人因霍亂吐下服諸熱藥吐下得止因即變虛心煩手足熱口燥欲得水嘔逆迷悶脈急數者及時行熱病後毒未盡因霍亂吐下仍發熱心胸欲裂者以此解之方薺苨人參厚朴知母栝蔞根茯苓犀角藍子枳實桔梗橘皮葛根黃芩甘草各二兩右十四味㕮咀以水一斗煮取三升分為三服治中熱霍亂暴利心煩脈數欲得冷水者方右以新汲井水頓服一升立愈先患胃口冷者勿服之治霍亂醫所不治祕方右用童女月經衣合血燒末酒服方寸匕百方不瘥者用之治霍亂轉筋方右用蓼一把去兩頭以水二升煮取一升頓服之一方作梨葉又方燒舊木梳灰為末酒服一枚小者永瘥又方車轂中脂塗足心下瘥治霍亂轉筋入腹無奈何者方作極鹹鹽湯於槽中暖漬之又方以酢煮青布拓之冷即易治轉筋不止者方男子則以手挽其陰牽之女子則挽其乳近左右邉灸法論曰凡霍亂灸之或雖未能立瘥終無死憂不可逆灸或但先腹痛或先下後吐當隨病狀灸之若先心痛及先吐者灸巨闕七壯在心下一寸不效更灸如前數若先腹痛者灸太倉三七壯穴在心厭下四寸臍上一寸不止更灸如前數若吐下不禁兩手陰陽脈俱疾數者灸心蔽骨下三寸又灸臍下三寸各六七十壯若乾嘔者灸間使各七壯在手腕後三寸兩筋間不瘥更灸如前數若嘔啘者灸心主各七壯在掌腕上約中吐不止更灸如前數若手足逆冷灸三陰交各七壯在足內踝直上三寸亷骨際未瘥更灸如前數若先下利者灸榖門二七壯在臍傍二寸男左女右一名大腸募不瘥更灸如前數若下不止者灸大都七壯在足大趾本節後內側白肉際若泄利所傷煩欲死者灸慈宫二七壯在橫骨兩邊各二寸半橫骨在臍下橫門骨是轉筋在兩臂及胸中者灸手掌白肉際七壯又灸亶中中府巨闕胃管尺澤并治筋拘頭及足皆愈走哺轉筋灸踵踝白肉際各三七壯又灸小腹下橫骨中央隨年壯轉筋四厥灸兩乳根黑白際各一壯轉筋灸湧泉六七壯在足心下當拇指大筋上又灸足大趾下約中一壯轉筋不止灸足踵聚筋上白肉際七壯立愈轉筋入腹痛欲死四人持手足灸臍上一寸十四壯自不動勿復持之又灸股裏大筋去陰一寸霍亂轉筋令病人合面正臥伸兩手著身以繩橫量兩肘尖頭依繩下俠脊骨兩邉相去各一寸半灸一百壯無不瘥肘後云此華他法霍亂已死有暖氣者灸承筋七壯取繩量圍足從趾至跟匝總取等折一半以度令一頭至跟踏地處引綖上至度頭即是穴起死人又以鹽內臍中灸二七壯雜補第七論方論曰彭祖云使人丁壯不老房室不勞損氣力顔色不衰者莫過麋角其法刮為末十兩用生附子一枚合之酒服方寸匕日三大良亦可熬令微黃單服之亦令人不老然遲緩不及附子者又以雀卵和為丸彌佳服之二十日大效琥珀散治虛勞百病除陰痿精清力不足大小便不利如淋狀腦門受寒氣結在關元強行陰陽精少餘瀝腰脊痛四肢重咽乾口燥食無常味乏氣力逺視􅉩􅉩驚悸不安五臟虛勞上氣滿悶方琥珀研蕪菁子胡麻子車前子蛇床子莵絲子枸杞子菴䕡子麥門冬各一升橘皮肉蓯蓉松脂牡蠣各四兩松子柏子荏子各三升桂心石韋石斛滑石茯苓芎藭人參杜蘅續斷逺志當歸牛膝牡丹各三兩通草十四分右三十味各治下篩合搗二千杵盛以韋囊先食服方寸匕日三夜一用牛羊乳汁煎令熟長服令人強性輕體益氣消穀能食耐寒暑百病除雖御十女不勞損令精實如膏服後七十日可得行房久服老而更少髮白反黑齒落重生蓯蓉散主輕身益氣強骨補髓不足能使陰氣強盛方肉蓯蓉五味子逺志甘草各一斤生地黃三十斤取汁慎火草切楮子乾漆各二升右八味以地黃汁浸一宿出曝乾復漬令汁盡為散空腹酒服方寸匕日三服三十日力倍常雖御十女無損禿雞散有房室人常服勿絶方蛇床子莵絲子逺志防風五味子巴戟杜仲蓯蓉各二兩右八味治下篩酒服方寸匕日二無室勿服天雄散治五勞七傷陰痿不起衰損者方天雄五味子逺志各一兩蓯蓉十分蛇床子莵絲子各六兩右六味治下篩酒服方寸匕日三常服勿止治陰下濕癢生瘡失精陰痿方牡蒙莵絲子柏子仁蛇床子蓯蓉各二兩右五味治下篩酒服方寸匕日三以知為度治陰痿精薄而冷方蓯蓉鍾乳逺志蛇床子續斷薯蕷鹿茸各三兩右七味治下篩酒下方寸匕日二欲多房室倍蛇床欲堅倍逺志欲大倍鹿茸欲多精倍鍾乳治五勞七傷庶事衰惡方巴戟天蛇牀子天雄薯蕷各三分雄蠶蛾十枚五味子石斛蓯蓉各五分莵絲子牛膝逺志各二分右十一味治下篩以酒服方寸匕日三石硫黃散極益房勞嗽虛損方石硫黃白石英鹿茸逺志蛇牀子五味子天雄殭蠶白馬莖莵絲子女萎各等分右十一味治下篩酒服方寸匕日三無房勿服又方蘿摩六兩五味子酸棗仁柏子仁乾地黃枸杞根皮各三兩右六味治下篩酒服方寸匕日三又方車前子莖葉根治下篩服方寸匕強隂益精常餌補方枸杞子一斤天雄三兩蓯蓉石斛乾薑各八兩莵絲子逺志續斷各五兩乾地黃十兩右九味治下篩酒服方寸匕日二食無所忌服藥十日候莖頭紫色乃可行房治男子陰氣衰腰背痛苦寒莖消少精小便餘瀝出失精囊下濕癢虛乏服此令人充實肌膚肥恱方巴戟天莵絲子杜仲桑螵蛸石斛右五味等分治下篩酒服方寸匕日一常服佳又方薯蕷巴戟天山茱茰丹參人參各五分蛇牀子五味子各四分天雄細辛各三分桂心二分乾地黃十分右十一味治下篩酒服方寸匕日二夜一又方五味子蛇牀子各二兩續斷牛膝各三兩車前子蓯蓉各四兩右六味治下篩酒服方寸匕日二杜仲散益氣補虛治男子羸瘦短氣五臟痿損腰痛不能房室方杜仲蛇牀子五味子乾地黃六分蓯蓉逺志各八分木防巳五分巴戟天七分莵絲子十分右九味治下篩食前酒服方寸匕日二長服不絶佳蓯蓉散補虛益陽治陽氣不足陰囊濕癢尿有餘瀝漏泄虛損云為不起方又方見前蓯蓉續斷各八分蛇牀子九分五味子天雄薯蕷各七分逺志六分乾地黃巴戟天各五分右九味治下篩酒服方寸匕日三凡病皆由醉飽後或疲極之餘而合陰陽致成此病也白馬莖圎治空房獨怒見敵不興口乾汗出失精囊下濕癢尿有餘瀝卵偏大引疼膝冷脛痠目中􅉩􅉩小腹急腰脊強男子百病方白馬莖石韋天雄逺志赤石脂蛇牀子菖蒲薯蕷杜仲栝蔞根肉蓯蓉石斛續斷牛膝山茱茰柏子仁細辛防風各八分右十八味為末白蜜丸如梧子大酒服四丸日再服漸加至二十丸七日知一月日百病愈治陰痿方雄雞肝一具鯉魚膽一枚右二味陰乾百日為末雀卵和丸如小豆大吞一丸又方莵絲子一升雄雞肝三具陰乾百日右二味為末雀卵和丸如小豆大每服一丸日三又方乾漆白术甘草莵絲子蓯蓉牛膝巴戟天五味子桂心各三兩石南石龍芮各一兩乾地黃四兩右十二味為末蜜和丸如梧桐子酒服二十丸日三又方用蜂房灰夜臥傅之又方用原蠶蛾未連者一升陰乾去頭足毛羽為末白蜜丸如梧子大每用一丸夜臥鹽湯下又方磁石五斤研清酒三斗漬二七日每服二合日三夜一又方常服天門冬亦佳又方五味子一斤新好者治下篩酒服方寸匕日三稍加至三匕無所慎忌食豬魚大蒜大醋盡一劑即得力百日已上可見功效服藥常令相續不絶四時勿廢功能自知又方莵絲子五味子蛇牀子各等分右三味為末蜜丸如梧子飲服三丸日三又方蛇牀子莵絲子杜仲各五分蓯蓉八分五味子四分右五味為末蜜丸如梧子每服酒下十四丸日二夜一又方蛇牀子末三兩莵絲子汁二合右二味相和用又方蛇牀子蓯蓉逺志各三分附子一分右四味為末以唾和丸如梧子大每用一丸又方蛇牀子三分天雄逺志各二分桂心一分無食子一枚右五味為末用備急千金要方卷六十二
