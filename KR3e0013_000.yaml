body:
  text: 千金要方醫家類提要臣等謹案千金要方九十三卷唐孫思邈撰思邈華原人唐書隠逸傳稱其少時周洛州刺史獨孤信稱為聖童及長隠居太白山隋文帝輔政以國子博士徵不起則思邈生於周朝入隋已長然盧照鄰病犁樹賦序稱癸酉嵗於長安見思邈自云開皇辛酉嵗生今年九十二則思邈生於隋朝照鄰乃思邈之弟子記其師言必不妄惟以隋書考之開皇紀號凡二十年止于庚申次年辛酉已改元仁夀與史殊不相符又由唐髙宗咸亨四年癸酉上推九十二年為開皇二年壬寅實非辛酉干支亦不相應然自癸酉上推九十三年正得開皇元年辛丑葢照鄰集𫝊寫訛異以辛丑為辛酉以九十三為九十二也史又稱思邈卒于永淳元年年百餘嵗自是年上推至開皇辛丑正一百二年數亦相合則生于後周隠居不仕之説為史誤審矣思邈嘗謂人命至重貴于千金一方濟之徳踰于此故所著方書以千金名凡診治之訣針灸之法以至導引飬生之術無不周悉猶慮有遺缺更撰翼方輔之攷晁陳諸家著録載千金方千金翼方各三十卷錢曽讀書敏求記所載卷數亦同又謂宋仁宗命髙保衡林億等校正刋行後列禁經二卷合二書計之止六十二卷此本増多三十一卷疑後人併為一書而離析其巻帙葉夢得避暑録話稱思邈作千金前方時已百餘嵗妙盡古今方書之要獨傷寒未之盡似未盡通仲景之言故不敢深論後三十年案百餘嵗及後三十年之説皆因仍舊誤今姑仍原本録之作千金翼論傷寒者居半葢始得之其用志精審不苟如此云云則二書本相因而作亦相濟為用合之亦未害宏㫖也太平廣記載思邈曽救昆明池龍得龍宫仙方三十首散入千金方各卷之中葢小説家附㑹之談固無足深辨焉乾隆四十八年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書子部五備急千金要方目録醫家類巻一醫學諸論巻二婦人方巻三婦人方巻四婦人方巻五婦人方巻六婦人方巻七婦人方巻八少小嬰孺方巻九少小嬰孺方巻十少小嬰孺方巻十一少小嬰孺方巻十二少小嬰孺方巻十三少小嬰孺方巻十四少小嬰孺方巻十五七竅病方卷十六七竅病方卷十七七竅病方卷十八七竅病方卷十九七竅病方卷二十七竅病方卷二十一七竅病方卷二十二風毒脚氣方卷二十三風毒脚氣方卷二十四風毒脚氣方卷二十五諸風方卷二十六諸風方卷二十七諸風方卷二十八諸風方卷二十九傷寒方卷三十傷寒方卷三十一傷寒方卷三十二傷寒方卷三十三傷寒方卷三十四傷寒方卷三十五傷寒方卷三十六肝臟方卷三十七肝臟方卷三十八膽腑方卷三十九膽腑方卷四十心臟方卷四十一心臟方卷四十二心臟方卷四十三小腸腑方卷四十四小腸腑方卷四十五小腸腑方卷四十六脾臟方卷四十七脾臟方卷四十八脾臟方卷四十九脾臟方卷五十脾臟方卷五十一脾臟方卷五十二胃腑方卷五十三胃腑方巻五十四肺臟方卷五十五肺臟方卷五十六肺臟方卷五十七大腸腑方卷五十八大腸腑方卷五十九腎臟方卷六十腎臟方卷六十一膀胱腑方卷六十二膀胱腑方卷六十三消渇方卷六十四消渇方卷六十五丁腫方卷六十六丁腫方卷六十七丁腫方卷六十八丁腫方卷六十九痔漏方卷七十痔漏方卷七十一痔漏方卷七十二解毒雜治方卷七十三解毒雜治方卷七十四解毒雜治方卷七十五備急方卷七十六備急方卷七十七備急方卷七十八備急方卷七十九食治卷八十食治卷八十一養性卷八十二養性卷八十三養性卷八十四平脉卷八十五平脉卷八十六平脉卷八十七針灸卷八十八針灸卷八十九針灸卷九十針灸卷九十一針灸卷九十二針灸卷九十三針灸備急千金要方序昔神農徧嘗百藥以辨五苦六辛之味逮伊摯而湯液之劑備黄帝欲創九針以治三隂三陽之疾得岐伯而砭艾之法精雖大聖人有意于拯民之瘼必待賢明博通之臣或為之先或為之後然後聖人之所為得行于永久也醫家之務經是二聖二賢而能事畢矣後之留意于方術者苟知藥而不知灸未足以盡治療之體知灸而不知針未足以極表裏之變如能兼是聖賢之藴者其名醫之良乎有唐真人孫思邈者乃其人也以上智之材抱康時之志當太宗治平之際思所以佐迺后庇民之事以謂上醫之道真聖人之政而王官之一守也而乃祖述農黄之旨發明岐摰之學經掇扁鵲之難方採倉公之禁仲景黄素元化緑帙葛仙翁之必效胡居士之經驗張苗之藥對叔和之脉法皇甫謐之三部陶隱居之百一自餘郭玉范汪僧垣阮炳上極文字之初下訖有隋之世或經或方無不採摭集諸家之所祕要去衆說之所未至成書一部總三十卷目録一通臟腑之論針艾之法脉證之辨食治之冝始婦人而次嬰孺先脚氣而後中風傷寒癰疽消渇水腫七竅之痾五石之毒備急之方養性之術總篇二百三十二門合方論五千三百首莫不十全可驗四種兼包厚德過於千金遺法傳於百代使二聖二賢之美不墜于地而世之人得以階近而至逺上識于三皇之奥者孫真人善述之功也然以俗尚險怪我道純正不述刳腹易心之異世務徑省我書浩博不可道聽塗說而知是以學寡其人寖以紛靡賢不繼世簡編斷缺不知者以異端見黜好之者以闕疑輟功恭惟我朝以好生為德以廣愛為仁迺詔儒臣正是墜學臣等術謝多通職專典校於是請内府之祕書探道藏之别録公私衆本搜訪幾遍得以正其訛謬補其遺佚文之重複者削之事之不倫者緝之編次類聚朞月功至綱領雖有所立文義猶或疑阻是用端本以正末如素問九墟靈樞甲乙太素巢源諸家本草前古脉書金匱玉函肘後備急謝士秦刪繁方劉涓子鬼遺論之類事關所出無不研核尚有所闕而又泝流以討源如五鑒經千金翼崔氏纂要延年祕録正元廣利外臺秘要兵部手集夢得傳信之類凡所𣲖别無不考理互相質正反覆稽参然後遺文疑義煥然悉明書雖是舊用之惟新可以濟舍靈禆明聖好生之治可以傳不朽副主上廣愛之心非徒為太平之文致實可佐皇極之錫福校讎既成繕冩伊始恭以上進庻備親覽太子右賛善大夫臣髙保衡尚書都官員外郎臣孫竒尚書司封郎中充祕閣校理臣林億尚書工部侍郎兼侍講臣錢象先等謹上本序夫清濁剖判上下攸分三才肇基五行俶落萬物淳朴無得而稱燧人氏出觀斗極以定方名始有火化伏羲氏作因之而畫八卦立庖厨滋味既興痾瘵萌起大聖神農氏愍黎元之多疾遂甞百藥以救療之猶未盡善黄帝受命創制九針與方士岐伯雷公之倫備論經脉旁通問難詳䆒義理以為經論故後世可得依而暢焉春秋之際良醫和緩六國之時則有扁鵲漢有仲景倉公魏有華佗並皆探賾索隱窮幽洞微用藥不過二三灸炷不逾七八而疾無不愈者晉宋以來雖復名醫間出然治十不能愈五六良由今人嗜慾太甚立心不常媱放縱逸有闕攝養所致耳余緬尋聖人設教欲使家家自學人人自曉君親有疾不能療之者非忠孝也末俗小人多行詭詐倚傍聖教而為欺紿遂令朝野士庻咸耻醫術之名多教子弟誦短文構小䇿以求出身之道醫治之術闕而弗論吁可怪也嗟乎深乖聖賢之本意吾幼遭風冷屢造醫門湯藥之資罄盡家産所以青衿之歲高尚兹典白首之年未嘗釋卷至於切脉診候採藥合和服餌節度將息避慎一事長於已者不遠千里伏膺取決至於弱冠頗覺有悟是以親鄰中外有疾厄者多所濟益在身之患斷絶醫門故知方藥本草不可不學吾見諸方部帙浩博忽遇倉卒求檢至難比得方訖疾已不救矣嗚呼痛夭枉之幽厄惜墮學之昏愚乃博採羣經刪裁繁重務在簡易以為備急千金要方一部凡三十卷雖不能䆒盡病源但使留意於斯者亦思過半矣以為人命至重有貴千金一方濟之德踰于此故以為名也未可傳於士族庶以貽厥私門張仲景曰當今居世之士曽不留神醫藥精究方術上以療君親之疾下以救貧賤之厄中以保身長全以養其生而但競逐榮勢企踵權豪孜孜汲汲惟名利是務崇􅎖其末而忽棄其本欲華其表而悴其内皮之不存毛將安傅進不能愛人知物退不能愛躬知已卒遇風邪之氣嬰非常之疾患及禍至而後震慄身居死地䝉䝉昧昧戅若逰魂降志屈節欽望巫祝告窮歸天束手受敗齎百年之夀命將至貴之重器委付庸醫恣其所措咄嗟暗悔歎身已斃神明消滅變為異物幽潛重泉徒為一悲痛夫舉世昏迷莫能覺悟自盲若是夫何榮勢之云哉此之謂也備急千金要方凡例千金方舊有例數十條散在諸篇凡用一法皆冝徧知之雖素熟其書者臨事尚慮有所遺失況倉卒遘疾按證為治不能無未逹之惑及新加撰次不可無法今撮集舊凡并新校之意為例一篇次於今序之末庻後之施用者無凝滯焉凡和劑之法有斤兩升合尺寸之數合湯藥者不可不知按吳有複秤單秤隋有大升小升此制雖復紛紜正惟求之太深不知其要耳陶隱居撰本草序録一用累黍之法神農舊秤為定孫思邈從而用之孫氏生於隋末終于唐永淳中蓋見隋志唐令之法矣則今之此書當用三兩為一兩三升為一升之制世之妄者乃謂古今之人大小有異所以古人服藥劑多無稽之言莫此為甚今之用藥定以三兩為今一兩三升為今一升方中雖時復有用尺寸處舊例已有準折斤兩法今則不復重述也凡古方治疾全用湯法百千之中未有一用散者今世醫工湯散未辨宜其多說異端承疑傳謬按湯法㕮咀為各切如麻豆散法治篩為治擇𢷬篩卒病賊邪須湯以蕩滌長病痼疾須散以漸漬此古人用湯液煮散之意也後世醫工惟務力省一切為散遂忘湯法傳用既久不知其非一旦用湯妄生疑訝殊不知前世湯藥劑雖大而日飲不過三數服而且方用專一今人治病劑料雖簿而數藥競進毎藥數服以古較今豈不今反多乎又昔人長將藥者多作煑散法蓋取其積日之功故毎用一方寸匕為一服多不過三方寸匕然而須以帛裹煑時微微振動是古人之意豈須欲多服藥哉又服丸之法大率如梧子者二十丸多不過三十四十丸及服散者少則刀圭錢五匕多則方寸而已豈服湯特多煑散丸散則少乎是知世人既不知斤兩升合之制又不知湯液煑散之法今從舊例率定以藥二十古兩水一小斗煑取今一升五合去滓垽分三服自餘利湯欲少水而多取數補湯欲多水而少取數各依方下别法凡古經方用藥所有熬煉節度皆脚注之今方則不然撮合諸家之法而為合和一篇更不于方下各注各注則徒煩而不備集出則詳審而不煩凡合和者於第一卷檢之常用烏頭止言炮製此物大毒難循舊制當依治歴節防已湯云凡用烏頭皆去皮熬令黒乃堪用不然至毒人特冝慎之又桂本畏火所不可近若婦人姙娠又慮動胎當依惡阻篇茯苓丸方云姙娠忌桂故熬後用之又方中用大黄者當依治癰疽地黄丸方云薄切五升米下蒸熟曝乾用之凡諸方用藥多出神農本經但古今不同詳略或異施於逹者不假縷陳與衆共之事須詮詔古文從簡則茱萸渾於山吳門冬隱於天麥椒不判于秦蜀荆罔分于牡蔓今則檢從本草各以一二而詳之又近世用藥相承其謬若不辨正為損滋多求真珠者罕知朱砂之為末多以水銀朱充用擇通草者鮮知木通之别號皆以通脫木為名以杜蘅而當細辛用黄耆而得苜蓿白蒺藜蒺藜之偽以刺者為良青木香木香之佳以土者為惡桂心蓋取其枝中之肉狗脊何尚乎金色之毛山梔子梔子本為一物訶梨勒訶子元無二條檳榔大腹古昔用之無别枳實枳殻後世曲生異端蚱蟬以聲而命名用啞者則顯知其謬胡麻以國而為號以烏者正得其真天南星虎掌名異而實同茵蔯蒿茵蔯名同而實異斯實藥家之消息為醫者可不留心又如白术一物古書惟只言术近代醫家咸以术為蒼术今則加以白字庶乎臨用無惑矣凡諸方中用藥間復有不出本草舊經者咸名醫垂記或累世傳良或博聞有驗或自用得力故孫氏不得而棄之傳之方來豈小補哉凡古名賢治病多用生命以濟災急雖曰賤畜貴人至於愛命人畜一也損彼益已物情同患況於人乎夫殺生求生去生更逺今之此方所以不用生命物為藥也其䖟蟲水蛭軰市有先死者可市而用之不在此例又云用雞子者皆取先破者用之完者無力凡古今病名率多不同緩急尋檢常致疑阻若不判别何以示衆且如世人呼隂毒傷寒最為劇病嘗深摭其由然口稱隂毒之名意指少隂之證病實隂陽之候命一疾而涉三病以此為治豈不逺而殊不知隂毒少隂隂陽自是三候為治全别古有方證其說甚明今而混淆害人最急又如腸風藏毒欬逆慢驚遍稽方論無此名稱深窮其狀腸風乃腸痔下血藏毒乃痢之蠱毒欬逆者噦逆之名慢驚者隂癎之病若不知古知今何以為人司命加以古之經方言多雅奥以利為滯下以蹷為脚氣以淋為癃以實為祕以天行為傷寒以白虎為歴節以膈氣為膏肓以喘𠻳為欬逆以彊直為痙以不語為癔以緩縱為痱以怔忪為悸以痰為飲以黄為癉諸如此論可不討論而況病有數候相類二病同名者哉宜其視傷寒中風熱病温疫通曰傷寒膚脹鼓脹腸覃石􅛎率為水氣療中風專用乎痰藥指滯下或以為勞疾伏梁不辨乎風根中風不分乎時疾此今天下醫者之公患也是以别白而言之凡方後舊有禁忌法或有或無或詳或略全無類例今則集諸藥反惡畏忌及諸雜忌為一篇凡服餌者於第一卷檢之凡下丸散不云酒水飲者本方如此而别說用酒水飲則是可通用三物服也凡諸方論咸出前古諸家及唐代名醫加減為用而各有效今則遍尋諸家有増損不同者各顯注于方下庶後人用之左右逢其原也凡諸卷有一篇治數病者今則各以類次仍於卷首目下注云某病附焉凡諸方與篇題各不相符者卒急之際難于尋檢今則改其詮次庶幾歴然易曉凡諸方有一方數篇重出主治不殊者則去之各有治療者則云方見某卷某篇凡諸篇類例之體則論居首脉次之大方在前單方次之針灸法處末焉緩急檢尋繁而不雜也婦人卷中有虚損一篇補益一篇事涉相類詳而察之亦自有條諸凡大方皆在補益諸湯與煎盡屬虚損又頭面篇中備載風眩之治小腸腑卷重出風眩一門求之類例不當復出蓋前篇雜疏諸家之法廣記而備言之後篇特記徐嗣伯十方欲後人知所適從耳凡婦人之病比之男子十倍難治所以别立方也若是四時節氣為病虚實冷熱為患者故與丈夫同也其雜病與丈夫同者散在諸卷凡小兒之病與大人不殊惟用藥有多少為異其驚癎客忤解顱不行等八九篇合為一卷自餘下利等方並散在諸篇中可披而得也凡針灸孔穴已具明堂篇中其逐篇諸穴多有不與明堂同者及明堂中所無者亦廣記當時所傳得效者耳故不必盡同舊經也凡諸卷中用字文多假借如乾字作干屎字作矢銳字作兊其類非一今則各仍舊文更不普加改定亦從古之意也凡諸方論今各檢見所從來及所流𣲖比欲各加題别竊為非醫家之急今但按文校定其諸書之名則隱而不出以成一家之美焉
