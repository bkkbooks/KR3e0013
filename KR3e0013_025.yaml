body:
  text: 備急千金要方卷二十五唐孫思邈撰宋林億等校正治諸風方論雜風狀第一岐伯曰中風大法有四一曰偏枯二曰風痱三曰風懿四曰風痺夫諸急卒病多是風初得輕微人所不悟宜速與續命湯依輸穴灸之夫風者百病之長岐伯所言四者説其最重也偏枯者半身不隨肌肉偏不用而痛言不變智不亂病在分腠之間溫卧取汗益其不足損其有餘乃可復也甲乙經云溫卧取汗則巨取之風痱者身無痛四肢不收智亂不甚言微可知則可治甚即不能言不可治風懿者奄忽不知人咽中塞窒窒然巢源作噫噫然有聲舌強不能言病在臟腑先入隂後入陽治之先補于隂後瀉于陽發其汗身轉軟者生汗不出身直者七日死巢源作眼下及鼻人中左右白者可治一黑一赤吐沫者不可治風痺濕痺周痺筋痺脈痺肌痺皮痺骨痺胞痺各有證候形如風狀得脈别也脈微澀其證身體不仁凡風多從背五臟輸入諸臟受病肺病最急肺主氣息又冒諸臟故也肺中風者其人偃卧而胸滿短氣冒悶汗出者肺風之證也視目下鼻上兩邊下行至口色白者尚可治急灸肺輸百壯服續命湯小兒減之若色黃者此為肺已傷化為血矣不可復治其人當妄言掇空指地或自拈衣尋縫如此數日死若為急風邪所中便迷漠恍惚狂言妄語或少氣惙惙不能復言若不求師即治宿昔而死即覺便灸肺輸及膈輸肝輸數十壯急服續命湯可救也若涎唾出不收者既灸當並與湯也諸陽受風亦恍惚妄語與肺病相似然著緩可經久而死肝中風者其人但踞坐不得低頭繞兩目連額上色微有青者肝風之證也若脣色青面黃尚可治急灸肝輸百壯服續命湯若大青黑面一黃一白者此為肝已傷不可復治數日而死心中風者其人但得偃卧不得傾側悶亂冒絶汗出者心風之證也若脣正赤尚可治急灸心輸百壯服續命湯若脣或青或白或黃或黑者此為心已壞為水面目亭亭時悚動者不可復治五六日死一云旬日死脾中風者其人但踞坐而腹滿身通黃吐鹹汁出者尚可治急灸脾輸百壯服續命湯若目下青手足青者不可復治腎中風者其人踞坐而腰痛視脅左右未有黃色如餅粢大者尚可治急灸腎輸百壯服續命湯若齒黃赤鬢髮直面土色者不可復治大腸中風者卧而腸鳴不止灸大腸輸百壯可服續命湯賊風邪氣所中則傷於陽陽外先受之客于皮膚傳入于孫脈孫脈滿則入傳于絡脈絡脈滿則輸于大經中成病歸於六腑則為熱不時卧止為啼哭其脈堅大為實實者外堅充滿不可按之按之則痛也經絡諸脈傍支去者皆為孫脈也凡風之傷人或為寒中或為熱中或為厲風或為偏枯或為賊風故以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以四季戊已傷于風者為脾風以秋庚辛傷于風者為肺風以冬壬癸傷于風者為腎風風中五臟六腑之輸亦為臟腑之風各入其門户所中則為偏風風氣循風府而上則為腦風風入頭則為目風眼寒飲酒中風則為酒風入房汗出中風則為內風新沐中風則為首風久風入房中風則為腸風外在腠理則為泄風故曰風者百病之長也至其變化乃為他病無常方焉是知風者善行而數變在人肌膚中內不得泄外不得散因人動靜乃變其性有風遇寒則食不下遇熱則肌肉消而寒熱有風遇陽盛則不得汗遇隂盛則汗自出肥人有風肌肉厚則難泄喜為熱中目黃瘦人有風肌肉薄則常外汗身中寒目淚出有風遇于虛腠理開則外出凄凄然如寒狀覺身中有水淋狀時如竹管吹處此是其證也有風遇于實腠理閉則內伏令人熱悶是其證也新食竟取風為胃風其狀惡風頸多汗膈下塞不通食飲不下脹滿形瘦腹大失衣則憤滿食寒即洞泄新熱食竟入水自漬及浴者令人大腹為水病因醉取風為漏風其狀惡風多汗少氣口乾喜渴近衣則身如火燒臨食則汗流如雨骨節懈惰不欲自勞新沐浴竟取風為首風其狀惡風而汗多頭痛新房室竟取風為內風其狀惡風汗流沾衣勞風之為病法在肺下使人強上而目脫唾出如涕惡風而振寒候之三日及五日中不精明者是也七八日微有青黃膿涕如彈丸大從口鼻出為善若不出則傷肺風邪客于肌膚虛癢成風疹瘙瘡風邪入深寒熱相搏則肉枯邪客半身入深真氣去則偏枯邪客關機中即攣筋中亦然邪淫于臟夢臟大形小淫於腑夢臟小形大邪隨目系入腦則目轉眩邪中精則散視見兩物風邪入臟寒氣客於中不能發則瘖啞喉痺舌緩不時服藥針灸風逐脈流入臟使人卒瘖緩縱噤痙致死風入陽經則狂入隂經則癲陽邪入隂病則靜隂邪入陽病則怒若因熱食汗浴通腠理得開其風自出則覺肉中如針刺步行運力欲汗亦如此也凡覺肌肉中如刺皆由腠理閉邪氣閉在肌中因欲出也宜解肌湯則善夫目瞤動口脣動偏喎皆風入脈故須急服小續命湯將八風散摩神明白膏丹參膏依經針灸之諸痺由風寒濕二氣併客于分肉之間迫切而為沫得寒則聚聚則排分肉肉裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痺發發則如是此內不在臟而外未發于皮膚居分肉之間真氣不能周故為痺也其風最多者不仁則腫為行痺走無常處其寒多者則為痛痺其濕多者則為著痺冷汗濡但隨血脈上下不能左右去者則為周痺也痺在肌中更發更止左以應左右以應右者為偏痺也夫痺其陽氣少而隂氣多者故令身寒從中出其陽氣多而隂氣少者則痺且熱也諸痺風勝者則易愈在皮間亦易愈在筋骨則難痊也久痺入深令榮衛澀經絡時踈則不知痛風痺病不可已者足如履水時如入湯腹中股脛淫濼煩心頭痛傷脾腎時嘔眩時自汗出傷心目眩傷肝悲恐短氣不樂傷肺不出三年死一云三日死太陽中風重感於寒濕則變痙也痙者口噤不開背強而直如發癎之狀搖頭馬鳴腰反折須臾十發氣息如絶汗出如雨時有脫易得之者新産婦人及金瘡血脈虛竭小兒臍風大人涼濕得痙風者皆死溫病熱盛入腎小兒癎熱盛皆痙痙瘖厥癲皆相似故久厥成癲宜審察之其重者患耳中策策痛皆風入腎經中也不治流入腎則喜卒然體痙直如死皆宜服小續命湯兩三劑也若耳痛腫生汁作癰癤者乃無害也惟風宜防耳針耳前動脈及風府神良諸風第二方法灸小續命湯治卒中風欲死身體緩急口目不正舌強不能語奄奄匆匆神情悶亂諸風服之皆驗不令人虛方麻黃防已崔氏外臺不用人參黃芩桂心甘草芍藥芎藭杏仁各一兩防風一兩半附子一枚生薑五兩右十二味㕮咀以水一斗二升先煮麻黃三沸去沫內諸藥煮取三升分三服甚良不瘥更合三四劑必佳取汗隨人風輕重虛實也有人腳弱服此方至六七劑得瘥有風疹家天隂節變輒合服之可以防瘖一本云恍惚者加茯神逺志如骨節煩疼本有熱者去附子倍芍藥小品千金翼同深師古今録驗有白术不用杏仁救急無芎藭杏仁止十味延年無防風小續命湯治中風冒昧不知痛處拘急不得轉側四肢緩急遺失便利此與大續命湯同偏宜産後失血并老小人麻黃桂心甘草各二兩生薑五兩人參芎藭白术前方有杏仁附子防已芍藥黃芩各一兩防風一兩半右十二味㕮咀以水一斗二升煮取三升分三服古今録驗無桂心名續命湯胡洽千金翼同又方治風􅔦年嵗或歌或哭或大笑言語無所不及方麻黃三兩人參桂心白术各二兩芍藥甘草防已黃芩芎藭當歸各一兩右十味㕮咀以水一斗二升煮取三升分三服日三覆取汗大續命湯治肝厲風卒然瘖啞依古法用大小續命二湯通治五臟偏枯賊風方麻黃八兩石膏四兩桂心乾薑芎藭各二兩當歸黃芩各一兩杏仁三十枚荆􅅹一升右九味㕮咀以水一斗先煮麻黃兩沸掠去沫下諸藥煮取四升去滓又下荆􅅹煮數沸分四服能言未瘥後服小續命湯舊無荆􅅹今增之效如神千金翼有甘草又方治大風經臟奄忽不能言四肢垂曵皮肉痛癢不自知獨活麻黃各三兩芎藭防風當歸葛根生薑桂心茯苓附子細辛甘草各一兩右十二味㕮咀以水一斗二升煮取四升分五服老小半之若初得病便自大汗者減麻黃不汗者依方上氣者加吳茱萸二兩厚朴一兩乾嘔者倍加附子一兩啘者加橘皮二兩若胸中吸吸少氣者加大棗十二枚心下驚悸者加茯苓一兩若熱者可除生薑加葛根初得風未須加減便且作三劑停四五日已後更候視病虛實平論之行湯行針依穴灸之又方治與前大續命湯同宜産婦及老小等方麻黃芎藭各三兩乾薑石膏人參當歸桂心甘草各二兩杏仁四十枚右九味㕮咀以水一斗煮取三升分三服外臺名續命湯范注同云是張仲景方本欠兩味西州續命湯治中風痱一作入臟身體不知自收口不能言冒昧不識人拘急背痛不得轉側方麻黃六兩石膏四兩桂心二兩甘草芎藭乾薑黃芩當歸各一兩杏仁三十枚右九味㕮咀以水一斗二升煮麻黃再沸掠去上沫後下諸藥煮取四升初服一升猶能自覺者勿熟眠卧可厚覆小小汗出已漸減衣勿復大覆可熟眠矣前服不汗者後復一升汗後稍稍五合一服安穩乃服勿頓服也汗出則愈勿復服飲食如常無禁忌勿見風并治上氣咳逆若面目大腫但得卧服之大善凡服此湯不下者人口噓其背湯則下過矣病人先患冷汗者不可服此湯若虛羸人但當稍與五合為佳間有輒行此湯與産婦及羸人喜有死者皆為頓服二升傷多且湯濁不清故也但得清澄而稍稍服微取汗者皆無害也胡洽方古今録名大續命湯大續命散治八風十二痺偏枯不仁手足拘急疼痛不得伸屈頭眩不能自舉起止顛倒或卧苦驚如墮地狀盜汗臨事不起婦人帶下無子風入五臟甚者恐怖見鬼來收攝或與鬼神交通悲愁哭泣忽忽欲走方麻黃烏頭防風桂心甘草蜀椒杏仁石膏人參芍藥當歸䕡茹翼作芎藭黃芩茯苓乾薑各一兩右十五味治下篩以酒服方寸匕日再後加以知為度續命煮散治風無輕重皆主之方麻黃芎藭獨活防已甘草杏仁各三兩桂心附子茯苓升麻細辛人參防風各二兩石膏五兩白术四兩右十五味粗篩下以五方寸匕內小絹袋子中以水四升和生薑三兩煮取二升半分三服日日勿絶慎風冷大良吾嘗中風言語謇澀四肢痑曵處此方日服四服十日十夜服之不絶得愈排風湯治男子婦人風虛濕冷邪氣入臟狂言妄語精神錯亂其肝風發則面青心悶亂吐逆嘔沫脅滿頭眩重耳不聞人聲偏枯筋急曲拳而卧其心風發則面赤翕然而熱悲傷瞋怒張目呼喚其脾風發則面黃身體不仁不能行步飲食失味夢寐倒錯與亡人相隨其肺風發則面白咳逆唾膿血上氣奄然而極其腎風發則面黑手足不遂腰痛難以俯仰痺冷骨疼諸有此候令人心驚志意不定恍惚多忘服此安心定志聰耳明目通臟腑諸風悉主之白鮮皮白术芍藥桂心芎藭當歸杏仁防風甘草各一兩獨活麻黃茯苓各三兩生薑四兩右十三味㕮咀以水一斗煮取三升每服一升覆取微汗可服三劑大八風湯治毒風頑痺嚲曵手腳不遂身體偏枯或毒弱不仁或風入五臟恍恍惚惚多語喜忘有時恐怖或肢節疼痛頭眩煩悶或腰脊強直不得俯仰腹滿不食咳嗽或始遇病時卒倒悶絶即不能語便失瘖半身不遂不仁沉重皆由體虛恃少不避風冷所致治之之方當歸二兩半五味子升麻各一兩半烏頭黃芩芍藥逺志獨活防風芎藭麻黃秦艽石斛人參茯苓石膏黃芪紫菀各一兩杏仁四十枚甘草桂心乾薑各二兩大豆一升千金翼云二合右二十三味㕮咀以水一斗三升酒二升合煮取四升強人分四服羸人分六服八風散治八風十二痺猥退半身不遂厯節疼痛肌肉枯焦皮膚瞤動或筋緩急痛不在一處卒起目眩失心恍惚妄言倒錯身上㾦瘰面上起疱或黃汁出更相染漬或燥或濕顔色乍赤乍白或青或黑角弓反張乍寒乍熱方麻黃白术各一斤羌活二斤黃芩一斤五兩大黃半斤栝蔞根甘草欒荆天雄白芷防風芍藥天門冬石膏各十兩山茱萸食茱萸躑躅各五升茵芋十四兩附子三十枚細辛乾薑桂心各五兩雄黃硃砂丹參各六兩右二十五味治下篩酒服方寸匕初每日一服三十日後日再五十日知百日瘥一年平復長服不已佳先食服小八風散治迷惑如醉狂言妄語驚悸恐怖恍惚見鬼喜怒悲憂煩滿顛倒邑邑短氣不得語語則失忘或心痛徹背不嗜飲食惡風不得去帷帳時復疼熱惡聞人聲不知痛癢身悉振搖汗出猥退頭重浮腫爪不知痛頸項強直口面喎戾四肢不隨不仁偏枯攣掣不得屈伸悉主之方天雄當歸人參各五分附子天門冬防風蜀椒獨活各四分烏頭秦芃細辛白术乾薑各三分麻黃山茱萸五味子桔梗白芷柴胡莽草各二分右二十味治下篩合相得酒服半方寸匕漸至一匕日三服以身中覺如針刺狀則藥行也烏頭湯治八風五尸惡氣遊走胸心流出四肢來往不住短氣欲死方烏頭芍藥乾薑桂心細辛乾地黃當歸吳茱萸甘草各二兩右九味㕮咀以水七升煮取二升半分三服葈耳散治諸風方當以五月五日午時乾地刈取葈耳葉洗曝燥搗下篩酒若漿服一方寸匕日三作散若吐逆可蜜和為丸服十丸準前計一方寸匕數也風輕易治者日再服若身體有風者皆作粟肌出或如麻豆粒此為風毒出也可以鈹針刺潰去之皆黃汁出盡乃止五月五日多取隂乾之著大甕中稍取用之此草辟惡若欲看病省疾者便服之令人無所畏若時氣不和舉家服之若病胃脹滿心悶發熱即服之并殺三蟲腸痔能進食一周年服之佳七月七九月九皆可採用治心風虛熱發即恍惚煩悶半身不仁攣急方荆􅅹竹􅅹各五升枸杞根白皮生麥門冬各一升香豉三合人參茯苓梔子仁黃芩芎藭桂心細辛杏仁防風白鮮皮各二兩生薑石膏甘草各三兩右十八味㕮咀以水二斗和竹􅅹荆􅅹煮取三升分四服相去如人行六七里凡五劑間三日服一劑一用防已三兩治虛熱恍惚驚邪恐懼方荆􅅹三升竹􅅹二升香豉三合牛黃十八銖生麥門冬人參各三兩升麻鐵精天門冬龍齒茯苓梔子各二兩右十二味㕮咀以水二斗煮取三升去滓下牛黃鐵精更煎五六沸取二升七合分五服溫服相去十里久地黃煎治熱風心煩悶及脾胃間熱不下食冷所致生地黃汁枸杞根汁二升生薑汁酥各三升荆瀝竹瀝各五升天門冬人參各八兩茯苓六兩大黃梔子仁各四兩右十一味搗篩五物為散先煎地黃等汁成煎次內散藥攪調每服一匕日再漸加至三匕覺利減之又方黃芩乾藍芍藥鼠尾草各三兩梔子仁生葛各六兩羚羊角五兩䜴一升綿裹右八味㕮咀以水七升煮取二升五合分三服治積熱風方地骨皮萎㽔丹參黃芪麥門冬澤瀉各三兩清蜜薑汁各一合生地黃汁一升右九味以水六升煮取二升去滓內地黃汁更緩火煮減一升內蜜及薑汁又煮一沸藥成溫服三合日再大防風湯治中風發熱無汗肢節煩腹急痛大小便不利方防風當歸麻黃白术甘草各十八銖黃芩三十銖乾地黃山茱萸茯苓附子各一兩右十味㕮咀以水九升煮取二升半一服七合大小便不利內大黃人參各十八銖大棗三十枚生薑三兩煮取三升分三服深師加天門冬一兩大戟洗湯治中風發熱方大戟苦參各等分右二味為末以藥半升白酢漿一斗煮三沸適寒溫洗從上下寒乃止立瘥小兒三指撮許漿水四升煮洗之金牙酒療積年八風五疰舉身嚲曵不得轉側行步跛躃不能收攝又暴口噤失音言語不正四肢背脊筋急腫痛流走不常勞冷積聚少氣乍寒乍熱三焦不調脾胃不磨飲澼結實逆害飲食酢咽嘔吐食不生肌醫所不能治者方金牙碎如米粒用小絹袋盛乾地黃地膚子無子用莖蘇恭用蛇床子蒴藋根附子防風細辛莽草各四兩羌活一斤胡洽用獨活蜀椒四合右十味㕮咀盛以絹袋用酒四斗於瓷罃中漬密閉頭勿令泄氣春夏三四宿秋冬六七宿酒成去滓日服一合此酒無毒及可小醉常令酒氣相接不盡一劑病無不愈又令人肥健酒盡自可加諸藥各三兩惟蜀椒五兩用酒如前勿加金牙也冷加乾薑四兩服此酒勝灸刺起三十諸風嚲曵神驗肘後備急用升麻乾薑各四兩人參二兩石斛牛膝各五兩不用蒴藋根為十四味蘇恭不用地黃為十三味一方用蒺藜四兩黃茋三兩胡洽用續斷四兩為十一味千金翼用茵芋四兩無莽草常山太守馬灌酒除風氣通血脈益精華定六腑聰明耳目恱澤顔色頭白更黑齒落更生服藥二十日力勢倍六十日志氣充盈八十日能夜書百日致神明房中強壯如三十時力能引弩年八十人服之亦當有子病在腰膝藥悉主之方天雄二兩生用商陸根躑躅蜀椒各一兩烏頭一枚大者附子五枚桂心白斂茵芋乾薑各三兩右十味㕮咀以絹袋盛酒三斗漬春夏五日秋冬七日去滓初服半合稍加至兩三合搗滓為散酒服方寸匕日三以知為度夏日恐酒酸以油單覆之下井中近水令不酸也千金翼無商陸桂心為八味蠻夷酒治久風枯攣三十年著床及諸惡風眉毛墮落方乾地黃獨活丹參礜石各一兩麥門冬附子甘遂各二兩赤石脂二兩半乾薑蕪荑芫花柏子仁各一公蘇子一升蓯蓉茯神翼作茯苓金牙薯蕷白术杜仲石南牡荆子山茱萸欵冬各十八銖白芷烏喙烏頭人參狼毒蜀椒防風細辛礬石寒水石牛膝麻黃芎藭當歸柴胡芍藥牡蠣桔梗狗脊翼作枸杞天雄各半兩石斛桂心各六銖右四十五味㕮咀以酒二斗漬夏三日春秋六日冬九日一服半合密室中合藥勿令女人六畜見之三日清齋乃合千金翼無芎藭云加大棗四十枚更佳又方治八風十二痺偏枯不隨宿食久寒虛冷五勞七傷及婦人産後餘疾月水不調皆主之方礜石桂心白术狼毒半夏石南白石脂龍膽續斷芫花白石英代赭䕡茹石韋玄參天雄防風山茱萸桔梗藜蘆卷柏細辛寒水石烏頭躑躅蜀椒白芷秦芃菖蒲各一兩礬石附子逺志各二兩石膏二兩半蜈蚣一枚右三十四味㕮咀以酒二斗漬四日每服一合日再十日後去滓曝乾搗篩為散酒服方寸匕日再以知為度胡洽四十二味無桂心細辛烏頭躑躅蜀椒而有芒硝恆山黃芩黃連大黃麻黃地黃前胡甘草菟絲子芍藥紫菀各一兩杏仁一十枚同搗篩絹袋盛用水三斗麴三斤黍米三斗作飯依釀酒法以藥袋置釀中春秋七日冬十日夏三日酒成服半雞子殼日三服曝藥為末酒服方寸匕以身體暖為度魯王酒治風眩心亂耳聾目暗淚出鼻不聞香臭口爛生瘡風齒瘰癧喉下生瘡煩熱厥逆上氣胸脅肩膊痛手不能上頭不能帶衣腰脊不能俯仰腳酸不仁難以久立八風十二痺五緩六急半身不遂四肢偏枯筋攣不可屈伸賊風咽喉閉塞哽哽不利或如錐刀所刺行人皮膚中無有常處久久不治入人五臟或在心下或在膏肓遊走四肢偏有冷處如風所吹久寒積聚風濕五勞七傷虛損百病悉主之方茵芋烏頭躑躅各三十銖天雄防已石斛二十四銖細辛牛膝甘草柏子仁通草桂心秦艽茵蔯山茱萸黃芩胡洽作黃耆附子瞿麥乾地黃王不留行胡洽作天門冬千金翼作王蓀杜仲澤㵼石南防風逺志各十八銖右二十五味㕮咀以酒四斗漬十日每服一合加至四五合以知為度千金翼名此為魯公酒有乾薑胡洽無防已以絹囊盛藥用水二斗法麴二斤同漬三四宿出藥囊炊二斗黍米內汁釀之酒熟飲如雞子大日二服稍稍飲之以知為度又方治風偏枯半死行勞得風若鬼所擊四肢不遂不能行步不自帶衣攣躄五緩六急婦人帶下産乳中風五勞七傷乾薑躑躅桂心甘草芎藭續斷細辛附子秦芃天雄石膏紫菀各五兩葛根通草防風柏子仁巴戟天石斛石南山茱萸石龍芮四兩天門冬牛膝各八兩烏頭二十枚蜀椒半升右二十五味㕮咀以水五升漬三宿法麴一斤合漬秫米二斗合釀三宿去滓炊糯米一斗醖三宿藥成先食服半合日再待米極消盡乃去滓曝乾末服獨活酒治八風十二痺方獨活石南各四兩防風三兩附子烏頭天雄茵芋各二兩右七味㕮咀以酒二斗漬七日每服半合日三以知為度灸法扁鵲云治卒中惡風心悶煩毒欲死急灸足大趾下橫文隨年壯立愈若筋急不能行者內踝筋急灸內踝上四十壯外踝筋急灸外踝上三十壯立愈若眼戴精上插灸目兩眥後二十壯若不能語灸第三椎上百壯若不識人灸季肋頭七壯若眼反口噤腹中切痛灸隂囊下第一橫理十四壯灸卒死亦良治久風卒風緩急諸風卒發動不自覺知或心腹脹滿或半身不隨或口噤不言涎唾自出目閉耳聾或身冷直或煩悶恍惚喜怒無常或脣青口白戴眼角弓反張始覺發動即灸神庭一處七壯穴在當鼻直上髮際是次灸曲差二處各七壯穴在神庭兩傍各一寸半是次灸上關二處各七壯一名客主人穴在耳前起骨上亷陷者中是次灸下關二處各七壯穴在耳前下亷動脈陷者中是次灸頰車二穴各七壯穴在曲頰陷者中是次灸亷泉一處七壯穴在當頥直下骨後陷者中是次灸凶會一處七壯穴在神庭上二寸是次灸百會一處七壯穴在當頂上正中央是次灸本神二處各七壯穴在耳正直上入髮際二分是又作四分次灸天柱二處各七壯穴在項後兩大筋外入髮際陷者中是次灸陶道一處七壯穴在大椎節下間是次灸風門二處各七壯穴在第二椎下兩傍各一寸半是次灸心輸二處各七壯穴在第五椎下兩傍各一寸半是次灸肝輸二處各七壯穴在第九椎下兩傍各一寸半是次灸腎輸二處各七壯穴在第十四椎下兩傍各一寸半是次灸膀胱翰二處各七壯穴在第十九椎下兩傍各一寸半是次灸曲池二處各七壯穴在兩肘外曲頭陷者中屈肘取之是次灸肩髃二處各七壯穴在兩肩頭正中兩骨間陷者中是次灸支溝二處各七壯穴在手腕後臂外三寸兩骨間是次灸合谷二處各七壯穴在手大指虎口兩骨間陷者中是次灸間使二處各七壯穴在掌後三寸兩筋間是次灸陽陵泉二處各七壯穴在膝下外尖骨前陷者中是次灸陽輔二處各七壯穴在外踝上絶骨端陷者中是次灸崑崙二處各七壯穴在外踝後跟骨上陷者中是治風灸上星及百會各二百壯前頂二百四十壯腦户及風府各三百壯一云治大風灸百會七百壯治百種風灸腦後項大椎平處兩廂量二寸三分須取病人指寸量兩廂各灸百壯得瘥治風耳鳴從耳後量八分半裏許有孔灸一切風得瘥狂者亦瘥兩耳門前後各灸一百壯治卒病惡風欲死不能語及肉痺不知人灸第五推名曰臟輸百五十壯多至三百壯便愈心輸穴在第五節一云第七節對心橫三間寸主心風腹脹滿食不消化吐血酸削四肢羸露不欲飲食鼻衄目眴􅉩􅉩不明肩頭脅下痛小腹急灸二三百壯大腸輸在十六椎兩邊相去一寸半主風腹中雷鳴腸澼泄利食不消化小腹絞痛腰脊疼強或大小便難不能飲食灸百壯三日一報掖門在掖下攢毛中一寸名太陽隂一名掖間灸五十壯主風絶骨在外踝上三寸灸百壯治風身重心煩足脛疼備急千金要方卷二十五
