  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0013_WYG_028-1a, image: WYG0735/WYG0735-0299a.png}
body:
  text: 備急千金要方卷二十八唐孫思邈撰宋林億等校正治諸風方風懿第六論灸方針法獨活湯治風懿不能言四肢不收手足嚲曵方獨活四兩桂心芍藥栝蔞根生葛各三兩生薑六兩甘草三兩右七味㕮咀以水五升煮取三升分三服日三論曰脾脉絡胃俠咽連舌本散舌下心之别脉係舌本今心脾二臟受風邪故舌彊不得語也治中風口噤不能言方防已桂心麻黄各二兩葛根三兩甘草防風芍藥各一兩生薑四兩右八味㕮咀以水六升煮取二升半分三服瘖瘂不語皆治之石南湯治六十四種風注走入皮膚中如蟲行腰脊彊直五緩六急手足拘攣隠胗搔之則作瘡風尸身癢卒風面目腫起手不出頭口噤不能言方石南乾薑黄芩細辛人參各一兩桂心麻黄當歸芎藭各一兩半甘草二兩乾地黄十八銖食茱萸三十銖右十二味㕮咀以水六升酒三升煮取三升分三服大汗勿怪治中風口噤不知人者方芥子一升酢三升右二味煮取一升薄頭以布裹之日一度肘後以治卒不得語又方䜴五升吳茱萸一升右二味以水七升煮取三升漸飲之肘後以治不能語又方白术四兩以酒三升煮取一升頓服又方服荆瀝一升又方服淡竹瀝一升針灸法卒中風口噤不得開灸機關千金翼名頰車二宂宂在耳下八分小近前灸五壯即得語又灸隨年壯僻者逐僻左右灸之中風失瘖不能言語緩縱不隨先灸天窻五十壯息火仍移灸百會五十壯畢還灸天窻五十壯者始發先灸百會則風氣不得洩内攻五臟喜閉伏仍失音也所以先灸天窻次百㑹佳一灸五十壯悉洩火勢復灸之視病輕重重者一處三百壯大效凡中風服藥益劇者但是風宂悉皆灸之三壯無不愈也神良决定勿疑惑也不至心者勿浪盡灸論曰風寒之氣客于中滯而不能發故瘖不能言及喉痺失聲皆風邪所為也入臟皆能殺人故附之于治風方之末凡尸厥而死脉動如故此陽脉下墜隂脉上爭氣閉故也針百㑹入三分補之灸熨斗熨兩脇下又竈突墨彈丸大漿水和服之又針足中趾頭去甲如韭葉又刺足大趾甲下内側去甲三分桂湯治卒失音方濃煮桂汁服一升覆取汗亦可末桂著舌下漸漸嚥汁又方濃煮大豆汁含亦佳無豆用䜴治卒不得語方酒五合和人乳汁中半分為二服論曰夫眼瞤動口脣偏喎皆風入脉急與大續命湯附子散摩神明膏丹參膏依宂灸之喉痺舌緩亦然風入臟使人瘖瘂卒死口眼相引牙車急舌不轉喎僻者與伏龍肝散和雞冠血及鼈血塗乾復塗之并灸吻邊横文赤白際逐左右隨年壯報之至三報三日不瘥更報之附子散治中風手臂不仁口面喎僻方附子桂心各五兩細辛防風人參乾薑各六兩右六味治下篩酒服方寸匕日三稍増之甘草湯治偏風積年不瘥手脚枯細面口喎僻精神不定言語倒錯方甘草桂心芎藭麻黄當歸芍藥人參各二兩附子側子各二枚獨活防已各三兩生薑石膏茯神各四兩白术黄芩細辛各一兩秦芃防風各一兩半菊花一升淡竹瀝四升右二十一味㕮咀以水一斗先煮麻黄去沫取七升内竹瀝及藥煮取三升分四服服三服訖間一盃粥後更進一服待藥勢自汗慎生冷醋蒜麫乳酪魚等治中風面目相引口偏著耳牙車急舌不得轉方獨活三兩生地黄汁竹瀝各一升右三味合煎取一升頓服之即愈又方牡蠣礬石附子竈下黄土右四味各等分為末取三年雄雞冠血和藥傅其上持鏡候纔欲復故便急洗去之不速去便過不復還也千金翼云偏右塗左偏左塗右又方竹瀝三升防風防已升麻桂心芎藭各二兩麻黄四兩羚羊角三兩右八味㕮咀以水四升合竹瀝煮取一升半分三服日服一劑常用效又方青松葉一斤𢷬令汁出清酒一斗漬二宿近火一宿初服半升漸至一升頭面汗出即止又方酒煮桂取汁以故布搨病上正則止左喎搨右右喎榻左此秘方不傳余常用大效治口耳僻方防風附子葛根各二兩栢實麻黄各三兩獨活生薑各四兩杏仁三十枚右八味㕮咀以水一斗酒二升煮取三升分四服治卒中風口喎不正方取空青末如豆大一枚含之即愈又方炒大豆三升令焦以酒三升淋取汁頓服肘後以治口噤不開又方大皂莢一兩去皮子下篩以三年大酢和左喎塗右右喎塗左乾更塗之又方以葦筒長五寸以一頭刺耳孔中四畔以麫宻塞之勿令泄氣一頭内大豆一顆并艾燒令然灸七壯即瘥患右灸左患左灸右千金不傳耳病亦可灸之又方灸手交脉三壯左灸右右灸左其炷如鼠屎形横安之兩頭下火枳茹酒主諸藥不能瘥者方枳實上青刮取末欲至心止得茹五升微火炒去濕氣以酒一斗漬微火暖令得藥味隨性飲之主口僻眼急大驗治緩風急風並佳肘後以治身直不得屈伸反覆者枳樹皮亦得角弓反張第七方治卒半身不遂手足拘急不得屈伸身體冷或智或癡或身强直不語或生或死狂言不可名狀角弓反張或欲得食或不用食或大小便不利皆療之方古今録驗名八風續命湯人參桂心當歸獨活黄芩乾薑甘草各十八銖石膏一兩半杏仁四十枚右九味㕮咀以井花水九升煮取三升分三服日二覆取汗不汗更合加麻黄五兩合服倉公當歸湯治賊風口噤角弓反張痙者方當歸防風各十八銖獨活一兩半附子一枚細辛半兩麻黄三十銖右六味㕮咀以酒五升水三升煮取三升服一升口不開者格口内湯一服當蘇二服小汗三服大汗又方酒一斗膠二斤煮令烊得六升毎服一升稍服得愈又方单服荆瀝良秦艽散治半身不遂言語錯亂乍喜乍悲角弓反張皮膚風癢方秦芃獨活胡洽用烏頭黄耆人參甘菊花各二兩胡洽用蜀椒茵芋十八銖胡洽用􅔾草防風石斛胡洽用萆薢山茱萸桂心各一兩半附子芎藭胡洽用桔梗細辛當歸五味子甘草白术乾薑麻黄白鮮皮胡洽用白斂各三十銖天雄逺志各一兩胡洽用防已右二十二味治下篩酒服方寸匕日再漸漸加至二匕又云治風無新久并補吳秦艽散治風注入肢體百脉身腫角弓反張手足酸疼皮膚習習身體盡痛眉毛墮落耳聾驚悸心滿短氣魂志不定隂下濕癢大便有血小便赤黄五勞七傷萬病皆治秦芃蜀椒人參茯苓牡蠣細辛栝蔞根麻黄各十八銖乾薑附子白术桔梗桂心獨活當歸各一兩黄芩柴胡牛膝天雄石南杜仲莽草烏頭各半兩甘草芎藭防風各一兩半右二十六味治下篩盛以韋袋食前温酒一升服方寸匕日三服急行七百歩更飲酒一升忌如常法風痺第八論方論曰血痺病從何而得之師曰夫尊榮人骨弱肌膚盛因疲勞汗出卧不時動摇加被微風遂得之形如風狀巢源云其狀如被微風所吹但以脉自微澀澀在寸口關上緊宜針引陽氣令脉和緊去則愈治風濕脉浮身重汗出惡風方甘草二兩黄耆五兩漢防已四兩生薑白术各三兩大棗十二枚右六味㕮咀以水六升煮取三升分三服服了坐被中欲解如蟲行皮中卧取汗鐵精湯治三隂三陽厥逆寒食胸脇支滿病不能言氣滿胸中急肩息四肢時寒熱不隨喘悸煩亂吸吸少氣言輙飛颺虚損方黄鐵三十斤以流水八斗揚之三千遍人參三兩炭五十斤燒鐵令赤投冷水復燒七遍如此澄清取汁二斗煮藥半夏麥門冬各一升白薇黄芩甘草芍藥各四兩石膏五兩生薑二兩大棗二十枚右十味㕮咀内前汁中煮取六升服一升日三服兩日令盡黄耆湯治血痺隂陽俱微寸口關上微尺中小緊外證身體不仁如風狀方蜀黄耆人參要畧無芍藥桂心各二兩生薑六兩大棗十二枚右六味㕮咀以水六升煮取二升服七合日三服令盡治遊風行走無定腫或如盤大或如甌或著腹背或著臂或著脚悉主之方海藻茯苓防風獨活附子白术各三兩大黄五兩當歸一本作商陸鬼箭各二兩右九味㕮咀以酒二斗漬五日初服二合漸加以知為度白斂散治風痺腫筋急展轉易常處方白斂半兩附子六銖右二味治下篩酒服半刀圭日三不知増至一刀圭身中熱行為候十日便覺治風痺遊走無定處名曰血痺大易方萆薢薯蕷牛膝澤瀉各二兩地膚子白术各半兩乾漆蠐螬狗脊車前子天雄各十銖茵芋六銖山茱萸三十銖乾地黄二兩半右十四味為末蜜和丸如梧子大酒下十丸日三後稍加治諸風痺方防風甘草黄芩桂心當歸茯苓各一兩秦芃葛根各二兩生薑五兩大棗三十枚杏仁五十枚右十一味㕮咀以酒水各四升煮取三升分三服取汗附子酒治大風冷痰癖脹滿諸痺方大附子一枚重二兩者亦云二枚酒五升漬春五日毎服一合日再以瘥為度麻子酒治虚勞百病傷寒風濕及婦人𢃄下月水徃來不調手足疼痺著牀服之令人肥健方麻子一石法麴一斗右二味先𢷬麻子成末以水二石著釡中蒸麻子極熟炊一石米傾出滓隨汁多少如家醖法候熟取清酒隨性飲之備急千金要方卷二十八
