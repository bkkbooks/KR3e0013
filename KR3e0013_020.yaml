body:
  text: 備急千金要方卷二十唐孫思邈撰宋林億等校正七竅病方喉病第七證灸方針法小續命湯加杏仁一兩治卒喉痺不得語方見第八卷中烏翣膏喉嚨者脾胃之侯若臟熱喉則腫塞神氣不通服之方生烏翣十兩升麻三兩羚羊角通草芍藥各二兩薔薇根切一升生地黃切五合猪脂二斤艾葉六銖生者又佳右九味㕮咀綿裹苦酒一升淹浸一宿內猪脂中微火煎取苦酒盡膏不鳴為度去滓薄綿裹膏似大杏仁內喉中細細吞之治喉腫痛風毒衝心胸方豉一升半犀角射干杏仁甘草各二兩芍藥三兩梔子七枚升麻四兩羚羊角一兩半右九味㕮咀以水九升煮取三升去滓內䜴煮一沸分三服治喉腫胸脅支滿方灸尺澤百壯治風毒咽水不得下及瘰􅊓腫方升麻芍藥各六兩射干杏仁楓香葛根麻黃各三兩甘草二兩右八味㕮咀以水八升煮取二升半分三服又方以水服莨菪子末兩錢匕神良治喉痺方荆瀝稍稍咽之效又方燒牛角末酒服之良又方臘月猪尾燒末水服之善又方含雞屎白又方熬杏仁令黑含或末服之又方巴豆去皮針線穿咽入牽出又方馬藺子半升水二升煮取一升半服之又方煮桃皮汁三升服之又方燒荆汁服之又水三升煮荆一握取一升分三服又方刺手小指爪文中出三大豆許血逐左右刺皆須慎酒麵毒物治喉痺及毒氣方桔梗二兩水三升煮取一升頓服之又方生薑二斤搗取汁蜜五合微火煎相和服一合日五又方附子一枚破作大片蜜塗灸令黃含咽汁甘盡更塗灸如前法又方剝大蒜塞耳鼻日二易治喉痺卒不得語方濃煮桂汁服一升亦可末桂著舌下漸咽之良又方煮大豆汁含之無豆用䜴亦佳又方以酒五合和人乳汁半升分二服又方燒炊箄作灰三指撮水服之又方芥子末水和傅之乾則易又方商陸苦酒熬令濃熱傅之又方末桂心如棗核大綿裹著舌下須臾破治喉卒腫不下食方以韭一把搗熬傅之冷則易又方含上好醋口舌有瘡亦佳治懸癰乘熱暴腫長方乾薑半夏等分末以少許著舌上又方鹽末以筯頭張口拄之日五治懸癰咽中生息肉舌腫方日出時向日張口使婦人用左裙𥚑拄其頭上七下瘥又方羊蹄草煮汁口含之又方鹽䜴和塗之良又方取四五歲小兒尿合鹽含之凡喉痺深腫連頓吐氣數者名馬喉痺治之之方馬銜一具水二升煮取一升分三服又方氊中蒼耳三七枚燒末水服之又方馬鞭草根一握勿中風截去兩頭搗取汁服之良又方燒榖奴灰酒服之立破母薑酒咽門者肝膽之候若臟熱咽門則塞而氣閉若腑寒咽門則破而聲嘶此證宜服之乃效母薑汁二升酥牛髓油各一升桂心秦椒各一兩防風一兩半芎藭獨活各一兩六銖右九味為末內薑汁中煎取相淹濡下髓酥油等令調微火三上三下煎平旦溫清酒一升下二合膏即細細吞之日三夜一又方丹參升麻雄黃杏仁鬼臼甘草射干各一兩麝香半兩右八味為末以蜜丸如梧子飲下一丸加至五丸日三酒服亦佳咽痛失聲不利用之良治咽傷語聲不徹方酒酥各一升乾薑二兩半末通草桂心石菖蒲各二兩右六味合和服一匕日三又方酒酥各一升乾薑末十兩右三味以酒二合酥一匕薑末二匕相和服日三食後服亦治肺痛治啞塞咳嗽方桂心六銖杏仁十八銖右二味為末蜜丸如杏仁大含之細細咽汁日夜勿絶治咽痛逆氣不能食方麻子一升熬令黑以酒一升淋取汁空心一服一升漸至二升多汗好覆勿觸風冷此方兼理産婦及丈夫中風如角弓反張口噤不開大驗與紫湯氣力同治卒咽痛方懸木枸燒末水服方寸匕日三又方燒炊箄一枚漿水服方寸匕治卒風咽腫面腫方杏仁末和雞子黃更搗傅上乾復易之七八度若腫汁出煮醋和伏龍肝傅乾更易之治尸咽方燒履鼻繩為灰暖水服之又方燒麻子脂服之良治咽喉不利下氣方射干杏仁人參附子桂心各一兩右五味末蜜丸如指大含一丸稍稍咽之令藥味相接治咽喉中痛癢吐之不出咽之不入似得蠱毒方含生薑五十日瘥又方以青布裹麻黃燒以竹筒盛煙熏咽中耳病第八方治腎熱背急攣痛耳膿血出或生肉塞之不聞人聲方磁石白术牡蠣各五兩甘草一兩蔥白生地黃汁各一升芍藥四兩大棗十五枚生麥門冬六兩右九味㕮咀以水九升煮取三升分三服治腎熱面黑目白腎氣內傷耳鳴吼閙短氣四肢疼痛腰背相引小便黃赤方白术五兩生薑六兩𤣥參四兩澤瀉二兩淡竹葉切二升芍藥茯苓各三兩羊腎一具治如食法生地黃切一升右九味㕮咀以水二升煮羊腎竹葉取一斗去滓澄之下藥煮取三升分三服不已日三更服一劑治腎熱耳膿血出溜日夜不止方鯉魚腦一枚鯉魚腸一具洗細切鯉魚鮓三斤烏麻子熬令香一升右四味先搗麻子碎次下餘藥搗為一家內器中微火熬暖布裹薄耳得兩食頃開之有白蟲出更作藥若兩耳並膿出用此為一劑以薄兩耳若止一耳分藥為兩劑不過三薄便瘥慎風冷治腎虛寒腰脊苦痛隂陽微弱耳鳴焦枯方生地黃汁二升羊腎一具灸白术麥麴各一斤甘草乾薑地骨皮各八兩桂心杜仲黃耆各四兩當歸五味子各三兩白蜜生天門冬汁各三升右十四味為末內盆中取前三物汁和研微火上暖盆取熱更研日曝乾常研令離盆酒服方寸匕日再治耳聾鳴汁出皆由腎寒或一二十年不瘥之方柘根三十斤菖蒲切五斗各用水一石取五斗去滓澄清故鐵三十斤燒赤水五斗浸三宿去鐵澄清右三味合一石五斗用米二石并麴二斗釀如常法酒熟一月封頭開清用磁石吸鐵者三斤搗為末內酒中浸三宿飲之日夜飲常取小醉而眠取聞人語乃止藥又方服天門冬酒百日瘥方見别卷又方礬石少許以生菖蒲根汁和㸃入耳中治勞聾氣聾風聾虛聾毒聾久聾耳鳴方山茱萸乾薑巴㦸天芍藥澤瀉桂心莵絲子黃耆乾地黃逺志蛇床子石斛當歸細辛蓯蓉牡丹人參甘草附子茯苓各二兩菖蒲一兩羊腎二枚防風一兩半右二十三味為末蜜丸如梧子食後服十五丸日三加至三四十丸止皆緣腎虛耳故作補腎方又作薄利丸竅藥即瘥治耳聾方巴豆杏仁各七枚印成鹽兩顆生地黃極粗者長一寸半頭髮如雞子大燒灰右五味治下篩以綿薄裹內耳中一日一夜若小損即去之直以物塞耳耳中黃水及膿出漸漸有效不得更著不著一宿後更內一日一夜還去之依前又方萆麻仁五合杏仁菖蒲磁石桃仁石鹽通草各三分巴豆一分附子二分薰陸香松脂各十分蠟八分右十二味先搗草石令細别研諸仁如脂內松脂蠟合搗數千杵令可丸乃止以如棗核大綿裹塞耳一日四五度出之轉捻不過之四日易之又方磁石四兩天門冬地骨皮生薑各三兩山茱萸土瓜根牡荆子茯苓菖蒲芎藭枳實白芷橘皮甘草各二兩竹瀝二升右十五味㕮咀以水八升煮減半內瀝煮取二升五合分三服五日一劑三者乃著散內耳中如後方又方磁石四兩石菖蒲白斂牡丹山茱萸牛膝土瓜根各二兩右七味治下篩綿裹塞耳日一易之仍服大三五七散佳方見别卷又方蠟松脂薰陸香萆麻石鹽亂髮灰右六味等分為末作丸綿裹塞耳時易之瘥止又方巴豆十四枚成鍊松脂半兩右二味合治丸如黍米大綿裹以簮頭著耳中日一易藥如硬微火灸之以汁出乃愈大效又方防風菖蒲細辛附子芎藭各六銖雄鯉魚腦二枚右六味㕮咀以魚腦合煎三上三下以膏香為成濾去滓冷以一棗核灌耳中以綿塞之古今録驗用療風聾久耳中鳴者以當歸代防風以白芷代芎藭用又方竹筒盛鯉魚腦炊飯處蒸之冷煬注于耳中又方菖蒲附子各等分為末以麻油和以綿裹內耳中廣濟方以撩耳卒痛欲死者崔氏以苦酒和塞耳又方燒鐵令赤投酒中飲之仍以磁石塞耳中日一易夜去之旦别著又方萆麻一百顆去皮大棗十五枚去皮核右二味熟搗丸如杏仁大內耳中二十日即瘥又方芥子搗碎以男兒乳和綿裹內之又方取柴胡苖汁灌耳中再度瘥又方作一坑可容二升許著炭火其中坑似窖形以磚覆口上磚上作一孔子容小指磚孔上著地黃一升以木盆覆之以泥泥盆下勿泄盆底上鑽一小孔可容筯其孔上著三重布以耳孔當盆上薰久若悶去黃水髮裹鹽塞之不過二三度神效又方搗䜴作餅填耳內以地黃長五六分削一頭令尖內耳中與䜴餅底齊餅上著揪葉蓋之剜一孔如筯頭透餅于上灸三壯又方作泥餅子厚薄如餛飩皮覆耳上四邊勿令泄氣當耳孔上以草刺泥餅穿作一小孔于上以艾灸之百壯候耳中痛不可忍即止側耳瀉却黃水出盡即瘥當灸時若泥乾數易之又方酒三升碎牡荆子二升浸七日去滓任性服盡雖三十年久聾亦瘥又方截箭簳二寸內耳中以麵擁四畔勿令泄氣灸筒上七壯又方硫黃雄黃各等分為末綿裹內耳中數日聞人語聲又方以綿裹蛇膏塞耳神良又方淳酢微火煎附子一宿削令可入耳以綿裹塞耳良又方礬石甘草菖蒲當歸細辛防風芎藭白芷烏賊骨附子皂莢各半兩巴豆十四枚右十二味薄切三升酢漬一宿以不中水雞膏九合煎三上三下以巴豆黃膏成去滓內雄黃末攪調取棗核大瀝耳中綿塞之日三易又方桂心十八銖野葛六銖成煎雞肪五兩右三味㕮咀於銅器中微火煎三沸去滓密貯勿泄以葦筒盛如棗核大火灸令少熱欹卧傾耳灌之如此十日盯矃自出大如指長一寸久聾不過三十日以髮裹膏深塞莫使泄氣五日乃出之千金翼云治二十年耳聾治耳聾乾盯矃不可出方搗自死白項蚯蚓安蔥葉中用麵封頭蒸令熟並化為水以汁滴入耳中滿即止不過數度即挑易出瘥後髮裹鹽塞之肘後以療蜒蚰入耳立效又方取酢三年者灌之最良次用綿塞半日許必有物出赤膏治耳聾齒痛方桂心大黃白术細辛芎藭各一兩乾薑二兩丹參五兩蜀椒一升巴豆十枚大附子二枚右十味㕮咀以苦酒二升浸一宿內成煎猪肪三斤火上煎三上三下藥成去滓可服可摩耳聾者綿裹內耳中齒冷痛則著齒間諸痛皆摩若中有病以酒和服如棗許大咽喉痛取棗核大吞之治卒耳聾方細辛菖蒲各六銖杏仁麴末各十銖右四味和搗為丸乾即著少猪脂取如棗核大綿裹內耳中日一易小瘥二日一易夜去旦塞之治三十年久聾方故鐵三十斤以水七斗浸三宿取汁入麴釀米七斗如常造酒法候熟取磁石一斤研末浸酒中三日乃可飲取醉以綿裹磁石內耳中好覆頭卧酒醒去磁石即瘥治耳聾有膿散方附子一兩禹餘糧六銖伏龍肝龍骨釡底墨烏賊骨各半兩右六味為末取如皂策子大綿裹內耳中日一易取瘥不瘥者有蟲加麝香一豆大治耳聾有膿不瘥有蟲方酢三合鯉魚腸一具切右二味和搗帛裹內耳中兩食頃當悶痛有白蟲著藥去之更入新者蟲盡乃止其藥去蟲還可用又方先以紙纏去耳中汁次以礬石末粉耳中涎以石鹽末粉其上食久乃起不過再度永瘥又方搗桂和鯉魚腦內耳中不過三四度瘥治耳鳴聾方當歸細辛芎藭防風附子白芷各六銖右六味為末以鯉魚腦八兩合煎三上三下膏成去滓取棗核大灌耳中且以綿塞耳孔治耳鳴水入方附子礬石各六銖甘草二十銖通草細辛桂心各十八銖菖蒲一兩獨活一兩半右八味為末以白鵝脂半合稍稍和取如棗核大綿裹內耳中日三旋旋和用一本用蔥涕半合治耳鳴如流水聲不治久成聾者方掘生烏頭乘濕削如棗核大內耳中日一易不過三日愈亦療癢及卒風聾病治聤耳出膿汁方礬石黃連烏賊骨赤石脂右四味各等分為末以綿裹如棗核大內耳中日三小品不用赤石脂姚氏加龍骨一兩千金翼同姚氏治聤耳痛膿血出方取釡月下灰薄耳中日三次易換每換以箆子去之再著取瘥止治䁎耳方取桃仁熟搗以舊緋絹裹內耳中日三易以瘥為度治底耳方取黃礬燒綿裹內耳中不過三二日愈或以葦管吹耳中肘後以療耳卒腫出膿治百蟲入耳方末蜀椒一撮以酢半升調灌耳中行二十步即出又方火尉桃葉捲之取塞耳立出又方取車轄脂傅耳孔蟲自出肘後以療聤耳膿血又方以葱涕灌耳中蟲即出亦治耳聾治蜈蚣入耳方灸猪肉令香掩耳即出治蚰蜒入耳方炒胡麻搗碎以葛袋盛傾耳枕之即出又方以牛酪灌之滿耳即出出當半消若入腹中空腹食好酪一二升即化為黃水而出不盡更服用之神效千金翼作牛乳治耳中有物不可出方以弓弦從一頭令散傅好膠拄耳中物上停之令相著徐徐引出備急千金要方卷二十
