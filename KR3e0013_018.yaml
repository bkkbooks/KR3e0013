body:
  text: 備急千金要方卷十八唐孫思邈撰宋林億等校正七竅病方舌病第四方升麻煎舌主心藏熱即應舌生瘡裂破引脣揭赤服之泄熱方蜀升麻射干各三兩柏葉切一升大青二兩苦竹葉切地黃汁各五兩生玄參汁三合赤蜜八合生蘆根薔薇根白皮各五兩右十味㕮咀以水四升煮取一升去滓下玄參汁令兩沸次下地黃汁兩沸次下蜜煎取一升七合綿惹取汁安舌上含細細咽之治舌上瘡不得食舌本強頸兩邊痛此是心虛熱所致之方柴胡升麻芍藥梔子仁通草各二兩黃芩大青杏仁各一兩半生薑石膏各四兩右十味㕮咀以水一斗九升煮取三升半分四服日三夜一滓可重煎服之治舌卒腫滿口溢出如吹豬胞氣息不得通須臾不治殺人方急以指刮破舌兩邊去汁即愈亦可以鈹刀決兩邊破之以瘡膏傅之又方刺舌下兩邊大脈血出勿使刺著舌下中央脈血出不止殺人如上治不愈或血出數升則燒鐵箆令赤尉瘡數過以絶血也又方半夏十二枚洗熟以酢一升煮取八合稍稍含潄之吐出加生薑一兩佳治舌腫起如豬胞方釡下墨末以酢厚傅舌上下脫去更傅須臾即消若先決出血汁竟傅之彌佳凡此患人皆不識或錯治益困殺人甚急但看其舌下自有噤蟲形狀或如螻蛄或如卧蠶子細看之有頭尾其頭少白燒鐵釘烙頭上使熟即自消治舌腫強滿口方滿口含糖酢少許時熱通即止治舌腫滿口不得語方鹽一升蟅蟲三十枚右二味以水三升煮三沸含之稍稍咽之日三治舌強不得語方礬石桂心右二味等分為末安舌下立瘥舌上黑有數孔大如箸出血如湧泉此心藏病治之之方戎鹽黃芩一作葵子黃蘗大黃各五兩人參桂心甘草各二兩右七味末蜜丸梧子大以飲服十丸日三亦燒鐵箆烙之治舌上出血如泉方燒鐵箆熱爍孔中良脣病第五甲煎法灸法方脾脣熱焦方潤脾膏治脾熱脣焦枯無潤方生天門冬切生地黃汁一升生麥門冬萎㽔各四兩豬膏三升細辛甘草芎藭白术各二兩黃耆升麻各三兩右十一味㕮咀諸藥苦酒淹一宿綿裹藥臨煎下生地黃汁與豬膏共煎取膏鳴水氣盡去滓取細細含之甲煎脣脂治脣裂口臭方先以麻搗泥泥兩口好瓷瓶容一斗已上各厚半寸曝令乾甘松香五兩艾納香苜蓿香茅香各一兩藿香三兩零陵香四兩右六味先以酒一升水五升相和作湯洗香令淨切碎又以酒水各一升浸一宿明旦取一斗五升烏麻油六味內其中微火煎三上三下去滓內上件一口瓶中令少許不滿然後取上色沈香三斤雀頭香蘇合香各三兩白膠香白檀香各五兩丁香麝香甲香各一兩右八味先酒水相和作湯洗香令淨各各别搗碎不用絶細以蜜二升酒一升和香內上件瓷瓶中令實滿以綿裹瓶口又以竹箆交橫約之勿令香出先掘地埋上件油瓶令口與地平以香瓶合覆油瓶上令兩口相當以麻搗泥泥兩瓶口際令牢密可厚半寸許用粳壅瓶上厚五寸燒之火欲盡即加粳三日三夜勿令火絶計粳十二石訖停三日令冷出之别錬蠟八斤煮數沸內紫草十二兩煎數十沸取一莖紫草向爪甲上研看紫草骨白出之又以綿濾過與前煎相和令調乃內朱砂粉六兩攪令相得少冷未凝之間傾置竹筒中筒上用紙裹麻纒之待凝冷解開任意用之計此可得五十挺甲煎口脂治脣白無血色及口臭方燒香澤法沈香甲香丁香麝香檀香蘇合香薰陸香零陵香白膠香藿香甘松香澤蘭右十二味各六兩胡麻油五升先煎油令熟乃下白膠香藿香甘松澤蘭少時下火綿濾內瓷瓶中餘八種香搗作末以蜜和勿過濕內著一小瓷瓶中令滿以綿幕口竹十字絡之以小瓶覆大瓶上兩口相合密泥泥之乃掘地埋油瓶令口與地平乃聚乾牛糞燒之一方用粳火燒之七日七夜不須急滿十二日火尤佳待冷出之即成其瓶並須熟泥勻厚一寸曝乾乃可用鍊蠟合甲煎法蠟紫草各二兩右先錬蠟令消乃內紫草煮少時候看以紫草向指甲上研之紫草心白即出之下蠟勿令凝即傾弱一合甲煎於蠟中均攪之訖灌筒中勿觸動候冷凝乃取之便成好口脂也傅口面日三治緊脣方纒白布作大燈炷如指安斧刃上燃炷令刃汗出拭取傅脣上日二三度或故青布亦佳并治瀋脣又方自死螻蛄灰傅之又方炙松脂帖上取瘥又方取蛇皮拭淨燒為灰傅之又方以火炙蠟帖脣取瘥又方水服蠐螬灰良又方青布灰以酒服之脂和塗亦可又方灸虎口男左女右又方灸承漿三壯治瀋脣方以乾蠐螬燒末和豬脂臨卧傅之又方燒鱉甲及頭令煙盡為末傅之日三度治脣生瘡方以頭垢傅之日三度又方以胡粉傅之治脣邊生瘡連年不瘥方以八月藍葉十斤絞取汁洗不過三日即瘥治脣舌忽生瘡方燒雞屎白為末以布裹著病上含之治脣先核方豬屎平量一升投水絞取汁溫服之治脣黑腫痛癢不可忍方取大錢四文於石上以臘月豬脂磨取汁塗之又方以竹弓彈出惡血取瘥又方燒亂髮及蜂房六畜毛作灰豬脂和傅之亦治瀋脣治冬月脣乾拆血出方搗桃仁以豬脂和傅之治逺行脣口面皺裂方熟煎豬脂將行夜常取傅面沒行萬里野宿不損備急千金要方卷十八
