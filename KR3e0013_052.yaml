body:
  text: 備急千金要方卷五十二唐孫思邈撰宋林億等校正胃腑方胃腑脈論第一論曰胃腑者主脾也口脣者是其候也脾合氣於胃胃者水榖之腑也號倉庫守內嗇吏重二斤十四兩迂曲屈伸長一尺六寸大一尺五寸徑五寸受水榖三斗五升其中當留榖二斗水一斗五升廣胲大頸張胸五榖乃容而滿上焦泄氣出其精微慓悍滑疾下焦下溉泄諸小腸此腸胃所受水榖之數也平人則不然胃滿則腸虛腸滿則胃虛更滿更虛氣得上下五臟安定血脈和利精神乃居故神者水榖精氣也五臟不足調於胃故腸胃之中當留榖二斗四升水一斗一升故人一日再至後甲乙作圊後二升半一日中五升七日五七三斗五升而留水榖盡故平人不飲不食七日而死者水榖精氣津液皆盡故七日而死矣右手關上陽絶者無胃脈也若吞酸頭痛胃中有冷刺足太隂治隂在足大指本節後一寸右手關上陽實者胃實也若腸中伏伏一作愊愊不思食得食不能消刺足陽明治陽在足上動脈脈浮而芤浮則為陽芤則為隂浮芤相摶胃氣生熟其陽則絶趺陽脈浮大者此胃家微虛煩圊必日再行動作頭痛重熱氣朝者屬胃胃脈摶堅而長其色赤當病折髀其耎而散者當病食痺髀痛病先發於胃脹滿五日之腎少腹腰脊痛脛痠三日之膀胱背膂筋痛小便閉五日上之心脾心痛閉塞不通身痛體重靈樞云上之心三日不已死冬夜半後夏日昳胃病者腹䐜脹胃管當心而痛上支兩脅膈咽不通飲食不下下取三里飲食不下膈塞不通邪在胃管在上管則抑而刺之在下管則散而去之胃脹者腹滿胃管痛鼻焦臭妨於食大便難胃瘧令人旦病也善飢而不能食食而支滿腹大刺足陽明太隂橫脈出血胃中有癖食冷物者痛不能食食熱則能食脾前受病移於胃脾咳不已嘔吐長蟲厥氣客於胃則夢飲食診得胃脈病形何如肉胃脈實則脹虛則泄脾應肉㬷肉㬷堅大者胃厚肉㬷磨者胃薄肉㬷小而磨者胃不堅肉㬷不稱其身者胃下胃下者脘約肉㬷不堅者胃緩肉㬷無小果纍標緊者胃急肉㬷多小果纍者胃結胃結者胃上脘約不利扁鵲云足太隂與陽明為表裏脾胃若病實則傷熱熱則引水漿常渴虛則傷寒寒則苦飢常痛發於風水其根在胃先從四肢起腹滿大通身腫方在治水篇中胃絶不治五日死何以知之舌腫溺血大便赤泄足陽明之脈起於鼻交頞中旁約太陽之脈下循鼻外入上齒中還出俠口環脣下交承漿却循頥後下亷出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內亷下俠臍入氣街中其支者起胃下口循腹裏下至氣街中而合以下髀關抵伏兔下膝入臏中下循胻外亷下足跗入中指內間其支者下膝三寸而别以下入中指外間其支者跗上入大指間出其端也動則病悽悽振寒善伸數欠顔黑病至䛩人與火聞木音則惕然而驚心動欲獨閉戶牖而處甚則欲上髙而歌棄衣而走賁嚮腹脹是為骭厥是主血所生病者狂瘧溫淫汗出􅍠衄口喎脣緊頸腫喉痺大腹水腫膝臏腫痛循膺乳街股伏兔骭外亷足跗上皆痛中指不用氣盛則身以前皆熱其有餘於胃則消榖善飢溺色黃氣不足則身以前皆寒栗胃中寒則脹滿盛者則人迎大三倍於寸口虛者則人迎反小於寸口胃虛實第二脈法方灸胃實熱右手關上脈陽實者足陽明經也病苦頭痛脈經作腹中堅痛而熱也汗不出如溫瘧脣口乾善噦乳癰缺盆腋下腫痛名曰胃實熱也㵼胃熱湯方梔子仁射干升麻茯苓各三兩芍藥四兩白术五兩生地黃汁赤蜜各一升右八味㕮咀以水七升煮取一升半去滓下地黃汁煮兩沸次下蜜煮取三升分三服老小以意加減胃中熱病灸三里三十壯穴在膝下三寸胃虛冷右手關上脈陽虛者足陽明經也病苦脛寒不得臥惡風寒灑灑目急腹痛虛鳴外臺作耳虛鳴時寒時熱脣口乾面目浮腫名曰胃虛冷也補胃湯治少氣口苦身體無澤方柏子仁防風細辛桂心橘皮各二兩芎藭吳茱茰人參各三兩甘草一兩右九味㕮咀以水一斗煮取三升分為三服人參散補胃虛寒身枯絶諸骨節皆痛方人參甘草細辛各六分麥門冬桂心當歸各七分乾薑二兩逺志一兩吳茱茰二分蜀椒三分右十味治下篩食後溫酒服方寸匕喉嚨論第三論曰喉嚨者脾胃之候也重十二兩長一尺二寸廣二寸其層圍十二重應十二時主通利水榖之道往來神氣若臟熱喉則腫塞氣不通烏翣膏止之方在第六卷中若腑寒喉則耿耿如物常欲窒癢痺涎唾熱則開之寒則通之不熱不寒依臟調之方在第六卷中反胃第四脈法方灸寸緊尺澀其人胸滿不能食而吐吐止者為下之故不能食設言未止者此為胃反故尺為之微澀趺陽脈浮而澀浮即為虛澀即傷脾脾傷即不磨朝食暮吐暮食朝吐宿榖不化名胃反趺陽脈緊而澀其病難治治胃虛反食下喉便吐方人參澤㵼甘草桂心各二兩橘皮乾薑各三兩茯苓四兩大黃六兩青竹茹五兩右九味㕮咀以水八升煮取三升一服七合日三夜一已利者去大黃治反胃而渴方茯苓澤㵼半夏各四兩桂心甘草各三兩右五味㕮咀以水五升煮取二升分三服一方入生薑四兩治胃反吐逆不消食吐不止方人參澤㵼桂心各二兩茯苓四兩橘皮甘草黃耆各三兩大黃一兩半生薑八兩半夏一升麥門冬三升右十一味㕮咀以水一斗二升煮取三升二合一服八合日三夜一羸人六合已利去大黃治胃反朝食暮吐食訖腹中刺痛此由久冷方橘皮三兩甘草厚朴茯苓桂心細辛杏仁竹皮各二兩檳榔十枚前胡八兩生薑五兩人參一兩右十二味㕮咀以水一斗三升煮取三升分三服一方有甘皮二兩又方橘皮三兩白术人參各二兩蜀椒一百二十粒桂心一兩薤白一握右六味㕮咀以水二升漬一宿內羊肚中縫合以三升水煮水盡出之決破去滓分三服治反胃大驗方前胡生薑各四兩阿膠一兩大麻仁五合橘皮三兩桂心三寸甘草五寸大棗十枚吳茱茰四合右九味㕮咀以水三升酒二升煮取一升七合分二服華他治胃反胃反為病朝食暮吐心下堅如杯升往來寒熱吐逆不下食此為關上寒澼所作將成肺痿治之之方真珠雄黃丹砂各三兩朴硝五兩乾薑十纍右五味為末蜜丸如梧子先食服三丸若小煩者飲水即解然無所忌神良無比一方用桂心一兩治胃反食即吐方搗粟米作麵水和作丸楮子大七枚爛煮內醋中細細吞之得下便已麵亦得用之大半夏湯治胃反不受食食已即嘔吐方半夏三升白蜜白术各一升人參二兩生薑三兩右五味㕮咀以水五升和蜜揚之二三百下煮取一升半分三服治胃反食即吐出上氣方蘆根茆根各二兩細切右二味以水四升煮取二升頓服之得下良又方飲白馬尿即止又方燒先死雞肶胵灰酒服男雄女雌又方淘小芥子曝乾為末酒服方寸匕日三又方灸兩乳下各一寸以瘥為度又灸臍上一寸二十壯又灸內踝下三指稍邪向前有穴三壯外臺祕要三指作一指也治酢咽方麴末一斤地黃三斤右二味合搗日乾以酒服三方寸匕日三治噫酢咽方吳茱茰半斤生薑三兩人參二兩大棗十二枚右四味㕮咀以水六升煮取二升先食服一升日再治中散食後吐酸水方乾薑食茱茰各二兩右二味治下篩酒服方寸匕日二胃冷服之立驗嘔吐噦逆第五脈方論法灸夫吐家脈來形狀如新臥起陽緊隂數其人食已即吐陽浮而數亦為吐寸口脈緊而芤緊即為寒芤即為虛寒虛相摶脈為隂結而遲其人即噎關上數其人則吐趺陽脈微而澀微即下利澀即吐逆榖不得入趺陽脈浮者胃氣虛寒氣在上憂氣在下二氣並爭但出不入其人即嘔而不得食恐怖如死寬緩即瘥嘔而脈弱小便復利身有微熱見厥難治論曰凡服湯嘔逆不入腹者先以甘草三兩水三升煮取二升服之得吐但服之不吐益佳消息定然後服餘湯即流利便不吐也凡嘔者多食生薑此是嘔家聖藥半夏湯治逆氣心中煩悶氣滿嘔吐氣上方一名小茯苓湯半夏一升生薑一斤茯苓桂心各五兩右四味㕮咀以水八升煮取二升半分三服若少氣加甘草二兩前胡湯治寒熱嘔逆少氣心下堅聚彭亨滿不得食寒熱痟渴補不足方前胡生薑各三兩甘草朴硝湯下大黃别浸各二兩芍藥茯苓麥門冬當歸半夏滑石石膏栝蔞根黃芩附子人參各一兩右十六味㕮咀以水一斗二升煮取六升分四服治嘔吐四肢痺冷上氣腹熱三焦不調方前胡芎藭甘草當歸石膏人參桂心橘皮各二兩芍藥三兩半夏四兩生薑五兩大棗三十枚右十二味㕮咀以水一斗二升下黃芩三兩合煮取三升分三服一方不用黃芩小麥湯治嘔吐不止方小麥一升人參厚朴各四兩甘草一兩生薑汁三合茯苓三兩青竹茹二兩半右七味㕮咀以水八升煮取三升去滓分三服豬苓散治嘔而膈上寒方豬苓茯苓白术各三兩右三味治下篩以飲服方寸匕日三渴者多飲水犀角人參飲子治嘔逆胃氣虛邪風熱不下食方犀角人參各二兩薤白五兩粟米一合右四味㕮咀以水四升半煮取一升七合下米煮令米熟分四服相去七里久進一服治春夏時行傷寒寒傷於胃胃冷變啘方橘皮桂心葛根各二兩白茅根一升右四味㕮咀以水六升煮取三升分三服數進服盡更合有熱去桂小半夏加茯苓湯治諸嘔噦心下堅痞膈間有水痰眩悸者方見第十八卷中治嘔噦方人參一兩胡麻仁八合橘皮一分枇杷葉八兩右四味㕮咀以水一斗煮枇杷葉取五升下藥煮取三升內麻仁稍飲之又方蘆根切三升以水一斗煮取四升分作四服治氣厥嘔噦不得息方豉一升半夏八兩生薑二兩人參前胡桂心甘草各一兩右七味㕮咀以水九升煮取三升分三服又方大棗十五枚附子一枚橘皮二兩豉一升生薑甘草各一兩右六味㕮咀以水九升煎取二升分三服日三治卒嘔噦厥逆方飲新汲冷水三升佳橘皮湯治乾嘔噦若手足厥冷者方橘皮四兩生薑半斤右二味㕮咀以水七升煮取三升分三服不止更合服之治傷寒後噦乾嘔不下食方生蘆根切一升青竹茹一升粳米三合生薑二兩右四味㕮咀以水五升煮取二升分三服不止服三劑又方通草橘皮各二兩生蘆根切一升粳米三合右四味㕮咀以水四升煮取一升半分三服治乾嘔吐逆涎沫出者方半夏乾薑各等分右二味㕮咀以漿水一升半煮取七合頓服之日三治病人乾嘔方取羊乳汁飲一杯治乾嘔方酒浸馬屎一宿取汁服之又方灸心主尺澤亦佳又方灸乳下一寸三十壯又方乾嘔不止粥食湯藥皆吐不停灸手間使三十壯若四厥脈沉絶不至者灸之便通此起死人法治噦方煮豉三升飲汁佳又方空腹飲薑汁一升又方濃煎蘆根汁飲之又方灸承漿七壯炷如麥大又方灸臍下四指七壯治惡心方苦瓠穰并子一升碎以酒水三升煮取一升頓服須臾吐并下如蝦蟆衣三升又方服小便一百日佳又方麻子一升熬令香熟搗取酒三升熟研濾取一升飲盡日二服盡一石瘥一切病自能飲食不能酒任性多少治食已吐其食方大黃四兩甘草二兩右二味㕮咀以水三升煮取一升半分再服治食飲輒吐方頓服生熟湯三升即止灸法餘散見前吐逆嘔不得食灸心輸百壯吐嘔逆不得下食今日食明日吐者灸膈輸百壯吐變不得下食灸胸堂百壯吐逆不得食灸巨闕五十壯吐逆食不住灸胃管百壯三報吐逆飲食却出灸脾募百壯三報章門穴也吐嘔宿汁吞酸灸神光一名膽募百壯三報甲乙經云日月膽募也在期門下五分吐逆霍亂吐血灸手心主五十壯噫噦膈中氣閉塞灸腋下聚毛下附脅宛宛中五十壯噦噫嘔逆灸石關百壯備急千金要方卷五十二
