body:
  text: 備急千金要方卷八十九唐孫思邈撰宋林億等校正針灸用針略例第五夫用針刺者先明其孔穴補虚瀉實送堅付濡以急隨緩榮衞常行勿失其理夫為針者不離乎心口如銜索目欲内視消息氣血不得妄行針入一分知天地之氣針入二分知呼吸出入上下水火之氣針入三分知四時五行五臟六腑逆順之氣針皮毛腠理者勿傷肌肉針肌肉者勿傷筋脉針筋脉者勿傷骨髓針骨髓者勿傷諸絡東方甲乙木主人肝膽筋膜魂南方丙丁火主人心小腸血脉神西方庚辛金主人肺大腸皮毛魄北方壬癸水主人腎膀胱骨髓精志中央戊巳土主人脾胃肌肉意智針傷筋膜者令人愕視失魂傷血脉者令人煩亂失神傷皮毛者令人上氣失魄傷骨髓者令人呻吟失志傷肌肉者令人四肢不收失智此為五亂因針所生若更失度者有死之憂也所謂針能殺生人不能起死人謂愚人妄針必死不能起生人也又須審候與死人同狀者不可為醫與亡國同政者不可為謀雖聖智神人不能活死人存亡國也故曰危邦不入亂邦不居凡愚人貪利不曉於治亂存亡危身滅族彼此俱䘮亡國破家亦醫之道也凡用針之法以補瀉為先呼吸應江漢補瀉校升斗經緯有法則陰陽不相干震為陽氣始火主於寅兊為陰氣終戊為土坎為太𤣥華冬至之日夜半一陽爻生離為太陽精為中女之象欲補從卯南補不足地戶至巽為地虚欲瀉從酉北天門在乾針入因日明向寅至午針出隨月光從申向午午為日月光之位如此思五行氣以調榮衛用以將息之是曰隨身寶凡用鋒針針者除疾速也先補五呼刺入五分留十呼刺入一寸留二十呼隨師而將息之刺急者深内而久留之刺緩者淺内而疾發針刺大者微出其血刺滑者疾發針淺内而久留之刺澀者必得其脉隨其逆順久留之疾出之壓其穴勿出其血諸小弱者勿用大針然氣不足宜調以百藥餘三針者正中破癰堅瘤結息肉也亦治人疾也火針亦用鋒針油火燒之務在猛熱不熱即於人有損也隔日一報三報之後當膿水大出為佳巨闕太倉上下管此之一行有六穴忌火針也大癥塊當停針轉動須臾為佳每針常須看脉脉好乃下針脉惡勿亂下針也下針一宿發熱惡寒此為中病勿怪之灸例第六凡孔穴在身皆是臟腑榮衛血脉流通表裏徃來各有所主臨時救難必在審詳人有老少體有長短膚有肥瘦皆須精思商量准而折之無得一槩致有差失其尺寸之法依古者八寸為尺仍取病者男左女右手中指上第一節為一寸亦有長短不定者即取手大拇指第一節横度為一寸以意消息巧拙在人其言一夫者以四指為一夫又以肌肉文理節解縫㑹宛陷之中及以手按之病者快然如此仔細安詳用心者乃能得之耳凡經云横三間寸者則是三灸兩間一寸有三灸有三分三壯之處即為一寸黄帝曰灸不三分是謂徒寃炷務大也小弱炷乃小作之以意商量凡㸃灸法皆須平直四體無使傾側灸時孔穴不正無益於事徒破好肉耳若坐㸃則坐灸之臥㸃則臥灸之立㸃則立灸之反此亦不得其穴矣凡言壯數者若丁壯遇病病根深篤者可倍多於方數其人老小羸弱者可闕半依扁鵲灸法有至五百壯千壯皆臨闕息之明堂本經多云針入六分灸三壯闕餘論曹氏灸法有百壯者有五十壯者闕諸方亦皆有此仍須准病輕重以行之不可膠柱守株凡新生兒七日以上周年以還不過七壯炷如雀屎大凡灸先陽後陰言從頭向左而漸下次後從頭向右而漸下先上後下皆以日正午已後乃可下火灸之時謂陰氣未至灸無不著午前平旦穀氣虚令人癲眩不可針灸也慎之其大法如此卒急者不可用此例灸之生熟法腰已上為上部腰已下為下部外為陽部榮内為陰部衞故臓腑周流名曰經絡是故丈夫四十已上氣在腰老嫗四十已上氣在乳是以丈夫先衰於下婦人先衰於上灸之生熟亦宜撙而節之法當隨病遷變大法外氣務生内氣務熟其餘隨宜耳頭者身之元首人神之所法氣口精明三百六十五絡皆上歸於頭頭者諸陽之㑹也故頭病必宜審之灸其穴不得亂灸過多傷神或使陽精𤣥熟令陰魄再卒是以灸頭正得滿百脊背者是體之横梁五臟之所繫著太陽之㑹合陰陽動發冷熱成疾灸太過熟大害人也臂脚手足者人之枝榦其神繫於五臟六腑隨血脉出能逺近採物臨深履薄養於諸經狹淺故灸宜少灸過多即内神不得入精神閉塞否滯不仁即臂不舉故四肢之灸不宜太熟也然腹臟之内為性貪於五味無厭成疾風寒結痼水穀不消宜當熟之然大杼脊中腎輸膀胱八窌可至二百壯心主手足太陰可至六十七壯三里太鷄太衝陰陽二陵泉上下二亷可至百壯腹上下管中管太倉闗元可至百壯若病重者皆當三報之乃愈病耳若治諸沈結寒冷病莫若灸之宜熟若治諸陰陽風者身熱脉大者以鋒針刺之間日一報之若治諸邪風鬼注痛處少氣以毫針去之隨病輕重用之表針内藥隨時用之消息將之與天同心百年永安終無横病此要略說之非賢勿傳祕之凡微數之脉慎不可灸傷血脉焦筋骨凡汗已後勿灸此為大逆脉浮熱甚勿灸頭面目咽灸之最欲生少手臂四肢灸之欲須小熟亦不宜多胷背腹灸之尤宜大熟其腰脊欲須少生大體皆須以意商量臨時遷改應機千變萬化難以一准耳其温病隨所著而灸之可百壯餘少至九十壯大杼胃脘可五十壯手心主手足太陽可五十壯三里曲池太衝可百壯皆三報之乃可愈耳風勞沈重九部盡病及毒氣為疾者不過五十壯亦宜三報之若攻臟腑成心腹疼者亦宜百壯若卒暴病鬼魅所著者灸頭面四肢宜多腹背宜少其多不過五十其少不減三五七九壯凡陰陽濡風口喎僻者不過三十壯三日二報報如前微者三報重者九報此風氣濡微細入故宜緩火温氣推排漸抽以除耳若卒暴催迫則流行細入成痼疾不可愈也故宜緩火凡諸虚疾水穀沈結流離者當灸腹背宜多而不過百壯大凡人有卒暴得疾或中時氣凡百所苦皆須急灸療慎勿忍之停滯也若王相者可得無他不爾漸久後皆難愈深宜知此一條凡人吳蜀地遊宦體上常須三兩處灸之勿令瘡暫瘥則瘴癘温瘧毒氣不能著人也故吳蜀多行灸法有阿是之法言人有病痛即令揑其上若裏當其處不問孔穴即得便快成痛處即云阿是灸刺皆驗故曰阿是穴也太醫針灸宜忌第七論曰欲行針灸先知行年宜忌及人神所在不與禁忌相應即可今具如左木命人行年在木則不宜針及服青藥火命人行年在火則不宜汗及服赤藥土命人行年在土則不宜吐及服黄藥金命人行年在金則不宜灸及服白藥水命人行年在水則不宜下及服黒藥凡醫者不知此法下手即困若遇年命厄㑹深者下手即死推天醫血忌等月忌及日忌傍通法月傍通正二三四五六七八九十十一十二天醫卯寅丑子亥戌酉申未巳午辰呼師治病吉血忌丑未寅申卯酉辰戌巳亥午子忌針灸月厭戌酉申未午巳辰卯寅丑子亥忌針灸四激戌戌戌丑丑丑辰辰辰未未未忌針灸月殺戌巳午未寅卯辰亥子丑申酉不可舉百事凶千金翼外臺云丑戌未辰丑戌未辰丑戌未辰月刑巳子辰申午丑寅酉未亥卯戌不療病六害巳辰卯寅丑子亥戌酉申未午不療病右天醫上呼師避病吉若刑害上凶推行年醫法年至子丑寅卯辰巳午未申酉戌亥天醫卯戌子未酉亥辰寅巳午丑申求歲天醫法常以傳送加太歳太乙下為天醫求月天醫法陽月以大吉陰月以小吉加月建功曹下為鬼道傳送下為天醫推避病法以小吉加月建登明下為天醫可於此避病推治病法以月將加時天醫加病人年治之瘥喚師法未卯巳亥酉鬼所在喚師凶推行年人神法臍心肘咽口頭脊膝足一二三四五六七八九十十一十二十三十四十五十六十七十八十九二十二十一二十二二十三二十四二十五二十六二十七二十八二十九三十三十一三十二三十三三十四三十五三十六三十七三十八三十九四十四十一四十二四十三四十四四十五四十六四十七四十八四十九五十五十一五十二五十三五十四五十五五十六五十七五十八五十九六十六十一六十二六十三六十四六十五六十六六十七六十八六十九七十七十一七十二七十三七十四七十五七十六七十七七十八七十九八十八十一八十二八十三八十四八十五八十六八十七八十八八十九九十右九部行神歲移一部周而復始不可針灸推十二部人神所在法心辰喉卯頭寅眉丑背子腰亥腹戌項酉足申膝未陰午股巳眉千金翼作肩一二三四五六七八九十十一十二十三十四十五十六十七十八十九二十二十一二十二二十三二十四二十五二十六二十七二十八二十九三十三十一三十二三十三三十四三十五三十六三十七三十八三十九四十四十一四十二四十三四十四四十五四十六四十七四十八四十九五十五十一五十二五十三五十四五十五五十六五十七五十八五十九六十六十一六十二六十三六十四六十五六十六六十七六十八六十九七十七十一七十二七十三七十四七十五七十六七十七七十八七十九八十八十一八十二八十三八十四八十五八十六八十七八十八八十九九十九十一九十二九十三九十四九十五九十六右十二部人神所在並不可針灸及損傷慎之日辰忌一日足大趾二日外踝三日股内四日腰五日口舌咽懸􅢝六日足小趾外臺云手小指七日内踝八日足腕九日尻十日背腰十一日鼻柱千金翼云及眉十二日髪際十三日牙齒十四日胃管十五日徧身十六日胷乳十七日氣衝千金翼云及脇十八日腹内十九日足趺二十日膝下二十一日手小指二十二日伏兔二十三日肝輸二十四日手陽明兩脇二十五日足陽明二十六日手足二十七日膝二十八日陰二十九日膝脛顳顬三十日闗元下至足心外臺云足趺上十干十二支人神忌日甲日頭乙日項丙日肩臂丁日胷脇戊日腹己日背庚日膝辛日脾壬日腎癸日足又云甲乙日忌寅時頭丙丁日忌辰時耳戊己日忌午時髮庚辛日忌申時闕文壬癸日忌酉時足子日目丑日耳寅日口外臺云胷面卯日鼻外臺云在脾辰日腰巳日手外臺云頭口午日心未日足外臺云兩足心申日頭外臺云二肩酉日背外臺云脛戌日項外臺云咽喉亥日頂外臺云臂脛建日申時頭外臺云足除日酉時膝外臺云眼滿日戌時腹平日亥時腰背定日子時心執日丑時手破日寅時口危日卯時鼻成日辰時脣收日巳時足外臺云頭開日午時耳閉日未時目右件時不得犯其處殺人十二時忌子時踝丑時頭寅時目卯時面耳外臺云在項辰時項口外臺云在面巳時肩外臺云在乳午時胷脇未時腹申時心酉時背胛外臺云闕戌時腰陰亥時股又立春春分脾立夏夏至肺立秋秋分肝立冬冬至心四季十八日腎已上並不得醫治凶凡五臟王時不得治及忌針灸其經絡凶又正月丑二月戌三月未四月辰五月丑六月戌七月未八月辰九月丑十月戌十一月未十二月辰又春左脇秋右脇夏在臍冬在腰皆凶又每月六日十五日十八日二十二日二十四日小盡日療病令人長病戊午甲午此二日大忌刺出血服藥針灸皆凶千金翼云不出月凶甲辰庚寅乙卯丙辰辛巳此日針灸凶壬辰甲辰己巳丙午丁未此日男忌針灸甲寅乙卯乙酉乙巳丁巳此日女人忌針灸甲子壬子甲午丙辰丁巳辛卯癸卯乙亥此日忌針灸外臺云甲子日天子㑹壬子日百王㑹甲午日太子㑹丁巳日王公㑹丙辰日諸侯㑹辛卯日大夫㑹癸卯日大人㑹乙亥日巳上都㑹又男避除女避破男忌戊女忌巳凡五辰五酉五未及八節先後各一日皆凶論曰此等法散在諸部不可尋究故集作一處造次易知所以省披討也備急千金要方卷八十九
