body:
  text: 備急千金要方卷三十一唐孫思邈撰宋林億等校正傷寒方發汗圓第六方神丹圓治傷寒赤澀惡寒發熱體疼者方附子烏頭各四兩人參茯苓半夏各五兩朱砂一兩右六味末之蜜圓以真丹為色先食服如大豆二圓生薑湯下日三須臾進熱粥二升許重覆汗出止若不得汗汗少不解復服如前法若得汗足應解而不解者當服桂枝湯此藥多毒熱者令飲水寒者溫飲解之治瘧先發服二圓要略用細辛不用人參别有射干棗大一枚名赤圓主寒氣厥逆麥奴圓治傷寒五六日以上不解熱在胸中口噤不能言惟欲飲水為壞傷寒醫所不能治為成死人精魂已竭心下才溫以杖發其口開灌藥咽中藥得下則愈麥奴圓一曰黑奴圓二曰水解圓釡底墨竈突墨梁上墨麥奴黃芩大黃芒硝各一兩麻黃二兩右八味末之蜜圓如彈子大以新汲水五合研一圓破漬置水中當藥消盡服之病者渴欲飲水極意不問升數欲止復強飲能多飲為善不欲飲水當強飲之服藥須臾當寒寒竟汗出便解若服藥日移五尺許不汗復服如前法不過再三服佳小麥黑勃名麥奴宜吐第七例方證例曰大法春宜吐凡服吐藥中病便止不必盡劑也病如桂枝證頭不痛項不強而脈寸口浮胸中鞭滿氣上衝喉咽不得息者此以內有久痰宜吐之病胸上諸寒胸中鬱鬱而痛不能食欲得使人按之按之反有涎出不利口十餘行而其人脈遲寸脈微滑者此宜吐之吐之利即止少隂病飲食入口即吐心中愠愠然欲吐復不能吐者宜吐之宿食在上管宜吐之病手足逆冷脈乍結者客氣在胸中心下滿而煩飢不能食者以病在胸中宜吐之瓜蒂散病如桂枝證頭不痛項不強寸脈微浮胸中痞堅氣上撞咽喉不得息者此為胸有寒也宜吐之瓜蒂赤小豆各一兩右二味治下篩取一錢匕香䜴一合熟湯七合煮作稀粥去滓取汁和散溫頓服之不吐者少少加得快吐乃止張文仲以白湯三合和服水導散治時氣病煩熱如火狂言妄語欲以闕按目録宜吐第七水導散後尚有藜蘆圓今俱缺其次則宜下第八有例有證有大承氣湯今亦缺而甘遂以下六味正大承氣湯藥品也中間脫落一二葉須覔善本補之甘遂半兩白芷二兩大黃四兩厚朴八兩枳實五枚芒硝三合右六味㕮咀以水一斗先煮厚朴枳實取五升去滓內大黃煎取二升去滓下芒硝更煎一兩沸分再服得快利止抵黨圓下血方水蛭虻蟲各二十枚桃仁二十二枚大黃三兩右四味為末蜜和合分為四丸以水一升煮一丸取七合頓服之晬時當下血不下更服抵黨湯治同前水蛭虻蟲各三十枚桃仁二十三枚大黃三兩右四味㕮咀以水五升煮取三升去滓服一升不下更服承氣湯方枳實互枚芒硝半升大黃四兩甘草二兩右四味㕮咀以水五升煮取二升去滓適寒溫分三服如人行五里進一服取下利為度若不得利盡服之生地黃湯治傷寒有熱虛羸少氣心下滿胃中有宿食大便不利方生地黃三斤大黃四兩甘草一兩芒硝二合大棗二十枚右五味合搗令相得蒸五升米下熟絞取汁分再服大柴胡萎㽔知母湯治傷寒七八日不解默默心煩腹中有乾屎讝語方柴胡半斤萎㽔知母大黃甘草各二兩人參黃芩芍藥各三兩生薑五兩半夏半升右十味㕮咀以水一斗煮取三升去滓服一升日三即下為效集驗用枳實四枚不用芍藥治傷寒頭痛壯熱百節疼痛方柴胡梔子仁芍藥知母各四兩升麻黃芩大青杏仁各三兩石膏八兩香䜴一升右十味㕮咀以水九升煮取二升七合分溫三服若熱盛加大黃四兩駃䜴圓治傷寒留飲宿食不消方豆䜴一升巴豆去油三百枚今用二百枚杏仁六十枚黃芩黃連大黃麻黃各四兩芒硝甘遂各三兩右九味為末以蜜和丸如大豆服二丸不得下者增之崔氏云此黃素方發汗吐下後第九脈證灸法方傷寒已解半日許復心煩熱其脈浮數者可更發汗宜桂枝湯凡發汗後飲水者必喘宜慎也竹葉湯治發汗後表裏虛煩不可攻者但當與此方竹葉二把半夏半升麥門冬一升人參甘草各二兩生薑四兩石膏一斤右七味㕮咀以水一斗煮取六升去滓內粳米半升米熟去之分服一升日三張文仲不用生薑桂枝麻黃湯服桂枝湯大汗後脈洪大者與桂枝湯若形如瘧一日再發汗出便解者屬桂枝二麻黃一湯方桂枝一兩十七銖麻黃十六銖芍藥生薑各一兩六銖甘草一兩二銖杏仁十六枚大棗五枚右七味㕮咀以水五升煮麻黃再沸去沫內諸藥煮取二升適寒溫分再服取微汗而已小青龍湯治傷寒表未解心下有水氣乾嘔發熱而眩或渴或利或噎或小便不利小腹滿或喘者方桂心麻黃甘草乾薑芍藥細辛各三兩五味子半夏各半升右八味㕮咀以水一斗煮麻黃減二升去上沫內諸藥煮取三升分三服相去十里頃復服之若渴者去半夏加栝蔞根三兩若微利去麻黃加芫花如一雞子大熬令赤色若噎加附子一枚若小便不利小腹滿者去麻黃加茯苓四兩若喘去麻黃加杏仁半升數用神效四物甘草湯治傷寒發汗出而喘無大熱與此方甘草二兩麻黃四兩石膏半斤杏仁五十枚右四味㕮咀以水七升先煮麻黃令減二升內諸藥煎取三升分三服梔子湯治發汗若下後煩熱胸中窒氣逆搶心者方梔子十四枚香䜴四合綿裹右二味以水四升先煮梔子取二升半次內䜴煮取一升半分二服溫進一服得快吐止後服厚朴湯治發汗後腹脹滿方厚朴半兩人參一兩甘草二兩生薑八兩半夏一升右五味㕮咀以水一斗煮取三升分三服玄武湯治太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地方茯苓芍藥生薑各三兩白术二兩附子一枚右五味㕮咀以水八升煮取三升溫服七合葛根黃連湯治太陽病反下之利遂不止脈促者表未解喘而汗出者方葛根半斤黃連黃芩各三兩甘草二兩右四味㕮咀以水八升先煮葛根減二升次內諸藥煮取二升去滓分再服茯苓湯治傷寒發汗吐下後心下逆滿氣上衝胸起即頭眩其脈沈緊發汗則動經身為振振搖者方茯苓四兩白术桂心各三兩甘草二兩右四味㕮咀以水六升煮取三升去滓分三服凡寸口脈浮關上自沈為結胸巢治作沈細凡傷寒病發于陽而反下之熱入因作結胸太陷胸圓治結胸病頃亦強如柔痙狀下之即和方大黃八兩芒硝杏仁葶藶各五合右四味搗篩大黃葶藶餘二味别研如脂和散取如彈丸大一枚甘遂末一錢匕白蜜二合水一升煮取八合溫頓服之病乃自下如不下更服取下為效傷寒六七日結胸熱實其脈沈緊心下痛按之正堅宜大陷胸湯太陽病重發汗而復下之不大便五六日舌上乾而渴日晡有小潮熱心胸大煩從心下至小腹堅滿痛不可近宜大陷胸湯方甘遂末一錢匕大黃切六闕芒硝一升右三味以水六升先煮大黃取二升去滓次內芒硝一沸次內甘遂分再服一服得快利止後服甘草㵼心湯傷寒中風醫反下之其人下痢日數十行穀不化腹中雷鳴心下痞堅結滿乾嘔心煩不能得安既見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆使之然也宜治之方甘草四兩黃芩乾薑各三兩黃連一兩半夏半升大棗十二枚右六味㕮咀以水一斗煮取六升去滓分服一升日三加人參三兩乃是也生薑瀉心湯治傷寒發汗後胃中不和心下痞堅乾噫食臭脅下有水氣腹中雷鳴下痢者方生薑四兩甘草人參黃芩各兩乾薑黃連各一兩半夏半斤大棗十二枚右八味㕮咀以水一斗煮取六升去滓分服一升日三白虎湯治傷寒吐下後七八日不解結熱在裏表裏俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者方石膏一升知母六兩甘草二兩粳米六合右四味㕮咀以水一斗煮米熟去滓分服一升日三諸亡血及虛家不可與白虎湯若立夏後至立秋前得用之立秋後不可服春三月尚凛冷亦不可與之與之則嘔利腹痛傷寒無大熱而口乾渴心煩背微惡寒宜服白虎湯傷寒脈浮發熱無汗其表不解不可與白虎湯渴欲飲水無表證宜白虎湯若渴欲飲水口燥舌乾者亦宜白虎湯青葙子圓治傷寒後結熱在內煩渴者方青葙子五兩黃芩栝蔞根苦參各一兩黃蘗二兩龍膽梔子仁黃連各三兩右八味為末蜜丸如梧桐子大先食後服七丸日三不知稍加本云餳和為丸大青湯治傷寒熱病十日已上發汗不解及吐下後諸藥不除及下利不止斑出皆治之方大青四兩甘草阿膠各二兩豆豉一升右四味㕮咀以水八升煮取三升去滓煮三沸去䜴內阿膠令煬頓服一升日三服欲盡復作常使有餘渴者當飲但除熱止吐下無毒深師治勞復肘後有赤石脂三兩胡洽集驗同治傷寒後不了了朝夕有熱如瘧狀方知母二兩麻黃甘草芍藥黃芩桂心各一兩右六味㕮咀以水七升煮取二升半服五合日三溫覆令微汗若心煩不得眠其人欲飲水當稍稍飲之令胃中和則愈江南諸師祕仲景要方不傳灸法初得病或先頭痛身寒熱或澀澀欲守火或腰背強直面目如飲酒狀此傷寒初得一二日但烈火灸心下三處第一處去心下一寸名巨闕第二處去心下二寸名上管第三處去心下三寸名胃管各灸五十壯然或人形大小不同恐寸數有異可繩度隨其長短寸數最佳取繩從心頭骨名鳩尾頭度取臍孔中屈繩取半當繩頭名胃管又中屈半繩更分為二分從胃管向上度一分即是上管又上度取一分即是巨闕大人可灸五十壯小兒可三壯亦隨其年灸之大小以意斟量也若病者三四日以上宜先灸胸上二十壯以繩度鼻正上盡髮際中屈繩斷去半便從髮際入髮中灸繩頭名曰天聰又灸兩顳顬又灸兩風池又灸肝輸百壯餘處各二十壯又灸太衝三十壯神驗備急千金要方卷三十一
