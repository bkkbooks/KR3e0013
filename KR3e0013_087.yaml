body:
  text: 備急千金要方卷八十七唐孫思邈撰宋林億等校正針灸明堂三人圖第一仰人十四門側人六門伏人十門夫病源所起本於臟腑臟腑之脉竝出手足循環腹背無所不至往來出沒難以測量將欲指取其穴非圖莫可預備之要非灸不精故經曰湯藥攻其內針灸攻其外則病無所逃矣方知針灸之功過半於湯藥矣然去聖久逺學徒䝉昧孔穴出入莫測經源濟弱扶危臨事多惑余慨其不逮聊因暇隙鳩集今古名醫明堂以述針灸經一篇用補私闕庶依圖知穴按經識分則孔穴親踈居然可見矣舊明堂圖年代久逺傳寫錯誤不足指南今一依甄權等新撰為定云耳若依明堂正經人是七尺六寸四分之身今半之為圖人身長三尺八寸二分其孔穴相去亦皆半之以五分為寸其尺用夏家古尺司馬六尺為步即江淮吳越所用八寸小尺是也其十二經脉五色作之竒經八脉以緑色為之三人孔穴共六百五十穴圖之於後亦覩之便令了耳仰人二百八十二穴背人一百九十四穴側人一百七十四穴穴名共三百四十九單穴四十八名雙穴三百一名仰人明堂圖十四門一百五十七穴內三十二穴單一百二十五穴雙仰人頭靣三十六穴逺近法第一頭部中行上星在顱上直鼻中央入髮際一寸陷容豆囟㑹在上星後一寸陷者中前頂在囟會後一寸半骨陷中百會在前頂後一寸半頂中心頭第二行五處在頭上去上星傍一寸半承光在五處後一寸不灸一本言一寸半通天在承光後一寸半頭第三行臨泣在目上眥直上入髮際五分陷者中目窗在臨泣後一寸正營在目窗後一寸正靣部中行神庭在髮際直鼻不刺素窖在鼻柱端水溝在鼻柱下人中兊端在脣上端齗交在脣內齒上齗縫承漿在頥前下腎之下亷泉在頷下結喉上舌本靣部第二行曲差俠神庭傍一寸半在髮際攢竹在眉頭陷端精明在目內眥外巨窖俠鼻傍八分直曈子迎香在和窖上一寸鼻孔傍禾窖直鼻孔下俠水溝傍五分面部第三行陽白在眉上一寸直瞳子承泣在目下七分直曈子不灸四白在目下一寸地倉俠口傍四分大迎在曲頷前一寸二分骨陷中動脉面部第四行本神俠曲差傍一寸半在髮際一云直耳上入髮際四分絲竹空在眉後陷中不灸瞳子窖在目外去眥五分一名太陽一名前闕靣部第五行頭維在額角髮際本神旁一寸半不灸顴窖在靣􅍠骨下下亷陷中上關在耳前上亷起骨開口取之一名客主人下關在客主人下耳前動脉下空下亷合口有空張口則閉頰車在耳下曲頰端陷者中胸部中央直下七穴逺近法第二天突在頸結喉下五寸宛宛中旋機在天突下一寸陷中仰頭取之華蓋在旋機下一寸陷中仰而取之紫宫在華蓋下一寸六分陷中仰而取之玉堂在紫宫下一寸六分陷中亶中在玉堂下一寸六分橫直兩乳間中庭在亶中下一寸六分陷中胸背在第二行六穴逺近法第三俞府在巨骨下去旋機傍各二寸陷者中仰而取之或中在俞府下一寸六分陷中仰臥取之神藏在或中下一寸六分陷中仰而取之靈墟在神藏下一寸六分陷中仰臥取之墟或作墻神封在靈墟下一寸六分步郎在神封下一寸六分陷中仰而取之胸部第三行六穴逺近法第四氣戶在巨骨下俠俞府兩傍各二寸陷中仰而取之庫房在氣户下一寸六分陷中仰而取之屋翳在庫房下一寸六分陷中仰而取之膺窗在屋翳下一寸六分乳中禁不灸刺乳根在乳下一寸六分陷中仰而取之胸部第四行六穴逺近法第五雲門在巨骨下俠氣户兩傍各二寸陷中動脉應手舉膚取之中府在雲門下一寸方云一寸六分乳上三肋間動脉應手陷中周榮在中府下一寸六分陷中仰而取之胸卿在周榮下一寸六分陷中仰而取之天溪在胸卿下一寸六分陷中仰而取之食竇在天溪下一寸六分舉臂取之腹中第一行十四穴逺近法第六鳩尾在臆前蔽骨下五分不灸刺巨闕在鳩尾下一寸上管在巨闕下一寸去蔽骨三寸中管在上管下一寸建里在中管下一寸下管在建里下一寸水分在下管下一寸臍上一寸臍中禁不刺即神闕穴陰交在臍下一寸氣海在臍下一寸半石門在臍下二寸女子不灸關元在臍下三寸中極在臍下四寸曲骨在橫骨之上中極下一寸毛際陷中會陰穴腹第二行十一穴逺近法第七幽門在巨闕傍半寸陷中心藏卷云俠巨闕兩邉相去各一寸通谷在幽門下一寸陰都在通谷下一寸石關在陰都下一寸一名右關商曲在石關下一寸一名高曲肓輸在商曲下一寸直臍傍各五分中注在肓輸下五分四滿在中注下一寸肺藏卷云俠丹田氣穴在四滿下一寸婦人方上卷云在關元左邉二寸是右二寸名子戶大赫在氣穴下一寸腎藏卷云在屈骨端三寸橫骨在大赫下一寸腎藏卷云名屈骨在陰上橫骨中央貌曲如却月中央是腹第三行十二穴逺近法第八不容在幽門傍各一寸五分去任脉二寸直四肋端相去四寸承滿在不容下一寸梁門在承滿下一寸關門在梁門下一寸太一上太一在關門下一寸滑肉門在太一下一寸天樞一名長溪去肓輸一寸半直臍傍二寸脾藏卷云名長谷俠臍相去五寸一名循際外陵在天樞下半寸大巨上大巨在臍下一寸兩傍各二寸長溪下二寸水道在大巨下三寸歸來在氷道下二寸外臺作三寸氣衝在歸來下一寸鼠鼷上一寸素問刺熱論注云在腹臍下橫骨兩端鼠鼷上一寸動脉應手腹第四行七穴逺近法第九期門在第二肋端不容傍各一寸半上直兩乳日月在期門下五分腹哀在日月下一寸半大橫在腹哀下二寸直臍傍甲乙云三寸腹結在大橫下一寸三分府舍在腹結下三寸衝門上去大橫五寸在府舍下橫骨兩端約中手太陰肺經十穴第十少商在手大指端內側去爪甲角如韭葉魚際在手大指本節後內側散脉中大泉在手掌後陷者中此即大淵也避唐祖名當時改正今存此名不改正恐後人將為實是一穴也經渠在寸口陷者中不灸列缺在腕上一寸半手太陰絡别走陽明孔最在腕上七寸手太陰郤也尺澤在肘中約上動脉俠白在天府下去肘五寸動脉天府在腋下三寸不灸臑㑹在臂前亷去肩頭三寸甲乙此穴在肩部外臺屬大腸銅人經屬三焦手厥陰心主經八穴第十一中衝在手中指端在爪甲如韭葉陷者中勞宫在掌中央動脉大陵在掌後兩骨間內關在掌後去腕二寸外臺作五寸手心主胳别走大陽間使在掌後三寸兩筋間郤門在掌後去腕五寸外臺云去內關五寸手厥陰郤也曲澤在肘內亷下陷者中屈肘得之天泉在腋下二寸舉腋取之手少陰心經八穴第十二少衝在手小指內亷之端去爪甲如韭葉少府在手小指大節後陷者中直勞宫大節又作本節神門在掌後兊骨端陷者中陰郤在掌後動脉中去腕半寸手少陰郤也通理在腕後一寸手少陰胳别走太陽靈道在掌後一寸半少海在肘內亷節後陷中極泉在腋下筋間動脉入骨足太陰脾經十一穴第十三隱白在足大趾端內側去爪甲如韭葉大都在足大趾內本節後陷中肝藏卷云在足大趾本節內側白肉際太白在足大趾內側核骨下陷中公孫在足大趾本節後一寸足太陰胳别走陽明商丘在足內踝下微前陷中三陰交在內踝上八寸骨下陷中漏谷在內踝上六寸骨下陷中太陰胳銅人經云亦名太陰胳地機一名脾舍在膝下五寸足太陰郤也陰陵泉在膝下內側輔骨下陷者中伸足得之血海在膝臏上內亷白肉際二寸半一作三寸箕門在魚腹上筋間動應手陰市內足陽明胃經十五穴第十四厲兊在足大趾次趾之端去爪甲角如韭葉內庭在足大趾次趾外間陷谷在足大趾次趾外間本節後去內庭二寸衝陽在足跗上五寸骨間去陷谷三寸一云二寸解溪在衝陽後一寸半豐隆在外踝上八寸足陽明胳别走大陰下亷一名下巨虛在上亷下三寸條口在下亷上一寸巨虛上亷在三里下三寸三里在膝下三寸胻骨外犢鼻在膝臏下骭上俠解大筋中陰市一名陰鼎在膝上三寸伏兔下第二十卷云在膝上當伏兔下行二寸臨膝取之伏兔在膝上六寸不灸髀關在膝上伏兔後交分中梁丘在膝上二寸兩筋間或云三寸足陽明郤也伏人明堂圖十門一百五穴穴內十六穴單八十九雙伏人頭上第一行五穴逺近法第一後頂在百㑹後一寸半强間在後頂後一寸半腦戶在枕骨上强間後一寸半不灸風府在項後入髮際一寸大筋內宛宛中不灸瘖門在項後髮際宛宛中不灸頭上第二行三穴逺近法第二玉枕在胳却後七分半俠腦戶傍一寸三分起肉枕骨上入髮際三寸胳却在通天後一寸半天柱俠項後髮際大筋外亷陷者中頭上第三行三穴逺近法第三風池在顳顬後髮際陷中承靈在正營後一寸半腦空在承靈後一寸半俠玉枕傍枕骨下陷中一名顳顬伏人耳後六穴逺近法第四顱息在耳後青脉間瘈脉在耳本雞足青脉不灸完骨在耳後入髮際四分竅陰在完骨上枕骨下浮白在耳後入髮際一寸翳風在耳後陷中按之引耳中脊中第一行十一穴逺近法第五大椎在第一椎上陷中陶道在大椎下節間身柱在第三椎下節間神道在第五椎下節間靈臺在第六椎至陽在第七椎下節間筋縮在第九椎下節間脊中在第十一椎下節間不灸懸樞在第十三椎下節間命門在第十四椎下節間陽關穴在第十六椎腰輸在第二十一椎下節間長彊在脊骶端脊中第二行二十一穴逺近法第六大杼在項後第一椎下兩傍各一寸半陷中風門一名熱府在第二椎下兩傍各一寸半肺輸在第三椎下兩傍各一寸半肺藏卷云對乳引繩度之心輸在第五椎下兩傍各一寸半膈輸在第七椎下兩傍各一寸半肝輸在第九椎下兩傍各一寸半第八卷云第九椎節脊中膽輸在第十椎下兩傍各一寸半脾輸在第十一椎下兩傍各一寸半第八卷云脾輸無定所隨四季月應病即灸藏輸是脾穴胃輸在第十二椎下兩傍各一寸半三膲輸在第十三椎下兩傍各一寸半腎輸在第十四椎下兩傍各一寸半大腸輸在第十六椎下兩傍各一寸半小腸輸在第十八椎下兩傍各一寸半膀胱輸在第十九椎下兩傍各一寸半中膂輸在第二十椎下兩傍各一寸半白環輸在第二十一椎下兩傍各一寸半上窖在第一空腰髁下一寸俠脊兩傍次窖在第二空俠脊陷中中窖在第三空俠脊陷中下窖在第四空俠脊陷中會陽在陰尾骨兩傍脊中第三行十三穴逺近法第七附分在第二椎下附項內亷兩傍各三寸魄戶在第三椎下兩傍各三寸膏肓在第四椎神堂在第五椎下兩傍各三寸譩嘻在肩膊內亷俠第六椎下兩傍各三寸膈關在第七椎下兩傍各三寸魂門在第九椎下兩傍各三寸外臺云十椎下陽綱在第十椎下兩傍各三寸外臺云十一椎意舍在第十一椎下兩傍各三寸外臺云九椎下胃倉在第十二椎下兩傍各三寸肓門在第十三椎下兩傍各三寸志室在第十四椎下兩傍各三寸胞肓在第十九椎下兩傍各三寸秩邉在第二十一椎下兩傍各三寸手少陽三膲經十七穴第八關衝在手小指次指之端去爪甲角如韭葉掖門在小指次指間陷者中中渚在小指次指本節後間陷中陽池在手表腕上陷者中外關在腕後二寸陷中手少陽胳别走心主支溝在腕後三寸兩骨間陷中會宗在腕後三寸空中手少陽郤也三陽胳在臂上大交脉支溝上一寸不刺四瀆在肘前五寸外亷陷中天井在肘後外大骨後一寸兩筋間陷者中屈肘得之清泠泉在肘上三寸伸肘舉臂取之泉亦是淵字消濼在肩下臂外開腋斜肘分下行天宗在秉風後大骨下陷中外臺屬小腸經臑輸俠肩窖後大骨下胛上亷陷下肩外輸在肩胛上亷去脊三寸陷者中肩中輸在肩胛內亷去脊二