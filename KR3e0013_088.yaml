body:
  text: 備急千金要方卷八十八唐孫思邈撰宋林億等校正針灸針灸禁忌第三針禁忌法大寒無刺素問云天寒無刺天温無疑月生無瀉月滿無補月郭空無治新内無刺已刺無内大怒無刺已刺無怒大勞無刺已刺無勞大醉無刺已刺無醉大飽無刺已刺無飽大饑無刺已刺無饑大渇無刺已刺無渇乘車來者臥以休息如食頃乃刺之歩行來者坐以休息如行十里頃乃刺之大驚大恐必定其氣乃刺之刺中心一日死其動為噫刺中肺三日死其動為欬刺中肝五日死其動為語刺中脾十五日死其動為吞刺中腎三日死其動為嚏刺中五藏死日變動出素問刺禁篇又診要經終篇云中心者環死中脾者五日死中腎者七日死中肺者五日死又四時刺逆從篇云中心一日死其動為噫中肝五日死其動為語中肺三日死其動為欬中腎六日死其動為嚏欠中脾十日死其動為吞王冰注云此三論皆岐伯之言有不同者傳之誤也刺中膽一日半死其動吐嘔刺中膈為傷中不過一歳必死刺趺上中大脉血出不止死刺陰股中大脉血出不止死刺面中流脉不幸為盲刺客主人内陷中脉為内漏刺頭中腦户入腦立死刺膝臏出液為跛刺舌下中脉大過血出不止為瘖刺臂太陰脉出血多立死刺足下布胳中脉血不出刺足少陰脉重虚出血為舌難以言刺郄中大脉令人仆脫色刺膺中陷中肺為喘逆仰息刺氣衝中脉血不出為腫鼠鼷刺肘中内陷氣歸之為不屈伸刺脊間中髓為傴刺陰股下三寸内陷令人遺溺刺乳上中乳房為腫根蝕刺腋下脅間内陷令人欬刺缺盆中内陷氣洩令人喘欬逆刺小腹中膀胱溺出令人小腹滿刺手魚腹内陷為腫刺腨腸内陷為腫刺目匡上陷骨中脉為漏為盲刺闗節中液出不得屈伸神庭禁不可刺上闗刺不可深缺盆刺不可深顱息刺不可多出血臍中禁不可刺左角刺不可久留雲門刺不可深經云雲門刺不可深今則都忌不刺學者宜詳悉之五里禁不可刺伏兔禁不可刺按甲乙足陽明經伏兔刺入五分則不當禁三陽絡禁不可刺伏留刺無多見血承筋禁不可刺然谷刺無多見血乳中禁不可刺鳩尾禁不可刺灸禁忌法頭維禁不可灸承光禁不可灸腦戶禁不可灸風府禁不可灸瘖門禁不可灸陰市禁不可灸下闗耳中有干適低無灸耳門耳中有膿及適低無灸人迎禁不可灸陽闗禁不可灸絲竹空灸之不幸使人目小及盲承泣禁不可灸脊中禁不可灸乳中禁不可灸瘈脉禁不可灸石門女子禁不可灸白環輸禁不可灸氣衝灸之不幸不得息泉腋灸之不幸生膿蝕天府禁不可灸經渠禁不可灸伏兔禁不可灸地五㑹禁不可灸鳩尾禁不可灸五臟六腑變化傍通訣第四凡五臟六腑變化無窮散則諸經其事隱没難得具知今纂集相附以為傍通令學者少留意推尋造次可見矣五臟腎水一心火二肝木三肺金四脾土五六腑膀胱小腸膽大腸胃三膲五臟經足少陰手少陰足厥陰手太陰足太陰六腑經足太陽手太陽足少陽手陽明足陽明手少陽五臓脉沈濡洪盛弦長浮短緩大五臓斤兩一斤二兩又云一斤一兩十二兩三毛七孔四斤四兩左三葉右四葉三斤三兩六葉兩耳二斤三兩六腑斤兩九兩二銖二斤十四兩三兩三銖二斤十二兩二斤十四兩六腑丈尺縱廣七寸又云九寸長二丈四尺廣二寸四分三寸三分一大二尺廣六寸大一尺五寸六腑所受九升二合又云九升九合二斗四升一合難經作三合一斗二升三斗五升五臟官後宫列女帝王上將軍又為郎官大尚書又為上將軍諌議大夫六腑官水曹掾監倉吏將軍決曹吏監倉掾内嗇吏五臓輸十四椎五椎九椎三椎十一椎六腑輸十九椎十八椎十椎十六椎十二椎十三椎五臟募京門巨闕期門中府章門六腑募中極闗元日月天樞中管石門五臟脉出涌泉中衝大敦少商隱白此心包絡經心經出少衝流甲乙作留然谷勞宫心經流少府行間魚際大都注大谿大陵心經注神門大衝大泉大白過水泉内闗心經過通里中封列缺公孫行伏留間使心經行靈道中郄經渠商丘入陰谷曲澤心經入少海曲泉尺澤陰陵泉六腑脉出至陰少澤竅陰商陽厲兊闗衝闗衝此三膲經出流通谷前谷俠谿二間内庭腋門注束骨後谿臨泣三間陷谷中渚過京骨腕骨丘墟合谷衝陽陽池行崑崙陽谷陽輔陽谿解谿支溝入委中小海陽陵泉曲池三里天井五竅耳二陰舌口目鼻脣五養骨精血脉筋皮毛肉五液唾汗淚涕涎五聲呻噫言呼哭歌六氣呬吹呼呵嘘嘻五神志精神性又作脉神血魂氣魄意智又作營意五有餘病脹滿笑不止怒喘喝仰息涇溲不利五不足病厥逆憂一作悲恐息利少氣四肢不用六情惡哀怵慮一作惠好好喜一作直喜威怒樂愚貪狼亷貞陰賊寛大公正姦邪八性欲忌友愛慈惠悲氣正公私怨五常智謀禮哲仁肅義乂信聖五事聽聰視明貎恭言從思睿五咎急豫狂僣䝉五音吟咏肆呼諷唱歌五聲羽四十八絲徵五十四絲角六十四絲商七十二絲宫八十五色黑赤青白黃五味鹹苦酸辛甘五臭腐焦羶臊腥香五宜子來扶母酸甘苦鹹辛五惡味之惡甘鹹辛苦酸五惡氣之惡燥熱風寒濕五行一六二七三八四九五十五行水火木金土五時冬夏春秋季夏五形外臺云外應五行之形内法五形之象曲兊直屈圓五畜豕外臺云豕鼠羊外臺云蛇馬鷄外臺云虎兔犬外臺云猴鷄牛外臺云龍羊犬牛五穀大豆麥麻稻黄黍稷五菓栗杏李桃棗五菜藿薤韭蔥葵論曰假令人腎心肝肺脾為臓則膀胱小腸膽大腸胃為腑足少陰為腎經足太陽為膀胱經下至五藏五菓五菜皆爾觸類長之他皆倣此外臺續添二十三條本非千金之舊今更不附入備急千金要方卷八十八
