body:
  text: 備急千金要方卷十六唐孫思邈撰宋林億等校正七竅病方鼻病第二論法方灸治鼻塞腦冷清涕出方通草辛夷各半兩細辛甘遂一作甘草桂心芎藭附子各一兩右七味為末蜜丸綿裹內鼻中密封塞勿令氣泄丸如大麻子稍加微覺小痛搗薑為丸即愈用白狗膽汁和之更佳治鼻塞常有清涕出方細辛蜀椒乾薑芎藭吳茱萸附子各十八銖桂心一兩皂莢屑半兩豬膏一升右九味㕮咀以綿裹苦酒漬一宿取豬膏煎以附子色黃為度去滓綿裹內鼻孔中并摩鼻上治涕出不止方灸鼻兩孔與柱齊七壯香膏治鼻塞窒方白芷芎藭通草各十八銖當歸細辛莽草小品并千金翼以作薰草辛夷各十三銖右七味㕮咀以苦酒漬一宿以不中水豬肪一升煎三上三下以白芷色黃膏成去滓綿沾如棗核大內鼻中日三小品加桂心十八銖香膏治鼻不利方當歸薰草古今録驗用木香通草細辛㽔仁各十八銖芎藭白芷各半兩羊髓四兩豬脂亦得右八味㕮咀以微火合煎三上三下白芷色黃膏成去滓取如小豆大內鼻中日二先患熱後鼻中生赤爛瘡者以黃芩梔子代當歸細辛治鼻窒氣息不通方小薊一把㕮咀以水三升煮取一升分二服又方瓜蒂末少許吹鼻中亦可綿裹塞鼻中又方槐葉五升蔥白切一升䜴一合右三味以水五升煮取三升分溫三服治鼻塞多年不聞香臭清水出不止方取當道車輾過蒺藜一把搗以水三升煎取熟先仰卧使人滿口含取一合汁灌鼻中使入不過再度上嚏必出一兩箇息肉似赤蛹一方有黃連等分同煎治鼻齆方通草細辛附子右三味各等分為末以蜜和綿裹少許內鼻中又方甘遂通草細辛附子各等分右四味為末以白雄犬膽和為丸如棗核大綿裹內鼻中辛熱涕出四五升瘥亦治息肉又方炙皂莢為末如小豆大以竹管吹鼻中又方乾薑末蜜和塞鼻中吹亦佳又方鐵鎖磨石取末以豬脂和綿裹內之經日肉出瘥又方以馬新屎汁仰頭含滿口灌鼻中又方伏面臨牀前以新汲冷水淋玉枕上後以瓜蒂末綿裹塞之治齆鼻有息肉不聞香臭方瓜丁細辛右二味各等分為末以綿裹如豆大許塞鼻中須臾即通通草散治鼻中息肉不通利方通草半兩礬石真珠各一兩右三味為末撚綿如棗核取藥如小豆著綿頭內鼻中日三易之一方有桂心細辛各一兩同前搗末和使之治鼽鼻鼻中息肉不得息方礬石藜蘆各六銖瓜蒂二七枚附子十二銖右四味各搗篩合和以小竹管吹藥如小豆許于鼻孔中以綿絮塞鼻中日再以愈為度古今録驗加葶藶半兩治鼻中息肉方炙蝟皮為末綿裹塞之三日又方細篩釡底墨水服之三五日治鼻中息肉不聞香臭方燒礬石末以面脂和綿裹著鼻中數日息肉隨藥消落又方末瓜丁如小豆許吹入鼻中必消如此三四度良又方細辛釡底墨右二味為末水和服方寸匕又方綿裹瓜蒂末塞鼻中羊肺散治鼻中息肉梁起方羊肺一具乾之白术四兩蓯蓉通草乾薑芎藭各二兩右六味為末食後以米飲服五分匕加至方寸匕又方通草十二銖真珠六銖礬石細辛各一兩右四味為末撚綿如棗核沾散如小豆并綿內鼻中日再三治鼻中息肉方灸上星二百壯穴在直鼻入髮際一寸治鼻中生瘡方燒祀竈飯末以傅鼻中又方燒故馬絆末傅鼻中又方偷孝子帽以拭之又方烏牛耳垢傅之又方以牛鼻津傅之又方搗杏仁乳傅之亦燒核壓取油傅之又方燒牛狗骨灰以臘月豬脂和傅之治疳蟲蝕鼻生瘡方燒銅筯頭以酢淬之數過取酢傅之又以人屎灰塗之瘥治鼻痛方常以油塗鼻內外酥亦得治卒食物從鼻中縮入腦中介介痛不出方牛脂若羊脂如指頭大內鼻中以鼻吸取脂須臾脂消則物逐脂俱出也論曰鼻頭微白者亡血設令徴赤非時者死病人色白者皆亡血也凡時行衄不宜斷之如一二升已上恐多者可斷即以龍骨末吹之九竅出血者皆用吹之治大便出血及口鼻皆血出血上心胸氣急此是勞熱所致方生地黃八兩蒲黃一升地骨皮五兩黃芩芍藥生竹筎各三兩右六味㕮咀以水八升煮取二升七合分溫三服凡吐血衄血溺血皆藏氣虛隔氣傷或起驚悸治之之方生竹皮一升芍藥黃芩各二兩芎藭當歸桂心甘草各一兩右七味㕮咀以水一斗煮竹皮減三升下藥煎取二升分三服治衄血方生地黃六兩芎藭一兩細辛六銖伏龍肝二枚如雞子大桂心白芷乾薑芍藥甘草吳茱萸各三兩右十味㕮咀以水三升酒七升煮取三升分三服生地黃湯治鼻衄方生地黃八兩黃芩一兩阿膠甘草各二兩柏葉一把右五味㕮咀以水七升煮取三升去滓內膠煎取二升半分三服又方生地黃三斤切阿膠二兩蒲黃六合右三味以水五升煮取三升分三服又方地黃汁五合煮取四合空腹服之忌酒灸肉且服粳米飲又方飲小薊汁良又方以冷水淨漱口含水以蘆管吹二孔中又方取亂髮五兩燒作灰以管吹鼻中棗核大不止益吹之以血斷止并水服方寸匕日三甚者夜二巳困不識人者服亦佳又方取人屎尖燒灰水服并吹少許鼻中止又方五月五日取人屎燒作灰冷水服五分匕佳又方以膠帖鼻頭上至頂及髮際三寸止又方新馬屎汁灌鼻中及飲之良又方以濕布薄胸上善又方淳酢和土塗隂囊上乾易之又方韭根蔥根取汁懸頭著一棗大內鼻中少時更著兩三度瘥蔥白搗汁亦得治鼻中出血不止方地黃乾者梔子甘草各等分右三味治下篩酒服方寸匕日三如鼻疼者加豉一合鼻有風熱者以蔥涕和服如梧子五丸又方搗楮葉汁飲三升大良灸方張弓令弦向上病兒仰卧枕弦放四體如常卧法衄時癢癢便灸足大指節橫理三毛中十壯劇者百壯衄不止灸之并治隂卵腫又灸風府一冗四壯不止又灸又灸涌泉二冗各百壯備急千金要方卷十六
