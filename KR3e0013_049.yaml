body:
  text: 備急千金要方卷四十九唐孫思邈撰宋林億等校正脾臓方熱痢第七論方脉證炙法論曰余立身以來三遭熱痢一經冷痢皆日夜百餘行乃至移床就厠其困篤如此但率意自治者㝷手皆愈乃知此疾天下易治但中性之徒率情驕倨良藥苦口不能克巳早餌朝遇暮過望其自瘥疾勢日増胃氣漸弱心力俱微食飲與藥皆不能進既不時愈便稱痢病難治斯皆自誤也學者須深達斯旨然此病隨宜服一物皆使得瘥惟須力意苦已服食以瘥為限則無不愈也又大須慎口味重者後百日次者一月日所以常哀驕恣者不能自慎興言於此以為至慨矣古今痢方千萬首不可具載此中但撮其效者七八而已雖然𢎞之在人也何則陟釐丸烏梅丸松皮散等暴痢服之何有不瘥其温脾湯建脾丸方出下冷痢篇久下得之焉能不愈大凡痢有四種謂冷熱疳蠱冷則白熱則赤疳則赤白相雜無復節度多睡眼澀蠱則純痢瘀血熱則多益黄連去其乾薑冷則加以熱藥疳則以藥吹灌下部蠱毒則以蠱法治之藥既主對相當痢者復自勉勵服餌焉有不愈者也凡服止痢藥初服皆劇愚人不解即止其藥不服此特不可但使藥與病源的相主對雖劇但服不過再三服漸漸自知惟非其主對者夲勿服也凡痢病通忌生冷酢滑猪雞魚油乳酪酥乾脯醤粉鹹所食諸食皆須大熟爛為佳亦不得傷飽此将息之大經也若将息失所聖人不救也下利脉滑而數有宿食當下之下利脉遲而滑者實也利為未止急下之下利脉反滑當有所去下乃愈下利不欲食者有宿食當下之下利而腹痛滿為寒實當下之下利腹中堅者當下之下利而讝語者腹内有燥屎宜下之下利三部皆平一作浮按其心下堅者急下之下利已瘥至其年月日時復發者此為下不盡更下之愈風寒下者不可下下之後心下堅痛脉遲一作浮此為寒但當温之脉沈𦂳下之亦然脉大浮弦下之當已下利脉浮大此為虚以强下之故也設脉浮革者因爾腸鳴當温之下利脉遲𦂳為痛未欲止當温之得冷者滿而便腸垢下利身軀疼痛急救裏諸温之屬可與理中四逆附子湯熱藥軰下利大孔痛者當温暖之下利腹脹滿身體疼痛者先温其裏乃攻其表下利清榖不可攻其表汗出必脹滿下利氣者當利其小便下利脉反浮數尺中自濇其人必清膿血下利脉數而渴者令自愈設不瘥必清膿血有熱故也下利脉沈弦者下重其脉大者為未止脉微弱數者為欲自止雖發熱不死下利脉沈而遲其人面少赤身有微熱下利清榖必鬱冐汗出而解病人必微厥所以然者面戴陽下虚故也下利有微熱而渴脉弱者令自愈下利脉素有微熱汗出令自愈設脉𦂳為未解下利脉反弦發熱身汗者自愈下利脉大浮弦下當已下利舌黄燥而不渴胷中實下不止者死下利後脉絶手足厥冷晬時脉還手足温者生不還不温者死下利手足厥冷無脉者灸之不温若脉不還反微喘者死少隂負趺陽者為順凡六腑氣絶於外者手足寒上氣脚縮五臓氣絶於内者下不自禁下甚者手足不仁也細㝷取之萬不失一下病體略例如此耳素問曰春傷於風夏為膿血凡下多滯下也夏傷於風秋必洞泄秋多下水也患是冷也夫積冷積熱及水榖實而下者以大黄湯下之强人勿過兩劑皆消息五六日更進一劑其補澀湯不效者三兩日可進一劑陟釐圓治百病下痢及傷寒身熱頭痛目赤四肢煩疼不解恊熱下痢或醫已吐下之腹内虚煩欲得冷飲飲不能消腹中急痛温食則吐乍熱乍冷状如温瘧或小便不利氣滿嘔逆下痢不止方水中陟釐五兩紫石英三兩厚朴一兩漢中木防己六兩隴西當歸四兩黄連二兩三歳醇苦酒五升上好豉三升右八味皆取真新者以苦酒二升漬防己極令潤出之留苦酒置以利刀切防己厚令一分使厚薄悉等以板瓦覆著炭火上以厚紙藉瓦上布成切防己著紙上訖從頭依次反周而復始令色槁燥復漬向餘苦酒中更出著瓦上熬之如此盡苦酒止勿令火猛徐徐熬令極燥各𢷬下篩畢都合𢷬千杵以餘三升苦酒漬豉一宿明旦以瓦盆盛之以一盆覆之蒸五升土下須土氣通流熟出之於盆中研豉以新布絞取濃汁如棗膏法以和藥𢷬三千杵頓為丸皆如水中雞頭子大分著數囊中懸令隂乾取燥及更盛著亟以蠟蜜封其際勿令見風塵此藥以三丸為一劑平旦以井花水服一劑晝服一劑暮服一劑皆以水服之初服寧少食當餔食水飱欲服藥若食飲消腹中調和者日可一服若已瘥者二三日可一服消息以意若病重藥力未行者但益服之日可四五劑或時下不止者當復更增令腹中有藥力飲食消是其效也新服藥未安調當水飱助藥力心中了然然後可作羮臛但當冷食之耳若有時不喜冷食者正是藥力盡耳復益服藥至一宿許則復欲進冷也若欲不復藥者但稍温食藥力自盡矣服藥不必强多飲水也自隨體調耳久下虚服之如法禁熱食生魚猪肉蒜生菜酒緣酒發藥力令病者煩熱也又禁辛物及諸肥膩難消物皆勿食也若有風病加防風一兩人虚羸可加石斛一兩若宿有下利腸胃損弱者可加太一餘糧二兩半取石中黄軟香者若婦人産後疾加石硫黄二兩小便黄赤不利加蒲黄一兩依方消息之無不得效也胡洽云舊有五石赤石脂白石英鍾乳礬石并禹餘糧各四兩常以二月合之下痢熱諸治不瘥方烏梅一升黄連一斤金色者右二味為末蜜和服如梧子二十丸日三夜二神妙治積久二三十年常下痢神方赤松皮去上蒼皮切一斗為散麫粥和一升服之日三服瘥不過服一斗永瘥三十年痢服之百日瘥苦參橘皮圓治熱毒痢方苦參橘皮獨活阿膠藍青黄連鬼􅍫一作鬼箭羽黄蘗甘草右九味等分為末以蜜烊膠和併手丸之如梧子候乾飲服十丸日三後稍加卒下注痢者大良治諸熱毒下黄汁赤如爛血滯如魚腦腹痛壮熱方黄蘗黄芩升麻石榴皮各六分艾葉三分白頭翁寄生當歸牡蠣犀角甘草各一兩黄連二兩右十二味㕮咀以水六升煮取三升分三服龍骨圓治下血痢腹痛方龍骨龍膽羚羊角當歸附子乾薑黄連各三十銖赤石脂礬石各一兩半犀角甘草熟艾各十八銖右十二味為末蜜和丸如小豆先食服十五丸日三加至二十丸又方牛角䚡當歸龍骨乾薑熟艾各三兩附子黄蘗赤石脂芎藭阿膠厚朴甘草橘皮石榴皮芍藥各二兩大棗二十枚黄連五合升麻一兩半蜀椒一兩右十九味㕮咀以水一斗三升煮取四升去滓内牛角䚡末阿膠消以綿絞去滓分七服日四夜三千金翼無橘皮治血痢方蒲黄三合乾地黄桑耳甘草芒硝茯苓人參栢葉阿膠艾葉生薑各二兩禹餘糧黄連各一兩赤石脂五分右十四味㕮咀以水一斗煮取四升分五服温神效治下雜血方乾藍犀角地榆各二兩蜜二合右四味㕮咀以水五升煮取一升半去滓下蜜煎取五合分三服此治熱毒蠱妙治熱毒下黒血五内絞切痛日夜百行氣絶欲死方黄連一升龍骨白术各二兩阿膠乾薑當歸赤石脂各三兩附子一兩右八味㕮咀以水一斗煮取五升分五服余以貞觀三年七月十二日忽得此熱毒痢至十五日命将欲絶處此方藥入口即定治下血日夜七八十行方黄連黄蘗各半兩右二味㕮咀淳酢三升煮取一升半分再服白頭翁湯治赤滯下血連月不瘥方白頭翁厚朴阿膠黄連秦皮附子黄蘗茯苓芍藥各二兩乾薑當歸赤石脂甘草龍骨各三兩大棗三十枚粳米一升右十六味㕮咀以水一斗二升先煮米令熟出米内藥煮取三升分四服治下赤連年方地榆鼠尾草各一升右二味㕮咀以水二升煮取一升分二服如不止取屋塵水漬去滓一升分二服古今録騐方云服屋塵汁一小盃又方秦皮如無用槲皮代之鼠尾草薔薇根右三味等分㕮咀以水淹煎去滓銅器重釡煎成丸如梧子大服五六丸日三稍增瘥止亦可濃汁服半升治大熱毒純血痢不可瘥者方黄連六兩㕮咀以水七升煮取二升半夜露著星月下旦起空腹頓服之臥将息即止不瘥加黄芩二兩更作服之仍不瘥者以疳痢法治之治熱痢水榖方黄連阿膠各二兩黄蘗一兩烏梅四十枚梔子三十枚右五味㕮咀以水五升煮取二升半分三服亦治䘌神良治下痢絞痛腸滑不可瘥方黄連六兩阿膠鼠尾草當歸乾薑各三兩右五味㕮咀若大冷白多以清酒一斗煮取三升分三服若熱及不痛者去乾薑當歸以水煮之茯苓湯治困下空竭欲死滯下膿血日數十行羸篤垂死老少並宜服方茯苓黄蘗黄連龍骨人參乾薑黄芩桂心芍藥當歸梔子仁甘草各半兩赤石脂一兩大棗十二枚右十四味㕮咀以水五升煮取二升分再服不瘥滿三劑此方主風虚冷痢最佳治冷熱不調或水或膿或五色血者方酢石榴五枚合殻子𢷬絞取二升汁服五合瘥止温脾湯治下久赤白連年不止及霍亂脾胃冷實不消方大黄四兩人參甘草乾薑各二兩附子一枚大者右五味㕮咀以水八升煮取二升半分三服臨熟下大黄與後温脾湯小異須大轉㵼者當用此方神效黄連湯治赤白痢方黄連黄蘗乾薑石榴皮阿膠各三兩當歸二兩甘草一兩右七味㕮咀以水七升煮取三升分三服女萎圓治熱病時氣下赤白痢遂成䘌方亦名雲實丸女萎藜蘆各三分烏頭桂心各四分黄連雲實各二分代赭一分右七味為末蜜丸如梧子大服二丸大下痢宿勿食清旦以冷水服之勿飲食至日中過後乃飲食若得藥力明旦更服如前亦可長服虚羸晝夜百行膿血亦瘥聖湯治下赤白痢大孔蟲生悉皆瘥方鼠尾草二兩豉一升梔子仁生薑各六兩桃皮一握右五味㕮咀以水七升煮取二升半分三服一夲單用桃皮以酒煮服之治赤白滯下方清酒五合成煎猪膏三合右二味緩火煎十沸適寒温頓服之取瘥止又方酒四升煮錢四十文取二升分三服又方亂髪雞子大燒末水服不過三服灸法泄痢食不消不作肌膚灸脾輸隨年壮泄注五痢便膿血重下腹痛灸小腸輸百壮泄痢久下失氣勞冷灸下腰百壮三報穴在八魁正中央脊骨上灸數多尤佳三宗骨是忌針泄痢不禁小腹絞痛灸丹田百壮三報穴在臍下二寸針入五分泄痢不嗜食雖食不消灸長谷五十壮三報穴在俠臍相去五寸一名循際泄痢赤白漏灸足太隂五十壮三報久泄痢百治不瘥灸足陽明下一寸髙骨上䧟中去大指歧三寸隨年壮又屈竹量正當兩胯脊上㸃訖下量一寸㸃兩傍各一寸復下量一寸當脊上合三處一灸三十壮灸百壮以上下切痢皆斷亦治濕􅉶冷脊上當胯㸃處不灸又灸臍中稍稍二三百壮又灸關元三百壮十日灸并治冷痢腹痛在臍下三寸赤白下灸窮骨以灸數多為佳備急千金要方卷四十九
