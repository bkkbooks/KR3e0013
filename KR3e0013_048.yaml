  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0013_WYG_048-1a, image: WYG0735/WYG0735-0478a.png}
body:
  text: 備急千金要方卷四十八唐孫思邈撰宋林億等校正脾臟方肉虛實第五論方論曰夫肉虛者坐不安席身危變動肉實者坐安不動喘氣肉虛實之應主於脾若其腑臟有病從肉生熱則應臟寒則應腑五加酒治肉虛坐不安席好動主脾病寒氣所傷方五加皮枸杞皮各二升乾地黃丹參各八兩石膏一方作石床杜仲各一斤乾薑四兩附子三兩右八味㕮咀以清酒二斗漬三宿一服七合日再半夏湯治肉實坐安席不能動作喘氣主脾病熱氣所加關格除喘方半夏宿薑各八兩杏仁五兩細辛橘皮各四兩麻黃一兩石膏七兩射干二兩右八味㕮咀以水九升煮取三升分三服須利下加芒硝三兩閉澀第六論法方灸論曰有人因時疾瘥後得閉塞不通遂致天命大不可輕之所以備述雖非死病凡人不明藥餌者拱手待斃深可痛哉單復諸方以虞倉卒耳凡大便不通皆用滑膩之物及冷水並通也凡候面黃者即知大便難麻子仁圓趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相摶大便則堅其脾為約脾約者其人大便堅小便利而不渴也麻子仁二升枳實芍藥各八兩杏仁一升大黃厚朴各一斤右六味為末蜜丸如梧子飲服五丸日三漸加至十丸肘後外臺無杏仁治關格大便不通方芒硝烏梅桑白皮各五兩芍藥杏仁各四兩麻仁三兩大黃八兩右七味㕮咀以水七升煮取三升分三服一本無烏梅加枳實乾地黃各二兩治大便閉塞不通神方豬羊膽無在以筒灌三合許令深入即出矣出不盡須臾更灌一方加冬葵子汁和之亦妙又椒豉湯五升和豬膏三合灌之佳臨時易可得即用之又煎蜜成煎如人指大深內榖道佳又無灰濃酒半升鹽三錢七錬成如上法三黃湯治下焦熱結不得大便方大黃三兩黃芩二兩梔子二十枚甘草一兩右四味㕮咀以水五升煮取一升八合分三服若大閉加芒硝二兩五柔圓治閉澀及虛損不足飲食不生肌膚三焦不調和榮衛利腑臟補三焦方大黃一升蒸三斗米下前胡二兩半夏蓯蓉芍藥茯苓當歸葶藶細辛各一兩右九味為末蜜和合搗萬杵為丸梧子大食後服十五丸後稍增之日再崔氏云令人喜飯消榖益氣有憂者加松實半兩菴䕡半兩服之緩中不如意便服之又有黃芩一兩大五柔圓主臟氣不調大便難通和榮衛利九竅消榖益氣方大黃芍藥枳實蓯蓉葶藶甘草黃芩牛膝各二兩桃仁一百枚杏仁四十枚右十味為末蜜和丸如梧子一服三丸日三加至二十丸酒下濡臟湯主大便不通六七日腹中有燥屎寒熱煩迫短氣汗出脹滿方生葛根豬膏各二升大黃一兩右三味㕮咀以水七升煮取五升去滓內膏煎取三升澄清強人頓服羸人再服亦治大小便不通治大便不通方大戟一斤大豆五升商陸牛膝各三斤右四味㕮咀以水五升煮取二升以大豆五升煎令汁盡至豆乾初服三枚以通為度又方蜜和胡燕屎內大孔中即通又方水四升蜜一升合煮熟冷灌下部中一食頃即通又方鹽半合蜜三合合煎如餳出之著冷水中丸如檳榔形如指許大深內下部中立通治大便難方單用豉清醬清羊酪土瓜根汁灌之立通又方以醬清漬烏梅灌下部中又方桑根白皮榆根白皮各一把右二味㕮咀以水三升煮取一升半分三服又方桃皮三升水五升煮取一升頓服又方水一升煮羊蹄根一把取半升頓服又方常煮麻子取汁飲又方常服蜜煎五合又方豬脂和陳葵子末為丸如梧子每服十丸通即止又方水服桃花方寸匕無桃花白皮亦得又方常服車前子及葉並良又方搗葵根汁生服又方好膠三寸蔥白一把右二味以水四升煮取一升半頓服之即下又方葵子牛酥各一升豬脂用亦得右二味以水四升煮葵子取一升內酥煮一沸待冷分作二服又方葵子汁和乳汁等分服之立出又方醬清三升麻油二升蔥白三寸右三味合煮令黑去滓待冷頓服之一方不用醬清芒硝圓治脹滿不通方芒硝芍藥各一兩半杏仁大黃各二兩黃芩一兩六銖右五味為末蜜丸如梧子飲服十五丸加至二十丸取通利為度日三又方通草朴硝各四兩郁李仁黃芩瞿麥各三兩車前子五合一方六兩一方二升右六味㕮咀以水八升煮取二升半分三服一方用絹袋盛煮頓服二升又方獨頭蒜燒熟去皮綿褁內下部中氣立通又削薑一鹽導之及乾薑鹽杏仁搗丸導之並佳治脹滿閉不下方吳茱茰一升乾薑大黃當歸桂心芍藥甘草芎藭各二兩人參細辛各一兩桃白皮一把真珠半兩雄黃十八銖右十三味㕮咀以水一斗煮取三升去滓內雄黃真珠末酒一升微火煮三沸服一升得下即止走馬湯主一切卒中惡心痛腹脹大便不通方見心腹痛篇巴豆圓主寒癖宿食久飲飽不消大閉不通巴豆仁一升清酒五升煮三日三夕碎大熟合酒微火煎令可丸如胡豆欲取吐下者服二丸練中圓主宿食不消大便難方肘後名承氣丸大黃八兩葶藶杏仁芒硝各四兩右四味為末蜜丸如梧子大食後服七丸日三後稍加灸法大便難灸第七椎兩傍各一寸七壯又灸承筋二穴各三壯在腨中央陷內大便不通灸俠玉泉相去各二寸名曰腸遺隨年壯一云二寸半又灸大敦四壯在足大指聚毛中大便閉塞氣結心堅滿灸石門百壯後閉不通灸足大都隨年壯治老人小兒大便失禁灸兩腳大指去甲一寸三壯又灸大指竒間各三壯治大小便不通方葵子末一升青竹葉一把右二味以水二升煮五沸頓服又方葵子一升榆皮切一升右二味以水五升煮取二升分三服又方葵子一升以水三升煮取一升去滓內豬脂一升空心分二服又方甑帶煮取汁和蒲黃方寸匕日三服又方豬脂一斤以水二升煮三沸飲汗立通治大小便不利方葵子二升消石二兩右二味以水五升煮取二升分二服治小兒大小便不通方搗白花胡葵子末煮汁服之又方末雞屎白服一錢七灸法大小便不利欲作腹痛灸榮衛四穴百壯穴在背脊四面各一寸腹熱閉時大小便難腰痛連胸灸團岡百壯穴在小腸輸下二寸橫三間甘灸之大小便不通灸臍下一寸三壯又灸橫文百壯大小便不利灸八窖音遼百壯穴在腰目下三寸俠脊相去四寸兩邊各四穴計八穴故名八窖小兒大小便不通灸口兩吻各一壯小便不利大便數注灸屈骨端五十壯小便不利大便注泄灸天樞百壯穴在俠臍相去三寸魄魄之舍不可針大法在臍傍一寸合臍相去可三寸也備急千金要方卷四十八
