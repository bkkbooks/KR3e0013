body:
  text: 備急千金要方卷六十六唐孫思邈撰宋林億等校正丁腫方癰疽第二脉法論灸方禁法脉數身無熱即内有癰諸浮數脉當發熱而反洗洗惡寒若有痛處當結為癰脉微而遲必發熱脉弱而數此為振寒當發癰腫脉浮而數身體無熱其形黙黙胃中微燥不知痛處其人當發癰腫脉滑而數滑則為實數則為熱滑即為榮數即為衞榮衞相逢即結為癰熱之所過即為癰膿身體有痛處時時苦有瘡問曰寸口脉微而澀法當亡血若汗出設不汗者當云何答曰若身有瘡被刀器所傷亡血故也趺陽脉滑而數法當下重少隂脉滑而數婦人隂中生瘡論曰夫癰疽初發至微人皆不以為急此實奇患惟宜速治稍遲緩乃即病成以此致禍者不一但發背外皮薄為癰外皮厚為疽宜急治之凡癰疽始發或似小癤或復大痛或復小痛或發如米粒大白膿子此皆微候宜善察之見有小異即須大驚忙急須攻治及斷口味速服諸湯下去熱毒若無醫藥處即灸當頭百壯其大重者灸四面及中央二三百壯數灸不必多也復薄以冷藥種種救療必速瘥也凡用藥帖法皆當瘡頭處其藥開孔令洩熱氣亦當頭以火針針入四分即瘥凡癰疽瘤石癰結筋瘰癧皆不可就針角針角者少有不及禍也凡癰無問大小已覺即取膠如手掌大暖水浸令軟納納然稱大小當頭上開一孔如錢孔大帖腫上令相當須臾乾急若未有膿者即定不長已作膿者當自出若以鋒針當孔上刺至膿大好至瘥乃洗去膠凡腫根廣一寸已下名癤一寸已上名小癰如豆粒大者名皰子皆始作急服五香連翹湯下之數劑取瘥乃止凡癰高而光大者不大熱其肉正平無尖而紫者不須攻之但以竹葉黄耆湯申其氣耳肉正平為無膿也癰卒痛以八味黄耆散𫝊之大癰七日小癰五日其自有堅强者寧生破發乳若熱手不可得近者先内服王不留行散外摩發背膏若背生破無苦在乳宜令極熟候手按之隨手即起者瘡熟也須針之針法要得著膿以意消息胷背不過一寸斟量不得膿即與食肉膏散著兊頭内癰口中如體氣熱歇即服木占斯散五日後癰欲著痂者即服排膿内塞散凡癰破之後便綿惙欲死内寒外熱文闕腫自有似癰而非者當以手按腫上無所連乃是風毒耳勿針之宜服升麻湯外摩膏破癰口當令上留三分近下一分針之務令極熱熱便不痛破後敗壞不差者作猪蹄湯洗之日二度夏用二日冬用六七日用湯半劑亦可夫癰壞後有惡肉者宜猪蹄湯洗去穢次𫝊食肉膏散惡肉盡後𫝊生肉膏散及摩四邉令好肉速生當斷絶房室忌風冷勿自勞煩待筋脉平復乃可任意耳縁新肉易傷傷則裏潰潰則重發發即難救慎之慎之白痂最忌凡諸暴腫一一不同無問近逺皆服五香連翹湯刺去血小豆末𫝊之其間數數以針刺去血若失療已潰爛者猶服五香湯及漏蘆湯下之隨熱多少依方用之外以升麻湯榻洗熨之方見丹毒篇摩升麻膏方見丹毒篇若生息肉者以白䕡茹散𫝊之青黑肉去盡即停止好肉生𫝊升麻膏如肌不生𫝊一物黄耆散若𫝊白䕡茹青黒惡肉不盡者可以㯃頭䕡茹散半錢和白䕡茹散三錢稍稍𫝊之其散各取當色單𢷬下篩直爾成散用之此數法集驗用治緩疽或身中忽有痛處如遭打撲之狀名曰氣痛痛不可忍遊走不住發作有時痛則小熱痛定則寒此皆由久時受温氣至春暴寒風來折之不成温病乃作氣痛宜先服五香連翹湯摩丹參膏又以白酒煎楊栁皮及暖熨之有赤氣㸃㸃者即刺出血也其五香連翹湯及小竹瀝湯可服數劑勿以一劑未瘥便住藥以謂無效即禍至矣中間將白薇散佳又有氣腫痛其狀如癰腫無頭虚腫色不變但皮急痛不得手近亦須服此五香湯次白針寫之次與蒺藜散𫝊之胷中痛短氣者當入闇室中以手指捺左眼視若見光者胷中有結癰若不見光者是瘭疽内發出也經云氣宿於經絡中血氣俱澀不行擁結為癰疽也不言熱之所作其後成癰又陽氣湊集寒化為熱熱盛則肉腐為膿也由人體有熱被寒冷搏之而脉凝結不行熱氣擁結成癰疽方有灸法亦有温治法以其中冷未成熱之時其用冷藥帖薄之治熱已成以消熱令不成膿也赤色腫有尖頭者藜蘆膏𫝊之一云醋和蚌蛤灰塗乾則易之余平生數病癰疽得效者皆即記之考其病源多是藥氣所作或有上世服石遂令子孫多有此疾食中尤不宜食麪及酒蒜及慎温牀厚被能慎之者可得終身無他此皆躬自驗之故特論之也五香連翹湯治一切惡核瘰癧癰疽惡腫患背方青木香沈香丁香薰陸香麝香射干升麻獨活寄生連翹通草各二兩大黃三兩右十二味㕮咀以水九升煑取四升内竹瀝二升更煑取三升分三服取快利肘後方有紫葛甘草無通草治惡肉惡脉惡核風結腫氣痛要籍喻義有黄耆甘草芒硝各六分千金翼云未瘥中間常服佳與小兒篇方相重小有異處黄耆竹葉湯治癰疽發背方黄耆甘草黄芩芍藥麥門冬各三兩當歸人參石膏芎藭半夏各二兩生薑五兩生地黄八兩大棗三十枝淡竹葉一握右十四味㕮咀以水一斗二升先煑竹葉取一斗去滓内藥煑取三升分四服相去如行二十里久日三夜一八味黄耆散方黄耆芎藭大黄黄連芍藥莽草黄芩梔子仁各等分右八味治下篩雞子白和如泥塗故帛上隨腫大小𫝊之乾則易若已開口封瘡上須開頭令歇氣王不留行散治癰腫不能潰困苦無聊賴方王不留行子三合千金翼作一升龍骨當歸各二兩野葛皮半分乾薑桂心各一兩栝蔞根六分右七味治下篩食後温酒服方寸匕日三以四肢習習為度不知稍加之令人安穩不覺膿自潰即著瘡痂平復神良此浩仲堪方隋濟闍黎所名為神散癰腫即消千金翼云治癰疽及諸雜腫已潰皆服之内補散治癰疽發背婦人乳癰諸癤未潰者便消不消者令速潰疾愈方木占斯人參乾薑一云乾地黄桂心細辛厚朴敗醬防風栝蔞根桔梗甘草各一兩右十一味治下篩酒服方寸匕藥入咽覺流入瘡中若癰疽灸之不能發壞者可服之未壞者去敗醬已發膿者内敗醬服藥日七八服夜二三服以多為善若病在下當膿血出此為腸癰也諸病在裏惟服此藥即覺其力痛者即不痛長服治諸瘡及疽痔瘡已潰便早愈醫人不知用此藥發背無有治者若始覺背上有不好處而渇者即勤服之若藥力行覺渇止便消散若雖已壞但日夜服之勿住藥腫自消散不覺去時欲長服者當去敗醬婦人乳癰宜速服之一方無桂心一名木占斯散主癰腫堅結若已壞者速愈未壞者使不成癰便消張文仲無桂心劉涓子云此是華陀方排膿内塞散治大瘡熱退膿血不止瘡中肉虚疼痛方防風茯苓白芷桔梗逺志甘草人參芎藭當歸黄耆各一兩厚朴二兩桂心二分附子二枚赤小豆五合酒浸熬之右十四味治下篩酒服方寸匕日三夜一猪蹄湯治癰疽發背方猪蹄一具治如食法黄耆黄連芍藥各三兩黄芩二兩薔薇根狼牙根各八兩右七味㕮咀以水三斗煑猪蹄令熟澄清取二斗下諸藥煑取一斗去滓洗瘡一食頃以帛拭乾帖生肉膏日一如痛加當歸甘草各二兩又方治癰疽發十指或起膀胱及發背後生惡肉者方猪蹄一具治如食法當歸大黄芎藭芍藥黄芩獨活莽草各一兩右八味㕮咀以水三斗煮猪蹄取八升去之内諸藥煮取四升去滓漬瘡兩食頃洗之拭令乾𫝊麝香膏麝香膏治癰疽及發背諸惡瘡去惡肉方麝香䕡茹一作真珠雄黄礬石各一兩右四味治下篩以猪膏調如泥塗之惡肉盡止却𫝊生肉膏食惡肉膏方大黄芎藭莽草真珠雌黄附子生用各一兩白歛礬石黄芩䕡茹各二兩雄黄半兩右十一味㕮咀以猪脂一升半煎五六沸去滓内䕡茹礬石末攪調𫝊之瘡中惡肉盡乃止治癰腫惡肉不盡者方蒴藋灰一作雚灰石灰肘後作白炭灰右二味各淋取汁合煎如膏膏成𫝊之食惡肉亦去黑子此藥過十日不中用又方生地黄汁煎如膠作餅子帖之日四五度食惡肉散方硫黄丹砂麝香㯃頭䕡茹馬齒礬雄黄雌黄白礬各二分右八味治下篩以粉之吮食惡肉千金翼薄帖篇無白礬雌黄有藜蘆云亦膏和𫝊之又處療癰疽篇無丹砂廣濟方療癰腫膿潰瘡中有紫肉破不消以此散兊或内蝕之又方䕡茹礬石雄黄硫黄各二分右四味治下篩内瘡中惡肉盡即止不得過好肉也生肉膏治癰疽發背壞後生肉方生地黄一斤辛夷二兩獨活當歸大黄黄耆芎藭白芷芍藥黄芩續斷各一兩薤白五兩右十二味㕮咀以臘月猪脂四升煎取白芷黄下之去滓𫝊之立瘥又方甘草當歸白芷蓯蓉蜀椒細辛各二兩烏喙六分生用蛇銜一兩薤白二十莖乾地黄三兩右十味㕮咀以醋半升漬一宿次日猪膏三斤煎令沸三上三下膏成塗之立瘥蛇銜生肉膏治癰疽金瘡敗壞者方蛇銜當歸各六分乾地黄三兩黄連黄耆黄芩大黄續斷蜀椒芍藥白芨芎藭莽草白芷附子甘草細辛各一兩薤白一把右十八味㕮咀酢漬再宿臘月猪脂七升煎三上三下酢盡下之去滓取𫝊日二夜一崔氏有大㦸獨活各一兩無地黄黄連黄耆續斷白芨芎藭白芷甘草五香湯治熱毒氣卒腫痛結作核或似癰癤而非使人頭痛寒熱氣急者數日不除殺人青木香藿香薫陸香沉香丁香各一兩右五味㕮咀以水五升煮取二升分三服不瘥更服并以滓𫝊腫上千金翼以麝香代藿香漏蘆湯下之之方漏蘆白芨黄芩麻黄白薇枳實升麻芍藥甘草各二兩大黄三兩右十味㕮咀以水一斗煮取三升分三服快下之無藥處單用大黄亦得肘後云治癰疽丹軫毒腫惡肉千金翼無白薇劉涓子無芍藥有連翹治時行熱毒變作赤色癰疽丹軫毒腫及眼赤痛生瘴翳若熱盛者可加芒硝二兩經心録無白薇有知母犀角芒硝各二兩此方與小兒篇方相重分兩服法異丹參膏方丹參蒴藋莽草蜀椒躑躅各二兩秦芁獨活白芨牛膝菊花烏頭防己各一兩右十二味㕮咀以醋二升浸一宿夏半日如急要便煎取猪脂四升煎令醋氣歇慢火煎去滓用𫝊患處日五六度肘後用防風不用防己治惡肉惡核瘰癧風結諸腫云此膏亦可服小竹瀝湯治氣痛方淡竹瀝二升射干杏仁獨活枳實白术防己防風秦芁芍藥甘草茵芋茯苓黄芩麻黄各二兩右十五味㕮咀以水九升煮取半下瀝煮取三升分四服白薇散方白薇防風射干白术各六分麻黄秦芁各五分當歸防己烏頭青木香天門冬枳實獨活萎蕤山茱茰各四分柴胡白芷各三分莽草蜀椒各二分右十九味治下篩以漿水服方寸匕日三加至二匕蒺藜散治氣腫痛方右用蒺藜子一升熬令黄為末以麻油和如泥炒令焦黑以𫝊故熟布上如腫大小勿開孔帖之無蒺藜用小豆末和雞子如前乾易之妙藜蘆膏治赤色腫有尖頭者方藜蘆二分黄連礬石雄黄松脂黄芩各八分右六味為末猪脂二升二合煎令烊調和以𫝊上瘑癬頭瘡極效又治淺瘡經年抓搔癢處成孔者瞿麥散治癰排膿止痛利小便方瞿麥一兩芍藥桂心赤小豆酒浸熬麥門冬芎藭黄耆當歸白歛各二兩右九味治下篩先食酒下方寸匕日三千金翼用細辛薏苡仁白芷不用桂心麥門冬白歛治諸癰潰及未潰瘡中疼痛膿血不絶不可忍者薏苡仁散治癰腫令自潰長肉方薏苡仁桂心白歛當歸蓯蓉乾薑各二兩右六味治下篩先食温酒服方寸匕日三夜二黄耆茯苓湯治癰疽潰後膿太多虚熱方黄耆麥門冬各三兩生薑四兩五味子四合芎藭茯苓桂心各二兩大棗二十枚右八味㕮咀以水一斗半煮取四升分六服千金翼有逺志當歸人參各二兩甘草六兩内消散治凡是癰疽皆宜服之方赤小豆醋一升浸熬人參甘草瞿麥當歸猪苓黃芩各二兩白歛薏苡仁黃耆各三兩防風一兩升麻四兩右十二味治下篩以酒服方寸匕日三夜二長服取瘥猬皮散治癰疽膿血内漏諸漏壞敗男發背女乳房及五痔方猬皮蜂房各一具地榆附子桂心當歸續斷各五分乾薑蜀椒藁本各四分厚朴六分右十一味治下篩空腹以酒服方寸匕日三取瘥加斑猫七枚益良凡患腫皆因宿熱所致須服冷藥瘥後有患冷利不止者方人參龍骨赤石脂甘草乾薑各二兩附子一枚右六味㕮咀以水八升煮取二升半分三服毎服八合梔子湯治表裏俱熱三焦不實身體生瘡及發癰癤大小便不利方梔子仁二七枚芒硝二兩黄芩甘草知母各三兩大黄四兩右六味㕮咀以水五升煮減半下大黄取一升八合去滓内芒硝分三服五利湯治年四十已還强壯常大患熱發癰疽無定處大小便不通方劉涓子名大黄湯芒硝一兩升麻黄芩各二兩大黄三兩梔子仁五兩右五味㕮咀以水五升煮取二升四合去滓下芒硝分四服快利即止乾地黄圓凡壯熱人能長服之終身不患癰疽令人肥悦耐勞苦方乾地黄五兩芍藥甘草桂心黄耆黄芩逺志各二兩石斛當歸大黄各三兩巴㦸天栝蔞根人參各一兩天門冬蓯蓉各四兩右十五味為末蜜丸如梧子酒服十丸日三加至二十丸又方治虚熱消瘡癤方乾地黄四兩大黄六分芍藥王不留行茯苓甘草逺志麥門冬人參升麻黄芩各三兩桂心六兩右十二味為末蜜和丸如梧子大酒服十丸日三加至二十丸久服令人肥健一方有枳實三兩外臺無甘草逺志麥門冬人參升麻黄芩又方治虚勞客熱數發癰腫瘡癤經年不除方乾地黄四兩黄耆黄芩大黄黄連澤瀉細辛各三兩甘草桂心芍藥茯苓乾漆各二兩人參一兩天門冬五兩右十四味為末蜜丸如梧子大酒服十丸日三夜一加至二十丸久服延年終身不發癰疽凡方中用大黄薄切五升米下蒸熟曝乾用之熱多倍大黄要籍喻義無澤瀉地黄煎補虚除熱散乳石去癰癤痔疾悉宜服之之方生地黄隨多少三𢷬三壓取汁令盡銅器中湯上煮勿蓋覆令泄氣得減半出之布絞去粗碎結濁滓穢再煎令如餳丸如彈丸許酒服日三勿加之百日癰疽永不發枸杞煎治虚勞輕身益氣令人有力一切癰疽永不發方枸杞三十斤剉葉生至未落可用莖葉落至未生可用根以水一石煮取五斗去滓淀將滓更入釜與水依前煮取五斗并前為一斛澄清去淀釜中煎取二斗許更入小銅鍋子煎令連連如餳止或器盛重湯煮更好毎日早朝服一合半日再初服一合漸加治風濕體痛不能飲食兼癰疽後補虚羸方薔薇根枸杞根各一百斤食蜜生地黃各十斤右四味㕮咀先以水煮二根令味濃取二斛去淀次内地黄煮令爛絞去滓微火煎令如粥次内蜜耗令相得毎食後服如彈丸許搨腫方大黄黄芩白歛芒硝各三分右四味㕮咀以水六升煮取三升故帛四重蘸汁中以搨腫處乾即易之無度數晝夜為之又方治癰疽始作腫赤焮熱長甚速方青木香犀角大黄梔子仁紫檀香升麻黄芩羚羊角黄連甘草芒硝射干黄蘗白歛各二分地黄汁五合麝香一分研入右十六味㕮咀以水五升煮取二升小冷故帛兩重蘸湯中搨腫處乾即易之日夜數百度又方治頸項及胷背有大腫赤發即封之令不成膿方朴消五兩香䜴生地黄汁各半斤右三味合𢷬煮令地黄爛熟𫝊腫處厚二分日三四易至瘥止此兼治一切腫又方治癰腫痛煩悶方右用生楸葉十重帖之以帛裹令緩急得所日二易止痛兼消腫蝕膿甚良勝於他物如冬月先收乾者臨用以鹽潤之亦可薄削楸皮用之又方治大人小兒癰腫方右用生猪腦𫝊紙上帖之乾則易日三四度又方芥子為末湯和𫝊紙上帖之千金翼以猪膽和塗之又方白薑石末蒜和𢷬𫝊上又方𢷬馬鞭草𫝊上即頭出又方灸兩足大拇趾奇中立瘥仍隨病左右治癰始覺腫令消方大黄通草葶藶莾草右四味各等分為末以水和𫝊上乾則易之又方以莨菪末三指撮水和服之日三神良治癰方右用芫花為末膠和如粥𫝊之治癰疽發腹背隂匿處通身有數十癰者方右取乾牛糞燒灰治下篩以雞子白調塗之乾復易若已結膿使聚長者方右用栝蔞根為末苦酒和𫝊上燥復易赤小豆亦佳治癰有膿令潰方右用雞羽三七枚燒末服之即潰又方人乳和麪𫝊上比曉膿血盡出不用近手又方箔經繩燒末臘月猪脂和𫝊下畔即潰不須針灸治癰腫發背初作及經十日已上腫赤焮熱毒氣盛日夜疼痛百藥不效方􅖁雞子一枚新出狗屎如雞子大右二味攪調和微火熬令稀稠得所捻作餅子於腫頭堅處帖之以紙帖上以帛抹之時時看視覺餅子熱即易勿令轉動及歇氣經一宿定如多日患者三日帖之一日一易至瘥止此方穢惡不可施之貴勝然其愈疾一切諸方皆不可及自外諸方還復備員設儀注而已學者當曉此方以備諸急爾烏麻膏治諸漏惡瘡一十三般丁腫五色遊腫癰癤毒熱狐刺蛇毒狂犬蟲狼六畜所傷不可識者二十年漏金瘡中風皆以此膏帖之惡膿盡即瘥止痛生肌一帖不換藥惟一日一度拭去膏上膿再帖至瘥止生烏麻油一斤黃丹四兩蠟四分皆大兩大斤右三味以臘日前一日從午内油銅器中微火煎至明旦看油減一分下黄丹消盡下蠟令沫消藥成至午時出惟男子合之毋令小兒女人六畜等見治諸腫帖方紫葛十分大黄五分青木香一分𤣥參白歛黄芩黄連榆白皮升麻由跋各三分赤小豆一合右十一味治下篩以生地黄汁和如泥𫝊腫上乾則易無地黄汁以米醋和之松脂膏治癰腫方松脂一斤半猪脂一合半黄芩黄耆黄連當歸大黃芍藥芎藭蠟各一兩右十味其八味㕮咀合二脂微火煎三上三下綿及布絞去滓火灸𫝊紙上随腫大小帖之日三易即瘥又方松脂一斤猪脂半斤大黃一兩白蠟四兩細辛防風黄芩芎藭白歛當歸芍藥莽草黃蘗白芷黃連各半兩右十五味㕮咀先煎二脂白蠟令烊次内諸藥三上三下以綿及布絞著水中為餅取少許火炙之𫝊油紙上帖瘡處千金翼有黄耆一兩治癰疽痔漏惡瘡婦人妬乳漆瘡方野葛芍藥薤白當歸通草各二分附子一分右六味㕮咀醋浸半日先煎猪脂八合令煙出内亂髮二分令消盡下之待冷又内松脂八分蠟二分更著火上和次内諸藥煎令沸三上三下去滓以故帛𫝊藥帖腫上乾即易如春月去附子其髮須盡洗去垢不爾令人瘡痛青龍五生膏治癰疽痔漏惡瘡膿血出皆以此方導之生梧桐白皮生桑白皮生青竹茹生栢白皮生龍膽各五兩蜂房猬皮蛇蛻皮雄黃雌黄各二兩蜀椒附子芎藭各五分右十三味㕮咀以三年苦酒二斗浸一宿於炭火上炙乾𢷬下細篩以猪脂二升半微火煎攪令相得如飴著末水中新白甆器中盛稍稍隨病深淺𫝊之并以清酒服如棗核大日一滅瘢膏治諸色癰腫惡瘡瘥後有瘢㾗方安息香一作女萎礬石狼毒羊躑躅烏頭附子野葛白芷烏賊骨皂莢天雄芍藥芎藭赤石脂大黄當歸莽草石膏乾地黄地榆白术續斷鬼􅍫蜀椒巴豆細辛各一兩右二十六味𢷬末用成煎猪脂四斤和以此為凖煎三上三下以好鹽一大匙下之膏成須服者與服須摩者與摩摩之忌近眼服之忌妊娠人若滅瘢者以布揩令傷𫝊之鼻中息肉者取如大豆内鼻中如瘀血者酒服如棗核大痔漏者以綿裹如梅子大内下部中風者摩患上取瘥崩中者此處疑有脫簡亦内其滅瘢取少許和鷹屎白𫝊之取臘日合神效千金翼有礬石一兩治膿潰後瘡不合方右燒鼠皮一枚為末𫝊瘡孔中又方熟嚼大豆以𫝊之又方炒烏麻令黑熟𢷬以𫝊之又方牛屎𫝊之乾即易又方燒破蒲席灰臘月猪脂和内孔中治癰久不瘥方右用馬齒菜𢷬汁煎以𫝊之治癰癤潰後膿不斷及為諸物刺傷瘡不瘥方石硫黄粉二分右一味取筋一片磓碎頭少濕内硫黃中以刺瘡孔瘡瘥為度治癰肉中如眼諸藥所不效者方右取附子削令如棊子安腫上以唾帖以火炙之令附子欲焦復唾濕以火炙之如是三度令附子熱氣徹内即瘥此法極妙也練石散治癰有堅如石核者復大色不變或作石癰方麤理黄石一斤鹿角八兩燒白歛三兩右三味以醋五升先燒石灰赤内醋中不限數醋減半止總𢷬末以餘醋和如泥厚𫝊之乾則易取消止盡更合諸漏及瘰癧其藥悉皆用之仍火針針頭破𫝊藥又單磨鹿角半夏末和𫝊之不如前方佳也治石癰堅如石不作膿者方右用生商陸根熟𢷬𫝊之乾即易取軟為度又治濕漏諸癰癤又方蜀桑根白皮隂乾𢷬末烊膠以酒和藥𫝊腫根即拔又方莨菪子為末醋和以𫝊瘡頭根即拔又方蛇蛻皮帖之經宿便瘥又方櫟子一枚以醋於青石上磨之以塗腫上乾更塗不過十度即愈又方梁上塵葵根莖灰各等分右二味醋和𫝊之即瘥又方當上灸百壯石子當碎出如不出益壯乃佳凡發腫至堅有根者名曰石癰禁腫法凡春初雷始發聲時急以兩手指雷聲聲止乃止後七日勿洗手此後有一切腫及蠍螫惡注腫瘡摩之隨手即消書腫方天乙甲一不生未乙一不成壬癸死右以丹書閉氣書腫上立瘥治惡毒腫或著隂卵或著一邉疼痛攣急引入小腹不可忍者一宿殺人方右取茴香草𢷬汁飲一升日三四服滓𫝊腫上冬月闕生者根亦可用此是外國神方於永嘉年末用之起死回生神驗治風勞毒腫疼痛攣急或牽引小腹及腰髀痛方右用桃仁一升研如常法以酒三升攪和頓服之厚衣被蓋令汗不過三劑瘥治脚腫向上至腹即殺人者方右用赤小豆一斗以水三斗煮令爛出豆以汁浸脚至膝每日一度瘥止若已入腹不須浸但煮豆食之忌鹽菜米麪等渇飲汁瘥乃止麻子小豆湯治毒腫無定處或赤色惡寒或心腹刺痛煩悶者此是毒氣深重所致方麻子赤小豆各五升生商陸二升附子二兩射干二兩升麻四兩右六味㕮咀以水四斗先煮四味取二斗半去滓次研麻子碎和汁煮一沸濾去滓取汁爛煮豆其汁每服五合日二夜一當利小便為度腫退即瘥并食豆治一切腫毒疼痛不可忍者方右取萆麻子熟𢷬𫝊之即瘥治諸瘡著白痂復發方大蒜鼠屎書墨右三味各等分為末𫝊之日三治癤子方凡癤無頭者吞葵子一枚不得多服又方生椒末釡下土右二味各等分醋和塗之千金翼有麴末為三味又方狗頭骨芸薹子右二味各等分為末醋和𫝊之又方燒葛蔓灰封上自消牛糞灰封之亦佳又方鼠粘根葉帖之又方水和雀屎𫝊之備急千金要方卷六十六
