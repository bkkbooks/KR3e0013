body:
  text: 備急千金要方卷六十九唐孫思邈撰宋林億等校正痔漏方九漏第一瘰􅊓附方論法灸論曰夫九漏之為病皆寒熱瘰癧在於頸腋者何氣使生此皆鼠瘻寒熱之毒氣也堤留於脈而不去者也鼠瘻之本皆根在於臟其末上出於頸腋之下其浮於脈中而未著於肌肉而外為膿血者易去去之奈何曰請從其末引其本可使衰去而絶其寒熱審按其道以豫之徐從末以去之其小如麥者一刺之三刺已決其死生奈何曰反其目視其中有赤脈從上下貫瞳子見一脈一嵗死見一脈半一嵗半死見二脈二嵗死見二脈半二嵗半死見三脈三嵗死赤脈不下貫瞳子可治也凡項邉腋下先作瘰癧者欲作漏也宜禁五辛酒麵及諸熱食凡漏有似石癰纍纍然作癧子有核在兩頸及腋下不痛不熱治者皆練石散傅其外內服五香連翹湯下之已潰者治如癰法諸漏結核未破者火針針使著核結中無不瘥者何謂九漏一曰狼漏二曰鼠漏三曰螻蛄漏四曰蠱漏五曰蚍蜉漏六曰蠐螬漏七曰浮沮漏八曰瘰􅊓漏九曰轉脈漏空青商陸散治狼漏始發於頸腫無頭有根起於缺盆之上連延耳根腫大此得之憂恚氣上不得下其根在肝一作肺空青主之商陸為之佐方空青蝟腦各二分蝟肝一具乾芎藭半分獨活黃芩鱉甲婦人蓐草商陸斑貓乾薑地膽當歸茴香􅈨石各一分蜀椒三十粒右十六味治下篩酒下方寸匕日三服十五日狸骨知母散治鼠漏始發於頸無頭尾如鼷鼠闕熱脫肉此得之食有鼠毒不去其根在胃狸骨主闕為之佐方狸骨知母桂心鯪鯉山龜殼甘草雄黃乾薑各等分右八味治下篩飲服方寸匕日三仍以蜜和內瘡中無不瘥先灸作瘡後以藥傳之已作瘡不用灸地黃膏治鼠漏瘡瘥復發及不愈出膿血不止方右以不中水豬脂㕮咀生地黃內脂中令脂與地黃足相淹和煎六七沸其瘡先用桑灰汁洗去惡汁次以地黃膏傅上日一易治鼠漏方右用蛇虺所吞鼠燒末服方匕日再不過三服此大驗但難遇耳并傅瘡中佳又方死鼠一枚中形者亂髮如雞子大一枚右二味以臘月豬脂煎之令消盡膏成分作二分一分稍稍塗瘡一分稍稍酒服之瘥鼠子當從瘡中出良荏子桔梗圓治螻蛄漏始發於頸項狀如腫此得之食瓜果實毒不去其根在大腸荏子主之桔梗為之佐方荏子龍骨各半兩附子一兩蜀椒百粒桂心桔梗乾薑􅈨石獨活芎藭各一分右十味為末以棗二十枚合搗醋漿和丸如闕漿下五丸加至十丸雄黃黃芩散治蜂漏始發於頸瘰􅊓三四處俱相連以潰此得之飲流水中有風毒不去其根在脾雄黃主之黃芩為之佐方雄黃黃芩各一兩蜂房一具茴香吳茱茰乾薑各半兩蜀椒二百粒鱉甲右八味治下篩傳瘡口上日一度十日止礜石防風散治蚍蜉漏始發於頸初得如傷寒此得之食中有蚍蜉毒不去其根在腎礜石主之防風為之佐方礬石防風知母雌黃桃白皮乾地黃獨活青黛斑貓白芷松脂一作柏脂芍藥海藻當歸各一分白术蝟皮各四分蜀椒百粒右十七味治下篩飲服一錢匕日三礬石白术散治蠐螬漏始發於頸下無頭尾如棗核塊纍移在皮中使人寒熱心滿此得之因喜怒哭泣其根在心礬石主之白术為之佐方礬石白术空青當歸細辛一兩蝟皮斑貓枸杞地膽各一分乾烏腦三七豆許右十味治下篩以醋漿服方寸匕日三病在上側輪卧在下髙枕卧使藥流下地膽甘草散治浮沮漏始發於頸如兩指使人寒熱欲卧此得之因思慮憂悶其根在膽地膽主之甘草為之佐方地膽雄黃乾薑續斷石決明菴䕡根龍膽各三分細辛二分大黃半分甘草一分右十味治下篩傳瘡日四五度古今録驗無雄黃有硫黃雌黃芍藥圓治瘰􅊓漏始發於頸有根初苦痛令人寒熱此得之因新沐濕結髮汗流於頸所致其根在腎雌黃主之芍藥為之佐方雌黃芍藥茯苓續斷乾地黃空青礜石乾薑桔梗蜀椒恆山虎腎狸肉烏腦斑貓礬石各一分附子一兩右十七味為末蜜丸如大豆酒服十丸日二斑貓白芷圓治轉脈漏始發於頸濯濯脈轉苦驚身振寒熱此得之因驚臥失枕其根在小腸集驗作心斑貓闕之白芷為之佐方斑貓白芷緑青大黃各二分升麻鍾乳甘草防風地膽續斷麝香礜石各一分人參當歸桂心各二兩白术麥門冬各一兩右十七味為末蜜丸如大豆酒服十丸日三勿食菜慎房室百日外臺無大黃桂心麥門冬白术鍾乳治九漏方空青商陸知母狸骨桔梗防風荏子礬石黃芩白芷芍藥甘草雌黃白术礜石地膽斑貓雄黃各等分右十八味為末蜜丸如大豆以酢服三丸三十日知四十日愈六十日平復百日內慎房室一方為散醋服一刀圭日二老小半又方蝟皮半枚鯪鯉甲􅀈雞各四枚蜥蜴蜈蚣各一枚蜀椒附子當歸蜂房地榆桂心通草乾漆牡丹薏苡仁蒺藜子漏蘆一作雚蘆龍膽一作龍骨土瓜各三分斑貓四分蛇牀子苦參大黃雄黃蛇蛻皮䕡茹細辛各二分鶴骨六分右二十八味治下篩酒服五分匕以知為度日二服又方斑貓七十枚蝟皮真珠雄黃各一分右四味治下篩酒服半錢七日三又方末成錬松脂填瘡孔令滿日三四度七日瘥有神驗又方斑貓二七枚雄黃桂心犀角各一兩右四味治下篩酒服一錢匕日再服病從小便出又方馬齒莧隂乾臘月燭燼各等分右二味為末以臘月豬脂和其瘡先以暖泔清洗淨拭乾然後以藥傅之日三又方乾牛屎乾人屎各等分右二味搗先用綿羃瘡上綿上著屎蟲聞屎香即出若癢即舉綿去之更别取屎及綿著其上如前蟲盡乃止又方苦瓠四枚大如盞者各穿一孔如指大置湯中煮十數沸取一竹筒長一尺一頭內瓠孔中一頭注瘡孔上冷則易之遍止治一切漏方斑貓四十枚䜴四十九粒元青二十枚生大豆黃地膽各十枚蜈蚣一升半犀角牛黃各棗核大右八味為末蜜丸如梧子大飲服二丸須臾多作酸漿粥冷飲之病從小便出尿盆中相視如有蟲形狀又似膠汁此病出也間日一服飲粥如常小弱者隔三四日候無蟲出瘡漸瘥特忌油膩一切器物皆須灰洗乃作食崔氏云治九漏初服藥少夜食明旦服二丸至七日甚虛悶可煮食蔓菁菜羮自餘脂膩醋口味果子之類並不得食人強隔日一服人弱兩三日一服瘥後仍作二十日將息便不須服又方煮鹽花以麵擁病上內鹽花麵匡中厚二寸其下以桑葉三重藉鹽候冷熱得所可忍冷則無益熱則以肉一日一度候瘰􅊓根株勢消則止若已作瘡者搗穄榖為末粉之又方槲北隂白皮三十斤銼碎以水一石煮取一斗去滓煎如糖又取都厠上雌雄鼠屎各十四枚燒令汁盡為末內煎中又溫酒一升投煎中合攪之羸人服五合當有蟲出又方霜下瓠花曝乾為末傅之又方搗土瓜根傳之燥則易不限時節又方死蛇去皮肉取骨為末合和封瘡上大痛以杏仁膏摩之止又方死蛇和臘月豬脂合燒灰為末內孔中又方燒死蜣蜋為末醋和塗又死蛇灰醋和傳之又方故布裏鹽如彈丸大燒令赤為末酒服又方服白馬屎汁一升又方水研杏仁服之又方豬脂一升酒五合煎沸頓服之又方鹽麵和燒灰傅之又方正月雄狐屎隂乾搗末水和服治漏作瘡孔方右用露蜂房為末臘月豬脂和傅孔上治漏發心胸以下者方松脂武都雄黃各三兩右二味和為塊刀子刮為散飲服一方寸匕日二不瘥更合治漏方煆落鐵屑狗頰車連齒骨灸虎糞鹿皮合毛燒為灰各等分右四味治下篩以豬膏和內瘡中須臾即易日五六度治一切冷瘻方右用燒人所吐蛔蟲為灰先用甘草湯洗去瘡惡然後著灰無不瘥者慎口味治鼠瘻腫核痛未成膿者方右以柏葉傳腫上熬鹽著葉上尉之令熱氣下即消治風漏及鼠漏方赤小豆白斂黃耆牡蠣各等分右四味治下篩酒服方寸匕日三治螻蛄瘻方右先以泔清煮槲葉取汁洗瘡拭乾次以槲葉灰內瘡中治蜂瘻方論初生狀如桃而癢搔之則引大如雞子如覆手者熬鹽尉之三宿四日不瘥至百日成瘻其狀大如四五寸石廣三寸中生蜂作孔乃有數百以石硫黃隨多少燃燒令汁出著瘡孔中須臾間見蜂數十蜂盡乃瘥治蜂瘻方以人屎蛇蛻灰臘月豬膏和傳之又方鴉頭灰傳之又方取蜂窠燒灰臘月豬膏和傳孔中治蟻漏孔容針亦有三四孔者方右用蝟皮肝心燒灰為末酒服一錢七又方死蛇腹中鼠取臘月豬脂煎候焦去滓傳之又方取大鮆鮓燒耕垈土令赤以苦酒浸垈土時合壁土故熱以鮆鮓著壁土上展轉令熱傳瘡上又方鯪鯉甲二七枚燒末以豬膏和傳瘡上又方半夏一枚搗末以鴨脂和傳瘡上治瘰􅊓瘻橫闊作頭狀若杏仁形亦作瘰􅊓方右用雄雞屎燒灰臘月豬脂和封之治蜣蜋瘻方右用牛屎燒灰臘月豬脂和傳之又方蜣蜋丸即蜣蜋所食屎也為末傳之又方乾牛屎為末傳之癢即撥却更厚封瘥乃止又方熱牛屎塗之數易應有蜣蜋出治蚯蚓瘻方雞屎蚯蚓屎右二味為末用社豬下頷髓和傳之治蠍瘻五六孔皆相通者方右搗茅根汁著孔中治蝦蟆瘻方右用五月五日蛇頭及野豬脂同水衣封之佳治蛇瘻方右用蛇蛻皮燒灰臘月豬脂和封之治蛙瘻方右用蛇腹中蛙燒灰封之治顛當瘻方以搗土瓜根傳至瘥慎口味治雀瘻方右取母豬屎燒灰臘月豬膏和傳上當有蟲出如雀形治膿瘻方右用桃花末以豬脂和封之佳治石瘻兩頭出者其狀堅實令人寒熱方右以大鈹針破之次用鼠粘葉二分為末和雞子白一枚封之又方搗槐子和井花水封之灸漏法葶藶子二合䜴一升右二味和搗令極熟作餅子如大錢厚二分許取一枚當瘡孔上作大艾炷如小指大灸餅上三炷一易三餅九炷隔三日復一灸之外臺灸瘰􅊓古今録驗云不可灸頭瘡葶藶氣入腦殺人又方搗生商陸根捻作餅子如錢大厚三分安漏上以艾灸餅乾易之灸三四升艾瘥外臺灸瘰􅊓又方七月七日日未出時取麻花五月五日取艾等分合搗作炷用灸瘡上百壯外臺灸瘰􅊓九漏灸肩井二百壯漏灸鳩尾骨下宛宛中七十壯諸漏灸瘻周四畔瘥諸惡漏中冷息肉灸足內踝止各三壯二年六壯寒熱胸滿頸痛四肢不舉腋下腫上氣胸中有音喉中鳴天池主之寒熱頸頷腫後溪主之寒熱酸痟痛四肢不舉腋下腫馬刀瘻喉痺髀膝脛骨搖酸痺不仁陽輔主之寒熱脛腋下腫申脈主之胸中滿腋下腫馬刀瘻善自囓舌頰天牖中腫寒熱胸脅腰膝外廉痛臨泣主之寒熱頸腫丘墟主之腋下腫馬刀肩腫吻傷太衝主之寒熱頸瘰癧大迎主之五白膏治鼠漏及瘰癧方白馬屎白牛屎白豬屎白羊屎白雞屎各一升漏蘆二斤右六味各於石上燒作灰研絹篩之以豬膏一升三合煎亂髮一兩半令極沸盡消乃內諸末微火上煎五六沸藥成去瘡痂以鹽湯洗新帛拭乾然後傳膏若無痂猶須湯洗日再若著膏當以帛裹上勿令中風冷神驗曾青散治寒熱瘰癧及鼠瘻方曾青荏子礜石一作􅈨石附子各半兩栝蔞根露蜂房當歸防風芎藭黃耆黃芩狸骨甘草各二兩細辛乾薑各一兩斑貓元青各五枚右十七味治下篩以酒服一方寸匕日再治寒熱瘰癧方土瓜根連翹龍膽黃連栝蔞根苦參芍藥恆山各一兩右八味治下篩酒服五分七日三千金翼外臺有狸骨一枚又千方翼一方有當歸無栝蔞恆山薔薇圓治身體有熱氣瘰癧及常有細瘡并口中生瘡方薔薇根三兩黃耆黃芩鼠李根皮栝蔞根芍藥苦參石龍芮防風一作防已白斂龍膽各一兩梔子仁四兩右十二味為末蜜丸如梧子大飲服十五丸日再千金翼有黃蘗一兩治瘰癧方右用白殭蠶治下篩水服五分匕日三服十日瘥又方狸頭一枚灸搗篩飲服方寸匕日二又方故鞋內氊替燒末五七和酒一升平旦向日服之強行須臾吐鼠出三朝服外臺不同又方狸頭蹄骨等炙黃搗篩為散飲服一錢七日二又方貓兩眼隂乾燒灰井花水服方寸匕日再又方乾貓舌為末傳瘡上又方狼屎灰傳之又方狐頭狸頭灰傳之又方五月五日取一切種種雜草煮取汁洗之又方貓腦莾草右二味各等分為末著孔中灸瘰癧法一切瘰癧在項上及觸處但有肉結凝似作瘻及癰癤者以獨頭蒜截兩頭留心大作艾炷稱蒜大小帖癧子上灸之勿令上破肉但取熱而已七壯一易蒜日日灸之取消止一切瘰癧灸兩胯裏患癧處宛宛中日一壯七日止神驗又灸五里人迎各三十壯又灸耳後髮際直脈七壯又灸患人背兩邉腋下後文上隨年壯備急千金要方卷六十九
