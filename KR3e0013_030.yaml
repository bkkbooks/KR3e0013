body:
  text: 備急千金要方卷三十唐孫思邈撰宋林億等校正傷寒方傷寒膏第三方青膏治傷寒頭痛項強四肢煩疼方當歸芎藭蜀椒白芷吳茱萸附子烏頭甘草各三兩右八味㕮咀以醇苦酒漬之再宿以豬脂四斤煎令藥色黃絞去滓以溫酒服棗核大三枚日三服取汗不知稍增可服可摩如初得傷寒一日苦頭痛背強宜摩之佳黃膏治傷寒赤色頭痛項強賊風走風方大黃附子細辛乾薑蜀椒桂心各半兩巴豆五十枚右七味㕮咀以醇苦酒漬一宿以臘月豬脂一斤煎之調適其火三上三下藥成傷寒赤色發熱酒服梧子大一枚又以火摩身數百過兼治賊風絶良風走肌膚逰風所在摩之神效千金不傳此趙泉方也白膏治傷寒頭痛向火摩身體酒服如杏核一枚溫覆取汗摩身當千過藥力乃行并治惡瘡小兒頭瘡牛領馬鞍皆治之先以鹽湯洗瘡以布拭之傅膏癰腫火炙摩千過日再自消者方天雄烏頭莽草羊躑躅各三兩右四味㕮咀以苦酒三升漬一夕作東向露竈又作十二聚濕土各一升許大取成煎豬脂三斤著銅器中加竈上炊以葦薪令釋內所漬藥炊令沸下著土聚上沸定復上如是十二過令土盡遍藥成去滓傷寒咽喉痛含如棗核一枚日三摩時令勿近目發汗散第四方度瘴發汗青散治傷寒赤色惡寒發熱頭痛項強體疼方麻黃三兩半桔梗細辛吳茱萸防風白术各一兩烏頭乾薑蜀椒桂心各一兩六銖右十味治下篩溫酒服方寸匕溫覆取汗汗出止若不得汗汗少不解復服如法若得汗足如故頭痛發熱此為內實當服駃䜴圓若藋氏圓如得便頭重者可以二大豆許內鼻孔中覺燥涕出一日可三四度必愈兼辟時行病五苓散主時行熱病但狂言煩躁不安精彩言語不與人相主當者方豬苓白术茯苓各十八銖桂心十二銖澤瀉三十銖右五味治下篩水服方寸匕日三多飲水汗出即愈崔文行解散治時氣不和傷寒發熱者方桔梗細辛各四兩白术八兩烏頭一斤右四味治下篩若中傷寒服錢五匕覆取汗解若不覺復小增之以知為度若時氣不和旦服錢五匕辟惡氣欲省病服一服皆酒服六物青散治傷寒赤色惡寒方附子白术各一兩六銖防風細辛各一兩十八銖桔梗烏頭各三兩十八銖右六味治下篩以溫酒服五匕不知稍增之服後食頃不汗出者進溫粥一杯以發之溫覆汗漐漐可也勿令流離勿出手足也汗出止若汗大出不止者溫粉粉之微者不須粉不得汗者當更服之得汗而不解者當服神丹丸方出下篇發汗丸門青散治春傷寒頭痛發熱方苦參厚朴石膏各三十銖大黃細辛各二兩麻黃五兩烏頭五枚右七味治下篩覺傷寒頭痛發熱以白湯半升和藥方寸匕投湯中熟訖去滓盡服覆取汗汗出溫粉粉之良久一服不除宜重服之或當微下利者有大黃故也詔書發汗白薇散治傷寒三日不解者方白薇十二銖杏仁貝母各十八銖麻黃一兩八銖右四味治下篩酒服方寸匕自覆汗出即愈華他赤散治傷寒頭痛身熱腰背強引頸及風口噤瘧不絶婦人産後中風寒經氣腹大方丹砂十二銖蜀椒蜀漆乾薑細辛黃芩防已桂心茯苓人參沙參桔梗女萎烏頭各十八銖雄黃二十四銖吳茱萸三十銖麻黃代赭各二兩半右十八味治下篩酒服方寸匕日三耐藥者二匕覆令汗出欲治瘧先發一時所服藥二匕半以意消息之細辛薑桂丹砂雄黃不熬餘皆熬之赤散治傷寒頭痛項強身熱腰脊痛往來有時方乾薑防風沙參細辛白术人參蜀椒茯苓麻黃黃芩代赭桔梗吳茱萸各一兩附子二兩右十四味治下篩先食酒服一錢匕日三烏頭赤散治天行疫氣病方烏頭一兩半皂莢半兩雄黃細辛桔梗大黃各一兩右六味治下篩清酒若井花水服一刀圭日二不知稍增以知為度除時氣疫病若牛馬六畜中水行疫亦可與方寸匕人始得病一日時服一刀圭取兩大豆許吹著兩鼻孔中水解散治時行頭痛壯熱一二日方桂心甘草大黃各二兩麻黃四兩右四味治下篩患者以生熟湯浴訖以暖水服方寸匕日三覆取汗或利便差丁強人服二方寸匕延年祕録有黃芩芍藥各二兩古今録驗無甘草有芍藥治天行熱病生疱瘡疼痛及解肌出汗治時病表裏大熱欲死方大黃寒水石芒硝石膏升麻麻黃葛根紫葛右八味等分治下篩水服方寸匕日二發汗湯第五例方桂枝證例曰大法春夏宜發汗凡發汗欲令手足皆周至漐漐然一時間許益佳但不可令如水流離霡霂耳若病不解當更重發汗汗出多則亡陽陽虛不可重發汗也凡服湯藥發汗中病便止不必盡劑也凡云可發汗而無湯者圓散亦可用要以汗出為解然不及湯隨證良驗凡病無故自汗出復發其汗愈衛復和故也夫脈浮者病在外可發汗宜桂枝湯夫陽脈浮大而數者亦可發汗為宜桂枝湯夫病常自汗出者此為榮氣和榮氣和而外不解此為衛氣不和也榮行脈中衛行脈外復發其汗衛和則愈宜桂枝湯夫病人臟無他病時時發熱自汗出而不愈者此衛氣不和故也先其時發汗則愈宜桂枝湯太陽病發熱汗出者此為榮弱衛強故令汗出欲救邪風宜桂枝湯太陽病頭痛發熱汗出惡風寒宜桂枝湯太陽病下之微喘者表未解也宜桂枝加厚朴杏仁湯太陽病外證未解者不可下宜桂枝湯太陽病先發其汗不解而下之其脈浮者不愈浮為在外而反下之故令不愈今脈浮故在外當須解其表則愈宜桂枝湯太陽病下之氣上衝者可與桂枝湯不上衝不可與凡桂枝本為解肌若脈浮緊發熱無汗者勿與之當知此勿誤也凡酒客勿與桂枝湯若服必嘔凡服桂枝湯吐者後必吐膿血也桂枝湯治中風其脈陽浮而隂弱陽浮者熱自發隂弱者汗自出澀澀惡風淅淅惡寒吸吸發熱鼻鳴乾嘔方桂枝芍藥生薑各三兩甘草二兩大棗十二枚右五味㕮咀三物切薑擘棗以水七升煮棗令爛去滓乃內諸藥水少者益之煮令微沸得三升去滓服一升日三小兒以意減之初服少多便得汗出者小濶其間不得汗者小促其間令藥勢相及汗出自護如法特須避風病若重宜夜服若服一劑不解病證不變者當復服之至有不肯汗出服兩三劑乃愈服此藥食頃飲熱粥以助藥力麻黃湯治傷寒頭及腰痛身體骨節疼發熱惡寒不汗而喘方麻黃三兩桂心甘草各二兩杏仁七十枚喘不甚用五十枚右四味㕮咀以水九升煮麻黃減二升去沫內諸藥煮取二升半絞去滓服八合覆令汗大青龍湯治中風傷寒脈浮緊發熱惡寒身體疼痛汗不出煩躁方麻黃六兩桂心甘草各二兩石膏如雞子一枚碎生薑三兩杏仁四十枚大棗十二枚右七味㕮咀以水九升煮麻黃去沫乃內諸藥煮取三升分服一升厚覆當大汗出溫粉粉之即止不可再服服之則筋惕肉瞤此為逆也不汗乃再服陽毒升麻湯治傷寒一二日便成隂毒或服藥吐下之後變成陽毒身重腰背痛煩悶不安狂言或走或見鬼或吐血下痢其脈浮大數面赤斑斑如錦文咽喉痛唾膿血五日可治至七日不可治宜服方升麻甘草各半兩當歸蜀椒雄黃桂心各六銖右六味㕮咀以水五升煮取二升半分三服如人行五里進一服溫覆手足毒出則汗汗出則解不解重作服之得吐亦佳仲景無桂心有鱉甲手大一片肘後與千金同古今録驗有梔子六銖鱉甲如手一片隂毒甘草湯治傷寒初病一二日便結成隂毒或服藥六七日已止至十日變成隂毒身重背強腹中絞痛咽喉不利毒氣攻心心下堅強短氣不得息嘔逆唇青面黑四肢厥冷其脈沉細緊數仲景云此隂毒之候身如被打五六日可治至七日不可治也方甘草升麻各半兩當歸蜀椒各六銖鱉甲一兩右五味㕮咀以水五升煮取二升半分三服如人行五里頃更進一服溫覆發汗毒當從汗出汗出則愈若不汗則不除重作服仲景方去蜀椒隂旦湯治傷寒肢節疼痛內寒外熱虛煩方芍藥甘草各二兩乾薑黃芩各三兩桂心四兩大棗十五枚右六味㕮咀以水一斗煮取五升去滓溫服一升日三夜再服令小汗陽旦湯治傷寒中風脈浮發熱往來汗出惡風頭項強鼻鳴乾嘔桂枝湯主之隨病加減如左方以泉水一斗煮取四升分服一升日三自汗者去桂枝加附子一枚渴者去桂加栝蔞三兩利者去芍藥桂加乾薑三纍附子一枚炮心下悸者去芍藥加茯苓四兩虛勞裏急正陽旦主之煎得二升內膠飴半斤為再服若脈浮緊發熱者不可與之六物解肌湯治傷寒發熱身體疼痛方葛根四兩茯苓三兩麻黃牡蠣生薑各二兩甘草一兩右六味㕮咀以水八升煮取二升分三服再服後得汗汗通即止古今録驗無生薑甘草解肌湯治傷寒溫病方葛根四兩麻黃三兩黃芩芍藥甘草各二兩大棗十二枚右六味㕮咀以水一斗煮取三升飲一升日三服三四日不解脈浮者宜重服發汗脈沉實者宜以駃䜴丸下之延年祕録有桂心一兩治傷寒時氣溫疫疼痛壯熱脈盛始得一二日者方丹砂一兩末之以水一斗煮取一升頓服之覆取汗治疫氣傷寒三日已前不解者方好䜴一升綿裹蔥白切一升小男兒尿三升右三味先熬䜴蔥令相得則投小便煮取二升分再服徐徐服之覆令汗神驗解肌升麻湯治時氣三四日不解方升麻芍藥石膏麻黃甘草各一兩杏仁三十枚貝齒三枚一作貝母十八銖右七味㕮咀以水三升煮取一升盡服溫覆發汗便愈葛根龍膽湯治傷寒三四日不差身體煩毒而熱方葛根八兩龍膽大青各半兩升麻石膏萎㽔各一兩甘草桂心芍藥黃芩麻黃各二兩生薑三兩右十二味㕮咀以水一斗煮葛根取八升內餘藥煮取三升分四服日三夜一治傷寒四五日頭痛壯熱四肢煩疼不得飲食方梔子仁黃連黃蘗大黃各半兩好䜴一升蔥白七莖右六味㕮咀以水八升煮上四物六七沸內後蔥白䜴煮得三升頓服一升日三服湯訖溫覆令汗出粉之得汗便止後服勿復取汗不得汗者復服重發此藥無忌特宜老小神良七物黃連湯治夏月傷寒四肢煩疼發熱其人喜煩嘔逆支滿劇如禍祟寒熱相搏故令喜煩方黃連茯苓黃芩各十八銖芍藥葛根各一兩甘草一兩六銖小麥三合右各㕮咀以水七升煮取三升冷分三服不能一升者可稍稍服之湯勢安乃卧藥主毒氣服湯之後胸中熱及咽喉痛皆差其明日復煮一劑如法服之此湯無毒但除熱下氣安病人小兒服者取三分之一以水四升煮得二升稍稍服三匕湯治傷寒中風得之三日至七八日不解胸脅痛四肢逆乾嘔水漿不下腹中宿食不消重下血一日數十行方茯苓如雞子大黃芩人參各三兩栝蔞根四兩芒硝乾地黃各一升大黃麻黃寒水石各半斤右九味搗篩令相得以散三方寸匕水一升煮令三沸絞去滓服之日三溫覆汗出即愈病劇與六七匕五香麻黃湯治傷寒忽發腫或著四肢或在胸背虛腫浮如吹狀亦著頭面唇口頸項劇者偏著腳脛外如軸大而不痛不赤著四肢者乃欲不遂悉主之麝香半兩薰陸香雞舌香各一兩沉香青木香麻黃防風獨活秦芃萎㽔甘草各二兩白薇枳實各二兩右十三味㕮咀以水九升煮取三升分三服覆取汗後外摩防已膏治傷寒三日外與前藥不差脈勢仍數者陽氣猶在經絡未入臟腑方桂枝黃芩甘草各二兩升麻葛根生薑各三兩芍藥六兩石膏八兩梔子二七枚右九味㕮咀以水九升煮取二升七合分三服相去十里久若前兩服訖即得汗後服即停不得汗更進一服得汗即止不得汗者明日去梔子加麻黃二兩足水二升再依方服雪煎治傷寒方麻黃十斤大黃一斤十二兩金色者杏仁三斗四升右三味㕮咀以雪水五斛四斗漬麻黃于東向竈釡中三宿內大黃攪令調炊以桑薪煮得二斛汁去滓復內釡中搗杏仁內汁中復炊之可餘六七斗汁絞去滓置銅器中又以雪水三斗合煎之攪令調得二斗四升藥成可丸冷凝丸如彈丸有病者以三沸白湯五合研一丸入湯中適寒溫之立汗出若不愈者復服一丸密盛藥勿令泄氣備急千金要方卷三十
