  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0013_WYG_045-1a, image: WYG0735/WYG0735-0456a.png}
body:
  text: 備急千金要方卷四十五唐孫思邈撰宋林億等校正小腸腑方風虛驚悸第六方逺志湯補心治心氣虛驚悸喜忘不進食方逺志乾薑白术桂心黃耆紫石各三兩防風當歸人參茯苓甘草芎藭茯神羌活各二兩麥門冬半夏各四兩大棗十二枚五味子二合右十八味㕮咀以水一斗三升煮取三升半分五服日三夜二又方治中風心氣不足驚悸言語謬誤恍惚憒憒心煩悶耳鳴方逺志黃耆茯苓甘草芍藥當歸桂心一方無麥門冬人參各二兩獨活四兩生薑五兩附子一兩右十二味㕮咀以水一斗二升煮取四升每服八合人羸服五合日三夜一茯神湯治風經五臟大虛驚悸安神定志方茯神防風各三兩人參逺志甘草龍骨桂心獨活各二兩白术一兩細辛乾薑各六兩酸棗一升右十二味㕮咀以水九升煮取三升分三服又方治風虛滿頸項強心氣不定不能食方茯神四兩麥門冬四兩人參羌活逺志當歸甘草紫石五味子二兩半夏防風黃耆各三兩生薑五兩酸棗三升右十四味㕮咀以水一斗三升煮酸棗取一斗去棗內餘藥煎取三升半一服七合日三夜二補心湯治心氣不足其病苦驚悸汗出心中煩悶短氣喜怒悲憂悉不自知常苦咽喉痛口脣黑嘔吐血舌本強不通水漿方紫石英茯苓人參逺志當歸茯神深師作桂甘草紫菀各三兩麥門冬一升赤小豆三合大棗三十枚右十一味㕮咀以水一斗二升煮取三升分三服又方治心氣不足多汗心煩喜獨語多夢不自覺咽喉痛時吐血舌本強水漿不通方紫石英研茯苓人參桂心各二兩麥門冬三兩紫菀甘草各一兩大棗七枚赤小豆二十四枚右九味㕮咀以水八升煮取二升半分三服春夏服佳又方治奄奄忽忽朝瘥暮劇驚悸心中憧憧胸滿不下食隂陽氣衰脾胃不磨不欲聞人聲定志下氣方人參茯苓逺志甘草枳實當歸龍齒桔梗各三兩半夏桂心各五兩黃耆四兩生薑六兩茯神二兩大棗二十枚右十四味㕮咀以水一斗二升先煮粳米五合令熟去滓次內藥煮取四升一服八合日三夜二又方治心氣不足心痛驚恐方逺志蒲黃一方用菖蒲人參茯苓各四兩右四味㕮咀以水一斗煮取三升半分三服又方治心氣不足腹背相引痛不能俯仰方或作傷心湯茯神黃芩逺志乾地黃各三兩麥門冬石膏各四兩半夏附子桂心生薑各二兩甘草阿膠糖各一兩大棗三十枚右十四味㕮咀以水一斗煮取三升去滓內糖及膠更煎取二升二合分三服此方與前卷心虛實篇大補心湯相重分兩别小定心湯治虛羸心氣驚弱多魘方茯苓四兩桂心三兩甘草芍藥乾薑逺志人參各二兩大棗十五枚右八味㕮咀以水八升煮取三升分四服日三夜一大定心湯治心氣虛悸恍惚多忘或夢寤驚魘志少不足人參茯苓茯神逺志赤石脂龍骨乾薑當歸甘草白术芍藥桂心紫菀防風各二兩大棗二十枚右十五味㕮咀以水一斗二升煮取三升半分五服日三夜一治驚勞失志方甘草桂心各二兩龍骨防風麥門冬牡蠣逺志各一兩茯神五兩大棗二十枚右九味㕮咀以水八升煮取二升分二服相去如人行五里久再進荆瀝湯治心虛驚悸不定羸瘦病方荆瀝二升茯神白鮮皮各三兩人參二兩白銀十兩以水一斗煮取三升右五味三味㕮咀以荆瀝銀汁中煮取一升四合分三服相去如人行十里久進一服又方荆瀝二升緩水煎取一升六合分溫每服四合日三夜一鎮心湯治風虛勞冷心氣不足喜忘恐怖神志不定方防風當歸大黃麥門冬各五分此味又亦云五兩澤瀉大豆卷白斂各四分此味一云三兩菖蒲人參桔梗桂心逺志薯蕷石膏各三分紫菀乾薑茯苓各二分一云各三分白术甘草各十分粳米五合大棗五兩附子茯神各二兩秦芁六分右二十四味㕮咀以水一斗二升先煮粳米令熟去滓內藥煮取四升分服八合日三夜一千金翼不用粳米蜜丸梧子大酒服十丸加至二十丸大鎮心散治心虛驚悸夢寤恐畏方紫石英茯苓防風人參甘草澤㵼各八分黃耆秦芃白术薯蕷白斂各六分麥門冬當歸各五分桔梗大豆卷柏子仁桂心逺志大黃石膏各四分蜀椒芍藥乾薑細辛各三分右二十四味治下篩酒服二方寸匕日三一方無紫石茯苓澤瀉乾薑有大棗四分蜜丸如梧子酒下十五丸又方治風虛心氣驚弱恍惚失常忽嗔恚悲志意不樂方紫石英白石英乾地黃一本無朱砂龍齒人參細辛天雄附子逺志乾薑茯苓白术桂心防風各二兩右十五味治下篩酒服兩方寸匕日三小鎮心散治心氣不足虛悸恐畏悲思恍惚心神不定惕惕然驚者方人參逺志白术附子乾地黃赤小豆桂心黃耆細辛乾薑龍齒防風菖蒲各二兩茯苓四兩右十四味治下篩酒服二方寸匕日三鎮心圓治男子婦人虛損夢寤驚悸或失精神婦人赤白注漏或月水不利風邪鬼注寒熱往來腹中積聚憂恚結氣諸病方紫石英茯苓菖蒲蓯蓉逺志麥門冬大黃當歸細辛卷柏大豆卷乾薑各五分防風人參澤瀉秦芃丹參各六分石膏芍藥柏子仁各三分烏頭桂心桔梗甘草薯蕷各十分白斂鐵精銀屑前胡牛黃各二分乾地黃十二分白术半夏各八分蟅蟲十二枚大棗五十枚右三十五味為末蜜棗和搗五千杵丸如梧子大酒服五丸日三加至二十丸一本無大豆卷大棗大鎮心圓所治與前方大同凡是心病悉皆主之方乾地黃六分牛黃五分一用牛膝羌活桂心麥門冬秦芁芎藭人參逺志紫石英丹砂阿膠甘草大黃銀屑白斂當歸乾薑防風各八分杏仁蜀椒各三分澤瀉黃耆茯苓大豆卷薯蕷茯神前胡鐵精柏子仁各五分大棗四十枚桑螵蛸十一枚右三十二味為末白蜜棗和丸酒服七丸日三加至二十丸小鎮心圓治心氣少弱驚虛振悸胸中逆氣魘夢參錯謬忘恍惚方紫石英朱砂茯神銀屑雄黃菖蒲人參桔梗乾薑逺志甘草當歸桂心各二分防風細辛鐵精防已各一兩右十七味為末蜜丸如大豆狀飲服十丸日三加至二十丸一方用茯苓二分為十八味定志小圓治心氣不定五臟不足甚者憂愁悲傷不樂忽忽喜忘朝差暮劇暮差朝發狂眩者方菖蒲逺志各二兩茯苓人參各三兩右四味為末蜜丸如梧子大飲服七丸日三加茯神為茯神丸散服之亦佳紫石酒治久風虛冷心氣不足或時候怖方紫石英一斤鍾乳防風逺志桂心各四兩麻黃茯苓白术甘草各三兩右九味㕮咀以酒三斗春月漬五日每服四合日三亦可至醉常令有酒氣好忘第七方枕中方龜甲龍骨逺志菖蒲右四味等分治下篩酒服方寸匕日三常服令人大聰千金方云食後水服治多忘令人不忘方菖蒲二分茯苓茯神人參各五分逺志七分右五味治下篩酒服方寸匕日三夜一五日後知神良又方蓯蓉續斷各一分逺志菖蒲茯苓各三分右五味治下篩酒服方寸匕日三至老不忘開心散治好忘方逺志人參各一分菖蒲一兩茯苓二兩右四味治下篩飲服方寸匕日三菖蒲益智圓治喜忘恍惚破積聚止痛安神定志聰明耳目方菖蒲逺志人參桔梗牛膝各五分附子五分茯苓七分桂心三分右八味為末蜜丸如梧子一服七丸加至二十丸日二夜一禁如藥法養命開心益智方乾地黃人參茯苓各二兩蓯蓉莵絲子逺志各三兩蛇牀子二分右七味治下篩服方寸匕日二忌兔肉餘無忌八味散方天門冬六分桂心茯苓各一兩乾地黃四分五味子菖蒲逺志石葦各三分右八味治下篩後食或酒或水服方寸匕三十日力倍六十日氣力強志意足治健忘方天門冬逺志茯苓乾地黃右四味各等分為末蜜丸如梧子大酒服二十丸日三加至三十丸常服勿絶治好忘久服聰明益智方龍骨虎骨逺志各等分右三味治下篩食後服方寸匕日二又方七月七日取菖蒲酒服三方寸匕飲不至醉又方常以甲子日取石上菖蒲一寸九節者隂乾百日治合下篩服方寸匕日三耳目聰明不忘出衢州石橋寺南山又方七月七日麻勃一升人參二兩為末蒸令氣遍臨夜卧服一刀圭盡知四方之事又方戊子日取東邊桃枝二七枚縛著卧牀中枕之不忘又方常以五月五日取東向桃枝日未出時作三寸木人著衣帶中令人不忘又方丁酉日自往市買逺志裹著衣中角頭還末服之不復忘治人心昏塞多忘喜誤方七月七日取蜘蛛網著衣領中勿令人知不忘備急千金要方卷四十五
