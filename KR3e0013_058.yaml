body:
  text: 備急千金要方卷五十八唐孫思邈撰宋林億等校正大腸腑方痰飲第六論法方灸論曰夫飲有四何謂師曰有痰飲有懸飲有溢飲有支飲問曰四飲之證何以為異師曰其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲飲後水流在脅下咳唾引痛謂之懸飲飲水過多水行歸於四肢當汗出而汗不出身體疼重謂之溢飲其人咳逆倚息短氣不得臥其人如腫謂之支飲凡心下有水者築築而悸短氣而恐其人眩而癲先寒即為虛先熱即為實故水在於心其人心下堅築築短氣惡水而不欲飲水在於肺其人吐涎沫欲飲水水在於脾其人少氣身體盡重水在於肝脅下支滿嚏而痛水在於腎心下悸夫病人卒飲水多必暴喘滿凡食少飲多水停心下甚者則悸微者短氣脈雙弦者寒也皆大下後喜虛耳脈偏弦者飲也肺飲不弦但喜喘短氣支飲亦喘而不能眠加短氣其脈平也留飲形不發作無熱脈微煩滿不能食脈沉滑者留飲病病有留飲者脅下痛引缺盆嗽轉甚其人咳而不得臥引項上痛咳者如小兒掣瘲狀夫胸中有留飲其人短氣而渴四肢歷節痛其脈沉者有留飲也心下有留飲其人背寒冷大如手病人肩息上引此皆有溢飲在胸中久者缺盆滿馬刀腫有劇時此為氣飲所致也膈上之病滿喘咳吐發則寒熱背痛惡寒目泣自出其人振振身瞤劇必有伏飲病人一臂不隨時復轉移在一臂其脈沉細此非風也必有飲在上焦其脈虛者為微勞榮衛氣不周故也冬自瘥一本作久久自瘥病痰飲者當用溫藥和之小半夏湯病心腹虛冷遊痰氣上胸脅滿不下食嘔逆者方半夏一升生薑一斤橘皮四兩右三味㕮咀以水一斗煮取三升分三服若心中急及心痛內桂心四兩若腹滿痛內當歸三兩羸弱及老人尤宜服之用人參二兩仲景無橘皮人參又方半夏一升生薑一斤桂心三兩甘草一兩右四味㕮咀以水七升煮取二升半分三服甘草湯治心下痰飲胸脅支滿目眩方甘草二兩桂心白术各三兩茯苓四兩右四味㕮咀以水六升宿漬煮取三升去滓服一升日三小便當利十棗湯治病懸飲者若下後不可與也凡上氣汗出而咳者此為飲也方見咳嗽篇中小青龍湯病溢飲者當發其汗方見咳嗽篇中范汪用大青龍湯木防己湯膈間有支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈者用此方木防己三兩桂心二兩人參四兩石膏雞子大十二枚右四味㕮咀以水六升煮取二升分二服虛者即愈實者三日復發發則復與若不愈去石膏加茯苓四兩芒硝三合以水六升煮取二升去滓下硝令煬分二服微下利即愈一方不加茯苓厚朴大黃湯夫酒客咳者必致吐血此坐久飲過度所致也其脈虛者必冒其胸中本有支飲支飲胸滿主之之方厚朴一尺大黃六兩枳實四兩右三味㕮咀以水五升煮取二升分為二服溫服之葶藶大棗瀉肺湯治支飲不得息方見肺癰篇中小半夏加茯苓湯嘔家不渴渴者為欲解本渴今反不渴心下有支飲故也小半夏湯主之又有先渴却嘔者此為水停心下小半夏加茯苓湯主之治卒嘔吐心下痞膈間有水目眩悸方半夏一升茯苓三兩生薑半斤右三味㕮咀以水七升煮取一升五合去滓分再服溫服之胡洽不用茯苓用桂心四兩五苓散假令瘦人臍下有悸者吐涎沫而癲眩水也此方主之方見前第九卷中椒目圓腹滿口乾燥此腸間有水氣此方主之椒目木防己大黃各闕兩葶藶二兩右四味為末蜜丸如梧子大先食飲服闕丸日三後稍增口中有津液止渴者加芒硝半兩甘遂半夏湯病者脈伏其人欲自利利者反快雖利心下續堅滿此為留飲欲去故此方主之甘遂大者三枚半夏十二枚水一升煮取半升芍藥三枚甘草一枚如指大水一升煮取半升右四味以蜜半升內二藥汁合得一升半煎取八合頓服之大茯苓湯主胸中結痰飲澼結臍下弦滿嘔逆不得食亦主風水方茯苓白术各三兩當歸橘皮附子各二兩生薑半夏桂心各四兩細辛四兩一作人參右九味㕮咀以水一斗煮取三升去滓分三服服三劑良茯苓湯治胸膈痰滿方茯苓四兩半夏一升生薑一斤桂心八兩右四味㕮咀以水八升煮取二升半分四服冷極者加大附子四兩若氣滿者加檳榔三七枚此方與前卷嘔吐篇方相重分兩加減法不同大半夏湯治痰冷澼飲胸膈中不理方半夏一升白术三兩生薑八兩茯苓人參桂心甘草附子各二兩右八味㕮咀以水八升煮取三升分三服半夏湯治痰飲澼氣吞酸方半夏吳茱茰各三兩生薑六兩附子一枚右四味以水五升煮取二升半分三服老小各半日三乾棗湯治腫及支滿澼飲方大棗十枚大戟大黃黃芩甘草甘遂各一兩芫花蕘花各半兩右八味㕮咀以水五升煮取一升六合分四服空心服以快下為度當歸湯治留飲宿食不消腹中積聚轉下方當歸人參桂心黃芩甘草芍藥芒硝各二兩大黃四兩生薑澤瀉各三兩右十味㕮咀以水一斗煮取三升分三服治痰飲飲食不消乾嘔方人參旋復花橘皮細辛各一兩澤瀉白术杏仁枳實各二兩茯苓柴胡生薑半夏芍藥各三兩右十三味㕮咀以水九升煮取二升七合分三服日三治胸中痰飲腸中水鳴食不消嘔吐水方檳榔十二枚生薑杏仁白术各四兩半夏八兩茯苓五兩橘皮三兩右七味㕮咀以水一斗煮取三升去滓分三服吳茱茰湯治胸中積冷心嘈煩滿汪汪不下飲食心胸應背痛方吳茱茰三兩半夏四兩桂心人參各二兩甘草一兩生薑五兩大棗二十枚右七味㕮咀以水九升煮取三升去滓分三服日三治胸膈心腹中痰水冷氣心下汪洋嘈煩或水鳴多唾口中清水自出脅肋急脹痛不欲食此皆胃氣弱受冷故也其脈喜沉弦細遲悉主之方半夏生薑各五兩芍藥三兩茯苓四兩旋復花細辛橘皮桂心人參甘草桔梗各二兩右十一味㕮咀以水一斗煮取三升分三服病先有時喜水下者用白术三兩去旋復花若欲得利者加大黃二兩須微調者用乾地黃治冷熱久澼實不能飲食心下虛滿如水狀方前胡生薑茯苓半夏各四兩甘草枳實白术各三兩桂心二兩右八味㕮咀以水八升煮取三升分三服前胡湯治胸中久寒澼實膈塞胸痛氣不通利三焦冷熱不調飲食減少無味或寒熱身重臥不欲起方前胡人參當歸甘草半夏各三兩大黃防風麥門冬吳茱茰黃芩各一兩生薑四兩杏仁四十枚右十二味㕮咀以水一斗煮取三升去滓分三服深師方云若脅下滿加大棗十二枚此利水亦生旋復花湯治胸膈痰結唾如膠不下食者方旋復花細辛前胡甘草茯苓各二兩生薑八兩桂心四兩半夏一升烏頭五枚右九味㕮咀以水九升煮取三升去滓分三服薑椒湯治胸中積聚痰飲飲食減少胃氣不足咳逆嘔吐方薑汁七合蜀椒三合桂心附子甘草各一兩橘皮桔梗茯苓各二兩半夏三兩右九味㕮咀以水九升煮取二升半去滓內薑汁煮取二升分三服服三劑佳若欲服大散諸五石丸必先服此湯及進黃耆丸佳一方不用甘草薑附湯治痰冷澼氣胸滿短氣嘔沫頭痛飲食不消化方生薑八兩附子四兩生用四破右二味㕮咀以水八升煮取二升分四服亦主卒風撩膈散治心上結痰飲實寒冷心悶方爪丁二十八枚赤小豆二七枚人參甘草各一分右四味治下篩酒服方寸匕日二亦治諸黃斷膈湯治胸中痰澼方恆山三兩甘草松蘿各一兩瓜蒂二十一枚右四味㕮咀以水酒各一升半煮取一升半分三服後服漸減之得快吐後須服半夏湯半夏湯方見前篇松蘿湯治胸中痰積熱皆除方松蘿二兩烏梅梔子各十四枚甘草一兩恆山三兩右五味㕮咀以酒三升浸一宿平旦以水三升煮取一升半去滓頓服之亦可分二服一服得快吐即止杜蘅湯主吐百病方杜蘅松蘿各三兩瓜丁三七枚右三味㕮咀以酒一升二合漬二宿去滓分二服若一服即吐者止未吐者更服相去如行十里久令藥力盡服一升稀糜即定老小用之亦佳蜜煎主寒熱方蜜五合恆山甘草各二兩右三味取二味㕮咀以水一斗煮取二升去滓內蜜五合溫服七合吐即止不吐更服七合勿與冷水一方用甘草半兩又方蜜二合醋八合右二味調和平旦頓服須臾猥猥然欲吐擲之若意中不盡明旦更服無不大嘔安穩治卒頭痛如破非中冷又非中風其痛是胸膈中痰厥氣上衝所致名為厥頭痛吐之即瘥方單煮茗作飲二三升許適冷暖飲二升須臾擲即吐吐畢又飲如此數過劇者須吐膽乃止不損人而渴則瘥蔥白湯治冷熱膈腋發時頭痛悶亂欲吐不得者方蔥白二七莖桃葉一把一作枇杷葉真珠恆山烏頭甘草各半兩右六味㕮咀以水酒各四升和煮取三升去滓內珠每服一升吐即止大五飲圓主五種飲一曰留飲停水在心下二曰澼飲水澼在兩脅下三曰痰飲水在胃中四曰溢飲水溢在膈上五臟間五曰流飲水在腸間動搖有聲夫五飲者由飲酒後及傷寒飲冷水過多所致方蓯蓉遠志苦參藜蘆烏賊骨白术甘遂大黃石膏栝蔞根桔梗半夏紫菀前胡五味子芒硝桂心芫花當歸人參貝母茯苓芍藥大戟葶藶黃芩各一兩甘草恆山薯蕷厚朴細辛附子各二分巴豆三十枚右三十三味為末蜜和丸如梧子大飲服三丸日三稍稍加之以知為度旋復花圓治停痰澼飲結在兩脅腹脹滿羸瘦不能食食不消化喜唾乾嘔大小便或澀或利腹中動搖作水聲腹內熱口乾好飲水漿卒起頭眩欲倒脅下痛方旋復花桂心枳實人參各五兩甘遂三分吳茱茰細辛大黃黃芩葶藶厚朴芫花橘皮各四分乾薑芍藥白术各六分茯苓狼毒烏頭礜石各八分右二十味為末蜜丸如梧子大酒服五丸日二後加以知為度延年方無白术狼毒烏頭礜石細辛黃芩厚朴吳茱茰芫花橘皮甘遂有皂莢附子各二分蜀椒防葵杏仁各三兩乾地黃四分中軍候黑圓治澼飲停結滿悶目暗方黑又作里芫花三兩巴豆八分杏仁五分桂心桔梗各四分右五味為末蜜丸如胡豆每日服三丸稍增得快下止順流紫圓治心腹積聚兩脅脹滿留飲痰澼大小便不利小腹切痛膈上塞方石膏五分代赭烏賊骨半夏各三分桂心四分巴豆七枚右六味為末蜜丸如胡豆平旦服一丸加至二丸胡洽有藜蘆蓯蓉當歸各三分范注方無石膏半夏有當歸一分茯苓三分蓯蓉二分藜蘆五分治停痰澼飲結在兩脅腹滿羸瘦不能飲食食不消喜唾乾嘔大小便或澀或利方旋復花大黃附子茯苓椒目桂心芫花狼毒乾薑芍藥枳實細辛各八分右十二味為末蜜丸如梧子飲下三丸日三服後漸增治風氣膈上痰飲方不開口苦瓠湯煮三五沸以物裹尉心膈上治結積留飲澼囊胸滿飲食不消方灸通谷五十壯九蟲第七論方論曰人腹中有尸蟲此物與人俱生而為人大害尸蟲之形狀似大馬尾或如薄筋依脾而居乃有頭尾皆長三寸又有九蟲一曰伏蟲長四分二曰蛔蟲長一尺三曰白蟲長一寸四曰肉蟲狀如爛杏五曰肺蟲狀如蠶六曰胃蟲狀如蝦蟇七曰弱蟲狀如瓜瓣八曰赤蟲狀如生肉九曰蟯蟲至細微形如菜蟲狀伏蟲則羣蟲之主也蛔蟲貫心則殺人白蟲相生子孫轉多其母轉大長至四五丈亦能殺人肉蟲令人煩滿肺蟲令人咳嗽胃蟲令人嘔吐胃逆喜噦弱蟲又名膈蟲令人多唾赤蟲令人腸鳴蟯蟲居胴腸之間多則為痔劇則為癩因人瘡痍即生諸癰疽癬瘻瘑疥齲蟲無所不為人亦不必盡有有亦不必盡多或偏有或偏無類婦人常多其蟲凶惡人之極患也常以白筵草沐浴佳根葉皆可用既是香草且是尸蟲所畏也論曰凡欲服補藥及治諸病皆須去諸蟲并痰飲宿澼醒醒除盡方可服補藥不爾必不得藥力治肝勞生長蟲在肝為病恐畏不安眼中方蠟吳茱茰東行根皮各三兩乾漆四兩雞子五枚去黃粳米粉半斤右五味搗茱茰皮為末和藥銅器中煎可丸如小豆大宿勿食平旦飲服一百丸小兒五十丸蟲當爛出集驗方無茱茰根名雞子丸治心勞熱傷心有長蟲名曰蟲長一尺貫心為病方雷丸橘皮桃仁一作桃皮石蠶各五分狼牙六分貫衆二枚殭蠶三七枚吳茱茰根皮七分蕪荑青葙乾漆各四分亂髮如雞子大燒右十二味為末蜜丸如梧子空腹苦酒下七丸加至二七丸日二服一方無石蠶治脾勞熱有白蟲在脾中為病令人好嘔下蟲方大麻子八升東引吳茱茰根大者一尺橘皮二兩右三味㕮咀以水煎臨時量服凡合禁聲勿語道作藥蟲當聞便不下切忌之治肺勞熱生蟲在肺為病方狼牙三兩東行桑根白皮切一升東行吳茱茰根白皮五合右三味㕮咀以酒七升煮取一升平旦頓服之治腎勞熱四肢腫急蟯蟲狀如菜蟲在腎中為病方蕪荑胡粉槐皮各一兩乾漆二兩貫衆三枚杏仁四十枚吳茱茰五十枚右七味治下篩平旦井花水服方寸匕加至一匕半瘥止治蟯蟲方以好鹽末二兩苦酒半升合銅器中煮數沸宿不食空心頓服之又方真珠二兩亂髮如雞子大燒末右二味治下篩以苦酒調旦起頓服之肘後方用治三蟲蘼蕪圓治少小有蛔蟲結在腹中數發腹痛微下白汁吐悶寒熱飲食不生肌皮肉痿黃四肢不相勝舉方蘼蕪貫衆雷丸山茱茰天門冬狼牙各八分雚蘆甘菊花各四分右八味為末蜜丸如大豆三嵗飲服五丸五嵗以上以意加之漸至十丸加雚蘆六分名雚蘆丸治老小及婦人等萬病腹內冷熱不通急滿痛胸膈堅滿手足煩熱上氣不得飲食身體氣腫腰腳不遂腹內狀如水雞鳴婦人月經不調無所不治治蛔蟲方雚蘆末以飲臛和服方寸匕不覺加之備急以治蟯蟲治熱患有蛔蟲懊憹方雚蘆十分乾漆萹竹各二分右三味治下篩米飲和合服之日三治蛔蟲在胃中漸漸羸人方醇酒好漆外臺作好鹽白蜜各一升右三味內銅器中微火煎令可丸如桃核一枚溫酒中宿勿食旦服之蟲必下未下更服外臺治蟯蟲又方取棟實淳苦酒中浸再宿用綿裹內榖道中入三寸一日易之集驗方用治長蟲治蛔蟲攻心腹痛方銼薏苡根二斤以水七升煮取三升先食服之蟲即死出又方鶴蝨苦酒空腹服方寸匕佳又方七月七日採蒺藜子隂乾燒灰先食服方寸匕日三即瘥治寸白蟲方吳茱茰細根一把熟搗大麻子三升熬搗末右二味以水三升和搦取汁平旦頓服至巳時與好食令飽須臾蟲出不瘥明旦更合服之不瘥三日服肘後治三蟲以酒漬取汁服又方蕪荑六分狼牙四分白斂二分右三味治下篩以苦酒二合和一宿次早空腹服之又方胡麻一升胡粉一兩右二味為末明旦空腹以豬肉臛汁噉盡即瘥又方棐子四十九枚去皮以月上旬平旦空腹服七枚七日服盡蟲消成水永瘥又方取吳茱茰北隂根乾去土切一升以酒一升浸一宿平旦分二服凡茱茰皆用細根東引北隂者良若如指以上大不在用又方用石榴根如茱茰法亦可水煮又方研大麻取汁五升分五服亦治小兒蛔蟲又方以好油麻二升煎令熟內蔥白三寸蔥白黑便熟冷頓服之又方熬餳令十分燥作末以藥方寸匕內羊肉臛中服之又方桑根白皮切三升以水七升煮取二升宿勿食平旦空腹頓服肘後云卒大行中見是腹中已多蟲故也宜速理之又方檳榔二七枚治下篩以水二升半先煮其皮取一升半去滓內末頻服暖臥蟲出或不盡更合服取瘥止宿勿食旦服之論曰凡得傷寒及天行熱病腹中有熱又人食少腸胃空虛三蟲行作求食蝕人五臟及下部若齒齗無色舌上盡白甚者脣裏有瘡四肢沉重忽忽喜眠當數看其上脣內有瘡唾血脣內如粟瘡者心內懊憹痛悶此蟲在上蝕其五臟下脣內生瘡者其人喜眠此蟲在下蝕其下部人不能知可服此蝕蟲藥不爾𧈟蟲殺人又曰凡患濕𧈟者多是熱病後或久下不止或有客熱結在腹中或易水土溫涼氣著多生此病亦有乾𧈟不甚泄痢而下部瘡癢不問乾濕久則殺人凡濕得冷而苦痢單煮黃連及艾葉苦參之屬皆可用之若病人齒齗無色舌上白者或喜眠煩憒不知痛癢處或下痢急治下部不曉此者但攻其上不以下部為意下部生蟲蟲蝕其肛肛爛見五臟便死燒艾於竹筒熏之治傷寒𧈟病方取生雞子小頭叩出白入漆一合熟和攪令極調當沫出更內著殼中仰吞之食頃或半日乃吐下蟲劇者再服蟲盡熱除病愈治濕𧈟方黃連生薑各十兩艾葉八兩苦參四兩右四味㕮咀以水一斗煮取三升分三服久者服三劑懊憹散治濕𧈟瘡爛殺蟲除𧈟方篇竹半兩雚蘆雷丸青葙女青桃仁各三兩右六味治下篩粥飲服方寸匕日三加至二匕亦酒服青葙散治熱病有𧈟下部生瘡方青葙子一兩橘皮篇竹各二兩雚蘆四兩甘草一分狼牙三分右六味治下篩米飲和每服一合日三不止稍加之小品無甘草薑蜜湯治濕𧈟方生薑汁五合白蜜三合黃連三兩右三味以水二升别煮黃連取一升去滓內薑蜜更煎取一升二合五嵗兒平旦空腹服四合日二治𧈟蟲蝕下部癢榖道中生瘡方阿膠當歸青葙子各二兩艾葉一把右四味㕮咀以水八升煮取二升半去滓分三服杏仁湯治𧈟方杏仁五十枚苦酒二升鹽一合右三味和煮取五合頓服之小兒以意量服桃皮湯治蟯蟲蛔蟲及痔𧈟蟲食下部生瘡方桃皮艾葉各一兩槐子三兩大棗三十枚右四味㕮咀以水三升煮取半升頓服之良豬膽苦酒湯治熱病有𧈟上下攻移殺人方豬膽一具苦酒半升和之火煎令沸三上三下藥成放溫空腹飲三滿口蟲死便愈治溫病下部有瘡蟲蝕人五臟方雄黃皂莢各一分麝香朱砂各二分右四味為末蜜和搗萬杵初得病酒服如梧子大一丸日二若下部有瘡取如梧子大末內下部日二治下部生瘡方濃煮桃皮煎如糖取內下部口中有瘡含之治濕𧈟方取生薑刮去皮斷理切之極熟研取汁一升半又以水一升半合和相得平旦空腹服仍削生薑二枚如繭大以楸葉苦桃葉數重裹訖於爐死火中燒令極熱內下部中食頃若濕盛者三旦作頻服無有不瘥又方青黛二兩黃連黃蘗丁香各一兩麝香二分右五味治下篩以小棗大內下部中日一度重者棗大和車脂二三合灌下部中日二服雄黃兊散治時氣病𧈟下部生瘡方雄黃半兩桃仁一兩青葙子黃連苦參各三兩右五味為末綿裹如棗核大內下部亦可棗汁服方寸匕日三治病𧈟蟲方燒馬蹄灰作末以豬脂和傳綿繩上內下部中日四五度治大孔蟲癢方蒸大棗取膏以水銀和捻長三寸綿裹訖宿內大孔中明旦蟲皆出水銀損腸宜慎之治蟲蝕下部方胡粉雄黃右二味各等分為末著榖道中亦治小兒治傷寒熱病多睡變成濕𧈟四肢煩疼不得食方羊桃十斤切搗令熟暖湯三斗淹浸之日正午時入中坐一炊久不過三度瘥治熱病蛄毒令人喜寐不知痛處面赤如醉下利膿血當數視其人下部大小之孔稷稷然一云搜搜然赤則𧈟瘡者也劇因殺人見人肝肺服藥不瘥可熏之之方以泥作小罌令受一升竹筒一枚如指大者一頭橫穿入罌腹中一頭內人榖道中淺入可取熟艾如雞子大著罌中然之於罌口吹煙令入人腹艾盡乃止大人可益艾小兒減之羸者不得多多亦害人日再熏不過三作蟲則死下斷亦可末燒雄黃如此熏之備急千金要方卷五十八
