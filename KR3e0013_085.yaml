body:
  text: 備急千金要方卷八十五唐孫思邈撰宋林億等校正平脈五臟積聚第七人病有積有聚有榖氣榖一作繫夫積者藏病終不移也聚者腑病發作有時展轉痛移為可治也穀氣者脅下牽痛按之則愈愈復發為穀氣夫病已愈不得復發令病復發即為穀氣也諸積大法脈來而細軟附骨者為積也寸口結積在胸中微出寸口積在喉中關上結積在臍傍微下關者積在小腹尺中結積在氣衝上關上積在心下脈出在左積在左脈出在右積在右脈兩出積在中央各以其部處之寸口沈而橫者脅下及腹中有橫積痛其脈弦腹中急痛腰背痛相引腹中有寒疝瘕脈弦緊而細微者癥也夫寒痺癥瘕積聚之脈狀皆弦緊若在心下即寸弦緊在胃管即關弦緊在臍下即尺弦緊一曰關脈長弦有積在臍左右上下又脈癥法左手脈橫癥在左右手脈橫癥在右脈頭大在上頭小在下又一法橫脈見左積在右見右積在左偏得洪實而滑亦為積弦緊亦為積為寒痺為疝痛內有積不見脈難治見一脈相應為易治諸不相應為不合治也左手脈大右手脈小上病在左脅下病在左足右手脈大左手脈小上病在右脅下病在右足脈弦而伏者腹中有癥不可轉也必死不治脈來沈而細時直者身有癰腫若腹中有伏梁脈來沈而虛者泄注也脈來小沈實者胃中有積聚不可下食即吐陰陽表裏虛實第八弦為小陽緩為陽明洪為太陽三陽也微為少陰遲為厥陰沈為太陰三陰也脈有一陰一陽一陰二陽一陰三陽有一陽一陰一陽二陰一陽三陰如此言之寸口有六脈俱動耶然經言如此者非有六脈俱動也謂浮沈長短滑澀也凡脈浮滑長者陽也沈澀短者陰也所以言一陰一陽者謂脈來沈而滑也一陰二陽者謂脈來沈滑而長也一陰三陽者謂脈來浮滑而長時一沈也所以言一陽一陰者謂脈來浮而澀也一陽二陰者謂脈來長而沈澀也一陽三陰者謂脈來沈澀而短時一浮也各以其經所在言病之逆順也脈有陽盛陰虛陰盛陽虛何謂也然浮之損小沈之實大故曰陰盛陽虛沈之損小浮之實大故曰陽盛陰虛是謂陰陽虛實之意也凡脈浮大數動長滑陽也沈澀弱弦短微陰也陽病見陰脈者逆也主死陰病見陽脈者順也主生關前為陽關後為陰陽數即吐陰微即下陽弦則頭痛陰弦即腹痛以依陰陽察病也又尺脈為陰陰脈常沈而遲寸關為陽陽脈但浮而速有表無裏邪之所止得鬼病何謂表裏寸尺為表關為裏兩頭有脈關中絶不至也尺脈上不至關為陰絶寸脈下不至關為陽絶陰絶而陽微死不治呼為表屬腑吸為裏屬臟陽微不能呼陰微不能吸呼吸不足胸中短氣弱反在關濡反在巔微在其上澀反在下微即陽氣不足活熱汗出澀即無血厥而且寒諸腑脈為陽主熱諸臟脈為陰主寒陽微則汗陰浮自下脈經作陰微陽數口生瘡陰數加微必惡寒而煩擾不得眠陽芤吐血脈經作陽數則吐血陰芤下血脈經作陰澀即下血無陽即厥無陰即嘔寸口脈浮大而疾者名曰陽中之陽病苦煩滿身熱頭痛腹中熱寸口浮沈細者名曰陽中之陰病苦悲傷不樂惡聞人聲少氣時汗出陰氣不通不通一作併臂不能舉巢源作臂偏不舉尺脈沈細者名曰陰中之陰病苦兩脛酸疼不能久立陰氣衰小便餘瀝陰下濕癢尺脈滑而浮大者名曰陰中之陽病苦小腹痛滿不能溺溺即陰中痛大便亦然尺脈牢而長關中無有此為陰干陽其人苦兩脛重小腹引腰痛寸口壯大尺中無有此為陽干陰其人苦腰背痛陰中傷足脛寒人有三虛三實者何謂也然有脈之虛實有病之虛實有診之虛實脈之虛實者脈來濡者為虛牢者為實也病之虛實者出者為虛入者為實言者為虛不言者為實緩者為虛急者為實也診之虛實者癢者為虛痛者為實外痛內快為外實內虛內痛外快為內實外虛故曰虛實也問曰何謂虛實答曰邪氣盛則實精氣奪則虛何謂重實所謂重實者大熱病氣熱脈滿是謂重實也脈盛皮熱腹脹前後不通􅀢瞀為五實脈細皮寒氣少泄痢注前後飲食不入為五虛也何時得病第九何以知人露臥得病陽中有陰也何以知人夏月得病諸陽入陰也何以知人春得病無肝脈也無心脈夏得病無肺脈秋得病無腎脈冬得病無脾脈四季之月得病扁鵲華他察聲色要訣第十病人五臟已奪神明不守聲嘶者死病人循衣縫譫言者不可治病人陰陽俱絶掣衣掇空妄言者死病人妄語錯亂及不能語者不治熱病者可治病人陰陽俱絶失音不能言者三日半死病人兩目眥有黃色起者其病方愈病人面黃目青者不死青如草滋死病人面黃目赤者不死赤如衃血死病人面黃目白者不死白如枯骨死病人面黃目黑者不死黑如炲死病人面目俱等者不死病人面黑目青者不死病人面青目白者死病人面赤目青者六日死病人面黃目青者九日必死是謂亂經飲酒當風邪入胃經膽氣妄泄目則為青雖有天救不可復生病人面赤目白者十日死憂恚思慮心氣內索面色反好急求棺槨病人面白目黑者死此謂榮華已去血脈空索病人面黑目白者八日死腎氣內傷病因留積病人面青目黃者五日死病人著牀心痛短氣脾竭內傷百病復愈能起傍徨因坐於地其立倚牀能治此者可謂神良病人面無精光若土色不受飲食者四日死病人目無精光及牙齒黑色者不治病人耳目鼻口有黑色起入于口者必死病人耳目及顴頰赤者死在五日中病人黑色出於額上髮際下直鼻脊兩顴上者亦死在五日中病人及健人黑色若白色起入目及鼻口者死在三日中病人及健人面忽如馬肝色望之如青近之如黑者死病人面黑目直視惡風者死病人面黑脣青者死病人面青脣黑者死病人面黑兩脅下滿不能自轉反者死病人目回回直視肩息者一日死病人陰結陽絶目精脫恍惚者死病人陰陽絶竭目眶陷者死病人眉系傾者七日死病人口如魚口不能復閉而氣出多不返者死病人口張者三日死病人脣青人中反者三日死病人脣反人中滿者死病人脣口忽乾者不治病人脣腫齒焦者死病人齒忽變黑者十三日死病人舌卷卵縮者必死病人汗出不流舌卷黑者死病人髮直者十五日死病人髮如乾麻善怒者死病人髮與眉衝起者死病人爪甲青者死病人爪甲白者不治病人手足爪甲下肉黑者八日死病人榮衛竭絶面浮腫者死病人卒腫其面蒼黑者死病人手掌腫無文者死病人臍腫反出者死病人陰囊莖俱腫者死病人脈絶口張足腫者五日死病人足趺腫嘔吐頭重者死病人足趺上腫兩膝大如斗者十日死病人臥遺屎不覺者死病人尸臭者不可治肝病皮白肺之日庚辛死心病目黑腎之日壬癸死脾病脣青肝之日甲乙死肺病頰赤目腫心之日丙丁死腎病面腫脣黃脾之日戊巳死青欲如蒼璧之澤不欲如藍赤欲如帛裏朱不欲如頳白欲如鵝羽不欲如鹽黑欲如重漆不欲如炭黃欲如羅裹雄黃不欲如黃土診五臟六腑氣絶證候第十一病人肝絶八日死何以知之面青但欲伏眠目視而不見人汗一作泣出如水不止一曰二日死病人膽絶七日死何以知之眉為之傾病人筋絶九日死何以知之手足爪甲青呼罵不休一曰八日死病人心絶一日死何以知之肩息回視立死一曰目亭亭二日死病人腸一云小腸絶六日死何以知之髮直如乾麻不得屈伸自汗不止病人脾絶十二日死何以知之口冷足腫腹熱臚脹泄利不覺出無時度一曰五日死病人胃絶五日死何以知之脊痛腰中重不可反覆一曰腓腸平九日死病人肉絶六日死何以知之耳乾舌皆腫溺血大便赤泄一曰足腫九日死病人肺絶三日死何以知之口張但氣出而不還一曰鼻口虛張短氣病人大腸絶不治何以知之泄利無度利絶則死病人腎絶四日死何以知之齒為暴枯面為正黑目中黃色腰中欲折白汗出如流水一曰人中平七日死病人骨絶齒黃落十日死諸浮脈無根者皆死已上五臟六腑為根也診四時相反脈第十二春三月木旺肝脈治當先至心脈次之肺脈次之腎脈次之此為王相順脈也到六月土王脾脈當先至而反不至反得腎脈此為腎反脾也七十日死何謂腎反脾夏火王心脈當先至肺脈次之而反得腎脈是謂腎反脾期五月六月忌丙丁脾反肝三十日死何謂脾反肝脈當先至而反不至脾脈先至是謂脾反肝期正月二月忌甲乙腎反肝三歲死何謂腎反肝春肝脈當先至而反不至腎脈先至是謂腎反肝期七月八月忌庚辛腎反心二歲死何謂腎反心夏心脈當先至而反不至腎脈先至是謂腎反心期六月忌戊巳此中不論肺金之氣踈略未諭指南又推五行亦頗顚倒待求别録上凡療病察其形貌神氣色澤脈之盛衰病之新故乃可治之形氣相得色澤以浮脈從四時此為易治形氣相失色夭不澤脈實堅甚脈逆四時此為難治逆四時者春得肺脈夏得腎脈秋得心脈冬得脾脈其至皆懸絶澀者曰逆春夏沈澀秋冬浮大病熱脈靜泄痢脈大脫血脈實病在中脈堅實病在外脈不實名逆四時皆難療也凡四時脈皆以胃氣為本雖有四時王相之脈無胃氣者難瘥也何謂胃脈來弱以滑者是也命曰易治診脈動止投數踈數死期年月第十三脈一動一止二日死一經云一日死脈二動一止三日死脈三動一止四日死或五日死脈四動一止六日死脈五動一止七日死或五日死脈六動一止八日死脈七動一止九日死脈八動一止十日死脈九動一止九日死又云十一日死一經云十三日死若立春死脈十動一止立春死一經云立夏死脈十一動一止立夏死一經云夏至死又云立秋死脈十二動十三動一止立秋死一經云立冬死脈十四動十五動一止立冬死一經云立夏死脈二十動一止一歲死若立秋死脈二十一動一止二歲死脈二十五動一止二歲死一經云一歲死又云立冬死脈三十動一止二歲死若三歲死脈三十五動一止三歲死脈四十動一止四歲死脈五十動一止五歲死不滿五十動一止五歲死五行氣畢陰陽數同榮衛出入經脈通流晝夜百刻五德相生脈來五十投而不止者五臟皆受氣即無病也脈來四十投而一止者一臟無氣却後四歲春草生而死脈來三十投而一止者二臟無氣却後三歲麥熟而死脈來二十投而一止者三臟無氣却後二歲桑椹赤而死脈來十投而一止者四臟無氣歲中死得節不動出清明死逺不出榖雨死矣脈來五動而一止者五臟無氣却後五日而死脈一來而久住者宿病在心主中治脈二來而久住者病在肝枝中治脈三來而久住者病在脾下中治脈四來而久住者病在腎間中治脈五來而久住者病在肺枝中治五脈病虛羸人得此者死所以然者藥不得而治針不得而及盛人可治氣全故也備急千金要方卷八十五
