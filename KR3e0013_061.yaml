body:
  text: 備急千金要方卷六十一唐孫思邈撰宋林億等校正膀胱腑方膀胱腑脉論第一論曰膀胱者主腎也耳中是其候也腎合氣於膀胱膀胱者津液之腑也號水曹掾名玉海重九兩二銖左囘疊積上下縱廣九寸受津液九升九合兩邊等應二十四氣鼻空在外膀胱漏泄黄帝曰夫五臓各一名一形腎乃獨兩何也岐伯曰膀胱為腑有二處腎亦二形應腑有二處臓名一腑名二故五臓六腑也一説腎有左右而膀胱無二今用當以左腎合膀胱右腎合三焦左手關後尺中陽絶者無膀胱脉也病苦逆冷婦人月使不調王月則閉男子失精尿有餘瀝刺足少隂經治隂在足内踝下動脉是也右手關後尺中陽絶者無子戸脉也病苦足逆寒絶産帶下無子隂中寒刺足少隂經治隂左手關後尺中陽實者膀胱實也病苦逆冷脅下邪氣相引痛刺足太陽經治陽在足小趾外側本節後陷中右手關後尺中陽實者膀胱實也病苦小腹滿引腰痛刺足太陽經治陽病先發於膀胱者背膂筋痛小便閉五日之腎小腹腰脊痛脛痠一日之小腸脹一日之脾閉塞不通身痛體重二日不已死冬雞鳴夏下晡一云日夕膀胱病者小腹偏腫而痛以手按之則欲小便而不得肩上熱若脉陷及足小趾外側及脛踝後皆熱若脉陷取委中膀胱脹者小腹滿而氣癃腎前受病𫝊於膀胱腎欬不已欬則遺溺厥氣客於膀胱則夢遊行腎應骨宻理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄腠理疎者三焦膀胱緩急皮而無毫毛者三焦膀胱急毫毛美而粗者三焦膀胱直稀毫毛者三焦膀胱結也扁鵲云六腑有病徹面形腎膀胱與足少隂太陽為表裏膀胱總通於五臓所以五臓有疾即應膀胱膀胱有疾即應胞囊傷熱則小便不通膀胱急尿苦黄赤傷寒則小便數清白或發石水根在膀胱四肢小其腹獨大也方見治水篇中骨絶不治齒黄落十日死足太陽之脉起於目内眥上額交巔上其支者從巔至耳上角其直者從巔入絡腦還出别下項循肩膊内俠脊抵腰中入循膂絡腎屬膀胱其支者從腰中下會於後隂下貫臀入膕中其支者從膊内左右别下貫胂一作髖過髀樞循髀外後臁下合膕中以下貫腨内出外踝之後循京骨至小指外側是也動則病衝頭痛目似脱項似拔脊痛腰似折髀不可以曲一作囘膕如結腨如列是為踝厥是主筋所生病者痔瘧狂癲疾頭腦項痛目黄淚出􅍠衂項背腰尻膕腨脚皆痛小指不用盛者則人迎大再倍於寸口虚者則人迎反小於寸口也膀胱虚實第二脉法方灸膀胱實熱左手尺中神門以後脉陽實者足太陽經也病苦逆滿腰中痛不可俛仰勞也名曰膀胱實熱也右手尺中神門以後脉陽實者足太陽經也病苦胞轉不得小便頭眩痛煩滿脊背强名曰膀胱實熱也治膀胱實熱方石膏八兩梔子仁一作𤓰子仁茯苓知母各三兩蜜五合淡竹葉生地黄各切一升右七味㕮咀以水七升煮取二升去滓下蜜煮二沸分三服須利加芒硝三兩治膀胱熱病不已舌乾咽腫方蜜七合升麻大青各三兩射干生𤣥參黄蘗薔薇根白皮各四兩右七味以水七升煮取一升去滓下蜜煮二沸細細含之膀胱虚冷左手尺中神門以後脉陽虚者足太陽經也病苦脚中筋急腹中痛引腰背不可屈伸轉筋惡風偏枯腰痛外踝後痛名曰膀胱虚冷也右手尺中神門以後脉陽虚者足太陽經也病苦肌肉振動脚中筋急耳聾忽忽不聞惡風颼颼作聲名曰膀胱虚冷也治膀胱虚冷饑不欲飲食面黒如炭腰脅疼痛方磁石六兩黄耆茯苓各三兩五味子杜仲各四兩白术白石英各五兩右七味㕮咀以水九升煮取三升分三服治膀胱冷欬唾則有血喉鳴喘息方羊腎一具人參𤣥參黄耆桂心芎藭甘草各三兩茯苓四兩地骨皮生薑各五兩白术六兩右十一味㕮咀以水一斗二升先煮羊腎減三升去腎下藥煮取三升去滓分為三服龍骨圓治膀胱腎冷坐起欲倒目􅉩􅉩氣不足骨痿方龍骨栢子仁乾地黄甘草防風各五分黄耆禹餘糧白石英桂心茯苓各七分五味子羌活人參附子各六分山茱茰𤣥參芎藭各四分磁石杜仲乾薑各八分右二十味為末蜜丸如梧子大空腹酒服三十丸日二加至四十丸治膀胱寒小便數漏精稠厚如米白泔方赤石脂白石脂各五分乾地黄三分蓯蓉六分赤雄雞腸雞肶胵各兩具桑螵蛸牡蠣龍骨黄連各四分右十味治下篩内雞腸及肶胵中縫塞蒸令熟曝乾合𢷬為散以酒和服方寸匕日三治膀胱方灸之如腎虚法胞囊論第三論法方灸論曰胞囊者腎膀胱候也貯津液并尿若臓中熱病者胞澀小便不通尿黄赤若腑中寒病者胞滑小便數而多白若至夜則尿偏甚者夜則内隂氣生故熱則瀉之寒則補之不寒不熱依經調理則病不生矣凡尿不在胞中為胞屈僻津液不通以蔥葉除尖頭内隂莖孔中深三寸㣲用口吹之胞脹津液大通即愈榆皮通滑泄熱煎治腎熱應胞囊澀熱小便黄赤苦不通方榆白皮赤蜜葵子各一升滑石通草各三兩車前子五升右六味㕮咀以水三斗煮取七升去滓下蜜更煎取三升分三服婦人難産亦同此方滑石湯治膀胱急熱小便黄赤方滑石八兩子芩三兩車前子冬葵子一升榆白皮四兩右五味㕮咀以水七升煮取三升分三服治虚勞尿白濁方右取榆白皮切二斤水二斗煮取五升分五服又方𢷬乾羊骨為末服方寸匕日二又方灸脾輸一百壮又灸三焦輸百壮又灸腎輸百壮又灸章門百壮在季肋端凡飽食後或忍小便或走馬或忍小便大走及入房皆致胞轉臍下急滿不通治之之方右用亂髪急纒如兩拳大燒為末醋四合和二方寸匕服之訖即炒熟黒豆葉蹲坐上治胞轉方石韋一兩葵子通草甘草各二兩鬼箭三兩滑石四兩榆白皮一升右七味㕮咀以水一斗煮取三升分三服治丈夫婦人胞轉不得小便八九日者方葵子一升滑石寒水石各一斤右三味㕮咀以水一斗煮取五升分三服治胞轉小便不得方蔥白四七莖阿膠一兩琥珀三兩車前子一升右四味㕮咀以水一斗煮取三升分三服又方阿膠三兩水二升煮取七合頓服又方豉五合以水三升煮數沸頓服之又方麻子煮取汁頓服之又方連耞關燒灰水服之又方筆頭燒灰水服之又方燒死蜣蜋二枚末水服之又方内白魚子莖孔中又方酒和猪脂雞子大頓服之治腰痛小便不利苦胞轉方灸玉泉七壮穴在關元下一寸大人從心下度取八寸是玉泉穴小兒酙酌以取之又灸第十五椎五十壮又灸臍下一寸又灸臍下四寸各隨年壮三焦脉論第四論曰夫三焦者一名三關也上焦名三管反射中焦名霍亂下焦名走哺合而為一有名無形主五臓六腑徃還神道周身貫體可聞不可見和利精氣決通水道息氣腸胃之間不可不知也三焦名中清之腑别號玉海水道出屬膀胱合者雖合而不同上中下三焦同號為孤腑而榮出中焦衛出上焦榮者絡脉之氣道也衛者經脉之氣道也其三焦相形厚薄大小並同膀胱之形云三焦病者腹脹氣滿小腹尤堅不得小便窘急溢則為水留則為脹候在足太陽之外大絡在太陽少陽之間亦見于脉取委陽小腹腫痛不得小便邪在三焦約取太陽大絡視其結脉與厥隂小絡結而血者腫上及胃管取三里三焦脹者氣滿於皮膚殻殻而不堅疼一云殻殻而堅乆欬不已𫝊之三焦欬而腹滿不欲飲食也手少陽之脉起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆交膻中散絡心胞下隔徧屬三焦其支者從膻中上出缺盆上項俠耳後直上出耳上角以屈下額至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目兑眥是也動則病耳聾煇煇焞焞嗌腫喉痺是主氣所生病者汗出目兊眥痛頰腫耳後肩臑肘臂外皆痛小指次指不用為此諸病盛則瀉之虚則補之熱則疾之寒則留之陷下則灸之不盛不虚以經取之盛者人迎大再倍於寸口虚者人迎反小於寸口也三焦虚實第五論法方灸論曰夫上焦如霧霧者霏霏起上也其氣起於胃上管難經甲一巢源作上口並咽以上貫膈布胷中走腋循足太隂之外而行還注於手陽明上至舌下注足陽明常與榮衛俱行於陽二十五度行於隂二十五度為一周日夜五十周身周而復始大會於手太隂也主手少陽心肺之病内而不出人有熱則飲食下胃其氣未定汗則出或出於面或出於背身中皆熱不循衛氣之道而出者何也此外傷於風内開腠理毛蒸理泄衛氣走之固不得循其道此氣慓悍滑疾見開而出故不得從其道名曰漏氣其病則肘攣痛食先吐而後下其氣不續膈間厭悶所以飲食先吐而後下也寒則精神不守泄下便痢語聲不出若實則上絶於心若虚則引氣於肺也澤瀉湯通脉泄熱治上焦飲食下胃胃氣未定汗出面背身中皆熱名曰漏氣方澤瀉半夏柴胡生薑各三兩桂心甘草各一兩茯苓人參各二兩地骨皮五兩石膏八兩竹葉五合蓴心一升右十二味㕮咀以水二斗煮取六升分五服一云水一斗煮取三升分三服麥門冬理中湯治上焦熱腹滿不欲飲食或食先吐而後下肘攣痛方麥門冬生蘆根竹茹廩米各一升蓴心五合甘草茯苓各二兩橘皮人參萎蕤各三兩生薑四兩白术五兩右十二味㕮咀以水一斗二升煮取三升分三服治胸中膈氣聚痛好吐方右灸厥隂輸穴在第四椎兩邊各相去一寸五分隨年壮黄耆理中湯治上焦虚寒短氣不續語聲不出方黄耆桂心各二兩五味子桔梗乾薑茯苓甘草芎藭各三兩丹參杏仁各四兩右十味㕮咀以水九升煮取三升分為三服黄連圓治上焦冷下痢腹内不安食好注下方黄連烏梅肉各八兩桂心二兩乾薑附子阿膠各四兩櫸皮芎藭黄蘗各三兩右九味為末蜜丸如梧子大飲下二十丸加至三十丸厚朴湯治上焦閉塞乾嘔嘔而不出熱少冷多好吐白沫清涎吞酸方厚朴茯苓芎藭白术𤣥參各四兩桔梗附子人參橘皮各三兩生薑八兩吳茱茰八合右十一味㕮咀以水二斗煮取五升分為五服論曰中焦如漚漚者在胃中如漚也其氣起於胃中管難經作中口甲乙巢源作胃口在上焦之後此受氣者主化水穀之味祕糟粕蒸津液化為精㣲上注於肺脉乃化而為血奉以生身莫貴於此故獨得行於經隧名曰榮氣主足陽明陽明之别號曰豐隆在外踝上去踝八寸别走太隂絡諸經之脉上下絡太倉主腐熟五榖不吐不下實則生熱熱則閉塞不通上下隔絶虚則生寒寒則腹痛洞泄便痢霍亂主脾胃之病夫血與氣異形而同類衛氣是精血氣是神故血與氣異名同類焉而脱血者無汗此是神氣奪汗者無血此是精氣故人有兩死刪繁作一死而無兩生猶精神之氣隔絶也若虚則補於胃實則瀉於脾調其中和其源萬不遺一也大黄瀉熱湯開關格通隔絶治中焦實熱閉塞上下不通隔絶關格不吐不下腹脹膨膨喘急方蜀大黄切以水一升浸黄芩澤瀉升麻芒硝各三兩羚羊角梔子各四兩生𤣥參八兩地黄汁一升右九味㕮咀以水七升煮取二升三合下大黄更煮兩沸去滓下硝分三服藍青圓治中焦熱水榖下痢方藍青汁三升黄連八兩黄蘗四兩烏梅肉地膚子地榆白术各二兩阿膠五兩右八味為末以藍青汁和微火煎丸如杏仁大飲服三丸日二七月七日合大良當併手丸之黄連煎治中焦寒洞泄下痢或因霍亂後瀉黄白無度腹中虚痛方黄連酸石榴皮地榆阿膠各四兩黄蘗當歸厚朴乾薑各二兩右八味㕮咀以水九升煮取三升去滓下阿膠更煎取烊分三服治四肢不可舉動多汗洞痢方右灸大横隨年壮穴在俠臍兩邊各二寸五分論曰下焦如瀆瀆者如溝水決洩也其氣起下胃管别回腸注於膀胱而滲入焉故水穀者常并居於胃中成糟粕而俱下於大腸主足太陽灌滲津液合膀胱主出不主入别於清濁主肝腎之病候也若實則大小便不通利氣逆不續嘔吐不禁故曰走哺若虚則大小便不止津液氣絶人飲酒入胃榖未熟而小便獨先下者何蓋酒者熟榖之液也其氣悍以滑故後榖入而先榖出也所以熱則瀉於肝寒則補於腎也柴胡通塞湯治下焦熱大小便不通方柴胡羚羊角黄芩橘皮澤瀉各三兩香䜴一升别盛生地黄一升芒硝二兩梔子四兩石膏六兩右十味㕮咀以水一斗煮取三升去滓内芒硝分三服赤石脂湯治下焦熱或下痢膿血煩悶恍惚方赤石脂八兩烏梅二十枚梔子十四枚廩米一升白术升麻各三兩乾薑二兩右七味㕮咀以水一斗煮米取熟去米下藥煮取二升半分為三服止嘔人參湯治下焦熱氣逆不續嘔吐不禁名曰走哺方人參萎蕤黄芩知母茯苓各三兩生蘆根梔子仁白术橘皮各四兩石膏八兩右十味㕮咀以水九升煮取三升去滓分三服香豉湯治下焦熱毒痢魚腦雜痢赤血臍下小腹絞痛不可忍欲痢不出方香豉薤白各一升黄連黄蘗白术茜根各三兩梔子黄芩地榆各四兩右九味㕮咀以水九升煮取三升分三服治膀胱三焦津液下大小腸中寒熱赤白泄痢及腰脊痛小便不利婦人帶下方右灸小腸輸五十壮黄蘗止洩湯治下焦虚冷大小便洞泄不止方黄蘗人參地榆阿膠各三兩黄連五兩茯苓櫸皮各四兩艾葉一升右八味㕮咀以水一斗煮取三升去滓下膠消分三服人參續氣湯治下焦虚寒津液不止短氣欲絶方人參橘皮茯苓烏梅麥門冬黄耆乾薑芎藭各三兩吳茱茰三合桂心二兩白术厚朴各四兩右十二味㕮咀以水一斗二升煮取三升分三服茯苓圓治下焦虚寒損腹中瘀血令人喜忘不欲聞人語胷中噎塞而短氣方茯苓乾地黄當歸各八分甘草乾薑人參各七分黄耆六分芎藭五分桂心四分厚朴三分杏仁五十枚右十一味為末蜜丸如梧子初服二十丸加至三十丸為度日二清白飲下伏龍肝湯治下焦虚寒損或先見血後便轉此為近血或利不利方伏龍肝五合末乾地黄五兩一方用黄蘗阿膠牛膝一作牛蒡根甘草乾薑黄芩地榆各三兩髪灰二合右九味㕮咀以水九升煮取三升去滓下膠煮消下髪灰分為三服治下焦虚寒損或先便轉後見血此為逺血或利或不利好因勞冷即發宜續斷止血方續斷當歸桂心蒲黄阿膠各一兩甘草二兩乾薑乾地黄各四兩右八味㕮咀以水九升煮取三升半去滓下膠取烊下蒲黄分三服當歸湯治三焦虚損或上下發泄吐唾血皆從三焦起或熱損發或因酒發宜此方當歸乾薑小薊阿膠羚羊角乾地黄栢枝皮各三兩芍藥白术各四兩蒲黄五合青竹茹半升伏龍肝髪灰一雞子大黄芩甘草各二兩右十五味㕮咀以水一斗二升煮取三升半去滓下膠取烊次下髪灰及蒲黄分為三服灸法五臓六腑心腹滿腰背疼飲食吐逆寒熱徃來小便不利羸瘦少氣灸三焦輸隨年壮腹疾腰痛膀胱寒澼飲注下灸下極輸隨年壮三焦寒熱灸小腸輸隨年壮三焦膀胱腎中熱氣灸水道隨年壮穴在俠屈骨相去五寸屈骨在臍下五寸屈骨端水道俠兩邊各二寸半備急千金要方卷六十一
