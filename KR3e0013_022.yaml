body:
  text: 備急千金要方卷二十二唐孫思邈撰宋林億等校正風毒脚氣方論風毒狀第一十六章論曰考諸經方往往有脚弱之論而古人少有此疾自永嘉南渡衣纓士人多有遭者嶺表江東有支法存仰道人等並留意經方偏善斯術晉朝仕望多獲全濟莫不由此二公又宋齊之間有釋門深師師道人述法存等諸家舊方為三十卷其脚弱一方近百餘首魏周之代蓋無此病所以姚公集驗殊不慇懃徐王撰録未以為意特以三方鼎峙風教未一霜露不均寒暑不等是以關西河北不識此疾自聖唐開闢六合無外南極之地襟帶是重爪牙之寄作鎮於彼不習水土往者皆遭近來中國士大夫雖不渉江表亦有居然而患之者良由今代天下風氣混同物類齊等所致之耳然此病發初得先從脚起因即脛腫時人號為脚氣深師云脚弱者即其義也深師述支法存所用永平山敷施連范祖耀黄素等諸脚弱方凡八十餘條皆是精要然學者尋覽頗覺繁重正是方集耳卒欲救急莫測指南今取其所經用灼然有效者以備倉卒餘者不復具述論何以得之於脚問曰風毒中人隨處皆得作病何偏著於脚也答曰夫人有五臟心肺二臟經絡所起在手十指肝腎與脾三臟經絡所起在足十趾夫風毒之氣皆起於地地之寒暑風濕皆作蒸氣足常履之所以風毒之中人也必先中脚乆而不瘥遍及四肢腹背頭項也微時不覺痼滯乃知經云次傅間傳是也論得已便令人覺不凡脚氣病皆由感風毒所致得此病多不令人即覺㑹因他病一度乃始發動或奄然大悶經三兩日不起方乃覺之諸小庸醫皆不識此疾謾作餘病治之莫不盡斃故此病多不令人識也始起甚微食飲嬉戲氣力如故惟卒起脚屈弱不能動有此為異耳黄帝云緩風濕痺是也論風毒相貌夫有脚未覺異而頭項臂膊已有所苦有諸處皆悉未知而心腹五内已有所困又風毒之中人也或見食嘔吐憎聞食臭或有腹痛下痢或大小便秘澁不通或胸中衝悸不欲見光明或精神惽憒或喜迷妄語言錯亂或壯熱頭痛或身體酷冷疼煩或覺轉筋或腫不腫或䏶腿頑痺或時緩縱不隨或復百節攣急或小腹不仁此皆脚氣狀貌也亦云風毒脚氣之候也其候難知當須細意察之不爾必失其機要一朝病成難可以理婦人亦爾又有婦人産後春夏取凉多中此毒深宜慎之其熱悶掣瘲驚悸心煩嘔吐氣上皆其候也又但覺臍下冷痞愊愊然不快兼小便淋瀝不同生平即是脚氣之候頑弱名緩風疼痛為濕痺論得之所由凡四時之中皆不得久立久坐濕冷之地亦不得因酒醉汗出脱衣靴韈當風取涼皆成脚氣若暑月久坐久立濕地者則熱濕之氣蒸入經絡病發必熱四肢酸疼煩悶若寒月久坐久立濕冷地者則冷濕之氣上入經絡病發則四體酷冷轉筋若當風取涼得之者病發則皮肉頑痺諸處瞤動漸漸向頭凡常之日忽然暴熱人皆不能忍得者當於此時必不得頓取於寒以快意也卒有暴寒復不得受之皆生病也世有勤功力學之士一心注意于事乆坐行立于濕地不時動轉冷風來擊入於經絡不覺成病故風毒中人或先中手足十指因汗毛孔開腠理䟽通風如急箭或先中足心或先足趺或先中膝已下腨脛表裏者若欲使人不成病者初覺即灸所覺處二三十壯因此即愈不復發也黄帝云當風取涼醉己入房能成此疾論冷熱不同問曰何故得者有冷有熱答曰足有三隂三陽寒中三陽所患必冷暑中三隂所患必熱故有表裏冷熱冷熱不同熱者治以冷藥冷者療以熱藥以意消息之脾受陽毒即熱頑腎受隂濕即寒痺論因脚氣續生諸病雖患脚氣不妨乳石動發皆須服壓石藥療之夫因患脚氣續生諸病者則以諸藥對之或小便不利則以猪苓茯苓及諸利小便藥治之大便極堅者則以五柔麻仁丸等治之遍體腫滿成水病者則取治水方中諸治水之藥治之餘皆倣此更無拘忌論須療緩急凡小覺病候有異即須大怖畏決意急治之傷緩氣上入腹或腫或不腫胷脇逆滿氣上肩息急者死不旋踵寛者數日必死不可不急也但看心下急氣喘不停或自汗數出或乍寒乍熱其脉促短而數嘔吐不止者皆死論虚實可服藥不可服藥凡脚氣之疾皆由氣實而死終無一人以服藥致虚而殂故脚氣之人皆不得大補亦不可大瀉終不得畏虚故預止湯不服也如此者皆死不治也論看病問疾人世間大有病人親朋故舊交遊來問疾其人曽不經一事未讀一方自騁了了詐作明能談説異端或言是虚或道是實或云是風或云是蠱或道是水或云是痰紛紜謬說種種不同破壊病人心意不知孰是遷延未定時不待人歘然致禍各自散走是故大須好人及好名醫識病深淺探賾方書博覽古今是事明解者看病不爾大誤人事竊悲其如此者衆故一一顯析具述病之由狀令來世病者讀之以自防備也但有一狀相應則須依方急治勿取外人言議自貽憂悔但詳方意人死不難莫信他言以自悞也余嘗為人撰門冬煎此方治脚氣大有驗病者須用之論脉候法凡脚氣雖復診候多塗而三部之脉要須不違四時者為吉其逆四時者勿治餘如脉經所說此中不復具載其人本黒瘦者易治肥大肉厚赤白者難愈黒人耐風濕赤白不耐風瘦人肉硬肥人肉軟肉軟則受疾至深難愈也論腫不腫凡人久患脚氣不自知别於後因有他病發動治之得瘥後直患嘔吐而復脚弱余為診之乃告為脚氣病者曰某平生不患脚腫何因名為脚氣不肯服湯餘醫以為石發狐疑之間不過一旬而死故脚氣不得一向以腫為候亦有腫者有不腫者其以小腹頑痺不仁者脚多不腫小腹頑後不過三五日即令人嘔吐者名脚氣入心如此者死在旦夕凡患脚氣到心難治以其腎水剋心火故也論須慎不慎凡脚氣之病極須慎房室羊肉牛肉魚蒜蕺菜菘菜蔓菁瓠子酒麫酥油乳麋猪雞鵝鴨有方用鯉魚頭此等並切禁不得犯之并忌大怒惟得食粳粱粟米醬䜴葱韭薤椒薑橘皮又不得食諸生果子酸酢之食犯者皆不可瘥又大冝生牛乳生栗子論差能治者幾日可瘥凡脚氣病枉死者衆畧而言之有三種一覺之傷晩二驕狠恣傲三狐疑不决此三種正當枉死之色故世間誠無良醫雖有良醫而病人有性靈堪受入者更復尠少故雖有騏驥而不遇伯樂雖有尼父而人莫之師其為枉横亦猶此也今有病者有受入性依法使余治之不過十日可得永瘥矣若無受入性者亦不須為治縱令治之恐無瘥日也非但脚氣諸病皆然良藥善觸目可致不可使人必服法為信者施不為疑者説論灸法凡脚氣初得脚弱使速灸之并服竹瀝湯灸訖可服八風散無不瘥者惟急速治之若人但灸而不能服散服散而不灸如此者半瘥半死雖得瘥者或至一二年復更發動覺得便依此法速灸之及服散者治十十愈此病輕者登時雖不即惡治之不當根源不除久久期於殺人不可不精以為意初灸風市次灸伏兎次灸犢鼻次灸膝兩眼次灸三里次灸上廉次灸下亷次灸絶骨凡灸八處第一風市宂可令病人起正身平立垂兩臂直下舒十指掩著兩髀便㸃當手中央指頭髀大筋上是灸之百壯多亦任人輕者不可減百壯重者乃至一處五六百壯勿令頓灸三報之佳第二伏兎宂令病人累夫端坐以病人手夫掩横膝上夫下傍與曲膝頭齊上傍側夫際當中央是灸百壯亦可五十壯第三犢鼻宂在膝頭葢骨上際外骨邊平處以手按之得節解則是一云在膝頭下近外三骨箕踵中動脚以手按之得窟解是灸之五十壯可至百壯第四膝眼宂在膝頭骨下兩傍䧟者宛宛中是第五三里宂在膝頭骨節下一夫附脛骨外是一云在膝頭骨節下三寸人長短大小當以病人手夫度取灸之百壯第六上亷宂在三里下一夫亦附脛骨外是灸之百壯第七下亷宂在上亷下一夫一云附脛骨外是灸之百壯第八絶骨宂在脚外踝上一夫亦云四寸是凡此諸宂灸不必一頓灸盡壯數可日日報灸之三日之中灸令盡壯數為佳凡病一脚則灸一脚病兩脚則灸兩脚凡脚弱病皆多兩脚又一方云如覺脚惡便灸三里及絶骨各一處兩脚惡者合四處灸之多少隨病輕重大要雖輕不可減百壯不瘥速以次灸之多多益佳一說灸絶骨最要人有患此脚弱不即治及入腹腹腫大上氣于是乃須大法灸隨諸輸及諸管闗節腹背盡灸之并服八風散徃徃得瘥者諸管輸節解法並在别卷中覺病入腹若病人不堪痛不能盡作大灸但灸胸心腹諸穴及兩脚諸穴亦有得好瘥者凡量一夫之法覆手并舒四指對度四指上中節上横過為一夫夫有兩種有三指為一夫者此脚弱灸以四指為一夫也亦依支法存舊法梁丘犢鼻三里上亷下亷解谿太衝陽陵泉絶骨崑崙隂陵泉三隂交足太隂伏溜然谷涌泉承山束骨等凡一十八宂舊法多灸百㑹風府五臟六腑輸募頃來灸者悉覺引氣向上所以不取其法氣不止者可用之其要病已成恐不救者悉須灸之其足十趾去指竒一分兩足凡八宂曹氏名曰八衝極下氣有效其足十趾端名曰氣端日灸三壯並大神要其八衝可日灸七壯氣下即止病者非深相委悉慎勿為人灸之慎之慎之凡灸八衝須小作艾炷論服湯藥色目風毒之氣入人體中脉有三品内外證候相似但脉有異耳若脉浮大而緩宜服續命湯兩劑應瘥若風盛宜作越婢湯加白术四兩若脉浮大緊轉駃宜作竹瀝湯若病人脉微而弱宜服風引湯此人脉多是因虚而得之若大虚短氣力乏可以間作補湯隨病冷熱而用之若未愈更服竹瀝湯若病人脉浮大而緊駃此是三品之中最惡脉也或沉細而駃者此脉正與浮大而緊者同是惡脉浮大者病在外沉細者病在内治亦不異當消息以意耳其形尚可而手脚未容至弱數日之中氣上即便命終如此之脉往往有人得之無一存者急服竹瀝湯日服一劑切要湯勢常令相及勿令半日之中空無湯也此湯竹汁多服之若不極熱輙停在胸心更為人患每服當使極熱若服竹瀝湯得下者必佳也若已服三劑竹瀝湯病及脉勢未折而苦脹滿可以大鼈甲湯下之湯勢盡而不得下可以圓藥助湯令下下後更服竹瀝湯趣令脉勢折氣息料理便停服三十二物八風散佳凡初得病便摩野葛膏日再頑痺脚弱都愈乃止若服竹瀝湯脉勢折如未病時氣力轉勝脚故未能行體力充足然後漸微行步病重者瘥後半年始能扶人行耳既覺脉及體内瘥但當勤服八風散勿以脚未能行輕加餘治餘治未必全得益更生諸惡失此諸治也猥人邊亦勿行野葛膏有人聞竹瀝湯云恐傷腰脚者即勿與治宜知此法此皆人無受入性不可與醫故也不為疑者說此之謂也竹瀝湯有三首輕者服前方重者以次第服後方此風毒乃相注易病人宜將空缺服小金牙散以少許塗鼻孔耳門病困人及新亡人喜易人强健人宜將服之亦以塗耳鼻乃可臨近亡人及視疾者絳囊帶一方寸匕男左女右臂上此散毒服宜從少為始金牙散方見别卷病人惟宜飲赤小豆飲冬服側子金牙酒續命湯治風毒病初得似時行毒病而脉浮緩終不變駃此不治或數日而死或十日而死或得便不識人或發黄或發斑或目赤或下部穿爛者此最急得之即先服續命湯一劑須服葛根湯麻黄湯下之若故不折更與續命湯兩三劑必瘥此病大急常令湯勢相接不可使半日闕湯即便殺人續命湯方見别卷備急千金要方卷二十二
