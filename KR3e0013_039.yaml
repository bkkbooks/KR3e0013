body:
  text: 備急千金要方卷三十九唐孫思邈撰宋林億等校正膽腑方萬病丸散第七論方論曰聖人之道以慈濟物愽求衆藥以戒不虞倉卒之際應手皆得故有萬病方焉余以此方散在羣典乃令學者難用討尋遂鳩撮要妙以為斯品庻使造次可得好事君子安不忘危無事之暇可預和合以備痾瘵也芫花散治一切風冷痰飲癥癖㾬瘧萬醫所不治者皆治之一名登仙酒一名三建散芫花桔梗紫菀大㦸王不留行烏頭附子天雄白术五加皮蕘花狼毒莽草欒荆栝蔞根躑躅麻黄白芷荆芥茵芋各十分車前子石斛人參石南石長生各七分蛇床子萆薢牛膝狗脊菟絲子蓯蓉秦芃各闕分藜蘆薯蕷薏苡仁巴㦸天細辛當歸芎藭乾地黄食茱茰杜仲厚朴黄耆山茱茰乾薑芍藥桂心黄芩吳茱茰防已逺志蜀椒獨活五味子牡丹橘皮通草柴胡栢子仁藁本菖蒲茯苓續斷各二分右六十四味千金翼有麻花半夏赤車使者髙良薑紫葳無白术食茱茰等七味並不治不擇不灸不熬但振去塵土𢷬以粗羅下之即與服凡是猪雞五辛生冷酢滑任意食之無所忌惟諸豆皆殺藥不得食藥散三兩細麴末二升糯米三升真酒五升先以三大斗水煮米作粥須極熟冬月揚去火氣春月稍凉夏月揚絶火氣令極冷秋稍温次下麴末搦使和柔相得重下藥末搦使突突然好熟乃下真酒重搦使散盛不津器中以淨杖攪散經宿即飲直以布蓋不須宻封凡服藥平旦空心服之以知爲度㣲覺發動流入四肢頭面習習然爲定勿更加之如法服之常常内消非理加增必大吐利服散者細下篩服一方寸匕和水酒漿飲無在稍增以知爲度服丸者細下篩蜜丸如梧子每服七丸但此藥或丸或散皆可惟不得作湯若欲得補不令吐㵼但取内消大益勝於五石兼逐諸病功十二種痺幷風入頭眼暗漠漠及上氣欬嗽喉中如水雞聲不得眠臥飲食不作肌膚五臟滯氣積聚不消壅閉不通心腹脹滿及連胷背鼓氣堅結流入四肢或復叉心膈氣滿時定時發十年二十年不瘥五種下痢疳蟲寸白諸蟲上下冷熱久積痰飲令人多睡消瘦無力䕃入骨髓便成滯患身體氣腫飲食嘔逆腰脚酸疼四肢沈重行立不能乆婦人因産冷入子臟臟中不浄或閉塞不通胞中瘀血冷滯出流不盡時時疹痛為患或因此斷産并小兒赤白下痢及胡臭耳聾鼻塞等病此藥以三丸為一劑服藥不過三劑萬病悉除説無窮盡故稱萬病丸以其用牛黄為主故一名牛黄丸以耆婆良醫故名耆婆丸方牛黄麝香犀角各一分桑白皮茯苓乾薑桂心當歸芎藭芍藥甘遂黄芩蜀椒細辛桔梗巴豆前胡紫菀蒲黄葶藶防風各闕分蜈蚣三節石蜥蝪人參一寸朱砂雄黄黄連大㦸禹餘糧芫花芫青七枚右三十一味崔氏無黄芩桑白皮桔梗防風為二十七味並令精細牛黄麝香犀角朱砂雄黄禹餘糧巴豆别研餘者合𢷬重絹下篩以白蜜和更𢷬三千杵宻封下破除日平旦空腹酒服三丸如梧子大取㣲下三升惡水為良若卒暴病不拘平旦早晩皆可服但以吐利為度若不吐利更加一丸或至三丸五丸須吐利為度不得限以丸數病强藥五服即定一服一盞治一切冷病積冷䕃瘦者四兩和酒一斗强者六兩和酒一斗半痰飲疝瘕上同宿食嘔吐四兩和酒一斗癥瘕腸鳴噫八兩和酒二斗久疰及久勞上同㿗痔塊堅冷嗽上氣二十兩和酒五斗奔㹠冷氣六兩和酒一斗半噎及冷痢上同卒中惡注忤心腹脹氣急欲死者三服定一服一盞大吐出鮮血瘴氣上同蠱毒五服定一服一盞温瘧㾬瘧並上同可三服一盞永瘥治婦人諸風諸病等並依前件帶下十二兩和酒三斗崩中六兩和酒一斗半月閉不通及冷病不産並上同斷緒不産八兩和酒二斗月水前後不調乍多乍少亦令人絶産四兩和酒一斗産後風冷不産六兩和酒二斗若重者八兩和酒二斗甚者十六兩和酒三斗大重者子宫下垂十六兩和酒四斗論曰逺覽前古莫覩此方有髙人李孝隆者自云隋初受之於定州山僧惠通道人此後用之大有效驗袐而不傳但得其藥其方不可得而聞始吾得之於静智道人將三紀於兹矣時俗名醫未之許也然比行之極有神驗其用藥殊不倫次將服節度大不近人情至於救急其驗特異方知神物效靈不拘常制至理關感智不能知亦猶龍吟雲起虎嘯風生此其不知所以然而然雖聖人莫之辯也故述之篇末以貽後嗣好學君子詳之非止救物兼深抑亦庻㡬於博見矣太乙神精丹治客忤霍亂腹痛脹滿尸疰惡風癲狂鬼語蠱毒妖魅温瘧但是一切惡毒無所不治方丹砂曾青雌黄雄黄磁石各四兩金牙二兩半右六味各𢷬絹下篩惟丹砂雌黄雄黄三味以醶醋浸之曾青用好酒於銅器中漬紙宻封訖日中曝百日經夏急五日亦得無日以火暖之然後各研令如細粉以醶酢拌使乾濕得所内土釜中以六一泥固濟勿令泄氣乾後安鐡環施脚髙一尺五寸置釜上以漸放火無問軟硬炭等皆得初放火取熟兩秤炭各長四寸置釡上待三分二分盡即益如此三度盡用熟火然後用益生炭其過三上熟火已外皆須加火漸多及至一伏時其火已欲近釡即便滿就釡下益炭經兩度即罷火盡極冷然後出之其藥精飛化凝著釡上五色者上三色者次一色者下雖無五色但色光明皎潔如雪最佳若飛上不盡更令與火如前以雄雞翼掃取或多或少不定研和棗膏丸如黍粒一本云丹砂曾青雄黄雌黄各二斤丹砂以大酢甆器中漬曾青美酒漬紙宻封閉日曝一百日雄黄雌黄各油煎九日九夜去油膩訖更𢷬數千杵皆勿研之别以大酢拌令浥浥然内藥土釡中以雄黄在下次下雌黄次曾青次丹砂以甘土泥塗勿令餘毫毛許乾以剛炭火燒之九日九夜去釡五寸九日九夜至釡底九日九夜侵釡腹三寸三九二十七日冷之一日一夜以刀子於釡際利著一匝開之取丹丹成訖細研如粉以棗膏和一切丹不得用蜜皆用棗膏學者宜知此術舊不用磁石金牙今加而用之治偏風大風惡疾癲癎癧癤鬼打等最良服法平旦空腹一丸如黍米為度其瘧病積久百方不瘥又加心腹脹滿上氣身面脚等並腫垂死者服一丸吐即瘥亦有不吐瘥者若不吐復不瘥者更服一丸半仍不瘥者後日增半丸漸服無有不瘥氣亦定當吐出青黄白物其因瘧兩脇下有癖塊者亦當消除若心腹不脹滿者可與一丸日日加之以知為度不必專須吐亦可一丸即瘥勿併與服亦可三日一服皆須以意斟酌量得其宜或腹内有水便即下者勿恠若患瘧日近精神健亦可斟酌病人藥性併與兩丸作一丸頓服之皆至午後食勿使冷勿使熱䜴漿粥任意食之若病瘧盗汗虚弱者日服一丸至三日吐即止若患瘧不汗氣復不流脚冷者服一丸至三日若不汗氣復脚即暖有潤汗不至三日吐即止若患瘧無顔色者服藥後三日即有顔色亦有須吐瘥者亦有服少許而瘥者亦有殺藥强人服三四丸始覺藥行者凡人禀性不同不可一槩與之但作黍米大服之為始漸加以知為度藥力驗壯勿併多服特慎油麵魚肉蒜當清浄服之若有患久不瘥在牀羸瘦并腹脹滿及腫或下痢者多死但與藥救之十人中或瘥三四人也又一説癥瘕積聚服一刀圭以飲漿水送下治諸卒死中惡客忤霍亂腹滿體帶五尸疰惡風疰忤大病相易死亡滅門狂癲鬼語已死氣絶心上㣲暖者扶起其頭以物校開口不可開琢去兩齒以漿飲送藥藥下即活諸乆病者日服一刀圭覆令汗汗出即愈不愈者不過再服亦有不汗而瘥復有不汗不愈者服如上法加半刀圭以瘥為度常以絳囊帶丸刀圭散男左女右小兒繫頭上辟瘴毒惡時氣射公小兒患可苦酒和之塗方寸紙上著兒心腹上令藥在上治之亦有已死者冬二日夏一日與此藥服得藥下便活若不得入腹不活若加金牙磁石者服至五服内必令人吐逆下利過此即自定其藥如小豆大為始從此漸小不得更大大風惡癩可二十服偏風癧癤諸惡風癲病等亦可二十服自餘諸惡病者皆止一二服量人輕重强弱不得多與若欲解殺藥但爛煮食肥猪肉服此藥後小應頭痛身熱一二日來大不能得食味後自漸得氣味五日後更能食若貪食過多者宜節之若服藥下悶亂可煮木防已湯服之即定凡言刀圭者以六粟為一刀圭一説云三小豆為一刀圭作土釡法其法取兩箇瓦盆各受二大斗許以甘土塗其内令極乾又一法作一瓦釡作一熱鐵釡各受九升瓦在上鐵在下其狀大小隨藥多少不必依此説一本云𢷬好甘土絹篩水和作泥硬軟如坯瓦泥泥一升内細紙封𢷬可受十斤亦可隨藥多少作之隂乾三十日置日中曝亦三十日日夕翻轉向日乾訖以糠五碩内釡糠中四向土攔擁之令糠徧釡周囘上下各厚七寸以火從下放五日五夜勿令人近之待冷一日一夜乃取掃拭令浄以黄丹醋和如稀粥掃其中令厚一分乃内藥凡合九丹八石招魂太清神仙諸大丹皆用此釡作之萬成終不落節其古釡六一泥及鐵釡皆除去之勿更用也此釡一具前後數十囘用不動久久轉此法師甚袐之余欲令當來天下學士得解之所以委曲具述之也作六一泥法赤石脂牡蠣滑石礜石黄礬鹵土蚯蚓屎各二兩右取醶酢以足為度若無鹵土以鹽代之先作甘土泥以泥各别褁前黄礬等五種作團褁之勿令泄氣以火燒周三日最好一日亦得出火破團取藥各𢷬碎絹篩然後與蚯蚓屎鹵土等分以酢和之如稠粥即得好酢可用二分酢一分水和用取前瓦盆以此泥塗之曾青如蚯蚓屎如黄連佳世少此者好崑崙碌亦得瘥病丹砂亦尠粟砂亦得舊不用磁石金牙今加之用治萬種惡風神良凡有患連年積歳不可治者宜須合此一篇皆以王相日天晴明齋戒沭浴如法合之述曰古之仙者以此救俗特為至袐余以大業年中數以合和而苦雄黄曾青難得後於蜀中遇雄黄大賤又於飛烏𤣥武大獲曾青蜀人不識今須識者隨其大小但作蚯蚓屎者即是如此千金可求遂於蜀縣魏家合成一釡以之治病神驗不可論宿癥風氣百日服者皆得痊愈故序而述焉凡雄黄皆以油煎九日九夜乃可入丹不爾有毒慎勿生用丹必熱毒不堪服宜慎之倉公散治卒鬼擊鬼痱鬼刺心腹痛如刺下血便死不知人及臥魘囓脚踵不覺者諸惡毒氣病方此是漢文帝時太倉令淳于意方故名特生礜石皂莢雄黄藜蘆各等分右四味治下篩取如大豆許内管中吹入病人鼻得嚏則氣通便活若未嚏復更吹之以得嚏為度此藥起死囘生小金牙散治南方瘴癘疫氣脚弱風邪鬼疰方金牙五分雄黄萆薢黄芩蜀椒由跋桂心莽草天雄朱砂麝香烏頭各二分牛黄一分蜈蚣一枚六寸者細辛萎㽔犀角乾薑各三分黄連四分右十九味治下篩合牛黄麝香𢷬三千杵温酒服錢五匕日三夜二以知為度絳囊盛帶男左女右一方寸匕省病問孝不避夜行塗人中晨昏霧露亦塗之大金牙散治一切蠱毒百疰不祥醫所不治方金牙鸛骨石膏各八分斑猫七分活草子胡燕矢白术雷丸龍牙各六分銅鏡鼻梔子仁乾漆龜甲鼈甲鬼督郵桃白皮大黄各四分桂心芍藥徐長卿羚羊角射干升麻鳶尾馬目毒公蜂房細辛乾薑芒硝由跋犀角甘草狼毒蜣蜋龍膽狼牙雄黄真珠各三分芫花莽草射罔烏梅各一分蛇蛻皮一尺鐵精赤小豆一合地膽樗雞芫青各七枚桃奴巴豆各二七枚右五十味治下篩服一刀圭稍加至二刀圭帶之辟百邪治九十九種疰一本有麝香無白术備急千金要方卷三十九
