body:
  text: 備急千金要方卷七十一唐孫思邈撰宋林億等校正痔漏方五痔第三論法方灸論曰夫五痔者一曰牡痔二曰牝痔三曰脈痔四曰腸痔五曰血痔牡痔者肛邊如鼠乳時時潰膿血出牝痔者肛腫痛生瘡脈痔者肛邊有瘡癢痛腸痔者肛邊核痛發寒熱血痔者大便清血隨大便汚衣又五痔有氣痔寒溫勞溫即發蛇蛻皮主之牡痔生肉如兒乳在孔中頗出見外妨於更衣鱉甲主之牝痔集驗作酒痔從孔中起外腫五六日自潰出膿血猬皮主之腸痔更衣挺出久乃縮母豬左足懸蹄甲主之脈痔更衣出清血蜂房主之五藥皆下篩等分隨其病倍其主藥為三分旦以井花水服半方寸匕病甚者旦暮服之亦可四五服禁寒冷食豬肉生魚菜房室惟得食乾白肉病瘥之後百日乃通房內又用藥導下部有瘡內藥瘡中無瘡內孔中又用野葛燒末刀圭內藥中服藥五日知二十日若三十日愈痔痛通忌蓴菜治五痔衆醫所不能愈者方秦芁白芷厚朴紫參亂髮紫菀各一兩雷丸藁本各二兩石南蟅蟲各一兩貫衆三兩虻蟲半升豬後懸蹄十四枚右十三味合搗下篩以羊髓脂煎和丸如梧子大空腹飲下十五丸日二若劇者夜一服四日肛邉癢止八日膿血盡鼠乳悉瘥滿六十日終身不復發久服益善忌魚豬肉等槐子圓治燥濕痔痔有雄雌皆主之方槐子乾漆秦芁吳茱萸根白皮各四兩白芷桂心黃芩黃耆白斂牡蠣龍骨雷丸丁香木香蒺藜附子各二兩右十六味為末蜜丸如梧子大飲服二十丸日三千金翼無白斂深師無黃耆云治苦暴有乾燥腫痛者有崩血無數者有鼠乳附核者有腸中煩癢者二五年皆殺人主忌飲酒及作勞犯之即發小槐實圓治五十年者方槐子三斤白糖二斤礬石硫黃各一斤大黃乾漆龍骨各十兩右七味四味搗篩其二種石及糖並細切內銅器中一石米下蒸之以綿絞取汁和藥末併手丸如梧子大隂乾酒服二十丸日三稍增至三十丸槐子酒治同前槐子二斗槐東南枝細銼一石槐東南根細銼三石右三味內大釜中以十六斛水煮取五斛澄取清更煎取一石六斗炊兩斛黍米上麴二十斤釀之攪令調封泥七日酒熟取清飲適性常令小小醉合時更煮滓取汁淘米及洗器不得用水須知此事忌生水故也又方塗熊膽取瘥止神良一切方皆不及此又方七月七日多採槐子熟搗取汁內銅器中重綿密蓋著宅中高門上曝二十日已上煎成如鼠屎大內榖道中日三亦主瘻及百種瘡又方取生槐白皮十兩熟搗丸如彈丸綿裹內下部中此病宜常食萹竹葉及煮羮粥大佳也又方取鯉魚腸三具以火灸令香綿裹內榖道中一食久蟲當出食魚腸數數易之盡三具瘥一方灸腸令香坐上蟲出經用有效又方虎頭犀角右二味為末和不中水豬脂大如雞子塗瘡上取瘥治五痔及脫肛方槐白皮二兩豬脂半斤漆子桃仁各十枚巴豆七枚薰草辛夷甘草白芷各半兩野葛六銖右十味㕮咀煎三上三下去滓以綿沾膏塞孔中日四五過蟲死瘥止癢痛大佳治五痔方猬皮方三指大切熏香棗大末熟艾雞子大右三味穿地作孔調和取便熏之口中熏黃煙氣出為佳火氣消盡即停停三日將息更熏之凡三度永瘥勿犯風冷羮臛將補慎豬雞等又方取槐根煮洗之又方用桃根煮洗之猬皮圓治痔方亦治漏猬皮一具礬石當歸連翹乾薑附子續斷黃耆各二兩槐子三兩乾地黃五兩右十味為末蜜丸如梧子大服十五丸日再加至四十丸集驗方無礬石地黃又方治崩中及痔方猬皮人參茯苓白芷禹餘糧乾地黃槐耳續斷各三兩蒲黃黃耆當歸艾葉橘皮白斂甘草各二兩白馬蹄酒浸一宿熬令黃牛角䚡各四兩鰻鱺魚頭二十枚豬懸蹄甲二十一枚熬右十九味為末蜜丸如梧子大酒服二十丸日再稍加治痔方右取槐耳赤雞一斤即是槐檽為末飲服方寸匕日三又方以蒲黃水服方寸匕日三良妙外臺云治腸痔每大便常有血者又方取桑耳作羮空腹飽食之三日食佳治痔下血及新産漏下方附子好礬石各一兩右二味為末白蜜丸如梧子大酒服二丸日三稍加不過數日便斷百日服之終身不發崔氏方有乾薑一兩治外痔方亦治惡瘡瘑瘡真珠雄黃雌黃各一兩竹茹三兩豬膏一斤右五味為末內豬膏中和調又切亂髮半雞子大和東向煎三上三下髮焦出其痔先用鹽湯洗拭乾後傳之治痔下部出膿血有蟲傍生孔竅方右以槐白皮一簷銼內釜中煮令味極出置大盆中適寒溫坐其中如浴狀蟲悉出冷又易之不過二三度瘥治榖道癢痛繞緣腫起裏許欲生肉突出方大豆三升以水七升急火煮取四升槐白皮三升甘草三兩右三味以豆汁煮取二升浸故帛薄之冷則易日三五度槐皮膏治榖道癢痛痔瘡方槐皮楝實各五兩外臺作塵豉白芷各二兩甘草刪繁用蜂房當歸三兩桃仁六十枚赤小豆二合右七味㕮咀以成煎豬膏一斤微火煎白芷色黃膏成取摩瘡上日再并導下部刪繁方無當歸治腎勞虛或酒醉當風所損腎藏病所為肛門腫生瘡因酒勞傷發瀉清血肛門疼痛蜂房膏治榖道痛方右用莵絲子熬黃黑和雞子黃以傳之日二度又方取杏仁熬令黃搗所脂以傳之治大便孔卒痛如鳥啄方右以大小豆各一斗和搗內兩袋中蒸令極熱更互坐之瘥灸法久冷五痔便血灸脊中百壯五痔便血失屎灸回氣百壯穴在脊窮骨上疥癬第四論法方灸論曰凡瘡疥小秦芁散中加烏蛇肉二兩主之黃耆酒中加烏蛇脯一尺亦大效千金翼云黃耆酒中加烏蛇脯一尺烏頭附子茵芋石南莾草各等分大秦芁散中加之亦有大效小小疥瘙十六味小秦芁散亦相當黃耆酒見第二十四卷凡諸疥瘙皆用水銀豬脂研令極細塗之治凡有瘡疥腰胯手足皆生疵疥者方栝蔞根四兩黃連芍藥薔薇根雀李根皮黃蘗各三兩苦參黃耆黃芩石龍芮各二兩大黃當歸續斷各一兩右十三味為末蜜丸如梧子大以薔薇飲服二十丸日三加至三十丸瘥乃止乾疥白癬勿服千金翼云所是癰疽皆須服之治寒熱瘡及風疥諸雜瘡方千年韭根好礬石雄黃藜蘆瓜蒂胡粉各一分水銀三分右七味以栁木研水銀使盡用豬脂一升煮藜蘆韭根瓜蒂三沸去滓內諸藥和調令相得即成以傳之神良救急方用治癬瘡䕡茹膏治一切惡瘡疥癬疽漏瘑方䕡茹狼牙青葙地榆藜蘆當歸萹蓄羊蹄根各二兩蛇牀子白斂各六分漏蘆二分右十一味搗以苦酒漬一宿明旦以成煎豬膏四升煎之三上三下膏成絞去滓內後藥如左雄黃雌黃硫黃礬石胡粉松脂各二兩水銀三兩右七味細研看水銀散盡即傾前件膏中以十隻筯攪數百遍止用磁器密貯舉勿令泄氣煎膏法必微火急即不中用傳藥不可近目及隂先研雄黃等令細候膏小冷即和攪傳之治疥疽諸瘡方水銀胡粉各六分黃連黃蘗各八分薑黃十分礬石附子苦參蛇牀子各三分右九味水銀胡粉别研如泥餘為末以成煎豬膏合和研令調以傳之千金翼無薑黃治久疥癬方丹砂雄黃雌黃劉涓子無亂髮洗淨松脂白蜜各一兩䕡茹三兩豬脂二升巴豆十四枚右九味先煎髮消盡內松脂蜜三上三下去滓內諸末中更一沸止以傳之千金翼用蠟不用蜜又方水銀礬石一作礬石黃連一作雄黃蛇牀子各一兩右四味為末以豬脂七合和攪不見水銀為熟傳之一方加藜蘆一兩又云䕡茹治諸瘡疥癬久不瘥者方水銀一斤臘月豬脂五斤右二味以鐵器中壘竈用馬通火七日七夜勿住火出之停冷取膏去水銀不妨别用以膏傳一切瘡無不應手立瘥千金翼又用水銀粉和豬脂塗之又方特牛尿羊蹄根各五升右二味以牛尿漬羊蹄根一宿日曝乾復內尿中取盡止作末傳諸瘡千金翼云和豬脂用更精又方拔取生烏頭十枚切煮汁洗之瘥論曰凡諸瘡癬初生時或始痛癢即以種種單方救之或嚼鹽塗之又以榖汁傳之又以蒜墨和傳之千金翼蒜作酥又以薑黃傳之又以鯉魚鮓糝傳之又以牛李子汁傳之若以此救不瘥乃以前諸大方治之治細癬方蛇牀子白鹽一作白堊羊蹄根各一升赤葛根苦參菖蒲各半斤黃連莾草各三兩右八味㕮咀以水七升煮取三升適寒溫以洗身如炊一石米頃為佳澄清後當微溫用之滿三日止又方羊蹄根於磨石上以苦酒磨之以傳瘡欲傳先刮瘡以火炙乾後傳四五過千金翼云搗羊蹄根著磁器中以白蜜和臨用先刮瘡令傷次以蜜和者傳之如炊一石米久拭去更以三年大蒜和塗之苦刮瘡處不傷即不瘥又方羊蹄根五升以桑柴灰汁煮四五沸以洗凡方中用羊蹄根皆以日未出採之佳又方菖蒲末五斤以酒五升漬釜中蒸之使味出先絶酒一日每服一升或半升又方用乾荆子燒中央器承兩頭取汁塗之先刮上令傷次用荆子汁治癬方右取煎餅熱拓不限多少日一遍良亦治浸淫瘡又方淨洗瘡取醬瓣雀屎和傳之瘥止千金翼云取􅉶和尿和塗之又方水銀蕪荑和酥傳之又方日中午搗桃葉汁傳之又方搗刺薊汁傳服之又方燒蛇蛻一具酒服又方服地黃汁佳又方搗羊蹄根和乳塗之又方服驢尿良又方醋煎艾塗之又方搗莨菪根蜜和傅之千金翼無根字治濕癬肥瘡方右用大麻􅢧傅之五日瘥治癬久不瘥者方右取自死蛇燒作灰豬脂和塗即瘥灸癬法日中時灸病處影上三姓灸之咒曰癬中蟲毛戎戎若欲治待日中八月八日日出時令病人正當東向戶長跪平舉兩手持尸兩邉取肩頭小垂際骨解宛宛中灸之兩火俱下各三壯若七壯十日愈治小兒癬方右以蛇牀實搗末和豬脂以傅之治瘙癢方右以水銀和胡粉傅之治身體瘙癢白如癬狀者方楮子三枚豬􅏬一具礬石一兩鹽一升右四味以苦酒一升合搗令熟以拭身體日三治癧易方右以三年醋磨烏賊骨先以布摩肉令赤次傅之又方醋磨硫黃塗取上集驗又磨附子硫黃待使熟將卧以布拭病上乃以藥傅之又方取塗中先死蜣蜋搗爛塗之當揩令熱封上一宿瘥又方白斂熏陸香右二味揩上作末水服瘥又方硫黃雌黃槲皮燒蛇蛻一具右四味各等分搗篩以清漆合和薄塗白處欲塗時先以巴豆半截拭白處皮微破然後傅之不過三兩度又方硫黃水銀礬石竈墨各等分右四味搗篩內坩子中以蔥葉中涕和研臨卧傅病上九江散治白癜風及二百六十種大風方當歸七分石南六分附子躑躅秦芁菊花乾薑防風雄黃麝香丹砂斑貓各四兩蜀椒連翹鬼箭羽石長生知母各八分鬼臼十一分王不留行人參石斛天雄烏頭獨活防己莾草各十二分水蛭百枚蜈蚣三枚虻蟲地膽各十枚右三十味諸蟲皆去足翅熬炙令熟為散以酒服方寸匕日再其病入髮令髮白服之百日愈髮還黑又方天雄白斂黃芩各三兩乾薑四兩附子一兩商陸躑躅各一升右七味治下篩酒服五分七日三治白癜方礬石硫黃右二味各等分為末酢和傳之又方平旦以手掉取韭頭露塗之極效又方以酒服生胡麻油一合日三稍稍加至五合慎生冷豬雞魚蒜等百日服五斗瘥又方取羅摩草煮汁拭之亦揩令傷擲白汁塗之又方石灰松脂酒主之方見卷末又方以蛇蛻皮熬摩數百過棄置草中又方樹空中水洗桂為末唾和塗之日三又方以水銀數數拭之令熱即消瘥乃止又方灸左右手中指節去延外宛中三壯未瘥報之治凡身諸處白駁漸漸長似癬但無瘥方右取鰻鱺魚脂塗之先揩病上使痛然後塗之治皮中紫赤疵痣去黶穢方乾漆雌黃礬石各三兩雄黃五兩巴豆十五枚炭皮二斤右六味治下篩以雞子白和塗故帛貼病上日二易治赤疵方右用墨大蒜鱔血合塗之治贅疵痣方雄黃硫黃真珠礬石巴豆䕡茹藜蘆各一兩右七味治下篩以真漆合和如泥以塗點病上須成瘡及去面皯皮中紫不耐漆人不得用以雞子白和之去疣目方以七月七日用大豆一合拭疣目上三遍病疣人自種豆於南屋東頭第二霤中豆生四葉以湯沃殺即瘥又方松柏脂合和塗之一宿失矣又方石硫黃揩六七遍又方杏仁燒令黑研膏塗上又方以豬脂癢處揩之令少許血出即瘥神驗不可加又方每月十五日月正中時望月以秃條帚掃三七遍瘥又方苦酒漬石灰六七日滴取汁點疣上小作疣即落又方取牛口中涎數塗自落又方著艾炷疣目上灸之三壯即除惡疾大風第五論方論曰惡疾大風有多種不同初得雖遍體無異而眉鬚已落有遍體已壞而眉鬚儼然有諸處不異好人而四肢腹背有頑處重者手足十指已有墮落有患大寒而重衣不暖有尋常患熱不能暫涼有身體枯稿者有津汁常不止者有身體乾癢徹骨搔之白皮如麩手下作瘡者外臺作卒不作瘡有瘡痍荼毒重疉而生晝夜苦痛不已者有直置頑鈍不知痛癢者其色亦有多種有青黃赤白黑光明枯暗此候雖種種狀貌不同而難療易療皆在前人不由醫者何則此病一著無問賢愚皆難與語何則口順心違不受醫教直希望藥力不能求已故難療易療屬在前人不關醫藥豫嘗手療六百餘人瘥者十分有一莫不一一親自撫養所以深細諳委之姑與共語覺難與語不受入即不須與療終有觸損病既不瘥乃勞而無功也又神仙傳有數十人皆因惡疾而致仙道何者皆由割棄塵纍懷頴陽之風所以非止瘥病乃因禍而取福也故余所覩病者其中頗有士大夫乃至有異種名人及遇斯患皆愛戀妻孥繫著心髓不能割捨直望藥力未肯近求諸身若能絶其嗜欲斷其所好非但愈疾因兹亦可自致神仙余嘗問諸病人皆云自作不仁之行久久並為極猥之業於中仍欲更作云為雖有悔言而無悔心但能自新受師教命餐進藥餌何有不除余以正觀年中將一病士入山教服松脂欲至百日鬚眉皆生由此觀之惟須求之於已不可一仰醫藥者也然有人數年患身體頑痺羞見妻子不告之令知其後病成狀貌分明乃云犯藥卒患此皆自誤然斯疾雖大療之於微亦可即瘥此一疾得逺者不過十年皆死近者五六嵗而亡然病者自謂百年不死深可悲悼一遇斯疾即須斷鹽常進松脂一切公私物務釋然皆棄猶如脫屣凡百口味特須斷除漸漸斷榖不交俗事絶乎慶弔幽隱巖谷周年乃瘥瘥後終身慎房事犯之還發兹疾有吉凶二義得之修善即吉若還同俗類必是凶矣今略述其由致以示後之學者可覽而思焉􅞒豆治惡疾方右用細粒烏豆擇取摩之皮不落者取三月四月天雄烏頭苖及根淨去土勿洗搗絞取汁漬豆一宿漉出曝乾如此七反始堪服初服三枚漸加至六七枚日一服禁房室豬魚雞蒜畢身毛髮即生犯藥不瘥岐伯神聖散治萬病癰疽癩疥癬風痿骨肉疽敗百節痛眉毛髮落身體淫淫躍躍痛癢目痛眥爛耳聾齒齲痔瘻天雄附子茵芋外臺作莔草躑躅細辛烏頭石南乾薑各一兩蜀椒防風菖蒲各二兩白术獨活各三兩右十三味治下篩酒服方寸匕日三勿增之狼毒散治惡疾方狼毒秦芁各等分右二味治下篩酒服方寸匕日三服五十日愈又方煉松脂投冷水中二十遍蜜丸服二丸遇飢即服之日三鼻柱斷離者二百日服之瘥斷鹽及雜食房室又天門冬酒服百日愈石灰酒主生毛髮眉鬚去大風方石灰一石伴水和濕蒸令氣足松脂成煉十斤為末上麴一斗二升黍米一石右四味先於大鍋內炒石灰以木札著灰中火出為度以枸杞根銼五斗水一石五升煮取九斗去滓以淋石灰三遍澄清以石灰汁和漬麴用汁多少一如釀酒法訖封四七日開服常令酒氣相及為度百無所忌不得觸風其米泔及飯糟一事已上不得使人畜犬鼠食之皆令深埋却此酒九月作二月止恐熱隔上熱者服後進三五口冷飯壓之婦人不能飲食黃瘦積年及蓐風不過一石即瘥其松脂末初酘釀酒攤飯時均散著飯上待飯冷乃投之此酒飯宜冷不爾即醋宜知之治大風眉鬚落赤白癩病八風十二痺筋急肢節緩弱飛尸遁注水腫癰疽疥癬惡瘡腳攣手折眼暗洞泄痰飲宿澼寒冷方麴二十五斤商陸根二十五斤馬耳切右二味合於甕中水一斛漬之炊黍米一石釀如家法使麴米相淹三酘畢密封三七日開視麴浮酒熟澄清溫服三升輕者二升藥發吐下為佳宜食弱煮飯牛羊鹿肉羮禁生冷醋滑及豬犬雞魚等治風身體如蟲行方右用鹽一斗水一石煎減半澄清溫洗浴三四遍并療一切風又方以淳灰汁洗面不過一月又方以大豆漬飯漿水旦旦溫洗面洗頭髮不淨加少麵勿以水濯之不過十度又方成煉雄黃松脂各等分蜜和丸如梧桐子大飲下十丸日三服百日愈慎酒肉鹽豉等備急千金要方卷七十一
