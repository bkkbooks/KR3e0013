body:
  text: 備急千金要方卷十二唐孫思邈撰宋林億等校正少小嬰孺方欬𠻳第六方小兒出胎二百許日頭身患小小瘡治護小瘥復發五月中忽小小欬嗽㣲温和治之因變癎一日二十過發四肢縮動背脊􅀈䠷眼反須臾氣絶良久復蘇已與常治癎湯得快吐下經日不間爾後單與竹瀝汁稍進一日一夕中合進一升許發時小踈明日與此竹瀝湯得吐下發便大折其間猶稍稍與竹瀝汁竹瀝湯方竹瀝五合黄芩三十銖木防已羚羊角白术各六銖一作白鮮大黄二兩茵芋三銖麻黄白薇桑寄生萆薢甘草各半兩右十二味㕮咀以水二升半煮取藥減半内竹瀝煎取一升分服二合相去一食久進一服一方無萆薢紫菀湯治小兒中冷及傷寒暴嗽或上氣咽喉鳴氣逆或鼻塞清水出方紫菀杏仁黄芩當歸甘草橘皮青木香麻黄桂心各六銖大黄一兩右十味㕮咀以水三升煮取九合去滓六十日至百日兒一服二合半一百日至二百日兒一服三合五味子湯治小兒風冷入肺上氣氣逆面青喘迫欬嗽晝夜不息食則吐不下方五味子當歸各半兩麻黄乾薑桂心人參紫菀甘草各六兩細辛欵冬花各二銖大黄一兩半白术右十二味㕮咀以水二升半煮取九合去滓兒六十日至百日一服二合半一百日至二百日一服三合其大黄别浸一宿下一方無欵冬花大黄有大棗三枚治小兒大人欬逆短氣胸中吸吸呵出涕唾嗽出臭膿方燒淡竹瀝煮二十沸小兒一服一合日五服大人一升亦日五服不妨食息乳哺治小兒寒熱欬逆膈中有癖乳若吐不欲食方乾地黄四兩麥門冬五味子蜜各半升大黄消石各一兩右六味㕮咀以水三升煮取一升去滓内消石蜜煮令沸服二合日三胸中當有宿乳汁一升許出大者服五合射干湯治小兒欬逆喘息如水雞聲方射干麻黄紫菀甘草生薑各一兩半夏五枚桂心五寸大棗二十枚右八味㕮咀以水七升煮取一升五合去滓内蜜五合煎一沸分温服二合日三又方半夏四兩紫菀桂心生薑細辛阿膠甘草各二兩欵冬花二合蜜一合右九味㕮咀以水一斗煮半夏取六升去滓内諸藥煮取二升五合五嵗兒服一升二歲服六合量大小多少加減之服之立効杏仁圓治大人小兒欬逆上氣方杏仁三升熟𢷬如膏蜜一升為三分以一分内杏仁𢷬令强更内一分𢷬之如膏又内一分𢷬熟止先食已含咽之多少自在日三每服不得過半方寸匕則利又方半夏二斤去皮河水洗六七度完用白礬一斤為末丁香甘草草豆蔲川升麻縮砂各四兩粗𢷬右七味以好酒一斗與半夏拌和匀同浸春冬三七日夏秋七日宻封口日足取出用冷水急洗風吹乾毎服一粒嚼破用薑湯下或乾喫候六十日乾方得服疑非孫思邈方八味生薑煎治少小嗽方生薑七兩乾薑四兩桂心二兩甘草欵冬花各三兩紫菀各三兩杏仁蜜各一升右合諸藥為末微火上煎取如飴餔量其大小多少與兒含咽之百日小兒如棗核許日四五服甚有驗四物欵冬圓治小兒嗽晝瘥夜甚初不得息不能復啼方欵冬花紫菀各一兩半桂心半兩伏龍肝六銖右為末蜜和如泥取如棗核大傅乳頭令兒飲之日三傅之漸漸令兒飲之菖蒲圓治小兒暴冷嗽及積風冷嗽兼氣逆鳴方菖蒲烏頭杏仁礬石細辛皂莢各六銖欵冬花乾薑桂心紫菀各十八銖蜀椒五銖吳茱萸六合右十二味為末蜜丸如梧子三歲兒飲服五丸加至十丸日三兒小以意減之兒大以意加之暴嗽數服便瘥桂枝湯治少小十日已上至五十日卒得謦欬吐乳嘔逆暴𠻳晝夜不得息方桂枝半兩甘草二兩半紫菀十八銖闕麥門冬一兩十八銖右四味㕮咀以水二升煮取半升以綿著湯中捉綿滴兒口中晝夜四五過與之節乳哺麻黄湯治少小卒肩息上氣不得安此惡風入肺方麻黄四兩甘草一兩桂心五寸五味子半升半夏生薑各二兩右六味㕮咀以水五升煮取二升百日兒服一合大小節度服之便愈癖結脹滿第七方亂灸法霍附雙紫圓治小兒身熱頭痛食飲不消腹中脹滿或小腹絞痛大小便不利或重下數起小兒無異疾惟飲食過度不知自止哺乳失節或驚悸寒熱惟此丸治之不瘥更可重服小兒欲下是其蒸候哺食減少氣息不快夜啼不眠是腹内不調悉宜用此丸不用他藥數用神驗千金不傳方臣億等詳序例中凡云服紫丸者即前變蒸篇中四味者是也云服紫丸不下者服赤丸赤丸差駃病重者當用之方中並無赤丸而此用朱砂又力緊於紫丸疑此即赤丸也巴豆蕤核仁各十八銖麥門冬十銖甘草五銖甘遂朱砂各二銖牡蠣蠟各八銖右八味以湯熟洗巴豆研新布絞去油别𢷬甘草甘遂牡蠣麥門冬下篩訖研蕤核仁令極熟乃内散更𢷬二千杵藥燥不能相丸更入少蜜足之半歲兒服如荏子一雙一歲二歲兒服如半麻子一雙三四歲者服如麻子二丸五六歲者服如大麻子二丸七歲八歲服如小豆二丸九歲十歲微大於小豆二丸常以雞鳴時服至日出時不下者熱粥飲數合即下丸皆雙出也下甚者飲以冷粥即止治小兒胎中宿熱乳母飲食粗惡辛苦乳汁不起兒乳哺不為肌膚心腹痞滿萎黄瘦瘠四肢痿躄繚戾服之可令充恱方芍藥柴胡各二兩大黄人參各一兩乾薑如熱以枳實代甘草各半兩鼈甲茯苓各一兩半右八味為末蜜丸如大豆服一丸一歲已上乳服三丸七歲兒服十丸日二牛黄圓治小兒宿乳不消腹痛驚啼方牛黄三銖附子二枚真珠巴豆杏仁各一兩右五味𢷬附子真珠為末下篩别𢷬巴豆杏仁令如泥内藥及牛黄𢷬一千二百杵藥成若乾入少蜜足之百日兒服如粟米一丸三歲兒服如麻子一丸五六歲兒服如胡豆一丸日二先乳哺了服之膈上下悉當微轉藥完出者病愈散出者更服以藥完出為度芒硝紫圓治小兒宿食癖氣痰飲徃來寒熱不欲食消瘦方芒硝大黄各四兩半夏甘遂各二兩代赭一兩巴豆二百枚杏仁一百二十枚右七味為末别𢷬巴豆杏仁治如膏旋内藥末𢷬三千杵令相和合强者内少蜜百日兒服如胡豆一丸過百日至一歲服二丸随兒大小以意節度當候兒大便中藥出為愈若不出更服如初治八歲已上兒熱結痰實不能食自下方芍藥梔子知母大黄各二兩柴胡二兩六銖升麻黄連黄芩各二兩半竹葉切一升半桔梗一兩半細辛十五銖右十一味㕮咀以水六升煮取一升八合去滓分四服十歲兒為三服一本有枳實杏仁各一兩半而無桔梗黄連治十五已下兒熱結多痰食飲減自下方大黄柴胡黄芩各三兩枳實一兩十八銖升麻芍藥知母梔子各二兩半生薑十八銖杏仁三兩竹葉切一升半右十一味㕮咀以水六升半煮取二升十歲至十五者分三服牛黄雙圓治小兒結實乳食不消心腹痛方牛黄太山甘遂各半兩真珠六銖杏仁芍藥黄芩各一兩巴豆十八銖右七味為末蜜丸一歲兒飲服如麻子二丸但隨兒大小加減之牛黄鼈甲圓治少小癖實壯熱食不消化中惡忤氣方牛黄厚朴茯苓桂心芍藥乾薑各半兩鼈甲麥麴柴胡大黄枳實芎藭各一兩右十二味為末蜜丸如小豆大日三服以意量之芫花圓治小兒心下痞痰癖結聚腹大脹滿身體壯熱不欲哺乳方芫花黄芩各一兩大黄雄黄各二兩半右四味為末蜜和更𢷬一千杵三歲兒至一歲已下服如粟米一丸欲服丸内兒喉中令母與乳若長服消病者當以意消息與服之與乳哺相避真珠圓治小兒痰實結聚宿癖羸露不能飲食方真珠半兩麥門冬一兩蕤仁二百枚巴豆四十枚右四味為末蜜丸朞歲兒服二丸如小豆大二百日兒服如麻子二丸漸増以知為度當下病赤黄白黒葵汁下勿絶藥病盡下自止久服使小兒肥白已試驗鼈甲圓治少小腹中結堅脅下有疹手足煩熱方鼈甲芍藥大黄各三十銖茯苓柴胡乾薑各二十四銖桂心六銖䗪蟲蠐螬各二十枚右九味為末蜜和服如梧子七丸漸漸加之以知為度鼈頭圓治小兒痞氣脅下腹中有積聚堅痛方鼈頭一枚甘皮半兩蝱蟲䗪蟲桃仁各十八銖右五味為末蜜丸服如小豆二丸日三大便不利加大黄十八銖以知為度治小兒羸瘦惙惙宜常服不妨乳方甘草五兩為末蜜丸一歲兒服如小豆十丸日三服盡即更合桂心橘皮湯治小兒五六日不食氣逆方桂心人參各半兩橘皮三兩黍米五合成擇薤五兩右五味㕮咀以水七升先煮藥煎取二升次下薤米米熟藥成稍稍服之地黄圓治少小胃氣不調不嗜食生肌肉方乾地黄大黄各一兩六銖茯苓十八銖當歸柴胡杏仁各半兩右六味為末以蜜丸如麻子大服五丸日三馬通粟圓治少小脅下有氣内痛喘逆氣息難徃來寒熱羸瘦不食方馬通中粟十八銖杏仁紫菀細辛各半兩五味子石膏秦芁半夏茯苓各六銖右九味為末蜜丸服如小豆十丸日三不知加至二十丸治小兒下痢腹大且堅方以故衣帶多垢者切一升水三升煮取一升分三服又方腹上摩衣中白魚亦治隂腫治少小腹脹滿方燒父母指甲灰乳頭上飲之又方韭根汁和猪脂煎細細服之又方車轂中脂和輪下土如彈丸吞之立愈又方米粉鹽等分炒變色腹上摩之治小兒癖灸兩乳下一寸各三壯當歸圓治小兒胎寒􅀈啼腹中痛舌上黒青涎下方一名黒丸當歸狼毒各九銖吳茱萸一作杏仁蜀椒各半兩細辛乾薑附子各十八銖巴豆十枚豉七合右九味𢷬七種下篩秤藥末令足研巴豆如膏稍稍内末𢷬令相得蜜和桑杯盛蒸五升米飯下出𢷬一千杵一月兒服如黍米一丸日一夜二不知稍加以知為度亦治水癖馬齒礬圓治小兒胎寒􅀈啼驚癎腹脹不嗜食大便青黄并大人虚冷内冷或有實不可吐下方馬齒礬一斤燒半日以棗膏和大人服如梧子二丸日三小兒以意減之以腹内温為度有實實去神妙治小兒忽患腹痛夭矯汗出名曰胎寒方煮梨葉濃汁七合可三四度飲之半夏圓治小兒暴腹滿欲死方半夏隨多少微火炮之𢷬末酒和服如粟米粒大五丸日三立愈治小兒霍亂吐痢方人參一兩厚朴甘草各半兩白术十八銖右四味㕮咀以水一升二合煮取半升六十日兒服一合百日兒分三服朞歲分二服中間隔乳服之乳母忌生冷油膩等一方加乾薑一分或加生薑三分藿香湯治毒氣吐下腹脹逆害乳哺方藿香一兩生薑三兩青竹筎甘草各半兩右四味㕮咀以水二升煮取八合毎服一合日三有熱加升麻半兩治孩子霍亂已用立驗方人參蘆籜各半兩藊豆藤二兩倉米一撮右四味㕮咀以水二升煮取八合分温服又方人參一兩木𤓰一枚倉米一撮右三味㕮咀以水煮分服以意量之立効治小兒霍亂方研尿滓乳上服之又方牛涎灌口中一合治少小吐痢方亂髮半兩燒灰鹿角六銖右二味為末米汁服一刀圭日三服又方熱牛屎含之一作牛膝又方燒特猪屎水解取汁少小服之備急千金要方卷十二
