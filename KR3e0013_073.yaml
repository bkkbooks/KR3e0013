body:
  text: 備急千金要方卷七十三唐孫思邈撰宋林億等校正解毒雜治方解五石毒第三論證方論曰人不服石以庶事不佳惡瘡疥癬溫疫瘧疾年年常患寢食不安興居中惡非止已事不康生子難育所以石在身中萬事休泰要不可服五石也人年三十已上可服石藥若素肥充亦勿妄服四十已上必須服之五十已上三年可服一劑六十已上二年可服一劑七十已上一年可服一劑又曰人年五十已上精華消歇服石猶得其力六十已上轉惡服石難得力所以常須服石令人手足溫暖骨髓充實能消生冷舉措輕便復耐寒暑不著諸病是以大須服之凡石皆熟鍊用之凡石之發當必惡寒頭痛心悶發作有時狀如溫瘧但有此兆無過取冷水淋之得寒乃止一切冷食惟酒須溫其諸解法備如後説其發背疽腫方見别卷又曰凡服石人甚不得雜食口味雖百品具陳終不用重食其肉諸雜既重必有相賊聚積不消遂動諸石如法持心將攝得所石藥為益善不可加余年三十八九嘗服五六兩乳自是以來深深體悉至於將悉節度頗識其性養生之士宜留意詳焉然其乳石必須土地清白光潤羅紋鳥翮一切皆成白可入服其非土地者慎勿服之多皆殺人甚於鴆毒紫石白石極須外內映徹光淨皎然非此亦不可服寒石五石更生散方舊説此藥方上古名賢無此漢末有何侯者行用自皇甫士安已降有進餌者無不發背解體而取顛覆余自有識性已來親見朝野仕人遭者不一所以寧食野葛不服五石明其大大猛毒不可不慎也有識者遇此方即須焚之勿久留也今但録主對以防先服者其方以從煙滅不復須存為含生害也蔥白豉湯鍾乳對术又對栝蔞其治主肺上通頭胸术動鍾乳胸塞短氣鍾乳動术頭痛目疼又鍾乳雖不對海蛤海蛤能動鍾乳鍾乳動則目疼短氣有時术動鍾乳直頭痛胸塞然鍾乳與术為患不過此也雖所患不同其治一也發動之始要有所由始覺體中有異與上患相應宜速服此方蔥白半斤豉二升甘草三兩人參外臺用吳茱萸一升右四味㕮咀先以水一斗五升煮蔥白作湯澄取八升內藥煮取三升分三服才服便使人按摩搖動口中嚼物然後仰臥覆以暖衣汗出去衣服湯熱歇即便冷淘飯燥脯而已若服此不解復服甘草湯方甘草三兩桂心二兩豉二升蔥白半斤右四味合服如上法若服此已解肺家猶有客熱餘氣復服桂心湯方桂心麥門冬各三兩人參甘草各二兩豉二升蔥白半斤右六味合服如前法此方與肘後散發身體生瘡麥門冬湯方用重分兩小異杜仲湯硫黃對防風又對細辛其治主脾腎通主腰腳防風動硫黃煩熱腳疼腰痛或嗔忿無常或下利不禁防風細辛能動硫黃而硫黃不能動彼始覺發便服此方杜仲三兩枳實李核仁各二兩香豉一升甘草二兩梔子仁十四枚右六味合服如上法若不解復服大麥奴湯方大麥奴四兩甘草人參芒硝桂心各二兩麥門冬半斤右六味合服如上法若服此已解脾腎猶有餘熱氣或冷復服人參湯方人參乾薑甘草當歸各一兩附子一枚右五味合服如上法生麥門冬湯白石英對附子其治主胃通主脾腎附子動白石英煩熱腹脹白石英動附子嘔逆不得食或口噤不開或言語難手腳疼痛始覺發宜服此方生麥門冬四兩甘草麻黃各二兩豉二升右四味合服如上法不解更服大黃湯方若煩加細辛五兩大黃三兩豉二升梔子仁二十枚甘草二兩右凡五味合服如上法頻服得下便止不下服盡若熱勢未除視瞻高而患渴復服栝蔞根湯方栝蔞根大麥奴四兩甘草二兩豉二升蔥白半升右五味合服如上法稍稍一兩合服之隱約得一升許便可食少糜動口若已解胃中有餘熱復服芒硝湯方芒硝桂心各二兩通草甘草各三兩白术一兩大棗二十枚李核仁二十一枚右七味合服如上法若腹脹去芒硝用人參二兩人參湯紫石英對人參其治主心肝通主腰腳人參動紫石英外臺云細辛人參動紫石英心急而痛或驚悸不得眠臥恍惚忘誤失性發狂昏昏欲眠或憒憒喜嗔或瘥或劇乍寒乍熱或耳聾目暗又防風雖不動紫石英紫石英猶動防風巢源外臺云防風雖不對紫石英而能動紫石英為藥中亦有人參緣防風動人參轉相發動令人亦心痛煩熱頭項強始覺服此方外臺服庥黃湯人參白术各三兩甘草外臺無桂心各二兩細辛一兩豉三升右六味合服如上法若嗔盛加大黃黃芩梔子各三兩若忘誤狂發猶未除更服生麥門冬湯方外臺此方治礜石發生麥門冬蔥白各半斤甘草三兩人參一兩豉二升右五味合服如上法溫牀暖覆牀下著火口中嚼物使身稍汗一日便解若心有餘熱更服人參湯方人參防風甘草各三兩桂心二兩生薑白术各一兩右六味合服如上法大麥麨方赤石脂對桔梗其治主心通主胸背桔梗動石脂心痛寒噤手腳逆冷心中煩悶赤石脂動桔梗頭痛目赤身體壯熱始覺發宜溫清酒飲之隨能否須酒勢行則解亦可服此方大麥熬令汗出燥止勿令大焦舂去皮細搗絹篩以冷水和服之千金翼云炒去皮淨淘蒸令熟曝乾熬令香乃為末蔥白豉湯礜石無所偏對其治主胃發則令人心急口噤骨節疼強或節節生瘡始覺發即服此方外臺云服麥門冬湯蔥白半斤豉二升甘草二兩右三味以水六升煮取二升半分三服若散發身體卒生瘡宜服生麥門冬湯方生麥門冬五兩甘草三兩桂心二兩蔥白半斤人參一兩半豉二升右六味服如解鍾乳湯法术對鍾乳术發則頭痛目疼或舉身壯熱解如鍾乳法附子對白石英亦對赤石脂附子發則嘔逆手腳疼體強骨節痛或項強面目滿腫發則飲酒服麨自愈若不愈與白石英同解人參對紫石英人參發則煩熱頭項強與紫石英同解大黃黃芩湯桔梗對赤石脂又對茯苓又對牡蠣桔梗發則頭痛目赤身體壯熱解與赤石脂同茯芩發則壯熱煩悶宜服此方大黃黃芩梔子仁各三兩豉一升蔥白切一升右五味㕮咀以水六升煮取二升半分三服牡蠣發則四肢壯熱心腹煩悶極渴解與赤石脂同乾薑無所偏對栝蔞根湯海蛤對栝蔞海蛤先發則手足煩熱栝蔞先發則噤寒清涕出宜服此方栝蔞根甘草各二兩梔子仁十四枚大黃一兩右四味合服如解鍾乳法白石英發先腹脹後發熱石硫黃發通身熱兼腰膝痛礜石發遍身發熱兼口噤牡蠣發頭痛而煩滿熱茯苓發直頭痛桔梗發頭面熱海蛤發心中發熱已上除海蛤外宜浴紫石英發乍寒乍熱赤石脂發心噤身熱頭目赤已上二味宜酒石硫黃礜石桔梗牡蠣茯苓此五物發宜浴白石英亦可小浴其餘皆不冝浴礜石發宜用生熟湯茯苓發熱多攻頭即以冷水洗身漬之浴法初熱先用暖水後用冷水浴時慎不可洗頭垂沐可以二三升灌之丸藥宜浴便得解即佳不瘥可餘治之赤石脂紫石英發宜飲酒得酒即解凡藥發或有宜冷或有宜飲酒不可一槩也又一法云寒食散發動者云草藥氣力易盡石性沉滯獨主胃中故令數發欲服之時以絹袋盛散一匕著四合酒中塞其口一宿後飲盡之其酒用多少將御節度自如舊法此則藥石之勢俱用石不住胃中何由而發事甚驗也梔子豉湯治食宿飯陳臭肉及羮宿菜發者方梔子三七枚香豉三升甘草三兩右三味㕮咀以水八升煮取三升分三服亦可加人參蔥白蔥白豉湯治因失食發及飲酒過醉發者方蔥白一斤豉二升乾薑五兩甘草二兩右四味㕮咀以水七升煮取三升分三服不解宜服理中湯方人參甘草白术各三兩乾薑二兩右四味㕮咀以水六升煮取三升半分三服人參湯治因瞋怒太過發者方人參枳實甘草各九分白术乾薑栝蔞根各六分右六味㕮咀以水九升煮取三升分三服若短氣者稍稍數飲千金翼云主散發氣逆心腹絞痛不得氣息命在轉燭者情色過多發宜服黃耆湯方本闕將冷太過發則多壯熱以冷水洗浴然後用生熟湯五六石灌之已食少暖食飲少熱酒行步自勞將熱太過發則多心悶時時食少冷食若夏月大熱時散發動多起於渴飲多所致水和少麨服之不瘥復作以瘥為度冷熱尉法若大小便閉塞不通或淋瀝溺血隂中疼痛此是熱氣所致用此法即愈其法前以冷物尉小腹已次以熱物尉之又以冷物尉之若小便數此亦是取冷所為暖將理自愈治藥發下利者方乾服豉即斷能多益佳檳榔湯凡服散之後忽身體浮腫多是取冷過所致治之方檳榔三十枚搗碎以水八升煮取二升分再服千金翼云子搗作末下篩㕮咀其皮以湯七升煮取二升去滓內子味為再服治凡散發瘡腫方蔓菁子熬杏仁黃連胡粉各一兩水銀二兩右五味别搗蔓菁子杏仁如膏以豬脂合研令水銀滅以塗上日三夜一治散發赤腫者方生地黃五兩大黃一兩生商陸三兩杏仁四十枚右四味切醋漬一宿豬膏一升煎商陸令黑去滓摩腫上日三夜一治散發生細瘡者方黃連芒硝各五兩右二味㕮咀以水八升煮黃連取四升去滓內芒硝令煬漬布取帖瘡上數數易換多少皆著之治散發瘡痛不可忍方冷石三兩下篩為末粉瘡上日五六度即燥須臾痛亦定治服散忽發痛方乾薑五兩㕮咀以水五升煮取三升去滓內蜜一合和攪頓服不瘥重作鴨通湯解散除熱方白鴨通五升沸湯二斗半淋之澄清取汁二斗豉三升梔子仁二十枚麻黃八兩冷石二兩甘草五兩石膏三兩右七味五味㕮咀以鴨通汁煮取六升去滓內豉三沸分服五合若覺體冷小便快濶其間若熱猶盛小便赤促服之不限五合宜小勞當漸進食不可令食少但勿便多耳解散治盛熱實大小便赤方升麻大黃黃連甘草黃蘗各三兩芍藥六兩黃芩四兩竹葉切一升梔子仁十四枚豉一升白鴨通五合右十一味㕮咀以水三斗先煮鴨通竹葉取一斗二升去滓澄清取一斗次內藥煮取三升分三服若上氣者加杏仁五合腹滿加石膏三兩下散法治藥發熱困方千金翼云凡散數發熱無賴下之去之又云諸丹及金石等同用黍米三升作糜以成煎豬脂一斤和令調宿不食旦空腹食之令飽晚當下藥神良不盡熱發更合服之又方肥豬肉五斤蔥白薤各半斤右三味合煮治如食法宿不食旦服之令盡不盡明日更服又方治發動數數患熱困壓藥下之之方豬腎脂一具不令中水以火灸承取汁適寒溫一服三服每日夜五六合多至五六升二日稍隨大便下又方作肥豬肉臛一升調如常法平旦空腹頓服令盡少時腹中雷鳴鳴定藥下隨下以器盛取用水淘得石不盡更作如前服之備急千金要方卷七十三
